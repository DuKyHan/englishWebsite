ai giới từ)","với (sai giới từ)"]},{"q":"6. Her French was excellent, without a trace of a/an ___.","options":["sound","voice","accent","tone"],"answer":2,"vi":"Tiếng Pháp của cô ấy xuất sắc, không hề có chút giọng nào (của người nước ngoài).","explanation":"\"accent\" = giọng điệu (đặc trưng vùng miền).","note":"từ vựng phù hợp ngữ cảnh","vis":["âm thanh (sai nghĩa)","giọng nói (sai nghĩa)","giọng địa phương, ngữ điệu (đúng)","âm điệu (sai nghĩa)"]},{"q":"7. Sandra has become a style ___ for the fashion world particularly.","options":["icon","image","item","category"],"answer":0,"vi":"Sandra đã trở thành biểu tượng thời trang, đặc biệt với giới mộ điệu.","explanation":"\"a style icon\" = biểu tượng phong cách.","note":"a style + icon","vis":["biểu tượng (đúng — style icon)","hình ảnh (sai nghĩa)","món đồ (sai nghĩa)","danh mục (sai nghĩa)"]},{"q":"8. She ___ in Hanoi for 2 years.","options":["lives","is living","have lived","has lived"],"answer":3,"vi":"Cô ấy đã sống ở Hà Nội được 2 năm.","explanation":"\"for 2 years\" + chủ ngữ số ít → has lived.","note":"S (số ít) + has + P2 + for + khoảng thời gian","vis":["sống (hiện tại đơn, sai thì)","đang sống (hiện tại tiếp diễn, sai thì)","đã sống (sai chủ ngữ — \"She\" dùng \"has\")","đã sống (hiện tại hoàn thành, đúng)"]},{"q":"9. How ___ your sister ___ to school every day?","options":["is - going","has - gone","do – go","does – go"],"answer":3,"vi":"Chị của bạn đi học mỗi ngày bằng cách nào?","explanation":"Thói quen, chủ ngữ số ít \"your sister\" → does...go.","note":"How does + S (số ít) + V-inf?","vis":["sai cấu trúc câu hỏi","sai thì","sai chủ ngữ — cần \"does\" với \"sister\"","hiện tại đơn ngôi 3, đúng"]},{"q":"10. At present they ___ to New York.","options":["traveling","are travelling","travelled","to travel"],"answer":1,"vi":"Hiện tại họ đang đi du lịch đến New York.","explanation":"\"at present\" là dấu hiệu hiện tại tiếp diễn → are travelling.","note":"S + are + V-ing (dấu hiệu: at present)","vis":["thiếu trợ động từ, sai","đang đi (hiện tại tiếp diễn, đúng — \"at present\")","đã đi (quá khứ đơn, sai thì)","sai cấu trúc"]},{"q":"11. My father ___ some flowers in the garden.","options":["waters","has watered","is watering","water"],"answer":2,"vi":"Bố tôi đang tưới hoa trong vườn.","explanation":"Hành động đang diễn ra → is watering.","note":"S + is + V-ing","vis":["tưới (hiện tại đơn, sai thì)","đã tưới (hiện tại hoàn thành, sai)","đang tưới (hiện tại tiếp diễn, đúng)","sai chia động từ"]},{"q":"12. I’ll come home ___ 8.30 and 9.20.","options":["between","from","with","at"],"answer":0,"vi":"Tôi sẽ về nhà trong khoảng từ 8h30 đến 9h20.","explanation":"\"between...and...\" = trong khoảng từ...đến...","note":"between + giờ + and + giờ","vis":["giữa (đúng — between…and…)","từ (sai — nên đi với \"to\")","với (sai giới từ)","lúc (sai giới từ)"]},{"q":"13. Vietnamese people are always proud ___ their traditions and customs.","options":["on","in","of","at"],"answer":2,"vi":"Người Việt Nam luôn tự hào về truyền thống và phong tục của mình.","explanation":"\"be proud of\" = tự hào về.","note":"be proud of + N","vis":["trên (sai giới từ)","trong (sai giới từ)","về (đúng — proud of)","tại (sai giới từ)"]},{"q":"14. Many visitors ___ to Ho Chi Minh’s Mausoleum every day.","options":["come","comes","is coming","has come"],"answer":0,"vi":"Nhiều du khách đến thăm Lăng Bác mỗi ngày.","explanation":"Chủ ngữ số nhiều \"visitors\" → come.","note":"S (số nhiều) + V(nguyên mẫu)","vis":["đến (hiện tại đơn số nhiều, đúng — \"many visitors\")","đến (sai — chủ ngữ số nhiều)","đang đến (hiện tại tiếp diễn, sai)","đã đến (hiện tại hoàn thành, sai thì)"]},{"q":"15. I’m trying to fit everything into my busy ___.","options":["missions","schedule","program","tasks"],"answer":1,"vi":"Tôi đang cố sắp xếp mọi thứ vào lịch trình bận rộn của mình.","explanation":"\"schedule\" = lịch trình.","note":"từ vựng phù hợp ngữ cảnh","vis":["nhiệm vụ (sai nghĩa)","lịch trình (đúng)","chương trình (sai nghĩa)","nhiệm vụ (sai nghĩa)"]},{"q":"16. I ___ Paul today, but I saw him last Sunday.","options":["will not see","will not be seeing","have not seen","has not seen"],"answer":2,"vi":"Tôi chưa gặp Paul hôm nay, nhưng tôi đã gặp anh ấy Chủ nhật tuần trước.","explanation":"\"today\" (khoảng thời gian còn đang diễn ra) → have not seen.","note":"S + haven’t + P2 (dấu hiệu: today)","vis":["sẽ không gặp (tương lai đơn, sai — có kế hoạch)","sẽ không gặp (tương lai tiếp diễn, sai)","chưa gặp (hiện tại hoàn thành, đúng)","chưa gặp (sai chủ ngữ — \"I\" dùng \"have\")"]},{"q":"17. We have never ___ another country before.","options":["visit","visited","visiting","visitor"],"answer":1,"vi":"Chúng tôi chưa từng đến thăm một quốc gia nào khác trước đây.","explanation":"have + never + P2 → visited.","note":"have never + P2","vis":["thăm (nguyên mẫu, sai)","đã thăm (quá khứ phân từ, đúng — have never + P2)","thăm (V-ing, sai)","khách thăm (danh từ, sai)"]},{"q":"18. At present, he ___ a piece of music.","options":["is composing","has composed","will compose","composed"],"answer":0,"vi":"Hiện tại, anh ấy đang sáng tác một bản nhạc.","explanation":"\"at present\" là dấu hiệu hiện tại tiếp diễn → is composing.","note":"S + is + V-ing","vis":["đang sáng tác (hiện tại tiếp diễn, đúng — \"at present\")","đã sáng tác (hiện tại hoàn thành, sai)","sẽ sáng tác (tương lai, sai)","đã sáng tác (quá khứ đơn, sai)"]},{"q":"19. I have never ___ such a good novel before.","options":["to read","reads","reading","read"],"answer":3,"vi":"Tôi chưa từng đọc một cuốn tiểu thuyết hay như vậy trước đây.","explanation":"have + never + P2 → read (quá khứ phân từ bất quy tắc).","note":"have never + P2","vis":["đọc (to-V, sai)","đọc (chia động từ, sai)","đọc (V-ing, sai)","đọc (quá khứ phân từ, đúng — have never + P2)"]},{"q":"20. Nowadays, viewers can watch a variety of local and international programs ___ TV.","options":["on","in","at","of"],"answer":0,"vi":"Ngày nay, khán giả có thể xem nhiều chương trình trong nước và quốc tế trên TV.","explanation":"\"on TV\" = trên TV.","note":"on + TV","vis":["trên (đúng — on TV)","trong (sai giới từ)","tại (sai giới từ)","của (sai giới từ)"]},{"q":"21. We ___ a party tomorrow.","options":["have","are having","have had","were having"],"answer":1,"vi":"Ngày mai chúng tôi sẽ tổ chức tiệc.","explanation":"Kế hoạch cá nhân đã sắp xếp → hiện tại tiếp diễn diễn tả tương lai.","note":"S + is/are + V-ing (dự định tương lai)","vis":["có (hiện tại đơn, sai thì)","sẽ có (hiện tại tiếp diễn diễn tả kế hoạch, đúng)","đã có (hiện tại hoàn thành, sai)","đang có (quá khứ tiếp diễn, sai thì)"]},{"q":"22. Danish ___ to Japan next month.","options":["go","goes","are going","is going"],"answer":3,"vi":"Danish sẽ đi Nhật vào tháng tới.","explanation":"Chủ ngữ số ít \"Danish\" → is going.","note":"S (số ít) + is going + to + N","vis":["đi (hiện tại đơn, sai chủ ngữ số ít)","đi (hiện tại đơn ngôi 3, sai — không diễn tả kế hoạch)","đang đi (sai chủ ngữ số ít \"Danish\")","sẽ đi (hiện tại tiếp diễn diễn tả kế hoạch, đúng)"]},{"q":"23. The train ___ at 7.30 tomorrow morning.","options":["leave","leaving","leaves","leave"],"answer":2,"vi":"Chuyến tàu sẽ khởi hành lúc 7h30 sáng mai.","explanation":"Hiện tại đơn diễn tả lịch trình cố định → leaves.","note":"S (số ít) + V-s/es (lịch trình)","vis":["khởi hành (sai chia động từ)","khởi hành (V-ing, sai)","khởi hành (hiện tại đơn diễn tả lịch trình, đúng)","khởi hành (lặp lại, sai)"]},{"q":"24. I have got tour details here. We ___ 4 days in Beijing.","options":["to spend","spends","spending","spend"],"answer":3,"vi":"Tôi có chi tiết chuyến đi ở đây. Chúng tôi sẽ ở Bắc Kinh 4 ngày.","explanation":"Hiện tại đơn diễn tả lịch trình đã định sẵn → spend.","note":"S (số nhiều) + V(nguyên mẫu) (lịch trình)","vis":["dành thời gian (to-V, sai)","dành thời gian (sai chủ ngữ số nhiều \"We\")","dành thời gian (V-ing, sai)","dành thời gian (hiện tại đơn diễn tả lịch trình, đúng)"]},{"q":"25. The capital city of Canada is ___.","options":["Ottawa","Montreal","Vancouver","Hamilton"],"answer":0,"vi":"Thủ đô của Canada là Ottawa.","explanation":"Kiến thức thực tế: thủ đô Canada là Ottawa.","note":"kiến thức thực tế","vis":["Ottawa (đúng — thủ đô Canada)","Montreal (thành phố lớn, sai)","Vancouver (thành phố lớn, sai)","Hamilton (thành phố, sai)"]},{"q":"26. The match takes place ___ Saturday afternoon this week.","options":["at","on","in","of"],"answer":1,"vi":"Trận đấu diễn ra vào chiều thứ Bảy tuần này.","explanation":"Trước \"Saturday afternoon\" (một buổi cụ thể trong ngày) dùng \"on\".","note":"on + Saturday afternoon","vis":["tại (sai giới từ)","vào (đúng — on + ngày)","trong (sai giới từ)","của (sai giới từ)"]},{"q":"27. He’s living in Hanoi. He ___ there since 2010.","options":["lives","is living","has lived","lived"],"answer":2,"vi":"Anh ấy đang sống ở Hà Nội. Anh ấy đã sống ở đó từ năm 2010.","explanation":"\"since 2010\" là dấu hiệu hiện tại hoàn thành → has lived.","note":"S + has + P2 + since + mốc thời gian","vis":["sống (hiện tại đơn, sai thì)","đang sống (hiện tại tiếp diễn, sai thì)","đã sống (hiện tại hoàn thành, đúng — dấu hiệu \"since\")","đã sống (quá khứ đơn, sai thì)"]},{"q":"28. They have been an English teacher ___ many years.","options":["for","since","in","on"],"answer":0,"vi":"Họ đã là giáo viên tiếng Anh được nhiều năm rồi.","explanation":"\"for\" + khoảng thời gian.","note":"for + khoảng thời gian","vis":["trong (đúng — for + khoảng thời gian)","từ (sai — since + mốc thời gian)","trong (sai giới từ)","vào (sai giới từ)"]},{"q":"29. It rain a lot ___ July.","options":["at","of","in","on"],"answer":2,"vi":"Trời mưa nhiều vào tháng Bảy.","explanation":"Trước tên tháng dùng \"in\".","note":"in + tháng","vis":["tại (sai giới từ)","của (sai giới từ)","vào (đúng — in + tháng)","vào (sai giới từ)"]},{"q":"30. The official language in Australia is ___.","options":["Italian","Greek","Chinese","English"],"answer":3,"vi":"Ngôn ngữ chính thức ở Úc là tiếng Anh.","explanation":"Kiến thức thực tế: ngôn ngữ chính thức của Úc là tiếng Anh.","note":"kiến thức thực tế","vis":["tiếng Ý (sai)","tiếng Hy Lạp (sai)","tiếng Trung (sai)","tiếng Anh (đúng — ngôn ngữ chính thức của Úc)"]},{"q":"31. I find it hard to understand that foreigner because of his ___.","options":["voice","sound","accent","volume"],"answer":2,"vi":"Tôi thấy khó hiểu người nước ngoài đó vì giọng điệu của anh ta.","explanation":"\"accent\" = giọng điệu.","note":"từ vựng phù hợp ngữ cảnh","vis":["giọng nói (sai nghĩa)","âm thanh (sai nghĩa)","giọng địa phương (đúng)","âm lượng (sai nghĩa)"]},{"q":"32. Kangaroos and ___ are the iconic animals of Australia.","options":["beaver","koala","eagle","cheetah"],"answer":1,"vi":"Chuột túi và gấu túi là những loài vật biểu tượng của Úc.","explanation":"\"koala\" = gấu túi, loài vật biểu tượng của Úc.","note":"từ vựng phù hợp ngữ cảnh","vis":["hải ly (sai)","gấu túi koala (đúng — biểu tượng của Úc)","đại bàng (sai)","báo săn (sai)"]},{"q":"33. Coming to New Zealand, you will be surprised by its many ___ views.","options":["breath-taking","taking-breath","breath-take","take-breath"],"answer":0,"vi":"Đến New Zealand, bạn sẽ ngạc nhiên trước nhiều cảnh đẹp ngoạn mục.","explanation":"\"breath-taking\" = ngoạn mục, đẹp đến nghẹt thở (tính từ ghép).","note":"breath-taking (tính từ ghép)","vis":["ngoạn mục (đúng — tính từ ghép đúng thứ tự)","sai thứ tự từ","sai dạng từ","sai dạng từ"]},{"q":"34. The Statue of Liberty in Upper New York Bay of America ___ the freedom.","options":["presents","shows","symbolizes","reveals"],"answer":2,"vi":"Tượng Nữ thần Tự do ở Vịnh New York của Mỹ tượng trưng cho tự do.","explanation":"\"symbolize\" = tượng trưng cho.","note":"S + symbolizes + N","vis":["trình bày (sai nghĩa)","cho thấy (sai nghĩa)","tượng trưng cho (đúng)","tiết lộ (sai nghĩa)"]},{"q":"35. Singapore is an ideal destination for worldwide visitors because of its many ___.","options":["tour attractions","attraction tours","attractive tours","tourist attractions"],"answer":3,"vi":"Singapore là điểm đến lý tưởng cho du khách toàn cầu vì có nhiều điểm tham quan hấp dẫn.","explanation":"\"tourist attractions\" = điểm tham quan du lịch (cụm từ cố định).","note":"tourist attractions (collocation)","vis":["sai trật tự từ","sai trật tự từ","các tour hấp dẫn (sai nghĩa)","điểm thu hút khách du lịch (đúng)"]},{"q":"36. Some beauty spots in this city ___ reconstructed to attract more visitors.","options":["has been","have been","will have","will been"],"answer":1,"vi":"Một số danh lam thắng cảnh trong thành phố này đã được tái thiết để thu hút thêm du khách.","explanation":"Chủ ngữ số nhiều \"spots\" + bị động hiện tại hoàn thành → have been.","note":"S (số nhiều) + have been + P2 (bị động)","vis":["sai chủ ngữ số nhiều \"spots\"","đã được tái thiết (hiện tại hoàn thành bị động, đúng)","sai cấu trúc, thiếu \"been\"","sai ngữ pháp"]},{"q":"37. The Louvre Museum ___ from 9 a.m. to 6 p.m. every day except Tuesday and Wednesday.","options":["opens","open","will open","will be open"],"answer":0,"vi":"Bảo tàng Louvre mở cửa từ 9h sáng đến 6h chiều mỗi ngày trừ thứ Ba và thứ Tư.","explanation":"Hiện tại đơn diễn tả lịch trình cố định, chủ ngữ số ít → opens.","note":"S (số ít) + V-s/es (lịch trình)","vis":["mở cửa (hiện tại đơn diễn tả lịch trình, đúng)","mở cửa (sai chia động từ ngôi 3 số ít)","sẽ mở cửa (tương lai, sai)","sẽ được mở cửa (tương lai bị động, sai)"]},{"q":"38. They ___ to New York to join the Fashion show next week.","options":["will fly","will be flying","flies","fly"],"answer":1,"vi":"Họ sẽ bay đến New York để tham gia buổi trình diễn thời trang vào tuần tới.","explanation":"Dự định cá nhân đã sắp xếp → tương lai tiếp diễn.","note":"S + will be + V-ing (dự định)","vis":["sẽ bay (tương lai đơn, đúng — có kế hoạch xác định \"next week\")","sẽ đang bay (tương lai tiếp diễn, sai)","bay (hiện tại đơn, sai)","bay (sai chia động từ)"]},{"q":"39. This annual festival ___ at the end of the March.","options":["will hold","will be held","holds","is held"],"answer":3,"vi":"Lễ hội thường niên này được tổ chức vào cuối tháng Ba.","explanation":"Hiện tại đơn bị động diễn tả sự kiện lặp lại hàng năm → is held.","note":"S + is/are + P2 (bị động, lịch trình lặp lại)","vis":["sẽ tổ chức (chủ động, sai — cần bị động)","sẽ được tổ chức (tương lai bị động, sai — không hợp thì)","tổ chức (hiện tại đơn chủ động, sai)","được tổ chức (hiện tại đơn bị động, đúng — lịch trình cố định)"]},{"q":"40. I ___ Sydney Harbour twice, so this time I think I ___ to a different place.","options":["have visited - will go","have visited - will be going","visited - will go","visited - will be going"],"answer":0,"vi":"Tôi đã đến thăm Cảng Sydney hai lần, vì vậy lần này tôi nghĩ tôi sẽ đến một nơi khác.","explanation":"\"twice\" (số lần) → hiện tại hoàn thành; dự định đơn giản → will go.","note":"have + P2 (twice); will + V-inf","vis":["đã thăm - sẽ đi (hiện tại hoàn thành - tương lai đơn, đúng)","đã thăm - sẽ đang đi (hiện tại hoàn thành - tương lai tiếp diễn, sai)","đã thăm - sẽ đi (quá khứ đơn - tương lai đơn, sai thì đầu)","đã thăm - sẽ đang đi (quá khứ đơn - tương lai tiếp diễn, sai)"]},{"q":"41. She can’t come to the phone now because she ___ tomorrow’s test.","options":["studies","is studying","has studied","has been studying"],"answer":1,"vi":"Cô ấy không thể nghe điện thoại bây giờ vì đang học bài cho kỳ thi ngày mai.","explanation":"\"now\" là dấu hiệu hiện tại tiếp diễn → is studying.","note":"S + is + V-ing (dấu hiệu: now)","vis":["học (hiện tại đơn, sai thì)","đang học (hiện tại tiếp diễn, đúng — đang diễn ra)","đã học (hiện tại hoàn thành, sai)","đã học (hiện tại hoàn thành tiếp diễn, sai — không hợp ngữ cảnh)"]},{"q":"42. They must be at the sports ground now. They usually ___ basketball on Fridays.","options":["play","are playing","have played","have been playing"],"answer":0,"vi":"Chắc họ đang ở sân thể thao bây giờ. Họ thường chơi bóng rổ vào thứ Sáu.","explanation":"\"usually\" là dấu hiệu hiện tại đơn (thói quen) → play.","note":"S (số nhiều) + V(nguyên mẫu) (dấu hiệu: usually)","vis":["chơi (hiện tại đơn diễn tả thói quen, đúng — \"usually\")","đang chơi (hiện tại tiếp diễn, sai)","đã chơi (hiện tại hoàn thành, sai)","đã chơi (hiện tại hoàn thành tiếp diễn, sai)"]},{"q":"43. I ___ my work already. I’m ready to go for a walk with you.","options":["finish","am finishing","have finished","have been finishing"],"answer":2,"vi":"Tôi đã hoàn thành công việc rồi. Tôi sẵn sàng đi dạo cùng bạn.","explanation":"\"already\" là dấu hiệu hiện tại hoàn thành → have finished.","note":"have + P2 (dấu hiệu: already)","vis":["xong (hiện tại đơn, sai thì)","đang xong (hiện tại tiếp diễn, sai thì)","đã xong (hiện tại hoàn thành, đúng — dấu hiệu \"already\")","đã xong (hiện tại hoàn thành tiếp diễn, sai)"]},{"q":"44. I ___ breakfast right now. Can you call a little later?","options":["cook","am cooking","have cooked","have been cooking"],"answer":1,"vi":"Tôi đang nấu bữa sáng ngay bây giờ. Bạn gọi lại sau một chút được không?","explanation":"\"right now\" là dấu hiệu hiện tại tiếp diễn → am cooking.","note":"S + is/am + V-ing (dấu hiệu: right now)","vis":["nấu (hiện tại đơn, sai thì)","đang nấu (hiện tại tiếp diễn, đúng — \"right now\")","đã nấu (hiện tại hoàn thành, sai)","đã nấu (hiện tại hoàn thành tiếp diễn, sai)"]},{"q":"45. I ___ this book. Can I borrow it for a week or so?","options":["don’t read","am not reading","haven’t read","haven’t been reading"],"answer":2,"vi":"Tôi chưa đọc cuốn sách này. Tôi có thể mượn nó khoảng một tuần được không?","explanation":"Diễn tả việc chưa xảy ra tính đến hiện tại → haven’t read.","note":"haven’t + P2","vis":["không đọc (hiện tại đơn, sai thì)","không đang đọc (hiện tại tiếp diễn, sai)","chưa đọc (hiện tại hoàn thành, đúng)","chưa đọc (hiện tại hoàn thành tiếp diễn, sai — không hợp ngữ cảnh)"]},{"q":"46. Maria is good at languages. She ___ French, Spanish and German.","options":["speaks","is speaking","has spoken","has been speaking"],"answer":0,"vi":"Maria giỏi ngôn ngữ. Cô ấy nói được tiếng Pháp, Tây Ban Nha và Đức.","explanation":"Khả năng/sự thật hiển nhiên → hiện tại đơn: speaks.","note":"S (số ít) + V-s/es (khả năng, sự thật)","vis":["nói (hiện tại đơn diễn tả khả năng, đúng)","đang nói (hiện tại tiếp diễn, sai)","đã nói (hiện tại hoàn thành, sai)","đã nói (hiện tại hoàn thành tiếp diễn, sai)"]},{"q":"47. So far, he ___ five stories for children.","options":["writes","is writing","has written","has writing"],"answer":2,"vi":"Cho đến nay, anh ấy đã viết được năm câu chuyện cho trẻ em.","explanation":"\"so far\" là dấu hiệu hiện tại hoàn thành → has written.","note":"has + P2 (dấu hiệu: so far)","vis":["viết (hiện tại đơn, sai thì)","đang viết (hiện tại tiếp diễn, sai thì)","đã viết (hiện tại hoàn thành, đúng — \"so far\")","sai ngữ pháp"]},{"q":"48. We ___ for their answer for two months already.","options":["wait","are waiting","have been waited","have been waiting"],"answer":3,"vi":"Chúng tôi đã chờ câu trả lời của họ được hai tháng rồi.","explanation":"Nhấn mạnh tính liên tục kéo dài → hiện tại hoàn thành tiếp diễn: have been waiting.","note":"have been + V-ing (nhấn mạnh tính liên tục)","vis":["chờ (hiện tại đơn, sai thì)","đang chờ (hiện tại tiếp diễn, sai — không hợp \"for two months\")","sai — \"wait\" nội động từ không bị động","đã chờ (hiện tại hoàn thành tiếp diễn, đúng — nhấn mạnh khoảng thời gian)"]},{"q":"49. She ___ since Monday.","options":["is sick","is being sick","has been sick","has been being sick"],"answer":2,"vi":"Cô ấy đã bị ốm từ thứ Hai.","explanation":"\"since Monday\" là dấu hiệu hiện tại hoàn thành → has been sick.","note":"has been + adjective + since + mốc thời gian","vis":["ốm (hiện tại đơn, sai thì)","sai cấu trúc","đã ốm (hiện tại hoàn thành, đúng — dấu hiệu \"since\")","sai ngữ pháp"]},{"q":"50. She ___ since noon. Should we wake her up?","options":["sleeps","is sleeping","has been sleep","has been sleeping"],"answer":3,"vi":"Cô ấy đã ngủ từ trưa. Chúng ta có nên đánh thức cô ấy dậy không?","explanation":"\"since noon\" + nhấn mạnh tính liên tục → hiện tại hoàn thành tiếp diễn: has been sleeping.","note":"has been + V-ing + since + mốc thời gian","vis":["ngủ (hiện tại đơn, sai thì)","đang ngủ (hiện tại tiếp diễn, sai thì)","sai ngữ pháp — thiếu \"-ing\"","đã ngủ (hiện tại hoàn thành tiếp diễn, đúng — dấu hiệu \"since noon\")"]}],"instant":true,"instructions":"Chọn phương án đúng nhất để hoàn thành mỗi câu. Chọn xong sẽ hiện đáp án ngay.","roman":"III"},{"navLabel":"Word Forms","title":"Cho dạng đúng của từ trong ngoặc (Word Forms)","icon":"spell-check","type":"fill","questions":[{"q":"1. I was ___ furious with her.","answer":"absolutely","hint":"(ABSOLUTE)","family":["absolute (adj): tuyệt đối","absolutely (adv): hoàn toàn, cực kỳ"],"vi":"Tôi đã cực kỳ tức giận với cô ấy.","explanation":"Trạng từ bổ nghĩa cho tính từ \"furious\" → absolutely.","note":"adverb + adjective"},{"q":"2. After the hurricane the country faced the ___ task of reconstruction.","answer":"awesome","hint":"(AWE)","family":["awe (n): sự kính sợ","awesome (adj): to lớn, đáng kinh ngạc"],"vi":"Sau cơn bão, đất nước phải đối mặt với nhiệm vụ tái thiết to lớn.","explanation":"Trước danh từ \"task\" cần tính từ → awesome.","note":"adjective + noun"},{"q":"3. The airfield was bathed in the ___ glow of a searchlight.","answer":"ghostly","hint":"(GHOST)","family":["ghost (n): con ma","ghostly (adj): mờ ảo, giống ma"],"vi":"Sân bay chìm trong ánh sáng mờ ảo như ma của một chiếc đèn pha.","explanation":"Trước danh từ \"glow\" cần tính từ → ghostly.","note":"adjective + noun"},{"q":"4. There is a ___ look in her eyes.","answer":"haunted","hint":"(HAUNT)","family":["haunt (v): ám ảnh","haunted (adj): bị ám ảnh, có ma"],"vi":"Có một ánh nhìn ám ảnh trong mắt cô ấy.","explanation":"Trước danh từ \"look\" cần tính từ → haunted.","note":"adjective + noun"},{"q":"5. John Lennon gained ___ status following his death.","answer":"iconic","hint":"(ICON)","family":["icon (n): biểu tượng","iconic (adj): mang tính biểu tượng"],"vi":"John Lennon đã trở thành một biểu tượng sau khi qua đời.","explanation":"Trước danh từ \"status\" cần tính từ → iconic.","note":"adjective + noun"},{"q":"6. Their dedication and Christian charity had made them a ___ figure.","answer":"legendary","hint":"(LEGEND)","family":["legend (n): huyền thoại","legendary (adj): mang tính huyền thoại"],"vi":"Sự tận tụy và lòng bác ái của họ đã khiến họ trở thành một nhân vật huyền thoại.","explanation":"Trước danh từ \"figure\" cần tính từ → legendary.","note":"adjective + noun"},{"q":"7. The president made an ___ visit to Tokyo in March.","answer":"official","hint":"(OFFICE)","family":["office (n): văn phòng","official (adj): chính thức"],"vi":"Tổng thống đã có chuyến thăm chính thức đến Tokyo vào tháng Ba.","explanation":"Trước danh từ \"visit\" cần tính từ → official.","note":"adjective + noun"},{"q":"8. It’s quite a ___ film.","answer":"puzzling","hint":"(PUZZLE)","family":["puzzle (n): trò đố","puzzling (adj): khó hiểu, gây bối rối"],"vi":"Đó là một bộ phim khá khó hiểu.","explanation":"Trước danh từ \"film\" cần tính từ → puzzling.","note":"adjective + noun"},{"q":"9. TV ___ know what people want to watch on Sunday nights.","answer":"schedulers","hint":"(SCHEDULE)","family":["schedule (n/v): lịch trình / lên lịch","scheduler (n): người lên lịch trình"],"vi":"Những người lên lịch phát sóng TV biết khán giả muốn xem gì vào tối Chủ nhật.","explanation":"Chủ ngữ cần danh từ số nhiều chỉ người → schedulers.","note":"plural noun (chủ ngữ, chỉ người)"},{"q":"10. She was a ___ gifted technician.","answer":"uniquely","hint":"(UNIQUE)","family":["unique (adj): độc đáo","uniquely (adv): một cách độc đáo"],"vi":"Cô ấy là một kỹ thuật viên có năng khiếu độc đáo.","explanation":"Trạng từ bổ nghĩa cho tính từ \"gifted\" → uniquely.","note":"adverb + adjective"},{"q":"11. The maple tree is one of the most ___ images of Canada.","answer":"iconic","hint":"(ICON)","family":["icon (n): biểu tượng","iconic (adj): mang tính biểu tượng"],"vi":"Cây phong là một trong những hình ảnh biểu tượng nhất của Canada.","explanation":"Trước danh từ \"images\" cần tính từ → iconic.","note":"the most + adjective + noun"},{"q":"12. Visiting New Zealand, you will have a chance to see a lot of ___ landscapes.","answer":"scenic","hint":"(SCENERY)","family":["scenery (n): phong cảnh","scenic (adj): đẹp như tranh"],"vi":"Đến thăm New Zealand, bạn sẽ có cơ hội ngắm nhiều cảnh quan tuyệt đẹp.","explanation":"Trước danh từ \"landscapes\" cần tính từ → scenic.","note":"adjective + noun"},{"q":"13. English is the ___ language of many countries in the world.","answer":"official","hint":"(OFFICE)","family":["office (n): văn phòng","official (adj): chính thức"],"vi":"Tiếng Anh là ngôn ngữ chính thức của nhiều quốc gia trên thế giới.","explanation":"Trước danh từ \"language\" cần tính từ → official.","note":"adjective + noun"},{"q":"14. Scotland is very famous to the world for its rich culture as well as its ___ beauty.","answer":"natural","hint":"(NATURE)","family":["nature (n): tự nhiên","natural (adj): thuộc tự nhiên"],"vi":"Scotland nổi tiếng thế giới vì nền văn hóa phong phú cũng như vẻ đẹp tự nhiên.","explanation":"Trước danh từ \"beauty\" cần tính từ → natural.","note":"adjective + noun"},{"q":"15. The castle looks as charming as a lady with ___ beauty.","answer":"endless","hint":"(END)","family":["end (n/v): sự kết thúc / kết thúc","endless (adj): vô tận, không dứt"],"vi":"Lâu đài trông duyên dáng như một mỹ nhân với vẻ đẹp vô tận.","explanation":"Trước danh từ \"beauty\" cần tính từ → endless.","note":"adjective + noun"},{"q":"16. The Canadians are native ___ of English.","answer":"speakers","hint":"(SPEAK)","family":["speak (v): nói","speaker (n): người nói"],"vi":"Người Canada là người nói tiếng Anh bản xứ.","explanation":"Sau tính từ \"native\" cần danh từ số nhiều chỉ người → speakers.","note":"native + plural noun (chỉ người)"},{"q":"17. English is an ___ language of France.","answer":"unofficial","hint":"(OFFICIAL)","family":["official (adj): chính thức","unofficial (adj): không chính thức"],"vi":"Tiếng Anh là ngôn ngữ không chính thức của Pháp.","explanation":"Trước danh từ \"language\" cần tính từ, ngữ cảnh cho thấy cần dạng phủ định → unofficial.","note":"un- + adjective (tiền tố phủ định)"},{"q":"18. Jenny ___ loves the koala in Australia.","answer":"absolutely","hint":"(ABSOLUTE)","family":["absolute (adj): tuyệt đối","absolutely (adv): hoàn toàn, cực kỳ"],"vi":"Jenny cực kỳ yêu thích gấu túi ở Úc.","explanation":"Trạng từ bổ nghĩa cho động từ \"loves\" → absolutely.","note":"adverb + V"},{"q":"19. The violation of that company was ___ yesterday.","answer":"exposed","hint":"(EXPOSURE)","family":["exposure (n): sự phơi bày","expose (v): phơi bày, vạch trần","exposed (adj): bị phơi bày"],"vi":"Sự vi phạm của công ty đó đã bị phanh phui hôm qua.","explanation":"Sau \"was\" cần tính từ (bị động) → exposed.","note":"be + exposed (bị động)"},{"q":"20. Do storm water and the atmosphere bring non-point source ___?","answer":"pollutants","hint":"(POLLUTION)","family":["pollution (n): sự ô nhiễm","pollutant (n): chất gây ô nhiễm"],"vi":"Nước mưa và không khí có mang theo chất gây ô nhiễm nguồn phân tán không?","explanation":"Sau \"non-point source\" cần danh từ số nhiều → pollutants.","note":"noun + plural noun (danh từ ghép)"}],"instructions":"Dùng từ gợi ý trong ngoặc để điền dạng đúng vào chỗ trống.","roman":"IV"},{"navLabel":"Verb Forms","title":"Chia đúng dạng của động từ trong ngoặc","icon":"pen","type":"fill","questions":[{"q":"1. The bus for the excursion to the farm (leave) ___ at 8.30 a.m. tomorrow.","answer":"leaves","vi":"Xe buýt cho chuyến tham quan nông trại sẽ khởi hành lúc 8h30 sáng mai.","explanation":"Hiện tại đơn diễn tả lịch trình cố định trong tương lai → leaves."},{"q":"2. We (visit) ___ Edinburgh twice, but we (visit) ___ it again in 2018.","answer":"have visited / will be visiting","accepted":["have visited / will be visiting","have visited will be visiting","have visited, will be visiting"],"vi":"Chúng tôi đã đến thăm Edinburgh hai lần, nhưng chúng tôi sẽ đến thăm nơi đó lần nữa vào năm 2018.","explanation":"\"twice\" → hiện tại hoàn thành; dự định trong tương lai → tương lai tiếp diễn."},{"q":"3. The educational campaign about recycling (take place) ___ at 9.30 a.m. in front of the local stadium.","answer":"takes place","vi":"Chiến dịch giáo dục về tái chế sẽ diễn ra lúc 9h30 sáng trước sân vận động địa phương.","explanation":"Hiện tại đơn diễn tả lịch trình sự kiện → takes place."},{"q":"4. There is no need to hurry. The concert (last) ___ 2 hours and we will still have a plenty of time to enjoy it.","answer":"lasts","vi":"Không cần vội. Buổi hòa nhạc kéo dài 2 tiếng và chúng ta vẫn còn nhiều thời gian để thưởng thức.","explanation":"Hiện tại đơn diễn tả sự thật/lịch trình → lasts."},{"q":"5. Great! I (win) ___ a trip to Singapore.","answer":"have won","vi":"Tuyệt quá! Tôi đã trúng một chuyến du lịch đến Singapore.","explanation":"Hành động vừa xảy ra, ảnh hưởng đến hiện tại → have won."},{"q":"6. Remember to take an umbrella with you when travelling to London. You know it always (rain) ___ in England.","answer":"is always raining","vi":"Nhớ mang theo dù khi đi London nhé. Bạn biết là ở Anh lúc nào cũng mưa mà.","explanation":"\"always\" + hiện tại tiếp diễn diễn tả thói quen gây khó chịu/nhấn mạnh → is always raining."},{"q":"7. Mr. Brown (write) ___ three poems about his motherland.","answer":"has written","vi":"Ông Brown đã viết ba bài thơ về quê hương mình.","explanation":"Hành động lặp lại, không rõ thời điểm cụ thể → has written."},{"q":"8. Look! That man (run) ___ after the bus. He (want) ___ to catch it.","answer":"is running / wants","accepted":["is running / wants","is running wants","is running, wants"],"vi":"Nhìn kìa! Người đàn ông đó đang chạy theo xe buýt. Anh ấy muốn bắt kịp nó.","explanation":"\"Look!\" + hành động đang diễn ra → is running; \"want\" là động từ tri giác, dùng hiện tại đơn → wants."},{"q":"9. My brother (not/play) ___ any match since last month.","answer":"hasn’t played","accepted":["has not played","hasn’t played"],"vi":"Em trai tôi chưa chơi trận đấu nào kể từ tháng trước.","explanation":"\"since last month\" là dấu hiệu hiện tại hoàn thành phủ định → hasn’t played."},{"q":"10. Lucia (swim) ___ very well, but she (not run) ___ very fast.","answer":"swims / doesn’t run","accepted":["swims / does not run","swims / doesn’t run","swims does not run","swims doesn’t run","swims, does not run","swims, doesn’t run"],"vi":"Lucia bơi rất giỏi, nhưng cô ấy chạy không nhanh lắm.","explanation":"Khả năng/sự thật chung → hiện tại đơn: swims, doesn’t run."},{"q":"11. Sorry I can’t help you. I (not know) ___ where they keep their document.","answer":"don’t know","accepted":["do not know","don’t know"],"vi":"Xin lỗi tôi không thể giúp bạn. Tôi không biết họ để tài liệu ở đâu.","explanation":"\"know\" là động từ tri giác, dùng hiện tại đơn → don’t know."},{"q":"12. I can’t talk on the phone now. I (drive) ___ home.","answer":"am driving","vi":"Tôi không thể nói chuyện điện thoại bây giờ. Tôi đang lái xe về nhà.","explanation":"\"now\" là dấu hiệu hiện tại tiếp diễn → am driving."},{"q":"13. Is this the first time she (lose) ___ her job?","answer":"has lost","vi":"Đây có phải là lần đầu tiên cô ấy mất việc không?","explanation":"\"the first time\" là dấu hiệu hiện tại hoàn thành → has lost."},{"q":"14. She rarely (come) ___ to see her parents because she is very busy.","answer":"comes","vi":"Cô ấy hiếm khi đến thăm bố mẹ vì rất bận.","explanation":"\"rarely\" là dấu hiệu hiện tại đơn (thói quen) → comes."},{"q":"15. Oh, No! Somebody (take) ___ my car.","answer":"has taken","vi":"Ôi không! Ai đó đã lấy xe của tôi rồi.","explanation":"Hành động vừa xảy ra, ảnh hưởng đến hiện tại → has taken."},{"q":"16. Mark (have) ___ lunch with his friends in a Chinese restaurant.","answer":"is having","vi":"Mark đang ăn trưa cùng bạn bè ở một nhà hàng Trung Hoa.","explanation":"Hành động đang diễn ra (have ở đây mang nghĩa \"ăn\", không phải động từ tri giác) → is having."},{"q":"17. Carlos got his bike last June. So, he (have) ___ it for 6 months.","answer":"has had","vi":"Carlos có chiếc xe đạp từ tháng Sáu năm ngoái. Vì vậy, anh ấy đã có nó được 6 tháng.","explanation":"\"for 6 months\" (khoảng thời gian, tính đến hiện tại) → has had."},{"q":"18. All members in my family often (have) ___ breakfast late.","answer":"have","vi":"Mọi thành viên trong gia đình tôi thường ăn sáng muộn.","explanation":"\"often\" là dấu hiệu hiện tại đơn, chủ ngữ số nhiều → have."},{"q":"19. They (clean) ___ their car. It looks new again.","answer":"have cleaned","vi":"Họ đã rửa xe. Nó trông mới trở lại.","explanation":"Hành động vừa xảy ra, kết quả còn ảnh hưởng đến hiện tại → have cleaned."},{"q":"20. She (lose) ___ the keys, so she can’t open the door.","answer":"has lost","vi":"Cô ấy đã làm mất chìa khóa, nên không thể mở cửa.","explanation":"Hành động đã xảy ra, ảnh hưởng đến hiện tại → has lost."}],"instructions":"Đọc kỹ từng câu và chia đúng dạng của động từ trong ngoặc (các thì hiện tại đã học).","roman":"V"},{"navLabel":"Sửa lỗi","title":"Tìm lỗi sai (A, B, C hoặc D)","icon":"wrench","type":"mcq","questions":[{"q":"1. <u>How much</u> <u>do you visit</u> <u>your friends</u> <u>in New York?</u>","options":["How much","do you visit","your friends","in New York?"],"answer":0,"vi":"Bạn có thường xuyên đến thăm bạn bè ở New York không?","explanation":"Hỏi tần suất → How much phải sửa thành How often.","note":"How often + do/does + S + V?","vis":["bao nhiêu (tần suất — sai, cần \"How often\")","bạn có ghé thăm không","bạn bè của bạn","ở New York?"]},{"q":"2. <u>Janet doesn’t catches</u> <u>the bus</u> <u>at 8</u> <u>in the morning</u>.","options":["Janet doesn’t catches","the bus","at 8","in the morning"],"answer":0,"vi":"Janet không bắt xe buýt lúc 8 giờ sáng.","explanation":"\"doesn’t\" đã chia động từ, theo sau cần V nguyên mẫu → catches phải sửa thành catch.","note":"doesn’t + V-inf (không chia thêm -s)","vis":["Janet không bắt (sai chia động từ)","xe buýt","lúc 8 giờ","vào buổi sáng"]},{"q":"3. <u>He usually</u> <u>has</u> <u>my meetings</u> <u>on 10 am.</u>","options":["He usually","has","my meetings on","10 am."],"answer":3,"vi":"Anh ấy thường có cuộc họp của tôi lúc 10 giờ sáng.","explanation":"Trước giờ cụ thể dùng giới từ \"at\" → on phải sửa thành at.","note":"at + giờ cụ thể","vis":["anh ấy thường","có","cuộc họp của tôi vào (sai giới từ)","10 giờ sáng."]},{"q":"4. <u>Where do you</u> <u>usually</u> <u>held meetings</u> <u>in the morning?</u>","options":["Where do you","usually","held meetings","in the morning?"],"answer":2,"vi":"Bạn thường tổ chức cuộc họp vào buổi sáng ở đâu?","explanation":"Sau trợ động từ \"do\" cần V nguyên mẫu → held phải sửa thành hold.","note":"do/does + S + V-inf (không chia)","vis":["bạn ở đâu","thường","tổ chức cuộc họp (sai chia động từ)","vào buổi sáng?"]},{"q":"5. <u>I don’t enjoy</u> <u>to eat</u> <u>breakfast before</u> <u>seven in the morning</u>.","options":["I don’t enjoy","to eat","breakfast before","seven in the morning"],"answer":1,"vi":"Tôi không thích ăn sáng trước 7 giờ sáng.","explanation":"\"enjoy\" theo sau bởi V-ing, không phải \"to V\" → to eat phải sửa thành eating.","note":"enjoy + V-ing","vis":["tôi không thích","ăn (sai — enjoy + V-ing)","bữa sáng trước","7 giờ sáng"]},{"q":"6. <u>Please show up on time</u> <u>because the ceremony</u> <u>will start at 6.45 p.m.</u> <u>with a number of distinguished guests</u>.","options":["Please show up on time","because the ceremony","will start at 6.45 p.m.","with a number of distinguished guests"],"answer":2,"vi":"Xin hãy đến đúng giờ vì buổi lễ sẽ bắt đầu lúc 6h45 tối với sự tham dự của nhiều vị khách danh dự.","explanation":"Hiện tại đơn diễn tả lịch trình sự kiện → will start phải sửa thành starts.","note":"S + V-s/es (lịch trình sự kiện)","vis":["xin hãy đến đúng giờ","vì buổi lễ","sẽ bắt đầu lúc 6h45 tối (sai — cần hiện tại đơn diễn tả lịch trình)","cùng với nhiều vị khách danh dự"]},{"q":"7. <u>When I reached</u> <u>the peak of the mountain,</u> <u>I could see how</u> <u>beauty everything was</u>.","options":["When I reached","the peak of the mountain,","I could see how","beauty everything was"],"answer":3,"vi":"Khi tôi lên đến đỉnh núi, tôi có thể thấy mọi thứ đẹp đẽ như thế nào.","explanation":"Sau \"how\" cần tính từ, không phải danh từ → beauty phải sửa thành beautiful.","note":"how + adjective + S + V","vis":["khi tôi lên đến","đỉnh núi,","tôi có thể thấy","mọi thứ đẹp đẽ (sai — cần tính từ \"beautiful\")"]},{"q":"8. <u>The US is among</u> <u>the most developed</u> <u>speaking English</u> <u>countries in the world</u>.","options":["The US is among","the most developed","speaking English","countries in the world"],"answer":2,"vi":"Mỹ là một trong những nước nói tiếng Anh phát triển nhất thế giới.","explanation":"Thứ tự đúng là \"English-speaking\" (tính từ ghép) → speaking English phải sửa thành English speaking.","note":"English-speaking + countries (tính từ ghép)","vis":["Mỹ là một trong","những nước phát triển nhất","nói tiếng Anh (sai thứ tự — cần \"English-speaking\")","các nước trên thế giới"]},{"q":"9. <u>When go travelling,</u> <u>I like to explore</u> <u>the typical activities</u> <u>of local people the most</u>.","options":["When go travelling,","I like to explore","the typical activities","of local people the most"],"answer":0,"vi":"Khi đi du lịch, tôi thích khám phá những hoạt động đặc trưng của người dân địa phương nhất.","explanation":"Cấu trúc mệnh đề rút gọn cần \"When travelling\" hoặc \"When going travelling\" → When go travelling phải sửa lại.","note":"When + V-ing (mệnh đề rút gọn)","vis":["khi đi du lịch, (sai cấu trúc mệnh đề rút gọn)","tôi thích khám phá","những hoạt động đặc trưng","của người dân địa phương nhất"]},{"q":"10. <u>I visited</u> <u>6 foreign countries so far,</u> <u>but only 2 out of them</u> <u>are English-speaking countries</u>.","options":["I visited","6 foreign countries so far,","but only 2 out of them","are English-speaking countries"],"answer":0,"vi":"Tôi đã đến thăm 6 nước ngoài cho đến nay, nhưng chỉ 2 trong số đó là nước nói tiếng Anh.","explanation":"\"so far\" là dấu hiệu hiện tại hoàn thành → I visited phải sửa thành I have visited.","note":"have + P2 (dấu hiệu: so far)","vis":["tôi đã đến thăm (sai thì — cần hiện tại hoàn thành)","6 nước ngoài cho đến nay,","nhưng chỉ 2 trong số đó","là nước nói tiếng Anh"]},{"q":"11. <u>Peter gets used to</u> <u>do</u> <u>his homeworks</u> <u>in the evening</u>.","options":["Peter gets used to","do","his homeworks","in the evening"],"answer":2,"vi":"Peter đã quen với việc làm bài tập về nhà vào buổi tối.","explanation":"\"homework\" là danh từ không đếm được, không có dạng số nhiều → homeworks phải sửa thành homework.","note":"homework (danh từ không đếm được)","vis":["Peter đã quen với việc","làm","bài tập về nhà của cậu ấy (sai — \"homework\" không đếm được)","vào buổi tối"]},{"q":"12. <u>They aren’t go</u> <u>to bed</u> <u>at 9</u> <u>o’clock</u>.","options":["They aren’t go","to bed","at 9","o’clock"],"answer":0,"vi":"Họ không đi ngủ lúc 9 giờ.","explanation":"Động từ thường phủ định dùng \"don’t/doesn’t\", không dùng \"be\" → aren’t go phải sửa thành don’t go.","note":"don’t/doesn’t + V-inf (phủ định động từ thường)","vis":["họ không đi (sai — động từ thường dùng don't/doesn't)","ngủ","lúc 9","giờ"]},{"q":"13. <u>I don’t have</u> <u>some apples</u> <u>but I have</u> <u>some bananas</u>.","options":["I don’t have","some apples","but I have","some bananas"],"answer":1,"vi":"Tôi không có táo nào nhưng tôi có vài quả chuối.","explanation":"Trong câu phủ định dùng \"any\", không dùng \"some\" → some apples phải sửa thành any apples.","note":"phủ định + any (không dùng some)","vis":["tôi không có","vài quả táo (sai — câu phủ định dùng \"any\")","nhưng tôi có","vài quả chuối"]},{"q":"14. <u>That’s my sister</u> <u>over there.</u> <u>She stands</u> <u>next to the window</u>.","options":["That’s my sister","over there.","She stands","next to the window"],"answer":2,"vi":"Đó là chị tôi ở đằng kia. Cô ấy đang đứng cạnh cửa sổ.","explanation":"Hành động đang diễn ra tại thời điểm nói → She stands phải sửa thành She is standing.","note":"S + is + V-ing (hành động đang diễn ra)","vis":["đó là chị tôi","ở đằng kia.","cô ấy đứng (sai — cần hiện tại tiếp diễn)","cạnh cửa sổ"]},{"q":"15. <u>He’s waiting</u> <u>to the bus</u> <u>at the</u> <u>moment</u>.","options":["He’s waiting","to the bus","at the","moment"],"answer":1,"vi":"Anh ấy đang chờ xe buýt lúc này.","explanation":"\"wait for\" = chờ đợi (ai/cái gì) → to the bus phải sửa thành for the bus.","note":"wait for + N","vis":["anh ấy đang chờ","xe buýt (sai giới từ — cần \"for\")","lúc","này"]},{"q":"16. <u>My father</u> <u>never</u> <u>have lunch at home</u> <u>last year</u>.","options":["My father","never","have lunch at home","last year"],"answer":2,"vi":"Bố tôi năm ngoái chưa bao giờ ăn trưa ở nhà.","explanation":"\"last year\" là dấu hiệu quá khứ đơn → have phải sửa thành had.","note":"thì quá khứ đơn (dấu hiệu: last year)","vis":["bố tôi","chưa bao giờ","ăn trưa ở nhà (sai thì — cần quá khứ đơn \"had\")","năm ngoái"]},{"q":"17. <u>We need</u> <u>eight hundred</u> <u>gram</u> <u>of beef</u>.","options":["We need","eight hundred","gram","of beef"],"answer":2,"vi":"Chúng tôi cần 800 gam thịt bò.","explanation":"Số đếm lớn hơn 1 cần danh từ số nhiều → gram phải sửa thành grams.","note":"số đếm > 1 + danh từ số nhiều","vis":["chúng tôi cần","tám trăm","gam (sai — số nhiều cần \"grams\")","thịt bò"]},{"q":"18. <u>There used to have</u> <u>a temple old</u> <u>near our</u> <u>school</u>.","options":["There used to have","a temple old","near our","school"],"answer":1,"vi":"Ngày xưa từng có một ngôi đền cổ gần trường chúng tôi.","explanation":"Tính từ đứng trước danh từ → a temple old phải sửa thành an old temple.","note":"a/an + adjective + noun","vis":["ngày xưa từng có","một ngôi đền cổ (sai trật tự tính từ)","gần","trường chúng tôi"]},{"q":"19. <u>How long are you</u> <u>going to</u> <u>staying</u> <u>in Vietnam?</u>","options":["How long are you","going to","staying","in Vietnam?"],"answer":2,"vi":"Bạn định ở Việt Nam bao lâu?","explanation":"\"be going to\" theo sau bởi V nguyên mẫu → staying phải sửa thành stay.","note":"be going to + V-inf","vis":["bạn định","sẽ","ở (sai — \"be going to\" + V nguyên mẫu)","tại Việt Nam bao lâu?"]},{"q":"20. <u>Would you like</u> <u>any sugar?</u> <u>-Yes</u> <u>please</u>.","options":["Would you like","any sugar?","-Yes","please"],"answer":1,"vi":"Bạn có muốn thêm ít đường không? - Vâng, cảm ơn.","explanation":"Trong câu mời/đề nghị dùng \"some\", không dùng \"any\" → any sugar phải sửa thành some sugar.","note":"lời mời/đề nghị + some (không dùng any)","vis":["bạn có muốn","chút đường không? (sai — câu mời dùng \"some\")","-vâng","làm ơn"]}],"instant":true,"instructions":"Mỗi câu có 4 phần gạch chân A, B, C, D. Chọn phần chứa lỗi sai. Chọn xong sẽ hiện đúng/sai, đáp án và công thức ngay. Lưu ý: tài liệu gốc chỉ đánh dấu 4 vị trí A/B/C/D bằng nhãn dưới câu (không gạch chân trực tiếp); các cụm A/B/C/D được chia lại hợp lý dựa theo đáp án lỗi sai cho sẵn (RECONSTRUCTED).","roman":"VI"},{"navLabel":"Đọc hiểu 1","title":"Đọc hiểu – City of London","icon":"book-open","type":"mcq","questions":[{"q":"1. London is the (1) ___ city in Europe.","options":["largest","larger","large","largely"],"answer":0,"vi":"London là thành phố lớn nhất châu Âu.","explanation":"So sánh nhất → largest.","vis":["lớn nhất (đúng)","lớn hơn (sai — so sánh hơn không phù hợp)","lớn (sai — tính từ nguyên cấp)","phần lớn (sai — trạng từ)"]},{"q":"2. …located astride the famous (2) ___ of Thames.","options":["mountain","river","bridge","road"],"answer":1,"vi":"…nằm bên dòng sông Thames nổi tiếng.","explanation":"\"River Thames\" = sông Thames.","vis":["núi (sai nghĩa)","sông (đúng)","cầu (sai nghĩa)","đường (sai nghĩa)"]},{"q":"3. This is the home for (3) ___ of the international organizations.","options":["little","a little","more","most"],"answer":3,"vi":"Đây là nơi đặt trụ sở của phần lớn các tổ chức quốc tế.","explanation":"\"most of\" = phần lớn.","vis":["ít (sai nghĩa)","một ít (sai nghĩa)","nhiều hơn (sai — không hợp cấu trúc)","hầu hết (đúng — home for most of)"]},{"q":"4. The city of London has its own police (4) ___, called City of London police.","options":["team","group","force","strength"],"answer":2,"vi":"Thành phố London có lực lượng cảnh sát riêng, gọi là cảnh sát City of London.","explanation":"\"police force\" = lực lượng cảnh sát.","vis":["đội (sai nghĩa)","nhóm (sai nghĩa)","lực lượng (đúng — police force)","sức mạnh (sai nghĩa)"]},{"q":"5. London is considered as both business (5) ___ tourist destination.","options":["or","with","and","of"],"answer":2,"vi":"London được coi là điểm đến cả về kinh doanh lẫn du lịch.","explanation":"\"both...and...\" = cả...và...","vis":["hoặc (sai — cần \"both…and\")","với (sai)","và (đúng — both…and)","của (sai)"]},{"q":"6. …(6) ___ by millions of people annually.","options":["visit","visited","visiting","to visit"],"answer":1,"vi":"…được hàng triệu người ghé thăm mỗi năm.","explanation":"Bị động: is + visited.","vis":["thăm (nguyên mẫu, sai)","đã thăm (quá khứ phân từ, đúng — bị động)","đang thăm (V-ing, sai)","để thăm (to-V, sai)"]},{"q":"7. The Heathrow Airport…considered as the busiest airport (7) ___ the world.","options":["in","at","on","till"],"answer":0,"vi":"Sân bay Heathrow…được coi là sân bay bận rộn nhất thế giới.","explanation":"\"the busiest...in the world\" = bận rộn nhất thế giới.","vis":["trong (đúng — in the world)","tại (sai)","trên (sai)","cho đến (sai)"]},{"q":"8. …relax on London parks and (8) ___ more places for bed and dine.","options":["lot","a lot","much","many"],"answer":3,"vi":"…thư giãn tại các công viên London và nhiều nơi khác để nghỉ ngơi, ăn uống.","explanation":"Trước danh từ đếm được số nhiều \"places\" → many.","vis":["nhiều (thiếu mạo từ, sai)","nhiều (sai — không đi trực tiếp với danh từ số nhiều)","nhiều (dùng cho danh từ không đếm được, sai)","nhiều (dùng cho danh từ số nhiều, đúng)"]},{"q":"9. London is considered an expensive city…and (9) ___ though its home for many foreign migrants…","options":["eve","event","ever","even"],"answer":3,"vi":"London được coi là thành phố đắt đỏ…và mặc dù là nơi ở của nhiều người nhập cư…","explanation":"\"even though\" = mặc dù.","vis":["sai chính tả/nghĩa","sự kiện (sai nghĩa)","từng (sai nghĩa)","thậm chí (đúng — even though)"]},{"q":"10. …still keeping (10) ___ traditional heritage and surrounding.","options":["it","its","they","their"],"answer":1,"vi":"…vẫn giữ được di sản truyền thống và cảnh quan xung quanh của mình.","explanation":"Tính từ sở hữu chỉ London (số ít) → its.","vis":["nó (đại từ, sai)","của nó (sở hữu, đúng)","họ (đại từ, sai)","của họ (sở hữu, sai)"]}],"instant":true,"instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","passage":{"title":"The City of London","html":"The City of London, the capital of United Kingdom is a year-round tourist destination. London is the <b>(1)</b> ___ city in Europe and located astride the famous <b>(2)</b> ___ of Thames. This is the home for <b>(3)</b> ___ of the international organizations and the city is headed by the Lord Mayor of London. The city of London has its own police <b>(4)</b> ___, called City of London police.<br><br>London is considered as both business <b>(5)</b> ___ tourist destination and <b>(6)</b> ___ by millions of people annually. The Heathrow Airport, London considered as the busiest airport <b>(7)</b> ___ the world. City of London provides many attractions for visitors. You can visit London: museums, see Royal palaces and activities, relax on London parks and <b>(8)</b> ___ more places for bed and dine. London is considered an expensive city in the world and <b>(9)</b> ___ though its home for many foreign migrants, still keeping <b>(10)</b> ___ traditional heritage and surrounding.","vi":"Thành phố London, thủ đô của Vương quốc Anh, là điểm đến du lịch quanh năm. London là thành phố <b>(1)</b> ___ lớn nhất châu Âu và nằm bên dòng <b>(2)</b> ___ sông Thames nổi tiếng. Đây là nơi đặt trụ sở của <b>(3)</b> ___ nhiều tổ chức quốc tế và thành phố được đứng đầu bởi Thị trưởng London. Thành phố London có <b>(4)</b> ___ lực lượng cảnh sát riêng, gọi là cảnh sát City of London.<br><br>London được coi là điểm đến cả về kinh doanh <b>(5)</b> ___ lẫn du lịch và được hàng triệu người <b>(6)</b> ___ ghé thăm mỗi năm. Sân bay Heathrow của London được coi là sân bay bận rộn nhất <b>(7)</b> ___ thế giới. Thành phố London mang đến nhiều điểm tham quan cho du khách. Bạn có thể thăm các bảo tàng London, xem các cung điện hoàng gia, thư giãn tại công viên London và <b>(8)</b> ___ nhiều nơi khác để nghỉ ngơi, ăn uống. London được coi là một thành phố đắt đỏ trên thế giới và <b>(9)</b> ___ dù là nơi ở của nhiều người nhập cư nước ngoài, vẫn giữ được di sản truyền thống và cảnh quan xung quanh <b>(10)</b> ___ của mình."},"roman":"VII"},{"navLabel":"Đọc hiểu 2","title":"Đọc hiểu – Temple Square","icon":"book-open","type":"mcq","questions":[{"q":"1. Historic Temple Square…is one of Utah’s number one tourist (1) ___.","options":["attract","attractions","attracting","attractor"],"answer":1,"vi":"Temple Square lịch sử…là một trong những điểm thu hút khách du lịch hàng đầu của Utah.","explanation":"Sau tính từ sở hữu cần danh từ số nhiều → attractions.","vis":["thu hút (động từ, sai)","điểm thu hút (danh từ số nhiều, đúng)","đang thu hút (V-ing, sai)","sai — không phải từ tồn tại"]},{"q":"2. Temple Square is (2) ___ every day of the year from 9 a.m. - 9 p.m.","options":["open","important","necessary","close"],"answer":0,"vi":"Temple Square mở cửa mỗi ngày trong năm từ 9h sáng đến 9h tối.","explanation":"\"be open\" = mở cửa.","vis":["mở cửa (đúng)","quan trọng (sai nghĩa)","cần thiết (sai nghĩa)","đóng cửa (sai nghĩa — trái nghĩa)"]},{"q":"3. …hundreds of volunteers and missionaries (3) ___ will make your experience more enjoyable.","options":["where","which","whom","who"],"answer":3,"vi":"…hàng trăm tình nguyện viên và người truyền giáo sẽ làm cho trải nghiệm của bạn thú vị hơn.","explanation":"Đại từ quan hệ chỉ người làm chủ ngữ → who.","vis":["nơi mà (sai — chỉ nơi chốn)","cái mà (sai — chỉ vật)","người mà (tân ngữ, sai vị trí)","người mà (chủ ngữ, đúng)"]},{"q":"4. …you will be (4) ___ to see, feel, taste, touch and experience Mormon culture.","options":["enable","disable","able","ability"],"answer":2,"vi":"…bạn sẽ có thể xem, cảm nhận, nếm, chạm và trải nghiệm văn hóa Mormon.","explanation":"\"be able to\" = có thể.","vis":["cho phép (động từ, sai)","vô hiệu hóa (động từ, sai)","có thể (tính từ, đúng — be able to)","khả năng (danh từ, sai)"]},{"q":"5. Guided tours and presentations feature historic (5) ___, interactive exhibits, art displays…","options":["areas","categories","items","sites"],"answer":3,"vi":"Các tour có hướng dẫn viên và buổi thuyết trình giới thiệu các địa điểm lịch sử, triển lãm tương tác, trưng bày nghệ thuật…","explanation":"\"historic sites\" = địa điểm lịch sử.","vis":["khu vực (sai nghĩa)","danh mục (sai nghĩa)","vật phẩm (sai nghĩa)","địa điểm (đúng — historic sites)"]},{"q":"6. …the largest genealogy library of its (6) ___ in the world.","options":["size","figure","kind","form"],"answer":2,"vi":"…thư viện phả hệ lớn nhất cùng loại trên thế giới.","explanation":"\"of its kind\" = cùng loại.","vis":["kích thước (sai nghĩa)","con số, hình dạng (sai nghĩa)","loại (đúng — \"of its kind\" = cùng loại)","hình thức (sai nghĩa)"]},{"q":"7. Enjoy all of this in the (7) ___ of downtown Salt Lake City.","options":["heart","head","chest","shoulder"],"answer":0,"vi":"Thưởng thức tất cả những điều này ngay trung tâm thành phố Salt Lake City.","explanation":"\"in the heart of\" = ngay trung tâm của.","vis":["trung tâm (đúng — in the heart of)","đầu (sai nghĩa)","ngực (sai nghĩa)","vai (sai nghĩa)"]},{"q":"8. Tours are available in (8) ___ than 30 languages at some locations at no charge.","options":["most","more","much","many"],"answer":1,"vi":"Các tour có sẵn bằng hơn 30 ngôn ngữ tại một số địa điểm, miễn phí.","explanation":"\"more than 30 languages\" = hơn 30 ngôn ngữ.","vis":["hầu hết (sai — không đi với \"than\")","nhiều hơn (đúng — more than 30)","nhiều (không đếm được, sai)","nhiều (sai — không đi với \"than\" theo cách này)"]},{"q":"9. Restaurants and catering facilities are available to (9) ___ enhance your visit as well.","options":["carry","bring","want","help"],"answer":3,"vi":"Nhà hàng và dịch vụ ăn uống cũng có sẵn để giúp chuyến thăm của bạn thêm trọn vẹn.","explanation":"\"help enhance\" = giúp làm tăng thêm.","vis":["mang (sai nghĩa)","mang đến (sai nghĩa)","muốn (sai nghĩa)","giúp (đúng — help enhance)"]},{"q":"10. Whether you are visiting for the first time (10) ___ coming back to enjoy Temple Square again…","options":["nor","or","even","if"],"answer":1,"vi":"Dù bạn đến thăm lần đầu hay quay lại để tận hưởng Temple Square một lần nữa…","explanation":"\"whether...or...\" = dù...hay...","vis":["cũng không (sai — không đi với \"whether\")","hoặc (đúng — whether…or)","thậm chí (sai nghĩa)","nếu (sai nghĩa)"]}],"instant":true,"instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","passage":{"title":"Temple Square, Salt Lake City","html":"Historic Temple Square, in Downtown Salt Lake City, is one of Utah's number one tourist <b>(1)</b> ___ and world headquarters of The Church of Jesus Christ of Latter-day Saints. Temple Square is <b>(2)</b> ___ every day of the year from 9 a.m. - 9 p.m. with the help of hundreds of volunteers and missionaries <b>(3)</b> ___ will make your experience more enjoyable. On your visit to the 35 acres of Temple Square you will be <b>(4)</b> ___ to see, feel, taste, touch and experience Mormon culture and its pioneer heritage.<br><br>Guided tours and presentations feature historic <b>(5)</b> ___, interactive exhibits, art displays, 70-mm films, parks and gardens. Also featured are the largest genealogy library of its <b>(6)</b> ___ in the world and the renowned Mormon Tabernacle Choir and Orchestra at Temple Square. Enjoy all of this in the <b>(7)</b> ___ of downtown Salt Lake City. Tours are available in <b>(8)</b> ___ than 30 languages at some locations at no charge to you. Restaurants and catering facilities are available to <b>(9)</b> ___ enhance your visit as well. Whether you are visiting for the first time <b>(10)</b> ___ coming back to enjoy Temple Square again we welcome you!","vi":"Temple Square lịch sử, ở trung tâm thành phố Salt Lake City, là một trong những <b>(1)</b> ___ điểm du lịch hàng đầu của bang Utah và là trụ sở chính của Giáo hội Các Thánh hữu Ngày sau của Chúa Giê Su Ky Tô. Temple Square <b>(2)</b> ___ mở cửa mỗi ngày trong năm từ 9h sáng đến 9h tối với sự giúp đỡ của hàng trăm tình nguyện viên và người truyền giáo, <b>(3)</b> ___ những người sẽ làm cho trải nghiệm của bạn thú vị hơn. Khi ghé thăm khuôn viên rộng 35 mẫu Anh của Temple Square, bạn sẽ <b>(4)</b> ___ có thể xem, cảm nhận, nếm, chạm và trải nghiệm văn hóa Mormon cùng di sản của những người tiên phong.<br><br>Các tour có hướng dẫn viên và buổi thuyết trình giới thiệu <b>(5)</b> ___ các địa điểm lịch sử, triển lãm tương tác, trưng bày nghệ thuật, phim 70mm, công viên và vườn hoa. Ngoài ra còn có thư viện phả hệ lớn nhất cùng <b>(6)</b> ___ loại trên thế giới và dàn hợp xướng, dàn nhạc Mormon Tabernacle nổi tiếng tại Temple Square. Hãy tận hưởng tất cả những điều này ngay <b>(7)</b> ___ trung tâm thành phố Salt Lake City. Các tour có sẵn bằng <b>(8)</b> ___ hơn 30 ngôn ngữ tại một số địa điểm, hoàn toàn miễn phí. Nhà hàng và dịch vụ ăn uống cũng có sẵn để <b>(9)</b> ___ giúp chuyến thăm của bạn thêm trọn vẹn. Dù bạn đến thăm lần đầu <b>(10)</b> ___ hay quay lại để tận hưởng Temple Square một lần nữa, chúng tôi luôn chào đón bạn!"},"roman":"VIII"},{"navLabel":"Đọc hiểu 3","title":"Đọc hiểu – Tiếng Anh, ngôn ngữ của thế giới","icon":"book-open","type":"fill","questions":[{"q":"1. Though I have experienced great success and enjoyment from languages other ___ English, whether we like it or not, English is the useful language in the world.","answer":"than","vi":"Mặc dù tôi đã trải nghiệm nhiều thành công và niềm vui từ những ngôn ngữ khác ngoài tiếng Anh, dù muốn hay không, tiếng Anh vẫn là ngôn ngữ hữu ích nhất thế giới.","explanation":"\"other than\" = ngoài, khác với."},{"q":"2. …English is the ___ useful language in the world.","answer":"most","vi":"…tiếng Anh là ngôn ngữ hữu ích nhất thế giới.","explanation":"So sánh nhất → most."},{"q":"3. …wherever you go in the world, the ___ language is English.","answer":"common","vi":"…dù bạn đi đâu trên thế giới, ngôn ngữ chung vẫn là tiếng Anh.","explanation":"\"common language\" = ngôn ngữ chung."},{"q":"4. This is true even if you ___ in a country where…","answer":"live","vi":"Điều này đúng ngay cả khi bạn sống ở một quốc gia mà…","explanation":"Sau \"you\" cần động từ nguyên mẫu → live."},{"q":"5. …where ___ is not an English-speaking person for many thousands of kilometers in any direction.","answer":"there","vi":"…nơi không có người nói tiếng Anh nào trong bán kính hàng ngàn cây số theo bất kỳ hướng nào.","explanation":"\"there is not\" = không có."},{"q":"6. …even if you live in an isolated ___, it is very easy for you to connect with people…","answer":"place","vi":"…dù bạn sống ở một nơi biệt lập, bạn vẫn rất dễ dàng kết nối với mọi người…","explanation":"\"an isolated place\" = một nơi biệt lập."},{"q":"7. …it is very easy for you to ___ with people, movies, music, culture…","answer":"connect","vi":"…bạn rất dễ dàng kết nối với con người, phim ảnh, âm nhạc, văn hóa…","explanation":"\"connect with\" = kết nối với."},{"q":"8. …or whatever you want ___ the Internet.","answer":"via","accepted":["through","via"],"vi":"…hoặc bất cứ điều gì bạn muốn thông qua Internet.","explanation":"\"via/through the Internet\" = thông qua Internet."},{"q":"9. You can of course do this in whatever language you are interested ___,","answer":"in","vi":"Tất nhiên bạn có thể làm điều này bằng bất kỳ ngôn ngữ nào bạn quan tâm,","explanation":"\"be interested in\" = quan tâm đến."},{"q":"10. …but English is the most useful ___ more people speak it.","answer":"because","accepted":["because","since"],"vi":"…nhưng tiếng Anh là hữu ích nhất vì có nhiều người nói nó.","explanation":"Nêu lý do → because/since."}],"instant":true,"instructions":"Đọc đoạn văn và điền một từ thích hợp vào mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay khi bạn gõ.","passage":{"title":"English – The World’s Language","html":"Though I have experienced great success and enjoyment from languages other <b>(1)</b> ___ English, whether we like it or not, English is the <b>(2)</b> ___ useful language in the world. We may wish that Russian, French or Chinese were the international language, but the real situation is that wherever you go in the world, the <b>(3)</b> ___ language is English. This is true even if you <b>(4)</b> ___ in a country where <b>(5)</b> ___ is not an English-speaking person for many thousands of kilometers in any direction. Today we live in a very connected world, so that even if you live in an isolated <b>(6)</b> ___, it is very easy for you to <b>(7)</b> ___ with people, movies, music, culture, or whatever you want <b>(8)</b> ___ the Internet. You can of course do this in whatever language you are interested <b>(9)</b> ___, but English is the most useful <b>(10)</b> ___ more people speak it.","vi":"Mặc dù tôi đã trải nghiệm nhiều thành công và niềm vui từ những ngôn ngữ khác <b>(1)</b> ___ ngoài tiếng Anh, dù muốn hay không, tiếng Anh vẫn là ngôn ngữ <b>(2)</b> ___ hữu ích nhất thế giới. Chúng ta có thể ước rằng tiếng Nga, Pháp hay Trung là ngôn ngữ quốc tế, nhưng thực tế là dù bạn đi đâu trên thế giới, ngôn ngữ <b>(3)</b> ___ chung vẫn là tiếng Anh. Điều này đúng ngay cả khi bạn <b>(4)</b> ___ sống ở một quốc gia <b>(5)</b> ___ không có người nói tiếng Anh nào trong bán kính hàng ngàn cây số theo bất kỳ hướng nào. Ngày nay chúng ta sống trong một thế giới kết nối chặt chẽ, nên dù bạn sống ở một nơi <b>(6)</b> ___ biệt lập, bạn vẫn rất dễ dàng <b>(7)</b> ___ kết nối với con người, phim ảnh, âm nhạc, văn hóa, hoặc bất cứ điều gì bạn muốn <b>(8)</b> ___ thông qua Internet. Tất nhiên bạn có thể làm điều này bằng bất kỳ ngôn ngữ nào bạn quan tâm <b>(9)</b> ___, nhưng tiếng Anh là hữu ích nhất <b>(10)</b> ___ vì có nhiều người nói nó."},"roman":"IX"},{"navLabel":"Đọc hiểu 4","title":"Đọc hiểu – Living in Scotland (Đúng/Sai)","icon":"book-open","type":"mcq","questions":[{"q":"1. Scottish people inhabit on over 1/6 of its all islands.","options":["True","False"],"answer":0,"vi":"Người Scotland sinh sống trên hơn 1/6 tổng số đảo của nước này.","explanation":"Bài đọc nói có 790 đảo, 130 đảo có người ở; 130/790 ≈ 1/6 → Đúng (True)."},{"q":"2. Scotland’s population is over 1/10 of the whole UK population.","options":["True","False"],"answer":1,"vi":"Dân số Scotland chiếm hơn 1/10 tổng dân số Vương quốc Anh.","explanation":"Bài đọc nói dân số Scotland chiếm khoảng 8.5% (ít hơn 1/10 = 10%) → Sai (False)."},{"q":"3. People in Scotland prefer living in other areas to big cities.","options":["True","False"],"answer":0,"vi":"Người dân Scotland thích sống ở những khu vực khác hơn là ở các thành phố lớn.","explanation":"Bài đọc nói chỉ gần một nửa dân số sống ở Central Belt (nơi có 2 thành phố lớn), nghĩa là hơn một nửa sống ở nơi khác → Đúng (True)."},{"q":"4. There are 2 common months for Edinburgh Festival.","options":["True","False"],"answer":0,"vi":"Có 2 tháng phổ biến cho Lễ hội Edinburgh.","explanation":"Bài đọc nói nhiều lễ hội con diễn ra vào tháng 8 và tháng 9 → Đúng (True)."},{"q":"5. There won’t be any special events exclusively for kids in this Festival.","options":["True","False"],"answer":1,"vi":"Sẽ không có sự kiện đặc biệt nào dành riêng cho trẻ em trong lễ hội này.","explanation":"Bài đọc có nhắc đến \"the Children’s Festival\" (Lễ hội Thiếu nhi) → Sai (False)."}],"instant":true,"instructions":"Đọc đoạn văn và chọn True hoặc False cho mỗi câu. Chọn xong sẽ hiện đúng/sai ngay.","passage":{"title":"Living in Scotland","html":"Scotland is the UK's most northern country and has around 790 islands off its coasts – 130 of which have people living on them. Scotland is well known for its stunning landscapes, beautiful beaches and lochs, which are fresh water lakes. There are over 600 square miles of lochs in Scotland including the most famous one, Loch Ness.<br><br>It has a population of just over five million people which is about 8.5 per cent of the whole UK population. Over 2 million of these live in Glasgow and Edinburgh, and almost half of Scotland's population live in the Central Belt, where both the largest city (Glasgow), and the capital city (Edinburgh) are located.<br><br>Scotland also hosts one of the biggest arts festivals in the world. This is commonly known as the Edinburgh Festival but is actually made up of a number of different festivals which happen at different times of the year, though many do take place in August and September. Many people have heard of the Fringe Festival, but there are also the International Festival, the Film Festival, the Children's Festival and the Edinburgh Mela which is an intercultural festival.","vi":"Scotland là quốc gia cực bắc nhất của Vương quốc Anh và có khoảng 790 hòn đảo ngoài khơi bờ biển – 130 trong số đó có người sinh sống. Scotland nổi tiếng với cảnh quan tuyệt đẹp, những bãi biển xinh đẹp và các hồ nước ngọt (loch). Có hơn 600 dặm vuông diện tích hồ ở Scotland, bao gồm hồ nổi tiếng nhất, Loch Ness.<br><br>Scotland có dân số hơn năm triệu người một chút, chiếm khoảng 8.5% tổng dân số Vương quốc Anh. Hơn 2 triệu trong số đó sống ở Glasgow và Edinburgh, và gần một nửa dân số Scotland sống ở Central Belt, nơi có cả thành phố lớn nhất (Glasgow) và thủ đô (Edinburgh).<br><br>Scotland cũng tổ chức một trong những lễ hội nghệ thuật lớn nhất thế giới. Lễ hội này thường được gọi là Lễ hội Edinburgh nhưng thực chất bao gồm nhiều lễ hội khác nhau diễn ra vào các thời điểm khác nhau trong năm, dù phần lớn diễn ra vào tháng 8 và tháng 9. Nhiều người đã nghe đến Lễ hội Fringe, nhưng còn có Lễ hội Quốc tế, Lễ hội Điện ảnh, Lễ hội Thiếu nhi và Edinburgh Mela – một lễ hội giao thoa văn hóa."},"roman":"X"},{"navLabel":"Viết 1","title":"Finish the sentences so that the meaning stays the same","icon":"pen-to-square","type":"sentence","questions":[{"q":"1.","original":"The last time I went to Ho Chi Minh City was ten years ago.","starter":"It has been","answer":"ten years since I last went to Ho Chi Minh City.","accepted":["ten years since i last went to ho chi minh city"],"vi":"Lần cuối tôi đến Thành phố Hồ Chí Minh là mười năm trước.","explanation":"\"the last time...was...ago\" chuyển thành \"It has been + khoảng thời gian + since + S + last + V-ed\".","note":"It has been + khoảng thời gian + since + S + last + V-ed"},{"q":"2.","original":"This is the most interesting novel I have ever read.","starter":"I have","answer":"never read such an interesting novel before.","accepted":["never read such an interesting novel before"],"vi":"Đây là cuốn tiểu thuyết thú vị nhất mà tôi từng đọc.","explanation":"So sánh nhất chuyển thành \"have never read such a/an + adj + N\".","note":"S + have never + P2 + such a/an + adj + N"},{"q":"3.","original":"This is the first time I have been to Bangkok.","starter":"I haven’t","answer":"been to Bangkok before.","accepted":["been to bangkok before"],"vi":"Đây là lần đầu tiên tôi đến Bangkok.","explanation":"\"the first time\" chuyển thành \"haven’t...before\" (chưa từng làm gì trước đây).","note":"S + haven’t + P2 + before"},{"q":"4.","original":"I started learning English 10 years ago","starter":"I have","answer":"learnt English for 10 years.","accepted":["learnt english for 10 years","been learning english for 10 years","learned english for 10 years"],"vi":"Tôi bắt đầu học tiếng Anh cách đây 10 năm.","explanation":"\"started + V-ing + time ago\" chuyển thành \"have + P2 + for + khoảng thời gian\".","note":"S + have + P2 + for + khoảng thời gian"},{"q":"5.","original":"It has been ages since I last saw him.","starter":"I have","answer":"not seen him for ages.","accepted":["not seen him for ages"],"vi":"Đã lâu lắm rồi kể từ khi tôi gặp anh ấy lần cuối.","explanation":"\"It has been + time + since + S + last + V-ed\" chuyển thành \"S + haven’t + P2 + for + time\".","note":"S + haven’t + P2 + for + khoảng thời gian"}],"instant":true,"instructions":"Viết lại câu thứ hai sao cho nghĩa không đổi so với câu thứ nhất, bắt đầu bằng từ gợi ý.","roman":"XI"},{"navLabel":"Viết 2","title":"Use the given words to write complete sentences","icon":"pen-to-square","type":"reorder","questions":[{"q":"1.","answer":"Canberra is the capital city of Australia.","accepted":["canberra is the capital city of australia"],"vi":"Canberra là thủ đô của Úc.","explanation":"S + is + the + N + of + N.","note":"S + is + the capital city of + N","words":["of","Australia","the","is","Canberra","capital","city"],"prompt":"Canberra/ be/ capital city/ Australia."},{"q":"2.","answer":"With a population of 403,468, it is Australia’s largest inland city and the eighth-largest city overall.","accepted":["with a population of 403,468, it is australia’s largest inland city and the eighth-largest city overall"],"vi":"Với dân số 403.468 người, đây là thành phố nội địa lớn nhất của Úc và là thành phố lớn thứ tám nói chung.","explanation":"With a population of + số, S + is + N and + N.","note":"With a population of + N, S + is + N","words":["eighth-largest","city","largest","With","the","403,468","it","population","is","a","overall","of","Australia’s","city","inland","and"],"prompt":"Population/ 403,468/ it/ be/ Australia’s largest inland city/ eighth-largest city overall."},{"q":"3.","answer":"The city is located at the northern end of the Australian Capital Territory.","accepted":["the city is located at the northern end of the australian capital territory"],"vi":"Thành phố này nằm ở đầu phía bắc của Lãnh thổ Thủ đô Úc.","explanation":"S + is located at + N (vị trí).","note":"S + is located at + the + N + of + N","words":["Australian","The","Capital","city","the","at","Territory","is","the","of","northern","end","located"],"prompt":"City/ be/ locate/ northern end of/ Australian Capital Territory."},{"q":"4.","answer":"A resident of Canberra is known as a \"Canberran\".","accepted":["a resident of canberra is known as a \"canberran\"","a resident of canberra is known as a canberran"],"vi":"Cư dân của Canberra được gọi là \"Canberran\".","explanation":"S + is known as + N (bị động).","note":"S + is known as + a/an + N","words":["known","resident","Canberra","A","of","a","Canberran","is","as"],"prompt":"Resident/ Canberra/ know/ \"Canberran\"."},{"q":"5.","answer":"Canberra is the capital and seat of government.","accepted":["canberra is the capital and seat of government"],"vi":"Canberra là thủ đô và là nơi đặt trụ sở chính phủ.","explanation":"S + is + N and + N.","note":"S + is the capital and seat of + N","words":["seat","the","and","Canberra","of","government","capital","is"],"prompt":"Canberra/ be/ capital/ seat/ government."}],"instant":true,"instructions":"Dùng các từ gợi ý để viết thành câu hoàn chỉnh về thủ đô Canberra.","roman":"XII"},{"navLabel":"Viết 3","title":"Use the given words to write complete sentences","icon":"pen-to-square","type":"reorder","questions":[{"q":"1.","answer":"Alison often watches TV after dinner.","accepted":["alison often watches tv after dinner"],"vi":"Alison thường xem TV sau bữa tối.","explanation":"\"often\" là dấu hiệu hiện tại đơn, chủ ngữ số ít → watches.","note":"S (số ít) + V-s/es (dấu hiệu: often)","words":["dinner","watches","Alison","after","often","TV"],"prompt":"Alison/ often/ watch/ TV/ after dinner."},{"q":"2.","answer":"I have read all the plays of Shakespeare.","accepted":["i have read all the plays of shakespeare"],"vi":"Tôi đã đọc hết các vở kịch của Shakespeare.","explanation":"Hành động đã xảy ra, không rõ thời điểm → have read.","note":"S + have + P2","words":["have","read","the","I","plays","Shakespeare","all","of"],"prompt":"I/ read/ all/ play/ Shakespeare."},{"q":"3.","answer":"She doesn’t like to be disturbed when she is working.","accepted":["she doesn’t like to be disturbed when she is working","she doesn’t like being disturbed when she is working"],"vi":"Cô ấy không thích bị làm phiền khi đang làm việc.","explanation":"\"like\" + to V (bị động: to be disturbed); \"when\" + hiện tại tiếp diễn.","note":"S + doesn’t like + to be + P2 + when + S + is + V-ing","words":["working","She","doesn’t","disturbed","to","like","she","when","be","is"],"prompt":"She/ not like/ disturb/ when/ she/ work."},{"q":"4.","answer":"Jack doesn’t spend much time on reading.","accepted":["jack doesn’t spend much time on reading","jack doesn’t spend much time reading"],"vi":"Jack không dành nhiều thời gian để đọc sách.","explanation":"\"spend time on + V-ing\" = dành thời gian làm gì.","note":"S + doesn’t spend + time + on + V-ing","words":["doesn’t","spend","on","much","Jack","time","reading"],"prompt":"Jack/ not spend/ much time/ read."},{"q":"5.","answer":"They have lived in that house for ten years.","accepted":["they have lived in that house for ten years"],"vi":"Họ đã sống trong ngôi nhà đó được mười năm.","explanation":"\"for + khoảng thời gian\" → hiện tại hoàn thành.","note":"S + have + P2 + for + khoảng thời gian","words":["have","ten","house","that","for","They","lived","in","years"],"prompt":"They/ live/ that house/ ten years."},{"q":"6.","answer":"We have worked at this company since 2008.","accepted":["we have worked at this company since 2008"],"vi":"Chúng tôi đã làm việc ở công ty này từ năm 2008.","explanation":"\"since + mốc thời gian\" → hiện tại hoàn thành.","note":"S + have + P2 + since + mốc thời gian","words":["have","since","at","company","worked","2008","We","this"],"prompt":"We/ work/ this company/ 2008."},{"q":"7.","answer":"John’s friends are playing football at the Sports Centre.","accepted":["john’s friends are playing football at the sports centre"],"vi":"Bạn của John đang chơi bóng đá ở Trung tâm Thể thao.","explanation":"Hành động đang diễn ra → hiện tại tiếp diễn.","note":"S + are + V-ing","words":["Sports","playing","friends","are","John’s","the","at","football","Centre"],"prompt":"John’s friends/ play/ football/ Sports Centre."},{"q":"8.","answer":"Peter doesn’t like buying food in supermarkets.","accepted":["peter doesn’t like buying food in supermarkets","peter doesn’t like to buy food in supermarkets"],"vi":"Peter không thích mua đồ ăn ở siêu thị.","explanation":"\"like\" + V-ing (sở thích chung).","note":"S + doesn’t like + V-ing","words":["buying","supermarkets","like","in","Peter","food","doesn’t"],"prompt":"Peter/ not like/ buy/ food/ supermarket."},{"q":"9.","answer":"The President has travelled to more than twenty countries.","accepted":["the president has travelled to more than twenty countries"],"vi":"Tổng thống đã đi thăm hơn hai mươi quốc gia.","explanation":"Hành động lặp lại, không rõ thời điểm → hiện tại hoàn thành.","note":"S + has + P2","words":["more","The","has","travelled","twenty","to","than","countries","President"],"prompt":"President/ travel/ more than twenty/ country."},{"q":"10.","answer":"I am doing housework at the moment.","accepted":["i am doing housework at the moment"],"vi":"Tôi đang làm việc nhà lúc này.","explanation":"\"at the moment\" là dấu hiệu hiện tại tiếp diễn.","note":"S + am/is/are + V-ing (dấu hiệu: at the moment)","words":["moment","at","I","the","housework","am","doing"],"prompt":"I/ do/ housework/ moment."}],"instant":true,"instructions":"Dùng các từ gợi ý để viết thành câu hoàn chỉnh, chia đúng thì hiện tại phù hợp.","roman":"XIII"},{"navLabel":"Viết 4","title":"Rewrite each sentence using the word(s) given","icon":"pen-to-square","type":"sentence","questions":[{"q":"1.","original":"Mr. Nam started teaching English 20 years ago. (FOR)","answer":"Mr. Nam has taught English for 20 years.","accepted":["mr. nam has taught english for 20 years","mr nam has taught english for 20 years"],"vi":"Thầy Nam bắt đầu dạy tiếng Anh cách đây 20 năm.","explanation":"\"started + V-ing + time ago\" chuyển thành \"has + P2 + for + khoảng thời gian\".","note":"S + has + P2 + for + khoảng thời gian"},{"q":"2.","original":"This is the first time she has come to Vietnam. (NEVER)","answer":"She has never been to Vietnam before.","accepted":["she has never been to vietnam before"],"vi":"Đây là lần đầu tiên cô ấy đến Việt Nam.","explanation":"\"the first time\" chuyển thành \"has never been...before\".","note":"S + has never been + to + N + before"},{"q":"3.","original":"The last time I met her was 3 years ago. (HAVEN’T)","answer":"I haven't met her for the last 3 years.","accepted":["i haven't met her for the last 3 years","i have not met her for the last 3 years"],"vi":"Lần cuối tôi gặp cô ấy là 3 năm trước.","explanation":"\"the last time...was...ago\" chuyển thành \"haven’t + P2 + for the last + time\".","note":"S + haven’t + P2 + for the last + khoảng thời gian"},{"q":"4.","original":"That is the most interesting novel I have ever read. (SUCH)","answer":"I have never read such an interesting novel before.","accepted":["i have never read such an interesting novel before"],"vi":"Đó là cuốn tiểu thuyết thú vị nhất mà tôi từng đọc.","explanation":"So sánh nhất chuyển thành \"have never read such a/an + adj + N\".","note":"S + have never + P2 + such a/an + adj + N"},{"q":"5.","original":"This is the third time I have been to Hanoi. (TWICE)","answer":"I have been to Hanoi twice before.","accepted":["i have been to hanoi twice before"],"vi":"Đây là lần thứ ba tôi đến Hà Nội.","explanation":"\"the third time\" nghĩa là đã đến 2 lần trước đó → have been...twice before.","note":"S + have been + to + N + twice before"}],"instant":true,"instructions":"Viết lại câu sao cho nghĩa không đổi, dùng từ gợi ý cho sẵn.","roman":"XIV"},{"navLabel":"Viết 5","title":"Make complete sentences based on the given words","icon":"pen-to-square","type":"reorder","questions":[{"q":"1.","answer":"Ireland is separated from Great Britain to its east by the North Channel, the Irish Sea, and St George’s Channel.","accepted":["ireland is separated from great britain to its east by the north channel, the irish sea, and st george’s channel"],"vi":"Ireland được ngăn cách với Anh Quốc ở phía đông bởi eo biển Bắc, biển Ireland và eo biển St George.","explanation":"be separated from + N + by + N (bị động).","note":"S + is separated from + N + by + N","prompt":"Ireland/ be/ separate/ Great Britain/ its east/ North Channel/ Irish Sea/ St George’s Channel.","words":["the North Channel,","Great Britain","Ireland","the Irish Sea,","to its east","is separated from","and St George's Channel.","by"]},{"q":"2.","answer":"Barbados is a sovereign island country in the Caribbean region of North America.","accepted":["barbados is a sovereign island country in the caribbean region of north america"],"vi":"Barbados là một quốc đảo có chủ quyền thuộc khu vực Caribbean của Bắc Mỹ.","explanation":"S + is + a + N + in + N.","note":"S + is + a + adjective + noun + in + N","prompt":"Barbados/ be/ sovereign island country/ Caribbean region/ North America.","words":["in the Caribbean region","Barbados","of North America.","is a sovereign","island country"]},{"q":"3.","answer":"Antigua and Barbuda is a twin-island country in the Americas, lying between the Caribbean Sea and the Atlantic Ocean.","accepted":["antigua and barbuda is a twin-island country in the americas, lying between the caribbean sea and the atlantic ocean"],"vi":"Antigua và Barbuda là một quốc gia hai đảo ở châu Mỹ, nằm giữa biển Caribbean và Đại Tây Dương.","explanation":"S + is + N, V-ing (mệnh đề phân từ bổ sung thông tin).","note":"S + is + N, lying between + N and + N","prompt":"Antigua and Barbuda/ be/ twin-island country/ Americas/ lie/ Caribbean Sea/ Atlantic Ocean.","words":["the Caribbean Sea","is a twin-island country","and the Atlantic Ocean.","Antigua and Barbuda","lying between","in the Americas,"]},{"q":"4.","answer":"As soon as we walk through the Orchard Road, we will visit the Merlion and Sentosa Island.","accepted":["as soon as we walk through the orchard road, we will visit the merlion and sentosa island"],"vi":"Ngay khi chúng tôi đi qua đường Orchard, chúng tôi sẽ ghé thăm Merlion và đảo Sentosa.","explanation":"\"As soon as\" + hiện tại đơn, S + will + V (câu điều kiện loại 1 dạng thời gian).","note":"As soon as + S + V(hiện tại), S + will + V","prompt":"Soon/ we/ walk through/ Orchard Road/ we/ visit/ Merlion/ Sentosa Island.","words":["we will visit","As soon as","and Sentosa Island.","we walk through","the Merlion","the Orchard Road,"]},{"q":"5.","answer":"When people come to England, they never miss a chance of visiting the city on a double-decker bus.","accepted":["when people come to england, they never miss a chance of visiting the city on a double-decker bus"],"vi":"Khi người ta đến Anh, họ không bao giờ bỏ lỡ cơ hội tham quan thành phố bằng xe buýt hai tầng.","explanation":"When + S + V(hiện tại), S + never + V + a chance of + V-ing.","note":"When + S + V, S + never miss a chance of + V-ing","prompt":"When/ people/ come/ England/ they/ never/ miss/ chance/ visit/ city/ double-decker bus.","words":["the city","to England,","When people come","on a double-decker bus.","they never miss","a chance of visiting"]}],"instant":true,"instructions":"Dùng các từ gợi ý để viết thành câu hoàn chỉnh (có thể thêm từ hoặc thay đổi cho phù hợp).","roman":"XV"}]};
