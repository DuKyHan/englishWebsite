les.","accepted":["if i were you, i would eat more vegetables","if i were you, i would eat more vegetable"],"vi":"Nếu tôi là bạn, tôi sẽ ăn nhiều rau hơn.","explanation":"Câu điều kiện loại 2: If I were you, I would + V.","note":"If I were you, I would + V-inf"},{"q":"2.","original":"More/ foreign tourist/ come/ here/ if/ environment/ clean.","answer":"More foreign tourists would come here if the environment were cleaner.","accepted":["more foreign tourists would come here if the environment were cleaner"],"vi":"Nhiều khách du lịch nước ngoài sẽ đến đây hơn nếu môi trường sạch hơn.","explanation":"Câu điều kiện loại 2 đảo vị trí hai mệnh đề.","note":"S + would + V + if + S + were + adj"},{"q":"3.","original":"What/ happen/ if/ there/ be/ no woman/ world?","answer":"What would happen if there were no woman in the world?","accepted":["what would happen if there were no woman in the world"],"vi":"Điều gì sẽ xảy ra nếu không có phụ nữ trên thế giới?","explanation":"Câu điều kiện loại 2 dạng câu hỏi.","note":"What would happen if there were + N?"},{"q":"4.","original":"If/ I/ be/ his father/ I/ ask/ him/ learn English/ better.","answer":"If I were his father, I would ask him to learn English better.","accepted":["if i were his father, i would ask him to learn english better"],"vi":"Nếu tôi là bố cậu ấy, tôi sẽ yêu cầu cậu ấy học tiếng Anh tốt hơn.","explanation":"ask + O + to V.","note":"If + S + were + N, S + would + ask + O + to V"},{"q":"5.","original":"If/ there/ be/ no war/ earth/ people/ live/ peace/ forever.","answer":"If there were no war on earth, people would live in peace forever.","accepted":["if there were no war on earth, people would live in peace forever"],"vi":"Nếu không có chiến tranh trên trái đất, con người sẽ sống trong hòa bình mãi mãi.","explanation":"Câu điều kiện loại 2 với \"there were\".","note":"If there were no + N, S + would + V"},{"q":"6.","original":"Flood/ not happen/ so regularly/ if/ people/ not cut down/ so many/ tree.","answer":"Flood r align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/kənˈtæmɪneɪt/</span></td><td class="p-2 text-slate-500 italic">(v)</td><td class="p-2 text-slate-700">làm bẩn, gây ô nhiễm<br><span class="text-[11px] text-slate-400 italic">Factories contaminate rivers by dumping waste into them.</span><br><span class="text-[11px] text-slate-400">Các nhà máy làm ô nhiễm sông ngòi bằng cách đổ chất thải vào đó.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">10</td><td class="p-2 font-bold text-slate-800">contaminant <button type="button" data-w="contaminant" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/kənˈtæmɪnənt/</span></td><td class="p-2 text-slate-500 italic">(n)</td><td class="p-2 text-slate-700">chất gây bẩn<br><span class="text-[11px] text-slate-400 italic">Filters cannot remove all contaminants from water.</span><br><span class="text-[11px] text-slate-400">Bộ lọc không thể loại bỏ hết mọi chất gây bẩn khỏi nước.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">11</td><td class="p-2 font-bold text-slate-800">dump <button type="button" data-w="dump" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/dʌmp/</span></td><td class="p-2 text-slate-500 italic">(v)</td><td class="p-2 text-slate-700">vứt, đổ bỏ<br><span class="text-[11px] text-slate-400 italic">It is illegal to dump waste into rivers.</span><br><span class="text-[11px] text-slate-400">Đổ chất thải vào sông là bất hợp pháp.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">12</td><td class="p-2 font-bold text-slate-800">earplug <button type="button" data-w="earplug" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/ˈɪəplʌɡ/</span></td><td class="p-2 text-slate-500 italic">(n)</td><td class="p-2 text-slate-700">cái nút tai<br><span class="text-[11px] text-slate-400 italic">You should wear earplugs in a very noisy place.</span><br><span class="text-[11px] text-slate-400">Bạn nên đeo nút tai ở nơi rất ồn ào.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">13</td><td class="p-2 font-bold text-slate-800">effect <button type="button" data-w="effect" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/ɪˈfekt/</span></td><td class="p-2 text-slate-500 italic">(n)</td><td class="p-2 text-slate-700">kết quả, hiệu ứng<br><span class="text-[11px] text-slate-400 italic">Pollution has a bad effect on our health.</span><br><span class="text-[11px] text-slate-400">Ô nhiễm có ảnh hưởng xấu đến sức khỏe của chúng ta.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">14</td><td class="p-2 font-bold text-slate-800">fine <button type="button" data-w="fine" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/faɪn/</span></td><td class="p-2 text-slate-500 italic">(v)</td><td class="p-2 text-slate-700">phạt tiền<br><span class="text-[11px] text-slate-400 italic">Companies that pollute rivers should be fined heavily.</span><br><span class="text-[11px] text-slate-400">Các công ty gây ô nhiễm sông ngòi nên bị phạt nặng.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">15</td><td class="p-2 font-bold text-slate-800">float <button type="button" data-w="float" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/fləʊt/</span></td><td class="p-2 text-slate-500 italic">(v)</td><td class="p-2 text-slate-700">nổi<br><span class="text-[11px] text-slate-400 italic">Plastic bags float on the surface of the polluted river.</span><br><span class="text-[11px] text-slate-400">Túi ni-lông nổi trên bề mặt dòng sông ô nhiễm.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">16</td><td class="p-2 font-bold text-slate-800">groundwater <button type="button" data-w="groundwater" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/ˈɡraʊndwɔːtə(r)/</span></td><td class="p-2 text-slate-500 italic">(n)</td><td class="p-2 text-slate-700">nước ngầm<br><span class="text-[11px] text-slate-400 italic">Groundwater can also be contaminated by chemicals.</span><br><span class="text-[11px] text-slate-400">Nước ngầm cũng có thể bị ô nhiễm bởi hóa chất.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">17</td><td class="p-2 font-bold text-slate-800">hearing loss <button type="button" data-w="hearing loss" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/ˈhɪərɪŋ lɒs/</span></td><td class="p-2 text-slate-500 italic">(n)</td><td class="p-2 text-slate-700">mất thính lực<br><span class="text-[11px] text-slate-400 italic">Long exposure to loud noise can cause hearing loss.</span><br><span class="text-[11px] text-slate-400">Tiếp xúc lâu với tiếng ồn lớn có thể gây mất thính lực.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">18</td><td class="p-2 font-bold text-slate-800">illustrate <button type="button" data-w="illustrate" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/ˈɪləstreɪt/</span></td><td class="p-2 text-slate-500 italic">(v)</td><td class="p-2 text-slate-700">minh họa<br><span class="text-[11px] text-slate-400 italic">The graph illustrates how air pollution has increased.</span><br><span class="text-[11px] text-slate-400">Biểu đồ minh họa mức độ ô nhiễm không khí đã tăng như thế nào.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">19</td><td class="p-2 font-bold text-slate-800">litter <button type="button" data-w="litter" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/ˈlɪtə(r)/</span></td><td class="p-2 text-slate-500 italic">(n, v)</td><td class="p-2 text-slate-700">rác vụn, vứt rác<br><span class="text-[11px] text-slate-400 italic">Please do not litter in the park.</span><br><span class="text-[11px] text-slate-400">Xin đừng vứt rác trong công viên.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">20</td><td class="p-2 font-bold text-slate-800">measure <button type="button" data-w="measure" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/ˈmeʒə(r)/</span></td><td class="p-2 text-slate-500 italic">(v)</td><td class="p-2 text-slate-700">đo<br><span class="text-[11px] text-slate-400 italic">Scientists measure air quality every day in big cities.</span><br><span class="text-[11px] text-slate-400">Các nhà khoa học đo chất lượng không khí mỗi ngày ở các thành phố lớn.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">21</td><td class="p-2 font-bold text-slate-800">non-point source pollution <button type="button" data-w="non-point source pollution" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/nɒn-pɔɪnt sɔːs pəˈluːʃn/</span></td><td class="p-2 text-slate-500 italic">(n)</td><td class="p-2 text-slate-700">ô nhiễm không nguồn (nguồn phân tán)<br><span class="text-[11px] text-slate-400 italic">Non-point source pollution comes from many different places, not just one.</span><br><span class="text-[11px] text-slate-400">Ô nhiễm nguồn phân tán đến từ nhiều nơi khác nhau, không chỉ một nguồn.</span></td></tr><tr class="border-b border-slate-100 hover:bg-emerald-50/50"><td class="p-2 text-slate-400 font-bold">22</td><td class="p-2 font-bold text-slate-800">permanent <button type="button" data-w="permanent" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button><br><span class="text-[10px] text-slate-400 font-normal">/ˈpɜːmənənt/</span></td><td class="p-2 text-slate-500 italic">(adj)</td><td class="p-2 text-slate-700">vĩnh viễn<br><span class="text-[11px] text-slate-400 italic">Loud noise can cause permanent hearing damage.</span><br><span class="text-[11px] text-slate-400">Tiếng ồn lớn function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[‘’]/g,"'")
    .replace(/["“”]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-32':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>

function renderBank(bank, idx, clickable){
  if(!bank || !bank.length) return '';
  const hint = clickable ? ' <span class="normal-case font-normal text-slate-400">(bấm để điền)</span>' : '';
  return `<div class="mb-4"><p class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide"><i class="fa-solid fa-list-ul mr-1"></i>Từ gợi ý${hint}</p>
    <div class="grid grid-cols-2 sm:grid-cols-5 border-2 border-slate-800 rounded-lg overflow-hidden text-sm font-bold text-slate-800">
      ${bank.map((w,bi)=>clickable
        ? `<div class="bank-chip px-3 py-2 text-center border border-slate-300 bg-white" id="bankchip_${idx}_${bi}" onclick="fillFromBank(${idx},${bi})">${w}</div>`
        : `<div class="px-3 py-2 text-center border border-slate-300 bg-white">${w}</div>`
      ).join('')}
    </div>
  </div>`;
}
function fillFromBank(idx, bi){
  const chip = document.getElementById(`bankchip_${idx}_${bi}`);
  if(!chip || chip.classList.contains('used')) return;
  const word = DATA.sections[idx].bank[bi];
  const inputs = Array.from(document.querySelectorAll(`#tab-${idx} input.answer-input[id^="inp_${idx}_"]`));
  const target = inputs.find(inp => inp.value.trim()==='');
  if(!target) return;
  target.value = word;
  target.dataset.bankChip = bi;
  chip.classList.add('used');
}
function releaseBankChipIfChanged(idx,i){
  const inp=document.getElementById(`inp_${idx}_${i}`);
  if(!inp || inp.dataset.bankChip===undefined) return;
  const bi=inp.dataset.bankChip;
  delete inp.dataset.bankChip;
  const chip=document.getElementById(`bankchip_${idx}_${bi}`);
  if(chip) chip.classList.remove('used');
}

        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-emerald-700" style="display:none">
          <span class="font-black text-emerald-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = s.bank ? 'w-40' : widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      const bankAttr = s.bank ? ` oninput="releaseBankChipIfChanged(${idx},${i})"` : '';
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"${bankAttr}></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      const origBlock = q.original ? `<p class="text-slate-700 text-sm mb-2">${q.original}</p>` : '';
      if(q.starter){
        inner += `${origBlock}
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `${origBlock}<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    } else if(s.type==='reorder'){
      const promptBlock = q.prompt ? `<p class="text-slate-500 text-sm mb-2 italic">${q.prompt}</p>` : '';
      const chips = q.words.map((w,j)=>`<span class="word-chip bg-white border-2 border-lime-300 text-lime-700 font-bold text-sm px-3 py-1.5 rounded-xl shadow-sm" id="chip_${idx}_${i}_${j}" onclick="addChip(${idx},${i},${j})">${w}</span>`).join('');
      inner += `${promptBlock}
        <div class="flex flex-wrap gap-2 mb-3">${chips}</div>
        <div class="answer-line flex flex-wrap gap-2 items-center bg-lime-50 border-2 border-dashed border-lime-300 rounded-xl p-3" id="line_${idx}_${i}"></div>
        <div class="flex gap-2 mt-2">
          <button type="button" onclick="clearChips(${idx},${i})" class="text-xs font-bold text-slate-500 hover:text-rose-600 transition"><i class="fa-solid fa-eraser mr-1"></i>Xóa hết</button>
        </div>
        <input type="hidden" id="inp_${idx}_${i}" value="">`;
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-slate-700 to-emerald-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page space-y-4">${inner}</section>`;
}

function renderTheory(){
  return `<section id="tab-theory" class="section-page active space-y-4">
    <h2 class="text-xl md:text-2xl font-extrabold text-emerald-700 flex items-center gap-2 mb-1"><i class="fa-solid fa-book-open text-amber-400"></i> Lý thuyết: Unit 7 - Pollution</h2>
    <p class="text-sm text-slate-500 mb-3 italic">Từ vựng, cấu tạo từ (word formation) và ngữ pháp trọng tâm của bài. Hãy ôn lại trước khi làm các phần luyện tập bên dưới.</p>
    ${THEORY_HTML}
  </section>`;
}

function renderWriting(){
  return `<section id="tab-writing" class="section-page space-y-4">
    <div class="task-card bg-white rounded-2xl shadow-md p-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="bg-pink-100 text-pink-700 font-black text-lg w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-pen-nib"></i></div>
        <div>
          <h2 class="text-xl font-extrabold text-pink-700">XVII. Viết đoạn văn (Writing)</h2>
          <p class="text-sm text-slate-500">Are you concerned about noise pollution? Write a paragraph (100–120 words) about its causes, effects and solutions.</p>
        </div>
      </div>
      <div class="bg-pink-50 border border-pink-200 rounded-xl p-4 text-sm text-slate-700 mb-4">
        <b class="text-pink-700">Gợi ý cách tổ chức ý:</b>
        <ul class="mt-1 space-y-0.5">
          <li>• What is noise pollution?</li>
          <li>• How common is it now?</li>
          <li>• What causes it?</li>
          <li>• What are its effects?</li>
          <li>• What should we do to solve it?</li>
        </ul>
      </div>
      <textarea id="essay-input" rows="9" class="answer-input w-full px-3 py-2 rounded-lg text-sm" placeholder="Viết đoạn văn của bạn ở đây (100–120 từ)…"></textarea>
      <div class="mt-2 text-xs text-slate-400" id="essay-count">Số từ: 0</div>
      <div class="mt-3 flex gap-3 flex-wrap">
        <button onclick="toggleModelEssay()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold px-5 py-2.5 rounded-full transition hover:scale-105 shadow"><i class="fa-solid fa-eye mr-1"></i>Xem đoạn văn mẫu</button>
      </div>
      <div id="model-essay" class="vi-hidden mt-3 bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-slate-700 leading-relaxed">
        <b class="text-blue-700">Outline gợi ý:</b>
        <div class="mt-2 bg-white/70 border border-blue-100 rounded-lg p-3">
          <p><b>1. Definition:</b> what noise pollution is.</p>
          <p><b>2. Current situation:</b> how common it is nowadays.</p>
          <p><b>3. Causes:</b> traffic, construction, factories, loud music.</p>
          <p><b>4. Effects:</b> hearing loss, stress, sleep problems.</p>
          <p><b>5. Solutions:</b> laws, earplugs, quieter machines, planting trees.</p>
        </div>
        <div class="mt-3">
          <b class="text-blue-700">Đoạn văn mẫu:</b><br>
          Noise pollution is unwanted or excessive sound that disturbs people's daily lives. Nowadays, it is extremely common, especially in big cities, because of heavy traffic, construction sites, factories and loud music from bars and karaoke shops. If people did not use their motorbike horns so often, our streets would be much quieter. Noise pollution can cause serious effects such as hearing loss, high blood pressure, stress and sleep problems. It can also affect students' concentration at school. To reduce noise pollution, the government should make stricter laws about noise levels and fine factories that are too noisy. Individuals can also help by wearing earplugs, turning down the volume and planting more trees, which absorb sound. If everyone takes action, our living environment will become much more peaceful.
        </div>
        <div class="mt-3 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
          <b class="text-emerald-700">Dịch nghĩa:</b><br>
          Ô nhiễm tiếng ồn là âm thanh không mong muốn hoặc quá mức làm ảnh hưởng đến cuộc sống hàng ngày của con người. Ngày nay, nó rất phổ biến, đặc biệt ở các thành phố lớn, do giao thông đông đúc, công trường xây dựng, nhà máy và âm nhạc lớn từ quán bar, karaoke. Nếu mọi người không bấm còi xe máy thường xuyên như vậy, đường phố của chúng ta sẽ yên tĩnh hơn nhiều. Ô nhiễm tiếng ồn có thể gây ra những hậu quả nghiêm trọng như mất thính lực, huyết áp cao, căng thẳng và các vấn đề về giấc ngủ. Nó cũng có thể ảnh hưởng đến khả năng tập trung của học sinh ở trường. Để giảm ô nhiễm tiếng ồn, chính phủ nên ban hành luật nghiêm ngặt hơn về mức độ tiếng ồn và phạt các nhà máy gây ồn quá mức. Mỗi cá nhân cũng có thể giúp bằng cách đeo nút tai, giảm âm lượng và trồng thêm cây xanh, vốn hấp thụ âm thanh. Nếu mọi người cùng hành động, môi trường sống của chúng ta sẽ trở nên yên bình hơn nhiều.

      </div>

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = renderTheory() + DATA.sections.map((s,i)=>renderSection(s,i)).join('') + renderWriting();
  DATA.sections.forEach((s,idx)=>{
    if(s.type==='reorder'){ s.questions.forEach((q,i)=>renderReorderLine(idx,i)); }
  });
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function addChip(idx,i,j){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) reorderState[key] = [];
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(!chip || chip.classList.contains('used')) return;
  chip.classList.add('used');
  reorderState[key].push(j);
  renderReorderLine(idx,i);
  if(DATA.sections[idx].instant){ gradeOneSentence(idx,i); }
}
function removeChip(idx,i,pos){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) return;
  const j = reorderState[key][pos];
  reorderState[key].splice(pos,1);
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(chip) chip.classList.remove('used');
  renderReorderLine(idx,i);
  if(DATA.sections[idx].instant){ gradeOneSentence(idx,i); }
}
function clearChips(idx,i){
  const key = `${idx}_${i}`;
  (reorderState[key]||[]).forEach(j=>{
    const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
    if(chip) chip.classList.remove('used');
  });
  reorderState[key] = [];
  renderReorderLine(idx,i);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
}
function renderReorderLine(idx,i){
  const key = `${idx}_${i}`;
  const words = DATA.sections[idx].questions[i].words;
  const line = document.getElementById(`line_${idx}_${i}`);
  const inp = document.getElementById(`inp_${idx}_${i}`);
  const seq = reorderState[key]||[];
  if(!seq.length){
    line.innerHTML = `<span class="text-slate-400 text-sm italic">Nhấp vào các từ bên trên theo đúng thứ tự…</span>`;
  } else {
    line.innerHTML = seq.map((wi,pos)=>`<span class="word-chip bg-lime-500 text-white font-bold text-sm px-3 py-1.5 rounded-xl" onclick="removeChip(${idx},${i},${pos})">${words[wi]}</span>`).join('');
  }
  if(inp) inp.value = seq.map(wi=>words[wi]).join(' ');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else if(s.type==='reorder'){
      clearChips(idx,i);
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  document.querySelectorAll(`#tab-${idx} .bank-chip`).forEach(c=>c.classList.remove('used'));
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btnId = idx==='theory' ? 'navbtn_theory' : idx==='writing' ? 'navbtn_writing' : `navbtn_${idx}`;
  const btn=document.getElementById(btnId);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#334155','#16a34a','#78350f','#22c55e','#4ade80','#a3e635'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();

      const words = essay.value.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('essay-count').textContent = `Số từ: ${words}`;
    });
