g âm rơi vào âm tiết 2, còn \"happen, local, wander\" đều trọng âm rơi vào âm tiết 1."}],"roman":"II"},{"navLabel":"Trắc nghiệm","title":"Chọn đáp án đúng (Multiple Choice)","icon":"list-check","instructions":"Chọn phương án đúng nhất để hoàn thành mỗi câu. Chọn xong sẽ hiện đáp án ngay.","type":"mcq","instant":true,"questions":[{"q":"1. If I were you, I ___ for a new car to buy.","options":["would look","will look","look","looking"],"answer":0,"vi":"Nếu tôi là bạn, tôi sẽ tìm một chiếc xe mới để mua.","explanation":"Câu điều kiện loại 2: If + S + V-ed, S + would + V.","note":"If + S + were, S + would + V-inf","vis":["sẽ tìm (điều kiện loại 2, đúng)","sẽ tìm (tương lai đơn, sai)","tìm (hiện tại đơn, sai)","đang tìm (V-ing, sai)"]},{"q":"2. If Jenny ___ ill, she would go out with us.","options":["isn’t","aren’t","wasn’t","not been"],"answer":2,"vi":"Nếu Jenny không ốm, cô ấy sẽ đi chơi cùng chúng tôi.","explanation":"Câu điều kiện loại 2, mệnh đề If dùng quá khứ đơn phủ định.","note":"If + S + V-ed (phủ định: wasn’t/weren’t), S + would + V","vis":["không phải (hiện tại, sai thì)","không phải (sai chủ ngữ số nhiều)","không phải (quá khứ giả định, đúng)","sai ngữ pháp"]},{"q":"3. If there ___ fewer cars on the road, there would be less accident.","options":["is","were","are","be"],"answer":1,"vi":"Nếu có ít xe hơn trên đường, sẽ có ít tai nạn hơn.","explanation":"Câu điều kiện loại 2, dùng \"were\" cho mọi ngôi.","note":"If there were + N, there would be + N","vis":["là (hiện tại, sai thì)","là (quá khứ giả định, đúng)","là (hiện tại số nhiều, sai)","là (nguyên mẫu, sai)"]},{"q":"4. If people really cared about environment, they ___ waste into rivers.","options":["didn’t dump","don’t dump","shan’t dump","wouldn’t dump"],"answer":3,"vi":"Nếu mọi người thực sự quan tâm đến môi trường, họ sẽ không đổ rác thải xuống sông.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"wouldn’t + V\".","note":"If + S + V-ed, S + wouldn’t + V","vis":["đã không đổ (quá khứ đơn, sai)","không đổ (hiện tại đơn, sai)","sẽ không đổ (tương lai, sai)","sẽ không đổ (điều kiện loại 2, đúng)"]},{"q":"5. You ___ so tired if you went to bed earlier.","options":["won’t be","shan’t be","couldn’t be","wouldn’t be"],"answer":3,"vi":"Bạn sẽ không mệt mỏi như vậy nếu đi ngủ sớm hơn.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"wouldn’t be\".","note":"S + wouldn’t + V, if + S + V-ed","vis":["sẽ không (tương lai đơn, sai)","sẽ không (tương lai cổ, sai)","không thể (sai nghĩa)","sẽ không (điều kiện loại 2, đúng)"]},{"q":"6. If you really ___ me, you would buy me a diamond ring.","options":["loved","love","loves","loving"],"answer":0,"vi":"Nếu bạn thực sự yêu tôi, bạn sẽ mua cho tôi một chiếc nhẫn kim cương.","explanation":"Câu điều kiện loại 2, mệnh đề If dùng quá khứ đơn.","note":"If + S + V-ed, S + would + V","vis":["yêu (quá khứ giả định, đúng)","yêu (hiện tại, sai)","yêu (ngôi 3, sai)","đang yêu (V-ing, sai)"]},{"q":"7. If I knew where she lived, I ___ and see her.","options":["will go","would go","should go","went"],"answer":1,"vi":"Nếu tôi biết cô ấy sống ở đâu, tôi sẽ đến thăm cô ấy.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"would + V\".","note":"If + S + V-ed, S + would + V","vis":["sẽ đi (tương lai đơn, sai)","sẽ đi (điều kiện loại 2, đúng)","nên đi (sai nghĩa)","đã đi (quá khứ, sai)"]},{"q":"8. If I ___ taller, I would buy this dress.","options":["am","are","were","being"],"answer":2,"vi":"Nếu tôi cao hơn, tôi sẽ mua chiếc váy này.","explanation":"Câu điều kiện loại 2, dùng \"were\" cho mọi ngôi.","note":"If + S + were, S + would + V","vis":["là (hiện tại, sai)","là (sai chủ ngữ)","là (quá khứ giả định, đúng)","đang là (sai ngữ pháp)"]},{"q":"9. Filters do not remove all ___ from water.","options":["contaminate","contaminants","contaminating","contamination"],"answer":1,"vi":"Bộ lọc không loại bỏ hết mọi chất gây bẩn khỏi nước.","explanation":"Sau \"all\" cần danh từ số nhiều → contaminants.","note":"all + plural noun","vis":["làm ô nhiễm (động từ, sai)","chất gây ô nhiễm (danh từ số nhiều, đúng)","đang làm ô nhiễm (V-ing, sai)","sự ô nhiễm (danh từ không đếm được, sai)"]},{"q":"10. ___ is found under the ground in soil, rocks, etc.","options":["sea water","salt water","groundwater","hot water"],"answer":2,"vi":"Nước ngầm được tìm thấy dưới lòng đất, trong đất và đá.","explanation":"\"groundwater\" = nước ngầm, khớp định nghĩa.","note":"từ vựng: các loại nước","vis":["nước biển (sai nghĩa)","nước mặn (sai nghĩa)","nước ngầm (đúng)","nước nóng (sai nghĩa)"]},{"q":"11. If I won a lottery, I ___ a lot on charity.","options":["spend","spent","will spend","would spend"],"answer":3,"vi":"Nếu tôi trúng số, tôi sẽ chi rất nhiều cho từ thiện.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"would + V\".","note":"If + S + V-ed, S + would + V","vis":["chi tiêu (hiện tại, sai thì)","đã chi tiêu (quá khứ, sai)","sẽ chi tiêu (tương lai đơn, sai)","sẽ chi tiêu (điều kiện loại 2, đúng)"]},{"q":"12. If the supermarket is open, I ___ some food there.","options":["will buy","would buy","bought","has bought"],"answer":0,"vi":"Nếu siêu thị mở cửa, tôi sẽ mua đồ ăn ở đó.","explanation":"Câu điều kiện loại 1, mệnh đề chính dùng \"will + V\".","note":"If + S + V(s/es), S + will + V","vis":["sẽ mua (tương lai đơn, đúng — điều kiện loại 1)","sẽ mua (điều kiện loại 2, sai)","đã mua (quá khứ, sai)","đã mua (hiện tại hoàn thành, sai)"]},{"q":"13. I will talk to her if you ___ to do it.","options":["won’t want","didn’t want","don’t want","doesn’t want"],"answer":2,"vi":"Tôi sẽ nói chuyện với cô ấy nếu bạn không muốn làm điều đó.","explanation":"Câu điều kiện loại 1, chủ ngữ \"you\" → don’t want.","note":"If + S + don’t/doesn’t + V, S + will + V","vis":["sẽ không muốn (tương lai, sai)","đã không muốn (quá khứ, sai)","không muốn (hiện tại đơn, đúng — điều kiện loại 1)","không muốn (sai chủ ngữ)"]},{"q":"14. If I ___ more money, I would buy a better car.","options":["have","had","will have","would have"],"answer":1,"vi":"Nếu tôi có nhiều tiền hơn, tôi sẽ mua một chiếc xe tốt hơn.","explanation":"Câu điều kiện loại 2, mệnh đề If dùng quá khứ đơn.","note":"If + S + V-ed, S + would + V","vis":["có (hiện tại, sai thì)","có (quá khứ giả định, đúng)","sẽ có (tương lai, sai)","sẽ có (sai cấu trúc)"]},{"q":"15. The farmer had put down some rat ___.","options":["poisoning","poisoner","poisoned","poison"],"answer":3,"vi":"Người nông dân đã đặt bẫy thuốc chuột.","explanation":"\"rat poison\" = thuốc/chất độc diệt chuột (danh từ ghép).","note":"rat + poison (danh từ ghép)","vis":["sự đầu độc (danh từ/V-ing, sai)","kẻ đầu độc (danh từ chỉ người, sai)","bị đầu độc (quá khứ phân từ, sai)","thuốc độc (danh từ, đúng — rat poison)"]},{"q":"16. ___ loss can be caused by noise pollution.","options":["sound","hearing","listening","audio"],"answer":1,"vi":"Mất thính lực có thể do ô nhiễm tiếng ồn gây ra.","explanation":"\"hearing loss\" = mất thính lực (cụm từ cố định).","note":"hearing loss (collocation)","vis":["âm thanh (sai nghĩa)","thính giác (đúng — hearing loss)","sự lắng nghe (sai nghĩa)","âm thanh (tính từ, sai)"]},{"q":"17. Ships spill oil in oceans and rivers. This leads ___ the death of many aquatic animals and plants.","options":["to","in","from","at"],"answer":0,"vi":"Tàu thuyền làm tràn dầu ra đại dương và sông ngòi. Điều này dẫn đến cái chết của nhiều động thực vật dưới nước.","explanation":"\"lead to\" = dẫn đến.","note":"lead to + N","vis":["đến (đúng — lead to)","trong (sai)","từ (sai)","tại (sai)"]},{"q":"18. Households pollute water sources by ___ waste into ponds, lakes, and rivers.","options":["damaging","dumping","losing","leading"],"answer":1,"vi":"Các hộ gia đình làm ô nhiễm nguồn nước bằng cách đổ rác thải vào ao, hồ và sông.","explanation":"\"dump waste\" = đổ rác thải.","note":"by + V-ing (dumping waste)","vis":["gây hại (V-ing, sai nghĩa)","đổ, vứt (V-ing, đúng)","làm mất (V-ing, sai nghĩa)","dẫn đầu (V-ing, sai nghĩa)"]},{"q":"19. This month’s electricity bill is too high ___ the air conditioner is turned on all the time.","options":["since","due to","although","because of"],"answer":0,"vi":"Hóa đơn tiền điện tháng này quá cao vì máy lạnh bật suốt.","explanation":"Nêu lý do bằng một mệnh đề đầy đủ → since.","note":"since + mệnh đề (S+V)","vis":["bởi vì (đúng, theo sau mệnh đề)","do (theo sau danh từ, sai cấu trúc)","mặc dù (sai nghĩa)","bởi vì (theo sau danh từ, sai cấu trúc)"]},{"q":"20. The government has come ___ a solution to the water problems of the city.","options":["up to","up with","to with","on to"],"answer":1,"vi":"Chính phủ đã nghĩ ra một giải pháp cho vấn đề nước của thành phố.","explanation":"\"come up with\" = nghĩ ra.","note":"come up with + N","vis":["sai cụm từ","đúng — come up with = nghĩ ra","sai cụm từ, không tồn tại","sai cụm từ"]},{"q":"21. All the aquatic plants and animals will die if the factory ___ dumping poison into the lake.","options":["will keep","to keep","kept","keeps"],"answer":3,"vi":"Tất cả động thực vật dưới nước sẽ chết nếu nhà máy tiếp tục đổ chất độc vào hồ.","explanation":"Câu điều kiện loại 1, chủ ngữ số ít \"the factory\" → keeps.","note":"If + S (số ít) + V-s/es, S + will + V","vis":["sẽ tiếp tục (sai vị trí ngữ pháp)","để tiếp tục (sai vị trí)","đã tiếp tục (quá khứ, sai)","tiếp tục (hiện tại đơn ngôi 3, đúng — điều kiện loại 1)"]},{"q":"22. A lot of fish has died recently because of the ___ water in this lake.","options":["contaminating","contaminated","contaminate","contaminant"],"answer":1,"vi":"Rất nhiều cá đã chết gần đây vì nước bị ô nhiễm trong hồ này.","explanation":"Trước danh từ \"water\" cần tính từ (quá khứ phân từ, bị động) → contaminated.","note":"adjective (V3) + noun","vis":["đang làm ô nhiễm (V-ing, sai)","bị ô nhiễm (quá khứ phân từ/tính từ, đúng)","làm ô nhiễm (động từ, sai)","chất gây ô nhiễm (danh từ, sai)"]},{"q":"23. If the air was clean, we ___ have to wear masks when going out.","options":["wouldn’t","won’t","would","will"],"answer":0,"vi":"Nếu không khí trong lành, chúng ta sẽ không phải đeo khẩu trang khi ra ngoài.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"wouldn’t\".","note":"If + S + V-ed, S + wouldn’t + V","vis":["sẽ không (điều kiện loại 2, đúng)","sẽ không (tương lai, sai)","sẽ (thiếu \"not\", sai)","sẽ (tương lai, sai)"]},{"q":"24. If I ___ you, I ___ water from that dirty tap.","options":["am - will drink","am - won’t drink","were - would drink","were - wouldn’t drink"],"answer":3,"vi":"Nếu tôi là bạn, tôi sẽ không uống nước từ vòi nước bẩn đó.","explanation":"Câu điều kiện loại 2: If + were, S + wouldn’t + V.","note":"If I were you, I wouldn’t + V","vis":["hiện tại - tương lai (sai cả 2)","hiện tại - tương lai phủ định (sai cả 2)","quá khứ giả định - điều kiện loại 2 (sai vế 2)","quá khứ giả định - điều kiện loại 2 phủ định (đúng)"]},{"q":"25. If he ___ trash around his garden, the garden would look very nice now.","options":["will throw","would throw","didn’t throw","doesn’t throw"],"answer":2,"vi":"Nếu anh ấy không vứt rác quanh vườn, khu vườn giờ đã trông rất đẹp.","explanation":"Câu điều kiện loại 2, mệnh đề If dùng quá khứ đơn phủ định.","note":"If + S + didn’t + V, S + would + V","vis":["sẽ vứt (tương lai, sai)","sẽ vứt (sai nghĩa/thì)","đã không vứt (quá khứ giả định, đúng)","không vứt (hiện tại, sai)"]},{"q":"26. Price and availability are the ___ factors that will determine product success.","options":["critical","musical","physical","medical"],"answer":0,"vi":"Giá cả và tính sẵn có là những yếu tố then chốt quyết định thành công của sản phẩm.","explanation":"\"critical factors\" = yếu tố then chốt.","note":"adjective + noun","vis":["quan trọng, then chốt (đúng)","thuộc âm nhạc (sai nghĩa)","thuộc vật lý (sai nghĩa)","thuộc y khoa (sai nghĩa)"]},{"q":"27. If it rains, we ___ the match.","options":["cancel","will cancel","cancelled","cancelling"],"answer":1,"vi":"Nếu trời mưa, chúng tôi sẽ hủy trận đấu.","explanation":"Câu điều kiện loại 1, mệnh đề chính dùng \"will + V\".","note":"If + S + V(s/es), S + will + V","vis":["hủy (nguyên mẫu, sai)","sẽ hủy (tương lai đơn, đúng — điều kiện loại 1)","đã hủy (quá khứ, sai)","đang hủy (V-ing, sai)"]},{"q":"28. If I were a tree, I ___ the rain.","options":["love","loved","will love","would love"],"answer":3,"vi":"Nếu tôi là một cái cây, tôi sẽ rất thích mưa.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"would + V\".","note":"If + S + were, S + would + V","vis":["yêu thích (hiện tại, sai)","đã yêu thích (quá khứ, sai)","sẽ yêu thích (tương lai, sai)","sẽ yêu thích (điều kiện loại 2, đúng)"]},{"q":"29. The decor inside the house was very ___.","options":["fantastic","electric","mechanic","artistic"],"answer":3,"vi":"Cách trang trí bên trong ngôi nhà rất nghệ thuật.","explanation":"\"artistic\" = mang tính nghệ thuật, phù hợp mô tả \"decor\".","note":"từ vựng phù hợp ngữ cảnh","vis":["tuyệt vời (sai nghĩa ngữ cảnh)","thuộc điện (sai nghĩa)","thợ máy (sai từ loại)","mang tính nghệ thuật (đúng)"]},{"q":"30. If she ___ late, we will go without her.","options":["am","is","was","were"],"answer":1,"vi":"Nếu cô ấy đến muộn, chúng tôi sẽ đi mà không có cô ấy.","explanation":"Câu điều kiện loại 1, chủ ngữ số ít \"she\" → is.","note":"If + S (số ít) + is, S + will + V","vis":["là (sai chủ ngữ)","là (hiện tại đơn ngôi 3, đúng — điều kiện loại 1)","là (quá khứ, sai)","là (quá khứ giả định, sai loại câu)"]},{"q":"31. If I ___ where she lived, I would go and see her.","options":["know","knows","to know","knew"],"answer":3,"vi":"Nếu tôi biết cô ấy sống ở đâu, tôi sẽ đến thăm cô ấy.","explanation":"Câu điều kiện loại 2, mệnh đề If dùng quá khứ đơn.","note":"If + S + V-ed, S + would + V","vis":["biết (hiện tại, sai thì)","biết (ngôi 3, sai)","để biết (sai ngữ pháp)","biết (quá khứ giả định, đúng)"]},{"q":"32. We need to be more ___ about this problem.","options":["scientific","majestic","domestic","alphabetic"],"answer":0,"vi":"Chúng ta cần khoa học hơn về vấn đề này.","explanation":"\"scientific\" = mang tính khoa học, phù hợp ngữ cảnh.","note":"từ vựng phù hợp ngữ cảnh","vis":["khoa học (đúng)","uy nghi (sai nghĩa)","trong nước, nội địa (sai nghĩa)","theo thứ tự chữ cái (sai nghĩa)"]},{"q":"33. The election campaign has been focused mainly on ___ issues.","options":["dialectical","energetic","domestic","conical"],"answer":2,"vi":"Chiến dịch bầu cử tập trung chủ yếu vào các vấn đề trong nước.","explanation":"\"domestic issues\" = vấn đề trong nước.","note":"adjective + noun","vis":["thuộc biện chứng (sai nghĩa)","tràn đầy năng lượng (sai nghĩa)","trong nước, nội địa (đúng)","hình nón (sai nghĩa)"]},{"q":"34. If I ___ the lottery, I would be a millionaire.","options":["win","wins","winning","won"],"answer":3,"vi":"Nếu tôi trúng số, tôi sẽ trở thành triệu phú.","explanation":"Câu điều kiện loại 2, mệnh đề If dùng quá khứ đơn.","note":"If + S + V-ed, S + would + V","vis":["thắng (hiện tại, sai thì)","thắng (ngôi 3, sai)","đang thắng (V-ing, sai)","thắng (quá khứ giả định, đúng)"]},{"q":"35. I will discuss that problem with him if I ___ him tomorrow.","options":["see","sees","to see","seeing"],"answer":0,"vi":"Tôi sẽ thảo luận vấn đề đó với anh ấy nếu gặp anh ấy vào ngày mai.","explanation":"Câu điều kiện loại 1, chủ ngữ \"I\" → see.","note":"If + I + V(nguyên mẫu), S + will + V","vis":["gặp (hiện tại đơn, đúng — điều kiện loại 1)","gặp (sai chủ ngữ \"I\")","để gặp (sai ngữ pháp)","đang gặp (V-ing, sai)"]},{"q":"36. If I knew Chinese, I ___ for job in China.","options":["will apply","would apply","will be applied","would be applied"],"answer":1,"vi":"Nếu tôi biết tiếng Trung, tôi sẽ nộp đơn xin việc ở Trung Quốc.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"would + V\".","note":"If + S + V-ed, S + would + V","vis":["sẽ nộp đơn (tương lai đơn, sai)","sẽ nộp đơn (điều kiện loại 2, đúng)","sẽ được nộp (bị động, sai)","sẽ được nộp (bị động, sai)"]},{"q":"37. She was unable to find a ___ job.","options":["important","importantly","permanent","permanently"],"answer":2,"vi":"Cô ấy không thể tìm được một công việc ổn định lâu dài.","explanation":"Trước danh từ \"job\" cần tính từ → permanent.","note":"adjective + noun","vis":["quan trọng (tính từ, sai nghĩa)","một cách quan trọng (trạng từ, sai từ loại)","lâu dài, ổn định (tính từ, đúng)","vĩnh viễn (trạng từ, sai từ loại)"]},{"q":"38. Any company found to be breaking these rules will be heavily ___.","options":["fined","done","made","got"],"answer":0,"vi":"Bất kỳ công ty nào vi phạm các quy định này sẽ bị phạt nặng.","explanation":"\"be fined\" = bị phạt tiền.","note":"be + fined (bị động)","vis":["bị phạt tiền (quá khứ phân từ, đúng)","đã làm (sai nghĩa)","đã làm (sai nghĩa)","đã có (sai nghĩa)"]},{"q":"39. These figures are for ___ purposes only.","options":["illustrate","illustrating","illustrative","illustration"],"answer":2,"vi":"Những con số này chỉ nhằm mục đích minh họa.","explanation":"Trước danh từ \"purposes\" cần tính từ → illustrative.","note":"adjective + noun","vis":["minh họa (động từ, sai từ loại)","đang minh họa (V-ing, sai)","mang tính minh họa (tính từ, đúng)","sự minh họa (danh từ, sai từ loại)"]},{"q":"40. I would go jogging with Mark if he ___ here today.","options":["is","will be","were","would be"],"answer":2,"vi":"Tôi sẽ đi chạy bộ cùng Mark nếu hôm nay anh ấy ở đây.","explanation":"Câu điều kiện loại 2, dùng \"were\" cho mọi ngôi.","note":"If + S + were, S + would + V","vis":["là (hiện tại, sai thì)","sẽ là (tương lai, sai)","là (quá khứ giả định, đúng)","sẽ là (sai cấu trúc vế if)"]},{"q":"41. Many species of wildlife are becoming extinct, ___ the rainforests are being destroyed.","options":["therefore","since","consequently","so"],"answer":1,"vi":"Nhiều loài động vật hoang dã đang tuyệt chủng, vì rừng nhiệt đới đang bị phá hủy.","explanation":"Nêu lý do bằng mệnh đề đầy đủ → since.","note":"since + mệnh đề (nguyên nhân)","vis":["do đó (sai vị trí liên kết ý)","bởi vì (sai, đảo ngược quan hệ nhân quả)","do đó, kết quả là (đúng)","vì vậy (sai cấu trúc câu ghép)"]},{"q":"42. Hemp can be used to make paper, ___ it could reduce the need for logging.","options":["consequently","due to","so","since"],"answer":2,"vi":"Cây gai dầu có thể dùng làm giấy, vì vậy nó có thể giảm nhu cầu khai thác gỗ.","explanation":"Nêu kết quả bằng liên từ đẳng lập → so.","note":"S + V, so + S + V (câu ghép)","vis":["do đó (sai cấu trúc)","do (theo sau danh từ, sai cấu trúc)","vì vậy (đúng, nối 2 mệnh đề)","bởi vì (sai, đảo ngược nhân quả)"]},{"q":"43. ___ logging provides jobs and profits, the government is reluctant to control it.","options":["So","Consequently","Since","Due to"],"answer":2,"vi":"Vì khai thác gỗ mang lại việc làm và lợi nhuận nên chính phủ không muốn kiểm soát nó.","explanation":"Nêu lý do đứng đầu câu bằng mệnh đề đầy đủ → Since.","note":"Since + mệnh đề, mệnh đề chính","vis":["vì vậy (sai vị trí đầu câu)","do đó (sai, cần mệnh đề lý do trước)","bởi vì (đúng, mệnh đề lý do đứng đầu)","do (theo sau danh từ, sai cấu trúc)"]},{"q":"44. Hemp was grown throughout history ___ its versatility; it can be used to make many different things.","options":["due to","because","since","as a result"],"answer":0,"vi":"Cây gai dầu được trồng xuyên suốt lịch sử vì tính linh hoạt của nó; nó có thể dùng để làm nhiều thứ khác nhau.","explanation":"Nêu lý do bằng cụm danh từ → due to.","note":"due to + N/cụm danh từ","vis":["do (theo sau danh từ, đúng)","bởi vì (theo sau mệnh đề, sai cấu trúc)","bởi vì (theo sau mệnh đề, sai cấu trúc)","kết quả là (sai vị trí)"]},{"q":"45. Hemp is related to the marijuana plant; ___ it is illegal in many countries.","options":["so","due to","as a result","because"],"answer":2,"vi":"Cây gai dầu có liên quan đến cây cần sa; do đó nó là bất hợp pháp ở nhiều quốc gia.","explanation":"Nêu kết quả sau dấu chấm phẩy → as a result.","note":"S + V; as a result, S + V","vis":["vì vậy (đúng, nối 2 mệnh đề)","do (theo sau danh từ, sai cấu trúc)","kết quả là (sai vị trí câu)","bởi vì (sai, đảo ngược nhân quả)"]},{"q":"46. The polluted chemical waste was dumped into the ocean; ___, the mass of fish died.","options":["because","as","because of","consequently"],"answer":3,"vi":"Chất thải hóa học ô nhiễm bị đổ ra đại dương; do đó, rất nhiều cá đã chết.","explanation":"Nêu kết quả sau dấu chấm phẩy → consequently.","note":"S + V; consequently, S + V","vis":["bởi vì (theo sau mệnh đề, sai cấu trúc với dấu ;)","vì, khi (sai cấu trúc)","bởi vì (theo sau danh từ, sai cấu trúc)","do đó (đúng, sau dấu ;)"]},{"q":"47. It was guessed that the fish died ___ a powerful toxin in the sea water.","options":["because of","because","since","as a result"],"answer":0,"vi":"Người ta phỏng đoán rằng cá chết vì một loại độc tố mạnh trong nước biển.","explanation":"Nêu lý do bằng cụm danh từ → because of.","note":"because of + N","vis":["bởi vì (theo sau danh từ, đúng)","bởi vì (theo sau mệnh đề, sai cấu trúc)","bởi vì (theo sau mệnh đề, sai cấu trúc)","kết quả là (sai nghĩa)"]},{"q":"48. Many species in BC are threatened ___ logging.","options":["so","because","since","due to"],"answer":3,"vi":"Nhiều loài ở British Columbia đang bị đe dọa do khai thác gỗ.","explanation":"Nêu lý do bằng cụm danh từ → due to.","note":"due to + N","vis":["vì vậy (sai cấu trúc)","bởi vì (theo sau mệnh đề, sai cấu trúc)","bởi vì (theo sau mệnh đề, sai cấu trúc)","do (theo sau danh từ, đúng)"]},{"q":"49. Smoking can ___ heart disease.","options":["lead to","create","causes","due to"],"answer":0,"vi":"Hút thuốc có thể dẫn đến bệnh tim.","explanation":"\"lead to\" = dẫn đến.","note":"S + can + lead to + N","vis":["dẫn đến (đúng)","tạo ra (sai cấu trúc/nghĩa)","gây ra (sai chia động từ)","do (sai từ loại, không phải động từ)"]},{"q":"50. Radioactive pollution is increasing ___ the increased use of radioactivity.","options":["as","since","because of","because"],"answer":2,"vi":"Ô nhiễm phóng xạ đang gia tăng do việc sử dụng phóng xạ ngày càng nhiều.","explanation":"Nêu lý do bằng cụm danh từ → because of.","note":"because of + N","vis":["khi, vì (sai nghĩa ở đây)","bởi vì (theo sau mệnh đề, sai cấu trúc)","bởi vì (theo sau danh từ, đúng)","bởi vì (theo sau mệnh đề, sai cấu trúc)"]}],"roman":"III"},{"navLabel":"Word Forms","title":"Cho dạng đúng của từ trong ngoặc (Word Forms)","icon":"spell-check","instructions":"Dùng từ gợi ý trong ngoặc để điền dạng đúng vào chỗ trống.","type":"fill","questions":[{"q":"1. The company must reduce costs to compete ___.","answer":"effectively","hint":"(EFFECT)","family":["effect (n): kết quả","effective (adj): hiệu quả","effectively (adv): một cách hiệu quả"],"vi":"Công ty phải giảm chi phí để cạnh tranh hiệu quả.","explanation":"Trạng từ bổ nghĩa cho động từ \"compete\" → effectively.","note":"V + adverb"},{"q":"2. The small blood vessels in the nose ___ easily.","answer":"bleed","hint":"(BLOOD)","family":["blood (n): máu","bleed (v): chảy máu"],"vi":"Các mạch máu nhỏ trong mũi dễ bị chảy máu.","explanation":"Chủ ngữ số nhiều \"vessels\" cần động từ → bleed.","note":"plural subject + V (nguyên mẫu)"},{"q":"3. The barriers gave way under the ___ of the crowd.","answer":"pressure","hint":"(PRESS)","family":["press (v): ép, nhấn","pressure (n): áp lực"],"vi":"Rào chắn sập xuống dưới áp lực của đám đông.","explanation":"Sau \"the\" cần danh từ → pressure.","note":"the + noun"},{"q":"4. Filters do not remove all ___ from water.","answer":"contaminants","hint":"(CONTAMINATE)","family":["contaminate (v): làm bẩn","contaminant (n): chất gây bẩn","contamination (n): sự ô nhiễm"],"vi":"Bộ lọc không loại bỏ hết mọi chất gây bẩn khỏi nước.","explanation":"Sau \"all\" cần danh từ số nhiều → contaminants.","note":"all + plural noun"},{"q":"5. I will use one recent example as an ___.","answer":"illustration","hint":"(ILLUSTRATE)","family":["illustrate (v): minh họa","illustration (n): sự minh họa","illustrative (adj): có tính minh họa"],"vi":"Tôi sẽ dùng một ví dụ gần đây để minh họa.","explanation":"Sau \"an\" cần danh từ → illustration.","note":"an + noun"},{"q":"6. I’ll need to take your waist ___.","answer":"measurement","hint":"(MEASURE)","family":["measure (v): đo","measurement (n): số đo, phép đo"],"vi":"Tôi cần đo vòng eo của bạn.","explanation":"Sau \"waist\" cần danh từ → measurement.","note":"noun + noun (danh từ ghép)"},{"q":"7. We no longer talk of the ___ of marriage.","answer":"permanence","hint":"(PERMANENT)","family":["permanent (adj): vĩnh viễn","permanence (n): tính vĩnh cửu","permanently (adv): vĩnh viễn"],"vi":"Chúng ta không còn nói về tính vĩnh cửu của hôn nhân nữa.","explanation":"Sau \"the\" cần danh từ → permanence.","note":"the + noun"},{"q":"8. There are various ___ available for this condition.","answer":"treatments","hint":"(TREAT)","family":["treat (v): điều trị","treatment (n): sự điều trị"],"vi":"Có nhiều phương pháp điều trị cho tình trạng này.","explanation":"Chủ ngữ số nhiều sau \"various\" → treatments.","note":"various + plural noun"},{"q":"9. They emit 90% less ___ than standard models.","answer":"pollution","hint":"(POLLUTE)","family":["pollute (v): gây ô nhiễm","pollution (n): sự ô nhiễm","pollutant (n): chất gây ô nhiễm"],"vi":"Chúng thải ra ít ô nhiễm hơn 90% so với các mẫu tiêu chuẩn.","explanation":"Sau \"less\" cần danh từ không đếm được → pollution.","note":"less + noun không đếm được"},{"q":"10. It is important to take precise ___ of the structure.","answer":"measurements","hint":"(MEASURE)","family":["measure (v): đo","measurement (n): số đo"],"vi":"Việc đo đạc chính xác cấu trúc là rất quan trọng.","explanation":"Sau tính từ \"precise\" cần danh từ số nhiều → measurements.","note":"adjective + plural noun"},{"q":"11. The college is close to Edinburgh’s ___ castle.","answer":"majestic","hint":"(MAJESTY)","family":["majesty (n): sự uy nghi","majestic (adj): uy nghi"],"vi":"Trường cao đẳng nằm gần lâu đài uy nghi của Edinburgh.","explanation":"Trước danh từ \"castle\" cần tính từ → majestic.","note":"adjective + noun"},{"q":"12. The centre offers activities for everyone, whatever your age or ___ condition.","answer":"physical","hint":"(PHYSICS)","family":["physics (n): vật lý học","physical (adj): thuộc thể chất"],"vi":"Trung tâm cung cấp hoạt động cho mọi người, bất kể tuổi tác hay tình trạng thể chất.","explanation":"Trước danh từ \"condition\" cần tính từ → physical.","note":"adjective + noun"},{"q":"13. ___ treatment with chlorine provides some protection against contamination.","answer":"Chemical","hint":"(CHEMISTRY)","family":["chemistry (n): hóa học","chemical (adj): thuộc hóa học"],"vi":"Xử lý hóa học bằng clo giúp bảo vệ phần nào khỏi ô nhiễm.","explanation":"Trước danh từ \"treatment\" cần tính từ → Chemical.","note":"adjective + noun"},{"q":"14. It was a ___ conclusion from the child’s point of view.","answer":"logical","hint":"(LOGIC)","family":["logic (n): lô-gic","logical (adj): hợp lý, lô-gic"],"vi":"Đó là một kết luận hợp lý theo quan điểm của đứa trẻ.","explanation":"Trước danh từ \"conclusion\" cần tính từ → logical.","note":"adjective + noun"},{"q":"15. They met to discuss matters of ___ interest.","answer":"topical","hint":"(TOPIC)","family":["topic (n): chủ đề","topical (adj): thời sự, đang được quan tâm"],"vi":"Họ gặp nhau để bàn về những vấn đề thời sự.","explanation":"Trước danh từ \"interest\" cần tính từ → topical.","note":"adjective + noun"},{"q":"16. I think I’d prefer something a little less ___.","answer":"energetic","hint":"(ENERGY)","family":["energy (n): năng lượng","energetic (adj): tràn đầy năng lượng"],"vi":"Tôi nghĩ tôi thích thứ gì đó ít năng động hơn một chút.","explanation":"Sau \"less\" cần tính từ → energetic.","note":"less + adjective"},{"q":"17. The students return in October for the start of the new ___ year.","answer":"academic","hint":"(ACADEMY)","family":["academy (n): học viện","academic (adj): thuộc học thuật"],"vi":"Sinh viên quay lại trường vào tháng 10 để bắt đầu năm học mới.","explanation":"Trước danh từ \"year\" cần tính từ → academic.","note":"adjective + noun"},{"q":"18. Events could have developed in a ___ different way.","answer":"dramatically","hint":"(DRAMA)","family":["drama (n): kịch","dramatic (adj): kịch tính","dramatically (adv): một cách kịch tính, đáng kể"],"vi":"Sự việc có thể đã diễn biến theo một cách hoàn toàn khác.","explanation":"Trạng từ bổ nghĩa cho tính từ \"different\" → dramatically.","note":"adverb + adjective"},{"q":"19. The breakdown was due to a ___ failure.","answer":"mechanical","hint":"(MECHANIC)","family":["mechanic (n): thợ máy","mechanical (adj): thuộc cơ khí"],"vi":"Sự cố là do trục trặc kỹ thuật.","explanation":"Trước danh từ \"failure\" cần tính từ → mechanical.","note":"adjective + noun"},{"q":"20. I suspect that he was dismissed for ___ reasons.","answer":"political","hint":"(POLITICS)","family":["politics (n): chính trị","political (adj): thuộc chính trị"],"vi":"Tôi nghi rằng anh ta bị sa thải vì lý do chính trị.","explanation":"Trước danh từ \"reasons\" cần tính từ → political.","note":"adjective + noun"}],"roman":"IV"},{"navLabel":"Verb Forms","title":"Chia đúng dạng của động từ trong ngoặc","icon":"pen","instructions":"Đọc kỹ từng câu và chia đúng dạng của động từ trong ngoặc (câu điều kiện loại 1 hoặc loại 2).","type":"fill","questions":[{"q":"1. If people (be) ___ fully aware of the dangers of air pollution, they (damage) ___ the atmosphere this way.","answer":"were / wouldn’t damage","accepted":["were / would not damage","were / wouldn’t damage","were would not damage","were wouldn’t damage","were, would not damage","were, wouldn’t damage"],"vi":"Nếu mọi người ý thức đầy đủ về mối nguy hiểm của ô nhiễm không khí, họ sẽ không làm hại bầu khí quyển theo cách này.","explanation":"Câu điều kiện loại 2: If + S + were, S + wouldn’t + V."},{"q":"2. If I (be) ___ you, I (turn) ___ the volume down for him to sleep.","answer":"were / would turn","accepted":["were / would turn","were would turn","were, would turn"],"vi":"Nếu tôi là bạn, tôi sẽ vặn nhỏ âm lượng để anh ấy ngủ.","explanation":"Câu điều kiện loại 2: If I were you, I would + V."},{"q":"3. We (not be) ___ able to drink that water if it is not refined.","answer":"won’t be","accepted":["will not be","won’t be"],"vi":"Chúng ta sẽ không thể uống nước đó nếu nó không được lọc sạch.","explanation":"Câu điều kiện loại 1: mệnh đề If ở hiện tại đơn (\"is not refined\") → mệnh đề chính dùng tương lai đơn phủ định."},{"q":"4. If you (reduce) ___ the number of bulbs in your house, you (pay) ___ less money for the electricity bill next month.","answer":"reduce / will pay","accepted":["reduce / will pay","reduce will pay","reduce, will pay"],"vi":"Nếu bạn giảm số bóng đèn trong nhà, bạn sẽ trả ít tiền điện hơn vào tháng tới.","explanation":"Câu điều kiện loại 1: If + S + V(s/es), S + will + V."},{"q":"5. If many animals and plants die, it (unbalance) ___ our ecosystem.","answer":"will unbalance","vi":"Nếu nhiều loài động thực vật chết đi, nó sẽ làm mất cân bằng hệ sinh thái của chúng ta.","explanation":"Câu điều kiện loại 1: mệnh đề chính dùng tương lai đơn."},{"q":"6. I’ll only stay if you (offer) ___ me more money.","answer":"offer","vi":"Tôi sẽ chỉ ở lại nếu bạn trả tôi nhiều tiền hơn.","explanation":"Câu điều kiện loại 1: mệnh đề If dùng hiện tại đơn."},{"q":"7. If anyone (call) ___, tell them I’m not at home.","answer":"calls","vi":"Nếu có ai gọi, hãy bảo họ rằng tôi không có ở nhà.","explanation":"Câu điều kiện loại 1: chủ ngữ số ít \"anyone\" → calls."},{"q":"8. If he (improve) ___ his IT skills, he’d easily get a job.","answer":"improved","vi":"Nếu anh ấy cải thiện kỹ năng công nghệ thông tin, anh ấy sẽ dễ dàng có việc làm.","explanation":"Câu điều kiện loại 2: mệnh đề If dùng quá khứ đơn."},{"q":"9. If I was in charge, I (do) ___ things differently.","answer":"would do","vi":"Nếu tôi là người phụ trách, tôi sẽ làm mọi việc theo cách khác.","explanation":"Câu điều kiện loại 2 (dạng thân mật, dùng \"was\"): mệnh đề chính dùng \"would + V\"."},{"q":"10. She (glare) ___ at me if I go near her desk.","answer":"glares","vi":"Cô ấy sẽ trừng mắt nhìn tôi nếu tôi đến gần bàn của cô ấy.","explanation":"Diễn tả một sự thật/thói quen chung: mệnh đề chính và mệnh đề If đều dùng hiện tại đơn."},{"q":"11. If I were you, I (not do) ___ that.","answer":"wouldn’t do","accepted":["would not do","wouldn’t do"],"vi":"Nếu tôi là bạn, tôi sẽ không làm điều đó.","explanation":"Câu điều kiện loại 2: If I were you, I wouldn’t + V."},{"q":"12. If I (have) ___ more time, I would do more on my websites.","answer":"had","vi":"Nếu tôi có nhiều thời gian hơn, tôi sẽ làm được nhiều việc hơn cho trang web của mình.","explanation":"Câu điều kiện loại 2: mệnh đề If dùng quá khứ đơn."},{"q":"13. If I were a rich man, I (buy) ___ a home like palace.","answer":"would buy","vi":"Nếu tôi là người giàu có, tôi sẽ mua một ngôi nhà như cung điện.","explanation":"Câu điều kiện loại 2: mệnh đề chính dùng \"would + V\"."},{"q":"14. If I (speak) ___ English very well, I would look for a job in foreign companies.","answer":"could speak","vi":"Nếu tôi nói tiếng Anh thật giỏi, tôi sẽ tìm việc ở các công ty nước ngoài.","explanation":"Câu điều kiện loại 2, diễn tả khả năng: mệnh đề If dùng \"could + V\"."},{"q":"15. If I (understand) ___ what the teacher said, I could tell you.","answer":"understood","vi":"Nếu tôi hiểu điều giáo viên nói, tôi đã có thể kể cho bạn nghe.","explanation":"Câu điều kiện loại 2: mệnh đề If dùng quá khứ đơn."},{"q":"16. If I (have) ___ time, I (finish) ___ that letter.","answer":"have / will finish","accepted":["have / will finish","have will finish","have, will finish"],"vi":"Nếu tôi có thời gian, tôi sẽ hoàn thành lá thư đó.","explanation":"Câu điều kiện loại 1: If + S + have, S + will + V."},{"q":"17. What ___ if you (miss) ___ the plane?","answer":"will you do / miss","accepted":["will you do / miss","will you do miss","will you do, miss"],"vi":"Bạn sẽ làm gì nếu lỡ chuyến bay?","explanation":"Câu điều kiện loại 1 dạng câu hỏi: What will + S + V…if + S + V(hiện tại đơn)?","note":"What will + S + V + if + S + V(hiện tại)?"},{"q":"18. Nobody (notice) ___ if you (make) ___ a mistake.","answer":"will notice / make","accepted":["will notice / make","will notice make","will notice, make"],"vi":"Sẽ không ai để ý nếu bạn mắc lỗi.","explanation":"Câu điều kiện loại 1: mệnh đề chính dùng tương lai đơn, mệnh đề If dùng hiện tại đơn."},{"q":"19. If you (drop) ___ that glass, it (break) ___.","answer":"drop / will break","accepted":["drop / will break","drop will break","drop, will break"],"vi":"Nếu bạn làm rơi ly đó, nó sẽ vỡ.","explanation":"Câu điều kiện loại 1: If + S + V(hiện tại), S + will + V."},{"q":"20. If you (not leave) ___, I (call) ___ the police.","answer":"don’t leave / will call","accepted":["do not leave / will call","do not leave will call","do not leave, will call","don’t leave / will call","don’t leave will call","don’t leave, will call"],"vi":"Nếu bạn không rời đi, tôi sẽ gọi cảnh sát.","explanation":"Câu điều kiện loại 1: If + S + don’t + V, S + will + V."}],"roman":"V"},{"navLabel":"Sửa lỗi","title":"Tìm lỗi sai (A, B, C hoặc D)","icon":"wrench","instructions":"Mỗi câu có 4 phần gạch chân A, B, C, D. Chọn phần chứa lỗi sai. Chọn xong sẽ hiện đúng/sai, đáp án và công thức ngay. Lưu ý: tài liệu gốc chỉ đánh dấu 4 vị trí A/B/C/D bằng nhãn dưới câu (không gạch chân trực tiếp); các cụm A/B/C/D được chia lại hợp lý dựa theo đáp án lỗi sai cho sẵn (RECONSTRUCTED).","type":"mcq","instant":true,"questions":[{"q":"1. <u>When</u> <u>it stopped raining,</u> <u>I would go</u> <u>to see him</u>.","options":["When","it stopped raining,","I would go","to see him"],"answer":0,"vi":"Nếu trời tạnh mưa, tôi sẽ đi gặp anh ấy.","explanation":"Đây là câu điều kiện, không phải mệnh đề thời gian → When phải sửa thành If.","note":"If + S + V-ed, S + would + V","vis":["khi","trời ngừng mưa,","tôi sẽ đi","để gặp anh ấy"]},{"q":"2. <u>You would miss</u> <u>the bus</u> <u>if you wouldn’t hurry</u> <u>up</u>.","options":["You would miss","the bus","if you wouldn’t hurry","up"],"answer":2,"vi":"Bạn sẽ lỡ xe buýt nếu không nhanh lên.","explanation":"Câu điều kiện loại 2, mệnh đề If dùng quá khứ đơn (không dùng \"would\") → wouldn’t hurry phải sửa thành didn’t hurry.","note":"if + S + didn’t + V (mệnh đề If, không dùng would)","vis":["bạn sẽ lỡ","chuyến xe buýt","nếu bạn không vội (sai — cần quá khứ đơn)","lên (hurry up)"]},{"q":"3. <u>How much</u> <u>would it be</u> <u>if I pay</u> <u>by cheque?</u>","options":["How much","would it be","if I pay","by cheque?"],"answer":2,"vi":"Sẽ tốn bao nhiêu nếu tôi trả bằng séc?","explanation":"Câu điều kiện loại 2, mệnh đề If dùng quá khứ đơn → if I pay phải sửa thành if I paid.","note":"if + S + V-ed (mệnh đề If, quá khứ đơn)","vis":["bao nhiêu","sẽ là","nếu tôi trả (sai — cần quá khứ đơn)","bằng séc?"]},{"q":"4. <u>If I were you,</u> <u>I will go</u> <u>jogging</u> <u>every morning</u>.","options":["If I were you,","I will go","jogging","every morning"],"answer":1,"vi":"Nếu tôi là bạn, tôi sẽ đi chạy bộ mỗi sáng.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"would\" → I will go phải sửa thành I would go.","note":"If I were you, I would + V","vis":["nếu tôi là bạn,","tôi sẽ đi (sai — cần \"would\")","chạy bộ","mỗi sáng"]},{"q":"5. <u>He should go</u> <u>to the concert</u> <u>if you gave</u> <u>him your ticket</u>.","options":["He should go","to the concert","if you gave","him your ticket"],"answer":0,"vi":"Anh ấy sẽ đi xem buổi hòa nhạc nếu bạn đưa vé cho anh ấy.","explanation":"Câu điều kiện loại 2, mệnh đề chính dùng \"would\" → He should go phải sửa thành He would go.","note":"If + S + V-ed, S + would + V","vis":["anh ấy nên đi (sai — cần \"would\")","đến buổi hòa nhạc","nếu bạn đưa","vé của bạn cho anh ấy"]},{"q":"6. <u>We might buy</u> <u>a larger house</u> <u>when we had</u> <u>more money</u>.","options":["We might buy","a larger house","when we had","more money"],"answer":2,"vi":"Chúng tôi có thể sẽ mua một ngôi nhà lớn hơn nếu có nhiều tiền hơn.","explanation":"Đây là câu điều kiện giả định, không phải mệnh đề thời gian → when phải sửa thành if.","note":"if + S + V-ed (điều kiện giả định)","vis":["chúng tôi có thể mua","một ngôi nhà lớn hơn","khi chúng tôi có (sai — cần \"if\")","nhiều tiền hơn"]},{"q":"7. <u>Education has been</u> <u>severely effected</u> <u>by</u> <u>the war</u>.","options":["Education has been","severely effected","by","the war"],"answer":1,"vi":"Giáo dục đã bị ảnh hưởng nghiêm trọng bởi chiến tranh.","explanation":"\"affect\" (động từ) = ảnh hưởng đến; \"effect\" là danh từ → effected phải sửa thành affected.","note":"affect (v) ≠ effect (n)","vis":["giáo dục đã bị","ảnh hưởng nghiêm trọng (sai — cần \"affected\")","bởi","chiến tranh"]},{"q":"8. <u>Unemployment</u> <u>is a major</u> <u>cause</u> <u>poverty</u>.","options":["Unemployment","is a major","cause","poverty"],"answer":2,"vi":"Thất nghiệp là một nguyên nhân chính gây ra nghèo đói.","explanation":"\"cause\" khi là danh từ cần giới từ \"of\" trước tân ngữ → cause phải sửa thành cause of.","note":"a cause of + N","vis":["thất nghiệp","là một","nguyên nhân (sai — thiếu giới từ \"of\")","nghèo đói"]},{"q":"9. <u>They were accused</u> <u>of contaminate</u> <u>the minds</u> <u>of our young people</u>.","options":["They were accused","of contaminate","the minds","of our young people"],"answer":1,"vi":"Họ bị cáo buộc đầu độc tâm trí giới trẻ.","explanation":"Sau giới từ \"of\" cần V-ing → contaminate phải sửa thành contaminating.","note":"be accused of + V-ing","vis":["họ bị buộc tội","làm ô nhiễm (sai — sau \"of\" cần V-ing)","tâm trí","của giới trẻ chúng ta"]},{"q":"10. <u>He is showing</u> <u>these silent films</u> <u>to help illustrating</u> <u>his story of survival</u>.","options":["He is showing","these silent films","to help illustrating","his story of survival"],"answer":2,"vi":"Anh ấy đang chiếu những bộ phim câm này để giúp minh họa câu chuyện sinh tồn của mình.","explanation":"\"help\" theo sau bởi V-inf (có hoặc không \"to\") → illustrating phải sửa thành illustrate.","note":"help + (to) V-inf","vis":["anh ấy đang chiếu","những bộ phim câm này","để giúp minh họa (sai — sau \"help\" không thêm -ing)","câu chuyện sinh tồn của mình"]},{"q":"11. <u>The photographs she takes</u> <u>are a vision</u> <u>record of</u> <u>her travels</u>.","options":["The photographs she takes","are a vision","record of","her travels"],"answer":1,"vi":"Những bức ảnh cô ấy chụp là một ghi chép hình ảnh về những chuyến đi của cô ấy.","explanation":"Trước danh từ \"record\" cần tính từ → vision phải sửa thành visual.","note":"adjective (visual) + noun","vis":["những bức ảnh cô ấy chụp","là một (sai — cần tính từ \"visual\")","bản ghi lại","những chuyến đi của cô ấy"]},{"q":"12. <u>Constant exposure</u> <u>to noise pollution</u> <u>will lead in</u> <u>the loss of hearing</u>.","options":["Constant exposure","to noise pollution","will lead in","the loss of hearing"],"answer":2,"vi":"Việc tiếp xúc liên tục với ô nhiễm tiếng ồn sẽ dẫn đến mất thính lực.","explanation":"\"lead to\" = dẫn đến → will lead in phải sửa thành will lead to.","note":"lead to + N","vis":["việc tiếp xúc liên tục","với ô nhiễm tiếng ồn","sẽ dẫn đến (sai giới từ — cần \"to\")","sự mất thính lực"]},{"q":"13. <u>Because of</u> <u>we turned on</u> <u>a lot of bulbs,</u> <u>our eyes got strained</u>.","options":["Because of","we turned on","a lot of bulbs,","our eyes got strained"],"answer":0,"vi":"Vì chúng tôi bật rất nhiều bóng đèn nên mắt bị mỏi.","explanation":"\"because\" (liên từ) đứng trước mệnh đề đầy đủ, \"because of\" đứng trước cụm danh từ → Because of phải sửa thành Because.","note":"because + mệnh đề (S+V)","vis":["bởi vì (sai — cần liên từ \"Because\")","chúng tôi đã bật","nhiều bóng đèn,","mắt chúng tôi bị mỏi"]},{"q":"14. <u>If he reads this article,</u> <u>I guess that</u> <u>he would never do</u> <u>any harms to environment any more</u>.","options":["If he reads this article,","I guess that","he would never do","any harms to environment any more"],"answer":2,"vi":"Nếu anh ấy đọc bài báo này, tôi đoán anh ấy sẽ không bao giờ gây hại cho môi trường nữa.","explanation":"Câu điều kiện loại 1 (mệnh đề If dùng hiện tại đơn \"reads\") → mệnh đề chính dùng \"will\" → would never do phải sửa thành will never do.","note":"If + S + V(hiện tại), S + will + V","vis":["nếu anh ấy đọc bài báo này,","tôi đoán rằng","anh ấy sẽ không bao giờ làm (sai thì — cần \"will\")","bất kỳ tổn hại nào đến môi trường nữa"]},{"q":"15. <u>The local citizens</u> <u>would be very happy</u> <u>if they were supplied with</u> <u>a clean water</u>.","options":["The local citizens","would be very happy","if they were supplied with","a clean water"],"answer":3,"vi":"Người dân địa phương sẽ rất vui nếu được cung cấp nước sạch.","explanation":"\"water\" là danh từ không đếm được, không dùng mạo từ \"a\" → a clean water phải sửa thành clean water.","note":"danh từ không đếm được (không có mạo từ a/an)","vis":["người dân địa phương","sẽ rất vui","nếu họ được cung cấp","nước sạch (sai — danh từ không đếm được, bỏ \"a\")"]},{"q":"16. <u>If the environment were not polluted,</u> <u>birds wouldn’t leave</u> <u>their habitats and plants</u> <u>would die</u>.","options":["If the environment were not polluted,","birds wouldn’t leave","their habitats and plants","would die"],"answer":3,"vi":"Nếu môi trường không bị ô nhiễm, chim sẽ không rời bỏ môi trường sống và cây cối sẽ không chết.","explanation":"Cấu trúc song song với \"wouldn’t leave\" → would die phải sửa thành wouldn’t die.","note":"cấu trúc song song: wouldn’t + V, wouldn’t + V","vis":["nếu môi trường không bị ô nhiễm,","chim sẽ không rời","môi trường sống của chúng và cây cối","sẽ chết (sai — thiếu phủ định \"wouldn't\")"]},{"q":"17. <u>The door</u> <u>will be unlock</u> <u>if you press</u> <u>the green button</u>.","options":["The door","will be unlock","if you press","the green button"],"answer":1,"vi":"Cửa sẽ được mở khóa nếu bạn bấm nút xanh.","explanation":"Bị động \"will be + V3\" → unlock phải sửa thành unlocked.","note":"will be + V3 (bị động)","vis":["cánh cửa","sẽ được mở khóa (sai dạng động từ — cần \"unlocked\")","nếu bạn nhấn","nút màu xanh"]},{"q":"18. <u>We’ll have</u> <u>a long way to walking</u> <u>if we run out to</u> <u>petrol here</u>.","options":["We’ll have","a long way to walking","if we run out","to petrol here"],"answer":3,"vi":"Chúng ta sẽ phải đi bộ một quãng đường dài nếu hết xăng ở đây.","explanation":"\"run out of\" = hết (cái gì) → run out to phải sửa thành run out of.","note":"run out of + N","vis":["chúng tôi sẽ có","một quãng đường dài để đi bộ (sai dạng động từ — cần \"to walk\")","nếu chúng tôi hết (sai — thiếu giới từ \"of\")","xăng ở đây"]},{"q":"19. <u>If someone offered to buy you</u> <u>one of those rings,</u> <u>which one</u> <u>would you choosing?</u>","options":["If someone offered to buy you","one of those rings,","which one","would you choosing?"],"answer":3,"vi":"Nếu ai đó đề nghị mua cho bạn một trong những chiếc nhẫn đó, bạn sẽ chọn chiếc nào?","explanation":"Sau trợ động từ \"would\" cần động từ nguyên mẫu → would you choosing phải sửa thành would you choose.","note":"would + S + V-inf? (câu hỏi)","vis":["nếu ai đó đề nghị mua cho bạn","một trong những chiếc nhẫn đó,","cái nào","bạn sẽ chọn? (sai dạng động từ — cần \"choose\")"]},{"q":"20. <u>The flight</u> <u>may to be cancelled</u> <u>if the fog</u> <u>gets thick</u>.","options":["The flight","may to be cancelled","if the fog","gets thick"],"answer":1,"vi":"Chuyến bay có thể sẽ bị hủy nếu sương mù dày đặc.","explanation":"\"may\" là động từ khiếm khuyết, theo sau là động từ nguyên mẫu không \"to\" → may to be phải sửa thành may be.","note":"may + V-inf (không \"to\")","vis":["chuyến bay","có thể bị hủy (sai — thừa \"to\" sau \"may\")","nếu sương mù","dày lên"]}],"roman":"VI"},{"navLabel":"Đọc hiểu 1","title":"Đọc hiểu – Ba loại ô nhiễm chính","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"Three Main Types of Pollution","html":"There are three main <b>(1)</b> ___ of pollution: air pollution, water pollution and noise pollution. Air, which is the most important element of our environment for our <b>(2)</b> ___, can be polluted in many ways. Smoke in the air from mills, factories and industry <b>(3)</b> ___ carbon, monoxide, carbon dioxide, and methane, which are all poisonous gases. This leads <b>(4)</b> ___ health problems like asthma and lung diseases, and the thinning of the ozone layer, which <b>(5)</b> ___ us from harmful UV ray. China, the USA, Russia, India, Mexico and Japan are the world leaders in air pollution <b>(6)</b> ___. Water is also polluted by the discharge of commercial and industrial waste. Sewage in drinking water is another <b>(7)</b> ___ of water pollution as it contains germs and viruses. The noise of vehicles, mills, and factories can be really unbearable. This kind of constant sound also <b>(8)</b> ___ headaches, tension, <b>(9)</b> ___ stress and migraines. People living next to a building site where there is too much noise can become sick, as they cannot sleep or relax. This is <b>(10)</b> ___ noise pollution.","vi":"Có ba <b>(1)</b> ___ loại ô nhiễm chính: ô nhiễm không khí, ô nhiễm nước và ô nhiễm tiếng ồn. Không khí, yếu tố quan trọng nhất của môi trường đối với <b>(2)</b> ___ sự sống còn của chúng ta, có thể bị ô nhiễm theo nhiều cách. Khói trong không khí từ nhà máy, xí nghiệp <b>(3)</b> ___ chứa carbon monoxide, carbon dioxide và methane, đều là các khí độc. Điều này <b>(4)</b> ___ dẫn đến các vấn đề sức khỏe như hen suyễn, bệnh phổi, và làm tầng ozone mỏng đi, vốn <b>(5)</b> ___ bảo vệ chúng ta khỏi tia UV có hại. Trung Quốc, Mỹ, Nga, Ấn Độ, Mexico và Nhật Bản là những nước dẫn đầu thế giới về <b>(6)</b> ___ khí thải ô nhiễm không khí. Nước cũng bị ô nhiễm do xả thải thương mại và công nghiệp. Nước thải trong nước uống là một <b>(7)</b> ___ nguyên nhân khác gây ô nhiễm nước vì nó chứa vi trùng và vi-rút. Tiếng ồn từ xe cộ, nhà máy, xí nghiệp có thể thực sự khó chịu đựng. Loại âm thanh liên tục này cũng <b>(8)</b> ___ gây đau đầu, căng thẳng, căng thẳng <b>(9)</b> ___ tinh thần và chứng đau nửa đầu. Người sống gần công trường xây dựng ồn ào có thể bị ốm vì không ngủ hay thư giãn được. Đây <b>(10)</b> ___ được gọi là ô nhiễm tiếng ồn."},"questions":[{"q":"1. There are three main (1) ___ of pollution: air, water and noise pollution.","options":["types","kinds","models","both A & B"],"answer":3,"vi":"Có ba loại ô nhiễm chính: ô nhiễm không khí, nước và tiếng ồn.","explanation":"\"types\" và \"kinds\" đều có thể dùng ở đây với nghĩa tương đương → both A & B.","vis":["loại (đúng)","loại (đúng nghĩa nhưng không kết hợp)","mô hình (sai nghĩa)","cả A và B (đúng — cả hai đều hợp nghĩa)"]},{"q":"2. Air…can be polluted in many ways, is the most important element of our environment for our (2) ___.","options":["survival","survive","surviving","survived"],"answer":0,"vi":"Không khí là yếu tố quan trọng nhất của môi trường đối với sự sống còn của chúng ta.","explanation":"Sau tính từ sở hữu \"our\" cần danh từ → survival.","vis":["sự sống còn (danh từ, đúng)","sống sót (động từ, sai từ loại)","đang sống sót (V-ing, sai)","đã sống sót (quá khứ, sai)"]},{"q":"3. Smoke in the air from mills, factories and industry (3) ___ carbon, monoxide, carbon dioxide, and methane.","options":["includes","include","contains","contain"],"answer":2,"vi":"Khói trong không khí từ nhà máy, xí nghiệp chứa carbon monoxide, carbon dioxide và methane.","explanation":"Chủ ngữ số ít \"Smoke\" → contains (chứa).","vis":["bao gồm (sai — chủ ngữ số ít \"smoke\")","bao gồm (sai chia)","chứa (đúng — chủ ngữ số ít \"smoke\")","chứa (sai chia)"]},{"q":"4. This leads (4) ___ health problems like asthma and lung diseases.","options":["in","into","to","from"],"answer":2,"vi":"Điều này dẫn đến các vấn đề sức khỏe như hen suyễn và bệnh phổi.","explanation":"\"lead to\" = dẫn đến.","vis":["trong (sai giới từ)","vào trong (sai giới từ)","đến (đúng — lead to)","từ (sai giới từ)"]},{"q":"5. …the thinning of the ozone layer, which (5) ___ us from harmful UV ray.","options":["prevents","protects","avoids","hides"],"answer":1,"vi":"…tầng ozone mỏng đi, vốn bảo vệ chúng ta khỏi tia UV có hại.","explanation":"\"protect somebody from something\" = bảo vệ ai khỏi cái gì.","vis":["ngăn chặn (sai — không đi với \"from\" theo nghĩa bảo vệ)","bảo vệ (đúng — protect from)","tránh (sai nghĩa)","giấu (sai nghĩa)"]},{"q":"6. China, the USA, Russia, India, Mexico and Japan are the world leaders in air pollution (6) ___.","options":["emissions","emitted","emission","emitting"],"answer":0,"vi":"Trung Quốc, Mỹ, Nga, Ấn Độ, Mexico và Nhật Bản là những nước dẫn đầu thế giới về lượng khí thải ô nhiễm không khí.","explanation":"Sau danh từ \"pollution\" cần thêm danh từ số nhiều → emissions.","vis":["sự phát thải (danh từ, đúng)","đã phát thải (quá khứ phân từ, sai)","sự phát thải (danh từ số ít, sai ngữ cảnh)","đang phát thải (V-ing, sai)"]},{"q":"7. Sewage in drinking water is another (7) ___ of water pollution as it contains germs and viruses.","options":["effect","cause","result","consequence"],"answer":1,"vi":"Nước thải trong nước uống là một nguyên nhân khác gây ô nhiễm nước vì nó chứa vi trùng và vi-rút.","explanation":"\"cause of\" = nguyên nhân của.","vis":["hiệu ứng, kết quả (sai nghĩa)","nguyên nhân (đúng)","kết quả (sai nghĩa)","hậu quả (sai nghĩa)"]},{"q":"8. This kind of constant sound also (8) ___ headaches, tension, stress and migraines.","options":["causes","leads to","results in","all are correct"],"answer":3,"vi":"Loại âm thanh liên tục này cũng gây ra đau đầu, căng thẳng và chứng đau nửa đầu.","explanation":"Cả ba cụm từ \"causes/leads to/results in\" đều có nghĩa \"gây ra\" và đều đúng ngữ pháp → all are correct.","vis":["gây ra (đúng một phần)","dẫn đến (đúng một phần)","dẫn đến (đúng một phần)","tất cả đều đúng (đúng)"]},{"q":"9. …stress and migraines… (9) ___ stress.","options":["brain","mind","head","mental"],"answer":3,"vi":"…căng thẳng tinh thần và chứng đau nửa đầu.","explanation":"Trước danh từ \"stress\" cần tính từ → mental (thuộc tinh thần).","vis":["não (sai nghĩa)","tâm trí (sai nghĩa)","đầu (sai nghĩa)","thuộc tinh thần (đúng — mental stress)"]},{"q":"10. People living next to a building site…can become sick…This is (10) ___ noise pollution.","options":["told","called","said","mentioned"],"answer":1,"vi":"Người sống gần công trường xây dựng…có thể bị ốm…Đây được gọi là ô nhiễm tiếng ồn.","explanation":"\"This is called + N\" = điều này được gọi là.","vis":["được kể (sai nghĩa)","được gọi là (đúng)","được nói (sai nghĩa)","được đề cập (sai nghĩa)"]}],"roman":"VII"},{"navLabel":"Đọc hiểu 2a","title":"Đọc hiểu – The Ozone Layer","icon":"book-open","instructions":"Đọc đoạn văn và trả lời các câu hỏi bằng tiếng Anh.","type":"sentence","instant":true,"passage":{"title":"The Ozone Layer","html":"Scientists have discovered that the ozone layer is getting thinner. Some predict that the sun’s rays will cause a sharp increase in deaths from skin cancer over the next fifty years. These harmful rays can also damage the eyes, create wrinkles, and cause other health problems.<br><br>The stratosphere contains a form of oxygen called ozone. Ozone is a molecule composed of three oxygen atoms. The chemical formula of ozone is O3. Oxygen molecules make up about 21% of all gases in the Earth’s atmosphere. They consist of two atoms of oxygen and are labeled O2. Most ozone found in our atmosphere is formed by an interaction between oxygen molecules and ultraviolet radiation (UV) from the sun. When ultraviolet radiation hits an oxygen molecule, it may cause the molecule to break apart into single atoms of oxygen. These single atoms are very reactive, and a single oxygen atom can combine with a molecule of oxygen to form ozone.","vi":"Các nhà khoa học đã phát hiện ra tầng ozone đang mỏng dần. Một số dự đoán tia mặt trời sẽ khiến số ca tử vong do ung thư da tăng mạnh trong 50 năm tới. Những tia có hại này cũng có thể làm tổn thương mắt, gây nếp nhăn và các vấn đề sức khỏe khác.<br><br>Tầng bình lưu chứa một dạng oxy gọi là ozone. Ozone là một phân tử gồm ba nguyên tử oxy. Công thức hóa học của ozone là O3. Phân tử oxy chiếm khoảng 21% tổng lượng khí trong khí quyển Trái Đất. Chúng gồm hai nguyên tử oxy và được ký hiệu là O2. Hầu hết ozone trong khí quyển được hình thành từ phản ứng giữa phân tử oxy và bức xạ cực tím (UV) từ mặt trời. Khi bức xạ cực tím va chạm với phân tử oxy, nó có thể khiến phân tử đó tách ra thành các nguyên tử oxy đơn lẻ. Các nguyên tử đơn lẻ này rất dễ phản ứng, và một nguyên tử oxy có thể kết hợp với một phân tử oxy khác để tạo thành ozone."},"questions":[{"q":"1. What do people say about the rate of deaths from skin cancer in the future?","answer":"It will increase sharply. / There will be a sharp increase.","accepted":["It will increase sharply. / There will be a sharp increase."],"vi":"Người ta nói gì về tỉ lệ tử vong do ung thư da trong tương lai?","explanation":"Bài đọc nói tia mặt trời \"will cause a sharp increase in deaths from skin cancer\" → sẽ tăng mạnh."},{"q":"2. How many oxygen atoms are there in an ozone molecule?","answer":"There are 3.","accepted":["There are 3."],"vi":"Có bao nhiêu nguyên tử oxy trong một phân tử ozone?","explanation":"Bài đọc nói \"Ozone is a molecule composed of three oxygen atoms.\""},{"q":"3. What elements participate in the formation process of ozone?","answer":"Oxygen molecules and ultraviolet radiation from the sun.","accepted":["Oxygen molecules and ultraviolet radiation from the sun."],"vi":"Những yếu tố nào tham gia vào quá trình hình thành ozone?","explanation":"Bài đọc nói ozone hình thành từ \"an interaction between oxygen molecules and ultraviolet radiation (UV) from the sun\"."},{"q":"4. What happens when an oxygen molecule and an ultraviolet radiation hit each other?","answer":"The molecule breaks apart into single atoms of oxygen.","accepted":["The molecule breaks apart into single atoms of oxygen."],"vi":"Điều gì xảy ra khi phân tử oxy và bức xạ cực tím va chạm nhau?","explanation":"Bài đọc nói phân tử \"may break apart into single atoms of oxygen\"."},{"q":"5. What is the feature of single atoms (of oxygen)?","answer":"They are reactive.","accepted":["They are reactive."],"vi":"Đặc điểm của các nguyên tử đơn lẻ là gì?","explanation":"Bài đọc nói \"These single atoms are very reactive\"."}],"roman":"VIII"},{"navLabel":"Đọc hiểu 2b","title":"Đọc hiểu – Effects of Air Pollution","icon":"book-open","instructions":"Đọc đoạn văn và trả lời các câu hỏi bằng tiếng Anh.","type":"sentence","instant":true,"passage":{"title":"Effects of Air Pollution","html":"The effects of air pollution are alarming. They are known to create several respiratory and heart conditions along with Cancer, among other threats to the body. Several millions are known to have died due to direct or indirect effects of air pollution. Children in areas exposed to air pollutants are said to commonly suffer from pneumonia and asthma.<br><br>Another direct effect is the immediate alterations that the world is witnessing due to Global warming. With increased temperatures worldwide, increase in sea levels and melting of ice from colder regions and icebergs, displacement and loss of habitat have already signalled an impending disaster if actions for preservation and normalization aren’t undertaken soon.<br><br>Harmful gases like nitrogen oxides and sulphur oxides are released into the atmosphere during the burning of fossil fuels. When it rains, the water droplets combine with these air pollutants, become acidic and then fall on the ground in the form of acid rain. Acid rain can cause great damage to human, animals and crops.","vi":"Tác hại của ô nhiễm không khí rất đáng báo động. Nó được biết là gây ra nhiều bệnh về hô hấp, tim mạch và cả ung thư, cùng nhiều mối nguy khác cho cơ thể. Hàng triệu người được biết là đã chết do ảnh hưởng trực tiếp hoặc gián tiếp của ô nhiễm không khí. Trẻ em ở những khu vực tiếp xúc với chất ô nhiễm không khí thường mắc bệnh viêm phổi và hen suyễn.<br><br>Một tác động trực tiếp khác là những thay đổi tức thời mà thế giới đang chứng kiến do hiện tượng nóng lên toàn cầu. Với nhiệt độ tăng khắp nơi, mực nước biển dâng và băng tan ở các vùng lạnh và tảng băng trôi, sự di dời và mất môi trường sống đã báo hiệu một thảm họa sắp xảy ra nếu không sớm có hành động bảo tồn và ổn định.<br><br>Các khí độc hại như oxit nitơ và oxit lưu huỳnh được thải vào khí quyển trong quá trình đốt nhiên liệu hóa thạch. Khi trời mưa, các giọt nước kết hợp với các chất ô nhiễm này, trở nên có tính axit rồi rơi xuống đất dưới dạng mưa axit. Mưa axit có thể gây thiệt hại lớn cho con người, động vật và mùa màng."},"questions":[{"q":"6. What problems does air pollution create?","answer":"It creates several respiratory and heart conditions along with cancer.","accepted":["It creates several respiratory and heart conditions along with cancer."],"vi":"Ô nhiễm không khí gây ra những vấn đề gì?","explanation":"Bài đọc nói ô nhiễm không khí \"create several respiratory and heart conditions along with Cancer\"."},{"q":"7. How many people are known to have died due to effects of air pollution?","answer":"Several millions are known to have died due to direct or indirect effects of air pollution.","accepted":["Several millions are known to have died due to direct or indirect effects of air pollution."],"vi":"Bao nhiêu người được biết là đã chết do tác động của ô nhiễm không khí?","explanation":"Bài đọc nói \"Several millions are known to have died due to direct or indirect effects of Air pollution\"."},{"q":"8. What is the reason for the increase in sea levels and melting of ice?","answer":"Increased temperatures worldwide (global warming).","accepted":["Increased temperatures worldwide (global warming)."],"vi":"Lý do khiến mực nước biển dâng và băng tan là gì?","explanation":"Bài đọc nói điều này xảy ra \"with increased temperatures worldwide\" do hiện tượng nóng lên toàn cầu."},{"q":"9. What gases can the burning of fossil fuel create?","answer":"Harmful gases like nitrogen oxides and sulphur oxides.","accepted":["Harmful gases like nitrogen oxides and sulphur oxides."],"vi":"Việc đốt nhiên liệu hóa thạch tạo ra khí gì?","explanation":"Bài đọc nói \"Harmful gases like nitrogen oxides and sulphur oxides are released...during the burning of fossil fuels\"."},{"q":"10. How does acid rain form?","answer":"Water droplets combine with air pollutants, become acidic and then fall on the ground in the form of acid rain.","accepted":["Water droplets combine with air pollutants, become acidic and then fall on the ground in the form of acid rain."],"vi":"Mưa axit hình thành như thế nào?","explanation":"Bài đọc nói các giọt nước \"combine with these air pollutants, become acidic and then fall on the ground in the form of acid rain\"."}],"roman":"IX"},{"navLabel":"Đọc hiểu 3","title":"Đọc hiểu – Các nước công nghiệp &amp; Nóng lên toàn cầu","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"Industrialized Countries and Global Warming","html":"Industrialized countries <b>(1)</b> ___ worked to reduce levels of sulphur dioxide, smog, and smoke in <b>(2)</b> ___ to improve people's health. But a result, not predicted until recently, is that <b>(3)</b> ___ lower sulphur dioxide levels may actually <b>(4)</b> ___ global warming worse. Just as sulphur dioxide <b>(5)</b> ___ volcanoes can cool the planet by blocking sunlight, cutting the amount <b>(6)</b> ___ the compound in the atmosphere lets more sunlight through, warming the Earth. This effect is exaggerated <b>(7)</b> ___ elevated levels of other greenhouse gases in the atmosphere trap the additional heat.<br><br>Most people agree that to curb global warming, <b>(8)</b> ___ variety of measures need to be taken. On a <b>(9)</b> ___ level, driving and flying less, recycling, and conservation reduces a person's \"carbon footprint\" – the amount of carbon dioxide a person is responsible for <b>(10)</b> ___ into the atmosphere.","vi":"Các nước công nghiệp <b>(1)</b> ___ đã nỗ lực giảm mức lưu huỳnh dioxide, khói mù <b>(2)</b> ___ để cải thiện sức khỏe con người. Nhưng một kết quả, mãi gần đây mới được dự đoán, là <b>(3)</b> ___ mức lưu huỳnh dioxide thấp hơn thực ra có thể <b>(4)</b> ___ khiến hiện tượng nóng lên toàn cầu tệ hơn. Cũng như lưu huỳnh dioxide <b>(5)</b> ___ từ núi lửa có thể làm mát hành tinh bằng cách chặn ánh sáng mặt trời, việc giảm lượng <b>(6)</b> ___ hợp chất này trong khí quyển lại khiến nhiều ánh sáng mặt trời lọt qua hơn, làm ấm Trái Đất. Hiệu ứng này bị phóng đại <b>(7)</b> ___ khi mức độ cao của các khí nhà kính khác trong khí quyển giữ lại nhiệt lượng bổ sung.<br><br>Hầu hết mọi người đồng ý rằng để hạn chế nóng lên toàn cầu, cần thực hiện <b>(8)</b> ___ nhiều biện pháp khác nhau. Ở mức độ <b>(9)</b> ___ cá nhân, lái xe và bay ít hơn, tái chế và bảo tồn giúp giảm \"dấu chân carbon\" của một người — lượng khí carbon dioxide mà một người chịu trách nhiệm <b>(10)</b> ___ thải vào khí quyển."},"questions":[{"q":"1. Industrialized countries (1) ___ worked to reduce levels of sulphur dioxide, smog, and smoke in order to improve people’s health.","options":["has","have","had","having"],"answer":1,"vi":"Các nước công nghiệp đã nỗ lực giảm mức lưu huỳnh dioxide, khói mù để cải thiện sức khỏe con người.","explanation":"Chủ ngữ số nhiều \"countries\" → have (hiện tại hoàn thành).","vis":["đã (sai chủ ngữ số nhiều \"countries\")","đã (đúng, chủ ngữ số nhiều)","đã (quá khứ hoàn thành, sai thì)","đang có (V-ing, sai)"]},{"q":"2. …in (2) ___ to improve people’s health.","options":["direction","demand","instruction","order"],"answer":3,"vi":"…để cải thiện sức khỏe con người.","explanation":"\"in order to\" = để (mục đích), cụm cố định.","vis":["hướng (sai nghĩa)","nhu cầu (sai nghĩa)","sự chỉ dẫn (sai nghĩa)","mục đích (đúng — in order to)"]},{"q":"3. …a result…is that (3) ___ lower sulphur dioxide levels may actually make global warming worse.","options":["a","an","the","one"],"answer":2,"vi":"…kết quả là mức lưu huỳnh dioxide thấp hơn thực ra có thể khiến nóng lên toàn cầu tệ hơn.","explanation":"Danh từ đã được xác định trong ngữ cảnh (đã nhắc \"levels\" trước đó) → the.","vis":["một (mạo từ không xác định, sai)","một (mạo từ trước nguyên âm, sai)","mạo từ xác định, đúng","một (số đếm, sai)"]},{"q":"4. …may actually (4) ___ global warming worse.","options":["make","do","go","move"],"answer":0,"vi":"…có thể khiến nóng lên toàn cầu tệ hơn.","explanation":"\"make + something + adjective\" = khiến cái gì trở nên thế nào.","vis":["khiến, làm cho (đúng)","làm (sai nghĩa)","đi (sai nghĩa)","di chuyển (sai nghĩa)"]},{"q":"5. Just as sulphur dioxide (5) ___ volcanoes can cool the planet by blocking sunlight…","options":["in","within","to","from"],"answer":3,"vi":"Cũng như lưu huỳnh dioxide từ núi lửa có thể làm mát hành tinh bằng cách chặn ánh sáng mặt trời…","explanation":"\"sulphur dioxide from volcanoes\" = lưu huỳnh dioxide từ núi lửa.","vis":["trong (sai giới từ)","trong phạm vi (sai giới từ)","đến (sai giới từ)","từ (đúng, nguồn gốc)"]},{"q":"6. …cutting the amount (6) ___ the compound in the atmosphere lets more sunlight through…","options":["on","of","with","under"],"answer":1,"vi":"…giảm lượng hợp chất này trong khí quyển khiến nhiều ánh sáng mặt trời lọt qua hơn…","explanation":"\"the amount of\" = lượng (của cái gì).","vis":["trên (sai giới từ)","của (đúng — amount of)","với (sai giới từ)","dưới (sai giới từ)"]},{"q":"7. This effect is exaggerated (7) ___ elevated levels of other greenhouse gases in the atmosphere trap the additional heat.","options":["what","when","which","where"],"answer":1,"vi":"Hiệu ứng này bị phóng đại khi mức độ cao của các khí nhà kính khác trong khí quyển giữ lại nhiệt lượng bổ sung.","explanation":"Liên từ chỉ thời gian/hoàn cảnh → when.","vis":["cái gì (sai từ loại)","khi (đúng, liên từ chỉ thời gian)","cái mà (sai từ loại)","nơi mà (sai từ loại)"]},{"q":"8. Most people agree that to curb global warming, (8) ___ variety of measures need to be taken.","options":["a","an","the","one"],"answer":0,"vi":"Hầu hết mọi người đồng ý rằng để hạn chế nóng lên toàn cầu, cần thực hiện nhiều biện pháp khác nhau.","explanation":"\"a variety of\" = nhiều loại, đa dạng.","vis":["một (đúng — a variety of)","một (sai, trước phụ âm)","mạo từ xác định (sai)","một (số đếm, sai)"]},{"q":"9. On a (9) ___ level, driving and flying less, recycling, and conservation reduces a person’s \"carbon footprint\".","options":["person","people","personal","personally"],"answer":2,"vi":"Ở mức độ cá nhân, lái xe và bay ít hơn, tái chế và bảo tồn giúp giảm \"dấu chân carbon\" của một người.","explanation":"Trước danh từ \"level\" cần tính từ → personal.","vis":["người (danh từ, sai từ loại)","mọi người (danh từ số nhiều, sai)","cá nhân (tính từ, đúng)","một cách cá nhân (trạng từ, sai từ loại)"]},{"q":"10. …the amount of carbon dioxide a person is responsible for (10) ___ into the atmosphere.","options":["to put","put","putting","puts"],"answer":2,"vi":"…lượng khí carbon dioxide mà một người chịu trách nhiệm thải vào khí quyển.","explanation":"\"be responsible for\" theo sau bởi V-ing → putting. (Đã sửa lại đáp án — xem ghi chú OVERRIDE ở đầu file.)","note":"be responsible for + V-ing","vis":["đặt, thải (to-V, sai — sau \"responsible for\" cần V-ing)","đặt, thải (nguyên mẫu, sai)","thải (V-ing, đúng — responsible for + V-ing)","thải (chia động từ, sai)"]}],"roman":"X"},{"navLabel":"Đọc hiểu 4","title":"Đọc hiểu – Ô nhiễm đất (điền từ cho sẵn)","icon":"book-open","instructions":"Đọc đoạn văn và dùng các từ cho sẵn trong ô để điền vào chỗ trống. Gõ đúng từ rồi bấm Kiểm tra.","type":"fill","bank":["us","different","nature","due to","waste","chemicals","and","why","However","dead"],"passage":{"title":"Soil Pollution","html":"With the rise of concrete buildings and roads, one part of the Earth that we rarely see is the soil. It has many <b>(1)</b> ___ names, such as dirt, mud and ground. However, it is definitely very important to <b>(2)</b> ___. The plants that feed us grow in soil <b>(3)</b> ___ keeping it healthy is essential to maintaining a beautiful planet. <b>(4)</b> ___, like all other forms of nature, soil also suffers from pollution. The pollution of soil is a common thing these days, and it happens <b>(5)</b> ___ the presence of man-made elements.<br><br>The main reason <b>(6)</b> ___ the soil becomes contaminated is due to the presence of man-made waste. The waste produced from <b>(7)</b> ___ itself such as <b>(8)</b> ___ plants, carcasses of animals and rotten fruits and vegetables only adds to the fertility of the soil. However, our <b>(9)</b> ___ products are full of <b>(10)</b> ___ that are not originally found in nature and lead to soil pollution.","vi":"Với sự gia tăng của các tòa nhà và con đường bê tông, một phần của Trái Đất mà chúng ta hiếm khi nhìn thấy là đất. Nó có nhiều tên gọi <b>(1)</b> ___ khác nhau, như đất, bùn, nền đất. Tuy nhiên, nó chắc chắn rất quan trọng đối với <b>(2)</b> ___ chúng ta. Các loại cây nuôi sống chúng ta mọc trong đất, <b>(3)</b> ___ và việc giữ cho đất khỏe mạnh là điều cần thiết để duy trì một hành tinh tươi đẹp. <b>(4)</b> ___ Tuy nhiên, giống như mọi dạng khác của tự nhiên, đất cũng bị ô nhiễm. Ô nhiễm đất là điều phổ biến hiện nay, và nó xảy ra <b>(5)</b> ___ do sự hiện diện của các yếu tố nhân tạo.<br><br>Lý do chính <b>(6)</b> ___ khiến đất bị ô nhiễm là do sự hiện diện của rác thải nhân tạo. Rác thải sinh ra từ chính <b>(7)</b> ___ tự nhiên như cây <b>(8)</b> ___ chết, xác động vật và rau quả thối chỉ làm tăng độ phì nhiêu của đất. Tuy nhiên, các sản phẩm <b>(9)</b> ___ thải của chúng ta đầy <b>(10)</b> ___ hóa chất không có sẵn trong tự nhiên và gây ô nhiễm đất."},"questions":[{"q":"1. It has many ___ names, such as dirt, mud and ground.","answer":"different","vi":"Nó có nhiều tên gọi khác nhau, như đất, bùn, nền đất.","explanation":"Trước danh từ \"names\" cần tính từ → different."},{"q":"2. However, it is definitely very important to ___.","answer":"us","vi":"Tuy nhiên, nó chắc chắn rất quan trọng đối với chúng ta.","explanation":"Sau giới từ \"to\" cần đại từ tân ngữ → us."},{"q":"3. The plants that feed us grow in soil ___ keeping it healthy is essential to maintaining a beautiful planet.","answer":"and","vi":"Các loại cây nuôi sống chúng ta mọc trong đất, và việc giữ cho đất khỏe mạnh là điều cần thiết để duy trì một hành tinh tươi đẹp.","explanation":"Liên từ nối hai mệnh đề ngang hàng → and."},{"q":"4. ___, like all other forms of nature, soil also suffers from pollution.","answer":"However","vi":"Tuy nhiên, giống như mọi dạng khác của tự nhiên, đất cũng bị ô nhiễm.","explanation":"Nêu sự tương phản, đứng đầu câu → However."},{"q":"5. The pollution of soil is a common thing these days, and it happens ___ the presence of man-made elements.","answer":"due to","vi":"Ô nhiễm đất là điều phổ biến hiện nay, và nó xảy ra do sự hiện diện của các yếu tố nhân tạo.","explanation":"Nêu lý do bằng cụm danh từ → due to."},{"q":"6. The main reason ___ the soil becomes contaminated is due to the presence of man-made waste.","answer":"why","vi":"Lý do chính khiến đất bị ô nhiễm là do sự hiện diện của rác thải nhân tạo.","explanation":"\"the reason why\" = lý do mà (mệnh đề quan hệ chỉ lý do)."},{"q":"7. The waste produced from ___ itself such as dead plants, carcasses of animals and rotten fruits and vegetables only adds to the fertility of the soil.","answer":"nature","vi":"Rác thải sinh ra từ chính tự nhiên như cây chết, xác động vật và rau quả thối chỉ làm tăng độ phì nhiêu của đất.","explanation":"Sau giới từ \"from\" cần danh từ → nature."},{"q":"8. …such as ___ plants, carcasses of animals and rotten fruits and vegetables…","answer":"dead","vi":"…như cây chết, xác động vật và rau quả thối…","explanation":"Trước danh từ \"plants\" cần tính từ → dead."},{"q":"9. However, our ___ products are full of chemicals that are not originally found in nature and lead to soil pollution.","answer":"waste","vi":"Tuy nhiên, các sản phẩm thải của chúng ta đầy hóa chất không có sẵn trong tự nhiên và gây ô nhiễm đất.","explanation":"Trước danh từ \"products\" cần tính từ/danh từ bổ nghĩa → waste."},{"q":"10. …full of ___ that are not originally found in nature and lead to soil pollution.","answer":"chemicals","vi":"…đầy hóa chất không có sẵn trong tự nhiên và gây ô nhiễm đất.","explanation":"Sau \"full of\" cần danh từ số nhiều → chemicals."}],"roman":"XI"},{"navLabel":"Viết 1","title":"Rewrite the sentences based on the given words","icon":"pen-to-square","instructions":"Viết lại câu sao cho nghĩa không đổi, bắt đầu bằng từ gợi ý (câu điều kiện loại 2).","type":"sentence","instant":true,"questions":[{"q":"1.","original":"People don’t care much about environment, so they keep making it worse.","starter":"If people","answer":"cared much about environment, they wouldn’t keep making it worse.","accepted":["cared much about environment, they wouldn’t keep making it worse","cared much about environment, they would stop making it worse"],"vi":"Mọi người không quan tâm nhiều đến môi trường nên họ tiếp tục làm nó tồi tệ hơn.","explanation":"Câu điều kiện loại 2: If + S + V-ed, S + wouldn’t + V.","note":"If + S + V-ed, S + wouldn’t + V-ing"},{"q":"2.","original":"She suffered from a serious disease because of drinking contaminated water in a long time.","starter":"Since","answer":"she drank contaminated water for a long time, she suffered from a serious disease.","accepted":["she drank contaminated water for a long time, she suffered from a serious disease","she drank contaminated water in a long time, she suffered from a serious disease"],"vi":"Cô ấy mắc bệnh nghiêm trọng vì uống nước bẩn trong thời gian dài.","explanation":"\"because of + V-ing\" chuyển thành \"Since + mệnh đề (S+V)\".","note":"Since + S + V-ed, S + V-ed"},{"q":"3.","original":"The drainage system is damaged. There is not enough water for the crop.","starter":"If the drainage system","answer":"was not damaged, there would be enough water for the crop.","accepted":["was not damaged, there would be enough water for the crop","were not damaged, there would be enough water for the crop"],"vi":"Hệ thống thoát nước bị hỏng. Không đủ nước cho mùa màng.","explanation":"Câu điều kiện loại 2: If + S + V-ed (phủ định), there would be + N.","note":"If + S + was/were not + V3, there would be + N"},{"q":"4.","original":"\"Why don’t you turn off more lights in the house to reduce your eyestrain?\"","starter":"If I","answer":"were you, I would turn off more lights in the house to reduce the eye strain.","accepted":["were you, i would turn off more lights in the house to reduce the eye strain"],"vi":"\"Sao bạn không tắt bớt đèn trong nhà để giảm mỏi mắt?\"","explanation":"Lời đề nghị chuyển thành câu điều kiện loại 2 đưa ra lời khuyên.","note":"If I were you, I would + V"},{"q":"5.","original":"The improvements of the public transport system will encourage more people to use it.","starter":"If","answer":"the public transport system is improved, more people will be encouraged to use it.","accepted":["the public transport system is improved, more people will be encouraged to use it"],"vi":"Việc cải thiện hệ thống giao thông công cộng sẽ khuyến khích nhiều người sử dụng nó hơn.","explanation":"Câu điều kiện loại 1: If + S + is improved (bị động, hiện tại đơn), S + will be + V3.","note":"If + S + is/are + V3, S + will be + V3"}],"roman":"XII"},{"navLabel":"Viết 2","title":"Combine each pair of sentences using the words/phrases in brackets","icon":"pen-to-square","instructions":"Kết hợp hai câu thành một câu, dùng từ/cụm từ gợi ý trong ngoặc.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"A serious road accident happened. There was a traffic chaos yesterday. (CAUSED)","answer":"A serious road accident caused traffic chaos yesterday.","accepted":["a serious road accident caused traffic chaos yesterday"],"vi":"Một vụ tai nạn giao thông nghiêm trọng đã gây ra tình trạng hỗn loạn giao thông hôm qua.","explanation":"\"cause\" + tân ngữ trực tiếp (không cần giới từ).","note":"S + caused + N"},{"q":"2.","original":"I had to get the mop. I spilled my juice. (SINCE)","answer":"I had to get the mop since I spilled my juice.","accepted":["i had to get the mop since i spilled my juice"],"vi":"Tôi phải lấy cây lau nhà vì tôi làm đổ nước ép.","explanation":"\"since\" nêu lý do.","note":"S + V since + S + V"},{"q":"3.","original":"He walked slowly. He has a bad leg. (BECAUSE OF)","answer":"He walked slowly because of his bad leg.","accepted":["he walked slowly because of his bad leg"],"vi":"Anh ấy đi chậm vì chân bị đau.","explanation":"\"because of\" + cụm danh từ.","note":"S + V + because of + N"},{"q":"4.","original":"A peacock will spread his feathers, he will attract a female. (SO)","answer":"A peacock will spread his feathers so he will attract a female.","accepted":["a peacock will spread his feathers so he will attract a female"],"vi":"Con công sẽ xòe lông đuôi để thu hút con cái.","explanation":"\"so\" nêu kết quả/mục đích.","note":"S + V, so + S + V"},{"q":"5.","original":"The cyclone has come. Many thousands of deaths. (RESULTED IN)","answer":"The cyclone has resulted in many thousands of deaths.","accepted":["the cyclone has resulted in many thousands of deaths"],"vi":"Cơn lốc xoáy đã gây ra hàng ngàn cái chết.","explanation":"\"result in\" = dẫn đến, gây ra.","note":"S + has resulted in + N"},{"q":"6.","original":"Don’t eat too much sugar. It creates health problems. (LEAD TO)","answer":"Eating too much sugar can lead to health problems.","accepted":["eating too much sugar can lead to health problems"],"vi":"Ăn quá nhiều đường có thể dẫn đến các vấn đề sức khỏe.","explanation":"\"lead to\" = dẫn đến; chủ ngữ chuyển thành danh động từ.","note":"V-ing + can lead to + N"},{"q":"7.","original":"The weather was bad. That’s why our departure delayed (BECAUSE OF)","answer":"Our departure delayed because of bad weather.","accepted":["our departure delayed because of bad weather"],"vi":"Chuyến khởi hành của chúng tôi bị trễ vì thời tiết xấu.","explanation":"\"because of\" + cụm danh từ.","note":"S + V + because of + N"},{"q":"8.","original":"There was damage to our property because of the fire. (RESULTED IN)","answer":"The fire resulted in damage to our property.","accepted":["the fire resulted in damage to our property"],"vi":"Đám cháy đã gây thiệt hại cho tài sản của chúng tôi.","explanation":"\"result in\" = dẫn đến, gây ra.","note":"S + resulted in + N"},{"q":"9.","original":"They haven’t reply our invitation so far. I think they are not coming. (SINCE)","answer":"I think they are not coming, since they haven’t reply our invitation so far.","accepted":["i think they are not coming, since they haven’t reply our invitation so far","i think they are not coming, since they haven’t replied to our invitation so far"],"vi":"Tôi nghĩ họ sẽ không đến, vì họ vẫn chưa trả lời lời mời của chúng tôi.","explanation":"\"since\" nêu lý do.","note":"S + V, since + S + V"},{"q":"10.","original":"The road condition is poor. There has been several accidents. (CAUSED)","answer":"The poor road condition has caused several accidents.","accepted":["the poor road condition has caused several accidents"],"vi":"Tình trạng đường xá kém đã gây ra một số vụ tai nạn.","explanation":"\"cause\" + tân ngữ trực tiếp.","note":"S + has caused + N"}],"roman":"XIII"},{"navLabel":"Viết 3","title":"Use the given words to write complete conditional sentences (type 2)","icon":"pen-to-square","instructions":"Dùng các từ gợi ý để viết thành câu điều kiện loại 2 hoàn chỉnh.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"If/ I/ be/ you/ I/ eat/ more vegetable.","answer":"If I were you, I would eat more vegetab
