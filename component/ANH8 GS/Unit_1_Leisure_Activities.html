ons":["will pass","would pass","pass","passed"],"answer":2,"explanation":"Điều kiện loại 1: mệnh đề if dùng hiện tại → pass.","vis":["sẽ đậu (tương lai, sai — mệnh đề if dùng hiện tại)","sẽ đậu (would, sai)","đậu (hiện tại đơn, đúng)","đã đậu (quá khứ, sai)"],"vi":"Bạn sẽ làm gì nếu bạn đậu kỳ thi cuối kỳ?"},{"q":"3. I wish my summer holiday ___ longer.","options":["will be","is","were","has been"],"answer":2,"explanation":"Câu ước (wish) → were.","vis":["sẽ là (sai, không dùng will sau wish)","là (hiện tại, sai)","là (quá khứ giả định, đúng — câu ước)","đã là (hiện tại hoàn thành, sai)"],"vi":"Tôi ước kỳ nghỉ hè của mình dài hơn."},{"q":"4. I asked him ___ he came from.","options":["where","who","what","which"],"answer":0,"explanation":"Hỏi nơi chốn → where.","vis":["ở đâu (đúng — hỏi nơi chốn)","ai (sai)","cái gì (sai)","cái nào (sai)"],"vi":"Tôi hỏi anh ấy đến từ đâu."},{"q":"5. It rained hard. ___, my father went to work.","options":["Therefore","However","Because","So"],"answer":1,"explanation":"Ý tương phản → However.","vis":["vì vậy (sai — không hợp lý)","tuy nhiên (đúng — ý tương phản)","bởi vì (sai — không nối được 2 câu)","vì vậy (sai)"],"vi":"Trời mưa to. Tuy nhiên, bố tôi vẫn đi làm."},{"q":"6. Your sister writes poems and stories, ___ she?","options":["does","doesn't","will","won't"],"answer":1,"explanation":"Câu hỏi đuôi: khẳng định → phủ định: doesn’t.","vis":["có (sai — câu hỏi đuôi cần phủ định)","không (đúng — khẳng định → phủ định)","sẽ (sai thì)","sẽ không (sai thì)"],"vi":"Chị của bạn viết thơ và truyện, phải không?"},{"q":"7. Laura fell asleep during the lesson ___ she was tired.","options":["so","but","because","therefore"],"answer":2,"explanation":"Nêu lý do → because.","vis":["vì vậy (sai)","nhưng (sai)","bởi vì (đúng — nêu lý do)","do đó (sai)"],"vi":"Laura ngủ quên trong giờ học vì cô ấy mệt."},{"q":"8. How much ___ do you want?","options":["bananas","eggs","candies","sugar"],"answer":3,"explanation":"\"How much\" + danh từ không đếm được: "],"vi":"Anh ấy nói anh ấy sẽ quay lại sau."},{"q":"15. We ___ anything from James since we left school.","options":["haven't heard","heard","don't hear","didn't hear"],"answer":0,"explanation":"\"since\" → hiện tại hoàn thành: haven’t heard.","vis":["chưa nghe (đúng — since → hiện tại hoàn thành)","đã nghe (sai thì)","không nghe (sai thì)","đã không nghe (sai thì)"],"vi":"Chúng tôi chưa nghe tin gì từ James kể từ khi rời trường."},{"q":"16. If I ___ a bird, I would be a dove.","options":["would be","were","am","will be"],"answer":1,"explanation":"Điều kiện loại 2 → were.","vis":["sẽ là (sai)","là (quá khứ giả định, đúng — điều kiện loại 2)","là (hiện tại, sai)","sẽ là (sai)"],"vi":"Nếu tôi là một con chim, tôi sẽ là một con chim bồ câu."},{"q":"17. The children sang ___ during the trip.","options":["happily","happiness","unhappy","happy"],"answer":0,"explanation":"Trạng từ bổ nghĩa động từ \"sang\" → happily.","vis":["một cách vui vẻ (trạng từ, đúng)","niềm vui (danh từ, sai)","không vui (tính từ, sai)","vui (tính từ, sai)"],"vi":"Bọn trẻ đã hát vui vẻ trong suốt chuyến đi."},{"q":"18. This newspaper ___ every day.","options":["is publishing","publish","published","is published"],"answer":3,"explanation":"Câu bị động (hiện tại đơn) → is published.","vis":["đang được xuất bản (sai dạng)","xuất bản (sai — thiếu chia)","đã xuất bản (sai thì)","được xuất bản (đúng — bị động hiện tại đơn)"],"vi":"Tờ báo này được xuất bản mỗi ngày."},{"q":"19. You have lived in this city since 1998, ___?","options":["haven't you","didn't you","did you","have you"],"answer":0,"explanation":"Câu hỏi đuôi HTHT khẳng định → haven’t you.","vis":["phải không (đúng — câu hỏi đuôi HTHT)","phải không (quá khứ, sai)","phải không (sai)","phải không (sai — cần phủ định)"],"vi":"Bạn đã sống ở thành phố này từ năm 1998, phải không?"},{"q":"20. My students enjoy ___ English very much.","options":["learn","learnt","learning","to learn"],"answer":2,"explanation":"enjoy + V-ing → learning.","vis":["học (nguyên mẫu, sai)","đã học (sai)","học (V-ing, đúng — enjoy + V-ing)","học (to-V, sai)"],"vi":"Học sinh của tôi rất thích học tiếng Anh."},{"q":"21. Mai enjoys ___ to music in her free time.","options":["hearing","playing","listening","talking"],"answer":2,"explanation":"listen to music → listening.","vis":["nghe (nghĩa chung, sai)","chơi (sai nghĩa)","nghe (đúng — listen to music)","nói chuyện (sai nghĩa)"],"vi":"Mai thích nghe nhạc vào thời gian rảnh."},{"q":"22. My grandparents love ___ very much (a lot of flowers and vegetables).","options":["doing garden","doing gardening","do gardening","to do garden"],"answer":1,"explanation":"do gardening → doing gardening.","vis":["làm vườn (sai dạng)","làm vườn (đúng — do gardening → doing gardening)","làm vườn (sai dạng)","làm vườn (sai dạng)"],"vi":"Ông bà tôi rất thích làm vườn (trồng nhiều hoa và rau)."},{"q":"23. You should avoid ___ too much TV.","options":["seeing","looking","watching","glancing"],"answer":2,"explanation":"watch TV → watching.","vis":["nhìn thấy (sai nghĩa)","nhìn (sai nghĩa)","xem (đúng — watch TV)","liếc nhìn (sai nghĩa)"],"vi":"Bạn nên tránh xem TV quá nhiều."},{"q":"24. Nga likes ___ with her close friend on Saturday evenings.","options":["window shop","window to shop","window shops","window shopping"],"answer":3,"explanation":"like + V-ing → window shopping.","vis":["sai dạng","sai dạng","sai dạng","đi ngắm cửa hàng (đúng — window shopping)"],"vi":"Nga thích đi ngắm cửa hàng cùng bạn thân vào tối thứ Bảy."},{"q":"25. Lan used to love ___ in front of the computer for hours.","options":["using","sitting","doing","having"],"answer":1,"explanation":"sit in front of the computer → sitting.","vis":["sử dụng (sai nghĩa)","ngồi (đúng — sit in front of)","làm (sai nghĩa)","có (sai nghĩa)"],"vi":"Lan từng rất thích ngồi trước máy tính hàng giờ liền."},{"q":"26. He doesn’t mind ___ a lot of homework in the evenings.","options":["making","reading","seeing","doing"],"answer":3,"explanation":"do homework → doing.","vis":["làm/tạo ra (sai nghĩa)","đọc (sai nghĩa)","thấy (sai nghĩa)","làm (đúng — do homework)"],"vi":"Anh ấy không ngại làm nhiều bài tập về nhà vào buổi tối."},{"q":"27. Do you fancy ___ around the West Lake with me this Sunday?","options":["going","having","staying","moving"],"answer":0,"explanation":"fancy + V-ing → going.","vis":["đi (đúng — go around)","có (sai nghĩa)","ở lại (sai nghĩa)","di chuyển (sai nghĩa)"],"vi":"Bạn có muốn đi dạo quanh Hồ Tây cùng tôi vào Chủ nhật này không?"},{"q":"28. I don’t like ___ up early. I love ___ in bed late.","options":["getting / stay","get / stay","getting / staying","get / staying"],"answer":2,"explanation":"like/love + V-ing → getting / staying.","vis":["getting / stay (sai)","get / stay (sai)","dậy / nằm (đúng — V-ing sau like/love)","get / staying (sai)"],"vi":"Tôi không thích dậy sớm. Tôi thích nằm trên giường muộn."},{"q":"29. Mai’s dad likes ___ spring rolls when her family has parties.","options":["doing","making","cooking","trying"],"answer":1,"explanation":"make spring rolls → making.","vis":["làm (nghĩa chung, sai)","làm, cuốn (đúng — make spring rolls)","nấu (sai nghĩa)","thử (sai nghĩa)"],"vi":"Bố của Mai thích làm nem cuốn khi gia đình có tiệc."},{"q":"30. Why don’t we ___ our parents with some DIY project?","options":["help","do","make","give"],"answer":0,"explanation":"help sb with sth → help.","vis":["giúp đỡ (đúng — help sb with sth)","làm (sai nghĩa)","làm (sai nghĩa)","cho (sai nghĩa)"],"vi":"Sao chúng ta không giúp bố mẹ với một dự án tự làm (DIY) nào đó?"},{"q":"31. How much time do you spend ___ leisure activities?","options":["on","in","for","with"],"answer":0,"explanation":"spend time on sth → on.","vis":["vào (đúng — spend time on sth)","trong (sai)","cho (sai)","với (sai)"],"vi":"Bạn dành bao nhiêu thời gian cho các hoạt động giải trí?"},{"q":"32. Why don’t you apply for this job? It looks right ___ your street.","options":["on","in","at","up"],"answer":3,"explanation":"idiom: (right) up my ree time for helpful activities, so she works as ___.","options":["a volunteer","a fan","a teammate","a partner"],"answer":0,"explanation":"tình nguyện viên → a volunteer.","vis":["tình nguyện viên (đúng)","người hâm mộ (sai nghĩa)","đồng đội (sai nghĩa)","đối tác (sai nghĩa)"],"vi":"Liz dùng thời gian rảnh cho các hoạt động có ích, vì vậy cô ấy làm tình nguyện viên."},{"q":"49. She is always ___ on something nice and cute.","options":["addicted","interested","hooked","fallen"],"answer":2,"explanation":"be hooked on sth → hooked.","vis":["nghiện (sai giới từ)","quan tâm (sai — interested in)","mê (đúng — be hooked on)","sai dạng"],"vi":"Cô ấy luôn mê mẩn những thứ đẹp đẽ và dễ thương."},{"q":"50. It ___ him so many years to collect stamps.","options":["has taken","has spent","has waste","has used"],"answer":0,"explanation":"It takes sb time to do sth → has taken.","vis":["đã mất (đúng — it takes sb time to do sth)","đã dành (sai — spend không dùng với chủ ngữ giả It)","sai chính tả/nghĩa","đã dùng (sai nghĩa)"],"vi":"Anh ấy đã mất rất nhiều năm để sưu tầm tem."}]},{"roman":"IV","navLabel":"Word Forms","icon":"font","title":"Chia dạng đúng của từ (Word Forms)","instructions":"Cho dạng đúng của từ trong NGOẶC để hoàn thành câu.","type":"fill","instant":true,"questions":[{"q":"1. I like cooking in my free time. It makes me feel ___.","hint":"(RELAX)","answer":"relaxed","explanation":"Cảm giác của người → tính từ -ed: relaxed.","family":["relax (v): thư giãn","relaxed (adj): cảm thấy thư giãn"],"vi":"Tôi thích nấu ăn vào thời gian rảnh. Nó khiến tôi cảm thấy thư giãn.","note":"động từ → tính từ đuôi -ed (diễn tả cảm giác của người)"},{"q":"2. My sister doesn't like surfing the Internet; she says it is ___.","hint":"(BORE)","answer":"boring","explanation":"Tính chất của sự vật → -ing: boring.","family":["bore (v): làm cho chán","boring (adj): nhàm chán"],"vi":"Em gái tôi không thích lướt Internet; cô ấy nói nó nhàm chán.","note":"động từ → tính từ đuôi -ing (diễn tả tính chất của sự vật)"},{"q":"3. Skateboarding is one of the most ___ sports of teenagers here.","hint":"(POPULARITY)","answer":"popular","explanation":"Tính từ: popular.","family":["popularity (n): sự phổ biến","popular (adj): phổ biến, được yêu thích"],"vi":"Trượt ván là một trong những môn thể thao phổ biến nhất của thanh thiếu niên ở đây.","note":"danh từ → tính từ"},{"q":"4. My close friend gave me a ___ present on my birthday.","hint":"(WONDER)","answer":"wonderful","explanation":"Tính từ: wonderful.","family":["wonder (n): sự ngạc nhiên","wonderful (adj): tuyệt vời"],"vi":"Người bạn thân của tôi đã tặng tôi một món quà tuyệt vời trong ngày sinh nhật.","note":"danh từ → tính từ đuôi -ful"},{"q":"5. My brother works as a volunteer for an animal protection ___.","hint":"(ORGANIZE)","answer":"organization","explanation":"Danh từ: organization.","accepted":["organization","organisation"],"family":["organize (v): tổ chức","organization (n): tổ chức, cơ quan"],"vi":"Anh trai tôi làm tình nguyện viên cho một tổ chức bảo vệ động vật.","note":"động từ → danh từ đuôi -ation"},{"q":"6. People in my country are very warm and ___.","hint":"(FRIEND)","answer":"friendly","explanation":"Tính từ: friendly.","family":["friend (n): bạn bè","friendly (adj): thân thiện"],"vi":"Người dân ở đất nước tôi rất nồng ấm và thân thiện.","note":"danh từ → tính từ đuôi -ly"},{"q":"7. An ___ is a child whose parents are dead.","hint":"(ORPHANAGE)","answer":"orphan","explanation":"Danh từ chỉ người: orphan (đứa trẻ mồ côi).","family":["orphanage (n): trại trẻ mồ côi","orphan (n): trẻ mồ côi"],"vi":"Trẻ mồ côi là đứa trẻ có cha mẹ đã mất.","note":"danh từ (nơi chốn) → danh từ (người)"},{"q":"8. L.A Hill is a ___ writer.","hint":"(HUMOR)","answer":"humorous","explanation":"Tính từ: humorous.","family":["humor (n): sự hài hước","humorous (adj): hài hước, dí dỏm"],"vi":"L.A Hill là một nhà văn hài hước.","note":"danh từ → tính từ đuôi -ous"},{"q":"9. I'm ___ sorry for the delay.","hint":"(EXTREME)","answer":"extremely","explanation":"Trạng từ bổ nghĩa tính từ: extremely.","family":["extreme (adj): cực độ","extremely (adv): cực kỳ"],"vi":"Tôi vô cùng xin lỗi vì sự chậm trễ.","note":"tính từ → trạng từ đuôi -ly"},{"q":"10. Role-play is ___ in developing communication skills.","hint":"(HELP)","answer":"helpful","explanation":"Tính từ: helpful.","family":["help (v): giúp đỡ","helpful (adj): hữu ích, có ích"],"vi":"Đóng vai (role-play) rất hữu ích trong việc phát triển kỹ năng giao tiếp.","note":"động từ → tính từ đuôi -ful"},{"q":"11. There are four ___ in my house.","hint":"(BOOKSHELF)","answer":"bookshelves","explanation":"Số nhiều của bookshelf → bookshelves.","family":["bookshelf (n): giá sách","bookshelves (n, số nhiều): những giá sách"],"vi":"Nhà tôi có bốn giá sách.","note":"danh từ số ít → số nhiều (bất quy tắc: -f → -ves)"},{"q":"12. The photocopy shop is between the ___ and the drugstore.","hint":"(BAKE)","answer":"bakery","explanation":"Danh từ chỉ nơi chốn: bakery.","family":["bake (v): nướng bánh","bakery (n): tiệm bánh"],"vi":"Tiệm photocopy nằm giữa tiệm bánh và hiệu thuốc.","note":"động từ → danh từ chỉ nơi chốn"},{"q":"13. We must be ___ when we cross the road.","hint":"(CARE)","answer":"careful","explanation":"Tính từ: careful.","family":["care (n): sự cẩn thận","careful (adj): cẩn thận"],"vi":"Chúng ta phải cẩn thận khi băng qua đường.","note":"danh từ → tính từ đuôi -ful"},{"q":"14. Air ___ is a big problem in many cities.","hint":"(POLLUTE)","answer":"pollution","explanation":"Danh từ: pollution.","family":["pollute (v): làm ô nhiễm","pollution (n): sự ô nhiễm"],"vi":"Ô nhiễm không khí là một vấn đề lớn ở nhiều thành phố.","note":"động từ → danh từ đuôi -ion"},{"q":"15. Yoko is from Japan. She is ___.","hint":"(JAPAN)","answer":"Japanese","explanation":"Tính từ chỉ quốc tịch: Japanese.","family":["Japan (n): nước Nhật","Japanese (adj): thuộc về Nhật Bản"],"vi":"Yoko đến từ Nhật Bản. Cô ấy là người Nhật.","note":"danh từ (quốc gia) → tính từ chỉ quốc tịch"},{"q":"16. The Internet is very ___; it takes up a lot of our time.","hint":"(ADDICT)","answer":"addictive","explanation":"Tính từ: addictive (gây nghiện).","family":["addict (n): người nghiện","addictive (adj): gây nghiện"],"vi":"Internet rất gây nghiện; nó chiếm rất nhiều thời gian của chúng ta.","note":"danh từ → tính từ đuôi -ive"},{"q":"17. I enjoy ___ with friends and going out at the weekend.","hint":"(SOCIAL)","answer":"socialising","explanation":"enjoy + V-ing: socialising.","accepted":["socialising","socializing"],"family":["social (adj): thuộc về xã hội","socialising (v-ing): giao lưu, kết bạn"],"vi":"Tôi thích giao lưu với bạn bè và đi chơi vào cuối tuần.","note":"tính từ → động từ (V-ing) sau \"enjoy\""},{"q":"18. Sitting in front of the computer too long can cause ___.","hint":"(OBESE)","answer":"obesity","explanation":"Danh từ: obesity (béo phì).","family":["obese (adj): béo phì","obesity (n): chứng béo phì"],"vi":"Ngồi trước máy tính quá lâu có thể gây ra chứng béo phì.","note":"tính từ → danh từ đuôi -ity"},{"q":"19. Are you ___ about the new Gears Of War games?","hint":"(EXCITE)","answer":"excited","explanation":"Cảm giác của người → -ed: excited.","family":["excite (v): làm phấn khích","excited (adj): cảm thấy phấn khích"],"vi":"Bạn có phấn khích về trò chơi Gears Of War mới không?","note":"động từ → tính từ đuôi -ed (diễn tả cảm giác của người)"},{"q":"20. She listens to classical music for ___.","hint":"(RELAX)","answer":"relaxation","explanation":"Danh từ: relaxation.","family":["relax (v): thư giãn","relaxation (n): sự thư giãn"],"vi":"Cô ấy nghe nhạc cổ điển để thư giãn.","note":"động từ → danh từ đuôi -ation"}]},{"roman":"V","navLabel":"V-ing (từ cho sẵn)","icon":"box-archive","title":"Chia động từ dạng V-ing (từ cho sẵn)","instructions":"Chọn động từ trong khung và chia ở dạng V-ing để hoàn thành câu.","type":"fill","instant":true,"bank":["do","stay","travel","take","do","collect","plant","go","eat","watch"],"questions":[{"q":"1. We enjoy ___ for a walk around the lake every evening.","answer":"going","explanation":"go for a walk → going.","vi":"Chúng tôi thích đi dạo quanh hồ mỗi buổi tối."},{"q":"2. My friend Jenifer loves ___ unique things.","answer":"collecting","explanation":"collect → collecting.","vi":"Bạn tôi, Jenifer, rất thích sưu tầm những món đồ độc đáo."},{"q":"3. Most of my friends don't like ___ homework at the weekend.","answer":"doing","explanation":"do homework → doing.","vi":"Hầu hết bạn bè tôi không thích làm bài tập về nhà vào cuối tuần."},{"q":"4. Do you like ___ flowers on the balcony?","answer":"planting","explanation":"plant → planting.","vi":"Bạn có thích trồng hoa trên ban công không?"},{"q":"5. I hate ___ outdoors in the summer. It’s so hot.","answer":"staying","explanation":"stay → staying.","vi":"Tôi ghét ở ngoài trời vào mùa hè. Trời nóng quá."},{"q":"6. I don't like ___ challenging sports like ice skating or surfing.","answer":"doing","explanation":"do sports → doing.","vi":"Tôi không thích chơi các môn thể thao mạo hiểm như trượt băng hay lướt sóng."},{"q":"7. My cousin David adores ___ photos. He has an expensive camera.","answer":"taking","explanation":"take photos → taking.","vi":"Anh họ David của tôi rất mê chụp ảnh. Anh ấy có một chiếc máy ảnh đắt tiền."},{"q":"8. Who dislikes ___ films on TV?","answer":"watching","explanation":"watch films → watching.","vi":"Ai mà không thích xem phim trên TV chứ?"},{"q":"9. Does Laura hate ___ noodles?","answer":"eating","explanation":"eat → eating.","vi":"Laura có ghét ăn mì không?"},{"q":"10. My mother detests ___ by bus because she can be carsick.","answer":"travelling","explanation":"travel → travelling.","vi":"Mẹ tôi ghét đi xe buýt vì mẹ dễ bị say xe."}]},{"roman":"VI","navLabel":"Chia động từ","icon":"pen","title":"Chia dạng đúng của động từ","instructions":"Viết dạng đúng của động từ trong ngoặc (V-ing hoặc to-V).","type":"fill","instant":true,"questions":[{"q":"1. Vietnamese students love (go) ___ on a picnic at the weekend.","answer":"going","explanation":"love + V-ing/to-V: going (hoặc to go).","accepted":["going","to go"],"vi":"Học sinh Việt Nam rất thích đi dã ngoại vào cuối tuần."},{"q":"2. I hate (spend) ___ all day on (go) ___ fishing.","answer":"spending / going","explanation":"hate + V-ing: spending; on + V-ing: going.","accepted":["spending / going","to spend / going"],"vi":"Tôi ghét dành cả ngày để đi câu cá."},{"q":"3. People in Britain love (drink) ___ tea with milk.","answer":"drinking","explanation":"love + V-ing/to-V: drinking.","accepted":["drinking","to drink"],"vi":"Người Anh rất thích uống trà với sữa."},{"q":"4. Do you like (listen) ___ to music?","answer":"listening","explanation":"like + V-ing/to-V: listening.","accepted":["listening","to listen"],"vi":"Bạn có thích nghe nhạc không?"},{"q":"5. Does Anna fancy (watch) ___ horror movies?","answer":"watching","explanation":"fancy + V-ing: watching.","vi":"Anna có thích xem phim kinh dị không?"},{"q":"6. I prefer (make) ___ crafts to (draw) ___ a picture.","answer":"making / drawing","explanation":"prefer V-ing to V-ing: making … drawing.","accepted":["making / drawing"],"vi":"Tôi thích làm đồ thủ công hơn là vẽ tranh."},{"q":"7. Kate loves (hang out) ___ with her friends on her birthday.","answer":"hanging out","explanation":"love + V-ing/to-V: hanging out.","accepted":["hanging out","to hang out"],"vi":"Kate rất thích đi chơi với bạn bè vào ngày sinh nhật của mình."},{"q":"8. I detest (eat) ___ fish.","answer":"eating","explanation":"detest + V-ing: eating.","vi":"Tôi ghét ăn cá."},{"q":"9. Do you mind (turn) ___ off the TV?","answer":"turning","explanation":"mind + V-ing: turning.","vi":"Bạn có phiền tắt TV giúp mình không?"},{"q":"10. Does she adore (work) ___ with handicapped students?","answer":"working","explanation":"adore + V-ing: working.","vi":"Cô ấy có yêu thích làm việc với học sinh khuyết tật không?"}]},{"roman":"VII","navLabel":"Email của Mai","icon":"envelope","title":"Email của Mai – chia động từ","instructions":"Hoàn thành email của Mai bằng dạng đúng của động từ (điền cả cụm khi có 2 từ trong ngoặc).","type":"fill","instant":true,"intro":"Hi Susan! I’m in Ha Noi now. I see quite a lot of my cousin Hoa because we…","questions":[{"q":"1. …we (1)(enjoy / do) ___ the same things.","answer":"enjoy doing","explanation":"enjoy + V-ing → enjoy doing.","vi":"…chúng tôi thích làm những điều giống nhau."},{"q":"2. David is good at computers and he (2)(not mind / help) ___ me.","answer":"doesn't mind helping","explanation":"ngôi 3 phủ định + mind + V-ing → doesn’t mind helping.","accepted":["doesn't mind helping","does not mind helping"],"vi":"David giỏi máy tính và cậu ấy không ngại giúp tôi."},{"q":"3. John is really nice too. He (3)(play) ___ basketball.","answer":"plays","explanation":"Hiện tại đơn, ngôi 3 → plays.","vi":"John cũng rất tốt bụng. Cậu ấy chơi bóng rổ."},{"q":"4. …and he (4)(go / skateboard) ___ quite a lot.","answer":"goes skateboarding","explanation":"go + V-ing (hoạt động) → goes skateboarding.","vi":"…và cậu ấy đi trượt ván khá thường xuyên."},{"q":"5. His brother Toby is really cool but he (5)(prefer / play) ___ football.","answer":"prefers to play","explanation":"prefer + to-V/V-ing, ngôi 3 → prefers to play.","accepted":["prefers to play","prefers playing"],"vi":"Anh trai cậu ấy, Toby, rất ngầu nhưng lại thích chơi bóng đá hơn."},{"q":"6. I (6)(do) ___ gymnastics once a week.","answer":"do","explanation":"Chủ ngữ \"I\" → do.","vi":"Tôi tập thể dục dụng cụ một lần mỗi tuần."},{"q":"7. …and Hoa (7)(do) ___ karate.","answer":"does","explanation":"Ngôi 3 số ít → does.","vi":"…và Hoa học karate."},{"q":"8. She prefers indoor sports because she (8)(not like / get) ___ cold!","answer":"doesn't like getting","explanation":"doesn’t like + V-ing/to-V → doesn’t like getting.","accepted":["doesn't like getting","does not like getting","doesn't like to get"],"vi":"Cô ấy thích các môn thể thao trong nhà hơn vì cô ấy không thích bị lạnh!"}]},{"roman":"VIII","navLabel":"Sửa lỗi 1","icon":"wrench","title":"Tìm và sửa lỗi sai","instructions":"Mỗi câu có MỘT lỗi. Tìm từ/cụm sai và gõ lại dạng ĐÚNG vào ô.","type":"fill","instant":true,"questions":[{"q":"1. Having leisure activities are truly important to the elderly. → ___","answer":"is","explanation":"Chủ ngữ \"Having leisure activities\" số ít → are → is.","vi":"Có các hoạt động giải trí thực sự quan trọng đối với người cao tuổi."},{"q":"2. Although she wanted to go to the museum, she decided staying at home. → ___","answer":"to stay","explanation":"decide + to V → decided to stay.","vi":"Mặc dù muốn đến bảo tàng, cô ấy đã quyết định ở nhà."},{"q":"3. Parents are concerned that their kids may be spending too many time on screens. → ___","answer":"too much","explanation":"\"time\" không đếm được → too much time.","accepted":["too much","too much time"],"vi":"Phụ huynh lo ngại rằng con cái họ có thể đang dành quá nhiều thời gian cho màn hình."},{"q":"4. Collecting coins is exciting, but it can also be relaxed. → ___","answer":"relaxing","explanation":"Nói về sự vật → relaxing (không phải relaxed).","vi":"Sưu tầm tiền xu rất thú vị, nhưng nó cũng có thể giúp thư giãn."},{"q":"5. Cloud watching sound weird, but Hang adores it. → ___","answer":"sounds","explanation":"Chủ ngữ số ít \"Cloud watching\" → sounds.","vi":"Ngắm mây nghe có vẻ kỳ lạ, nhưng Hằng lại rất mê nó."},{"q":"6. For some young people, enjoyment involves sitting in front a computer playing games. → ___","answer":"in front of","explanation":"Cụm giới từ đúng: in front of.","vi":"Đối với một số bạn trẻ, niềm vui là ngồi trước máy tính chơi game."},{"q":"7. His parents are thinking of banning him on using the computer. → ___","answer":"from","explanation":"ban sb from doing sth → from.","accepted":["from","banning him from"],"vi":"Bố mẹ cậu ấy đang nghĩ đến việc cấm cậu ấy dùng máy tính."},{"q":"8. When you game online, be carefully when making friends with strangers. → ___","answer":"careful","explanation":"Sau \"be\" dùng tính từ → careful.","vi":"Khi chơi game trực tuyến, hãy cẩn thận khi kết bạn với người lạ."},{"q":"9. I detest to have to get up when it's dark outside. → ___","answer":"having","explanation":"detest + V-ing → having.","accepted":["having","having to"],"vi":"Tôi ghét phải dậy khi trời còn tối bên ngoài."},{"q":"10. Do you fancy to come on a day trip to Bath next Saturday? → ___","answer":"coming","explanation":"fancy + V-ing → coming.","vi":"Bạn có muốn đi chơi một ngày ở Bath vào thứ Bảy tới không?"},{"q":"11. Would you mind to open the window? → ___","answer":"opening","explanation":"mind + V-ing → opening.","vi":"Bạn có phiền mở cửa sổ giúp mình không?"},{"q":"12. Why are they encouraged to learning English? → ___","answer":"learn","explanation":"be encouraged to V → to learn.","accepted":["learn","to learn"],"vi":"Tại sao họ được khuyến khích học tiếng Anh?"},{"q":"13. I preferred comics in my free time. → ___","answer":"reading","explanation":"prefer + V-ing → prefer reading comics.","accepted":["reading","prefer reading","reading comics"],"vi":"Tôi thích đọc truyện tranh hơn vào thời gian rảnh."},{"q":"14. Mai enjoys to make crafts, especially cloth dolls. → ___","answer":"making","explanation":"enjoy + V-ing → making.","vi":"Mai thích làm đồ thủ công, đặc biệt là búp bê vải."},{"q":"15. For some people, training pets are hard work. → ___","answer":"is","explanation":"Chủ ngữ \"training pets\" (danh động từ) số ít → is.","vi":"Đối với một số người, huấn luyện thú cưng là công việc vất vả."}]},{"roman":"IX","navLabel":"Sửa lỗi 2","icon":"file-pen","title":"Sửa lỗi trong đoạn văn","instructions":"Đoạn văn có 5 lỗi. Với mỗi câu, gõ lại dạng ĐÚNG của từ được nêu.","type":"fill","instant":true,"passage":{"title":"Đoạn văn gốc (có lỗi)","html":"Like most people, I turn on my laptop play as well as to study. At weekends, I go to my favourite chat rooms. My mum doesn’t go shop anymore. She likes buy everything online. My sister likes music and she has join a rock group. When I want to improving my English, there are great websites…","vi":"Cũng như hầu hết mọi người, tôi bật laptop lên để chơi cũng như để học. Vào cuối tuần, tôi vào các phòng chat yêu thích của mình. Mẹ tôi không còn đi mua sắm nữa. Mẹ thích mua mọi thứ trên mạng. Chị tôi thích âm nhạc và chị ấy đã tham gia một ban nhạc rock. Khi tôi muốn cải thiện tiếng Anh của mình, có rất nhiều trang web tuyệt vời…"},"questions":[{"q":"1. I turn on my laptop ___ as well as to study.  (play → ?)","answer":"to play","explanation":"\"…to play as well as to study\" (song song \"to study\") → to play.","vi":"Tôi bật laptop lên để chơi cũng như để học."},{"q":"2. My mum doesn't go ___ anymore.  (shop → ?)","answer":"shopping","explanation":"go shopping → shopping.","vi":"Mẹ tôi không còn đi mua sắm nữa."},{"q":"3. She likes ___ everything online.  (buy → ?)","answer":"buying","explanation":"like + V-ing/to-V → buying.","accepted":["buying","to buy"],"vi":"Mẹ thích mua mọi thứ trên mạng."},{"q":"4. My sister has ___ a rock group.  (join → ?)","answer":"joined","explanation":"has + V3 (hiện tại hoàn thành) → joined.","vi":"Chị tôi đã tham gia một ban nhạc rock."},{"q":"5. When I want to ___ my English…  (improving → ?)","answer":"improve","explanation":"want to + V nguyên mẫu → improve.","vi":"Khi tôi muốn cải thiện tiếng Anh của mình…"}]},{"roman":"X","navLabel":"Đọc hiểu 1","icon":"book-open","title":"Đọc hiểu – Điền từ (A/B/C)","instructions":"Đọc đoạn văn và chọn từ đúng (A, B hoặc C) cho mỗi chỗ trống.","type":"mcq","instant":true,"passage":{"title":"Using the Internet","html":"I go on the Internet every day, but I’ve never <b>(1)</b> ___ more than an hour at a time online. I’ve got\n      a laptop and also a smartphone, so I can <b>(2)</b> ___ the Internet anywhere. Today, for instance, I’ve been\n      <b>(3)</b> ___ three times. Mainly I just <b>(4)</b> ___ my friends. I read online magazines and\n      I look <b>(5)</b> ___ information, too. I also compare prices of things, <b>(6)</b> ___ I’ve\n      never bought anything online because I don’t think it’s safe. I’m not an Internet addict, but some of my friends\n      <b>(7)</b> ___. One friend of mine always looks <b>(8)</b> ___ because he spends all night\n      online. Although he’s got bad marks, he hasn’t <b>(9)</b> ___ his habits. In my experience, it’s very useful\n      for people who use the Internet <b>(10)</b> ___.","vi":"Tôi lên mạng mỗi ngày, nhưng chưa bao giờ <b>(1)</b> ___ dùng quá một giờ mỗi lần. Tôi có laptop và điện thoại nên có thể <b>(2)</b> ___ dùng Internet ở bất cứ đâu.\n      Hôm nay chẳng hạn, tôi đã <b>(3)</b> ___ lên mạng ba lần. Chủ yếu tôi chỉ <b>(4)</b> ___ gửi email cho bạn bè. Tôi đọc tạp chí trực tuyến và <b>(5)</b> ___ tìm thông tin. Tôi\n      cũng so sánh giá cả, <b>(6)</b> ___ nhưng chưa bao giờ mua gì online vì thấy không an toàn. Tôi không nghiện Internet, nhưng vài người bạn của tôi thì <b>(7)</b> ___ có.\n      Một người bạn luôn trông <b>(8)</b> ___ mệt mỏi vì thức cả đêm online. Dù bị điểm kém, cậu ấy vẫn chưa <b>(9)</b> ___ thay đổi thói quen. Theo tôi, Internet rất hữu ích\n      với những ai dùng nó <b>(10)</b> ___ một cách hợp lý."},"questions":[{"q":"(1)","options":["spend","spending","spent"],"answer":2,"explanation":"I've never spent (hiện tại hoàn thành) → spent.","vis":["dành (nguyên mẫu, sai — cần chia ở HTHT)","đang dành (V-ing, sai)","đã dành (quá khứ phân từ, đúng — have never spent)"]},{"q":"(2)","options":["have","use","play"],"answer":1,"explanation":"use the internet → use.","vis":["có (sai nghĩa)","sử dụng (đúng — use the Internet)","chơi (sai nghĩa)"]},{"q":"(3)","options":["online","internet","computer"],"answer":0,"explanation":"I've been online three times → online.","vis":["trực tuyến (đúng — I've been online)","mạng Internet (sai — lặp từ, không hợp ngữ pháp)","máy tính (sai nghĩa)"]},{"q":"(4)","options":["write","email","send"],"answer":1,"explanation":"email my friends → email.","vis":["viết (sai — không hợp cấu trúc)","gửi email (đúng — email sb)","gửi (sai — cần thêm giới từ \"to\")"]},{"q":"(5)","options":["at","in","for"],"answer":2,"explanation":"look for information → for.","vis":["tại (sai)","trong (sai)","để tìm (đúng — look for information)"]},{"q":"(6)","options":["because","but","although"],"answer":1,"explanation":"Ý tương phản → but.","vis":["bởi vì (sai — không phải quan hệ nhân quả)","nhưng (đúng — ý tương phản)","mặc dù (sai — không hợp cấu trúc câu)"]},{"q":"(7)","options":["is","were","are"],"answer":2,"explanation":"some of my friends are → are.","vis":["là (số ít, sai)","đã là (quá khứ, sai thì)","là (số nhiều hiện tại, đúng — some of my friends are)"]},{"q":"(8)","options":["tired","hard","happily"],"answer":0,"explanation":"looks + tính từ → tired.","vis":["mệt mỏi (tính từ, đúng — looks + adj)","khó khăn (tính từ, sai nghĩa)","một cách vui vẻ (trạng từ, sai — sau \"look\" cần tính từ)"]},{"q":"(9)","options":["change","to change","changed"],"answer":2,"explanation":"hasn't changed (HTHT) → changed.","vis":["thay đổi (nguyên mẫu, sai)","để thay đổi (to-V, sai)","đã thay đổi (quá khứ phân từ, đúng — hasn't changed)"]},{"q":"(10)","options":["sensible","sensibly","sensibleness"],"answer":1,"explanation":"use the Internet + trạng từ → sensibly.","vis":["hợp lý (tính từ, sai — cần trạng từ bổ nghĩa động từ \"use\")","một cách hợp lý (trạng từ, đúng)","sự hợp lý (danh từ, sai)"]}]},{"roman":"XI","navLabel":"Đọc hiểu 2","icon":"book-open","title":"Đọc hiểu – Watching TV","instructions":"Đọc đoạn văn và chọn đáp án đúng.","type":"mcq","instant":true,"passage":{"title":"Watching television","html":"Most people watch TV in their leisure time. A television is considered essential in every household. It can be a source of\n      entertainment for all members in the family. There are always programmes suitable for different ages, genders and interests. Watching TV\n      is a great way to spend time and <span class=\"gloss\" data-vi=\"gắn kết\">bond</span> with your family. Besides the entertainment value, TV\n      shows can also be educational with cooking programmes and documentaries. TV is also a way to expand your mind and see places you couldn’t\n      in real life. However, spending too much time in front of the TV makes you a <span class=\"gloss\" data-vi=\"người lười, mê xem TV\">couch potato</span>.\n      It can negatively affect your physical health because you are less likely to exercise. Your creativity and imagination can also be limited\n      because of television.","vi":"Hầu hết mọi người xem TV vào thời gian rảnh. TV được xem là thiết yếu trong mỗi gia đình, là nguồn giải trí cho mọi thành viên với các\n      chương trình phù hợp mọi lứa tuổi, giới tính và sở thích. Xem TV là cách tuyệt vời để dành thời gian và gắn kết với gia đình. Ngoài giải\n      trí, các chương trình còn mang tính giáo dục (nấu ăn, phim tài liệu) và giúp mở mang đầu óc, thấy những nơi không thể đến ngoài đời. Tuy\n      nhiên, xem TV quá nhiều biến bạn thành \"couch potato\", ảnh hưởng xấu đến sức khỏe vì ít vận động, và hạn chế sự sáng tạo, trí tưởng tượng."},"questions":[{"q":"1. Which of the following would be the best title of the passage?","options":["Television and Household","Entertainment for family members","Advantages and Disadvantages of watching TV","Imagination from Television"],"answer":2,"explanation":"Bài nêu cả lợi và hại của việc xem TV → C.","vis":["Truyền hình và Gia đình (sai — quá hẹp, chỉ 1 khía cạnh)","Giải trí cho các thành viên gia đình (sai — quá hẹp)","Ưu điểm và Nhược điểm của việc xem TV (đúng — bài nêu cả 2 mặt)","Trí tưởng tượng từ Truyền hình (sai — quá hẹp)"]},{"q":"2. What proves that television serves all members in the family?","options":["TV programmes are for different genders","TV programmes are for all ages","TV programmes are for various interests","All are correct"],"answer":3,"explanation":"\"suitable for different ages, genders and interests\" → All are correct.","vis":["Chương trình TV dành cho các giới tính khác nhau (đúng một phần)","Chương trình TV dành cho mọi lứa tuổi (đúng một phần)","Chương trình TV dành cho nhiều sở thích khác nhau (đúng một phần)","Tất cả đều đúng (đúng — bài nêu cả 3 ý)"]},{"q":"3. According to the writer, what are the advantages of watching TV?","options":["Connecting family members","Providing knowledge","Opening your mind","All are correct"],"answer":3,"explanation":"Bài nêu cả gắn kết, kiến thức, mở mang → All are correct.","vis":["Gắn kết các thành viên gia đình (đúng một phần)","Cung cấp kiến thức (đúng một phần)","Mở mang đầu óc (đúng một phần)","Tất cả đều đúng (đúng — bài nêu cả 3 lợi ích)"]},{"q":"4. According to the writer, what are the disadvantages of watching TV?","options":["Improving your physical health","Encouraging your imagination","A and B are incorrect","A and B are correct"],"answer":2,"explanation":"TV làm hại sức khỏe & hạn chế trí tưởng tượng → A và B đều SAI → C.","vis":["Cải thiện sức khỏe thể chất (sai — TV làm hại sức khỏe)","Khuyến khích trí tưởng tượng (sai — TV làm hạn chế trí tưởng tượng)","A và B đều sai (đúng — cả hai ý đều ngược với nội dung bài)","A và B đều đúng (sai)"]},{"q":"5. Which of the following is NOT mentioned in the passage?","options":["It costs much money to own a television","People watch TV for entertaining","A couch potato may have bad physical health","There are cooking programmes and documentaries"],"answer":0,"explanation":"Bài không nhắc đến chi phí mua TV → A.","vis":["Sở hữu TV tốn nhiều tiền (đúng — không được nhắc đến trong bài)","Mọi người xem TV để giải trí (sai — có được nhắc đến)","Người lười xem TV có thể có sức khỏe kém (sai — có được nhắc đến)","Có các chương trình nấu ăn và phim tài liệu (sai — có được nhắc đến)"]}]},{"roman":"XII","navLabel":"Đọc hội thoại","icon":"comments","title":"Đọc hội thoại – Trả lời câu hỏi","instructions":"Đọc hội thoại và trả lời các câu hỏi (viết câu trả lời ngắn).","type":"sentence","instant":true,"passage":{"title":"What shall we do today?","html":"<b>Hoa:</b> Well, everybody… What shall we do today? Any idea?<br>\n      <b>Mary:</b> I’m not sure… it depends on the weather. Is it sunny outside?<br>\n      <b>Hoa:</b> Just a minute… oh, it’s raining again.<br>\n      <b>Mai:</b> Oh, no! I don’t want another boring day like yesterday. Is there anything interesting we can go and see?<br>\n      <b>Mark:</b> I know. I’ll have a look at the guide book. I’m sure we can find some ideas in there.<br>\n      <b>Mary:</b> All right. Where is the guide book?<br>\n      <b>Mark:</b> It’s there, on the shelf.<br>\n      <b>Mary:</b> Let’s see… well, there’s the Museum of Country Life. How about that?<br>\n      <b>Hoa:</b> Is there anything more exciting?<br>\n      <b>Mary:</b> Well, there’s Aqua World. It’s a Sea Life centre.<br>\n      <b>Hoa:</b> Yes, that sounds better. Why don’t we go there?<br>\n      <b>Mai:</b> OK then, if you like.<br>\n      <b>Mark:</b> Shall I phone them to see what time it opens?<br>\n      <b>Mary:</b> Good idea! So everybody’s happy, then.","vi":"<b>Hoa:</b> Nào mọi người… Hôm nay chúng ta làm gì đây? Có ý gì không?<br>\n      <b>Mary:</b> Mình không chắc… còn tùy thời tiết nữa. Bên ngoài có nắng không?<br>\n      <b>Hoa:</b> Đợi chút… ôi, trời lại mưa rồi.<br>\n      <b>Mai:</b> Ôi không! Mình không muốn một ngày chán như hôm qua nữa. Có gì thú vị để đi xem không?<br>\n      <b>Mark:</b> Mình biết rồi. Để mình xem cuốn sách hướng dẫn. Chắc chắn sẽ tìm được vài ý tưởng trong đó.<br>\n      <b>Mary:</b> Được rồi. Cuốn sách hướng dẫn ở đâu vậy?<br>\n      <b>Mark:</b> Nó ở kia kìa, trên kệ sách.<br>\n      <b>Mary:</b> Để xem nào… à, có Bảo tàng Đời sống Nông thôn. Cái đó thì sao?<br>\n      <b>Hoa:</b> Có gì thú vị hơn không?<br>\n      <b>Mary:</b> À, có Aqua World. Đó là một trung tâm sinh vật biển.<br>\n      <b>Hoa:</b> Ừ, nghe hay hơn đấy. Sao chúng ta không đến đó nhỉ?<br>\n      <b>Mai:</b> Được thôi, nếu các bạn thích.<br>\n      <b>Mark:</b> Để mình gọi điện hỏi xem mấy giờ họ mở cửa nhé?<br>\n      <b>Mary:</b> Ý hay đấy! Vậy là mọi người đều đồng ý rồi nhé."},"questions":[{"q":"1. How many people are there altogether?","answer":"There are four.","keywords":["four"],"explanation":"Có 4 người: Hoa, Mary, Mai, Mark.","vi":"Câu hỏi: Tổng cộng có bao nhiêu người? → Trả lời: Có bốn người."},{"q":"2. Can they do some leisure activities outside today? Why (not)?","answer":"No, they can't because it's raining.","keywords":["rain"],"explanation":"Trời đang mưa (\"it’s raining again\") nên không thể ra ngoài.","vi":"Câu hỏi: Hôm nay họ có thể làm hoạt động giải trí ở ngoài trời không? Vì sao (không)? → Trả lời: Không, họ không thể vì trời đang mưa."},{"q":"3. Did they have an exciting day yesterday?","answer":"No, they didn't.","keywords":["no"],"explanation":"Mai nói \"another boring day like yesterday\" → hôm qua chán.","vi":"Câu hỏi: Hôm qua họ có một ngày thú vị không? → Trả lời: Không, họ không có."},{"q":"4. Is there anything interesting they can go and see?","answer":"Yes, there is.","keywords":["yes"],"explanation":"Có Aqua World (Sea Life Centre).","vi":"Câu hỏi: Có điều gì thú vị để họ đi xem không? → Trả lời: Có."},{"q":"5. What will they do at last?","answer":"They will go to Aqua World (the Sea Life Centre).","keywords":["aqua"],"explanation":"Cuối cùng họ quyết định đến Aqua World.","vi":"Câu hỏi: Cuối cùng họ sẽ làm gì? → Trả lời: Họ sẽ đến Aqua World (trung tâm Sinh vật biển)."}]},{"roman":"XIII","navLabel":"Sắp xếp câu","icon":"puzzle-piece","title":"Sắp xếp thành câu đúng","instructions":"Nhấp vào các từ theo thứ tự đúng để tạo thành câu hoàn chỉnh.","type":"reorder","instant":true,"questions":[{"q":"1.","words":["to","you","listening","like","music?","Do"],"answer":"Do you like listening to music","accepted":["do you like listening to music"],"explanation":"Do you like listening to music?","vi":"Bạn có thích nghe nhạc không?"},{"q":"2.","words":["in","My","flowers","mother","the","planti ounded-xl p-3 text-center font-['Baloo_2'] text-indigo-800 mb-3">Verbs of liking + <b>V-ing</b></div><ul class="text-sm text-slate-700 space-y-1.5 list-disc pl-5 mb-3"><li><i>He loves watching football.</i> <span class="text-slate-400">(Anh ấy thích xem bóng đá.)</span></li><li><i>John is keen on getting together.</i> <span class="text-slate-400">(John thích tụ tập bạn bè.)</span></li><li><i>Loan enjoys reading books so much.</i> <span class="text-slate-400">(Loan rất thích đọc sách.)</span></li></ul><h4 class="font-bold text-slate-800 mb-2 mt-3">Phân biệt <i>like + V-ing</i> và <i>like + to-V</i></h4><div class="grid md:grid-cols-2 gap-3"><div class="bg-sky-50 border border-sky-200 rounded-xl p-4"><div class="font-['Baloo_2'] text-sky-800">like + V-ing</div><p class="text-xs text-slate-500 mt-1">Chỉ 1 hành động thuộc về sở thích, có tính chất lâu dài, theo thói quen.</p><p class="text-sm text-slate-700 mt-1"><i>I like doing exercises at midnight.</i> <span class="text-slate-400">(Tôi thích làm bài tập vào lúc nửa đêm.)</span></p></div><div class="bg-pink-50 border border-pink-200 rounded-xl p-4"><div class="font-['Baloo_2'] text-pink-800">like + to-V</div><p class="text-xs text-slate-500 mt-1">Chỉ 1 hành động thích/muốn làm gì đó có tính chất bộc phát, tạm thời.</p><p class="text-sm text-slate-700 mt-1"><i>I like to swim this Saturday.</i> <span class="text-slate-400">(Thứ Bảy này tôi muốn đi bơi.)</span></p></div></div><div class="mt-3 bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl p-4"><b class="text-amber-700 text-sm"><i class="fa-solid fa-bolt mr-1"></i>Mẹo nhớ nhanh</b><ul class="mt-1 space-y-1 text-sm text-amber-900 list-none"><li>🔑 <b>ADORE, ENJOY, FANCY, DON'T MIND, DETEST, DISLIKE</b> → chỉ dùng <b>V-ing</b>.</li><li>🔑 <b>LIKE, LOVE, HATE, PREFER</b> → dùng được cả <b>V-ing</b> và <b>to-V</b>.</li><li>🔑 <b>be keen on / be into / be hooked on / be addicted to</b> + <b>V-ing</b> (sau giới từ).</li><li>🔑 <b>prefer V-ing to V-i function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[‘’]/g,"'")
    .replace(/["“”]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-32':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function renderBank(bank, idx, clickable){
  if(!bank || !bank.length) return '';
  const hint = clickable ? ' <span class="normal-case font-normal text-slate-400">(bấm để điền)</span>' : '';
  return `<div class="mb-4"><p class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide"><i class="fa-solid fa-list-ul mr-1"></i>Từ gợi ý${hint}</p>
    <div class="grid grid-cols-2 sm:grid-cols-5 border-2 border-slate-800 rounded-lg overflow-hidden text-sm font-bold text-slate-800">
      ${bank.map((w,bi)=>clickable
        ? `<div class="bank-chip px-3 py-2 text-center border border-slate-300 bg-white" id="bankchip_${idx}_${bi}" onclick="fillFromBank(${idx},${bi})">${w}</div>`
        : `<div class="px-3 py-2 text-center border border-slate-300 bg-white">${w}</div>`
      ).join('')}
    </div>
  </div>`;
}
function fillFromBank(idx, bi){
  const chip = document.getElementById(`bankchip_${idx}_${bi}`);
  if(!chip || chip.classList.contains('used')) return;
  const word = DATA.sections[idx].bank[bi];
  const inputs = Array.from(document.querySelectorAll(`#tab-${idx} input.answer-input[id^="inp_${idx}_"]`));
  const target = inputs.find(inp => inp.value.trim()==='');
  if(!target) return;
  target.value = word;
  target.dataset.bankChip = bi;
  chip.classList.add('used');
}
function releaseBankChipIfChanged(idx,i){
  const inp=document.getElementById(`inp_${idx}_${i}`);
  if(!inp || inp.dataset.bankChip===undefined) return;
  const bi=inp.dataset.bankChip;
  delete inp.dataset.bankChip;
  const chip=document.getElementById(`bankchip_${idx}_${bi}`);
  if(chip) chip.classList.remove('used');
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-800 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderIntro(s.intro);
  if(s.type!=='matching') inner += renderBank(s.bank, idx, s.type==='fill');

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = s.bank ? 'w-40' : widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      const bankAttr = s.bank ? ` oninput="releaseBankChipIfChanged(${idx},${i})"` : '';
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"${bankAttr}></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      const origBlock = q.original ? `<p class="text-slate-700 text-sm mb-2">${q.original}</p>` : '';
      if(q.starter){
        inner += `${origBlock}
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `${origBlock}<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    } else if(s.type==='reorder'){
      const promptBlock = q.prompt ? `<p class="text-slate-500 text-sm mb-2 italic">${q.prompt}</p>` : '';
      const chips = q.words.map((w,j)=>`<span class="word-chip bg-white border-2 border-lime-300 text-lime-700 font-bold text-sm px-3 py-1.5 rounded-xl shadow-sm" id="chip_${idx}_${i}_${j}" onclick="addChip(${idx},${i},${j})">${w}</span>`).join('');
      inner += `${promptBlock}
        <div class="flex flex-wrap gap-2 mb-3">${chips}</div>
        <div class="answer-line flex flex-wrap gap-2 items-center bg-lime-50 border-2 border-dashed border-lime-300 rounded-xl p-3" id="line_${idx}_${i}"></div>
        <div class="flex gap-2 mt-2">
          <button type="button" onclick="clearChips(${idx},${i})" class="text-xs font-bold text-slate-500 hover:text-rose-600 transition"><i class="fa-solid fa-eraser mr-1"></i>Xóa hết</button>
        </div>
        <input type="hidden" id="inp_${idx}_${i}" value="">`;
    } else if(s.type==='matching'){
      const opts = s.bank.map((b,j)=>`<option value="${j}">${b}</option>`).join('');
      const instantAttr = s.instant ? ` onchange="gradeOneMatching(${idx},${i})"` : '';
      inner += `<select id="inp_${idx}_${i}" class="answer-input px-3 py-2 rounded-lg text-sm font-semibold"${instantAttr}><option value="-1">-- chọn nhóm --</option>${opts}</select>`;
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-sky-500 to-indigo-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = renderTheory() + DATA.sections.map((s,i)=>renderSection(s,i)).join('') + renderWriting();
  DATA.sections.forEach((s,idx)=>{
    if(s.type==='reorder'){ s.questions.forEach((q,i)=>renderReorderLine(idx,i)); }
  });
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneMatching(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const sel=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!sel || !fb) return;
  const chosen=parseInt(sel.value);
  if(isNaN(chosen) || chosen===-1){ sel.classList.remove('correct-input','wrong-input'); fb.classList.remove('show'); fb.innerHTML=''; return; }
  const ok = chosen===q.match;
  sel.classList.remove('correct-input','wrong-input'); sel.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, s.bank[q.match], q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  let ok;
  if(q.keywords){ ok = q.keywords.every(k=>val.includes(normalize(k))); }
  else { const acc=(q.accepted||[q.answer]).map(normalize); ok = acc.includes(val); }
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  const answerLabel = q.starter ? `${q.starter} ${q.answer}` : q.answer;
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function addChip(idx,i,j){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) reorderState[key] = [];
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(!chip || chip.classList.contains('used')) return;
  chip.classList.add('used');
  reorderState[key].push(j);
  renderReorderLine(idx,i);
  const q = DATA.sections[idx].questions[i];
  if(DATA.sections[idx].instant && reorderState[key].length===q.words.length){ gradeOneSentence(idx,i); }
}
function removeChip(idx,i,pos){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) return;
  const j = reorderState[key][pos];
  reorderState[key].splice(pos,1);
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(chip) chip.classList.remove('used');
  renderReorderLine(idx,i);
  const q = DATA.sections[idx].questions[i];
  if(DATA.sections[idx].instant && reorderState[key].length===q.words.length){
    gradeOneSentence(idx,i);
  } else {
    const inp=document.getElementById(`inp_${idx}_${i}`);
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(inp) inp.classList.remove('correct-input','wrong-input');
    if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
  }
}
function clearChips(idx,i){
  const key = `${idx}_${i}`;
  (reorderState[key]||[]).forEach(j=>{
    const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
    if(chip) chip.classList.remove('used');
  });
  reorderState[key] = [];
  renderReorderLine(idx,i);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
}
function renderReorderLine(idx,i){
  const key = `${idx}_${i}`;
  const words = DATA.sections[idx].questions[i].words;
  const line = document.getElementById(`line_${idx}_${i}`);
  const inp = document.getElementById(`inp_${idx}_${i}`);
  const seq = reorderState[key]||[];
  if(!seq.length){
    line.innerHTML = `<span class="text-slate-400 text-sm italic">Nhấp vào các từ bên trên theo đúng thứ tự…</span>`;
  } else {
    line.innerHTML = seq.map((wi,pos)=>`<span class="word-chip bg-lime-500 text-white font-bold text-sm px-3 py-1.5 rounded-xl" onclick="removeChip(${idx},${i},${pos})">${words[wi]}</span>`).join('');
  }
  if(inp) inp.value = seq.map(wi=>words[wi]).join(' ');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else if(s.type==='matching'){
      const sel=document.getElementById(`inp_${idx}_${i}`);
      const chosen=parseInt(sel.value);
      ok = chosen===q.match;
      sel.classList.remove('correct-input','wrong-input');
      sel.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = s.bank[q.match];
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      if(q.keywords){ ok = val!=='' && q.keywords.every(k=>val.includes(normalize(k))); }
      else { const acc=(q.accepted||[q.answer]).map(normalize); ok = val!=='' && acc.includes(val); }
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.starter ? `${q.starter} ${q.answer}` : q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel;
    if(s.type==='mcq') answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
    else if(s.type==='matching') answerLabel = s.bank[q.match];
    else if(q.starter) answerLabel = `${q.starter} ${q.answer}`;
    else answerLabel = q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else if(s.type==='reorder'){
      clearChips(idx,i);
    } else if(s.type==='matching'){
      const sel=document.getElementById(`inp_${idx}_${i}`);
      if(sel){ sel.value='-1'; sel.classList.remove('correct-input','wrong-input'); }
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  document.querySelectorAll(`#tab-${idx} .bank-chip`).forEach(c=>c.classList.remove('used'));
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btnId = idx==='theory' ? 'navbtn_theory' : idx==='writing' ? 'navbtn_writing' : `navbtn_${idx}`;
  const btn=document.getElementById(btnId);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#0ea5e9','#6366f1','#ec4899','#38bdf8','#a78bfa','#f472b6'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();


/* ---- Writing paragraph (non-scored, giu nguyen tu ban goc) ---- */
function toggleModelEssay(){ document.getElementById('model-essay').classList.toggle('vi-hidden'); }
(function(){
  const essay = document.getElementById('essay-input');
  if(essay){
    essay.addEventListener('input', () => {
      const words = essay.value.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('essay-count').textContent = `Số từ: ${words}`;
    });
  }
})();

</script>
