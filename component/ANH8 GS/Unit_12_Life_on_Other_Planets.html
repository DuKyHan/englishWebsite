":"Anh ấy muốn biết liệu tôi có máy tính không.","explanation":"Lùi thì trong câu tường thuật: \"have\"→\"had\".","note":"lùi thì (backshift) trong câu tường thuật"},{"q":"7. Some ___ person had left out towels, soap and shampoo in our rooms,","options":["needful","harmful","thoughtful","peaceful"],"answer":2,"vi":"Một người chu đáo nào đó đã để sẵn khăn, xà phòng và dầu gội trong phòng chúng tôi.","explanation":"\"thoughtful\" phù hợp ngữ cảnh.","note":"từ vựng phù hợp ngữ cảnh","vis":["cần thiết","có hại","chu đáo","hòa bình"]},{"q":"8. ___ I help you with that difficult task?","options":["May","Might","Need","Should"],"answer":0,"vi":"Tôi có thể giúp bạn với nhiệm vụ khó khăn đó không?","explanation":"\"May I...?\" = lời đề nghị giúp đỡ lịch sự.","note":"May + I + V-inf?","vis":["có thể (xin phép)","có thể (khả năng thấp)","cần","nên"]},{"q":"9. The scheme has been set up to help ___ people.","options":["tasteless","homeless","priceless","endless"],"answer":1,"vi":"Chương trình được thiết lập để giúp đỡ những người vô gia cư.","explanation":"\"homeless people\" = người vô gia cư.","note":"adjective + noun","vis":["nhạt nhẽo, vô vị","vô gia cư","vô giá","vô tận"]},{"q":"10. The pills might ___ him, if only he’d taken them regularly.","options":["have help","helped","have helped","helps"],"answer":2,"vi":"Thuốc có thể đã giúp anh ấy, nếu anh ấy uống đều đặn.","explanation":"\"might have + P2\" diễn tả khả năng ở quá khứ không có thật.","note":"might have + P2"},{"q":"11. There is a range of programs on the market which may ___ described as design aids.","options":["to be","being","be","been"],"answer":2,"vi":"Có nhiều chương trình trên thị trường có thể được mô tả là công cụ hỗ trợ thiết kế.","explanation":"Sau \"may\" + bị động cần \"be\" nguyên mẫu → be described.","note":"may + be + P2 (bị động)"},{"q":"12. He said he might ___ tomorrow.","options":["come","comes","to come","coming"],"answer":0,"vi":"Anh ấy nói có thể ngày mai anh ấy sẽ đến.","explanation":"Sau \"might\" cần động từ nguyên mẫu → come.","note":"might + V-inf"},{"q":"13. The teacher asked the girl if she ___ her homework.","options":["has done","had done","have done","having done"],"answer":1,"vi":"Cô giáo hỏi cô bé đã làm bài tập chưa.","explanation":"Lùi thì trong câu tường thuật: \"has done\"→\"had done\".","note":"lùi thì (backshift): has done → had done"},{"q":"14. The traveler asked where the nearest inn ___.","options":["was","were","is","are"],"answer":0,"vi":"Người du khách hỏi nhà trọ gần nhất ở đâu.","explanation":"Lùi thì: \"is\"→\"was\", chủ ngữ số ít \"the nearest inn\".","note":"lùi thì (backshift): is → was"},{"q":"15. I asked her if she ___ me.","options":["helps","have helped","wil1 help","would help"],"answer":3,"vi":"Tôi hỏi cô ấy liệu cô ấy có giúp tôi không.","explanation":"Lùi thì: \"will help\"→\"would help\".","note":"lùi thì (backshift): will → would"},{"q":"16. I will be ___ flute in my hometown at 7 p.m. tomorrow.","options":["play","playing","played","plays"],"answer":1,"vi":"Tôi sẽ đang chơi sáo ở quê nhà lúc 7 giờ tối mai.","explanation":"Thì tương lai tiếp diễn: will be + V-ing.","note":"S + will be + V-ing"},{"q":"17. \"What is your ___?\" \"I’m Vietnamese\".","options":["nationality","national","nation","nations"],"answer":0,"vi":"\"Quốc tịch của bạn là gì?\" \"Tôi là người Việt Nam.\"","explanation":"\"your nationality\" = quốc tịch của bạn.","note":"từ vựng phù hợp ngữ cảnh","vis":["quốc tịch (danh từ)","thuộc quốc gia (tính từ)","quốc gia (danh từ)","các quốc gia (số nhiều)"]},{"q":"18. Technology development has ___ effects on people’s life.","options":["enormous","any","none","no"],"answer":0,"vi":"Sự phát triển công nghệ có ảnh hưởng to lớn đến cuộc sống con người.","explanation":"\"enormous effects\" = ảnh hưởng to lớn.","note":"adjective + noun","vis":["to lớn, khổng lồ","bất kỳ","không có gì","không"]},{"q":"19. She asked me how I ___ to school that day.","options":["goes","go","went","gone"],"answer":2,"vi":"Cô ấy hỏi tôi hôm đó tôi đã đến trường bằng cách nào.","explanation":"Lùi thì: \"go\"→\"went\" (câu tường thuật).","note":"lùi thì (backshift): go → went"},{"q":"20. \"In 2030, will people ___ on the Moon?\" Khanh asked his teacher.","options":["travel","travels","travelled","be traveling"],"answer":3,"vi":"\"Đến năm 2030, con người có du hành trên Mặt Trăng không?\" Khánh hỏi cô giáo.","explanation":"Đây là câu hỏi trực tiếp trước khi tường thuật, dùng tương lai tiếp diễn → be traveling.","note":"will + be + V-ing (tương lai tiếp diễn)"},{"q":"21. We will be travelling to Australia ___ the end of the month.","options":["in","at","on","of"],"answer":1,"vi":"Chúng tôi sẽ đi du lịch Úc vào cuối tháng.","explanation":"\"at the end of\" = vào cuối.","note":"at the end of + N"},{"q":"22. Robots can ___ lots of benefits to owners in the future.","options":["buy","buys","bring","brings"],"answer":2,"vi":"Robot có thể mang lại nhiều lợi ích cho chủ sở hữu trong tương lai.","explanation":"Sau \"can\" cần động từ nguyên mẫu → bring.","note":"can + V-inf"},{"q":"23. Will you ___ on the Internet if you have a computer?","options":["be learning","learn","learns","learned"],"answer":0,"vi":"Bạn có sẽ học trực tuyến nếu có máy tính không?","explanation":"Thì tương lai tiếp diễn: Will + S + be + V-ing?","note":"Will + S + be + V-ing?"},{"q":"24. My father said that he would travel to Japan the ___ day.","options":["future","next","followings","following"],"answer":3,"vi":"Bố tôi nói rằng ông sẽ đi Nhật vào ngày hôm sau.","explanation":"\"the following day\" = ngày hôm sau (trong câu tường thuật).","note":"the following day (biến đổi thời gian trong câu tường thuật)","vis":["tương lai","tiếp theo","(không tồn tại)","tiếp theo, hôm sau"]},{"q":"25. Lucy always ___ to become a good student, so her parents are very happy.","options":["deny","denies","try","tries"],"answer":3,"vi":"Lucy luôn cố gắng trở thành một học sinh giỏi, vì vậy bố mẹ cô ấy rất hạnh phúc.","explanation":"Chủ ngữ số ít \"Lucy\" → tries.","note":"S (số ít) + V-ies","vis":["phủ nhận","phủ tại (số ít)","cố gắng","cố gắng (số ít)"]},{"q":"26. Some people said that the alien’s eyes ___ green and had a big head.","options":["were","was","are","is"],"answer":0,"vi":"Một số người nói rằng mắt của người ngoài hành tinh có màu xanh lá và đầu to.","explanation":"Chủ ngữ số nhiều \"eyes\" + lùi thì → were.","note":"chủ ngữ số nhiều + were (lùi thì)"},{"q":"27. Learning ___ the Internet is a useful way to save time.","options":["in","at","into","on"],"answer":3,"vi":"Học trực tuyến là một cách hữu ích để tiết kiệm thời gian.","explanation":"\"learning on the Internet\" = học trên mạng Internet.","note":"learning on + N"},{"q":"28. Will she ___ taking part in The Voice at this time tomorrow.","options":["is","was","be","are"],"answer":2,"vi":"Liệu cô ấy có đang tham gia The Voice vào giờ này ngày mai không?","explanation":"Thì tương lai tiếp diễn: Will + S + be + V-ing.","note":"Will + S + be + V-ing?"},{"q":"29. My students might ___ it difficult to complete their homework","options":["finds","found","find","finding"],"answer":2,"vi":"Học sinh của tôi có thể thấy khó hoàn thành bài tập về nhà.","explanation":"Sau \"might\" cần động từ nguyên mẫu → find.","note":"might + V-inf"},{"q":"30. What ___ are scientists interested in?","options":["scopes","areas","types","fields"],"answer":3,"vi":"Các nhà khoa học quan tâm đến lĩnh vực gì?","explanation":"\"fields\" phù hợp ngữ cảnh khoa học.","note":"từ vựng phù hợp ngữ cảnh","vis":["phạm vi","khu vực, lĩnh vực","loại, kiểu","lĩnh vực (nghiên cứu)"]},{"q":"31. The scientists believe that there might be some planets to ___ human life.","options":["provide","accommodate","replace","support"],"answer":1,"vi":"Các nhà khoa học tin rằng có thể có một số hành tinh có thể dung chứa sự sống con người.","explanation":"\"accommodate human life\" = dung chứa sự sống con người.","note":"từ vựng phù hợp ngữ cảnh","vis":["cung cấp","dung chứa, chứa đựng","thay thế","hỗ trợ"]},{"q":"32. Mercury ___ after the Roman God Mercury.","options":["named","called","is named","is called"],"answer":2,"vi":"Sao Thủy được đặt tên theo vị thần La Mã Mercury.","explanation":"Bị động, hiện tại đơn → is named.","note":"S + is named + after + N (bị động)"},{"q":"33. The prerequisite condition for a ___ planet is water supplies, appropriate temperatures and breathable air.","options":["habitable","inhabitable","habitant","inhabitant"],"answer":0,"vi":"Điều kiện tiên quyết để một hành tinh có thể sinh sống được là nguồn nước, nhiệt độ thích hợp và không khí thở được.","explanation":"\"habitable planet\" = hành tinh có thể sinh sống được.","note":"habitable (adj) ≠ inhabitant (n)","vis":["có thể sinh sống được","không thể ở được (không tồn tại, dễ nhầm)","người cư trú (ít dùng)","cư dân, người sinh sống"]},{"q":"34. ___ I have a look at the photos of outer space in your computer?","options":["Might","Could","Shall","May"],"answer":3,"vi":"Tôi có thể xem những bức ảnh về ngoài vũ trụ trong máy tính của bạn không?","explanation":"\"May I...?\" = xin phép lịch sự.","note":"May + I + V-inf?","vis":["có thể (khả năng thấp)","có thể","sẽ","có thể (xin phép)"]},{"q":"35. Mercury is very close to the sun, and it is very hot. Therefore, there ___ not be life on it.","options":["might","could","can","will"],"answer":0,"vi":"Sao Thủy rất gần mặt trời, và rất nóng. Vì vậy, có thể không có sự sống trên đó.","explanation":"\"might\" diễn tả khả năng, phù hợp với sự suy đoán.","note":"might (not) + V-inf (khả năng)","vis":["có thể (khả năng)","có thể","có thể","sẽ"]},{"q":"36. My friend asked me ___ I had ever seen any unidentified flying object.","options":["if","whether","where","both A & B"],"answer":3,"vi":"Bạn tôi hỏi tôi liệu tôi đã từng thấy vật thể bay không xác định nào chưa.","explanation":"Câu hỏi Yes/No gián tiếp có thể dùng \"if\" hoặc \"whether\".","note":"asked + if/whether + S + V","vis":["liệu","liệu","ở đâu","cả A và B"]},{"q":"37. She wondered ___ a space buggy looked like.","options":["what","how","which","what things"],"answer":0,"vi":"Cô ấy tự hỏi một chiếc xe vũ trụ trông như thế nào.","explanation":"\"what...look like\" = trông như thế nào.","note":"wondered + what + S + V + like","vis":["gì","như thế nào","cái nào","những gì"]},{"q":"38. I am not sure ___ food tablets might supply enough energy for astronauts or not.","options":["what","why","how","if"],"answer":3,"vi":"Tôi không chắc liệu viên nén thực phẩm có cung cấp đủ năng lượng cho phi hành gia hay không.","explanation":"\"not sure if...or not\" = không chắc liệu...hay không.","note":"not sure + if + S + V + or not","vis":["gì","tại sao","như thế nào","liệu"]},{"q":"39. The teacher asked us what the essential conditions for human life ___","options":["is","are","was","were"],"answer":3,"vi":"Giáo viên hỏi chúng tôi những điều kiện thiết yếu cho sự sống con người là gì.","explanation":"Chủ ngữ số nhiều \"conditions\" + lùi thì → were.","note":"chủ ngữ số nhiều + were (lùi thì)"},{"q":"40. The little boys wondered if he would meet an alien in his dream ___","options":["tonight","this night","that night","that day’s night"],"answer":2,"vi":"Cậu bé tự hỏi liệu cậu có gặp người ngoài hành tinh trong giấc mơ đêm đó không.","explanation":"\"tonight\" trong câu tường thuật đổi thành \"that night\".","note":"tonight → that night (biến đổi trong câu tường thuật)","vis":["tối nay","(không tự nhiên)","đêm đó","(không tự nhiên)"]},{"q":"41. People are using a lot of plastic bags everyday; ……, the amount of waste has kept increasing.","options":["however","therefore","so","although"],"answer":1,"vi":"Người ta dùng rất nhiều túi ni lông mỗi ngày; do đó, lượng rác thải cứ tăng mãi.","explanation":"Nêu kết quả, đứng đầu câu sau dấu chấm phẩy → therefore.","note":"S + V; therefore, S + V","vis":["tuy nhiên","do đó","vì vậy","mặc dù"]},{"q":"42. Scotland is very famous ……, its rich culture as well as unique natural beauty.","options":["for","about","because","in"],"answer":0,"vi":"Scotland nổi tiếng vì nền văn hóa phong phú cũng như vẻ đẹp tự nhiên độc đáo.","explanation":"\"be famous for\" = nổi tiếng vì.","note":"be famous for + N"},{"q":"43. People consume a lot of contaminated food. It ……….many health problems.","options":["leads in","leads to","results to","results from"],"answer":1,"vi":"Người ta tiêu thụ nhiều thực phẩm ô nhiễm. Điều đó dẫn đến nhiều vấn đề sức khỏe.","explanation":"\"lead to\" = dẫn đến.","note":"S + leads to + N","vis":["dẫn vào","dẫn đến","(sai, không tồn tại)","do...gây ra"]},{"q":"44. If more people ……… public transport, it reduce traffic jam and air pollution.","options":["use-will","used -will","used-would","use-would"],"answer":0,"vi":"Nếu nhiều người sử dụng phương tiện công cộng hơn, nó sẽ giảm tắc đường và ô nhiễm không khí.","explanation":"Câu điều kiện loại 1: If + S + V(hiện tại), S + will + V.","note":"If + S + V(hiện tại), S + will + V","vis":["dùng-hiện tại + will (đk loại 1)","dùng-quá khứ + will (sai thì)","dùng-quá khứ + would (đk loại 2)","dùng-hiện tại + would (sai thì)"]},{"q":"45. You shouldn’t fiddle your ……….., when you speak to someone.","options":["head","nose","hair","shoulder"],"answer":2,"vi":"Bạn không nên nghịch tóc khi nói chuyện với ai đó.","explanation":"\"fiddle your hair\" = nghịch tóc.","note":"từ vựng phù hợp ngữ cảnh","vis":["đầu","mũi","tóc","vai"]},{"q":"46. California ……….., the most iconic theme park in the world.","options":["had","has had","have","has"],"answer":3,"vi":"California có công viên giải trí mang tính biểu tượng nhất thế giới.","explanation":"Chủ ngữ số ít \"California\" → has.","note":"S (số ít) + has"},{"q":"47. The ash of volcanic eruption ……….., be good for growing plants.","options":["will","may","might","both B & C"],"answer":3,"vi":"Tro núi lửa có thể tốt cho việc trồng cây.","explanation":"\"may\" và \"might\" đều diễn tả khả năng, có thể dùng thay thế cho nhau ở đây.","note":"may/might + be + adjective (khả năng)"},{"q":"48. Most European citizen ……….., to apply for a visa to visit Canada.","options":["doesn’t have","don’t have","didn’t have","hadn’t have"],"answer":1,"vi":"Hầu hết công dân châu Âu không cần xin visa để đến thăm Canada.","explanation":"Chủ ngữ số nhiều \"citizens\" → don’t have.","note":"chủ ngữ số nhiều + don’t have"},{"q":"49. Dave fancy ……….., non-fiction movies with his friends.","options":["to watch","watching","be watched","being watched"],"answer":1,"vi":"Dave thích xem phim tài liệu cùng bạn bè.","explanation":"\"fancy\" + V-ing = thích làm gì.","note":"fancy + V-ing"},{"q":"50. The teacher told me not hesitate ……….., her if I had some questions.","options":["asking","to ask","being asked","to be asked"],"answer":1,"vi":"Cô giáo bảo tôi đừng ngần ngại hỏi cô nếu có thắc mắc.","explanation":"\"hesitate to V\" = ngần ngại làm gì.","note":"hesitate + to V"}],"roman":"III"},{"navLabel":"Word Forms","title":"Cho dạng đúng của từ trong ngoặc (Word Forms)","icon":"spell-check","instructions":"Dùng từ gợi ý trong ngoặc để điền dạng đúng vào chỗ trống.","type":"fill","questions":[{"q":"1. You should book your travel ___ and flights quickly.","answer":"accommodations","vi":"Bạn nên đặt chỗ ở và vé máy bay nhanh chóng.","explanation":"Sau tính từ sở hữu \"your\" cần danh từ số nhiều → accommodations.","note":"sở hữu cách + plural noun","hint":"(ACCOMMODATE)","family":["accommodate (v): cung cấp chỗ ở","accommodation(s) (n): chỗ ở"]},{"q":"2. He’s very young and not very ___.","answer":"experienced","vi":"Anh ấy còn rất trẻ và không có nhiều kinh nghiệm.","explanation":"Sau \"is not very\" cần tính từ → experienced.","note":"be + adjective","hint":"(EXPERIENCE)","family":["experience (n): kinh nghiệm","experienced (adj): có kinh nghiệm"]},{"q":"3. A ___ is a garment worn to keep a human alive in the harsh environment of outer space, vacuum and temperature extremes.","answer":"spacesuit","vi":"Bộ đồ vũ trụ là trang phục giúp con người sống sót trong môi trường khắc nghiệt ngoài vũ trụ, chân không và nhiệt độ cực đoan.","explanation":"Sau mạo từ \"A\" cần danh từ → spacesuit.","note":"a + noun (danh từ ghép)","hint":"(SPACE)","family":["space (n): không gian, vũ trụ","spacesuit (n): bộ đồ vũ trụ"]},{"q":"4. Listeria can cause fatal blood ___.","answer":"poisoning","vi":"Vi khuẩn Listeria có thể gây nhiễm độc máu chết người.","explanation":"Sau \"blood\" cần danh từ → poisoning.","note":"noun + noun (danh từ ghép)","hint":"(POISON)","family":["poison (n/v): chất độc / đầu độc","poisoning (n): sự nhiễm độc"]},{"q":"5. ___ is the capability to trace something.","answer":"Traceability","vi":"Khả năng truy vết là năng lực lần theo dấu vết của một thứ gì đó.","explanation":"Chủ ngữ của câu cần danh từ → Traceability.","note":"noun (chủ ngữ)","hint":"(TRACE)","family":["trace (v): lần theo dấu vết","traceable (adj): có thể lần theo","traceability (n): khả năng truy vết"]},{"q":"6. ___ space, or the space between the planets, is not empty but is filled with the solar wind.","answer":"Interplanetary","vi":"Không gian liên hành tinh, tức khoảng không giữa các hành tinh, không hề trống rỗng mà chứa đầy gió mặt trời.","explanation":"Trước danh từ \"space\" cần tính từ → Interplanetary.","note":"adjective + noun","hint":"(PLANET)","family":["planet (n): hành tinh","interplanetary (adj): liên hành tinh"]},{"q":"7. Astronauts work in ___ conditions.","answer":"weightless","vi":"Các phi hành gia làm việc trong điều kiện không trọng lượng.","explanation":"Trước danh từ \"conditions\" cần tính từ → weightless.","note":"adjective + noun","hint":"(WEIGHT)","family":["weight (n): trọng lượng","weightless (adj): không trọng lượng"]},{"q":"8. People have been ___ into leaving their homes.","answer":"terrorized","vi":"Người ta đã bị khủng bố đến mức phải rời bỏ nhà cửa.","explanation":"Bị động, sau \"have been\" cần quá khứ phân từ → terrorized.","note":"have been + P2 (bị động)","hint":"(TERROR)","family":["terror (n): sự khủng bố","terrorize (v): khủng bố, uy hiếp"]},{"q":"9. They were standing ___ close to the crocodile.","answer":"dangerously","vi":"Họ đứng gần con cá sấu một cách nguy hiểm.","explanation":"Trạng từ bổ nghĩa cho \"close\" → dangerously.","note":"adverb + adjective","hint":"(DANGER)","family":["danger (n): mối nguy hiểm","dangerous (adj): nguy hiểm","dangerously (adv): một cách nguy hiểm"]},{"q":"10. Her interests include anything ___ or challenging.","answer":"adventurous","vi":"Sở thích của cô ấy bao gồm bất cứ điều gì mang tính phiêu lưu hoặc thử thách.","explanation":"Song song với tính từ \"challenging\" → adventurous.","note":"adjective + or + adjective","hint":"(ADVENTURE)","family":["adventure (n): cuộc phiêu lưu","adventurous (adj): mang tính phiêu lưu"]},{"q":"11. She’s a romantic at heart, a born ___.","answer":"adventurer","vi":"Sâu thẳm trong lòng cô ấy là một người lãng mạn, một nhà thám hiểm bẩm sinh.","explanation":"Sau \"a born\" cần danh từ chỉ người → adventurer.","note":"a + noun (chỉ người)","hint":"(ADVENTURE)","family":["adventure (n): cuộc phiêu lưu","adventurer (n): nhà thám hiểm, người ưa mạo hiểm"]},{"q":"12. This route through the mountains is very ___.","answer":"dangerous","vi":"Con đường xuyên núi này rất nguy hiểm.","explanation":"Sau \"is very\" cần tính từ → dangerous.","note":"be + adjective","hint":"(DANGER)","family":["danger (n): mối nguy hiểm","dangerous (adj): nguy hiểm"]},{"q":"13. Their villa is surrounded by ___ gardens.","answer":"spacious","vi":"Biệt thự của họ được bao quanh bởi những khu vườn rộng rãi.","explanation":"Trước danh từ \"gardens\" cần tính từ → spacious.","note":"adjective + noun","hint":"(SPACE)","family":["space (n): không gian","spacious (adj): rộng rãi"]},{"q":"14. The leaves of certain trees are ___ to human being.","answer":"poisonous","vi":"Lá của một số loại cây có độc đối với con người.","explanation":"Sau \"are\" cần tính từ → poisonous.","note":"be + adjective","hint":"(POISON)","family":["poison (n): chất độc","poisonous (adj): có độc"]},{"q":"15. The information has been ___ recorded and analysed.","answer":"systematically","vi":"Thông tin đã được ghi nhận và phân tích một cách có hệ thống.","explanation":"Trạng từ bổ nghĩa cho động từ bị động \"recorded\" → systematically.","note":"has been + adverb + P2","hint":"(SYSTEM)","family":["system (n): hệ thống","systematic (adj): có hệ thống","systematically (adv): một cách có hệ thống"]},{"q":"16. Most telephone calls are ___.","answer":"traceable","vi":"Hầu hết các cuộc gọi điện thoại đều có thể lần theo dấu vết được.","explanation":"Sau \"are\" cần tính từ → traceable.","note":"be + adjective","hint":"(TRACE)","family":["trace (v): lần theo dấu vết","traceable (adj): có thể lần theo dấu vết"]},{"q":"17. Five suspected ___ have been arrested so far.","answer":"terrorists","vi":"Năm nghi phạm khủng bố đã bị bắt giữ cho đến nay.","explanation":"Sau tính từ \"suspected\" cần danh từ số nhiều chỉ người → terrorists.","note":"adjective + plural noun (chỉ người)","hint":"(TERROR)","family":["terror (n): sự khủng bố","terrorist (n): kẻ khủng bố"]},{"q":"18. Cooking with gas is fast, ___ and clean.","answer":"controllable","vi":"Nấu ăn bằng gas nhanh, dễ kiểm soát và sạch sẽ.","explanation":"Song song với các tính từ \"fast\" và \"clean\" → controllable.","note":"adjective, adjective and adjective (song song)","hint":"(CONTROL)","family":["control (n/v): sự kiểm soát / kiểm soát","controllable (adj): có thể kiểm soát được"]},{"q":"19. Thach Kim Tuan is a famous Vietnamese ___.","answer":"weightlifter","vi":"Thạch Kim Tuấn là một vận động viên cử tạ nổi tiếng của Việt Nam.","explanation":"Sau tính từ \"Vietnamese\" cần danh từ chỉ người → weightlifter.","note":"adjective + noun (chỉ người)","hint":"(WEIGHT)","family":["weight (n): trọng lượng","weightlifter (n): vận động viên cử tạ"]},{"q":"20. He denied possessing a rifle with intent to ___ life.","answer":"endanger","vi":"Anh ta phủ nhận việc sở hữu súng trường với ý định gây nguy hiểm đến tính mạng.","explanation":"Sau \"to\" cần động từ nguyên mẫu → endanger.","note":"to + V-inf","hint":"(DANGER)","family":["danger (n): mối nguy hiểm","endanger (v): gây nguy hiểm cho"]}],"roman":"IV"},{"navLabel":"Verb Forms","title":"Chia đúng dạng của động từ trong ngoặc","icon":"pen","instructions":"Đọc kỹ từng câu và chia đúng dạng của động từ trong ngoặc.","type":"fill","questions":[{"q":"1. It is predicted that most vehicles on road (run on) ___ solar energy in the future.","answer":"will run on","vi":"Người ta dự đoán rằng hầu hết các phương tiện trên đường sẽ chạy bằng năng lượng mặt trời trong tương lai.","explanation":"Dự đoán về tương lai → will run on."},{"q":"2. Are you sure that people (not use) ___ landline phone in the next decades?","answer":"will not be using","vi":"Bạn có chắc rằng con người sẽ không dùng điện thoại bàn trong những thập kỷ tới không?","explanation":"\"in the next decades\" (khoảng thời gian dài trong tương lai) → tương lai tiếp diễn: will not be using."},{"q":"3. She said that she (never believe) ___ in telepathy.","answer":"had never believed","vi":"Cô ấy nói rằng cô chưa bao giờ tin vào thần giao cách cảm.","explanation":"Câu tường thuật, lùi thì hiện tại hoàn thành → quá khứ hoàn thành: had never believed."},{"q":"4. My teacher said that your presentation (can be) ___ better if you (use) ___ more body language to express your ideas.","answer":"could have been / had used","accepted":["could have been / had used","could have been had used","could have been, had used"],"vi":"Giáo viên của tôi nói rằng bài thuyết trình của bạn có thể đã tốt hơn nếu bạn dùng nhiều ngôn ngữ cơ thể hơn để diễn đạt ý tưởng.","explanation":"Câu điều kiện loại 3 (giả định trái với quá khứ) trong câu tường thuật: could have been / had used."},{"q":"5. My cousin said that he (study) ___ archeology when he (go) ___ to university.","answer":"would be studying / went","accepted":["would be studying / went","would be studying went","would be studying, went"],"vi":"Anh họ tôi nói rằng anh ấy sẽ học khảo cổ học khi vào đại học.","explanation":"Dự định tương lai trong câu tường thuật → would be studying; mốc thời gian → went (quá khứ đơn)."},{"q":"6. For over 130 years, Akubra hats (make) ___ its legendary stories in Australia.","answer":"have made","vi":"Trong hơn 130 năm, mũ Akubra đã tạo nên những câu chuyện huyền thoại của mình ở Úc.","explanation":"\"for over 130 years\" là dấu hiệu hiện tại hoàn thành → have made."},{"q":"7. My friend asked me how I (feel) ___ if someone gave me a brand new MacBook.","answer":"would feel","vi":"Bạn tôi hỏi tôi sẽ cảm thấy thế nào nếu ai đó tặng tôi một chiếc MacBook mới.","explanation":"Câu điều kiện loại 2 trong câu tường thuật → would feel."},{"q":"8. First names (use) ___ more commonly in Australia than other countries.","answer":"are used","vi":"Tên riêng được sử dụng phổ biến hơn ở Úc so với các nước khác.","explanation":"Bị động, hiện tại đơn, chủ ngữ số nhiều → are used."},{"q":"9. They get sick so often. If they exercised more, they (be) ___ healthier.","answer":"would be","vi":"Họ hay bị ốm. Nếu tập thể dục nhiều hơn, họ sẽ khỏe mạnh hơn.","explanation":"Câu điều kiện loại 2 → would be."},{"q":"10. At this moment next year, I (lie) ___ on Maldives beach.","answer":"will be lying","vi":"Vào thời điểm này năm sau, tôi sẽ đang nằm trên bãi biển Maldives.","explanation":"Thì tương lai tiếp diễn → will be lying."},{"q":"11. If he (be able to turn) ___ back to childhood, he (spend) ___ more time with his friends.","answer":"was able to turn / would spend","accepted":["was able to turn / would spend","was able to turn would spend","was able to turn, would spend"],"vi":"Nếu anh ấy có thể quay lại thời thơ ấu, anh ấy sẽ dành nhiều thời gian hơn cho bạn bè.","explanation":"Câu điều kiện loại 2: If + S + V-ed, S + would + V."},{"q":"12. The ship (swallow) ___ by the sea before the rescue team (come) ___.","answer":"had been swallowed / came","accepted":["had been swallowed / came","had been swallowed came","had been swallowed, came"],"vi":"Con tàu đã bị nhấn chìm bởi biển trước khi đội cứu hộ đến.","explanation":"Hành động xảy ra trước, bị động → quá khứ hoàn thành bị động: had been swallowed; hành động xảy ra sau → quá khứ đơn: came."},{"q":"13. By 9 p.m last night, I (accomplish) ___ my essay writing on tourism.","answer":"had accomplished","vi":"Trước 9 giờ tối qua, tôi đã hoàn thành bài luận về du lịch của mình.","explanation":"\"by + mốc thời gian trong quá khứ\" → quá khứ hoàn thành: had accomplished."},{"q":"14. They asked what I (do) ___ if I (be) ___ there during that hurricane.","answer":"would have done / had been","accepted":["would have done / had been","would have done had been","would have done, had been"],"vi":"Họ hỏi tôi sẽ làm gì nếu tôi ở đó trong cơn bão đó.","explanation":"Câu điều kiện loại 3 trong câu tường thuật: would have done / had been."},{"q":"15. Can you come over my house after 9 a.m. tomorrow? I (go) ___ out until 8.45 a.m.","answer":"will be going","vi":"Bạn có thể đến nhà tôi sau 9 giờ sáng mai không? Tôi sẽ đang ra ngoài đến 8h45 sáng.","explanation":"Thì tương lai tiếp diễn → will be going."}],"roman":"V"},{"navLabel":"Sửa lỗi","title":"Tìm lỗi sai (A, B, C hoặc D)","icon":"wrench","instructions":"Mỗi câu có 4 phần gạch chân A, B, C, D. Chọn phần chứa lỗi sai. Chọn xong sẽ hiện đúng/sai, đáp án và công thức ngay.","type":"mcq","instant":true,"questions":[{"q":"1. Europa <u>might</u> have <u>liquid water</u> and <u>sources of energy</u> that <u>is</u> necessary for life.","options":["might","liquid water","sources of energy","is"],"answer":3,"vi":"Europa có thể có nước lỏng và các nguồn năng lượng cần thiết cho sự sống.","explanation":"\"sources\" (số nhiều) cần động từ quan hệ số nhiều → is phải sửa thành are.","note":"plural antecedent + that are","vis":["có thể","nước lỏng","nguồn năng lượng","là, thì (động từ quan hệ)"]},{"q":"2. Scientists <u>believe</u> that <u>liquid water</u> might <u>exists</u> <u>below</u> the surface.","options":["believe","liquid water","exists","below"],"answer":2,"vi":"Các nhà khoa học tin rằng nước lỏng có thể tồn tại dưới bề mặt.","explanation":"Sau \"might\" cần động từ nguyên mẫu → exists phải sửa thành exist.","note":"might + V-inf","vis":["tin rằng","nước lỏng","tồn tại","bên dưới"]},{"q":"3. The <u>surface pressure</u> of Titan’s atmosphere is <u>higher</u> <u>than that</u> but the temperature is <u>extreme</u> cold.","options":["surface pressure","higher","than that","extreme"],"answer":3,"vi":"Áp suất bề mặt của khí quyển Titan cao hơn mức đó nhưng nhiệt độ lại cực kỳ lạnh.","explanation":"Trước tính từ \"cold\" cần trạng từ → extreme phải sửa thành extremely.","note":"adverb + adjective","vis":["áp suất bề mặt","cao hơn","hơn mức đó","cực độ (tính từ)"]},{"q":"4. The boy <u>asked</u> <u>if</u> he <u>can</u> fly <u>to</u> the Moon in the future.","options":["asked","if","can","to"],"answer":2,"vi":"Cậu bé hỏi liệu cậu có thể bay lên Mặt Trăng trong tương lai không.","explanation":"Lùi thì trong câu tường thuật: \"can\"→\"could\" → can phải sửa thành could.","note":"lùi thì (backshift): can → could","vis":["hỏi","liệu, có… không","có thể","đến, tới"]},{"q":"5. She suddenly asked me <u>that</u> what I <u>would have done</u> <u>if</u> there <u>had been</u> a war between humans and aliens.","options":["that","would have done","if","had been"],"answer":0,"vi":"Cô ấy đột nhiên hỏi tôi tôi sẽ làm gì nếu có chiến tranh giữa con người và người ngoài hành tinh.","explanation":"Câu hỏi Wh- gián tiếp không dùng \"that\" → bỏ \"that\".","note":"asked + Wh- + S + V (không dùng \"that\")","vis":["rằng (liên từ)","sẽ đã làm","nếu","đã xảy ra (quá khứ hoàn thành)"]},{"q":"6. \"<u>Do you know</u> that paper <u>is invented</u> <u>by</u> a <u>Chinese man?</u>\", my friend asked.","options":["Do you know","is invented","by","Chinese man?"],"answer":1,"vi":"\"Bạn có biết giấy được phát minh bởi một người Trung Quốc không?\", bạn tôi hỏi.","explanation":"Sự kiện lịch sử đã xảy ra → quá khứ đơn bị động: is invented phải sửa thành was invented.","note":"sự kiện lịch sử + was/were + P2 (bị động, quá khứ đơn)","vis":["bạn có biết","được phát minh","bởi","người đàn ông Trung Quốc?"]},{"q":"7. My mother asked me <u>if</u> I <u>want</u> to see a film on TV <u>with</u> <u>her that night</u>.","options":["if","want","with","her that night"],"answer":1,"vi":"Mẹ tôi hỏi tôi có muốn xem phim trên TV cùng mẹ tối đó không.","explanation":"Lùi thì trong câu tường thuật: \"want\"→\"wanted\" → want phải sửa thành wanted.","note":"lùi thì (backshift): want → wanted","vis":["liệu, có… không","muốn","cùng với","cô ấy tối hôm đó"]},{"q":"8. The news <u>said</u> that the lighthouse <u>had been</u> <u>serious</u> <u>damaged</u> after the storm.","options":["said","had been","serious","damaged"],"answer":2,"vi":"Bản tin nói rằng ngọn hải đăng đã bị hư hại nghiêm trọng sau cơn bão.","explanation":"Trước quá khứ phân từ \"damaged\" cần trạng từ → serious phải sửa thành seriously.","note":"adverb + P2 (bị động)","vis":["nói rằng","đã bị (quá khứ hoàn thành)","nghiêm trọng (tính từ)","bị hư hại"]},{"q":"9. My student <u>asked</u> me <u>what</u> NSW <u>stood</u> <u>by</u>.","options":["asked","what","stood","by"],"answer":3,"vi":"Học sinh của tôi hỏi tôi NSW là viết tắt của cái gì.","explanation":"\"stand for\" = đại diện, viết tắt cho → by phải sửa thành for.","note":"stand for + N (đại diện cho)","vis":["hỏi","cái gì","đại diện, viết tắt","bởi"]},{"q":"10. The street <u>doesn’t</u> <u>look like</u> attractive <u>because</u> it <u>has</u> a lot of rubbish.","options":["doesn’t","look like","because","has"],"answer":1,"vi":"Con đường trông không hấp dẫn vì có nhiều rác.","explanation":"\"look\" + tính từ (không dùng \"like\" trước tính từ) → look like phải sửa thành look (bỏ \"like\").","note":"look + adjective (không dùng \"like\")","vis":["không","trông giống như","bởi vì","có"]},{"q":"11. If a student <u>takes</u> a course on Computer Science, it <u>will</u> <u>take him</u> four years <u>doing</u> the course.","options":["takes","will","take him","doing"],"answer":3,"vi":"Nếu một sinh viên học ngành Khoa học Máy tính, sẽ mất bốn năm để hoàn thành khóa học.","explanation":"\"it takes + O + time + to V\" → doing phải sửa thành to do.","note":"It takes + O + time + to V","vis":["học, tham gia","sẽ","mất của cậu ấy","làm, học (V-ing)"]},{"q":"12. Astronomers are <u>concerned about</u> light pollution <u>because</u> they <u>have difficulty</u> in <u>to view</u> outer space.","options":["concerned about","because","have difficulty","to view"],"answer":3,"vi":"Các nhà thiên văn học lo ngại về ô nhiễm ánh sáng vì họ gặp khó khăn khi quan sát ngoài vũ trụ.","explanation":"\"have difficulty in + V-ing\" → to view phải sửa thành viewing.","note":"have difficulty in + V-ing","vis":["lo ngại về","bởi vì","gặp khó khăn","để quan sát"]},{"q":"13. Natural <u>inhabitants</u> <u>have been</u> <u>destroyed</u> in <u>recent</u> years.","options":["inhabitants","have been","destroyed","recent"],"answer":0,"vi":"Môi trường sống tự nhiên đã bị phá hủy trong những năm gần đây.","explanation":"\"habitat\" (môi trường sống) mới là từ đúng nghĩa ở đây, không phải \"inhabitant\" (cư dân) → inhabitants phải sửa thành habitats.","note":"habitat (môi trường sống) ≠ inhabitant (cư dân)","vis":["cư dân, người dân","đã bị","bị phá hủy","gần đây"]},{"q":"14. <u>Since</u> its beginning more than a century <u>ago</u>, the slouch <u>has been</u> one of the most distinctive <u>item</u> of Australian clothing.","options":["Since","ago","has been","item"],"answer":3,"vi":"Kể từ khi ra đời hơn một thế kỷ trước, chiếc mũ slouch đã trở thành một trong những món đồ đặc trưng nhất của trang phục Úc.","explanation":"\"one of the most + adjective + plural noun\" → item phải sửa thành items.","note":"one of the most + adj + plural noun","vis":["kể từ khi","trước đây","đã là","món đồ, vật phẩm"]},{"q":"15. Visitors can spend <u>endless</u> days <u>to explore</u> <u>amazing</u> <u>natural beauty</u> of New Zealand.","options":["endless","to explore","amazing","natural beauty"],"answer":1,"vi":"Du khách có thể dành vô số ngày để khám phá vẻ đẹp tự nhiên tuyệt vời của New Zealand.","explanation":"\"spend + time + V-ing\" → to explore phải sửa thành exploring.","note":"spend + time + V-ing","vis":["vô số, không giới hạn","để khám phá","tuyệt vời, đáng kinh ngạc","vẻ đẹp tự nhiên"]}],"roman":"VI"},{"navLabel":"Đọc hiểu 1","title":"Đọc hiểu – Sao Hỏa (Mars)","icon":"book-open","instructions":"Đọc đoạn văn rồi trả lời các câu hỏi bên dưới (gõ câu trả lời ngắn bằng tiếng Anh).","type":"sentence","instant":true,"passage":{"title":"Mars","html":"Mars is a planet. It is the fourth planet from the sun. It is the next planet beyond Earth. Mars is more than 142 million miles from the sun. The planet is about one-sixth the size of Earth. Mars is known as the Red Planet. It gets its red colour from the iron in its soil. Mars has two small moons. Their names are Phobos and Deimos.<br><br>Mars is very cold. The average temperature on Mars is minus 80 degrees Fahrenheit – way below freezing!<br><br>Mars is rocky with canyons, volcanoes and craters all over it. Red dust covers almost all of Mars. It has clouds and wind, just as Earth does. Sometimes the wind blows the red dust into a dust storm. Tiny dust storms can look like tornados, and large ones can cover the whole planet!<br><br>Mars has about one-third the gravity of Earth. A rock dropped on Mars would fall slower than a rock dropped on Earth. Things weigh less on Mars than they weigh on Earth. A person who weighs 100 pounds on Earth would only weigh about 37 pounds on Mars because of less gravity.","vi":"Sao Hỏa là một hành tinh. Đó là hành tinh thứ tư tính từ mặt trời. Đó là hành tinh tiếp theo sau Trái Đất. Sao Hỏa cách mặt trời hơn 142 triệu dặm. Hành tinh này có kích thước khoảng một phần sáu Trái Đất. Sao Hỏa được biết đến là Hành Tinh Đỏ. Nó có màu đỏ nhờ chất sắt trong đất của nó. Sao Hỏa có hai mặt trăng nhỏ. Tên của chúng là Phobos và Deimos.<br><br>Sao Hỏa rất lạnh. Nhiệt độ trung bình trên sao Hỏa là âm 80 độ F – lạnh dưới mức đóng băng rất nhiều!<br><br>Sao Hỏa có địa hình đá với hẻm núi, núi lửa và miệng hố khắp nơi. Bụi đỏ bao phủ hầu hết bề mặt sao Hỏa. Nó có mây và gió, giống như Trái Đất. Đôi khi gió thổi bụi đỏ tạo thành bão bụi. Những cơn bão bụi nhỏ trông như lốc xoáy, còn những cơn lớn có thể bao phủ toàn bộ hành tinh!<br><br>Sao Hỏa có trọng lực bằng khoảng một phần ba Trái Đất. Một hòn đá thả rơi trên sao Hỏa sẽ rơi chậm hơn so với trên Trái Đất. Mọi vật cân nặng ít hơn trên sao Hỏa so với trên Trái Đất. Một người nặng 100 pound trên Trái Đất sẽ chỉ nặng khoảng 37 pound trên sao Hỏa vì trọng lực thấp hơn."},"questions":[{"q":"1. How far is it from Mars to the Sun?","answer":"It’s about 142 million miles.","accepted":["it’s about 142 million miles.","142 million"],"vi":"Sao Hỏa cách Mặt Trời bao xa?","explanation":"Bài đọc nói \"Mars is more than 142 million miles from the sun.\""},{"q":"2. What is the average temperature on Mars?","answer":"It is minus 80 degrees Fahrenheit.","accepted":["it is minus 80 degrees fahrenheit.","minus 80"],"vi":"Nhiệt độ trung bình trên sao Hỏa là bao nhiêu?","explanation":"Bài đọc nói \"The average temperature on Mars is minus 80 degrees Fahrenheit.\""},{"q":"3. What covers almost all of Mars?","answer":"Red dust covers almost all of Mars.","accepted":["red dust covers almost all of mars.","red dust"],"vi":"Cái gì bao phủ hầu hết bề mặt sao Hỏa?","explanation":"Bài đọc nói \"Red dust covers almost all of Mars.\""},{"q":"4. What can cover the whole planet?","answer":"Large dust storms can cover the whole planet.","accepted":["large dust storms can cover the whole planet.","dust storms"],"vi":"Cái gì có thể bao phủ toàn bộ hành tinh?","explanation":"Bài đọc nói \"large [dust storms] can cover the whole planet!\""},{"q":"5. What is your weight on Mars if you weigh 100 pounds on Earth?","answer":"It is about 37 pounds.","accepted":["it is about 37 pounds.","37 pounds"],"vi":"Cân nặng của bạn trên sao Hỏa sẽ là bao nhiêu nếu bạn nặng 100 pound trên Trái Đất?","explanation":"Bài đọc nói \"A person who weighs 100 pounds on Earth would only weigh about 37 pounds on Mars.\""}],"roman":"VII"},{"navLabel":"Đọc hiểu 2","title":"Đọc hiểu – Lõi Mặt Trăng (điền từ cho sẵn)","icon":"book-open","instructions":"Đọc đoạn văn và dùng các từ cho sẵn trong bảng để điền vào chỗ trống. Gõ đúng từ rồi bấm Kiểm tra.","type":"fill","passage":{"title":"The Moon’s Core","html":"The moon very <b>(1)</b> ___ has a very small core, just 1 to 2 percent of the moon's mass and roughly 420 <b>(2)</b> ___ (680 km) wide. It likely consists mostly <b>(3)</b> ___ iron, but may also contain large <b>(4)</b> ___ of sulphur and other elements.<br><br>Its rocky mantle is <b>(5)</b> ___ 825 miles (1,330 km) thick and made up of dense rocks rich in iron and magnesium. Magmas in the mantle made their way to the <b>(6)</b> ___ in the past and erupted volcanically for <b>(7)</b> ___ than a billion years – from at least four billion years ago to fewer than three billion years past.<br><br>The crust on top averages <b>(8)</b> ___ 42 miles (70 km) deep. The outermost part of the crust is broken and jumbled <b>(9)</b> ___ all the large impacts it has received, a shattered zone that gives way to intact material below a <b>(10)</b> ___ of about 6 miles (9.6 km).","vi":"Mặt Trăng (1) ___ có lõi rất nhỏ, chỉ chiếm 1-2% khối lượng của Mặt Trăng và rộng khoảng 420 (2) ___ (680 km). Nó có khả năng chủ yếu gồm (3) ___ sắt, nhưng cũng có thể chứa (4) ___ lớn lưu huỳnh và các nguyên tố khác.<br><br>Lớp phủ đá của nó dày (5) ___ 825 dặm (1.330 km) và cấu tạo từ đá đặc giàu sắt và magiê. Magma trong lớp phủ đã trồi lên (6) ___ trong quá khứ và phun trào núi lửa trong (7) ___ một tỷ năm – từ ít nhất bốn tỷ năm trước đến chưa đầy ba tỷ năm trước.<br><br>Lớp vỏ bên trên có độ sâu trung bình (8) ___ 42 dặm (70 km). Phần ngoài cùng của lớp vỏ bị vỡ vụn và xáo trộn (9) ___ tất cả các va chạm lớn mà nó đã hứng chịu, một vùng vỡ vụn nhường chỗ cho vật chất còn nguyên vẹn ở (10) ___ khoảng 6 dặm (9.6 km)."},"questions":[{"q":"The moon very (1) ___ has a very small core, just 1 to 2 percent of the moon’s mass and roughly 420 miles (680 km) wide.","answer":"likely","vi":"Mặt Trăng (1) ___ có lõi rất nhỏ, chỉ chiếm 1-2% khối lượng của Mặt Trăng và rộng khoảng 420 dặm (680 km).","explanation":"\"very likely\" = rất có khả năng."},{"q":"…and roughly 420 (2) ___ (680 km) wide.","answer":"miles","vi":"…và rộng khoảng 420 (2) ___ (680 km).","explanation":"Đơn vị đo khoảng cách → miles."},{"q":"It likely consists mostly (3) ___ iron, but may also contain large amounts of sulphur and other elements.","answer":"of","vi":"Nó có khả năng chủ yếu gồm (3) ___ sắt, nhưng cũng có thể chứa lượng lớn lưu huỳnh và các nguyên tố khác.","explanation":"\"consist of\" = bao gồm."},{"q":"…but may also contain large (4) ___ of sulphur and other elements.","answer":"amounts","vi":"…nhưng cũng có thể chứa (4) ___ lớn lưu huỳnh và các nguyên tố khác.","explanation":"\"large amounts of\" = lượng lớn."},{"q":"Its rocky mantle is (5) ___ 825 miles (1,330 km) thick and made up of dense rocks rich in iron and magnesium.","answer":"about","vi":"Lớp phủ đá của nó dày (5) ___ 825 dặm (1.330 km) và cấu tạo từ đá đặc giàu sắt và magiê.","explanation":"\"about 825 miles\" = khoảng 825 dặm."},{"q":"Magmas in the mantle made their way to the (6) ___ in the past and erupted volcanically…","answer":"surface","vi":"Magma trong lớp phủ đã trồi lên (6) ___ trong quá khứ và phun trào núi lửa…","explanation":"\"made their way to the surface\" = trồi lên bề mặt."},{"q":"…and erupted volcanically for (7) ___ than a billion years…","answer":"more","vi":"…và phun trào núi lửa trong (7) ___ một tỷ năm…","explanation":"\"more than a billion years\" = hơn một tỷ năm."},{"q":"The crust on top averages (8) ___ 42 miles (70 km) deep.","answer":"about","vi":"Lớp vỏ bên trên có độ sâu trung bình (8) ___ 42 dặm (70 km).","explanation":"\"averages about\" = trung bình khoảng."},{"q":"The outermost part of the crust is broken and jumbled (9) ___ all the large impacts it has received…","answer":"due to","vi":"Phần ngoài cùng của lớp vỏ bị vỡ vụn và xáo trộn (9) ___ tất cả các va chạm lớn mà nó đã hứng chịu…","explanation":"\"due to\" = do, bởi vì."},{"q":"…a shattered zone that gives way to intact material below a (10) ___ of about 6 miles (9.6 km).","answer":"depth","vi":"…một vùng vỡ vụn nhường chỗ cho vật chất còn nguyên vẹn ở (10) ___ khoảng 6 dặm (9.6 km).","explanation":"\"a depth of\" = ở độ sâu."}],"roman":"VIII","bank":["due to","about","depth","likely","of","surface","amounts","some","miles","more"]},{"navLabel":"Đọc hiểu 3","title":"Đọc hiểu – Mô phỏng sao Hỏa tại sa mạc Oman","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"Simulating Mars in the Omani Desert","html":"In sunglasses and jumpsuits, a crew of European test astronauts is laying the groundwork for a Mars simulation in the barren expanse of the Omani desert, a terrestrial mission intended to pave the way to the red planet.<br><br>The \"analogue astronauts\" of <b>(1)</b> ___ Austrian Space Forum -- a volunteer-based collective -- have <b>(2)</b> ___ in Oman to begin preparations for a four-week simulation mission <b>(3)</b> ___ to the begin of next year.<br><br>Touching down at Marmul Airport, a remote outpost used <b>(4)</b> ___ oil workers, the five-person advance team loaded up on sunscreen and, with <b>(5)</b> ___ Omani counterparts dressed in crisp white gowns and colourful turbans, boarded four-by-fours and plunged into the desert <b>(6)</b> ___ the blazing sun.<br><br>Oil installations receded <b>(7)</b> ___ the background and only rocky plateaus and ancient sandy riverbeds remained <b>(8)</b> ___ far as the eye could see. Maps were spread on the hoods of the vehicles.<br><br>\"We want to simulate Mars <b>(9)</b> ___ Earth and so we need a place that looks as much like Mars as possible. And we <b>(10)</b> ___ it here in Oman,\" Alexander Soucek, the lead flight director of the AMADEE-18 mission, told AFP.","vi":"Trong kính râm và bộ đồ liền thân, một đội phi hành gia thử nghiệm châu Âu đang đặt nền móng cho một cuộc mô phỏng sao Hỏa trong sa mạc hoang vu của Oman, một nhiệm vụ trên mặt đất nhằm mở đường đến hành tinh đỏ.<br><br>Các \"phi hành gia mô phỏng\" của (1) ___ Diễn đàn Không gian Áo -- một tập thể tình nguyện -- (2) ___ Oman để bắt đầu chuẩn bị cho một nhiệm vụ mô phỏng kéo dài bốn tuần, (3) ___ đầu năm sau.<br><br>Hạ cánh tại sân bay Marmul, một tiền đồn hẻo lánh được sử dụng (4) ___ công nhân dầu mỏ, đội tiên phong năm người mang theo kem chống nắng và, cùng các đối tác người Oman (5) ___ trong trang phục áo choàng trắng tinh và khăn xếp đầy màu sắc, lên những chiếc xe bốn bánh và lao vào sa mạc (6) ___ ánh mặt trời gay gắt.<br><br>Các cơ sở khai thác dầu lùi dần (7) ___ hậu cảnh và chỉ còn lại những cao nguyên đá và lòng sông cát cổ trải dài (8) ___ hết tầm mắt. Bản đồ được trải ra trên nắp capo xe.<br><br>\"Chúng tôi muốn mô phỏng sao Hỏa (9) ___ Trái Đất nên cần một nơi trông càng giống sao Hỏa càng tốt. Và chúng tôi (10) ___ nơi đó ở Oman đây,\" Alexander Soucek, chỉ huy trưởng nhiệm vụ AMADEE-18, nói với AFP."},"questions":[{"q":"1. The \"analogue astronauts\" of (1) ___ Austrian Space Forum -- a volunteer-based collective -- have (2) ___ in Oman…","options":["the","a","an","x"],"answer":0,"vi":"\"Các phi hành gia mô phỏng\" của (1) ___ Diễn đàn Không gian Áo -- một tập thể tình nguyện -- đã đến Oman…","explanation":"Tên riêng tổ chức cụ thể cần mạo từ xác định → the.","vis":["the (mạo từ xác định, dùng cho tên riêng tổ chức cụ thể)","a (mạo từ không xác định, dùng cho danh từ đếm được số ít chưa xác định)","an (mạo từ không xác định, đứng trước âm nguyên âm)","x (không dùng mạo từ)"]},{"q":"2. …have (2) ___ in Oman to begin preparations for a four-week simulation mission.","options":["come","gone","arrived","reached"],"answer":2,"vi":"…(2) ___ Oman để bắt đầu chuẩn bị cho nhiệm vụ mô phỏng kéo dài bốn tuần.","explanation":"\"arrive in + địa danh\" = đến nơi nào đó.","vis":["đến, tới","đã đi, đã rời khỏi","đã đến, đã tới nơi","đã đạt tới, đã đến"]},{"q":"3. …a four-week simulation mission (3) ___ to the begin of next year.","options":["before","after","via","due"],"answer":3,"vi":"…nhiệm vụ mô phỏng kéo dài bốn tuần (3) ___ đầu năm sau.","explanation":"\"due to\" = dự kiến vào.","vis":["trước","sau","qua, thông qua","dự kiến (due to = dự kiến vào)"]},{"q":"4. Touching down at Marmul Airport, a remote outpost used (4) ___ oil workers…","options":["with","by","through","to"],"answer":1,"vi":"Hạ cánh tại sân bay Marmul, một tiền đồn hẻo lánh được sử dụng (4) ___ công nhân dầu mỏ…","explanation":"Bị động: \"used by\" = được sử dụng bởi.","vis":["với","bởi","qua, thông qua","đến, cho"]},{"q":"5. …the five-person advance team loaded up on sunscreen and, with (5) ___ Omani counterparts…","options":["they","them","their","theirs"],"answer":2,"vi":"…đội tiên phong năm người mang theo kem chống nắng và, cùng với các đối tác người Oman (5) ___…","explanation":"Trước danh từ \"counterparts\" cần tính từ sở hữu → their.","vis":["họ (đại từ chủ ngữ)","họ (đại từ tân ngữ)","của họ (tính từ sở hữu, đứng trước danh từ)","của họ (đại từ sở hữu, đứng độc lập)"]},{"q":"6. …boarded four-by-fours and plunged into the desert (6) ___ the blazing sun.","options":["under","above","inside","outside"],"answer":0,"vi":"…lên xe bốn bánh và lao vào sa mạc (6) ___ ánh mặt trời rực lửa.","explanation":"\"under the blazing sun\" = dưới ánh mặt trời gay gắt.","vis":["dưới","trên, phía trên","bên trong","bên ngoài"]},{"q":"7. Oil installations receded (7) ___ the background…","options":["in","to","into","onto"],"answer":2,"vi":"Các cơ sở khai thác dầu lùi dần (7) ___ phía sau…","explanation":"\"recede into the background\" = lùi dần vào hậu cảnh.","vis":["trong","đến","vào, vào bên trong","lên trên"]},{"q":"8. …only rocky plateaus and ancient sandy riverbeds remained (8) ___ far as the eye could see.","options":["so","as","from","to"],"answer":1,"vi":"…chỉ còn lại những cao nguyên đá và lòng sông cát cổ trải dài (8) ___ hết tầm mắt.","explanation":"\"as far as the eye could see\" = xa đến hết tầm mắt.","vis":["vì vậy, quá","như, bằng","từ","đến"]},{"q":"9. \"We want to simulate Mars (9) ___ Earth and so we need a place that looks as much like Mars as possible.","options":["from","with","on","in"],"answer":2,"vi":"\"Chúng tôi muốn mô phỏng sao Hỏa (9) ___ Trái Đất nên cần một nơi trông càng giống sao Hỏa càng tốt.","explanation":"\"simulate Mars on Earth\" = mô phỏng sao Hỏa trên Trái Đất.","vis":["từ","với","trên","trong"]},{"q":"10. And we (10) ___ it here in Oman,\" Alexander Soucek…told AFP.","options":["found","did","made","brought"],"answer":0,"vi":"Và chúng tôi (10) ___ nơi đó ở Oman đây,\" Alexander Soucek…nói với AFP.","explanation":"\"found it here\" = đã tìm thấy nó ở đây.","vis":["đã tìm thấy","đã làm","đã tạo ra, đã làm","đã mang đến"]}],"roman":"IX"},{"navLabel":"Đọc hiểu 4","title":"Đọc hiểu – Sao Thủy (Mercury)","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi câu hỏi. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"Mercury","html":"Mercury is the smallest planet in our solar system. It's just a little bigger than Earth's moon. It is the closest planet to the sun, but it's actually not the hottest. Venus is hotter.<br><br>Along with Venus, Earth, and Mars, Mercury is one of the rocky planets. It has a solid surface that is covered with craters. It has a thin atmosphere, and it doesn't have any moons. Mercury likes to keep things simple.<br><br>This small planet spins around slowly compared to Earth, so one day lasts a long time. Mercury takes 59 Earth days to make one full rotation. A year on Mercury goes by fast. Because it's the closest planet to the sun, it doesn't take very long to go all the way around. It completes one revolution around the sun in just 88 Earth days. If you lived on Mercury, you'd have a birthday every three months!<br><br>A day on Mercury is not like a day here on Earth. For us, the sun rises and sets each and every day. Because Mercury has a slow spin and short year, it takes a long time for the sun to rise and set there. Mercury only has one sunrise every 180 Earth days! Isn't that weird?","vi":"Sao Thủy là hành tinh nhỏ nhất trong hệ mặt trời của chúng ta. Nó chỉ lớn hơn một chút so với Mặt Trăng của Trái Đất. Đó là hành tinh gần Mặt Trời nhất, nhưng thực ra không phải là hành tinh nóng nhất. Sao Kim mới là hành tinh nóng hơn.<br><br>Cùng với sao Kim, Trái Đất và sao Hỏa, sao Thủy là một trong những hành tinh đá. Nó có bề mặt rắn được bao phủ bởi các miệng hố. Nó có bầu khí quyển mỏng, và không có mặt trăng nào. Sao Thủy thích mọi thứ đơn giản.<br><br>Hành tinh nhỏ này quay chậm hơn so với Trái Đất, nên một ngày ở đây kéo dài rất lâu. Sao Thủy mất 59 ngày Trái Đất để hoàn thành một vòng tự quay. Một năm trên sao Thủy trôi qua rất nhanh. Vì là hành tinh gần Mặt Trời nhất, nó không mất nhiều thời gian để đi hết một vòng quanh Mặt Trời. Nó hoàn thành một vòng quỹ đạo quanh Mặt Trời chỉ trong 88 ngày Trái Đất. Nếu bạn sống trên sao Thủy, bạn sẽ có sinh nhật mỗi ba tháng một lần!<br><br>Một ngày trên sao Thủy không giống một ngày trên Trái Đất. Đối với chúng ta, mặt trời mọc và lặn mỗi ngày. Vì sao Thủy quay chậm và có năm ngắn, phải mất rất lâu để mặt trời mọc và lặn ở đó. Sao Thủy chỉ có một lần mặt trời mọc mỗi 180 ngày Trái Đất! Chẳng phải điều đó thật kỳ lạ sao?"},"questions":[{"q":"1. What does the passage mainly discuss?","options":["Days on Mercury","What Mercury is like","Sunrise on Mercury","Length of a year on Mercury"],"answer":1,"vi":"Bài đọc chủ yếu bàn về điều gì?","explanation":"Toàn bài đọc giới thiệu tổng quan về sao Thủy (kích thước, quỹ đạo, ngày/năm...) → \"What Mercury is like\".","vis":["Số ngày trên sao Thủy","Sao Thủy như thế nào (đúng, ý bao quát toàn bài)","Bình minh trên sao Thủy","Độ dài một năm trên sao Thủy"]},{"q":"2. According to the passage, Mercury ___.","options":["is the nearest to the Sun","doesn’t have atmosphere","the hottest planet","has many moons"],"answer":0,"vi":"Theo bài đọc, sao Thủy…","explanation":"Bài đọc nói \"It is the closest planet to the sun\".","vis":["là hành tinh gần Mặt Trời nhất (đúng)","không có khí quyển (sai, bài đọc nói có khí quyển mỏng)","là hành tinh nóng nhất (sai, sao Kim mới là hành tinh nóng nhất)","có nhiều mặt trăng (sai, sao Thủy không có mặt trăng nào)"]},{"q":"3. The word \"It\" in paragraph 2 refers to ___.","options":["Earth","Mercury","Venus","Mars"],"answer":1,"vi":"Từ \"It\" ở đoạn 2 chỉ đến điều gì?","explanation":"\"It has a solid surface...\" chỉ về Mercury, chủ đề đang được nói đến trong đoạn.","vis":["Trái Đất (sai)","Sao Thủy (đúng, đại từ \"It\" chỉ chủ thể đang được nói đến)","Sao Kim (sai)","Sao Hỏa (sai)"]},{"q":"4. The word \"spins\" in paragraph 3 can be best replaced by ___.","options":["comes","arrives","appears","moves"],"answer":3,"vi":"Từ \"spins\" ở đoạn 3 có thể được thay thế tốt nhất bởi từ nào?","explanation":"\"spins\" (quay) gần nghĩa nhất với \"moves\" (chuyển động) trong ngữ cảnh này.","vis":["đến, tới (sai nghĩa)","đến nơi (sai nghĩa)","xuất hiện (sai nghĩa)","di chuyển, quay (đúng, gần nghĩa với \"spins\")"]},{"q":"5. It can be inferred from the passage that a year on Mercury ___.","options":["has 59 days","much longer than that on Earth","has 88 days","has only 180 days"],"answer":2,"vi":"Có thể suy ra từ bài đọc rằng một năm trên sao Thủy…","explanation":"Bài đọc nói \"It completes one revolution around the sun in just 88 Earth days.\"","vis":["có 59 ngày (sai, đó là số ngày để tự quay một vòng, không phải một năm)","dài hơn nhiều so với Trái Đất (sai, một năm trên sao Thủy ngắn hơn nhiều)","có 88 ngày (đúng)","chỉ có 180 ngày (sai, 180 ngày là chu kỳ giữa hai lần mặt trời mọc)"]},{"q":"6. How often does the sun rise on Mercury?","options":["The same as on Earth.","Every 3 months.","Every 180 days.","Sun never sets."],"answer":2,"vi":"Mặt trời mọc trên sao Thủy thường xuyên như thế nào?","explanation":"Bài đọc nói \"Mercury only has one sunrise every 180 Earth days!\"","vis":["Giống như trên Trái Đất (sai)","Mỗi 3 tháng một lần (sai, đây chỉ là cách diễn đạt gần đúng, không chính xác bằng đáp án C)","Mỗi 180 ngày Trái Đất (đúng)","Mặt trời không bao giờ lặn (sai)"]}],"roman":"X"},{"navLabel":"Đọc hiểu 5","title":"Đọc hiểu – Sao Diêm Vương (Pluto)","icon":"book-open","instructions":"Đọc đoạn văn và điền một từ thích hợp vào mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay khi bạn gõ.","type":"fill","passage":{"title":"Pluto","html":"Pluto is a dwarf planet. A dwarf planet travels around, or orbits, the sun just like other <b>(1)</b> ___. But it is much smaller. Clyde Tombaugh discovered Pluto in 1930. He was an astronomer <b>(2)</b> ___ the United States. An astronomer is a scientist who studies stars and other objects in <b>(3)</b> ___. Venetia Burney named Pluto that same year. She was an 11-year-old girl from England.<br><br>Pluto is not <b>(4)</b> ___ big. It is only half as wide as the United States. Pluto is smaller than Earth's moon. This dwarf planet <b>(5)</b> ___ 248 Earth years to go around the sun. If you lived on Pluto, you <b>(6)</b> ___ have to wait 248 Earth years to celebrate your first birthday. One day on Pluto is about 6 1/2 days <b>(7)</b> ___ Earth. Pluto is about 40 times farther from the sun than Earth is. Pluto is in an area of space <b>(8)</b> ___ the Kuiper Belt. Thousands of small, icy objects like Pluto but smaller <b>(9)</b> ___ in the Kuiper Belt.<br><br>This dwarf planet has five moons. Its largest moon is <b>(10)</b> ___ Charon. Charon is about half the size of Pluto. Pluto's four other moons are named Kerberos, Styx, Nix and Hydra.","vi":"Sao Diêm Vương là một hành tinh lùn. Một hành tinh lùn quay quanh mặt trời giống như các (1) ___ khác. Nhưng nó nhỏ hơn nhiều. Clyde Tombaugh phát hiện ra sao Diêm Vương vào năm 1930. Ông là một nhà thiên văn học (2) ___ Hoa Kỳ. Nhà thiên văn học là nhà khoa học nghiên cứu các ngôi sao và vật thể khác trong (3) ___. Venetia Burney đặt tên cho sao Diêm Vương cùng năm đó. Cô bé là một cô gái 11 tuổi đến từ nước Anh.<br><br>Sao Diêm Vương không lớn (4) ___. Nó chỉ rộng bằng một nửa nước Mỹ. Sao Diêm Vương nhỏ hơn Mặt Trăng của Trái Đất. Hành tinh lùn này (5) ___ 248 năm Trái Đất để quay quanh mặt trời. Nếu bạn sống trên sao Diêm Vương, bạn (6) ___ phải đợi 248 năm Trái Đất để mừng sinh nhật đầu tiên. Một ngày trên sao Diêm Vương bằng khoảng 6 ngày rưỡi (7) ___ Trái Đất. Sao Diêm Vương cách mặt trời xa gấp khoảng 40 lần so với Trái Đất. Sao Diêm Vương nằm trong một vùng không gian (8) ___ Vành đai Kuiper. Hàng ngàn vật thể băng nhỏ giống sao Diêm Vương nhưng nhỏ hơn (9) ___ trong Vành đai Kuiper.<br><br>Hành tinh lùn này có năm mặt trăng. Mặt trăng lớn nhất của nó (10) ___ Charon. Charon có kích thước bằng khoảng một nửa sao Diêm Vương. Bốn mặt trăng còn lại của sao Diêm Vương được đặt tên là Kerberos, Styx, Nix và Hydra."},"questions":[{"q":"Pluto is a dwarf planet. A dwarf planet travels around, or orbits, the sun just like other (1) ___.","answer":"planets","vi":"Sao Diêm Vương là một hành tinh lùn. Một hành tinh lùn quay quanh mặt trời giống như các (1) ___ khác.","explanation":"Sau \"other\" cần danh từ số nhiều → planets."},{"q":"He was an astronomer (2) ___ the United States.","answer":"from","vi":"Ông là một nhà thiên văn học (2) ___ Hoa Kỳ.","explanation":"\"from + quốc gia\" = đến từ."},{"q":"An astronomer is a scientist who studies stars and other objects in (3) ___.","answer":"space","vi":"Nhà thiên văn học là nhà khoa học nghiên cứu các ngôi sao và vật thể khác trong (3) ___.","explanation":"\"in space\" = trong vũ trụ."},{"q":"Pluto is not (4) ___ big.","answer":"very","vi":"Sao Diêm Vương không lớn (4) ___.","explanation":"Trạng từ bổ nghĩa cho tính từ \"big\" → very."},{"q":"This dwarf planet (5) ___ 248 Earth years to go around the sun.","answer":"takes","vi":"Hành tinh lùn này (5) ___ 248 năm Trái Đất để quay quanh mặt trời.","explanation":"\"take + time + to V\" = mất bao lâu để làm gì, chủ ngữ số ít → takes."},{"q":"If you lived on Pluto, you (6) ___ have to wait 248 Earth years to celebrate your first birthday.","answer":"would","vi":"Nếu bạn sống trên sao Diêm Vương, bạn (6) ___ phải đợi 248 năm Trái Đất để mừng sinh nhật đầu tiên.","explanation":"Câu điều kiện loại 2 → would."},{"q":"One day on Pluto is about 6 1/2 days (7) ___ Earth.","answer":"on","vi":"Một ngày trên sao Diêm Vương bằng khoảng 6 ngày rưỡi (7) ___ Trái Đất.","explanation":"\"on Earth\" = trên Trái Đất."},{"q":"Pluto is in an area of space (8) ___ the Kuiper Belt.","answer":"called","vi":"Sao Diêm Vương nằm trong một vùng không gian (8) ___ Vành đai Kuiper.","explanation":"Mệnh đề quan hệ rút gọn bị động: \"space [that is] called\" = called."},{"q":"Thousands of small, icy objects like Pluto but smaller (9) ___ in the Kuiper Belt.","answer":"are","vi":"Hàng ngàn vật thể băng nhỏ giống sao Diêm Vương nhưng nhỏ hơn (9) ___ trong Vành đai Kuiper.","explanation":"Chủ ngữ số nhiều \"Thousands of...objects\" → are."},{"q":"Its largest moon is (10) ___ Charon.","answer":"named","vi":"Mặt trăng lớn nhất của nó (10) ___ Charon.","explanation":"Bị động: \"is named\" = được đặt tên là."}],"roman":"XI"},{"navLabel":"Viết 1","title":"Rewrite the sentences in reported speech / direct speech","icon":"pen-to-square","instructions":"Phần 1 (câu 1-10): chuyển câu trực tiếp sang câu tường thuật. Phần 2 (câu 11-20): chuyển ngược câu tường thuật sang câu trực tiếp.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"\"I think there are 9 planets in the solar system,\" David said.","answer":"thought there were 9 planets in the solar system.","accepted":["thought there were 9 planets in the solar system"],"vi":"David nói rằng anh ấy nghĩ có 9 hành tinh trong hệ mặt trời.","explanation":"Lùi thì: think→thought, are→were.","note":"S + thought + there + were + N","starter":"David"},{"q":"2.","original":"\"Do you think aliens from other planet may contact us one day in the future?\" Tom asked.","answer":"if I thought aliens from other planets might contact us one day in the future.","accepted":["if i thought aliens from other planets might contact us one day in the future","tom asked if i thought aliens from other planets might contact us one day in the future"],"vi":"Tom hỏi tôi liệu tôi có nghĩ người ngoài hành tinh có thể liên lạc với chúng ta một ngày nào đó không.","explanation":"Câu hỏi Yes/No gián tiếp: asked + if + S + V; lùi thì: may→might.","note":"asked + if + S + V (lùi thì)","starter":"Tom asked me"},{"q":"3.","original":"\"How can scientists discover the surface of other planet?\" Dean asked Tom.","answer":"how scientists could discover the surface of other planet.","accepted":["how scientists could discover the surface of other planet"],"vi":"Dean hỏi Tom làm thế nào các nhà khoa học có thể khám phá bề mặt của hành tinh khác.","explanation":"Câu hỏi Wh- gián tiếp: asked + O + Wh- + S + V; lùi thì: can→could.","note":"asked + O + Wh- + S + could + V","starter":"Dean asked Tom"},{"q":"4.","original":"\"When can people travel to the Mars as tourists?\" Edward asked his friends.","answer":"when people could travel to the Mars as tourists.","accepted":["when people could travel to the mars as tourists"],"vi":"Edward hỏi bạn bè khi nào con người có thể du hành đến sao Hỏa với tư cách khách du lịch.","explanation":"Câu hỏi Wh- gián tiếp, lùi thì: can→could.","note":"asked + O + Wh- + S + could + V","starter":"Edward asked his friends"},{"q":"5.","original":"\"Will aliens be friendly to people on Earth?\" Nick asked his father.","answer":"if aliens would be friendly to people on Earth.","accepted":["if aliens would be friendly to people on earth"],"vi":"Nick hỏi bố liệu người ngoài hành tinh có thân thiện với con người trên Trái Đất không.","explanation":"Câu hỏi Yes/No gián tiếp, lùi thì: will→would.","note":"asked + O + if + S + would + V","starter":"Nick asked his father"},{"q":"6.","original":"\"How many stars are there in our galaxy?\" Tom asked.","answer":"how many stars there were in our galaxy.","accepted":["how many stars there were in our galaxy"],"vi":"Tom hỏi có bao nhiêu ngôi sao trong dải ngân hà của chúng ta.","explanation":"Câu hỏi Wh- gián tiếp, lùi thì: are→were.","note":"asked + Wh- + there + were + N","starter":"Tom asked"},{"q":"7.","original":"\"How long does it take a space buggy to travel to Mercury?\" Dean asked.","answer":"how long it took a space buggy to travel to Mercury.","accepted":["how long it took a space buggy to travel to mercury"],"vi":"Dean hỏi mất bao lâu để một chiếc xe vũ trụ đến được sao Thủy.","explanation":"Câu hỏi Wh- gián tiếp, lùi thì: does...take→took.","note":"asked + how long + it + took + N + to V","starter":"Dean asked"},{"q":"8.","original":"\"How old is our Earth?\" Linda asked.","answer":"how old our Earth was.","accepted":["how old our earth was"],"vi":"Linda hỏi Trái Đất của chúng ta bao nhiêu tuổi.","explanation":"Câu hỏi Wh- gián tiếp, lùi thì: is→was.","note":"asked + how old + S + was","starter":"Linda asked"},{"q":"9.","original":"\"I believe one day in the future aliens might visit the Earth,\" Robert said.","answer":"believed that one day in the future aliens might visit the Earth.","accepted":["believed that one day in the future aliens might visit the earth"],"vi":"Robert tin rằng một ngày nào đó trong tương lai người ngoài hành tinh có thể ghé thăm Trái Đất.","explanation":"Lùi thì: believe→believed; \"might\" đã là dạng quá khứ của \"may\" nên giữ nguyên.","note":"S + believed + that + S + might + V","starter":"Robert"},{"q":"10.","original":"\"How can we send message to other planets?\" Carlos asked.","answer":"how we could send message to other planets.","accepted":["how we could send message to other planets"],"vi":"Carlos hỏi làm thế nào chúng ta có thể gửi tin nhắn đến các hành tinh khác.","explanation":"Câu hỏi Wh- gián tiếp, lùi thì: can→could.","note":"asked + Wh- + S + could + V","starter":"Carlos asked"},{"q":"11.","original":"Christine asked me if I wanted to eat out.","answer":"\"Do you want to eat out?\" Christine asked me.","accepted":["\"do you want to eat out?\" christine asked me","do you want to eat out christine asked me"],"vi":"Christine hỏi tôi có muốn ăn ngoài không.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: wanted→want.","note":"\"Do you want...?\" + S + asked"},{"q":"12.","original":"Linda wanted to know when they had come.","answer":"\"When did they come?\" Linda asked.","accepted":["\"when did they come?\" linda asked","when did they come linda asked"],"vi":"Linda muốn biết khi nào họ đến.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: had come→did come.","note":"\"When did...?\" + S + asked"},{"q":"13.","original":"Carlos asked me if David had gone home.","answer":"\"Has David gone home?\" Carlos asked.","accepted":["\"has david gone home?\" carlos asked","has david gone home carlos asked"],"vi":"Carlos hỏi tôi liệu David đã về nhà chưa. (Đã sửa lại người hỏi trong đáp án — xem ghi chú OVERRIDE ở đầu file.)","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: had gone→has gone. Người hỏi là Carlos (người đặt câu hỏi), không phải David (người được hỏi về).","note":"\"Has...gone home?\" + S + asked"},{"q":"14.","original":"Kate asked me where John parked his car.","answer":"\"Where does John park his car?\" Kate asked.","accepted":["\"where does john park his car?\" kate asked","where does john park his car kate asked"],"vi":"Kate hỏi tôi John đậu xe ở đâu.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: parked→does park.","note":"\"Where does...?\" + S + asked"},{"q":"15.","original":"Linsey asked me if I had done my homework.","answer":"\"Have you done your homework?\" Linsey asked me.","accepted":["\"have you done your homework?\" linsey asked me","have you done your homework linsey asked me"],"vi":"Linsey hỏi tôi đã làm bài tập chưa.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: had done→have done.","note":"\"Have you...?\" + S + asked"},{"q":"16.","original":"Paola wanted to know if they could help her.","answer":"\"Can they help me?\" Paola asked.","accepted":["\"can they help me?\" paola asked","can they help me paola asked"],"vi":"Paola muốn biết liệu họ có thể giúp cô ấy không.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: could→can.","note":"\"Can...?\" + S + asked"},{"q":"17.","original":"Andrew asked me if I had had lunch with Susan.","answer":"\"Have you had lunch with Susan?\" Andrew asked.","accepted":["\"have you had lunch with susan?\" andrew asked","have you had lunch with susan andrew asked"],"vi":"Andrew hỏi tôi đã ăn trưa với Susan chưa.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: had had→have had.","note":"\"Have you had...?\" + S + asked"},{"q":"18.","original":"Frank asked me what I was doing.","answer":"\"What are you doing?\" Frank asked me.","accepted":["\"what are you doing?\" frank asked me","what are you doing frank asked me"],"vi":"Frank hỏi tôi đang làm gì.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: was doing→are doing.","note":"\"What are you doing?\" + S + asked"},{"q":"19.","original":"Justine wanted to know how much money I had.","answer":"\"How much money do you have?\" Justine asked me.","accepted":["\"how much money do you have?\" justine asked me","how much money do you have justine asked me"],"vi":"Justine muốn biết tôi có bao nhiêu tiền.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: had→do have.","note":"\"How much...do you have?\" + S + asked"},{"q":"20.","original":"Christ asked if he had to do the washing.","answer":"\"Do I have to do the washing?\" Christ asked.","accepted":["\"do i have to do the washing?\" christ asked","do i have to do the washing christ asked"],"vi":"Christ hỏi liệu anh ấy có phải giặt đồ không.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: had to→do...have to.","note":"\"Do I have to...?\" + S + asked"}],"roman":"XII"},{"navLabel":"Viết 2","title":"Use the given words to write complete sentences (may/might) (dựa vào gợi ý, viết câu hoàn chỉnh)","icon":"pen-to-square","instructions":"Dựa vào gợi ý cho sẵn, viết một câu hoàn chỉnh có dùng may/might.","type":"reorder","instant":true,"questions":[{"q":"1.","answer":"Farmers use fertilizers so that they may have a rich harvest.","accepted":["farmers use fertilizers so that they may have a rich harvest"],"vi":"Nông dân dùng phân bón để có thể có một vụ mùa bội thu.","explanation":"\"may\" diễn tả mục đích có thể đạt được.","note":"so that + S + may + V","words":["a","have","so","Farmers","rich","may","use","they","fertilizers","that","harvest"],"prompt":"Gợi ý: Farmer/ use/ fertilizer/ so that/ they/ have/ rich harvest."},{"q":"2.","answer":"He said that he might stand for election.","accepted":["he said that he might stand for election"],"vi":"Anh ấy nói rằng anh ấy có thể ra tranh cử.","explanation":"\"stand for election\" = ra tranh cử; câu tường thuật dùng \"might\".","note":"S + said that + S + might + V","words":["for","might","that","He","election","stand","said","he"],"prompt":"Gợi ý: He/ say/ he/ stand/ election."},{"q":"3.","answer":"I may go home early if I’m tired.","accepted":["i may go home early if i’m tired","i may go home early if i am tired"],"vi":"Tôi có thể về nhà sớm nếu mệt.","explanation":"\"may\" diễn tả khả năng ở hiện tại/tương lai.","note":"S + may + V + if + S + V","words":["early","if","go","may","tired","I’m","home","I"],"prompt":"Gợi ý: I/ go home/ early/ if/I/ be/ tired."},{"q":"4.","answer":"He might have visited Italy before settling in Nuremberg.","accepted":["he might have visited italy before settling in nuremberg"],"vi":"Anh ấy có thể đã đến thăm Ý trước khi định cư ở Nuremberg.","explanation":"\"might have + P2\" diễn tả khả năng trong quá khứ.","note":"S + might have + P2 + before + V-ing","words":["before","visited","He","in","Nuremberg","have","settling","might","Italy"],"prompt":"Gợi ý: He/ visit/ Italy/ before/ settle/ Nuremberg."},{"q":"5.","answer":"You may have a little difficulty driving at night.","accepted":["you may have a little difficulty driving at night"],"vi":"Bạn có thể sẽ gặp chút khó khăn khi lái xe ban đêm.","explanation":"\"may have difficulty + V-ing\" = có thể gặp khó khăn khi làm gì.","note":"S + may have difficulty + V-ing","words":["at","a","driving","You","difficulty","have","little","night","may"],"prompt":"Gợi ý: You/ have/ little difficulty/ drive/ night."},{"q":"6.","answer":"I might have an allergy to wheat.","accepted":["i might have an allergy to wheat"],"vi":"Tôi có thể bị dị ứng với lúa mì.","explanation":"\"might have\" diễn tả khả năng (suy đoán về tình trạng hiện tại).","note":"S + might have + N","words":["to","have","an","I","wheat","allergy","might"],"prompt":"Gợi ý: I/ have/ allergy/ wheat."},{"q":"7.","answer":"We may go to London for vacation, if we can still afford it.","accepted":["we may go to london for vacation, if we can still afford it"],"vi":"Chúng tôi có thể đi London nghỉ mát, nếu chúng tôi vẫn đủ khả năng chi trả.","explanation":"\"may\" diễn tả khả năng có thể xảy ra.","note":"S + may + V + if + S + can + V","words":["if","go","We","vacation","to","still","can","London","afford","for","it","may","we"],"prompt":"Gợi ý: We/ go/ London/ vacation/ if/ we/ still/ afford."},{"q":"8.","answer":"Next time you might try washing it in the sink.","accepted":["next time you might try washing it in the sink"],"vi":"Lần sau bạn có thể thử rửa nó trong bồn rửa.","explanation":"\"might try + V-ing\" = có thể thử làm gì (gợi ý nhẹ nhàng).","note":"S + might try + V-ing","words":["in","time","try","Next","the","washing","you","sink","it","might"],"prompt":"Gợi ý: Next time/ you/ try/ wash/ it/ sink."},{"q":"9.","answer":"You may want to consider leaving early.","accepted":["you may want to consider leaving early"],"vi":"Bạn có thể muốn cân nhắc việc rời đi sớm.","explanation":"\"may want to consider + V-ing\" = có thể muốn cân nhắc làm gì.","note":"S + may want to consider + V-ing","words":["to","You","leaving","consider","early","want","may"],"prompt":"Gợi ý: You/ want/ consider/ leave/ early."},{"q":"10.","answer":"She might be late because of the public transport strike.","accepted":["she might be late because of the public transport strike"],"vi":"Cô ấy có thể sẽ đến muộn vì cuộc đình công giao thông công cộng.","explanation":"\"might be\" diễn tả khả năng.","note":"S + might be + adjective + because of + N","words":["because","be","She","the","transport","of","public","late","strike","might"],"prompt":"Gợi ý: She/ be/ late/ because of/ public/ transport strike."},{"q":"11.","answer":"We might get a call from her instead of an email.","accepted":["we might get a call from her instead of an email"],"vi":"Chúng tôi có thể nhận được cuộc gọi từ cô ấy thay vì email.","explanation":"\"might get\" = có thể nhận được.","note":"S + might get + N + instead of + N","words":["of","get","We","her","a","instead","call","an","from","might","email"],"prompt":"Gợi ý: We/ might/ get/ call/ her/ instead/ email."},{"q":"12.","answer":"It was a pity that he refused to come to the party yesterday.","accepted":["it was a pity that he refused to come to the party yesterday"],"vi":"Thật đáng tiếc là anh ấy đã từ chối đến bữa tiệc hôm qua.","explanation":"\"It was a pity that + mệnh đề\" = thật đáng tiếc là.","note":"It was a pity that + S + V-ed","words":["that","a","It","refused","pity","to","come","was","he","the","party","to","yesterday"],"prompt":"Gợi ý: It/ be/ pity/ he/ refuse/ come/ party/ yesterday."},{"q":"13.","answer":"Earth is the third planet from the Sun and is the largest of the terrestrial planets.","accepted":["earth is the third planet from the sun and is the largest of the terrestrial planets"],"vi":"Trái Đất là hành tinh thứ ba tính từ Mặt Trời và là hành tinh lớn nhất trong các hành tinh đá.","explanation":"S + is + N and + is + the + adjective-est + of + N.","note":"S + is the + số thứ tự + planet from + N","words":["the","third","Earth","is","from","planet","Sun","and","largest","the","of","is","the","terrestrial","the","planets"],"prompt":"Gợi ý: Earth/be/ third planet/ Sun/ and/ be/ largest/ terrestrial planets."},{"q":"14.","answer":"Yesterday she reported that she had seen a UFO in the sky the night before.","accepted":["yesterday she reported that she had seen a ufo in the sky the night before"],"vi":"Hôm qua cô ấy báo cáo rằng cô đã nhìn thấy một UFO trên bầu trời đêm hôm trước.","explanation":"Câu tường thuật, hành động xảy ra trước → quá khứ hoàn thành: had seen.","note":"S + reported that + S + had + P2","words":["in","she","Yesterday","had","that","seen","the","a","UFO","reported","sky","before","the","night","she"],"prompt":"Gợi ý: Yesterday/ she/ report/ she/see/UFO/ sky/night/before."},{"q":"15.","answer":"They thought that people would not be using snail mails in the near future.","accepted":["they thought that people would not be using snail mails in the near future"],"vi":"Họ nghĩ rằng người ta sẽ không dùng thư bưu điện trong tương lai gần.","explanation":"Câu tường thuật, lùi thì: will→would; tương lai tiếp diễn phủ định.","note":"S + thought that + S + would not be + V-ing","words":["not","thought","They","be","that","using","would","people","mails","snail","in","future","the","near"],"prompt":"Gợi ý: They/ thought/ people/will/ not/be/ use/ snail mails/ near future."}],"roman":"XIII"},{"navLabel":"Viết 3","title":"Rearrange the given words or phrases to make meaningful sentences","icon":"pen-to-square","instructions":"Sắp xếp các từ/cụm từ cho sẵn (không nhất thiết đúng thứ tự liệt kê) thành câu có nghĩa, rồi gõ lại câu hoàn chỉnh.","type":"reorder","instant":true,"questions":[{"q":"1.","answer":"When I grow up, I might become an engineer.","accepted":["when i grow up, i might become an engineer"],"vi":"Khi lớn lên, tôi có thể sẽ trở thành kỹ sư.","explanation":"When + S + V(hiện tại), S + might + V-inf.","note":"When + S + V, S + might + V","words":["might","engineer","When","grow","become","I","I","an","up"]},{"q":"2.","answer":"Billy and I might cook dinner tonight.","accepted":["billy and i might cook dinner tonight"],"vi":"Billy và tôi có thể sẽ nấu bữa tối nay.","explanation":"S + might + V-inf.","note":"S + might + V-inf","words":["cook","Billy","might","and","tonight","dinner","I"]},{"q":"3.","answer":"You never know, I might become president one day.","accepted":["you never know, i might become president one day"],"vi":"Bạn không bao giờ biết được, tôi có thể sẽ trở thành tổng thống một ngày nào đó.","explanation":"S + might + V-inf + one day.","note":"S + might + V-inf + one day","words":["might","president","You","one day","never","become","know","I"]},{"q":"4.","answer":"May I have a piece of bread, please?","accepted":["may i have a piece of bread, please","may i have a piece of bread please"],"vi":"Tôi có thể xin một miếng bánh mì được không?","explanation":"May + I + V-inf...? = xin phép lịch sự.","note":"May I + V-inf?","words":["please","May","a piece","have","bread","of","I"]},{"q":"5.","answer":"It might snow tonight, but I doubt it.","accepted":["it might snow tonight, but i doubt it"],"vi":"Tối nay có thể sẽ có tuyết, nhưng tôi nghi ngờ điều đó.","explanation":"It + might + V-inf, but + S + V.","note":"It might + V-inf, but + S + V","words":["doubt","might","tonight","It","but","snow","I","it"]},{"q":"6.","answer":"May this year bring you happiness and health!","accepted":["may this year bring you happiness and health"],"vi":"Chúc năm nay mang đến cho bạn hạnh phúc và sức khỏe!","explanation":"\"May\" mở đầu câu chúc.","note":"May + S + V-inf + O! (câu chúc)","words":["happiness","this","bring","health","May","and","you","year"]},{"q":"7.","answer":"I thought he might be able to help me, but he was useless.","accepted":["i thought he might be able to help me, but he was useless"],"vi":"Tôi nghĩ anh ấy có thể giúp được tôi, nhưng anh ấy vô dụng.","explanation":"S + thought + S + might be able to + V, but + S + V.","note":"S + thought + S + might be able to + V","words":["might","thought","be able","useless","I","he","to help","was","but","me","he"]},{"q":"8.","answer":"I asked if I might leave the work early today.","accepted":["i asked if i might leave the work early today"],"vi":"Tôi hỏi liệu tôi có thể rời khỏi công việc sớm hôm nay không.","explanation":"S + asked + if + S + might + V-inf.","note":"asked + if + S + might + V-inf","words":["leave","asked","the","today","might","I","early","work","I","if"]},{"q":"9.","answer":"Employees may use their discount on regular priced items only.","accepted":["employees may use their discount on regular priced items only"],"vi":"Nhân viên chỉ được dùng ưu đãi giảm giá cho các mặt hàng có giá thông thường.","explanation":"S + may + V-inf + O.","note":"S + may + V-inf + O","words":["discount","only","Employees","on","use","may","priced","regular","their","items"]},{"q":"10.","answer":"Customers may use the staff washroom.","accepted":["customers may use the staff washroom"],"vi":"Khách hàng được phép sử dụng nhà vệ sinh của nhân viên.","explanation":"S + may + V-inf + O.","note":"S + may + V-inf + O","words":["may","washroom","Customers","the","use","staff"]}],"roman":"XIV"},{"navLabel":"Viết 4","title":"Rewrite the following sentences based on the given words","icon":"pen-to-square","instructions":"Viết lại câu sao cho nghĩa không đổi, bắt đầu bằng từ/cụm từ gợi ý.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"\"I will be introducing my latest technological invention to public next
