 month\", the famous scientist said.","starter":"The famous scientist said that","answer":"he/she would be introducing his/her latest technological invention to public the following month.","accepted":["he would be introducing his latest technological invention to public the following month","she would be introducing her latest technological invention to public the following month","he/she would be introducing his/her latest technological invention to public the following month"],"vi":"\"Tôi sẽ giới thiệu phát minh công nghệ mới nhất của mình cho công chúng vào tháng tới\", nhà khoa học nổi tiếng nói.","explanation":"Câu tường thuật: tương lai tiếp diễn (will be introducing→would be introducing), \"next month\"→\"the following month\".","note":"S + said that + S + would be + V-ing<br>Nghĩa đáp án: Nhà khoa học nổi tiếng nói rằng anh ấy/cô ấy sẽ giới thiệu phát minh công nghệ mới nhất của mình cho công chúng vào tháng sau đó."},{"q":"2.","original":"\"Is Twitter popular in Vietnam?\", a foreigner journalist asked me.","starter":"A foreigner journalist asked me","answer":"if Twitter was popular in Vietnam.","accepted":["if twitter was popular in vietnam","whether twitter was popular in vietnam"],"vi":"\"Twitter có phổ biến ở Việt Nam không?\", một nhà báo nước ngoài hỏi tôi.","explanation":"Câu hỏi Yes/No gián tiếp: asked + if/whether + S + V (lùi thì: is→was).","note":"asked me + if/whether + S + V-ed<br>Nghĩa đáp án: Một nhà báo nước ngoài hỏi tôi liệu Twitter có phổ biến ở Việt Nam không."},{"q":"3.","original":"It is likely that they will hold a conference call meeting this Friday.","starter":"They may","answer":"hold a conference call meeting this Friday.","accepted":["hold a conference call meeting this friday"],"vi":"Có khả năng họ sẽ tổ chức cuộc họp qua điện thoại vào thứ Sáu này.","explanation":"\"It is likely that + S + will + V\" chuyển thành \"S + may + V\".","note":"S + may + V-inf<br>Nghĩa đáp án: Họ có thể sẽ tổ chức cuộc họp qua điện thoại vào thứ Sáu này."},{"q":"4.","original":"Am I allowed to use this telephone to make some phone calls?","starter":"May I","answer":"use this telephone to make some phone calls?","accepted":["use this telephone to make some phone calls"],"vi":"Tôi có được phép dùng điện thoại này để gọi vài cuộc không?","explanation":"\"Am I allowed to V?\" chuyển thành \"May I + V?\" (xin phép).","note":"May I + V-inf?<br>Nghĩa đáp án: Tôi có thể dùng điện thoại này để gọi vài cuộc được không?"},{"q":"5.","original":"She will organize a workshop on using some useful websites for education.","starter":"A workshop","answer":"on using some useful websites for education will be organized by her.","accepted":["on using some useful websites for education will be organized by her"],"vi":"Cô ấy sẽ tổ chức một buổi hội thảo về việc sử dụng các trang web hữu ích cho giáo dục.","explanation":"Chuyển sang bị động: \"a workshop\" làm chủ ngữ mới.","note":"S + will be organized + by + O (bị động)<br>Nghĩa đáp án: Một buổi hội thảo về việc sử dụng các trang web hữu ích cho giáo dục sẽ được cô ấy tổ chức."},{"q":"6.","original":"My son watches TV a lot, so he is short-sighted now.","starter":"If","answer":"my son didn’t watch TV a lot, he wouldn’t be short-sighted now.","accepted":["my son didn’t watch tv a lot, he wouldn’t be short-sighted now","my son did not watch tv a lot, he would not be short-sighted now"],"vi":"Con trai tôi xem TV nhiều nên bây giờ bị cận thị.","explanation":"Câu điều kiện loại 2 (giả định trái ngược với hiện tại).","note":"If + S + didn’t + V, S + wouldn’t + V<br>Nghĩa đáp án: Nếu con trai tôi không xem TV nhiều, thì bây giờ nó đã không bị cận thị."},{"q":"7.","original":"I will visit Los Angeles first, and I will move to New York right after that.","starter":"As soon as","answer":"I visit Los Angeles, I will move to New York.","accepted":["i visit los angeles, i will move to new york"],"vi":"Tôi sẽ thăm Los Angeles trước, và ngay sau đó tôi sẽ chuyển đến New York.","explanation":"\"As soon as\" + hiện tại đơn, S + will + V.","note":"As soon as + S + V(hiện tại), S + will + V<br>Nghĩa đáp án: Ngay khi tôi đến Los Angeles, tôi sẽ chuyển đến New York."},{"q":"8.","original":"He came to my house at 9 am. I went out for shopping at 8.30 a.m.","starter":"By the time","answer":"he came to my house, I had (already) gone out for shopping.","accepted":["he came to my house, i had already gone out for shopping","he came to my house, i had gone out for shopping"],"vi":"Anh ấy đến nhà tôi lúc 9 giờ sáng. Tôi đã đi mua sắm lúc 8h30 sáng.","explanation":"\"By the time\" + quá khứ đơn, S + had + P2.","note":"By the time + S + V-ed, S + had + P2<br>Nghĩa đáp án: Vào lúc anh ấy đến nhà tôi, tôi đã đi mua sắm từ trước rồi."},{"q":"9.","original":"Would you mind lending me your new laptop within 2 hours?","starter":"May I","answer":"borrow your new laptop within 2 hours?","accepted":["borrow your new laptop within 2 hours"],"vi":"Bạn có phiền cho tôi mượn laptop mới của bạn trong 2 tiếng không?","explanation":"\"Would you mind + V-ing?\" chuyển thành \"May I + V-inf?\" (xin phép).","note":"May I + V-inf?<br>Nghĩa đáp án: Tôi có thể mượn laptop mới của bạn trong 2 tiếng được không?"},{"q":"10.","original":"It is unlikely that Jenny will stop using Facebook.","starter":"Jenny might","answer":"not stop using Facebook.","accepted":["not stop using facebook"],"vi":"Có vẻ như Jenny sẽ không dừng dùng Facebook.","explanation":"\"It is unlikely that + S + will + V\" chuyển thành \"S + might not + V\".","note":"S + might not + V-inf<br>Nghĩa đáp án: Jenny có thể sẽ không dừng dùng Facebook."}],"roman":"XV"}]};

110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[8px]"></i></button> (adj): có hệ thống</div><div>- systematically<button type="button" data-w="systematically" onclick="event.stopPropagation();speak(this.dataset.w,this)" class="speak-btn inline-flex w-4 h-4 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[8px]"></i></button> (adv): một cách có hệ thống</div></div><div class="wordfam-box !text-sm"><div class="font-black text-indigo-900 mb-1">control<button type="button" data-w="control" onclick="event.stopPropagation();speak(this.dataset.w,this)" class="speak-btn inline-flex w-4 h-4 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[8px]"></i></button> (n/v): sự kiểm soát / kiểm soát</div><div>- controllable<button type="button" data-w="controllable" onclick="event.stopPropagation();speak(this.dataset.w,this)" class="speak-btn inline-flex w-4 h-4 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[8px]"></i></button> (adj): có thể kiểm soát được</div></div></div></div><div class="task-card bg-white rounded-2xl shadow-md p-4 md:p-6 mt-4"><h3 class="text-lg font-extrabold text-indigo-900 mb-3 flex items-center gap-2"><i class="fa-solid fa-graduation-cap text-amber-500"></i>III) GRAMMAR: MAY / MIGHT</h3><h4 class="font-bold text-slate-800 mb-2">1. Cách dùng "May"</h4><p class="text-sm text-slate-600 mb-2">Dùng để xin phép. Khá trang trọng, ít dùng trong tiếng Anh hàng ngày hiện nay.</p><ul class="text-sm text-slate-700 space-y-1.5 list-disc pl-5 mb-3"><li><i>May I borrow your pen?</i> <span class="text-slate-400">(Tôi có thể mượn bút của anh không?)</span></li><li><i>May we think about it?</i> <span class="text-slate-400">(Chúng ta có nên nghĩ về chuyện này không?)</span></li><li><i>May I go now?</i> <span class="text-slate-400">(Con xin phép đi ạ?)</span></li></ul><h4 class="font-bold text-slate-800 mb-2 mt-3">2. Cách dùng "Might"</h4><p class="text-sm text-slate-600 mb-2">"Might" đề xuất một khả năng thấp hơn về điều gì đó so với "may" (dù trên thực tế sự khác biệt khá nhỏ), và "might" được dùng nhiều hơn "may" trong tiếng Anh nói.</p><ul class="text-sm text-slate-700 space-y-1.5 list-disc pl-5"><li><i>She might be at home by now but it's not sure at all.</i> <span class="text-slate-400">(Có thể cô ấy đang ở nhà nhưng tôi không chắc lắm.)</span></li><li><i>It might rain this afternoon.</i> <span class="text-slate-400">(Trời có thể mưa chiều nay.)</span></li></ul></div><div class="task-card bg-white rounded-2xl shadow-md p-4 md:p-6 mt-4"><h3 class="text-lg font-extrabold text-indigo-900 mb-3 flex items-center gap-2"><i class="fa-solid fa-graduation-cap text-amber-500"></i>IV) GRAMMAR: REPORTED SPEECH — QUESTION (Câu hỏi gián tiếp)</h3><h4 class="font-bold text-slate-800 mb-2">a. Yes – No question</h4><div class="bg-indigo-50 border border-indigo-200 rounded-xl p-3 text-sm mb-2"><p><b>Direct:</b> S + V + (O): "Aux. V + S + V1 + O…?"</p><p><b>Indirect:</b> S + asked + O + if/whether + S + V + O…</p></div><p class="text-sm text-slate-600 italic mb-3">'Do you sleep at least eight hours a day?' the doctor asked him.<br><span class="text-slate-400 not-italic">(Bác sĩ hỏi anh ấy: "Bạn có ngủ ít nhất tám tiếng một ngày không?")</span><br>→ The doctor asked him if he slept at least eight hours a day.<br><span class="text-slate-400 not-italic">(Bác sĩ hỏi anh ấy liệu anh ấy có ngủ ít nhất tám tiếng một ngày không.)</span></p><h4 class="font-bold text-slate-800 mb-2 mt-3">b. Wh-question</h4><div class="bg-indigo-50 border border-indigo-200 rounded-xl p-3 text-sm mb-2"><p><b>Direct:</b> S + V + (O): "Wh- + Aux. V + S + V1 + O?"</p><p><b>Indirect:</b> S + asked + O + Wh- + S + V + O.</p></div><p class="text-sm text-slate-600 italic mb-3">Our teacher asked us, 'What are you most worried about?'<br><span class="text-slate-400 not-italic">(Giáo viên hỏi chúng tôi: "Các em lo lắng nhất về điều gì?")</span><br>→ Our teacher asked us what we were most worried about.<br><span class="text-slate-400 not-italic">(Giáo viên của chúng tôi hỏi chúng tôi lo lắng nhất về điều gì.)</span></p><h4 class="font-bold text-slate-800 mb-2 mt-3">Question words + to-infinitive</h4><p class="text-sm text-slate-600 mb-2">Các từ để hỏi <i>who, what, where, when, how</i> có thể đứng trước "to-infinitive" để diễn tả tình huống khó hoặc không chắc chắn. Một số động từ thường dùng trước cấu trúc này: <i>ask, wonder, (not) be sure, have no idea, (not) know, (not) decide, (not) tell.</i></p><ul class="text-sm text-slate-700 space-y-2 list-disc pl-5"><li>I don't know what I should wear! <span class="text-slate-400">(Tôi không biết nên mặc gì!)</span><br>→ I don't know what to wear. <span class="text-slate-400">(Tôi không biết nên mặc gì.)</span></li><li>Could you tell me where I should sign my name? <span class="text-slate-400">(Bạn có thể cho tôi biết tôi nên ký tên ở đâu không?)</span><br>→ Could you tell me where to sign my name? <span class="text-slate-400">(Bạn có thể cho tôi biết nên ký tên ở đâu không?)</span></li><li>'How should we use this support service?' they wondered. <span class="text-slate-400">(Họ tự hỏi: "Chúng ta nên sử dụng dịch vụ hỗ trợ này như thế nào?")</span><br>→ They wondered/couldn't tell how to use that support service. <span class="text-slate-400">(Họ tự hỏi nên sử dụng dịch vụ hỗ trợ này như thế nào.)</span></li><li>'Who should I turn to for help?' he asked. <span class="text-slate-400">(Anh ấy hỏi: "Tôi nên nhờ ai giúp đỡ?")</span><br>→ He had no idea who to turn to for help. <span class="text-slate-400">(Anh ấy không biết nên nhờ ai giúp đỡ.)</span></li></ul></div>`;



function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[‘’]/g,"'")
    .replace(/["“”]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-32':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}
function renderBank(bank, idx, clickable){
  if(!bank || !bank.length) return '';
  const hint = clickable ? ' <span class="normal-case font-normal text-slate-400">(bấm để điền)</span>' : '';
  return `<div class="mb-4"><p class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide"><i class="fa-solid fa-list-ul mr-1"></i>Từ gợi ý${hint}</p>
    <div class="grid grid-cols-2 sm:grid-cols-5 border-2 border-slate-800 rounded-lg overflow-hidden text-sm font-bold text-slate-800">
      ${bank.map((w,bi)=>clickable
        ? `<div class="bank-chip px-3 py-2 text-center border border-slate-300 bg-white" id="bankchip_${idx}_${bi}" onclick="fillFromBank(${idx},${bi})">${w}</div>`
        : `<div class="px-3 py-2 text-center border border-slate-300 bg-white">${w}</div>`
      ).join('')}
    </div>
  </div>`;
}
function fillFromBank(idx, bi){
  const chip = document.getElementById(`bankchip_${idx}_${bi}`);
  if(!chip || chip.classList.contains('used')) return;
  const word = DATA.sections[idx].bank[bi];
  const inputs = Array.from(document.querySelectorAll(`#tab-${idx} input.answer-input[id^="inp_${idx}_"]`));
  const target = inputs.find(inp => inp.value.trim()==='');
  if(!target) return;
  target.value = word;
  target.dataset.bankChip = bi;
  chip.classList.add('used');
}
function releaseBankChipIfChanged(idx,i){
  const inp=document.getElementById(`inp_${idx}_${i}`);
  if(!inp || inp.dataset.bankChip===undefined) return;
  const bi=inp.dataset.bankChip;
  delete inp.dataset.bankChip;
  const chip=document.getElementById(`bankchip_${idx}_${bi}`);
  if(chip) chip.classList.remove('used');
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);
  inner += renderBank(s.bank, idx, s.type==='fill');

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = s.bank ? 'w-40' : widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      const bankAttr = s.bank ? ` oninput="releaseBankChipIfChanged(${idx},${i})"` : '';
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"${bankAttr}></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      const origBlock = q.original ? `<p class="text-slate-700 text-sm mb-2">${q.original}</p>` : '';
      if(q.starter){
        inner += `${origBlock}
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `${origBlock}<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    } else if(s.type==='reorder'){
      const promptBlock = q.prompt ? `<p class="text-slate-500 text-sm mb-2 italic">${q.prompt}</p>` : '';
      const chips = q.words.map((w,j)=>`<span class="word-chip bg-white border-2 border-lime-300 text-lime-700 font-bold text-sm px-3 py-1.5 rounded-xl shadow-sm" id="chip_${idx}_${i}_${j}" onclick="addChip(${idx},${i},${j})">${w}</span>`).join('');
      inner += `${promptBlock}
        <div class="flex flex-wrap gap-2 mb-3">${chips}</div>

          <button type="button" onclick="clearChips(${idx},${i})" class="text-xs font-bold text-slate-500 hover:text-rose-600 transition"><i class="fa-solid fa-eraser mr-1"></i>Xóa hết</button>
        </div>

    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page space-y-4">${inner}</section>`;
}

function renderTheory(){
  return `<section id="tab-theory" class="section-page active space-y-4">
    <h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-book-open text-amber-400"></i> Lý thuyết: Unit 12 - Life on Other Planets</h2>
    <p class="text-sm text-slate-500 mb-3 italic">Từ vựng, cấu tạo từ (word formation) và ngữ pháp trọng tâm của bài. Hãy ôn lại trước khi làm các phần luyện tập bên dưới.</p>
    ${THEORY_HTML}
  </section>`;
}

function renderWriting(){
  return `<section id="tab-writing" class="section-page space-y-4">
    <div class="task-card bg-white rounded-2xl shadow-md p-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="bg-pink-100 text-pink-700 font-black text-lg w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-pen-nib"></i></div>
        <div>
          <h2 class="text-xl font-extrabold text-pink-700">XVI. Viết đoạn văn (Writing)</h2>
          <p class="text-sm text-slate-500">Write a paragraph (100–120 words) to express your opinion about the advantages and disadvantages of watching TV among children.</p>
        </div>
      </div>
      <div class="bg-pink-50 border border-pink-200 rounded-xl p-4 text-sm text-slate-700 mb-4">
        <b class="text-pink-700">Gợi ý cách tổ chức ý:</b>
        <ul class="mt-1 space-y-0.5">
          <li>• What are the advantages of watching TV to children?</li>
          <li>• What are the disadvantages of watching TV to children?</li>
          <li>• Does watching TV have more advantages or disadvantages to children?</li>
        </ul>
      </div>
      <textarea id="essay-input" rows="9" class="answer-input w-full px-3 py-2 rounded-lg text-sm" placeholder="Viết đoạn văn của bạn ở đây (100–120 từ)…"></textarea>
      <div class="mt-2 text-xs text-slate-400" id="essay-count">Số từ: 0</div>
      <div class="mt-3 flex gap-3 flex-wrap">
        <button onclick="toggleModelEssay()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold px-5 py-2.5 rounded-full transition hover:scale-105 shadow"><i class="fa-solid fa-eye mr-1"></i>Xem đoạn văn mẫu</button>
      </div>
      <div id="model-essay" class="vi-hidden mt-3 bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-slate-700 leading-relaxed">
        <b class="text-blue-700">Outline gợi ý:</b>
        <div class="mt-2 bg-white/70 border border-blue-100 rounded-lg p-3">
          <p><b>1. Advantages:</b> entertainment, knowledge, language exposure.</p>
          <p><b>2. Disadvantages:</b> eyesight problems, laziness, less time for study/play, exposure to inappropriate content.</p>
          <p><b>3. Conclusion:</b> your opinion on which outweighs the other.</p>
        </div>
        <div class="mt-3">
          <b class="text-blue-700">Đoạn văn mẫu:</b><br>
          Nowadays, watching TV has become a popular pastime among children, and it certainly has both advantages and disadvantages. On the one hand, television can be a great source of entertainment and knowledge; children may learn about nature, science and different cultures through educational programs, and they might also improve their language skills by watching cartoons in English. On the other hand, watching TV too much may cause serious problems. Children who spend hours in front of the screen every day may suffer from eyesight problems and become lazy, spending less time on physical activities or homework. Furthermore, some programs might contain violent or inappropriate content that is not suitable for young viewers. In my opinion, watching TV can be beneficial if children only do it in moderation and with proper parental guidance; otherwise, the disadvantages will outweigh the advantages.
        </div>
        <div class="mt-3 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
          <b class="text-emerald-700">Dịch nghĩa:</b><br>
          Ngày nay, xem TV đã trở thành thú vui phổ biến của trẻ em, và nó chắc chắn có cả lợi ích lẫn tác hại. Một mặt, ti vi có thể là nguồn giải trí và kiến thức tuyệt vời; trẻ em có thể học về thiên nhiên, khoa học và các nền văn hóa khác nhau qua các chương trình giáo dục, và cũng có thể cải thiện kỹ năng ngôn ngữ khi xem phim hoạt hình bằng tiếng Anh. Mặt khác, xem TV quá nhiều có thể gây ra những vấn đề nghiêm trọng. Trẻ em dành hàng giờ trước màn hình mỗi ngày có thể gặp vấn đề về thị lực và trở nên lười biếng, dành ít thời gian hơn cho hoạt động thể chất hay bài tập. Hơn nữa, một số chương trình có thể chứa nội dung bạo lực hoặc không phù hợp với trẻ nhỏ. Theo tôi, xem TV có thể có lợi nếu trẻ chỉ xem ở mức độ vừa phải và có sự hướng dẫn của cha mẹ, nếu không, tác hại sẽ lớn hơn lợi ích.
        </div>
      </div>

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = renderTheory() + DATA.sections.map((s,i)=>renderSection(s,i)).join('') + renderWriting();
  DATA.sections.forEach((s,idx)=>{
    if(s.type==='reorder'){ s.questions.forEach((q,i)=>renderReorderLine(idx,i)); }
  });
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function addChip(idx,i,j){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) reorderState[key] = [];
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(!chip || chip.classList.contains('used')) return;
  chip.classList.add('used');
  reorderState[key].push(j);
  renderReorderLine(idx,i);
  const q = DATA.sections[idx].questions[i];
  if(DATA.sections[idx].instant && reorderState[key].length===q.words.length){ gradeOneSentence(idx,i); }
}
function removeChip(idx,i,pos){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) return;
  const j = reorderState[key][pos];
  reorderState[key].splice(pos,1);
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(chip) chip.classList.remove('used');
  renderReorderLine(idx,i);
  const q = DATA.sections[idx].questions[i];
  if(DATA.sections[idx].instant && reorderState[key].length===q.words.length){
    gradeOneSentence(idx,i);
  } else {
    const inp=document.getElementById(`inp_${idx}_${i}`);
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(inp) inp.classList.remove('correct-input','wrong-input');
    if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
  }
}
function clearChips(idx,i){
  const key = `${idx}_${i}`;
  (reorderState[key]||[]).forEach(j=>{
    const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
    if(chip) chip.classList.remove('used');
  });
  reorderState[key] = [];
  renderReorderLine(idx,i);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
}
function renderReorderLine(idx,i){
  const key = `${idx}_${i}`;
  const words = DATA.sections[idx].questions[i].words;
  const line = document.getElementById(`line_${idx}_${i}`);
  const inp = document.getElementById(`inp_${idx}_${i}`);
  const seq = reorderState[key]||[];
  if(!seq.length){
    line.innerHTML = `<span class="text-slate-400 text-sm italic">Nhấp vào các từ bên trên theo đúng thứ tự…</span>`;
  } else {
    line.innerHTML = seq.map((wi,pos)=>`<span class="word-chip bg-lime-500 text-white font-bold text-sm px-3 py-1.5 rounded-xl" onclick="removeChip(${idx},${i},${pos})">${words[wi]}</span>`).join('');
  }
  if(inp) inp.value = seq.map(wi=>words[wi]).join(' ');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else if(s.type==='reorder'){
      clearChips(idx,i);
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  document.querySelectorAll(`#tab-${idx} .bank-chip`).forEach(c=>c.classList.remove('used'));
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btnId = idx==='theory' ? 'navbtn_theory' : idx==='writing' ? 'navbtn_writing' : `navbtn_${idx}`;
  const btn=document.getElementById(btnId);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#4338ca','#0891b2','#22d3ee','#38bdf8','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();

(function(){
  const essay = document.getElementById('essay-input');
  if(essay){
    essay.addEventListener('input', () => {
      const words = essay.value.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('essay-count').textContent = `Số từ: ${words}`;
    });
  }
})();

</script>
