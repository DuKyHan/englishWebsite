":["my sister said that she tried to learn hard to pass the entrance exam","my sister said she tried to learn hard to pass the entrance exam"],"vi":"Chị tôi nói rằng chị ấy cố gắng học chăm để đậu kỳ thi đầu vào.","explanation":"Lùi thì: try→tried; đổi ngôi: I→she.","note":"S + said that + S + V-ed"},{"q":"2.","original":"\"My students are preparing the hall for their meeting.\"","starter":"The teacher informed me","answer":"The teacher informed me that her/his students were preparing the hall for their meeting.","accepted":["the teacher informed me that her students were preparing the hall for their meeting","the teacher informed me that his students were preparing the hall for their meeting","the teacher informed me that her/his students were preparing the hall for their meeting"],"vi":"Giáo viên thông báo với tôi rằng học sinh của cô ấy đang chuẩn bị hội trường cho buổi họp.","explanation":"Lùi thì: are preparing→were preparing.","note":"informed + O + that + S + was/were + V-ing"},{"q":"3.","original":"\"Lien doesn’t want to go for a picnic tomorrow.\"","starter":"Lan told me","answer":"Lan told me that Lien didn’t want to go for a picnic the next/following day.","accepted":["lan told me that lien didn’t want to go for a picnic the next day","lan told me that lien didn’t want to go for a picnic the following day","lan told me that lien did not want to go for a picnic the next day"],"vi":"Lan nói với tôi rằng Liên không muốn đi dã ngoại vào ngày hôm sau.","explanation":"Lùi thì: doesn’t want→didn’t want; tomorrow→the next/following day.","note":"told + O + that + S + didn’t + V"},{"q":"4.","original":"\"We bought a special TV which could perform two different channels at the same time last week.\"","starter":"My friends told me","answer":"My friends told me that they had bought a special TV which could perform two different channels at the same time the previous week/the week before.","accepted":["my friends told me that they had bought a special tv which could perform two different channels at the same time the previous week","my friends told me that they had bought a special tv which could perform two different channels at the same time the week before"],"vi":"Bạn tôi nói rằng họ đã mua một chiếc TV đặc biệt có thể hiện hai kênh cùng lúc vào tuần trước.","explanation":"Lùi thì: bought→had bought; last week→the previous week/the week before.","note":"told me that + S + had + P2"},{"q":"5.","original":"\"Lily will be a talent musician in the future.\"","starter":"The music teacher hoped","answer":"The music teacher hoped that Lily would be a talent musician in the future.","accepted":["the music teacher hoped that lily would be a talent musician in the future"],"vi":"Giáo viên âm nhạc hy vọng Lily sẽ trở thành một nhạc sĩ tài năng trong tương lai.","explanation":"Lùi thì: will→would.","note":"hoped that + S + would + V"},{"q":"6.","original":"\"Science and technology are the keys to develop the country.\"","starter":"People believed","answer":"People believed that science and technology were the keys to develop the country.","accepted":["people believed that science and technology were the keys to develop the country"],"vi":"Người ta tin rằng khoa học và công nghệ là chìa khóa để phát triển đất nước.","explanation":"Lùi thì: are→were.","note":"believed that + S + were + N"},{"q":"7.","original":"\"You have to wear school uniform next Monday,\"","starter":"Our teacher said","answer":"Our teacher said that we had to wear school uniform the next/following Monday.","accepted":["our teacher said that we had to wear school uniform the next monday","our teacher said that we had to wear school uniform the following monday"],"vi":"Giáo viên nói rằng chúng tôi phải mặc đồng phục vào thứ Hai tới.","explanation":"Lùi thì: have to→had to; đổi ngôi: you→we; next Monday→the next/following Monday.","note":"said that + S + had to + V"},{"q":"8.","original":"\"I saw the alien yesterday when I was going out with my friends\"","starter":"The boy said","answer":"The boy said that he had seen the alien the previous day when he had been going out with his friends.","accepted":["the boy said that he had seen the alien the previous day when he had been going out with his friends","the boy said that he had seen the alien the day before when he had been going out with his friends"],"vi":"Cậu bé nói rằng cậu đã thấy người ngoài hành tinh hôm trước khi đang đi chơi cùng bạn bè.","explanation":"Lùi thì: saw→had seen, was going→had been going; yesterday→the previous day.","note":"said that + S + had + P2 + when + S + had been + V-ing"},{"q":"9.","original":"\"I have just received a birthday gift from my mother,\"","starter":"My friend told me","answer":"My friend told me she had just received a birthday gift from her mother.","accepted":["my friend told me she had just received a birthday gift from her mother","my friend told me that she had just received a birthday gift from her mother"],"vi":"Bạn tôi nói với tôi rằng bạn ấy vừa nhận được quà sinh nhật từ mẹ.","explanation":"Lùi thì: have received→had received; đổi ngôi: I→she, my→her.","note":"told me + (that) + S + had just + P2"},{"q":"10.","original":"\"The story about that happened long ago\"","starter":"She said","answer":"She said the story about that had happened long before.","accepted":["she said the story about that had happened long before","she said that the story about that had happened long before"],"vi":"Cô ấy nói rằng câu chuyện đó đã xảy ra từ rất lâu trước đây.","explanation":"Lùi thì: happened→had happened; ago→before.","note":"said (that) + S + had + P2 + long before"},{"q":"11.","original":"\"Production of these chemicals causes serious environmental pollution,\"","starter":"The scientists said that","answer":"The scientists said that production of those chemicals caused environmental pollution.","accepted":["the scientists said that production of those chemicals caused environmental pollution"],"vi":"Các nhà khoa học nói rằng việc sản xuất những hóa chất đó gây ô nhiễm môi trường nghiêm trọng.","explanation":"Lùi thì: causes→caused; these→those.","note":"said that + S + V-ed"},{"q":"12.","original":"\"New scientific discoveries are being made all the time.\"","starter":"We believed that","answer":"We believed that new scientific discoveries were being made all the time.","accepted":["we believed that new scientific discoveries were being made all the time"],"vi":"Chúng tôi tin rằng những khám phá khoa học mới luôn được thực hiện.","explanation":"Lùi thì: are being made→were being made.","note":"believed that + S + were being + P2"},{"q":"13.","original":"Miss Anne said that she was doing scientific experiments at that moment.","starter":"Miss Anne:","answer":"\"I am doing scientific experiments now\"","accepted":["\"i am doing scientific experiments now\"","i am doing scientific experiments now"],"vi":"Cô Anne nói rằng cô ấy đang làm thí nghiệm khoa học lúc đó.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: was doing→am doing; that moment→now.","note":"\"I am + V-ing + now\""},{"q":"14.","original":"Minh asked his friend who he had been out with the weekend before.","starter":"Minh:","answer":"Who did you go out with last weekend?","accepted":["who did you go out with last weekend","\"who did you go out with last weekend?\""],"vi":"Minh hỏi bạn đã đi chơi với ai vào cuối tuần trước.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: had been out→did go out; the weekend before→last weekend.","note":"\"Who did you go out with...?\""},{"q":"15.","original":"They asked us how we had got on with David two days before.","starter":"They:","answer":"How did you get on with David two days ago?","accepted":["how did you get on with david two days ago","\"how did you get on with david two days ago?\""],"vi":"Họ hỏi chúng tôi đã hòa hợp với David như thế nào hai ngày trước.","explanation":"Chuyển ngược lại câu trực tiếp, tiến thì: had got on→did get on; two days before→two days ago.","note":"\"How did you get on...?\""},{"q":"16.","original":"\"The students will watch a documentary on the future of nuclear power tomorrow,\"","starter":"The teacher said that","answer":"The teacher said that the students would watch a documentary on the future of nuclear power the next/following day.","accepted":["the teacher said that the students would watch a documentary on the future of nuclear power the next day","the teacher said that the students would watch a documentary on the future of nuclear power the following day"],"vi":"Giáo viên nói rằng học sinh sẽ xem phim tài liệu về tương lai của năng lượng hạt nhân vào ngày hôm sau.","explanation":"Lùi thì: will→would; tomorrow→the next/following day.","note":"said that + S + would + V + the next day"}],"roman":"XIII"},{"navLabel":"Viết 2","title":"Use the given words to write complete sentences","icon":"pen-to-square","instructions":"Nhấp vào từng từ theo đúng thứ tự để ghép thành câu hoàn chỉnh.","type":"reorder","instant":true,"questions":[{"q":"1.","prompt":"We/ have/ car/ service/ and/ seem/ there/ problem/ engine.","words":["there’s","the","seems","it","engine.","with","and","our","a","car","serviced","We","had","problem"],"answer":"We had our car serviced and it seems there’s a problem with the engine.","accepted":["we had our car serviced and it seems there’s a problem with the engine","we had our car serviced and it seems there’s a problem with its engine","we had our car serviced and it seems there is a problem with the engine"],"vi":"Chúng tôi đã mang xe đi bảo dưỡng và có vẻ như động cơ đang có vấn đề.","explanation":"Cấu trúc gây khiến: have + O + P2 (had our car serviced).","note":"S + had + O + P2 (causative)"},{"q":"2.","prompt":"Scientists/ try/ work out/ way/ reduce/ pollution/ aircraft.","words":["out","to","trying","pollution","from","ways","work","reduce","to","are","aircraft.","Scientists"],"answer":"Scientists are trying to work out ways to reduce pollution from aircraft.","accepted":["scientists are trying to work out ways to reduce pollution from aircraft","scientists are trying to work out ways to reduce pollution from aircrafts"],"vi":"Các nhà khoa học đang cố gắng tìm ra cách giảm ô nhiễm từ máy bay.","explanation":"\"try to work out ways to V\" = cố gắng tìm cách để làm gì.","note":"S + are trying to work out ways + to V"},{"q":"3.","prompt":"All/ us/ know/ the way/ the success/ not/ easy.","words":["of","way","the","was","not","easy.","the","us","All","that","success","to","knew"],"answer":"All of us knew that the way to the success was not easy.","accepted":["all of us knew that the way to the success was not easy","all of us knew that the way to success was not easy"],"vi":"Tất cả chúng tôi đều biết rằng con đường đến thành công không dễ dàng.","explanation":"S + knew that + mệnh đề.","note":"S + knew that + S + V-ed"},{"q":"4.","prompt":"Nick/ tell/ that/ he/ go camping/ his classmates/ next day.","words":["that","with","Nick","camping","he","me","his","day.","classmates","go","the","told","would","next"],"answer":"Nick told me that he would go camping with his classmates the next day.","accepted":["nick told me that he would go camping with his classmates the next day"],"vi":"Nick nói với tôi rằng anh ấy sẽ đi cắm trại cùng bạn học vào ngày hôm sau.","explanation":"Câu tường thuật, tương lai đơn → would go.","note":"told me that + S + would + V"},{"q":"5.","prompt":"Technology/ field/ telecommunications/ develop/ significantly/ recent years.","words":["in","Technology","fields","the","developed","communications","the","of","years.","recent","has","in","significantly"],"answer":"Technology in the fields of communications has developed significantly in the recent years.","accepted":["technology in the fields of communications has developed significantly in the recent years","technology in the field of telecommunications has developed significantly in recent years"],"vi":"Công nghệ trong lĩnh vực viễn thông đã phát triển đáng kể trong những năm gần đây   <div class="theory-card bg-white rounded-xl p-4 mb-3" style="border-left-color:#0c4a6e;box-shadow:0 2px 8px rgba(0,0,0,.05)">

    <p class="text-sm text-slate-600">Câu tường thuật dùng để thuật lại nội dung của lời nói trực tiếp.</p>
    <div class="space-y-2 text-sm text-slate-700 mt-2">
      <div class="bg-cyan-50 border border-cyan-200 rounded-lg p-3">Nếu động từ tường thuật ở <b>hiện tại</b> → chỉ đổi ngôi, KHÔNG đổi thì.

      <div class="bg-white border border-cyan-200 rounded-lg p-3">Nếu động từ tường thuật ở <b>quá khứ</b> → đổi ngôi, đổi thì, đổi trạng từ chỉ thời gian/nơi chốn.</div>

  <div class="theory-card bg-white rounded-xl p-4 mb-3" style="border-left-color:#0891b2;box-shadow:0 2px 8px rgba(0,0,0,.05)">
    <h4 class="font-extrabold text-cyan-700 mb-2"><i class="fa-solid fa-user mr-2 text-cyan-600"></i>1. Thay đổi ngôi</h4>
    <div class="overflow-x-auto">
      <table class="w-full text-xs border-collapse mt-1">
        <thead><tr class="bg-cyan-100"><th class="border border-cyan-200 p-2">Đại từ</th><th class="border border-cyan-200 p-2">Tân ngữ</th><th class="border border-cyan-200 p-2">Sở hữu</th></tr></thead>
        <tbody>
          <tr class="bg-white"><td class="border border-cyan-200 p-2 text-center">I → He/She<br>We → They</td><td class="border border-cyan-200 p-2 text-center">me → him/her<br>us → them</td><td class="border border-cyan-200 p-2 text-center">my → his/her<br>our → their</td></tr>

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[‘’]/g,"'")
    .replace(/["“”]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-32':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';

  return `<div class="passage-box mb-4"><p class="font-extrabold text-cyan-800 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}
function renderBank(bank, idx, clickable){
  if(!bank || !bank.length) return '';
  const hint = clickable ? ' <span class="normal-case font-normal text-slate-400">(bấm để điền)</span>' : '';
  return `<div class="mb-4"><p class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide"><i class="fa-solid fa-list-ul mr-1"></i>Từ gợi ý${hint}</p>
    <div class="grid grid-cols-2 sm:grid-cols-5 border-2 border-slate-800 rounded-lg overflow-hidden text-sm font-bold text-slate-800">
      ${bank.map((w,bi)=>clickable
        ? `<div class="bank-chip px-3 py-2 text-center border border-slate-300 bg-white" id="bankchip_${idx}_${bi}" onclick="fillFromBank(${idx},${bi})">${w}</div>`
        : `<div class="px-3 py-2 text-center border border-slate-300 bg-white">${w}</div>`
      ).join('')}
    </div>
  </div>`;
}
function fillFromBank(idx, bi){
  const chip = document.getElementById(`bankchip_${idx}_${bi}`);
  if(!chip || chip.classList.contains('used')) return;
  const word = DATA.sections[idx].bank[bi];
  const inputs = Array.from(document.querySelectorAll(`#tab-${idx} input.answer-input[id^="inp_${idx}_"]`));
  const target = inputs.find(inp => inp.value.trim()==='');
  if(!target) return;
  target.value = word;
  target.dataset.bankChip = bi;
  chip.classList.add('used');
}
function releaseBankChipIfChanged(idx,i){
  const inp=document.getElementById(`inp_${idx}_${i}`);
  if(!inp || inp.dataset.bankChip===undefined) return;
  const bi=inp.dataset.bankChip;
  delete inp.dataset.bankChip;
  const chip=document.getElementById(`bankchip_${idx}_${bi}`);
  if(chip) chip.classList.remove('used');
}

      inner += `<div class="grid sm:grid-cols-2 gap-2">`;

      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';

        </ul>

      <textarea id="essay-input" rows="9" class="answer-input w-full px-3 py-2 rounded-lg text-sm" placeholder="Viết đoạn văn của bạn ở đây (khoảng 120 từ)…"></textarea>
      <div class="mt-2 text-xs text-slate-400" id="essay-count">Số từ: 0</div>
      <div class="mt-3 flex gap-3 flex-wrap">
        <button onclick="toggleModelEssay()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold px-5 py-2.5 rounded-full transition hover:scale-105 shadow"><i class="fa-solid fa-eye mr-1"></i>Xem đoạn văn mẫu</button>
      </div>
      <div id="model-essay" class="vi-hidden mt-3 bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-slate-700 leading-relaxed">
        <b class="text-blue-700">Outline gợi ý:</b>
        <div class="mt-2 bg-white/70 border border-blue-100 rounded-lg p-3">
          <p><b>1. Introduction:</b> tên phát minh/công nghệ bạn chọn.</p>
          <p><b>2. Advantages:</b> lợi ích chính.</p>
          <p><b>3. Disadvantages:</b> hạn chế, mặt trái.</p>
          <p><b>4. Application:</b> ai nên dùng, dùng cho lĩnh vực gì.</p>
          <p><b>5. Conclusion:</b> liệu nó có phổ biến hơn trong tương lai không.</p>
        </div>
        <div class="mt-3">
          <b class="text-blue-700">Đoạn văn mẫu:</b><br>
          Among all modern inventions, I believe the Internet has changed our lives the most. One major advantage is that it gives us access to an enormous amount of information within seconds, which is extremely helpful for study and work. It also allows people to communicate with friends and family in different countries through video calls and social media, making the world feel much smaller. However, the Internet also has some disadvantages. Users, especially children, may be exposed to inappropriate or false information if they are not carefully guided. Spending too much time online can also lead to a more sedentary lifestyle and reduce face-to-face communication skills. The Internet can be applied to almost every field, from education to business, and people of all ages can benefit from it if they use it wisely. In my opinion, despite its flaws, the Internet will only become more essential to our daily lives in the future.
        </div>
        <div class="mt-3 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
          <b class="text-emerald-700">Dịch nghĩa:</b><br>
          Trong tất cả các phát minh hiện đại, tôi tin rằng Internet đã thay đổi cuộc sống của chúng ta nhiều nhất. Một lợi ích lớn là nó cho chúng ta tiếp cận một lượng thông tin khổng lồ chỉ trong vài giây, điều này cực kỳ hữu ích cho việc học tập và làm việc. Nó cũng cho phép mọi người giao tiếp với bạn bè, gia đình ở các quốc gia khác nhau qua video call và mạng xã hội, khiến thế giới trở nên nhỏ bé hơn nhiều. Tuy nhiên, Internet cũng có một số hạn chế. Người dùng, đặc biệt là trẻ em, có thể tiếp xúc với thông tin không phù hợp hoặc sai lệch nếu không được hướng dẫn cẩn thận. Việc dành quá nhiều thời gian trực tuyến cũng có thể dẫn đến lối sống ít vận động hơn và giảm kỹ năng giao tiếp trực tiếp. Internet có thể được áp dụng cho hầu hết mọi lĩnh vực, từ giáo dục đến kinh doanh, và mọi lứa tuổi đều có thể hưởng lợi nếu sử dụng nó một cách khôn ngoan. Theo tôi, dù có những hạn chế, Internet sẽ chỉ ngày càng trở nên thiết yếu hơn với cuộc sống hàng ngày của chúng ta trong tương lai.
        </div>
      </div>
    </div>
  </section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = renderTheory() + DATA.sections.map((s,i)=>renderSection(s,i)).join('') + renderWriting();
  DATA.sections.forEach((s,idx)=>{
    if(s.type==='reorder'){ s.questions.forEach((q,i)=>renderReorderLine(idx,i)); }
  });
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function addChip(idx,i,j){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) reorderState[key] = [];
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(!chip || chip.classList.contains('used')) return;
  chip.classList.add('used');
  reorderState[key].push(j);
  renderReorderLine(idx,i);
  const q = DATA.sections[idx].questions[i];
  if(DATA.sections[idx].instant && reorderState[key].length===q.words.length){ gradeOneSentence(idx,i); }
}
function removeChip(idx,i,pos){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) return;
  const j = reorderState[key][pos];
  reorderState[key].splice(pos,1);
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(chip) chip.classList.remove('used');
  renderReorderLine(idx,i);
  const q = DATA.sections[idx].questions[i];
  if(DATA.sections[idx].instant && reorderState[key].length===q.words.length){
    gradeOneSentence(idx,i);
  } else {
    const inp=document.getElementById(`inp_${idx}_${i}`);
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(inp) inp.classList.remove('correct-input','wrong-input');
    if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
  }
}
function clearChips(idx,i){
  const key = `${idx}_${i}`;
  (reorderState[key]||[]).forEach(j=>{
    const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
    if(chip) chip.classList.remove('used');
  });
  reorderState[key] = [];
  renderReorderLine(idx,i);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
}
function renderReorderLine(idx,i){
  const key = `${idx}_${i}`;
  const words = DATA.sections[idx].questions[i].words;
  const line = document.getElementById(`line_${idx}_${i}`);
  const inp = document.getElementById(`inp_${idx}_${i}`);
  const seq = reorderState[key]||[];
  if(!seq.length){
    line.innerHTML = `<span class="text-slate-400 text-sm italic">Nhấp vào các từ bên trên theo đúng thứ tự…</span>`;
  } else {
    line.innerHTML = seq.map((wi,pos)=>`<span class="word-chip bg-lime-500 text-white font-bold text-sm px-3 py-1.5 rounded-xl" onclick="removeChip(${idx},${i},${pos})">${words[wi]}</span>`).join('');
  }
  if(inp) inp.value = seq.map(wi=>words[wi]).join(' ');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else if(s.type==='reorder'){
      clearChips(idx,i);
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  document.querySelectorAll(`#tab-${idx} .bank-chip`).forEach(c=>c.classList.remove('used'));
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btnId = idx==='theory' ? 'navbtn_theory' : idx==='writing' ? 'navbtn_writing' : `navbtn_${idx}`;
  const btn=document.getElementById(btnId);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#0c4a6e','#0891b2','#22d3ee','#67e8f9','#38bdf8','#155e75'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();


/* ---- Writing paragraph (non-scored, giu nguyen tu ban goc) ---- */
function toggleModelEssay(){ document.getElementById('model-essay').classList.toggle('vi-hidden'); }
(function(){
  const essay = document.getElementById('essay-input');
  if(essay){
    essay.addEventListener('input', () => {
      const words = essay.value.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('essay-count').textContent = `Số từ: ${words}`;
    });
  }
})();

</script>
