òn ba từ còn lại trọng âm rơi vào âm tiết 2."},{"q":"10.","options":["competitive","activity","interactive","attractive"],"answer":2,"ipas":["/kəmˈpetətɪv/","/ækˈtɪvəti/","/ˌɪntərˈæktɪv/","/əˈtræktɪv/"],"vis":["cạnh tranh","hoạt động","có tính tương tác","hấp dẫn"],"vi":"\"interactive\" trọng âm khác.","explanation":"\"interactive\" trọng âm rơi vào âm tiết 3, còn ba từ còn lại trọng âm rơi vào âm tiết 2."},{"q":"11.","options":["transitive","impressive","exciting","connection"],"answer":0,"ipas":["/ˈtrænsətɪv/","/ɪmˈpresɪv/","/ɪkˈsaɪtɪŋ/","/kəˈnekʃn/"],"vis":["thuộc ngoại động từ","ấn tượng","thú vị","sự kết nối"],"vi":"\"transitive\" trọng âm khác.","explanation":"\"transitive\" trọng âm rơi vào âm tiết 1, còn ba từ còn lại trọng âm rơi vào âm tiết 2."},{"q":"12.","options":["radiation","excavate","absolutely","terribly"],"answer":0,"ipas":["/ˌreɪdiˈeɪʃn/","/ˈekskəveɪt/","/ˈæbsəluːtli/","/ˈterəbli/"],"vis":["bức xạ","khai quật","hoàn toàn","tồi tệ"],"vi":"\"radiation\" trọng âm khác.","explanation":"\"radiation\" trọng âm rơi vào âm tiết 3, còn ba từ còn lại trọng âm rơi vào âm tiết 1."},{"q":"13.","options":["disaster","pollution","permanent","eruption"],"answer":2,"ipas":["/dɪˈzɑːstə(r)/","/pəˈluːʃn/","/ˈpɜːmənənt/","/ɪˈrʌpʃn/"],"vis":["thảm họa","sự ô nhiễm","vĩnh viễn","sự phun trào"],"vi":"\"permanent\" trọng âm khác.","explanation":"\"permanent\" trọng âm rơi vào âm tiết 1, còn ba từ còn lại trọng âm rơi vào âm tiết 2."},{"q":"14.","options":["practicality","ideology","geography","interaction"],"answer":2,"ipas":["/ˌpræktɪˈkæləti/","/ˌaɪdiˈɒlədʒi/","/dʒiˈɒɡrəfi/","/ˌɪntərˈækʃn/"],"vis":["tính thực tế","hệ tư tưởng","địa lý học","sự tương tác"],"vi":"\"geography\" trọng âm khác.","explanation":"\"geography\" trọng âm rơi vào âm tiết 2, còn ba từ còn lại trọng âm rơi vào âm tiết 3 hoặc 4."},{"q":"15.","options":["intelligent","changeable","believable","philosophy"],"answer":1,"ipas":["/ɪnˈtelɪdʒənt/","/ˈtʃeɪndʒəbl/","/bɪˈliːvəbl/","/fəˈlɒsəfi/"],"vis":["thông minh","có thể thay đổi","đáng tin","triết học"],"vi":"\"changeable\" trọng âm khác.","explanation":"\"changeable\" trọng âm rơi vào âm tiết 1, còn ba từ còn lại trọng âm rơi vào âm tiết 2."}],"roman":"II"},{"navLabel":"Trắc nghiệm","title":"Chọn đáp án đúng (Multiple Choice)","icon":"list-check","instructions":"Chọn phương án đúng nhất để hoàn thành mỗi câu. Chọn xong sẽ hiện đáp án ngay.","type":"mcq","instant":true,"questions":[{"q":"1. I ___ my report by 9 o’clock, I hope.","options":["will finish","will be finished","will have finished","will be finishing"],"answer":2,"vi":"Tôi hy vọng sẽ hoàn thành xong báo cáo trước 9 giờ.","explanation":"Tương lai hoàn thành: hành động sẽ hoàn tất trước một mốc trong tương lai.","note":"S + will have + P2 + by + mốc thời gian"},{"q":"2. A: I’m trying to move this cupboard, but it’s very heavy. B: Well, ___ you, then.","options":["I help","I’ll help","I’ll be helping","I’m going to help"],"answer":1,"vi":"A: Tôi đang cố di chuyển cái tủ này, nhưng nó rất nặng. B: Vậy để tôi giúp bạn.","explanation":"Quyết định ngay tại thời điểm nói → tương lai đơn (will).","note":"S + will + V (quyết định tức thời)"},{"q":"3. Hoa told me that ___ our new teacher of English.","options":["she wants to become","she wanted to become","she will become","she wanted becoming"],"answer":1,"vi":"Hoa nói với tôi rằng cô ấy muốn trở thành giáo viên tiếng Anh mới của chúng tôi.","explanation":"Lùi thì trong câu tường thuật: wants→wanted.","note":"lùi thì (backshift): want → wanted"},{"q":"4. ___ in science and technology have changed people’s life dramatically.","options":["developing","developed","development","developments"],"answer":3,"vi":"Những phát triển trong khoa học và công nghệ đã thay đổi cuộc sống con người một cách đáng kể.","explanation":"Chủ ngữ của câu cần danh từ số nhiều → developments.","note":"plural noun (chủ ngữ)"},{"q":"5. Lan asked me if I ___ that exciting baseball match on TV the previous day.","options":["watched","have watched","was watching","had watched"],"answer":3,"vi":"Lan hỏi tôi liệu tôi đã xem trận đấu bóng chày thú vị đó trên TV hôm trước chưa.","explanation":"Lùi thì trong câu tường thuật: quá khứ đơn → quá khứ hoàn thành.","note":"lùi thì (backshift): quá khứ đơn → had + P2"},{"q":"6. Stephen ___ me he’d bought that suit in a sale.","options":["said","spoke","told","claimed"],"answer":2,"vis":["nói (không có tân ngữ trực tiếp theo sau)","nói chuyện (nội động từ)","nói với, kể cho (ai đó)","khẳng định, tuyên bố"],"vi":"Stephen nói với tôi rằng anh ấy đã mua bộ đồ đó trong đợt giảm giá.","explanation":"\"tell\" theo sau tân ngữ trực tiếp (told me), không dùng \"said\".","note":"told + O + that + mệnh đề"},{"q":"7. They said that they ___ a special TV which could perform two different channels at the same time.","options":["had bought","are going to buy","have bought","will buy"],"answer":0,"vi":"Họ nói rằng họ đã mua một chiếc TV đặc biệt có thể hiện hai kênh khác nhau cùng lúc.","explanation":"Lùi thì: hành động xảy ra trước → quá khứ hoàn thành.","note":"lùi thì (backshift): quá khứ đơn → had + P2"},{"q":"8. Don’t worry! I ___ you to solve the problem.","options":["help","helped","will help","helping"],"answer":2,"vi":"Đừng lo! Tôi sẽ giúp bạn giải quyết vấn đề.","explanation":"Quyết định/lời hứa ngay tại thời điểm nói → tương lai đơn.","note":"S + will + V (quyết định tức thời)"},{"q":"9. Jason asked Linda where she ___ the month before.","options":["stayed","had stayed","have stayed","have been staying"],"answer":1,"vi":"Jason hỏi Linda tháng trước cô ấy đã ở đâu.","explanation":"Lùi thì: quá khứ đơn → quá khứ hoàn thành.","note":"lùi thì (backshift): quá khứ đơn → had + P2"},{"q":"10. When I last saw Carrie, she told me she ___ but now she’s changed her mind.","options":["thought","is thinking","was thinking","has been thinking"],"answer":2,"vi":"Lần cuối tôi gặp Carrie, cô ấy nói với tôi rằng cô ấy đang nghĩ (vậy) nhưng giờ đã đổi ý.","explanation":"Lùi thì: hiện tại tiếp diễn → quá khứ tiếp diễn.","note":"lùi thì (backshift): am/is/are + V-ing → was/were + V-ing"},{"q":"11. The little girl asked her father \"___ the dress for me?\"","options":["You buy","You would buy","You will buy","Will you buy"],"answer":3,"vi":"Cô bé hỏi bố \"Bố sẽ mua chiếc váy đó cho con chứ?\"","explanation":"Câu hỏi trực tiếp cần đảo ngữ: Will you buy...?","note":"Will + S + V-inf? (câu hỏi trực tiếp)"},{"q":"12. The teacher said ___ a week off on the occasion of the International Labour Day.","options":["we will have","we didn’t have","we have","we would have"],"answer":3,"vi":"Giáo viên nói rằng chúng tôi sẽ được nghỉ một tuần nhân dịp Ngày Quốc tế Lao động.","explanation":"Lùi thì: tương lai đơn → would.","note":"lùi thì (backshift): will → would"},{"q":"13. Don’t phone me between 7 and 8. We ___ dinner then.","options":["will have","will be having","will have had","will have been"],"answer":1,"vi":"Đừng gọi cho tôi trong khoảng 7 đến 8 giờ. Lúc đó chúng tôi đang ăn tối.","explanation":"Thì tương lai tiếp diễn: hành động đang diễn ra tại một thời điểm cụ thể trong tương lai.","note":"S + will be + V-ing"},{"q":"14. They are both keen Arsenal ___.","options":["supporters","supporting","supported","supports"],"answer":0,"vi":"Cả hai đều là những cổ động viên nhiệt thành của Arsenal.","explanation":"Sau tính từ \"keen\" và mạo từ ngầm định (số nhiều \"both\") cần danh từ số nhiều → supporters.","note":"adjective + plural noun"},{"q":"15. He suggested ___ camping that Sunday.","options":["going","goes","went","gone"],"answer":0,"vi":"Anh ấy đề nghị đi cắm trại vào Chủ nhật đó.","explanation":"\"suggest + V-ing\" = đề nghị làm gì.","note":"suggest + V-ing"},{"q":"16. What time ___?","options":["the train will leave?","will the train have been leaving?","does the train leave?","is leaving the train?"],"answer":2,"vi":"Mấy giờ tàu khởi hành?","explanation":"Hiện tại đơn diễn tả lịch trình cố định: does + S + V-inf?","note":"What time does + S + V-inf? (lịch trình)"},{"q":"17. \"Shall we meet at seven o’clock?\" \"No, I’ll still ___ then.\"","options":["work","have worked","be working","have been working"],"answer":2,"vi":"\"Chúng ta gặp nhau lúc 7 giờ nhé?\" \"Không được, lúc đó tôi vẫn đang làm việc.\"","explanation":"Thì tương lai tiếp diễn: hành động đang diễn ra tại một thời điểm trong tương lai.","note":"S + will still be + V-ing"},{"q":"18. The country’s economy relies heavily on the tourist ___.","options":["industry","factory","company","firm"],"answer":0,"vis":["ngành công nghiệp/ngành","nhà máy","công ty","công ty, hãng"],"vi":"Nền kinh tế của đất nước phụ thuộc nhiều vào ngành du lịch.","explanation":"\"tourist industry\" = ngành du lịch.","note":"từ vựng phù hợp ngữ cảnh"},{"q":"19. Do you know who ___ the fact that sound travels in waves?","options":["invented","developed","discovered","found"],"answer":2,"vis":["phát minh ra","phát triển","phát hiện ra","tìm thấy"],"vi":"Bạn có biết ai đã phát hiện ra sự thật rằng âm thanh truyền đi dưới dạng sóng không?","explanation":"\"discover a fact\" = phát hiện ra một sự thật.","note":"discovered + a fact"},{"q":"20. Her parents hope that he ___ a famous biologist one day.","options":["will be","will have been","is going to be","will be being"],"answer":0,"vi":"Bố mẹ cô ấy hy vọng anh ấy sẽ trở thành nhà sinh vật học nổi tiếng một ngày nào đó.","explanation":"Hy vọng về tương lai → tương lai đơn.","note":"hope that + S + will + V"},{"q":"21. Someone ___ me there’s been an accident on the motorway.","options":["asked","said","spoke","told"],"answer":3,"vis":["hỏi","nói (không có tân ngữ trực tiếp theo sau)","nói chuyện (nội động từ)","nói với, kể cho (ai đó)"],"vi":"Ai đó đã nói với tôi rằng có tai nạn trên đường cao tốc.","explanation":"\"tell\" theo sau tân ngữ trực tiếp (told me).","note":"told + O + (that) + mệnh đề"},{"q":"22. Elie asked Stand ___ to look at the new catalogue.","options":["did he want","do you want","if he wanted","whether he wants"],"answer":2,"vi":"Elie hỏi Stan liệu anh ấy có muốn xem cuốn danh mục mới không.","explanation":"Câu hỏi Yes/No gián tiếp, lùi thì: if he wanted.","note":"asked + if + S + V-ed"},{"q":"23. They said that we ___ our houses and devices by our voice in the future.","options":["can adjust","could adjust","adjust","will adjust"],"answer":1,"vi":"Họ nói rằng chúng ta sẽ có thể điều chỉnh nhà cửa và thiết bị bằng giọng nói trong tương lai.","explanation":"Lùi thì: can→could.","note":"lùi thì (backshift): can → could"},{"q":"24. At 8 a.m. tomorrow, Janet ___ a test on the importance of technology in the next 20 years.","options":["will be taking","will being take","take","was taking"],"answer":0,"vi":"8 giờ sáng mai, Janet sẽ đang làm bài kiểm tra về tầm quan trọng của công nghệ trong 20 năm tới.","explanation":"Thì tương lai tiếp diễn.","note":"S + will be + V-ing"},{"q":"25. \"What did the man say when you challenged him?\" \"He said he ___ pay for the things in his bag, but I didn’t believe him!\"","options":["is going to","has been going to","goes to","was going to"],"answer":3,"vi":"\"Người đàn ông nói gì khi bạn chất vấn anh ta?\" \"Anh ta nói anh ta định trả tiền cho những thứ trong túi, nhưng tôi không tin!\"","explanation":"Lùi thì: is going to → was going to.","note":"lùi thì (backshift): is going to → was going to"},{"q":"26. The librarian asked us ___ so much noise.","options":["don’t make","not make","not to make","not making"],"answer":2,"vi":"Thủ thư yêu cầu chúng tôi đừng gây ồn ào quá.","explanation":"Mệnh lệnh phủ định gián tiếp: asked + O + not to + V.","note":"asked + O + not to + V"},{"q":"27. Last week Justin said, \"I’ll do it tomorrow\". He said he would do it ___.","options":["the following day","the previous day","tomorrow","yesterday"],"answer":0,"vis":["ngày hôm sau","ngày hôm trước","ngày mai (chỉ dùng trong câu trực tiếp)","hôm qua"],"vi":"Tuần trước Justin nói, \"Tôi sẽ làm nó vào ngày mai\". Anh ấy nói anh ấy sẽ làm nó vào ngày hôm sau.","explanation":"\"tomorrow\" trong câu tường thuật đổi thành \"the following day\".","note":"tomorrow → the following day (biến đổi trạng từ)"},{"q":"28. She suggested that they ___ her a birthday party.","options":["should give","shall give","would give","will give"],"answer":0,"vi":"Cô ấy đề nghị họ nên tổ chức tiệc sinh nhật cho mình.","explanation":"\"suggest that + S + should + V\" = đề nghị rằng.","note":"suggest that + S + should + V"},{"q":"29. She warned the boys ___ too far.","options":["don’t swim","doesn’t swim","not to swim","to not swim"],"answer":2,"vi":"Cô ấy cảnh báo các cậu bé không được bơi ra quá xa.","explanation":"\"warn + O + not to + V\" = cảnh báo ai đừng làm gì.","note":"warned + O + not to + V"},{"q":"30. No ___ was found after the tenth day of treatment.","options":["improve","improvement","improving","improved"],"answer":1,"vi":"Không có sự cải thiện nào được ghi nhận sau ngày điều trị thứ mười.","explanation":"Sau \"No\" cần danh từ → improvement.","note":"No + noun"},{"q":"31. I am interested in natural science ___ like Chemistry and Physics.","options":["subjects","objects","topics","themes"],"answer":0,"vis":["môn học","đồ vật, đối tượng","chủ đề","chủ đề, đề tài"],"vi":"Tôi thích các môn khoa học tự nhiên như Hóa học và Vật lý.","explanation":"\"subjects\" = môn học.","note":"từ vựng phù hợp ngữ cảnh"},{"q":"32. Steam engine has been known as a remarkable ___ in science and technology.","options":["breakdown","break-up","breakthrough","outbreak"],"answer":2,"vis":["sự cố hỏng hóc, sự sụp đổ","sự chia tay, sự tan rã","bước đột phá","sự bùng phát (dịch bệnh)"],"vi":"Đầu máy hơi nước được biết đến như một bước đột phá đáng chú ý trong khoa học và công nghệ.","explanation":"\"breakthrough\" = bước đột phá.","note":"từ vựng phù hợp ngữ cảnh"},{"q":"33. We will ___ chips in the brain to control devices in the future.","options":["implant","add","include","attach"],"answer":0,"vis":["cấy, cấy ghép","thêm vào","bao gồm","đính kèm, gắn vào"],"vi":"Chúng ta sẽ cấy chip vào não để điều khiển thiết bị trong tương lai.","explanation":"\"implant chips\" = cấy chip.","note":"implant + N (cấy ghép)"},{"q":"34. The ___ of penicillin, one of the world’s first antibiotics, marks a true turning point in human history","options":["generation","exploration","invention","discovery"],"answer":3,"vis":["thế hệ; sự tạo ra","sự khám phá, thăm dò","phát minh","sự phát hiện"],"vi":"Việc phát hiện ra penicillin, một trong những loại kháng sinh đầu tiên trên thế giới, đánh dấu một bước ngoặt thực sự trong lịch sử loài người.","explanation":"\"discovery\" = sự phát hiện (penicillin vốn có sẵn trong tự nhiên, được phát hiện chứ không phải phát minh).","note":"discovery (phát hiện) ≠ invention (phát minh)"},{"q":"35. The group of doctors has spent 8 months ___ the side - effects of this new vaccine.","options":["having examined","to examine","examining","to have examined"],"answer":2,"vis":["đã nghiên cứu (V-ing hoàn thành)","để nghiên cứu (to-infinitive)","đang nghiên cứu (V-ing)","đã nghiên cứu (to-infinitive hoàn thành)"],"vi":"Nhóm bác sĩ đã dành 8 tháng để nghiên cứu tác dụng phụ của loại vắc-xin mới này.","explanation":"\"spend + time + V-ing\" = dành thời gian làm gì.","note":"spend + time + V-ing"},{"q":"36. The doctor said that this disease ___ prevented by vaccine.","options":["can","can be","could","could be"],"answer":3,"vi":"Bác sĩ nói rằng bệnh này có thể được ngăn ngừa bằng vắc-xin.","explanation":"Lùi thì (can→could) + bị động (be prevented).","note":"lùi thì + bị động: could be + P2"},{"q":"37. Her teacher told her that there ___ still room for her improvement in her work.","options":["has been","had been","is","was"],"answer":3,"vi":"Giáo viên nói với cô ấy rằng vẫn còn chỗ để cô cải thiện công việc của mình.","explanation":"Lùi thì: is→was.","note":"lùi thì (backshift): is → was"},{"q":"38. A mechanical calculator which could do additions or subtractions very quickly was ___ by Little Pascal.","options":["found out","discovered","found","invented"],"answer":3,"vis":["phát hiện ra (thông tin)","phát hiện ra (vật/hiện tượng có sẵn)","tìm thấy","phát minh ra"],"vi":"Một chiếc máy tính cơ học có thể cộng trừ rất nhanh đã được Pascal nhỏ tuổi phát minh ra.","explanation":"\"invented\" = phát minh ra (máy tính là sản phẩm con người tạo ra, không phải phát hiện).","note":"invention (v: invented) ≠ discovery"},{"q":"39. Science and technology have ___ the life safe, secure and comfortable.","options":["transformed","made","done","changed"],"answer":1,"vis":["biến đổi hoàn toàn","làm cho (trở nên)","làm, thực hiện","thay đổi"],"vi":"Khoa học và công nghệ đã làm cho cuộc sống an toàn, đảm bảo và thoải mái.","explanation":"\"made + O + adjective\" = làm cho...trở nên...","note":"have made + O + adjective"},{"q":"40. Facebook was built on the ___ of earlier social network sites like MySpace and Bebo.","options":["succeed","successful","successfully","success"],"answer":3,"vi":"Facebook được xây dựng dựa trên sự thành công của các trang mạng xã hội trước đó như MySpace và Bebo.","explanation":"Sau \"the\" cần danh từ → success.","note":"the + noun"},{"q":"41. The facsimile ___ by Alexander Bain in 1843.","options":["invented","was invented","has been invented","has invented"],"answer":1,"vi":"Máy fax được phát minh bởi Alexander Bain vào năm 1843.","explanation":"Bị động, quá khứ đơn (có mốc thời gian cụ thể \"in 1843\") → was invented.","note":"S + was invented + by + O (bị động, quá khứ đơn)"},{"q":"42. If I ___ my computer now, I ___ for the answer on the Internet. But I left it at home.","options":["have - will search","have had- would have searched","had - would search","had - would searched"],"answer":2,"vi":"Nếu bây giờ tôi có máy tính, tôi sẽ tìm câu trả lời trên mạng. Nhưng tôi để nó ở nhà rồi.","explanation":"Câu điều kiện loại 2 (trái với thực tế hiện tại): If + S + V-ed, S + would + V.","note":"If + S + had, S + would + V-inf"},{"q":"43. My younger sister confessed ___ my diary.","options":["to read","reading","to have read","to have reading"],"answer":2,"vi":"Em gái tôi thú nhận đã đọc trộm nhật ký của tôi.","explanation":"\"confess to have + P2\" = thú nhận đã làm gì (trong quá khứ, trước hành động thú nhận).","note":"confess + to have + P2"},{"q":"44. Fortunately, he could manage ___ a telescope on his own.","options":["to make","making","to have made","to have making"],"answer":0,"vi":"May mắn thay, anh ấy đã tự làm được một chiếc kính viễn vọng.","explanation":"\"manage to V\" = xoay xở làm được gì.","note":"manage + to V"},{"q":"45. Do you agree that playing computer games might make players think ___?","options":["critic","critical","critically","criticism"],"answer":2,"vis":["nhà phê bình (danh từ)","có tính phê phán (tính từ)","một cách phê phán (trạng từ)","sự chỉ trích (danh từ)"],"vi":"Bạn có đồng ý rằng chơi game máy tính có thể khiến người chơi suy nghĩ có phê phán không?","explanation":"Sau \"think\" cần trạng từ → critically.","note":"V + adverb"},{"q":"46. Science and technology have ___ the life safe, secure and comfortable.","options":["transformed","made","done","changed"],"answer":1,"vis":["biến đổi hoàn toàn","làm cho (trở nên)","làm, thực hiện","thay đổi"],"vi":"Khoa học và công nghệ đã làm cho cuộc sống an toàn, đảm bảo và thoải mái.","explanation":"\"made + O + adjective\" = làm cho...trở nên...","note":"have made + O + adjective"},{"q":"47. Dave asked me if robots in the future ___ more user-friendly and more intelligent.","options":["will be","would be","will have been","will be being"],"answer":1,"vi":"Dave hỏi tôi liệu robot trong tương lai có thân thiện với người dùng và thông minh hơn không.","explanation":"Lùi thì: will→would.","note":"lùi thì (backshift): will → would"},{"q":"48. ___ I borrow your Ipad so that I can enjoy some music now.","options":["May","Might","Could","Shall"],"answer":0,"vis":["có thể (xin phép, lịch sự)","có thể (khả năng, ít chắc chắn)","có thể (khả năng/xin phép không trang trọng)","sẽ (đề nghị/tương lai với I, we)"],"vi":"Tôi có thể mượn iPad của bạn để nghe nhạc bây giờ được không?","explanation":"\"May I...?\" = xin phép lịch sự.","note":"May + I + V-inf?"},{"q":"49. Frequent Internet ___ will cause many troubles for our online classroom today.","options":["disconnection","interruption","disconnected","interrupted"],"answer":0,"vis":["sự mất kết nối (danh từ)","sự gián đoạn (danh từ)","đã bị ngắt kết nối (tính từ/quá khứ phân từ)","đã bị gián đoạn (tính từ/quá khứ phân từ)"],"vi":"Việc mất kết nối Internet thường xuyên sẽ gây nhiều rắc rối cho lớp học trực tuyến của chúng ta hôm nay.","explanation":"Chủ ngữ của câu cần danh từ → disconnection.","note":"adjective + noun (chủ ngữ)"},{"q":"50. Many people think the cyber world might ___ the real world one day.","options":["provide","take place","take up","replace"],"answer":3,"vis":["cung cấp","diễn ra, xảy ra","bắt đầu (làm gì), chiếm (không gian/thời gian)","thay thế"],"vi":"Nhiều người nghĩ rằng thế giới ảo có thể thay thế thế giới thực một ngày nào đó.","explanation":"\"replace\" = thay thế.","note":"từ vựng phù hợp ngữ cảnh"}],"roman":"III"},{"navLabel":"Word Forms","title":"Cho dạng đúng của từ trong ngoặc (Word Forms)","icon":"spell-check","instructions":"Dùng từ gợi ý trong ngoặc để điền dạng đúng vào chỗ trống.","type":"fill","questions":[{"q":"1. The ___ of the wheel changed the world enormously.","answer":"invention","hint":"(INVENT)","family":["invent (v): phát minh","invention (n): sự phát minh","inventor (n): nhà phát minh"],"vi":"Việc phát minh ra bánh xe đã thay đổi thế giới một cách to lớn.","explanation":"Sau \"The\" cần danh từ → invention.","note":"the + noun"},{"q":"2. Many scientists have made some important new ___.","answer":"discoveries","hint":"(DISCOVER)","family":["discover (v): phát hiện","discovery (n): sự phát hiện"],"vi":"Nhiều nhà khoa học đã có những phát hiện quan trọng mới.","explanation":"Sau \"new\" cần danh từ số nhiều → discoveries.","note":"adjective + plural noun"},{"q":"3. We are trying to gather everyone’s ideas and to form the ideas into a ___ plan.","answer":"realistic","hint":"(REAL)","family":["real (adj): thật","realistic (adj): thực tế","reality (n): thực tế, hiện thực"],"vi":"Chúng tôi đang cố gắng tập hợp ý tưởng của mọi người và biến chúng thành một kế hoạch thực tế.","explanation":"Trước danh từ \"plan\" cần tính từ → realistic.","note":"adjective + noun"},{"q":"4. Science and technology have significant impacts on ___ development.","answer":"economic","hint":"(ECONOMY)","family":["economy (n): nền kinh tế","economic (adj): thuộc kinh tế"],"vi":"Khoa học và công nghệ có tác động đáng kể đến sự phát triển kinh tế.","explanation":"Trước danh từ \"development\" cần tính từ → economic.","note":"adjective + noun"},{"q":"5. They need to be more ___ about the matter.","answer":"scientific","hint":"(SCIENCE)","family":["science (n): khoa học","scientific (adj): thuộc khoa học"],"vi":"Họ cần khoa học hơn về vấn đề này.","explanation":"Sau \"more\" cần tính từ → scientific.","note":"more + adjective"},{"q":"6. ___ in science and technology have changed people’s life dramatically.","answer":"Developments","hint":"(DEVELOP)","family":["develop (v): phát triển","development (n): sự phát triển"],"vi":"Những phát triển trong khoa học và công nghệ đã thay đổi cuộc sống con người một cách đáng kể.","explanation":"Chủ ngữ của câu cần danh từ số nhiều → Developments.","note":"plural noun (chủ ngữ)"},{"q":"7. ___ advances have brought a lot of benefits to people.","answer":"Technological","hint":"(TECHNOLOGY)","family":["technology (n): công nghệ","technological (adj): thuộc công nghệ"],"vi":"Những tiến bộ công nghệ đã mang lại nhiều lợi ích cho con người.","explanation":"Trước danh từ \"advances\" cần tính từ → Technological.","note":"adjective + noun"},{"q":"8. If there are aliens out there, do you think they are much more ___ advanced than we are.","answer":"technologically","hint":"(TECHNOLOGY)","family":["technology (n): công nghệ","technologically (adv): về mặt công nghệ"],"vi":"Nếu có người ngoài hành tinh, bạn có nghĩ họ tiên tiến hơn chúng ta về công nghệ nhiều không?","explanation":"Trạng từ bổ nghĩa cho tính từ \"advanced\" → technologically.","note":"adverb + adjective"},{"q":"9. He organized the team with military ___.","answer":"precision","hint":"(PRECISE)","family":["precise (adj): chính xác","precision (n): sự chính xác"],"vi":"Anh ấy tổ chức đội nhóm với sự chính xác như quân đội.","explanation":"Sau tính từ \"military\" cần danh từ → precision.","note":"adjective + noun"},{"q":"10. The opposition leader addressed a rally of 50 000 ___.","answer":"supporters","hint":"(SUPPORT)","family":["support (n/v): sự ủng hộ / ủng hộ","supporter (n): người ủng hộ"],"vi":"Lãnh đạo phe đối lập đã phát biểu trước cuộc tập hợp của 50.000 người ủng hộ.","explanation":"Sau số đếm cần danh từ số nhiều chỉ người → supporters.","note":"số đếm + plural noun (chỉ người)"},{"q":"11. The ___ of Facebook is useful because it has helped people communicate with each other.","answer":"invention","hint":"(INVENT)","family":["invent (v): phát minh","invention (n): sự phát minh"],"vi":"Việc phát minh ra Facebook rất hữu ích vì nó đã giúp mọi người giao tiếp với nhau.","explanation":"Sau \"The\" cần danh từ → invention.","note":"the + noun"},{"q":"12. She wrote a book on ___ science for prospective doctors.","answer":"medical","hint":"(MEDICINE)","family":["medicine (n): y học, thuốc","medical (adj): thuộc y học"],"vi":"Cô ấy viết một cuốn sách về y học cho các bác sĩ tương lai.","explanation":"Trước danh từ \"science\" cần tính từ → medical.","note":"adjective + noun"},{"q":"13. ___ is one of the most important new sources of energy.","answer":"Electricity","hint":"(ELECTRIC)","family":["electric (adj): thuộc điện","electricity (n): điện, dòng điện"],"vi":"Điện là một trong những nguồn năng lượng mới quan trọng nhất.","explanation":"Chủ ngữ của câu cần danh từ → Electricity.","note":"noun (chủ ngữ)"},{"q":"14. A new kind of telescope will be invented to help ___ explore the other planets in our Solar system.","answer":"scientists","hint":"(SCIENCE)","family":["science (n): khoa học","scientist (n): nhà khoa học"],"vi":"Một loại kính viễn vọng mới sẽ được phát minh để giúp các nhà khoa học khám phá những hành tinh khác trong Hệ Mặt Trời.","explanation":"Sau \"help\" cần danh từ chỉ người → scientists.","note":"help + plural noun (chỉ người) + V-inf"},{"q":"15. ___ said fuel used and carbon dioxide released from vehicles would be cut down by a new cruise control.","answer":"Technicians","hint":"(TECHNIC)","family":["technical (adj): thuộc kỹ thuật","technician (n): kỹ thuật viên"],"vi":"Các kỹ thuật viên cho biết nhiên liệu sử dụng và khí CO2 thải ra từ xe cộ sẽ được giảm bớt nhờ hệ thống kiểm soát hành trình mới.","explanation":"Chủ ngữ của câu cần danh từ số nhiều chỉ người → Technicians.","note":"plural noun (chủ ngữ, chỉ người)"},{"q":"16. Einstein was one of the greatest ___ in the world.","answer":"scientists","hint":"(SCIENCE)","family":["science (n): khoa học","scientist (n): nhà khoa học"],"vi":"Einstein là một trong những nhà khoa học vĩ đại nhất thế giới.","explanation":"Sau \"the greatest\" cần danh từ số nhiều chỉ người → scientists.","note":"the + adjective-est + plural noun"},{"q":"17. This is a great ___ on his previous work.","answer":"improvement","hint":"(IMPROVE)","family":["improve (v): cải thiện","improvement (n): sự cải thiện"],"vi":"Đây là một sự cải tiến lớn so với công trình trước đó của anh ấy.","explanation":"Sau tính từ \"great\" cần danh từ → improvement.","note":"adjective + noun"},{"q":"18. She made a career as an ___ of quick-selling gadgets.","answer":"inventor","hint":"(INVENT)","family":["invent (v): phát minh","inventor (n): nhà phát minh"],"vi":"Cô ấy xây dựng sự nghiệp với tư cách là nhà phát minh các thiết bị bán chạy.","explanation":"Sau \"an\" cần danh từ chỉ người → inventor.","note":"an + noun (chỉ người)"},{"q":"19. Work experience is usually highly ___ for students.","answer":"beneficial","hint":"(BENEFIT)","family":["benefit (n/v): lợi ích / hưởng lợi","beneficial (adj): có lợi"],"vi":"Kinh nghiệm làm việc thường rất có lợi cho học sinh, sinh viên.","explanation":"Sau \"highly\" cần tính từ → beneficial.","note":"adverb + adjective"},{"q":"20. This decision marked a fundamental ___ in policy.","answer":"transformation","hint":"(TRANSFORM)","family":["transform (v): biến đổi","transformation (n): sự biến đổi"],"vi":"Quyết định này đánh dấu một sự chuyển đổi căn bản trong chính sách.","explanation":"Sau tính từ \"fundamental\" cần danh từ → transformation.","note":"adjective + noun"}],"roman":"IV"},{"navLabel":"Verb Forms","title":"Chia đúng dạng của động từ trong ngoặc","icon":"pen","instructions":"Đọc kỹ từng câu và chia đúng dạng của động từ trong ngoặc (chú ý câu tường thuật và các thì tương lai).","type":"fill","questions":[{"q":"1. Jack and Sue said that they (go) ___ cycling the day after tomorrow.","answer":"would go","vi":"Jack và Sue nói rằng họ sẽ đi đạp xe vào ngày kia.","explanation":"Câu tường thuật, lùi thì tương lai đơn → would go."},{"q":"2. I don’t feel like going out tonight. I think I just (go) ___ to bed.","answer":"will just go","vi":"Tôi không muốn ra ngoài tối nay. Tôi nghĩ tôi sẽ chỉ đi ngủ thôi.","explanation":"Quyết định tại thời điểm nói → tương lai đơn."},{"q":"3. In the future, robots (be) ___ able (do) ___ everything.","answer":"will be / to do","accepted":["will be / to do","will be to do","will be, to do"],"vi":"Trong tương lai, robot sẽ có thể làm được mọi thứ.","explanation":"Dự đoán về tương lai → will be able to do."},{"q":"4. He said that robots (can do) ___ many things for us, but they might not (enhance) ___ totally the quality of our lives.","answer":"could do / enhance","accepted":["could do / enhance","could do enhance","could do, enhance"],"vi":"Anh ấy nói rằng robot có thể làm nhiều việc cho chúng ta, nhưng chúng có thể sẽ không cải thiện hoàn toàn chất lượng cuộc sống.","explanation":"Câu tường thuật, lùi thì: can→could; \"might not\" theo sau bởi V nguyên mẫu → enhance."},{"q":"5. This time next month, ___ on a business trip to Australia?","answer":"will she be going","vi":"Giờ này tháng sau, liệu cô ấy có đang đi công tác ở Úc không?","explanation":"Câu hỏi ở thì tương lai tiếp diễn: Will + S + be + V-ing?","note":"Will + S + be + V-ing? (câu hỏi tương lai tiếp diễn)"},{"q":"6. They asked me if I (see) ___ Mr. Smith the previous day.","answer":"had seen","vi":"Họ hỏi tôi liệu tôi đã gặp ông Smith hôm trước chưa.","explanation":"Câu tường thuật, lùi thì quá khứ đơn → quá khứ hoàn thành."},{"q":"7. When I (rang) ___ Nam last week, he said he (be) ___ busy that day.","answer":"rang / was","accepted":["rang / was","rang was","rang, was"],"vi":"Khi tôi gọi điện cho Nam tuần trước, anh ấy nói anh ấy bận hôm đó.","explanation":"Hành động gọi điện → quá khứ đơn: rang; câu tường thuật lùi thì (is→was)."},{"q":"8. When I called, Susan said she (give) ___ the dog a bath so she (ask) ___ me (phone) ___ back in half an hour.","answer":"was giving / asked / to phone","accepted":["was giving / asked / to phone","was giving asked to phone","was giving, asked, to phone"],"vi":"Khi tôi gọi, Susan nói cô ấy đang tắm cho chó nên cô ấy nhờ tôi gọi lại sau nửa tiếng.","explanation":"Hành động đang diễn ra tại thời điểm gọi → was giving; chuỗi hành động → asked; \"ask someone to V\" → to phone."},{"q":"9. His teacher thinks that she (be) ___ a famous musician one day.","answer":"will be","vi":"Giáo viên của cô ấy nghĩ rằng cô ấy sẽ trở thành một nhạc sĩ nổi tiếng một ngày nào đó.","explanation":"Dự đoán về tương lai → will be."},{"q":"10. Mai said that she (travel) ___ to Australia the following year.","answer":"would travel","vi":"Mai nói rằng cô ấy sẽ đi du lịch Úc vào năm sau.","explanation":"Câu tường thuật, lùi thì tương lai đơn → would travel."},{"q":"11. We reminded Mark (not be) ___ late for our appointment the next day.","answer":"not to be","vi":"Chúng tôi nhắc Mark đừng đến trễ cuộc hẹn vào ngày hôm sau.","explanation":"\"remind + O + not to + V\" = nhắc ai đừng làm gì."},{"q":"12. In the future, e-learning (replace) ___ traditional schools and millions of people around the world (be) ___ able (study) ___ the similar online lesson at the same time.","answer":"will replace / will be / to study","accepted":["will replace / will be / to study","will replace will be to study","will replace, will be, to study"],"vi":"Trong tương lai, học trực tuyến sẽ thay thế trường học truyền thống và hàng triệu người trên khắp thế giới sẽ có thể học cùng một bài học trực tuyến cùng lúc.","explanation":"Dự đoán về tương lai → will replace, will be able to study."},{"q":"13. Technician said fuel used and carbon dioxide released from vehicles (be) ___ reduced by a new cruise control.","answer":"would be","vi":"Kỹ thuật viên nói rằng nhiên liệu sử dụng và khí CO2 thải ra từ xe cộ sẽ được giảm bớt nhờ hệ thống kiểm soát hành trình mới.","explanation":"Câu tường thuật, lùi thì tương lai đơn bị động → would be reduced."},{"q":"14. The girl is having flu now. ___ part in the contest next week?","answer":"Will she take","vi":"Cô bé đang bị cúm. Liệu cô ấy có tham gia cuộc thi vào tuần tới không?","explanation":"Câu hỏi ở thì tương lai đơn: Will + S + V-inf?","note":"Will + S + V-inf? (câu hỏi tương lai đơn)"},{"q":"15. We believed that advances in medical science (will) ___ help people (live) ___ longer.","answer":"would / live","accepted":["would / live","would live","would, live"],"vi":"Chúng tôi tin rằng những tiến bộ trong y học sẽ giúp con người sống lâu hơn.","explanation":"Câu tường thuật, lùi thì: will→would; \"help + O + V-inf\" → live."},{"q":"16. She said that she (use) ___ solar panels because they (be) ___ cheaper than electricity.","answer":"used / were","accepted":["used / were","used were","used, were"],"vi":"Cô ấy nói rằng cô ấy dùng tấm pin mặt trời vì chúng rẻ hơn điện.","explanation":"Câu tường thuật, lùi thì: hiện tại đơn → quá khứ đơn (used, were)."}],"roman":"V"},{"navLabel":"Sửa lỗi","title":"Tìm lỗi sai (A, B, C hoặc D)","icon":"wrench","instructions":"Mỗi câu có 4 phần gạch chân A, B, C, D. Chọn phần chứa lỗi sai. Chọn xong sẽ hiện đúng/sai, đáp án và công thức ngay.","type":"mcq","instant":true,"questions":[{"q":"1. \"I <u>have read</u> a very interesting <u>article</u> <u>about</u> Artificial Intelligent yesterday\", she <u>said.</u>","options":["have read","article","about","said."],"answer":0,"vi":"\"Tôi đã đọc một bài báo rất thú vị về Trí tuệ Nhân tạo hôm qua\", cô ấy nói.","explanation":"\"yesterday\" là dấu hiệu quá khứ đơn, không dùng hiện tại hoàn thành → have read phải sửa thành read.","note":"thì quá khứ đơn (dấu hiệu: yesterday)","vis":["đã đọc","bài báo","về, khoảng","đã nói"]},{"q":"2. My cousin <u>told</u> me that he <u>spends</u> a <u>lot of</u> time <u>studying</u> physics, chemistry and biology.","options":["told","spends","lot of","studying"],"answer":1,"vi":"Anh họ tôi nói với tôi rằng anh ấy dành nhiều thời gian học vật lý, hóa học và sinh học.","explanation":"Lùi thì trong câu tường thuật: spends phải sửa thành spent.","note":"lùi thì (backshift): hiện tại đơn → quá khứ đơn","vis":["đã kể, đã nói","dành (thời gian)","nhiều","đang học, việc học"]},{"q":"3. It is very <u>interested</u> to <u>learn about</u> different <u>inventions</u> in <u>the past</u> centuries.","options":["interested","learn about","inventions","the past"],"answer":0,"vi":"Việc tìm hiểu về những phát minh khác nhau qua các thế kỷ rất thú vị.","explanation":"\"It is + adjective\" (vật gây hứng thú) → interested phải sửa thành interesting.","note":"It is + interesting (tính từ chỉ tính chất gây thú vị)","vis":["hứng thú, quan tâm","tìm hiểu về","những phát minh","quá khứ"]},{"q":"4. With <u>commerce</u> space travel, we <u>will be taking</u> minerals <u>from</u> the moon <u>at this time</u> in 2030.","options":["commerce","will be taking","from","at this time"],"answer":0,"vi":"Với du hành vũ trụ thương mại, chúng ta sẽ đang khai thác khoáng sản từ mặt trăng vào thời điểm này năm 2030.","explanation":"Trước danh từ \"travel\" cần tính từ → commerce phải sửa thành commercial.","note":"adjective + noun","vis":["thương mại","sẽ đang lấy/khai thác","từ","vào thời điểm này"]},{"q":"5. If I <u>were</u> you, I would <u>make some research</u> from the Internet <u>about</u> how steam engines <u>were improved</u> over the decades.","options":["were","make some research","about","were improved"],"answer":1,"vi":"Nếu tôi là bạn, tôi sẽ tìm hiểu thông tin trên Internet về việc đầu máy hơi nước đã được cải tiến qua các thập kỷ như thế nào.","explanation":"\"do research\" = tìm hiểu, nghiên cứu (collocation cố định) → make some research phải sửa thành do some research.","note":"do research (collocation, không dùng \"make\")","vis":["đã là/đã ở (quá khứ của to be)","thực hiện một số nghiên cứu","về","đã được cải tiến"]},{"q":"6. It is <u>certain</u> that <u>technological advances</u> have made our life <u>more easier</u> in <u>the last few</u> centuries.","options":["certain","technological advances","more easier","the last few"],"answer":2,"vi":"Chắc chắn rằng những tiến bộ công nghệ đã làm cho cuộc sống của chúng ta dễ dàng hơn trong vài thế kỷ qua.","explanation":"\"more easier\" là so sánh kép sai → phải sửa thành easier.","note":"so sánh hơn: easier (không dùng \"more\" + \"-er\" cùng lúc)","vis":["chắc chắn","những tiến bộ công nghệ","dễ dàng hơn","vài (thế kỷ) gần đây"]},{"q":"7. With the <u>fast speed</u> of <u>technological development</u>, people say that we <u>will using</u> robots to do all hard <u>work</u> in the near future.","options":["fast speed","technological development","will using","work"],"answer":2,"vi":"Với tốc độ phát triển công nghệ nhanh chóng, người ta nói rằng chúng ta sẽ dùng robot để làm mọi việc nặng nhọc trong tương lai gần.","explanation":"Thiếu \"be\" trong tương lai tiếp diễn → will using phải sửa thành will be using.","note":"will be + V-ing (tương lai tiếp diễn)","vis":["tốc độ nhanh","sự phát triển công nghệ","sẽ đang sử dụng","công việc"]},{"q":"8. Science <u>is use</u> in all <u>corners</u> of the world <u>for</u> the <u>benefits</u> of people.","options":["is use","corners","for","benefits"],"answer":0,"vi":"Khoa học được sử dụng ở khắp mọi nơi trên thế giới vì lợi ích của con người.","explanation":"Bị động cần quá khứ phân từ → is use phải sửa thành is used.","note":"S + is + P2 (bị động)","vis":["được sử dụng","những góc, ngóc ngách","cho, vì","lợi ích"]},{"q":"9. They asked me <u>how long</u> it would <u>took</u> <u>them</u> <u>to patent</u> their invention.","options":["how long","took","them","to patent"],"answer":1,"vi":"Họ hỏi tôi sẽ mất bao lâu để họ đăng ký bằng sáng chế cho phát minh của mình.","explanation":"Sau \"would\" cần động từ nguyên mẫu → took phải sửa thành take.","note":"would + V-inf","vis":["bao lâu","mất (thời gian)","họ (tân ngữ)","để đăng ký bằng sáng chế"]},{"q":"10. He <u>possibly</u> <u>might install</u> Skype <u>on</u> his computer to have free <u>talks</u> with his friends.","options":["possibly","might install","on","talks"],"answer":0,"vi":"Anh ấy có thể sẽ cài Skype vào máy tính để gọi điện miễn phí với bạn bè.","explanation":"Trạng từ \"possibly\" thường đứng sau động từ khiếm khuyết \"might\" → possibly might phải sửa thành might possibly.","note":"might possibly (thứ tự trạng từ sau động từ khiếm khuyết)","vis":["có thể","có thể sẽ cài đặt","trên","những cuộc trò chuyện, cuộc gọi"]},{"q":"11. They <u>put off</u> <u>to introduce</u> the latest version of this machine <u>to</u> public because there <u>were</u> some technical errors.","options":["put off","to introduce","to","were"],"answer":1,"vi":"Họ hoãn việc giới thiệu phiên bản mới nhất của chiếc máy này ra công chúng vì có một số lỗi kỹ thuật.","explanation":"\"put off\" + V-ing, không dùng \"to V\" → to introduce phải sửa thành introducing.","note":"put off + V-ing","vis":["hoãn lại, trì hoãn","để giới thiệu","đến, cho","đã (là/có)"]},{"q":"12. \"Do you think that <u>can you</u> become <u>an astronaut</u> and walk <u>on</u> the Moon one day?\", <u>asked the old man.</u>","options":["can you","an astronaut","on","asked the old man."],"answer":0,"vi":"\"Bạn có nghĩ rằng bạn có thể trở thành phi hành gia và đi bộ trên Mặt Trăng một ngày nào đó không?\", ông lão hỏi.","explanation":"Mệnh đề nhúng sau \"that\" cần trật tự câu trần thuật (S trước V), không đảo ngữ → that can you become phải sửa thành that you can become.","note":"that + S + V (không đảo ngữ trong mệnh đề nhúng)","vis":["bạn có thể","một phi hành gia","trên","ông già hỏi"]},{"q":"13. My younger brother asked me <u>whether</u> I <u>could tell</u> him how <u>this digital</u> <u>camera worked</u>.","options":["whether","could tell","this digital","camera worked"],"answer":2,"vi":"Em trai tôi hỏi tôi liệu tôi có thể cho nó biết chiếc máy ảnh kỹ thuật số đó hoạt động như thế nào không.","explanation":"Trong câu tường thuật, \"this\" (gần) đổi thành \"that\" (xa) → this digital phải sửa thành that digital.","note":"this → that (biến đổi trong câu tường thuật)","vis":["liệu rằng, có...không","có thể nói/chỉ cho","(máy ảnh) kỹ thuật số này","máy ảnh hoạt động"]},{"q":"14. You <u>may probably</u> need to talk with him <u>face to face</u> <u>instead</u> talking <u>on the phone.</u>","options":["may probably","face to face","instead","on the phone."],"answer":2,"vi":"Bạn có thể sẽ cần nói chuyện trực tiếp với anh ấy thay vì gọi điện thoại.","explanation":"\"instead of + V-ing\" cần giới từ \"of\" → instead talking phải sửa thành instead of talking.","note":"instead of + V-ing","vis":["có lẽ, có thể","trực tiếp, mặt đối mặt","thay vào đó","qua điện thoại"]},{"q":"15. Jenny said that there <u>had been</u> the updated version of <u>that anti-virus program</u> and she <u>would be installing</u> it on her new Macbook <u>the after week.</u>","options":["had been","that anti-virus program","would be installing","the after week."],"answer":3,"vi":"Jenny nói rằng đã có phiên bản cập nhật của phần mềm diệt virus đó và cô ấy sẽ cài nó vào Macbook mới vào tuần sau.","explanation":"Trật tự từ đúng là \"the week after\" → the after week phải sửa thành the week after.","note":"the week after (trật tự từ đúng)","vis":["đã có/đã tồn tại (quá khứ hoàn thành)","chương trình diệt virus đó","sẽ đang cài đặt","tuần sau đó"]},{"q":"16. <u>Lucy’s</u> brother <u>told</u> that he <u>walked</u> to school <u>today.</u>","options":["Lucy’s","told","walked","today."],"answer":3,"vi":"Anh của Lucy nói rằng anh ấy đã đi bộ đến trường hôm đó.","explanation":"Trong câu tường thuật, \"today\" đổi thành \"that day\" → today phải sửa thành that day.","note":"today → that day (biến đổi trạng từ trong câu tường thuật)","vis":["của Lucy","đã nói, đã kể","đã đi bộ","hôm nay"]},{"q":"17. <u>Minh’s</u> mother forgot <u>pick</u> him up, <u>so</u> he <u>walked</u> to go home.","options":["Minh’s","pick","so","walked"],"answer":1,"vi":"Mẹ của Minh quên đón cậu, nên cậu đã đi bộ về nhà.","explanation":"\"forget to V\" = quên làm gì (chưa làm) → pick him up phải sửa thành to pick him up.","note":"forget to + V-inf (quên làm việc chưa xảy ra)","vis":["của Minh","đón","vì vậy","đã đi bộ"]},{"q":"18. Mary <u>asked</u> me <u>what</u> kind of <u>food</u> the aliens <u>like</u> eating.","options":["asked","what","food","like"],"answer":3,"vi":"Mary hỏi tôi loại thức ăn nào mà người ngoài hành tinh thích ăn.","explanation":"Lùi thì trong câu tường thuật: like phải sửa thành liked.","note":"lùi thì (backshift): hiện tại đơn → quá khứ đơn","vis":["đã hỏi","cái gì","thức ăn","thích"]},{"q":"19. Do you <u>want</u> <u>having</u> a <u>new</u> dress <u>in</u> Tet holiday?","options":["want","having","new","in"],"answer":1,"vi":"Bạn có muốn có một chiếc váy mới vào dịp Tết không?","explanation":"\"want\" + to V, không dùng V-ing → having phải sửa thành to have.","note":"want + to V-inf","vis":["muốn","có (V-ing)","mới","vào"]},{"q":"20. In 2030, robots will <u>be build</u> our houses <u>and</u> do <u>our</u> <u>housework.</u>","options":["be build","and","our","housework."],"answer":0,"vi":"Đến năm 2030, robot sẽ xây nhà cho chúng ta và làm việc nhà.","explanation":"Thiếu \"-ing\" trong tương lai tiếp diễn → will be build phải sửa thành will be building.","note":"will be + V-ing (tương lai tiếp diễn)","vis":["được xây dựng","và","của chúng ta","việc nhà"]}],"roman":"VI"},{"navLabel":"Đọc hiểu 1","title":"Đọc hiểu – Lịch sử của phương pháp khoa học","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"A Brief History of the Scientific Method","html":"It seems entirely <b>(1) ____</b> to us that there are teams of scientists in universities and other institutions around the world attempting to <b>(2) ____</b> the way the world works. However, it hasn't always been that <b>(3) ____</b>. Although the scientific method is now four or five hundred years old, the ancient Greeks, for example, believed that they could work out the <b>(4) ____</b> of natural events just by the power of thought.<br><br>During the 17th century, more and more people began to realise that they could <b>(5) ____</b> their scientific ideas by designing a relevant <b>(6) ____</b> and seeing what happened. A lot of <b>(7) ____</b> was made in this way by individual scientists. These men and women often worked alone, carrying out <b>(8) ____</b> into many different areas of Science, and they often receive very little <b>(9) ____</b> for their hard work. At the start of the 20th century, though it became <b>(10) ____</b> that science was becoming more complicated and more expensive. The individual scientist disappeared, to be replaced by highly qualified teams of experts. Modern science was born.","vi":"Đối với chúng ta, có vẻ hoàn toàn <b>(1) ____</b> khi có các nhóm nhà khoa học ở các trường đại học và tổ chức khác trên khắp thế giới cố gắng <b>(2) ____</b> cách thế giới vận hành. Tuy nhiên, không phải lúc nào cũng <b>(3) ____</b>. Mặc dù phương pháp khoa học hiện đã có bốn năm trăm năm tuổi, người Hy Lạp cổ đại, chẳng hạn, tin rằng họ có thể tìm ra <b>(4) ____</b> của các hiện tượng tự nhiên chỉ bằng sức mạnh của tư duy.<br><br>Trong suốt thế kỷ 17, ngày càng nhiều người bắt đầu nhận ra rằng họ có thể <b>(5) ____</b> các ý tưởng khoa học của mình bằng cách thiết kế một <b>(6) ____</b> phù hợp và xem điều gì xảy ra. Rất nhiều <b>(7) ____</b> đã đạt được theo cách này bởi các nhà khoa học cá nhân. Những người đàn ông và phụ nữ này thường làm việc một mình, tiến hành <b>(8) ____</b> vào nhiều lĩnh vực khoa học khác nhau, và họ thường nhận được rất ít <b>(9) ____</b> cho công sức của mình. Vào đầu thế kỷ 20, tuy nhiên, trở nên <b>(10) ____</b> rằng khoa học ngày càng phức tạp và tốn kém hơn. Nhà khoa học cá nhân biến mất, được thay thế bởi các nhóm chuyên gia có trình độ cao. Khoa học hiện đại đã ra đời."},"questions":[{"q":"1. It seems entirely (1) ___ to us that there are teams of scientists in universities and other institutions around the world attempting to (2) ___ the way the world works.","options":["physical","natural","typical","real"],"answer":1,"vi":"Đối với chúng ta, có vẻ hoàn toàn tự nhiên khi có những nhóm nhà khoa học…cố gắng tìm hiểu cách thế giới vận hành.","explanation":"\"entirely natural\" = hoàn toàn tự nhiên, phù hợp ngữ cảnh. Nghĩa từng đáp án:<br>A. physical (thuộc vật lý, vật chất)<br>B. natural (tự nhiên) ✔<br>C. typical (điển hình, tiêu biểu)<br>D. real (thực, thật).","vis":["thuộc vật lý, vật chất","tự nhiên","điển hình, tiêu biểu","thực, thật"]},{"q":"2. It seems entirely (1) ___ to us that there are teams of scientists in universities and other institutions around the world attempting to (2) ___ the way the world works.","options":["create","invent","construct","discover"],"answer":3,"vi":"…cố gắng khám phá ra cách thế giới vận hành.","explanation":"\"discover the way\" = khám phá ra cách thức. Nghĩa từng đáp án:<br>A. create (tạo ra)<br>B. invent (phát minh ra)<br>C. construct (xây dựng, xây nên)<br>D. discover (khám phá ra) ✔.","vis":["tạo ra","phát minh ra","xây dựng, xây nên","khám phá ra"]},{"q":"3. However, it hasn’t always been that (3) ___.","options":["route","method","way","technique"],"answer":2,"vi":"Tuy nhiên, không phải lúc nào cũng như vậy.","explanation":"\"that way\" = như vậy, theo cách đó. Nghĩa từng đáp án:<br>A. route (tuyến đường, lộ trình)<br>B. method (phương pháp)<br>C. way (cách, cách thức) ✔<br>D. technique (kỹ thuật, kỹ xảo).","vis":["tuyến đường, lộ trình","phương pháp","cách, cách thức","kỹ thuật, kỹ xảo"]},{"q":"4. Although the scientific method is now four or five hundred years old, the ancient Greeks, for example, believed that they could work out the (4) ___ of natural events just by the power of thought.","options":["aims","reasons","causes","impulses"],"answer":2,"vi":"…người Hy Lạp cổ đại…tin rằng họ có thể tìm ra nguyên nhân của các hiện tượng tự nhiên chỉ bằng sức mạnh của tư duy.","explanation":"\"the causes of natural events\" = nguyên nhân của các hiện tượng tự nhiên. Nghĩa từng đáp án:<br>A. aims (mục đích, mục tiêu)<br>B. reasons (lý do)<br>C. causes (nguyên nhân) ✔<br>D. impulses (sự thôi thúc, xung lực).","vis":["mục đích, mục tiêu","lý do","nguyên nhân","sự thôi thúc, xung lực"]},{"q":"5. During the 17th century, more and more people began to realise that they could (5) ___ their scientific ideas by designing a relevant (6) ___ and seeing what happened.","options":["calculate","estimate","measure","test"],"answer":3,"vi":"…ngày càng nhiều người bắt đầu nhận ra rằng họ có thể kiểm chứng các ý tưởng khoa học của mình…","explanation":"\"test their scientific ideas\" = kiểm chứng ý tưởng khoa học. Nghĩa từng đáp án:<br>A. calculate (tính toán)<br>B. estimate (ước tính)<br>C. measure (đo lường)<br>D. test (kiểm chứng, thử nghiệm) ✔.","vis":["tính toán","ước tính","đo lường","kiểm chứng, thử nghiệm"]},{"q":"6. During the 17th century, more and more people began to realise that they could (5) ___ their scientific ideas by designing a relevant (6) ___ and seeing what happened.","options":["experiment","research","attempt","analysis"],"answer":0,"vi":"…bằng cách thiết kế một thí nghiệm phù hợp và xem điều gì xảy ra.","explanation":"\"designing an experiment\" = thiết kế một thí nghiệm. Nghĩa từng đáp án:<br>A. experiment (thí nghiệm) ✔<br>B. research (nghiên cứu)<br>C. attempt (sự cố gắng, nỗ lực)<br>D. analysis (sự phân tích).","vis":["thí nghiệm","nghiên cứu","sự cố gắng, nỗ lực","sự phân tích"]},{"q":"7. A lot of (7) ___ was made in this way by individual scientists.","options":["development","movement","progress","evolution"],"answer":2,"vi":"Rất nhiều tiến bộ đã đạt được theo cách này bởi các nhà khoa học cá nhân.","explanation":"\"progress was made\" = đạt được tiến bộ. Nghĩa từng đáp án:<br>A. development (sự phát triển)<br>B. movement (sự chuyển động, phong trào)<br>C. progress (sự tiến bộ) ✔<br>D. evolution (sự tiến hóa).","vis":["sự phát triển","sự chuyển động, phong trào","sự tiến bộ","sự tiến hóa"]},{"q":"8. These men and women often worked alone, carrying out (8) ___ into many different areas of Science, and they often receive very little (9) ___ for their hard work.","options":["research","experiment","discovery","education"],"answer":0,"vi":"…tiến hành nghiên cứu vào nhiều lĩnh vực khoa học khác nhau…","explanation":"\"carry out research\" = tiến hành nghiên cứu. Nghĩa từng đáp án:<br>A. research (nghiên cứu) ✔<br>B. experiment (thí nghiệm)<br>C. discovery (sự phát hiện)<br>D. education (giáo dục).","vis":["nghiên cứu","thí nghiệm","sự phát hiện","giáo dục"]},{"q":"9. These men and women often worked alone, carrying out (8) ___ into many different areas of Science, and they often receive very little (9) ___ for their hard work.","options":["award","prize","gift","reward"],"answer":3,"vi":"…và họ thường nhận được rất ít phần thưởng cho công sức của mình.","explanation":"\"receive reward\" = nhận phần thưởng. Nghĩa từng đáp án:<br>A. award (giải thưởng trao tặng chính thức)<br>B. prize (giải thưởng cuộc thi)<br>C. gift (quà tặng)<br>D. reward (phần thưởng) ✔.","vis":["giải thưởng trao tặng chính thức","giải thưởng cuộc thi","quà tặng","phần thưởng"]},{"q":"10. At the start of the 20th century, though it became (10) ___ that science was becoming more complicated and more expensive.","options":["clear","true","accurate","actual"],"answer":0,"vi":"Vào đầu thế kỷ 20…rõ ràng là khoa học ngày càng phức tạp và tốn kém hơn.","explanation":"\"it became clear that\" = trở nên rõ ràng rằng. Nghĩa từng đáp án:<br>A. clear (rõ ràng) ✔<br>B. true (đúng, thật)<br>C. accurate (chính xác)<br>D. actual (thực tế, có thật).","vis":["rõ ràng","đúng, thật","chính xác","thực tế, có thật"]}],"roman":"VII"},{"navLabel":"Đọc hiểu 2a","title":"Đọc hiểu – Elevator Air Conditioning (đoạn 1, từ cho sẵn)","icon":"book-open","instructions":"Đọc đoạn văn và điền từ thích hợp (dùng từ cho sẵn) vào mỗi chỗ trống.","type":"fill","bank":["effect","elevator","energy","increase","into","process","reason","used","warm","well"],"questions":[{"q":"1. The primary ___ for installing an elevator air conditioner is the comfort that it provides while traveling in the elevator.","answer":"reason","vi":"Lý do chính để lắp điều hòa thang máy là sự thoải mái mà nó mang lại khi di chuyển trong thang máy.","explanation":"\"the reason for\" = lý do để làm gì."},{"q":"2. The primary reason for installing an elevator air conditioner is the comfort that it provides while traveling in the ___.","answer":"elevator","vi":"Lý do chính để lắp điều hòa thang máy là sự thoải mái mà nó mang lại khi di chuyển trong thang máy.","explanation":"Ngữ cảnh nói về thang máy → elevator."},{"q":"3. Some elevator air conditioners can be ___ in countries with cold climates if a thermostat is used to reverse the refrigeration cycle to warm the elevator car.","answer":"used","vi":"Một số điều hòa thang máy có thể được sử dụng ở các nước khí hậu lạnh nếu dùng bộ điều nhiệt để đảo chiều chu trình làm lạnh nhằm làm ấm khoang thang máy.","explanation":"Bị động: can be used."},{"q":"4. Some elevator air conditioners can be used in countries with cold climates if a thermostat is used to reverse the refrigeration cycle to ___ the elevator car.","answer":"warm","vi":"Một số điều hòa thang máy có thể được sử dụng ở các nước khí hậu lạnh nếu dùng bộ điều nhiệt để đảo chiều chu trình làm lạnh nhằm làm ấm khoang thang máy.","explanation":"Đảo chiều làm lạnh → để làm ấm (warm)."},{"q":"5. Heat generated from the cooling ___ is dissipated into the hoist way.","answer":"process","vi":"Nhiệt sinh ra từ quá trình làm mát được tản vào giếng nâng.","explanation":"\"the cooling process\" = quá trình làm mát."},{"q":"6. The elevator cab (or car) is ordinarily not air-tight, and some of this heat may reenter the car and reduce the overall cooling ___.","answer":"effect","vi":"Cabin thang máy thường không kín khí, nên một phần nhiệt này có thể quay trở lại cabin và làm giảm hiệu quả làm mát tổng thể.","explanation":"\"cooling effect\" = hiệu quả làm mát."},{"q":"7. The air from the lobby constantly leaks ___ the elevator shaft due to elevator movements as well as elevator shaft ventilation requirements.","answer":"into","vi":"Không khí từ sảnh liên tục rò rỉ vào giếng thang máy do chuyển động của thang máy cũng như yêu cầu thông gió của giếng thang.","explanation":"\"leak into\" = rò rỉ vào."},{"q":"8. The air from the lobby constantly leaks into the elevator shaft due to elevator movements as ___ as elevator shaft ventilation requirements.","answer":"well","vi":"Không khí từ sảnh liên tục rò rỉ vào giếng thang máy do chuyển động của thang máy cũng như yêu cầu thông gió của giếng thang.","explanation":"\"as well as\" = cũng như."},{"q":"9. Using this conditioned air in the elevator does not ___ energy costs.","answer":"increase","vi":"Việc sử dụng luồng khí đã điều hòa này không làm tăng chi phí năng lượng.","explanation":"\"increase energy costs\" = làm tăng chi phí năng lượng."},{"q":"10. However, by using an independent elevator air-conditioner to achieve better temperature control inside the car, more ___ will be used.","answer":"energy","vi":"Tuy nhiên, khi dùng điều hòa thang máy độc lập để kiểm soát nhiệt độ tốt hơn bên trong cabin, sẽ cần dùng nhiều năng lượng hơn.","explanation":"\"more energy\" = nhiều năng lượng hơn."}],"roman":"VIII"},{"navLabel":"Đọc hiểu 2b","title":"Đọc hiểu – Elevator Technology (đoạn 2, gợi ý chữ cái đầu)","icon":"book-open","instructions":"Đọc đoạn văn và điền từ thích hợp (dựa vào chữ cái gợi ý đầu từ) vào mỗi chỗ trống.","type":"fill","questions":[{"q":"1. Elevator technology has evolved from rudimentary lifting devices driven by muscle power to complicated state-of-the-art machines <b>t</b>___ offer \"smart\" controls.","answer":"that","vi":"Công nghệ thang máy đã phát triển từ những thiết bị nâng thô sơ chạy bằng sức người thành những cỗ máy hiện đại phức tạp có \"điều khiển thông minh\".","explanation":"Đại từ quan hệ \"that\" thay cho \"machines\"."},{"q":"2. A modern elevator <b>u</b>___ computer integration to assess and compensate for traffic patterns, and many elevators are furnished with touch screens, air conditioning, and highly artistic designs in cabs and doors.","answer":"uses","vi":"Thang máy hiện đại sử dụng tích hợp máy tính để đánh giá và điều chỉnh theo lưu lượng người dùng, và nhiều thang máy được trang bị màn hình cảm ứng, điều hòa không khí, cùng thiết kế nghệ thuật cao trong cabin và cửa.","explanation":"Chủ ngữ số ít \"elevator\" → uses."},{"q":"3. A modern elevator uses computer integration to assess and compensate for traffic patterns, and many elevators are furnished <b>w</b>___ touch screens, air conditioning, and highly artistic designs in cabs and doors.","answer":"with","vi":"Thang máy hiện đại sử dụng tích hợp máy tính để đánh giá và điều chỉnh theo lưu lượng người dùng, và nhiều thang máy được trang bị màn hình cảm ứng, điều hòa không khí, cùng thiết kế nghệ thuật cao trong cabin và cửa.","explanation":"\"furnished with\" = được trang bị bằng."},{"q":"4. What’s more the elevator industry <b>h</b>___ changed our culture and the way we live.","answer":"has","vi":"Hơn nữa, ngành công nghiệp thang máy đã thay đổi văn hóa và cách chúng ta sống.","explanation":"Hiện tại hoàn thành → has changed."},{"q":"5. In the <b>p</b>___, upper rooms of hotels and rooming houses were considered undesirable due to the need to climb stairs carrying heavy baggage.","answer":"past","vi":"Trong quá khứ, các phòng trên cao của khách sạn và nhà trọ bị coi là không được ưa chuộng vì phải leo cầu thang mang theo hành lý nặng.","explanation":"\"in the past\" = trong quá khứ."},{"q":"6. In the past, upper rooms of hotels and rooming houses were considered undesirable due to the need to climb stairs carrying <b>h</b>___ baggage.","answer":"heavy","vi":"Trong quá khứ, các phòng trên cao của khách sạn và nhà trọ bị coi là không được ưa chuộng vì phải leo cầu thang mang theo hành lý nặng.","explanation":"Trước danh từ \"baggage\" cần tính từ → heavy."},{"q":"7. With the advent of the passenger elevator, the penthouse suite and corner office with a sweeping <b>v</b>___ became prime real estate.","answer":"view","vi":"Với sự ra đời của thang máy chở khách, căn hộ áp mái và văn phòng góc có tầm nhìn rộng đã trở thành bất động sản cao cấp.","explanation":"\"a sweeping view\" = tầm nhìn rộng lớn."},{"q":"8. Mankind has come a long way, in the never-ceasing endeavour to accomplish a given task <b>m</b>___ efficiently.","answer":"more","vi":"Nhân loại đã đi một chặng đường dài, trong nỗ lực không ngừng để hoàn thành công việc một cách hiệu quả hơn.","explanation":"So sánh hơn → more efficiently."}],"roman":"IX"},{"navLabel":"Đọc hiểu 3","title":"Đọc hiểu – Công nghệ trong giáo dục","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"Technology in Education","html":"Technology in education plays an important role <b>(1) ____</b> building on the educational skills and knowledge for people. This is very essential, especially those who need <b>(2) ____</b> their knowledge. <b>(3) ____</b> for them to achieve a successful life in the future. Technology in education is manifested through the use of computers. This is also a great help for teachers <b>(4) ____</b> they can already enhance their teaching skills and strategies every time they are facing their classes. There is a variety of benefits which technology brings back. Firstly, students can already learn <b>(5) ____</b> their own even without the <b>(6) ____</b> of their parents and teachers. They are just going to the Internet to <b>(7) ____</b> the lesson they need to study. Quick accessibility and being well-equipment with the skills and knowledge in operating a computer are very <b>(8) ____</b> for the students. Next, the need for heavy books to be brought back and forth from school and home is no longer needed with technology. The book can stay in the classroom because the information that they need is easily accessed on a computer. Last but not least, along with lots of images, videos and other graphics and text <b>(9) ____</b> in computer, more students would feel excited <b>(10) ____</b> studying through the use of the gadget, which is very important to arouse their interest in studying.","vi":"Công nghệ trong giáo dục đóng vai trò quan trọng <b>(1) ____</b> việc xây dựng kỹ năng và kiến thức cho con người. Điều này rất cần thiết, đặc biệt với những ai cần <b>(2) ____</b> kiến thức của mình. <b>(3) ____</b> họ có thể đạt được cuộc sống thành công trong tương lai. Công nghệ trong giáo dục thể hiện qua việc sử dụng máy tính. Đây cũng là trợ giúp lớn cho giáo viên <b>(4) ____</b> họ có thể nâng cao kỹ năng và chiến lược giảng dạy mỗi khi đứng lớp. Có rất nhiều lợi ích mà công nghệ mang lại. Thứ nhất, học sinh có thể tự học <b>(5) ____</b> mà không cần <b>(6) ____</b> của cha mẹ và giáo viên. Họ chỉ cần lên mạng để <b>(7) ____</b> bài học cần học. Khả năng truy cập nhanh và được trang bị kỹ năng, kiến thức vận hành máy tính rất <b>(8) ____</b> cho học sinh. Tiếp theo, nhu cầu mang sách nặng qua lại giữa trường và nhà không còn cần thiết nữa nhờ công nghệ. Sách có thể ở lại lớp học vì thông tin cần thiết dễ dàng truy cập trên máy tính. Cuối cùng, cùng với nhiều hình ảnh, video và đồ họa, văn bản <b>(9) ____</b> trong máy tính, nhiều học sinh sẽ cảm thấy hào hứng <b>(10) ____</b> việc học thông qua thiết bị này, điều rất quan trọng để khơi dậy hứng thú học tập của các em."},"questions":[{"q":"1. Technology in education plays an important role (1) ___ building on the educational skills and knowledge for people.","options":["on","in","at","for"],"answer":1,"vi":"Công nghệ trong giáo dục đóng vai trò quan trọng trong việc xây dựng kỹ năng và kiến thức cho con người.","explanation":"\"play a role in doing something\" = đóng vai trò trong việc gì.","vis":["trên","trong (việc)","tại, ở","cho, vì"]},{"q":"2. This is very essential, especially those who need (2) ___ their knowledge.","options":["improve","improving","to be improved","being improved"],"answer":1,"vi":"Điều này rất cần thiết, đặc biệt với những ai cần nâng cao kiến thức của mình.","explanation":"\"need + V-ing\" (mang nghĩa bị động) = cần được làm gì.","vis":["cải thiện (động từ nguyên mẫu)","được cải thiện (V-ing, sau \"need\" mang nghĩa bị động)","được cải thiện (to-V bị động)","đang được cải thiện (bị động tiếp diễn)"]},{"q":"3. (3) ___ for them to achieve a successful life in the future.","options":["so that","in order","so in","in order that"],"answer":1,"vi":"Để họ có thể đạt được cuộc sống thành công trong tương lai.","explanation":"\"in order for someone to V\" = để cho ai đó làm gì. Nghĩa từng đáp án:<br>A. so that (để, theo sau là mệnh đề đầy đủ S+V)<br>B. in order (để, theo sau là \"for + O + to V\") ✔<br>C. so in (không phải cụm từ đúng ngữ pháp)<br>D. in order that (để mà, theo sau là mệnh đề đầy đủ S+V, không dùng với \"for + O\")","vis":["để, theo sau là mệnh đề đầy đủ S+V","để, theo sau là \"for + O + to V\"","không phải cụm từ đúng ngữ pháp","để mà, theo sau là mệnh đề đầy đủ S+V, không dùng với \"for + O\""]},{"q":"4. This is also a great help for teachers (4) ___ they can already enhance their teaching skills and strategies every time they are facing their classes.","options":["although","so","because","hence"],"answer":2,"vi":"Đây cũng là một sự trợ giúp lớn cho giáo viên vì họ có thể nâng cao kỹ năng giảng dạy…","explanation":"Nêu lý do → because. Nghĩa từng đáp án:<br>A. although (mặc dù)<br>B. so (vì vậy, cho nên)<br>C. because (bởi vì) ✔<br>D. hence (do đó, thường đứng đầu câu mới)","vis":["mặc dù","vì vậy, cho nên","bởi vì","do đó, thường đứng đầu câu mới"]},{"q":"5. Firstly, students can already learn (5) ___ their own even without the assistance of their parents and teachers.","options":["for","at","on","in"],"answer":2,"vi":"Thứ nhất, học sinh có thể tự học mà không cần sự giúp đỡ của cha mẹ và giáo viên.","explanation":"\"on their own\" = tự mình, một mình. Nghĩa từng đáp án:<br>A. for (cho, vì)<br>B. at (tại, ở - mốc thời gian/địa điểm cụ thể)<br>C. on (tự mình) ✔<br>D. in (trong, ở trong)","vis":["cho, vì","tại, ở - mốc thời gian/địa điểm cụ thể","tự mình","trong, ở trong"]},{"q":"6. Firstly, students can already learn on their own even without the (6) ___ of their parents and teachers.","options":["assist","assistant","assisting","assistance"],"answer":3,"vi":"…mà không cần sự giúp đỡ của cha mẹ và giáo viên.","explanation":"Sau \"the\" cần danh từ → assistance. Nghĩa từng đáp án:<br>A. assist (trợ giúp - động từ)<br>B. assistant (trợ lý - danh từ chỉ người)<br>C. assisting (đang trợ giúp - V-ing)<br>D. assistance (sự giúp đỡ - danh từ trừu tượng) ✔","vis":["trợ giúp - động từ","trợ lý - danh từ chỉ người","đang trợ giúp - V-ing","sự giúp đỡ - danh từ trừu tượng"]},{"q":"7. They are just going to the Internet to (7) ___ the lesson they need to study.","options":["look after","look up","look in","look for"],"answer":3,"vi":"Họ chỉ cần lên mạng để tìm bài học mà họ cần học.","explanation":"\"look for\" = tìm kiếm. Nghĩa từng đáp án:<br>A. look after (chăm sóc)<br>B. look up (tra cứu, tìm trong từ điển/tài liệu)<br>C. look in (ghé qua, xem qua)<br>D. look for (tìm kiếm) ✔","vis":["chăm sóc","tra cứu, tìm trong từ điển/tài liệu","ghé qua, xem qua","tìm kiếm"]},{"q":"8. Quick accessibility and being well-equipment with the skills and knowledge in operating a computer are very (8) ___ for the students.","options":["help","helpful","helpless","helping"],"answer":1,"vi":"Khả năng truy cập nhanh…rất hữu ích cho học sinh.","explanation":"Sau \"are very\" cần tính từ → helpful. Nghĩa từng đáp án:<br>A. help (giúp đỡ - danh từ/động từ)<br>B. helpful (hữu ích - tính từ) ✔<br>C. helpless (bất lực, không tự lo được)<br>D. helping (đang giúp đỡ - V-ing)","vis":["giúp đỡ - danh từ/động từ","hữu ích - tính từ","bất lực, không tự lo được","đang giúp đỡ - V-ing"]},{"q":"9. Last but not least, along with lots of images, videos and other graphics and text (9) ___ in computer, more students would feel excited about studying through the use of the gadget, which is very important to arouse their interest in studying.","options":["finding","find","found","to find"],"answer":2,"vi":"…cùng với nhiều hình ảnh, video và đồ họa, văn bản được tìm thấy trong máy tính…","explanation":"Mệnh đề quan hệ rút gọn bị động: \"text [that is] found\" = found.","vis":["đang tìm thấy (V-ing)","tìm thấy (nguyên mẫu)","được tìm thấy (quá khứ phân từ, mệnh đề quan hệ rút gọn bị động)","để tìm thấy (to-V)"]},{"q":"10. Last but not least, along with lots of images, videos and other graphics and text found in computer, more students would feel excited (10) ___ studying through the use of the gadget, which is very important to arouse their interest in studying.","options":["in","on","with","about"],"answer":3,"vi":"…nhiều học sinh sẽ cảm thấy hào hứng hơn với việc học thông qua thiết bị này.","explanation":"\"feel excited about\" = cảm thấy hào hứng về. Nghĩa từng đáp án:<br>A. in (trong)<br>B. on (trên, về một chủ đề cụ thể)<br>C. with (với, cùng với)<br>D. about (về) ✔","vis":["trong","trên, về một chủ đề cụ thể","với, cùng với","về"]}],"roman":"X"},{"navLabel":"Đọc hiểu 4","title":"Đọc hiểu – Điện báo &amp; Điện thoại (Alexander Bell)","icon":"book-open","instructions":"Đọc đoạn văn và dùng các từ cho sẵn trong ô để điền vào chỗ trống. Gõ đúng từ rồi bấm Kiểm tra.","type":"fill","passage":{"title":"The Telegraph and the Telephone","html":"The telegraph and telephone are both wire-based electrical systems, and Alexander Graham Bell's success with the telephone came as a direct result of his attempts to <b>(1)</b> the telegraph. When he <b>(2)</b> experimenting with electrical signals, the telegraph had <b>(3)</b> an established means of communication for some 30 years. <b>(4)</b> a highly successful system, the telegraph was basically limited to <b>(5)</b> and sending one message at a time.<br><br>Bell's extensive knowledge of the nature of sound and <b>(6)</b> understanding of music enabled him to conjecture the possibility of <b>(7)</b> multiple messages over the same wire at the same time. Although the idea of a \"multiple telegraph\" had been in existence for some <b>(8)</b>, no one had been able to fabricate one - until Bell. His \"harmonic telegraph\" was based on the <b>(9)</b> that several notes could be sent simultaneously along the same wire if the notes or signals <b>(10)</b> in pitch.","vi":"Máy điện báo và điện thoại đều là hệ thống điện dùng dây dẫn, và thành công của Alexander Graham Bell với điện thoại là kết quả trực tiếp từ nỗ lực cải tiến máy điện báo của ông. Khi ông bắt đầu thí nghiệm với tín hiệu điện, máy điện báo đã là phương tiện liên lạc phổ biến được khoảng 30 năm. Dù là một hệ thống rất thành công, máy điện báo về cơ bản chỉ giới hạn ở việc nhận và gửi một tin nhắn tại một thời điểm.<br><br>Kiến thức sâu rộng của Bell về bản chất âm thanh và sự hiểu biết về âm nhạc đã giúp ông hình dung khả năng truyền nhiều tin nhắn qua cùng một dây cùng lúc. Mặc dù ý tưởng về \"điện báo đa kênh\" đã tồn tại một thời gian, chưa ai có thể chế tạo được nó – cho đến khi Bell làm được. \"Điện báo hài âm\" của ông dựa trên nguyên lý rằng nhiều nốt nhạc có thể được gửi đồng thời qua cùng một dây nếu các nốt hoặc tín hiệu khác nhau về cao độ."},"questions":[{"q":"1. Alexander Graham Bell’s success with the telephone came as a direct result of his attempts to ___ the telegraph.","answer":"improve","vi":"Thành công của Alexander Graham Bell với điện thoại là kết quả trực tiếp từ nỗ lực cải tiến máy điện báo của ông.","explanation":"\"attempts to improve\" = nỗ lực cải tiến."},{"q":"2. When he ___ experimenting with electrical signals, the telegraph had been an established means of communication for some 30 years.","answer":"began","vi":"Khi ông bắt đầu thí nghiệm với tín hiệu điện, máy điện báo đã là một phương tiện liên lạc phổ biến được khoảng 30 năm.","explanation":"\"began experimenting\" = bắt đầu thí nghiệm."},{"q":"3. …the telegraph had ___ an established means of communication for some 30 years.","answer":"been","vi":"…máy điện báo đã là một phương tiện liên lạc phổ biến được khoảng 30 năm.","explanation":"Quá khứ hoàn thành: had been."},{"q":"4. ___ a highly successful system, the telegraph was basically limited to receiving and sending one message at a time.","answer":"Although","vi":"Mặc dù là một hệ thống rất thành công, máy điện báo về cơ bản chỉ giới hạn ở việc nhận và gửi một tin nhắn tại một thời điểm.","explanation":"Sự nhượng bộ → Although."},{"q":"5. …the telegraph was basically limited to ___ and sending one message at a time.","answer":"receiving","vi":"…máy điện báo về cơ bản chỉ giới hạn ở việc nhận và gửi một tin nhắn tại một thời điểm.","explanation":"Song song với \"sending\" → receiving."},{"q":"6. Bell’s extensive knowledge of the nature of sound and ___ understanding of music enabled him to conjecture the possibility…","answer":"his","vi":"Kiến thức sâu rộng của Bell về bản chất âm thanh và sự hiểu biết về âm nhạc đã giúp ông hình dung ra khả năng…","explanation":"Tính từ sở hữu chỉ Bell → his."},{"q":"7. …enabled him to conjecture the possibility of ___ multiple messages over the same wire at the same time.","answer":"transmitting","vi":"…giúp ông hình dung khả năng truyền nhiều tin nhắn qua cùng một dây cùng lúc.","explanation":"Sau \"of\" cần danh động từ → transmitting."},{"q":"8. Although the idea of a \"multiple telegraph\" had been in existence for some ___, no one had been able to fabricate one – until Bell.","answer":"time","vi":"Mặc dù ý tưởng về \"điện báo đa kênh\" đã tồn tại một thời gian, chưa ai có thể chế tạo được nó – cho đến khi Bell làm được.","explanation":"\"for some time\" = trong một khoảng thời gian."},{"q":"9. His \"harmonic telegraph\" was based on the ___ that several notes could be sent simultaneously along the same wire…","answer":"principle","vi":"\"Điện báo hài âm\" của ông dựa trên nguyên lý rằng nhiều nốt nhạc có thể được gửi đồng thời qua cùng một dây…","explanation":"\"based on the principle that\" = dựa trên nguyên lý rằng."},{"q":"10. …several notes could be sent simultaneously along the same wire if the notes or signals ___ in pitch.","answer":"differed","vi":"…nhiều nốt nhạc có thể được gửi đồng thời qua cùng một dây nếu các nốt hoặc tín hiệu khác nhau về cao độ.","explanation":"\"differ in pitch\" = khác nhau về cao độ."}],"roman":"XI","bank":["transmitting","Although","principle","began","receiving","his","been","time"]},{"navLabel":"Đọc hiểu 5","title":"Đọc hiểu – Charles Babbage &amp; Chiếc máy tính đầu tiên","icon":"book-open","instructions":"Đọc đoạn văn và điền một từ thích hợp vào mỗi chỗ trống (dựa vào chữ cái gợi ý). Chọn xong sẽ hiện đúng/sai ngay khi bạn gõ.","type":"fill","passage":{"title":"Charles Babbage and the First Computer","html":"Many people think of computers as very modern inventions, products of our new technological age. But <b>(1) ____</b>, the idea for a computer had been worked out <b>(2) ____</b> two centuries ago by a man <b>(3) ____</b> Charles Babbage. Babbage was born in 1791 and <b>(4) ____</b> up to be a brilliant mathematician. He drew up <b>(5) ____</b> for several calculating machines which he called \"engines\". But despite the fact that he <b>(6) ____</b> building some of these, he never finished any of them. Over the years people have argued <b>(7) ____</b> his machines would ever work. Recently, however, the Science Museum in London has finished building <b>(8) ____</b> engine based on one of Babbage's designs. <b>(9) ____</b> has taken six years to complete and more than four thousand parts have been specially made. Whether it works or not, the machine will be on show at a special exhibition in the Science Museum to <b>(10) ____</b> people of Babbage's work.","vi":"Nhiều người nghĩ máy tính là những phát minh rất hiện đại, sản phẩm của thời đại công nghệ mới. Nhưng <b>(1) ____</b>, ý tưởng về một chiếc máy tính đã được nghĩ ra <b>(2) ____</b> hai thế kỷ trước bởi một người <b>(3) ____</b> Charles Babbage. Babbage sinh năm 1791 và <b>(4) ____</b> lên trở thành một nhà toán học xuất sắc. Ông đã vẽ ra <b>(5) ____</b> cho một số máy tính toán mà ông gọi là \"engines\". Nhưng dù thực tế là ông đã <b>(6) ____</b> chế tạo một số máy trong đó, ông chưa bao giờ hoàn thành cái nào. Qua nhiều năm, người ta đã tranh cãi <b>(7) ____</b> máy của ông có bao giờ hoạt động được không. Tuy nhiên gần đây, Bảo tàng Khoa học ở London đã hoàn thành việc chế tạo <b>(8) ____</b> chiếc máy dựa trên một trong các thiết kế của Babbage. <b>(9) ____</b> đã mất sáu năm để hoàn thành và hơn bốn nghìn bộ phận đã được chế tạo riêng. Dù máy có hoạt động hay không, nó sẽ được trưng bày tại một cuộc triển lãm đặc biệt ở Bảo tàng Khoa học để <b>(10) ____</b> mọi người về công trình của Babbage."},"questions":[{"q":"1. Many people think of computers as very modern inventions, products of our new technological age. But <b>a</b>___, the idea for a computer had been worked out over two centuries ago.","answer":"actually","vi":"Nhiều người nghĩ máy tính là phát minh rất hiện đại. Nhưng thực ra, ý tưởng về máy tính đã được nghĩ ra hơn hai thế kỷ trước.","explanation":"\"but actually\" = nhưng thực ra."},{"q":"2. Many people think of computers as very modern inventions, products of our new technological age. But actually, the idea for a computer had been worked out <b>o</b>___ two centuries ago by a man called Charles Babbage.","answer":"over","vi":"Nhiều người nghĩ máy tính là những phát minh rất hiện đại, sản phẩm của thời đại công nghệ mới. Nhưng thực ra, ý tưởng về máy tính đã được nghĩ ra hơn hai thế kỷ trước bởi một người tên Charles Babbage.","explanation":"\"over two centuries ago\" = hơn hai thế kỷ trước."},{"q":"3. The idea for a computer had been worked out over two centuries ago by a man <b>c</b>___ Charles Babbage.","answer":"called","vi":"Ý tưởng về máy tính đã được nghĩ ra hơn hai thế kỷ trước bởi một người tên là Charles Babbage.","explanation":"Mệnh đề quan hệ rút gọn: \"a man [who was] called\" = called."},{"q":"4. Babbage was born in 1791 and <b>g</b>___ up to be a brilliant mathematician.","answer":"grew","vi":"Babbage sinh năm 1791 và lớn lên trở thành một nhà toán học xuất sắc.","explanation":"\"grew up to be\" = lớn lên trở thành."},{"q":"5. He drew up <b>p</b>___ for several calculating machines which he called \"engines\".","answer":"plans","vi":"Ông đã vẽ ra bản kế hoạch cho một số máy tính toán mà ông gọi là \"engines\".","explanation":"\"draw up plans\" = vẽ ra kế hoạch."},{"q":"6. But despite the fact that he <b>s</b>___ building some of these, he never finished any of them.","answer":"started","vi":"Nhưng dù đã bắt đầu chế tạo một số máy trong đó, ông chưa bao giờ hoàn thành cái nào.","explanation":"\"started building\" = bắt đầu chế tạo."},{"q":"7. Over the years people have argued <b>w</b>___ his machines would ever work.","answer":"whether","vi":"Qua nhiều năm, người ta đã tranh cãi liệu máy của ông có bao giờ hoạt động được không.","explanation":"\"argued whether\" = tranh cãi liệu."},{"q":"8. Recently, however, the Science Museum in London has finished building <b>t</b>___ engine based on one of Babbage’s designs.","answer":"the","vi":"Tuy nhiên gần đây, Bảo tàng Khoa học ở London đã hoàn thành việc chế tạo chiếc máy dựa trên một trong các thiết kế của Babbage.","explanation":"Mạo từ xác định trước danh từ cụ thể → the."},{"q":"9. <b>I</b>___ has taken six years to complete and more than four thousand parts have been specially made.","answer":"It","vi":"Việc này đã mất sáu năm để hoàn thành và hơn bốn nghìn bộ phận đã được chế tạo riêng.","explanation":"Chủ ngữ giả \"It\" đứng đầu câu."},{"q":"10. Whether it works or not, the machine will be on show at a special exhibition in the Science Museum to <b>r</b>___ people of Babbage’s work.","answer":"remind","vi":"Dù máy có hoạt động hay không, nó sẽ được trưng bày tại một cuộc triển lãm đặc biệt ở Bảo tàng Khoa học để nhắc nhở mọi người về công trình của Babbage.","explanation":"\"remind people of\" = nhắc nhở mọi người về."}],"roman":"XII"},{"navLabel":"Viết 1","title":"Turn the sentences into reported speech / direct speech","icon":"pen-to-square","instructions":"Phần 1 (câu 1-10): chuyển câu trực tiếp sang câu tường thuật. Phần 2 (câu 11-16): chuyển đổi qua lại giữa câu trực tiếp và câu tường thuật.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"\"I try to learn hard to pass the entrance exam.\"","starter":"My sister said","answer":"My sister said that she tried to learn hard to pass the entrance exam.","accepted
