icy, and consumer campaigns.<br><br>The first Earth Day <b>(4)</b> ___ April 22, 1970, activated 20 million Americans from all walks of life and is widely <b>(5)</b> ___ with launching the modern environmental movement. The passage of the landmark Clean Air Act, Clean Water Act, Endangered Species Act and <b>(6)</b> ___ other ground-breaking environmental laws soon followed. Twenty years <b>(7)</b> ___, Earth Day went global, mobilizing 200 million people in 141 countries and lifting environmental issues onto the world stage. Now, this day is becoming <b>(8)</b> ___ and more popular in over the world.","vi":"Sứ mệnh của Earth Day Network là đa dạng hóa, giáo dục và thúc đẩy phong trào môi trường trên toàn thế giới. Hiện nay <b>(1)</b> ___ hơn 1 tỷ người tham gia các hoạt động Ngày Trái Đất <b>(2)</b> ___ mỗi năm. Điều này khiến nó trở thành sự kiện được hưởng ứng lớn nhất thế giới. Các thành viên của tổ chức này <b>(3)</b> ___ hoạt động thông qua sự kết hợp giữa giáo dục, chính sách công và các chiến dịch tiêu dùng.<br><br>Ngày Trái Đất đầu tiên <b>(4)</b> ___ vào 22/4/1970 đã huy động 20 triệu người Mỹ từ mọi tầng lớp và <b>(5)</b> ___ được ghi nhận rộng rãi là đã khởi xướng phong trào môi trường hiện đại. Sự ra đời của các đạo luật mang tính bước ngoặt như Luật Không khí Sạch, Luật Nước Sạch, Luật Các loài Nguy cấp và <b>(6)</b> ___ nhiều luật môi trường đột phá khác đã sớm nối tiếp theo sau. Hai mươi năm <b>(7)</b> ___ sau, Ngày Trái Đất đã trở thành sự kiện toàn cầu, huy động 200 triệu người ở 141 quốc gia và đưa các vấn đề môi trường lên sân khấu thế giới. Ngày nay, ngày này ngày <b>(8)</b> ___ càng trở nên phổ biến hơn trên khắp thế giới."},"questions":[{"q":"1. More (1) ___ 1 billion people now participate in Earth Day activities.","options":["of","than","then","with"],"answer":1,"vi":"Hơn 1 tỷ người hiện tham gia các hoạt động Ngày Trái Đất.","explanation":"\"more than\" = hơn.","vis":["của (sai giới từ)","more than = hơn (đúng)","sau đó (sai nghĩa)","với (sai giới từ)"]},{"q":"2. …participate in Earth Day activities (2) ___ year.","options":["much","many","each","other"],"answer":2,"vi":"…tham gia các hoạt động Ngày Trái Đất mỗi năm.","explanation":"\"each year\" = mỗi năm.","vis":["nhiều (dùng cho danh từ không đếm được, sai cụm)","nhiều (dùng cho danh từ đếm được số nhiều, sai cụm ở đây)","each year = mỗi năm (đúng)","khác (sai nghĩa)"]},{"q":"3. Members of this organization (3) ___ through a combination of education, public policy, and consumer campaigns.","options":["to work","works","working","work"],"answer":3,"vi":"Thành viên của tổ chức này hoạt động thông qua sự kết hợp giữa giáo dục, chính sách công và các chiến dịch tiêu dùng.","explanation":"Chủ ngữ số nhiều \"Members\" → work.","vis":["để làm việc (to-V, sai vị trí)","làm việc (chia ngôi 3 số ít, sai vì \"Members\" số nhiều)","đang làm việc (V-ing, sai)","làm việc (nguyên mẫu, đúng — chủ ngữ số nhiều)"]},{"q":"4. The first Earth Day (4) ___ April 22, 1970, activated 20 million Americans…","options":["on","in","at","until"],"answer":0,"vi":"Ngày Trái Đất đầu tiên vào 22/4/1970 đã huy động 20 triệu người Mỹ…","explanation":"Trước ngày cụ thể dùng \"on\".","vis":["trước ngày cụ thể dùng \"on\" (đúng)","trong (sai giới từ, dùng cho tháng/năm)","tại (sai giới từ, dùng cho giờ)","cho đến khi (sai nghĩa)"]},{"q":"5. …and is widely (5) ___ with launching the modern environmental movement.","options":["credit","credits","credited","crediting"],"answer":2,"vi":"…và được ghi nhận rộng rãi là đã khởi xướng phong trào môi trường hiện đại.","explanation":"Bị động → is credited with.","vis":["ghi nhận (nguyên mẫu, sai từ loại)","ghi nhận (chia động từ, sai)","is credited with = được ghi nhận là (đúng, bị động)","đang ghi nhận (V-ing, sai)"]},{"q":"6. …and (6) ___ other ground-breaking environmental laws soon followed.","options":["much","many","little","few"],"answer":1,"vi":"…và nhiều luật môi trường mang tính đột phá khác đã sớm ra đời.","explanation":"Trước danh từ đếm được số nhiều \"laws\" → many.","vis":["nhiều (dùng cho danh từ không đếm được, sai — \"laws\" đếm được)","nhiều (dùng cho danh từ đếm được số nhiều, đúng)","ít (không đếm được, sai)","ít (đếm được, sai nghĩa ở đây)"]},{"q":"7. Twenty years (7) ___, Earth Day went global…","options":["later","latest","late","lately"],"answer":0,"vi":"Hai mươi năm sau, Ngày Trái Đất đã trở thành sự kiện toàn cầu…","explanation":"\"twenty years later\" = hai mươi năm sau.","vis":["twenty years later = hai mươi năm sau (đúng)","mới nhất (sai nghĩa)","muộn, trễ (tính từ, sai từ loại)","gần đây (trạng từ, sai nghĩa)"]},{"q":"8. Now, this day is becoming (8) ___ and more popular in over the world.","options":["many","much","most","more"],"answer":3,"vi":"Ngày nay, ngày này ngày càng trở nên phổ biến hơn trên khắp thế giới.","explanation":"\"more and more popular\" = ngày càng phổ biến hơn.","vis":["nhiều (dùng cho danh từ đếm được, sai cụm)","nhiều (dùng cho danh từ không đếm được, sai cụm)","nhất (so sánh nhất, sai)","more and more popular = ngày càng phổ biến hơn (đúng)"]}],"roman":"XIV"},{"navLabel":"Viết 1","title":"Change the following sentences to passive voice","icon":"pen-to-square","instructions":"Chuyển các câu sau sang thể bị động.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"They have discussed the pollution problems since last month.","answer":"The pollution problems have been discussed since last month.","accepted":["the pollution problems have been discussed since last month"],"vi":"Họ đã thảo luận về các vấn đề ô nhiễm từ tháng trước.","explanation":"Bị động, hiện tại hoàn thành.","note":"S + have been + P2 + since + mốc thời gian"},{"q":"2.","original":"Is he going to repair this bicycle?","answer":"Is this bicycle going to be repaired?","accepted":["is this bicycle going to be repaired"],"vi":"Anh ấy sẽ sửa chiếc xe đạp này phải không?","explanation":"Bị động với \"be going to\".","note":"Is + S + going to be + P2?"},{"q":"3.","original":"Have you sent the invitation cards to your friends?","answer":"Have the invitation cards been sent to your friends?","accepted":["have the invitation cards been sent to your friends"],"vi":"Bạn đã gửi thiệp mời cho bạn bè chưa?","explanation":"Bị động, hiện tại hoàn thành dạng câu hỏi.","note":"Have + S + been + P2?"},{"q":"4.","original":"My father moved the sofa into the living room.","answer":"The sofa was moved into the living room by my father.","accepted":["the sofa was moved into the living room by my father"],"vi":"Bố tôi đã chuyển ghế sofa vào phòng khách.","explanation":"Bị động, quá khứ đơn.","note":"S + was/were + P2 + by + O"},{"q":"5.","original":"They inform me that the manager is going to travel to Germany.","answer":"I am informed that the manager is going to travel to Germany.","accepted":["i am informed that the manager is going to travel to germany"],"vi":"Họ thông báo với tôi rằng người quản lý sẽ đi Đức.","explanation":"Bị động, hiện tại đơn.","note":"S + am/is/are + P2 + that + mệnh đề"},{"q":"6.","original":"We believed that Linda would pass the driving test.","answer":"It was believed that Linda would pass the driving test.","accepted":["it was believed that linda would pass the driving test"],"vi":"Chúng tôi tin rằng Linda sẽ đậu kỳ thi lái xe.","explanation":"Bị động với \"It + be + P2 + that\".","note":"It was believed that + mệnh đề"},{"q":"7.","original":"Gary gets his brother to clean his car.","answer":"Gary gets his car cleaned.","accepted":["gary gets his car cleaned"],"vi":"Gary nhờ em trai rửa xe cho mình.","explanation":"Cấu trúc gây khiến (causative): get + something + P2.","note":"S + gets + O + P2 (causative)"},{"q":"8.","original":"He will have a veterinary surgeon examine her cat.","answer":"He will have her cat examined.","accepted":["he will have her cat examined"],"vi":"Anh ấy sẽ nhờ bác sĩ thú y khám cho con mèo của cô ấy.","explanation":"Cấu trúc gây khiến: have + something + P2.","note":"S + will have + O + P2 (causative)"},{"q":"9.","original":"People don’t force the children to work hard.","answer":"The children are not forced to work hard.","accepted":["the children are not forced to work hard"],"vi":"Người ta không ép trẻ em phải làm việc vất vả.","explanation":"Bị động, hiện tại đơn phủ định.","note":"S + are not + P2 + to V"},{"q":"10.","original":"Police advise drivers to drive slowly and safely.","answer":"Drivers are advised to drive slowly and safely by police.","accepted":["drivers are advised to drive slowly and safely by police"],"vi":"Cảnh sát khuyên tài xế lái xe chậm và an toàn.","explanation":"Bị động, hiện tại đơn.","note":"S + are advised + to V + by + O"},{"q":"11.","original":"Her sister is preparing the breakfast in the kitchen.","answer":"The breakfast is being prepared in the kitchen.","accepted":["the breakfast is being prepared in the kitchen"],"vi":"Chị của cô ấy đang chuẩn bị bữa sáng trong bếp.","explanation":"Bị động, hiện tại tiếp diễn.","note":"S + is being + P2"},{"q":"12.","original":"We should clean our teeth at least once a day.","answer":"Our teeth should be cleaned at least once a day.","accepted":["our teeth should be cleaned at least once a day"],"vi":"Chúng ta nên đánh răng ít nhất một lần một ngày.","explanation":"Bị động với động từ khiếm khuyết.","note":"S + should be + P2"},{"q":"13.","original":"The shop assistant handed the packages to the customer.","answer":"The packages were handed to the customer.","accepted":["the packages were handed to the customer"],"vi":"Nhân viên bán hàng đã đưa các gói hàng cho khách.","explanation":"Bị động, quá khứ đơn.","note":"S + was/were + P2"},{"q":"14.","original":"The director award the first prize to the best competitor.","answer":"The first prize is awarded to the best competitor.","accepted":["the first prize is awarded to the best competitor"],"vi":"Giám đốc trao giải nhất cho thí sinh xuất sắc nhất.","explanation":"Bị động, hiện tại đơn.","note":"S + is + P2 + to + O"},{"q":"15.","original":"The organizer says that the performance will start at 7 p.m.","answer":"It is said that the performance will start at 7 p.m.","accepted":["it is said that the performance will start at 7 p.m"],"vi":"Ban tổ chức nói buổi biểu diễn sẽ bắt đầu lúc 7 giờ tối.","explanation":"Bị động với \"It + be + said + that\".","note":"It is said that + mệnh đề"},{"q":"16.","original":"He recommended that we shouldn’t stay in the suburb.","answer":"It was recommended that we shouldn’t stay in the suburb.","accepted":["it was recommended that we shouldn’t stay in the suburb"],"vi":"Anh ấy khuyên chúng tôi không nên ở ngoại ô.","explanation":"Bị động với \"It + was + recommended + that\".","note":"It was recommended that + mệnh đề"},{"q":"17.","original":"I had a technician repair my mobile phone.","answer":"I had my mobile phone repaired.","accepted":["i had my mobile phone repaired"],"vi":"Tôi đã nhờ thợ sửa điện thoại của mình.","explanation":"Cấu trúc gây khiến: have + something + P2.","note":"S + had + O + P2 (causative)"},{"q":"18.","original":"They often get the technician to maintain the water heater.","answer":"They often get the water heater maintained.","accepted":["they often get the water heater maintained"],"vi":"Họ thường nhờ thợ bảo trì bình nước nóng.","explanation":"Cấu trúc gây khiến: get + something + P2.","note":"S + get + O + P2 (causative)"},{"q":"19.","original":"How long have you waited for the dentist?","answer":"How long has the dentist been waited for?","accepted":["how long has the dentist been waited for"],"vi":"Bạn đã chờ nha sĩ bao lâu rồi?","explanation":"Bị động với cụm động từ \"wait for\".","note":"How long has + O + been + P2 + for?"},{"q":"20.","original":"People saw her plant the tree.","answer":"She was seen to plant the tree.","accepted":["she was seen to plant the tree"],"vi":"Người ta thấy cô ấy trồng cây.","explanation":"Bị động với động từ tri giác \"see\": be seen + to V.","note":"S + was seen + to V"}],"roman":"XV"},{"navLabel":"Viết 2","title":"Finish the sentences so that their meaning stays the same","icon":"pen-to-square","instructions":"Viết lại câu sao cho nghĩa không đổi so với câu gốc, bắt đầu bằng từ gợi ý.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"Phillip had gone out before they arrived.","starter":"After","answer":"Phillip had gone out, they arrived.","accepted":["phillip had gone out, they arrived"],"vi":"Phillip đã ra ngoài trước khi họ đến.","explanation":"Đảo lại với \"After\" đứng đầu câu.","note":"After + S + had + P2, S + V-ed"},{"q":"2.","original":"I had lunch then I watched an interesting film.","starter":"Before","answer":"I watched an interesting film, I had had lunch.","accepted":["i watched an interesting film, i had had lunch"],"vi":"Tôi đã ăn trưa rồi mới xem một bộ phim thú vị.","explanation":"Đảo lại với \"Before\" đứng đầu câu, hành động trước dùng quá khứ hoàn thành.","note":"Before + S + V-ed, S + had + P2"},{"q":"3.","original":"There was a power cut before they got out of the room.","starter":"When","answer":"they got out of the room, there had been a power cut.","accepted":["they got out of the room, there had been a power cut"],"vi":"Đã có sự cố mất điện trước khi họ ra khỏi phòng.","explanation":"Đảo lại với \"When\" đứng đầu câu.","note":"When + S + V-ed, there had been + N"},{"q":"4.","original":"After the manager had informed us clearly about the job, we started our work.","starter":"By the time","answer":"we started our work, the manager had informed us clearly about the job.","accepted":["we started our work, the manager had informed us clearly about the job"],"vi":"Sau khi quản lý đã thông báo rõ ràng cho chúng tôi về công việc, chúng tôi bắt đầu làm việc.","explanation":"\"By the time\" thay cho \"After\", đảo vị trí hai mệnh đề.","note":"By the time + S + V-ed, S + had + P2"},{"q":"5.","original":"My father had had dinner by the time I came home.","starter":"Before","answer":"I came home, my father had had dinner.","accepted":["i came home, my father had had dinner"],"vi":"Bố tôi đã ăn tối xong trước khi tôi về nhà.","explanation":"Đảo lại với \"Before\" đứng đầu câu.","note":"Before + S + V-ed, S + had + P2"}],"roman":"XVI"},{"navLabel":"Viết 3","title":"Use the given words to write complete sentences","icon":"pen-to-square","instructions":"Dùng các từ gợi ý để viết thành câu hoàn chỉnh (câu quá khứ hoàn thành).","type":"reorder","instant":true,"questions":[{"q":"1.","answer":"What had I done to make you sad so much?","accepted":["what had i done to make you sad so much"],"vi":"Tôi đã làm gì khiến bạn buồn đến vậy?","explanation":"Câu hỏi quá khứ hoàn thành: What had + S + P2?","note":"What had + S + P2 + to V?","words":["sad","had","to make","I","What","you","done","so much"],"prompt":"Gợi ý: What/ I/ do/ make you sad/ so much?"},{"q":"2.","answer":"I had already quit the job when she joined the company.","accepted":["i had already quit the job when she joined the company","i had already quitted the job when she joined the company"],"vi":"Tôi đã nghỉ việc trước khi cô ấy vào công ty.","explanation":"Hành động xảy ra trước → quá khứ hoàn thành; hành động xảy ra sau → quá khứ đơn.","note":"S + had already + P2 + when + S + V-ed","words":["the company","I","the job","already","she","had","joined","quit","when"],"prompt":"Gợi ý: I/ already / quit/ job/ when/ she/ join/ company."},{"q":"3.","answer":"He hadn’t been able to eat dinner before his wife came home.","accepted":["he hadn’t been able to eat dinner before his wife came home","he had not been able to eat dinner before his wife came home"],"vi":"Anh ấy đã không thể ăn tối trước khi vợ về nhà.","explanation":"Quá khứ hoàn thành phủ định + quá khứ đơn.","note":"S + hadn’t been able to + V + before + S + V-ed","words":["dinner","his wife","He","came home","to eat","before","hadn’t been able"],"prompt":"Gợi ý: He/ not be able to eat/ dinner/ before/ his wife/ come home."},{"q":"4.","answer":"Anna had worked as an accountant for four years before she was promoted.","accepted":["anna had worked as an accountant for four years before she was promoted"],"vi":"Anna đã làm kế toán được bốn năm trước khi được thăng chức.","explanation":"Quá khứ hoàn thành (had worked) + quá khứ đơn bị động (was promoted).","note":"S + had + P2 + for + time + before + S + was + P2","words":["was promoted","as an accountant","before","Anna","four years","had worked","she","for"],"prompt":"Gợi ý: Anna/ work/ accountant/ four years/ before/ she/ promote."},{"q":"5.","answer":"My sister had finished lunch by the time I walked into the kitchen.","accepted":["my sister had finished lunch by the time i walked into the kitchen"],"vi":"Chị tôi đã ăn trưa xong trước khi tôi bước vào bếp.","explanation":"\"by the time\" + quá khứ đơn (walked) + quá khứ hoàn thành (had finished).","note":"S + had + P2 + by the time + S + V-ed","words":["by the time","My sister","walked into","had finished","the kitchen","lunch","I"],"prompt":"Gợi ý: My sister/ finish lunch/ by the time/ I/ walk/ kitchen."}],"roman":"XVII"},{"navLabel":"Viết 4","title":"Rewrite the following sentences based on the given words","icon":"pen-to-square","instructions":"Viết lại câu sao cho nghĩa không đổi, dùng từ gợi ý cho sẵn.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"Thanks to technology advances, people can predict some weather disasters such as hurricanes and blizzards. (predicted)","answer":"technology advances, some of the weather disasters such as hurricanes and blizzards can be predicted.","accepted":["technology advances some of the weather disasters such as hurricanes and blizzards can be predicted"],"vi":"Nhờ tiến bộ công nghệ, một số thiên tai thời tiết như bão và bão tuyết có thể được dự đoán.","explanation":"Chuyển sang bị động, \"some of the weather disasters\" làm chủ ngữ mới.","note":"S + can be + predicted (bị động)","starter":"Thanks to"},{"q":"2.","original":"In some cases, lightning can result in wildfires. (caused)","answer":"wildfires can be caused by lightning.","accepted":["wildfires can be caused by lightning"],"vi":"Trong một số trường hợp, sét có thể gây ra cháy rừng.","explanation":"Chuyển \"result in\" (chủ động) sang \"be caused by\" (bị động).","note":"S + can be caused by + N","starter":"In some cases,"},{"q":"3.","original":"The three injured men were taken to the hospital by some local people. After that, the ambulance came. (by the time)","answer":"had been taken to the hospital by some local people by the time the ambulance came.","accepted":["had been taken to the hospital by some local people by the time the ambulance came"],"vi":"Ba người bị thương đã được người dân địa phương đưa đến bệnh viện trước khi xe cứu thương đến.","explanation":"\"by the time\" + quá khứ hoàn thành bị động (had been taken) + quá khứ đơn (came).","note":"S + had been + P2 + by the time + S + V-ed","starter":"The three injured men"},{"q":"4.","original":"The children left the house. Then the house collapsed. (before)","answer":"had left the house before the house collapsed.","accepted":["had left the house before the house collapsed"],"vi":"Bọn trẻ đã rời khỏi nhà trước khi ngôi nhà sập.","explanation":"Hành động xảy ra trước (had left) + \"before\" + quá khứ đơn (collapsed).","note":"S + had + P2 + before + S + V-ed","starter":"The children"},{"q":"5.","original":"After the latest landslide in Sapa, the local government held a training session to teach people how to protect themselves in some natural disasters. (was)","answer":"the latest landslide in Sapa, a training session was held by the local government to teach people how to protect themselves in some natural disasters.","accepted":["the latest landslide in sapa a training session was held by the local government to teach people how to protect themselves in some natural disasters"],"vi":"Sau trận lở đất mới nhất ở Sapa, một buổi tập huấn đã được chính quyền địa phương tổ chức để dạy người dân cách tự bảo vệ trong một số thiên tai.","explanati function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[‘’]/g,"'")
    .replace(/["“”]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-32':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-red-200 text-red-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-red-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-red-800 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>

  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}
function renderBank(bank, idx, clickable){
  if(!bank || !bank.length) return '';
  const hint = clickable ? ' <span class="normal-case font-normal text-slate-400">(bấm để điền)</span>' : '';
  return `<div class="mb-4"><p class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide"><i class="fa-solid fa-list-ul mr-1"></i>Từ gợi ý${hint}</p>
    <div class="grid grid-cols-2 sm:grid-cols-5 border-2 border-slate-800 rounded-lg overflow-hidden text-sm font-bold text-slate-800">
      ${bank.map((w,bi)=>clickable
        ? `<div class="bank-chip px-3 py-2 text-center border border-slate-300 bg-white" id="bankchip_${idx}_${bi}" onclick="fillFromBank(${idx},${bi})">${w}</div>`
        : `<div class="px-3 py-2 text-center border border-slate-300 bg-white">${w}</div>`
      ).join('')}
    </div>
  </div>`;
}
function fillFromBank(idx, bi){
  const chip = document.getElementById(`bankchip_${idx}_${bi}`);
  if(!chip || chip.classList.contains('used')) return;
  const word = DATA.sections[idx].bank[bi];
  const inputs = Array.from(document.querySelectorAll(`#tab-${idx} input.answer-input[id^="inp_${idx}_"]`));
  const target = inputs.find(inp => inp.value.trim()==='');
  if(!target) return;
  target.value = word;
  target.dataset.bankChip = bi;
  chip.classList.add('used');
}
function releaseBankChipIfChanged(idx,i){
  const inp=document.getElementById(`inp_${idx}_${i}`);
  if(!inp || inp.dataset.bankChip===undefined) return;
  const bi=inp.dataset.bankChip;
  delete inp.dataset.bankChip;
  const chip=document.getElementById(`bankchip_${idx}_${bi}`);
  if(chip) chip.classList.remove('used');
}

function renderSection(s, idx){

      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-red-100 text-red-700 hover:bg-red-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-red-700" style="display:none">
          <span class="font-black text-red-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = s.bank ? 'w-40' : widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      const bankAttr = s.bank ? ` oninput="releaseBankChipIfChanged(${idx},${i})"` : '';
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"${bankAttr}></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      const origBlock = q.original ? `<p class="text-slate-700 text-sm mb-2">${q.original}</p>` : '';
      if(q.starter){
        inner += `${origBlock}
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `${origBlock}<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    } else if(s.type==='reorder'){
      const promptBlock = q.prompt ? `<p class="text-slate-500 text-sm mb-2 italic">${q.prompt}</p>` : '';
      const chips = q.words.map((w,j)=>`<span class="word-chip bg-white border-2 border-lime-300 text-lime-700 font-bold text-sm px-3 py-1.5 rounded-xl shadow-sm" id="chip_${idx}_${i}_${j}" onclick="addChip(${idx},${i},${j})">${w}</span>`).join('');
      inner += `${promptBlock}
        <div class="flex flex-wrap gap-2 mb-3">${chips}</div>
        <div class="answer-line flex flex-wrap gap-2 items-center bg-lime-50 border-2 border-dashed border-lime-300 rounded-xl p-3" id="line_${idx}_${i}"></div>
        <div class="flex gap-2 mt-2">
          <button type="button" onclick="clearChips(${idx},${i})" class="text-xs font-bold text-slate-500 hover:text-rose-600 transition"><i class="fa-solid fa-eraser mr-1"></i>Xóa hết</button>
        </div>
        <input type="hidden" id="inp_${idx}_${i}" value="">`;
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-red-800 to-orange-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = renderTheory() + DATA.sections.map((s,i)=>renderSection(s,i)).join('') + renderWriting();
  DATA.sections.forEach((s,idx)=>{
    if(s.type==='reorder'){ s.questions.forEach((q,i)=>renderReorderLine(idx,i)); }
  });
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function addChip(idx,i,j){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) reorderState[key] = [];
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(!chip || chip.classList.contains('used')) return;
  chip.classList.add('used');
  reorderState[key].push(j);
  renderReorderLine(idx,i);
  const q = DATA.sections[idx].questions[i];
  if(DATA.sections[idx].instant && reorderState[key].length===q.words.length){ gradeOneSentence(idx,i); }
}
function removeChip(idx,i,pos){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) return;
  const j = reorderState[key][pos];
  reorderState[key].splice(pos,1);
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(chip) chip.classList.remove('used');
  renderReorderLine(idx,i);
  const q = DATA.sections[idx].questions[i];
  if(DATA.sections[idx].instant && reorderState[key].length===q.words.length){
    gradeOneSentence(idx,i);
  } else {
    const inp=document.getElementById(`inp_${idx}_${i}`);
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(inp) inp.classList.remove('correct-input','wrong-input');
    if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
  }
}
function clearChips(idx,i){
  const key = `${idx}_${i}`;
  (reorderState[key]||[]).forEach(j=>{
    const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
    if(chip) chip.classList.remove('used');
  });
  reorderState[key] = [];
  renderReorderLine(idx,i);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
}
function renderReorderLine(idx,i){
  const key = `${idx}_${i}`;
  const words = DATA.sections[idx].questions[i].words;
  const line = document.getElementById(`line_${idx}_${i}`);
  const inp = document.getElementById(`inp_${idx}_${i}`);
  const seq = reorderState[key]||[];
  if(!seq.length){
    line.innerHTML = `<span class="text-slate-400 text-sm italic">Nhấp vào các từ bên trên theo đúng thứ tự…</span>`;
  } else {
    line.innerHTML = seq.map((wi,pos)=>`<span class="word-chip bg-lime-500 text-white font-bold text-sm px-3 py-1.5 rounded-xl" onclick="removeChip(${idx},${i},${pos})">${words[wi]}</span>`).join('');
  }
  if(inp) inp.value = seq.map(wi=>words[wi]).join(' ');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else if(s.type==='reorder'){
      clearChips(idx,i);
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  document.querySelectorAll(`#tab-${idx} .bank-chip`).forEach(c=>c.classList.remove('used'));
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btnId = idx==='theory' ? 'navbtn_theory' : idx==='writing' ? 'navbtn_writing' : `navbtn_${idx}`;
  const btn=document.getElementById(btnId);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#7f1d1d','#ea580c','#57534e','#fb923c','#f97316','#b91c1c'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();

function toggleModelEssay(){ document.getElementById('model-essay').classList.toggle('vi-hidden'); }
(function(){
  const essay = document.getElementById('essay-input');
  if(essay){
    essay.addEventListener('input', () => {
      const words = essay.value.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('essay-count').textContent = `Số từ: ${words}`;
    });
  }
})();

</script>
