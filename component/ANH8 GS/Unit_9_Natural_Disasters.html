"/ɪɡˌzæmɪˈniː/"],"vis":["người Nhật","người Bồ Đào Nha","người tiên phong","thí sinh"],"vi":"\"examinee\" trọng âm khác.","explanation":"Theo đáp án của tài liệu ôn tập, \"examinee\" có trọng âm khác với ba từ còn lại trong nhóm."},{"q":"11.","options":["oceanic","botanical","identical","romantic"],"answer":0,"ipas":["/ˌəʊʃiˈænɪk/","/bəˈtænɪkl/","/aɪˈdentɪkl/","/rəʊˈmæntɪk/"],"vis":["thuộc đại dương","thuộc thực vật","giống hệt","lãng mạn"],"vi":"\"oceanic\" trọng âm khác.","explanation":"\"oceanic\" trọng âm rơi vào âm tiết 3, còn ba từ còn lại trọng âm rơi vào âm tiết 2."},{"q":"12.","options":["natural","animal","waterfall","illegal"],"answer":3,"ipas":["/ˈnætʃrəl/","/ˈænɪml/","/ˈwɔːtəfɔːl/","/ɪˈliːɡl/"],"vis":["tự nhiên","động vật","thác nước","bất hợp pháp"],"vi":"\"illegal\" trọng âm khác.","explanation":"\"illegal\" trọng âm rơi vào âm tiết 2, còn ba từ còn lại trọng âm rơi vào âm tiết 1."},{"q":"13.","options":["commercial","economic","traditional","intelligent"],"answer":1,"ipas":["/kəˈmɜːʃl/","/ˌiːkəˈnɒmɪk/","/trəˈdɪʃənl/","/ɪnˈtelɪdʒənt/"],"vis":["thuộc thương mại","thuộc kinh tế","thuộc truyền thống","thông minh"],"vi":"\"economic\" trọng âm khác.","explanation":"\"economic\" trọng âm rơi vào âm tiết 3, còn ba từ còn lại trọng âm rơi vào âm tiết 2."},{"q":"14.","options":["agricultural","documental","telephone","intermediate"],"answer":2,"ipas":["/ˌæɡrɪˈkʌltʃərəl/","/ˌdɒkjuˈmentl/","/ˈtelɪfəʊn/","/ˌɪntəˈmiːdiət/"],"vis":["thuộc nông nghiệp","thuộc tài liệu","điện thoại","trung cấp"],"vi":"\"telephone\" trọng âm khác.","explanation":"\"telephone\" trọng âm rơi vào âm tiết 1, còn ba từ còn lại trọng âm rơi vào âm tiết 3."},{"q":"15.","options":["disagree","photographic","historical","unnecessary"],"answer":2,"ipas":["/ˌdɪsəˈɡriː/","/ˌfəʊtəˈɡræfɪk/","/hɪˈstɒrɪkl/","/ʌnˈnesəsəri/"],"vis":["không đồng ý","thuộc nhiếp ảnh","thuộc lịch sử","không cần thiết"],"vi":"\"historical\" trọng âm khác.","explanation":"Theo đáp án của tài liệu ôn tập, \"historical\" có trọng âm khác với ba từ còn lại trong nhóm."}],"roman":"II"},{"navLabel":"Trắc nghiệm","title":"Chọn đáp án đúng (Multiple Choice)","icon":"list-check","instructions":"Chọn phương án đúng nhất để hoàn thành mỗi câu. Chọn xong sẽ hiện đáp án ngay.","type":"mcq","instant":true,"questions":[{"q":"1. Justine was ___ to John’s birthday party last month.","options":["invited","inviting","invite","invites"],"answer":0,"vi":"Justine đã được mời đến bữa tiệc sinh nhật của John tháng trước.","explanation":"Bị động, quá khứ đơn → was invited.","note":"S + was/were + P2 (bị động)","vis":["được mời (quá khứ phân từ, đúng — bị động quá khứ đơn)","đang mời (V-ing, sai)","mời (nguyên mẫu, sai)","mời (chia động từ, sai)"]},{"q":"2. Carlos ___ home before we arrived.","options":["is going","will go","has gone","had gone"],"answer":3,"vi":"Carlos đã về nhà trước khi chúng tôi đến.","explanation":"Hành động xảy ra trước một hành động khác trong quá khứ → quá khứ hoàn thành.","note":"S + had + P2 + before + S + V-ed","vis":["đang đi (hiện tại tiếp diễn, sai thì)","sẽ đi (tương lai đơn, sai thì)","đã đi (hiện tại hoàn thành, sai thì)","đã đi (quá khứ hoàn thành, đúng)"]},{"q":"3. This new word is too difficult for me ___.","options":["remember","to remember","remembers","remembering"],"answer":1,"vi":"Từ mới này quá khó để tôi nhớ.","explanation":"\"too + adj + for sb + to V\".","note":"too + adjective + for + O + to V","vis":["nhớ (nguyên mẫu, sai vị trí)","để nhớ (to-V, đúng sau \"too...for sb\")","nhớ (chia động từ, sai)","nhớ (V-ing, sai)"]},{"q":"4. Fiona is not interested ___ politics.","options":["at","on","in","to"],"answer":2,"vi":"Fiona không quan tâm đến chính trị.","explanation":"\"be interested in\" = quan tâm đến.","note":"be interested in + N","vis":["tại (sai giới từ)","trên (sai giới từ)","be interested in = quan tâm đến (đúng)","đến (sai giới từ)"]},{"q":"5. The government will build more comfortable ___ for students.","options":["accommodate","accommodation","accommodating","accommodator"],"answer":1,"vi":"Chính phủ sẽ xây thêm chỗ ở thoải mái hơn cho sinh viên.","explanation":"Sau tính từ \"comfortable\" cần danh từ → accommodation.","note":"adjective + noun","vis":["cung cấp chỗ ở (động từ, sai từ loại)","chỗ ở (danh từ, đúng sau \"comfortable\")","dễ chiều, thích nghi (tính từ, sai nghĩa)","(không phải từ thông dụng, sai)"]},{"q":"6. Our teeth ___ at least once a day.","options":["should clean","should cleaning","should be cleaned","should be cleaning"],"answer":2,"vi":"Răng của chúng ta nên được đánh ít nhất một lần một ngày.","explanation":"Bị động với động từ khiếm khuyết → should be cleaned.","note":"S + should be + P2 (bị động)","vis":["nên làm sạch (chủ động, sai — cần bị động)","(sai ngữ pháp)","nên được làm sạch (bị động, đúng)","nên đang làm sạch (sai ngữ pháp)"]},{"q":"7. They ___ then they took a look around the supermarket.","options":["had lunch","have lunch","having lunch","to have lunch"],"answer":0,"vi":"Họ ăn trưa rồi đi dạo quanh siêu thị.","explanation":"Chuỗi hành động nối tiếp trong quá khứ → had lunch (quá khứ đơn).","note":"S + V-ed (quá khứ đơn)","vis":["đã ăn trưa (quá khứ đơn, đúng — hành động nối tiếp)","ăn trưa (nguyên mẫu, sai thì)","đang ăn trưa (V-ing, sai)","để ăn trưa (to-V, sai)"]},{"q":"8. He is old enough to get ___.","options":["marry","marries","marrying","married"],"answer":3,"vi":"Anh ấy đủ tuổi để kết hôn.","explanation":"\"get married\" = kết hôn (cụm cố định).","note":"get + married","vis":["kết hôn (nguyên mẫu, sai vị trí)","kết hôn (chia động từ, sai)","kết hôn (V-ing, sai)","get married = kết hôn (đúng cụm)"]},{"q":"9. I’m a bit short ___ money. Can you lend me some?","options":["at","with","of","on"],"answer":2,"vi":"Tôi hơi thiếu tiền một chút. Bạn có thể cho tôi mượn ít được không?","explanation":"\"be short of\" = thiếu.","note":"be short of + N","vis":["tại (sai giới từ)","với (sai giới từ)","be short of = thiếu (đúng)","trên (sai giới từ)"]},{"q":"10. Her body was returned home for ___.","options":["bury","buries","buried","burial"],"answer":3,"vi":"Thi thể của cô ấy được đưa về nhà để chôn cất.","explanation":"Sau giới từ \"for\" cần danh từ → burial.","note":"for + noun","vis":["chôn (động từ, sai từ loại)","chôn (chia động từ, sai)","đã chôn (quá khứ phân từ, sai từ loại)","lễ an táng (danh từ, đúng)"]},{"q":"11. Was this beautiful house ___ by Mark?","options":["buy","bought","buying","buyer"],"answer":1,"vi":"Ngôi nhà xinh đẹp này có phải do Mark mua không?","explanation":"Bị động, quá khứ đơn → was bought.","note":"Was + S + P2 + by + O?","vis":["mua (nguyên mẫu, sai)","được mua (quá khứ phân từ, đúng — bị động quá khứ đơn)","đang mua (V-ing, sai)","người mua (danh từ, sai từ loại)"]},{"q":"12. After he ___ everything clearly, we started our work.","options":["had explained","had explain","has explained","has explain"],"answer":0,"vi":"Sau khi anh ấy giải thích mọi thứ rõ ràng, chúng tôi bắt đầu công việc.","explanation":"Hành động xảy ra trước → quá khứ hoàn thành.","note":"After + S + had + P2, S + V-ed","vis":["đã giải thích (quá khứ hoàn thành, đúng)","(sai ngữ pháp)","đã giải thích (hiện tại hoàn thành, sai thì)","(sai ngữ pháp)"]},{"q":"13. My boss’s anger suddenly ___ into furious shouting.","options":["erupt","erupted","erupting","eruption"],"answer":1,"vi":"Cơn giận của sếp tôi bất ngờ bùng phát thành tiếng la hét dữ dội.","explanation":"Động từ chính chia ở quá khứ đơn → erupted.","note":"S + V-ed (quá khứ đơn)","vis":["bùng phát (nguyên mẫu, sai thì)","đã bùng phát (quá khứ đơn, đúng)","đang bùng phát (V-ing, sai)","sự bùng phát (danh từ, sai từ loại)"]},{"q":"14. These old pictures won’t ___ in the bedroom.","options":["is hung","are hung","be hung","been hung"],"answer":2,"vi":"Những bức ảnh cũ này sẽ không được treo trong phòng ngủ.","explanation":"Bị động sau \"won’t\" → be hung.","note":"won’t + be + P2 (bị động)","vis":["được treo (hiện tại đơn bị động, sai — cần nguyên mẫu sau \"won't\")","được treo (số nhiều, sai vị trí)","được treo (nguyên mẫu bị động, đúng sau \"won't\")","đã được treo (quá khứ phân từ, sai vị trí)"]},{"q":"15. Before my mother ___ home, my father had prepared dinner.","options":["came","come","comes","will come"],"answer":0,"vi":"Trước khi mẹ tôi về nhà, bố tôi đã chuẩn bị xong bữa tối.","explanation":"Hành động xảy ra sau → quá khứ đơn.","note":"Before + S + V-ed, S + had + P2","vis":["đã về (quá khứ đơn, đúng — hành động xảy ra sau)","về (nguyên mẫu, sai thì)","về (chia động từ, sai thì)","sẽ về (tương lai, sai thì)"]},{"q":"16. This house and these doors are going to ___ for Christmas day by the Greens.","options":["painted","be painted","paint","be paint"],"answer":1,"vi":"Ngôi nhà và những cánh cửa này sẽ được nhà Green sơn lại cho ngày Giáng sinh.","explanation":"Bị động sau \"be going to\" → be painted.","note":"be going to + be + P2 (bị động)","vis":["đã sơn (quá khứ phân từ, sai vị trí — cần \"be\" trước)","được sơn (bị động, đúng sau \"be going to\")","sơn (chủ động, sai)","(sai ngữ pháp)"]},{"q":"17. When I got up this morning, my wife ___.","options":["has already left","already has left","had already left","already had left"],"answer":2,"vi":"Khi tôi thức dậy sáng nay, vợ tôi đã rời đi rồi.","explanation":"Hành động xảy ra trước một mốc trong quá khứ → quá khứ hoàn thành.","note":"S + had already + P2","vis":["đã rời đi rồi (hiện tại hoàn thành, sai thì)","(sai trật tự từ)","đã rời đi rồi (quá khứ hoàn thành, đúng)","(sai trật tự từ, \"already\" nên đứng sau \"had\")"]},{"q":"18. It is time you ___ your homework done.","options":["has","had","have","having"],"answer":1,"vi":"Đã đến lúc bạn hoàn thành bài tập về nhà rồi.","explanation":"\"It’s time + S + V-ed\" (dùng quá khứ giả định) → had.","note":"It’s time + S + V-ed (giả định)","vis":["(sai ngôi/thì cho cấu trúc giả định)","It's time + S + had (quá khứ giả định, đúng)","(sai thì cho cấu trúc này)","(sai ngữ pháp)"]},{"q":"19. She was very angry ___ Marcos.","options":["to","with","about","with"],"answer":1,"vi":"Cô ấy rất giận Marcos.","explanation":"\"be angry with someone\" = giận ai đó.","note":"be angry with + somebody","vis":["đến (sai giới từ)","be angry with = giận ai đó (đúng)","về (sai giới từ)","với (trùng với đáp án B trong tài liệu gốc, cùng nghĩa \"với\")"]},{"q":"20. During 1942 ___ started to arrive in the city.","options":["evacuee families","evacuate families","families evacuee","families evacuate"],"answer":0,"vi":"Trong năm 1942, các gia đình sơ tán bắt đầu đến thành phố.","explanation":"\"evacuee\" là tính từ/danh từ chỉ người sơ tán, đứng trước danh từ \"families\".","note":"evacuee + families (tính từ + danh từ)","vis":["gia đình sơ tán (đúng — tính từ \"evacuee\" + danh từ)","(sai — \"evacuate\" là động từ, không đứng trước danh từ theo cách này)","(sai trật tự từ)","(sai trật tự từ/ngữ pháp)"]},{"q":"21. The dogs ___ fed before they went to the party.","options":["has","have been","had been","having been"],"answer":2,"vi":"Những chú chó đã được cho ăn trước khi họ đi dự tiệc.","explanation":"Bị động, quá khứ hoàn thành (trước một hành động khác trong quá khứ) → had been fed.","note":"S + had been + P2 (bị động, quá khứ hoàn thành)","vis":["(sai thì/cấu trúc)","đã được (hiện tại hoàn thành bị động, sai thì)","đã được (quá khứ hoàn thành bị động, đúng)","(sai ngữ pháp)"]},{"q":"22. The car was dirty. They ___ it for weeks.","options":["hasn’t cleaned","haven’t cleaned","hadn’t been cleaned","hadn’t cleared"],"answer":2,"vi":"Chiếc xe rất bẩn. Nó đã không được rửa trong nhiều tuần.","explanation":"Bị động, quá khứ hoàn thành phủ định → hadn’t been cleaned.","note":"S + hadn’t been + P2 (bị động)","vis":["chưa làm sạch (hiện tại hoàn thành phủ định, chủ động — sai thì và sai bị động)","chưa làm sạch (hiện tại hoàn thành phủ định, chủ động — sai thì và sai bị động)","chưa được làm sạch (quá khứ hoàn thành phủ định bị động, đúng)","chưa dọn quang (sai nghĩa từ)"]},{"q":"23. It ___ her 10 minutes to do this exercise yesterday morning.","options":["made","took","cost","lost"],"answer":1,"vi":"Cô ấy đã mất 10 phút để làm bài tập này sáng qua.","explanation":"\"It takes/took someone + time + to V\" = mất bao lâu để làm gì.","note":"It took + O + time + to V","vis":["làm ra (sai cụm)","It took sb time to V = mất bao lâu để làm gì (đúng)","tốn (tiền, sai — không dùng cho thời gian theo cách này)","mất, thua (sai nghĩa)"]},{"q":"24. Frank is capable ___ doing better than he is doing now.","options":["of","at","with","in"],"answer":0,"vi":"Frank có khả năng làm tốt hơn những gì anh ấy đang làm bây giờ.","explanation":"\"be capable of + V-ing\" = có khả năng làm gì.","note":"be capable of + V-ing","vis":["be capable of = có khả năng (đúng)","tại (sai giới từ)","với (sai giới từ)","trong (sai giới từ)"]},{"q":"25. The scheme has been set up to help ___ people.","options":["home-made","homeless","house-style","houseful"],"answer":1,"vi":"Chương trình được thiết lập để giúp đỡ những người vô gia cư.","explanation":"\"homeless people\" = người vô gia cư.","note":"adjective + noun","vis":["tự làm tại nhà (sai nghĩa)","vô gia cư (đúng)","kiểu nhà (sai nghĩa, không phải từ thông dụng)","đầy nhà (sai nghĩa)"]},{"q":"26. We’re ___ the evening around a Japanese theme.","options":["organizing","organizer","organization","organized"],"answer":0,"vi":"Chúng tôi đang tổ chức buổi tối xoay quanh chủ đề Nhật Bản.","explanation":"Hiện tại tiếp diễn → organizing.","note":"S + are + V-ing","vis":["đang tổ chức (V-ing, đúng — hiện tại tiếp diễn)","người tổ chức (danh từ, sai từ loại)","tổ chức (danh từ, sai từ loại)","đã tổ chức/có tổ chức (sai)"]},{"q":"27. The pollution problems ___ since last month.","options":["has discussed","have discussed","has been discussed","have been discussed"],"answer":3,"vi":"Vấn đề ô nhiễm đã được thảo luận từ tháng trước.","explanation":"Bị động, hiện tại hoàn thành, chủ ngữ số nhiều → have been discussed.","note":"S (số nhiều) + have been + P2 (bị động)","vis":["đã thảo luận (hiện tại hoàn thành chủ động, số ít — sai)","đã thảo luận (hiện tại hoàn thành chủ động, số nhiều — sai vì cần bị động)","đã được thảo luận (bị động, số ít — sai chủ ngữ số nhiều)","đã được thảo luận (bị động, số nhiều, đúng)"]},{"q":"28. When they got home last night. They found that someone ___ into the house.","options":["had broken","had been broken","has broken","has been broken"],"answer":0,"vi":"Khi họ về nhà tối qua, họ phát hiện có ai đó đã đột nhập vào nhà.","explanation":"Hành động xảy ra trước → quá khứ hoàn thành, chủ động (someone làm hành động).","note":"S + had + P2 (chủ động, quá khứ hoàn thành)","vis":["đã đột nhập (quá khứ hoàn thành chủ động, đúng — \"someone\" là chủ thể)","đã bị đột nhập (quá khứ hoàn thành bị động, sai)","đã đột nhập (hiện tại hoàn thành, sai thì)","đã bị đột nhập (hiện tại hoàn thành bị động, sai)"]},{"q":"29. How many languages are ___ in Chinese?","options":["speak","speaking","spoken","speaker"],"answer":2,"vi":"Có bao nhiêu ngôn ngữ được nói bằng tiếng Trung?","explanation":"Bị động → spoken.","note":"are + P2 (bị động)","vis":["nói (nguyên mẫu, sai — cần bị động)","đang nói (V-ing, sai)","được nói (quá khứ phân từ, đúng — bị động)","người nói, diễn giả (danh từ, sai từ loại)"]},{"q":"30. The woman sitting next to me on the plane was very nervous. She ___ before.","options":["hasn’t flown","hadn’t flown","didn’t fly","doesn’t fly"],"answer":1,"vi":"Người phụ nữ ngồi cạnh tôi trên máy bay rất lo lắng. Trước đó cô ấy chưa từng bay.","explanation":"Hành động chưa từng xảy ra trước một thời điểm trong quá khứ → quá khứ hoàn thành phủ định.","note":"S + hadn’t + P2 + before","vis":["chưa từng bay (hiện tại hoàn thành phủ định, sai thì)","chưa từng bay (quá khứ hoàn thành phủ định, đúng)","đã không bay (quá khứ đơn phủ định, sai)","không bay (hiện tại đơn phủ định, sai thì)"]},{"q":"31. The earth’s weather is ___ and we don’t know what will happen to us.","options":["dangerous","serious","predicted","mysterious"],"answer":3,"vi":"Thời tiết trái đất thật bí ẩn và chúng ta không biết điều gì sẽ xảy ra với mình.","explanation":"\"mysterious\" = bí ẩn, phù hợp ngữ cảnh.","note":"từ vựng phù hợp ngữ cảnh","vis":["nguy hiểm (sai nghĩa ngữ cảnh)","nghiêm trọng (sai nghĩa ngữ cảnh)","được dự đoán (sai nghĩa/từ loại)","bí ẩn (đúng)"]},{"q":"32. Man has spent years and years trying ___ weather patterns but it is still an inexact science.","options":["predicting","to predict","to predicting","to have predicted"],"answer":1,"vi":"Con người đã dành nhiều năm cố gắng dự đoán các mô hình thời tiết nhưng đó vẫn là một môn khoa học không chính xác.","explanation":"\"try + to V\" = cố gắng làm gì.","note":"try + to V","vis":["dự đoán (V-ing, sai cấu trúc \"try\")","để dự đoán (to-V, đúng sau \"try\")","(sai ngữ pháp)","(dạng hoàn thành không cần thiết, sai)"]},{"q":"33. A drought occurs when a region receives consistently below average ___","options":["falling rain","rain falling","rainfall","fallrain"],"answer":2,"vi":"Hạn hán xảy ra khi một khu vực liên tục nhận lượng mưa dưới mức trung bình.","explanation":"\"rainfall\" = lượng mưa (danh từ ghép cố định).","note":"rainfall (danh từ ghép)","vis":["mưa đang rơi (cụm không cố định, sai)","mưa rơi (cụm không cố định, sai trật tự)","lượng mưa (danh từ ghép cố định, đúng)","(không phải từ tồn tại, sai)"]},{"q":"34. When we ___ back to our home village last month, it ___ so much.","options":["had come - changed","came - had changed","came - has changed","had come - has changed"],"answer":1,"vi":"Khi chúng tôi trở về làng quê tháng trước, nơi đó đã thay đổi rất nhiều.","explanation":"Hành động về làng (came) xảy ra sau; sự thay đổi (had changed) đã xảy ra trước đó → quá khứ đơn + quá khứ hoàn thành.","note":"When + S + V-ed, S + had + P2","vis":["đã về - đã thay đổi (sai trật tự thì)","đã về (quá khứ đơn) - đã thay đổi trước đó (quá khứ hoàn thành) (đúng)","đã về - đã thay đổi (hiện tại hoàn thành, sai thì)","(sai thì cả hai vế)"]},{"q":"35. She ___ in that town for 20 years by the time that historic earthquake ___.","options":["had live - occurred","has lived - occurred","had lived - occur","had lived – occurred"],"answer":3,"vi":"Cô ấy đã sống ở thị trấn đó 20 năm tính đến khi trận động đất lịch sử xảy ra.","explanation":"\"by the time\" + quá khứ hoàn thành (had lived) + quá khứ đơn (occurred).","note":"S + had + P2 + by the time + S + V-ed","vis":["(sai ngữ pháp \"live\" thay vì \"lived\")","đã sống (hiện tại hoàn thành, sai thì) - đã xảy ra","đã sống (quá khứ hoàn thành, đúng) - xảy ra (thiếu \"-ed\", sai)","đã sống - đã xảy ra (đúng cả hai)"]},{"q":"36. Some tents ___ so that children and old people could sleep in.","options":["was set up","were set up","set up","setted up"],"answer":1,"vi":"Một số lều đã được dựng lên để trẻ em và người già có thể ngủ trong đó.","explanation":"Bị động, chủ ngữ số nhiều \"tents\" → were set up.","note":"S (số nhiều) + were + P2 (bị động)","vis":["đã được dựng lên (số ít, sai — chủ ngữ \"tents\" số nhiều)","đã được dựng lên (số nhiều, đúng)","dựng lên (chủ động, sai — cần bị động)","(sai ngữ pháp, \"set\" là động từ bất quy tắc)"]},{"q":"37. People in Japan ___ how to survive in an earthquake.","options":["have been taught","are taught","were taught","had been taught"],"answer":1,"vi":"Người dân Nhật Bản được dạy cách sống sót trong động đất.","explanation":"Sự thật chung, hiện tại đơn bị động → are taught.","note":"S + are + P2 (bị động, hiện tại đơn)","vis":["đã được dạy (hiện tại hoàn thành bị động, sai thì)","được dạy (hiện tại đơn bị động, đúng — sự thật chung)","đã được dạy (quá khứ đơn bị động, sai thì)","đã được dạy (quá khứ hoàn thành bị động, sai thì)"]},{"q":"38. Exactly 5 people got stuck and ___ in that fire.","options":["was death","was died","dead","died"],"answer":3,"vi":"Chính xác 5 người bị mắc kẹt và đã chết trong đám cháy đó.","explanation":"\"die\" là nội động từ, chia quá khứ đơn → died.","note":"S + died (nội động từ, không bị động)","vis":["(sai ngữ pháp, \"death\" là danh từ)","(sai ngữ pháp, \"die\" là nội động từ không dùng bị động)","đã chết (tính từ, sai — cần động từ chính)","đã chết (động từ, đúng)"]},{"q":"39. An earthquake is the ___ a sudden release of energy in the Earth’s crust.","options":["cause by","consequence","result from","result of"],"answer":3,"vi":"Động đất là kết quả của sự giải phóng năng lượng đột ngột trong lớp vỏ Trái Đất.","explanation":"\"the result of\" = kết quả của.","note":"the result of + N","vis":["(sai ngữ pháp, thiếu \"d\")","hậu quả (danh từ, sai cụm)","bắt nguồn từ (sai hướng nghĩa)","the result of = kết quả của (đúng)"]},{"q":"40. The magnitude of an earthquake ___ on the Richter scale.","options":["reports","is reported","was reported","reported"],"answer":1,"vi":"Cường độ của một trận động đất được báo cáo theo thang Richter.","explanation":"Sự thật chung, bị động hiện tại đơn → is reported.","note":"S + is + P2 (bị động, hiện tại đơn)","vis":["báo cáo (chủ động, sai — cần bị động)","được báo cáo (hiện tại đơn bị động, đúng — sự thật chung)","đã được báo cáo (quá khứ đơn bị động, sai thì)","đã báo cáo (quá khứ đơn chủ động, sai)"]},{"q":"41. If I ___ you, I wouldn’t buy that kind of car.","options":["am","are","was","were"],"answer":3,"vi":"Nếu tôi là bạn, tôi sẽ không mua loại xe đó.","explanation":"Câu điều kiện loại 2, dùng \"were\" cho mọi ngôi.","note":"If + S + were, S + wouldn’t + V","vis":["là (hiện tại, sai — câu điều kiện loại 2 cần quá khứ)","là (hiện tại, sai)","đã là (quá khứ, sai — cần \"were\" cho mọi ngôi)","dùng \"were\" cho mọi ngôi (đúng)"]},{"q":"42. What does the forest ___ like?","options":["is","be","look","looks"],"answer":2,"vi":"Khu rừng trông như thế nào?","explanation":"Sau trợ động từ \"does\" cần V nguyên mẫu → look.","note":"What does + S + look like?","vis":["thì, là (sai — cần V nguyên mẫu sau \"does\")","(nguyên mẫu của to be, sai nghĩa ở đây)","trông như thế nào (nguyên mẫu, đúng sau \"does\")","trông như thế nào (chia động từ, sai vị trí)"]},{"q":"43. People will be ___ to a safe place to live in the short run.","options":["taken","took","takes","to take"],"answer":0,"vi":"Mọi người sẽ được đưa đến nơi an toàn để sinh sống trong thời gian ngắn.","explanation":"Bị động sau \"will be\" → taken.","note":"will be + P2 (bị động)","vis":["được đưa đi (quá khứ phân từ, đúng — bị động sau \"will be\")","đã đưa đi (quá khứ đơn, sai)","đưa đi (chia động từ, sai)","để đưa đi (to-V, sai)"]},{"q":"44. Is it ___ to improve our speaking skill?","options":["import","importing","importance","important"],"answer":3,"vi":"Việc cải thiện kỹ năng nói của chúng ta có quan trọng không?","explanation":"Sau \"is\" cần tính từ → important.","note":"be + adjective","vis":["nhập khẩu (động từ/danh từ, sai từ loại)","đang nhập khẩu (V-ing, sai)","tầm quan trọng (danh từ, sai từ loại)","quan trọng (tính từ, đúng sau \"is\")"]},{"q":"45. The window needs ___ today to prepare for our party.","options":["clean","to clean","cleaning","cleaned"],"answer":2,"vi":"Cửa sổ cần được lau chùi hôm nay để chuẩn bị cho bữa tiệc.","explanation":"\"need + V-ing\" mang nghĩa bị động = cần được làm gì.","note":"S + needs + V-ing (= needs to be + P2)","vis":["làm sạch (nguyên mẫu, sai cấu trúc \"need\")","để làm sạch (to-V, sai)","need + V-ing = cần được làm gì (đúng)","đã làm sạch (quá khứ phân từ, sai cấu trúc \"need\")"]},{"q":"46. Before I was born, my father had ___ a teacher.","options":["be","been","being","was"],"answer":1,"vi":"Trước khi tôi ra đời, bố tôi đã từng là giáo viên.","explanation":"Sau \"had\" cần quá khứ phân từ của \"be\" → been.","note":"had + been + N (quá khứ hoàn thành)","vis":["(nguyên mẫu, sai sau \"had\")","đã từng là (quá khứ phân từ của \"be\", đúng sau \"had\")","đang là (V-ing, sai sau \"had\")","đã là (quá khứ đơn, sai — không đi sau \"had\")"]},{"q":"47. They are ___ a team with two foreign friends.","options":["on","at","in","of"],"answer":2,"vi":"Họ đang ở trong một đội cùng hai người bạn nước ngoài.","explanation":"\"be in a team\" = ở trong một đội.","note":"be in + a team","vis":["trên (sai giới từ)","tại (sai giới từ)","be in a team = ở trong một đội (đúng)","của (sai giới từ)"]},{"q":"48. Have they ever visited English ___ countries?","options":["speaking","spoken","speak","speaks"],"answer":0,"vi":"Họ đã từng đến thăm các nước nói tiếng Anh chưa?","explanation":"\"English-speaking countries\" = các nước nói tiếng Anh (tính từ ghép).","note":"English-speaking + countries","vis":["English-speaking countries = các nước nói tiếng Anh (đúng)","được nói (quá khứ phân từ, sai)","nói (nguyên mẫu, sai)","nói (chia động từ, sai)"]},{"q":"49. I ___ visit my grandmother on Sunday if I don’t go to school.","options":["would","wouldn’t","will","will not"],"answer":2,"vi":"Tôi sẽ đến thăm bà nếu tôi không phải đi học vào Chủ nhật.","explanation":"Câu điều kiện loại 1, mệnh đề chính dùng \"will\".","note":"S + will + V + if + S + don’t + V","vis":["sẽ (giả định, sai thì cho câu điều kiện loại 1)","sẽ không (giả định phủ định, sai)","sẽ (đúng — câu điều kiện loại 1)","sẽ không (sai nghĩa — câu gốc là khẳng định)"]},{"q":"50. ___ is the most common disaster in Vietnam?","options":["What","When","Where","Which"],"answer":0,"vi":"Thiên tai phổ biến nhất ở Việt Nam là gì?","explanation":"Hỏi về sự vật/sự việc → What.","note":"What + is + the + adjective-est + noun?","vis":["cái gì (đúng — hỏi về sự vật/sự việc)","khi nào (sai nghĩa)","ở đâu (sai nghĩa)","cái nào (sai nghĩa)"]}],"roman":"III"},{"navLabel":"Word Forms","title":"Cho dạng đúng của từ trong ngoặc (Word Forms)","icon":"spell-check","instructions":"Dùng từ gợi ý trong ngoặc để điền dạng đúng vào chỗ trống.","type":"fill","questions":[{"q":"1. He lived on her own in rented ___.","answer":"accommodation","hint":"(ACCOMMODATE)","family":["accommodate (v): cung cấp chỗ ở","accommodation (n): chỗ ở"],"vi":"Anh ấy sống một mình trong căn nhà thuê.","explanation":"Sau \"rented\" cần danh từ → accommodation.","note":"adjective + noun"},{"q":"2. Her family insisted she should be given a proper ___.","answer":"burial","hint":"(BURY)","family":["bury (v): chôn","burial (n): lễ an táng"],"vi":"Gia đình cô ấy khăng khăng rằng cô nên được chôn cất tử tế.","explanation":"Sau tính từ \"proper\" cần danh từ → burial.","note":"adjective + noun"},{"q":"3. This could have equally ___ consequences.","answer":"disastrous","hint":"(DISASTER)","family":["disaster (n): thảm họa","disastrous (adj): thảm khốc"],"vi":"Điều này cũng có thể gây ra hậu quả thảm khốc tương tự.","explanation":"Trước danh từ \"consequences\" cần tính từ → disastrous.","note":"adjective + noun"},{"q":"4. No one can accurately predict ___.","answer":"earthquakes","hint":"(EARTH)","family":["earth (n): trái đất","earthquake (n): trận động đất"],"vi":"Không ai có thể dự đoán chính xác các trận động đất.","explanation":"Sau động từ \"predict\" cần danh từ số nhiều → earthquakes.","note":"V + plural noun"},{"q":"5. There was an emergency ___ of thousands of people after the flood.","answer":"evacuation","hint":"(EVACUATE)","family":["evacuate (v): sơ tán","evacuation (n): cuộc sơ tán"],"vi":"Đã có một cuộc sơ tán khẩn cấp của hàng ngàn người sau trận lũ.","explanation":"Trước \"of\" cần danh từ → evacuation.","note":"noun + of + N"},{"q":"6. She was ___ and had to put her child up for adoption.","answer":"homeless","hint":"(HOME)","family":["home (n): nhà","homeless (adj): vô gia cư"],"vi":"Cô ấy vô gia cư và phải cho con đi làm con nuôi.","explanation":"Sau \"was\" cần tính từ → homeless.","note":"be + adjective"},{"q":"7. The heavy rains could cause flash floods and ___.","answer":"mudslides","hint":"(MUD)","family":["mud (n): bùn","mudslide (n): lũ bùn"],"vi":"Mưa lớn có thể gây ra lũ quét và lũ bùn.","explanation":"Sau \"and\" cần danh từ số nhiều → mudslides.","note":"and + plural noun"},{"q":"8. Carlos had a firm ___.","answer":"handshake","hint":"(SHAKE)","family":["shake (v): lắc, rung","handshake (n): cái bắt tay"],"vi":"Carlos có một cái bắt tay chắc chắn.","explanation":"Sau tính từ \"firm\" cần danh từ → handshake.","note":"adjective + noun"},{"q":"9. The boys claimed they were being ___ by the police.","answer":"victimized","hint":"(VICTIM)","family":["victim (n): nạn nhân","victimize (v): đối xử bất công, bắt nạt"],"vi":"Các cậu bé khẳng định họ đang bị cảnh sát bắt nạt/đối xử bất công.","explanation":"Bị động, sau \"being\" cần quá khứ phân từ → victimized.","note":"being + P2 (bị động)"},{"q":"10. One third of the region has been ___ in the past decade.","answer":"deforested","hint":"(FOREST)","family":["forest (n): rừng","deforest (v): phá rừng"],"vi":"Một phần ba khu vực đã bị phá rừng trong thập kỷ qua.","explanation":"Bị động, sau \"has been\" cần quá khứ phân từ → deforested.","note":"has been + P2 (bị động)"},{"q":"11. The ___ of the city after the devastating earthquake is being carried.","answer":"reconstruction","hint":"(CONSTRUCT)","family":["construct (v): xây dựng","reconstruction (n): sự tái thiết"],"vi":"Việc tái thiết thành phố sau trận động đất tàn khốc đang được tiến hành.","explanation":"Sau \"The\" cần danh từ → reconstruction.","note":"the + noun"},{"q":"12. Visitors are allowed to get close to this volcano because it is ___.","answer":"inactive","hint":"(ACT)","family":["act (v): hoạt động","active (adj): hoạt động","inactive (adj): không hoạt động"],"vi":"Du khách được phép đến gần núi lửa này vì nó không còn hoạt động.","explanation":"Sau \"is\" cần tính từ; ngữ cảnh cho thấy cần dạng phủ định → inactive.","note":"be + inactive (tính từ phủ định)"},{"q":"13. Ten years ago, more than 10 thousand people of this area suffered from a frightening volcano ___.","answer":"eruption","hint":"(ERUPT)","family":["erupt (v): phun trào","eruption (n): sự phun trào"],"vi":"Mười năm trước, hơn 10 nghìn người trong khu vực này đã chịu đựng một vụ phun trào núi lửa đáng sợ.","explanation":"Sau \"volcano\" cần danh từ → eruption.","note":"noun + noun (danh từ ghép)"},{"q":"14. After the flood, many people were made ___.","answer":"homeless","hint":"(HOME)","family":["home (n): nhà","homeless (adj): vô gia cư"],"vi":"Sau trận lũ, nhiều người trở nên vô gia cư.","explanation":"Sau \"made\" cần tính từ → homeless.","note":"made + adjective"},{"q":"15. We should offer our ___ hands to aid the victims of natural disasters.","answer":"helping","hint":"(HELP)","family":["help (v/n): giúp đỡ","helping (adj): giúp đỡ (a helping hand)"],"vi":"Chúng ta nên chìa bàn tay giúp đỡ để hỗ trợ nạn nhân thiên tai.","explanation":"Trước danh từ \"hands\" cần tính từ (V-ing) → helping.","note":"adjective (V-ing) + noun"},{"q":"16. New Zealand is an ideal destination for travellers because of its many tourist ___.","answer":"attractions","hint":"(ATTRACT)","family":["attract (v): thu hút","attraction (n): điểm thu hút"],"vi":"New Zealand là điểm đến lý tưởng cho du khách vì có nhiều điểm tham quan.","explanation":"Sau \"tourist\" cần danh từ số nhiều → attractions.","note":"noun + plural noun"},{"q":"17. People keep throwing rubbish into the lake, and it results in the ___ of many fish.","answer":"deaths","hint":"(DIE)","family":["die (v): chết","death (n): cái chết"],"vi":"Người ta cứ vứt rác xuống hồ, và điều đó dẫn đến cái chết của nhiều loài cá.","explanation":"Sau \"the\" cần danh từ số nhiều → deaths.","note":"the + plural noun"},{"q":"18. Noise pollution ___ people’s hearing ability.","answer":"threatens","hint":"(THREAT)","family":["threat (n): mối đe dọa","threaten (v): đe dọa"],"vi":"Ô nhiễm tiếng ồn đe dọa khả năng nghe của con người.","explanation":"Chủ ngữ số ít \"pollution\" cần động từ thêm -s → threatens.","note":"S (số ít) + V-s/es"},{"q":"19. The ___ from Sydney to Wellington has been delayed because of bad weather.","answer":"flight","hint":"(FLY)","family":["fly (v): bay","flight (n): chuyến bay"],"vi":"Chuyến bay từ Sydney đến Wellington đã bị hoãn vì thời tiết xấu.","explanation":"Sau \"The\" cần danh từ → flight.","note":"the + noun"},{"q":"20. A number of cleaning products contain very ___ chemicals.","answer":"harmful","hint":"(HARM)","family":["harm (n/v): tác hại / gây hại","harmful (adj): có hại"],"vi":"Một số sản phẩm tẩy rửa chứa hóa chất rất độc hại.","explanation":"Trước danh từ \"chemicals\" cần tính từ → harmful.","note":"adjective + noun"}],"roman":"IV"},{"navLabel":"Verb Forms","title":"Chia đúng dạng của động từ trong ngoặc","icon":"pen","instructions":"Đọc kỹ từng câu và chia đúng dạng của động từ trong ngoặc (quá khứ hoàn thành, quá khứ đơn, hiện tại hoàn thành…).","type":"fill","questions":[{"q":"1. Before she (go) ___ to bed, she (finish) ___ her homework.","answer":"went / had finished","accepted":["went / had finished","went had finished","went, had finished"],"vi":"Trước khi đi ngủ, cô ấy đã làm xong bài tập về nhà.","explanation":"Hành động xảy ra sau (went) → quá khứ đơn; hành động xảy ra trước (had finished) → quá khứ hoàn thành."},{"q":"2. Few people (understand) ___ the news when the consequences began to appear.","answer":"had understood","accepted":["had understood"],"vi":"Rất ít người hiểu được tin tức đó khi hậu quả bắt đầu xuất hiện.","explanation":"Hành động xảy ra trước một mốc trong quá khứ → quá khứ hoàn thành."},{"q":"3. After they (go) ___, he (sit) ___ down and (rest) ___.","answer":"had gone / sat / rested","accepted":["had gone / sat / rested","had gone sat rested","had gone, sat, rested"],"vi":"Sau khi họ đi rồi, anh ấy ngồi xuống và nghỉ ngơi.","explanation":"\"After\" + quá khứ hoàn thành (had gone) cho hành động trước, quá khứ đơn (sat, rested) cho hành động sau."},{"q":"4. When I came to the theatre, the film (start) ___.","answer":"had started","accepted":["had started"],"vi":"Khi tôi đến rạp, bộ phim đã bắt đầu rồi.","explanation":"Hành động đã xảy ra trước khi \"tôi đến\" → quá khứ hoàn thành."},{"q":"5. Before she (listen) ___ to music, she (do) ___ homework.","answer":"listened / had done","accepted":["listened / had done","listened had done","listened, had done"],"vi":"Trước khi nghe nhạc, cô ấy đã làm xong bài tập.","explanation":"Hành động xảy ra sau (listened) → quá khứ đơn; hành động xảy ra trước (had done) → quá khứ hoàn thành."},{"q":"6. Last night, David (go) ___ to the supermarket before he (go) ___ home.","answer":"had gone / went","accepted":["had gone / went","had gone went","had gone, went"],"vi":"Tối qua, David đã đi siêu thị trước khi về nhà.","explanation":"Hành động xảy ra trước (had gone) → quá khứ hoàn thành; hành động xảy ra sau (went) → quá khứ đơn."},{"q":"7. ___ you (finish) ___ the report before he asked for it?","answer":"Had / had you finished","accepted":["had / finished","had / had you finished","had finished","had had you finished","had, finished","had, had you finished"],"vi":"Bạn đã hoàn thành báo cáo trước khi anh ấy yêu cầu chưa?","explanation":"Câu hỏi quá khứ hoàn thành: Had + S + P2?"},{"q":"8. Our boss (not make) ___ the decision yet when management changed their mind.","answer":"hadn’t made","accepted":["had not made","hadn’t made"],"vi":"Sếp của chúng tôi vẫn chưa đưa ra quyết định khi ban quản lý đổi ý.","explanation":"Hành động chưa xảy ra trước một mốc trong quá khứ → quá khứ hoàn thành phủ định."},{"q":"9. Mark (want) ___ to go to New York, but his wife changed his mind.","answer":"had wanted","accepted":["had wanted"],"vi":"Mark đã từng muốn đi New York, nhưng vợ anh ấy đã làm anh ấy đổi ý.","explanation":"Mong muốn đã có trước khi bị thay đổi → quá khứ hoàn thành."},{"q":"10. We (eat already) ___ so we weren’t hungry.","answer":"had already eaten","accepted":["had already eaten"],"vi":"Chúng tôi đã ăn rồi nên không thấy đói.","explanation":"Hành động đã hoàn tất trước → quá khứ hoàn thành."},{"q":"11. ___ you (take) ___ part in this game if you have free time?","answer":"Will / will you take","accepted":["will / take","will / will you take","will take","will will you take","will, take","will, will you take"],"vi":"Bạn có tham gia trò chơi này không nếu bạn có thời gian rảnh?","explanation":"Câu điều kiện loại 1 dạng câu hỏi: Will + S + V?"},{"q":"12. People who do voluntary work in this city (give) ___ out free food to the poor for a long time.","answer":"have given","accepted":["have given"],"vi":"Những người làm tình nguyện ở thành phố này đã phát đồ ăn miễn phí cho người nghèo trong thời gian dài.","explanation":"\"for a long time\" là dấu hiệu hiện tại hoàn thành → have given."},{"q":"13. How often ___ you (practise) ___ speaking English?","answer":"do / do you practise","accepted":["do / do you practise","do / practise","do do you practise","do practise","do, do you practise","do, practise"],"vi":"Bạn luyện nói tiếng Anh thường xuyên như thế nào?","explanation":"Câu hỏi tần suất, thì hiện tại đơn: How often do + S + V?"},{"q":"14. I (get) ___ good marks after my examination finished at school.","answer":"got","accepted":["got"],"vi":"Tôi đã đạt điểm cao sau khi kỳ thi ở trường kết thúc.","explanation":"Hành động xảy ra sau một mốc quá khứ khác → quá khứ đơn."},{"q":"15. ___ they (leave) ___ their house when their parents visited them?","answer":"Had / had they left","accepted":["had / had they left","had / left","had had they left","had left","had, had they left","had, left"],"vi":"Họ đã rời khỏi nhà trước khi bố mẹ đến thăm chưa?","explanation":"Câu hỏi quá khứ hoàn thành: Had + S + P2?"},{"q":"16. If I were you, I (not go) ___ out alone.","answer":"wouldn’t go","accepted":["would not go","wouldn’t go"],"vi":"Nếu tôi là bạn, tôi sẽ không ra ngoài một mình.","explanation":"Câu điều kiện loại 2: If I were you, I wouldn’t + V."},{"q":"17. Jenny usually (attend) ___ her teachers’ lectures on time.","answer":"attends","accepted":["attends"],"vi":"Jenny thường tham dự các buổi giảng của giáo viên đúng giờ.","explanation":"\"usually\" là dấu hiệu hiện tại đơn, chủ ngữ số ít → attends."},{"q":"18. In my house, pigs are often (feed) ___ by my mother.","answer":"fed","accepted":["fed"],"vi":"Trong nhà tôi, lợn thường được mẹ tôi cho ăn.","explanation":"Bị động, sau \"are\" cần quá khứ phân từ → fed."},{"q":"19. How about (travel) ___ to Nha Trang beach this weekend?","answer":"travelling","accepted":["traveling","travelling"],"vi":"Đi Nha Trang cuối tuần này thì sao?","explanation":"\"How about + V-ing?\" = lời đề nghị."},{"q":"20. Anna (not manage) ___ to prevent her cats from fighting with each other since the first time.","answer":"hasn’t managed","accepted":["has not managed","hasn’t managed"],"vi":"Anna vẫn chưa thể ngăn được lũ mèo của mình đánh nhau kể từ lần đầu tiên.","explanation":"\"since\" là dấu hiệu hiện tại hoàn thành phủ định."}],"roman":"V"},{"navLabel":"Sửa lỗi","title":"Tìm lỗi sai (A, B, C hoặc D)","icon":"wrench","instructions":"Mỗi câu có 4 phần gạch chân A, B, C, D. Chọn phần chứa lỗi sai. Chọn xong sẽ hiện đúng/sai, đáp án và công thức ngay. Lưu ý: tài liệu gốc chỉ đánh dấu 4 vị trí A/B/C/D bằng nhãn dưới câu (không gạch chân trực tiếp); các cụm A/B/C/D được chia lại hợp lý dựa theo đáp án lỗi sai cho sẵn (RECONSTRUCTED).","type":"mcq","instant":true,"questions":[{"q":"1. <u>I came back home</u> <u>after</u> <u>my sister had</u> <u>finish her dinner</u>.","options":["I came back home","after","my sister had","finish her dinner"],"answer":3,"vi":"Tôi về đến nhà sau khi chị tôi ăn tối xong.","explanation":"Sau \"had\" cần quá khứ phân từ → finish phải sửa thành finished.","note":"had + P2 (quá khứ hoàn thành)","vis":["tôi trở về nhà","sau khi","chị tôi đã (trợ động từ)","ăn xong bữa tối của chị ấy (dạng sai, cần \"finished\")"]},{"q":"2. <u>Frank said</u> <u>that he has met</u> <u>Sir. Alex Ferguson</u> <u>before</u>.","options":["Frank said","that he has met","Sir. Alex Ferguson","before"],"answer":1,"vi":"Frank nói rằng anh ấy đã gặp Ngài Alex Ferguson trước đó.","explanation":"Câu tường thuật với \"said\" (quá khứ) cần lùi thì → has met phải sửa thành had met.","note":"lùi thì trong câu tường thuật (backshift)","vis":["Frank đã nói","rằng anh ấy đã gặp (dạng sai thì, cần \"had met\")","Ngài Alex Ferguson","trước đây"]},{"q":"3. <u>Before Christine</u> <u>goes to bed,</u> <u>she had drunk</u> <u>a glass of wine</u>.","options":["Before Christine","goes to bed,","she had drunk","a glass of wine"],"answer":1,"vi":"Trước khi Christine đi ngủ, cô ấy đã uống một ly rượu vang.","explanation":"Cần nhất quán thì quá khứ, hành động xảy ra sau → goes phải sửa thành went.","note":"Before + S + V-ed, S + had + P2","vis":["trước khi Christine","đi ngủ (dạng sai thì, cần \"went\")","cô ấy đã uống","một ly rượu vang"]},{"q":"4. <u>She told her husband</u> <u>she hadn’t wore</u> <u>such a kind of</u> <u>dress before</u>.","options":["She told her husband","she hadn’t wore","such a kind of","dress before"],"answer":1,"vi":"Cô ấy nói với chồng rằng cô chưa từng mặc kiểu váy như vậy trước đây.","explanation":"Sau \"hadn’t\" cần quá khứ phân từ → wore phải sửa thành worn.","note":"hadn’t + P2 (quá khứ hoàn thành)","vis":["cô ấy nói với chồng","cô ấy chưa từng mặc (dạng sai, cần \"worn\")","kiểu như vậy","chiếc váy trước đây"]},{"q":"5. <u>When I arrived</u> <u>at the stadium,</u> <u>the football match had</u> <u>starting</u>.","options":["When I arrived","at the stadium,","the football match had","starting"],"answer":3,"vi":"Khi tôi đến sân vận động, trận bóng đá đã bắt đầu rồi.","explanation":"Sau \"had\" cần quá khứ phân từ → starting phải sửa thành started.","note":"had + P2 (quá khứ hoàn thành)","vis":["khi tôi đến","tại sân vận động","trận bóng đá đã (trợ động từ)","bắt đầu (dạng sai, cần \"started\")"]},{"q":"6. <u>There was</u> <u>a big storm</u> <u>in this village</u> <u>before I came here</u>.","options":["There was","a big storm","in this village","before I came here"],"answer":0,"vi":"Đã từng có một cơn bão lớn ở ngôi làng này trước khi tôi đến đây.","explanation":"Sự việc xảy ra trước một hành động khác trong quá khứ → There was phải sửa thành There had been.","note":"There had been + N + before + S + V-ed","vis":["đã có (dạng sai thì, cần \"had been\")","một cơn bão lớn","ở ngôi làng này","trước khi tôi đến đây"]},{"q":"7. <u>Thanks for the prompt financial aids</u> <u>of the government,</u> <u>the life of people in this town had become</u> <u>less miserable</u>.","options":["Thanks for the prompt financial aids","of the government,","the life of people in this town had become","less miserable"],"answer":2,"vi":"Nhờ sự hỗ trợ tài chính kịp thời của chính phủ, cuộc sống của người dân thị trấn này đã bớt khổ cực hơn.","explanation":"Không cần quá khứ hoàn thành ở đây, chỉ cần quá khứ đơn → had become phải sửa thành became.","note":"S + V-ed (quá khứ đơn)","vis":["nhờ sự hỗ trợ tài chính kịp thời","của chính phủ","cuộc sống người dân thị trấn này đã trở nên (dạng sai, cần \"became\")","bớt khổ cực hơn"]},{"q":"8. <u>I weren’t informed</u> <u>anything about</u> <u>the wildfire</u> <u>last week</u>.","options":["I weren’t informed","anything about","the wildfire","last week"],"answer":0,"vi":"Tôi đã không được thông báo gì về đám cháy rừng tuần trước.","explanation":"Chủ ngữ \"I\" cần \"wasn’t\" không phải \"weren’t\" → I weren’t informed phải sửa thành I wasn’t informed.","note":"I + wasn’t + P2 (bị động)","vis":["tôi đã không được thông báo (dạng sai, cần \"wasn't\")","bất cứ điều gì về","đám cháy rừng","tuần trước"]},{"q":"9. <u>Fortunately,</u> <u>they learnt how to do</u> <u>in case of earthquakes</u> <u>before it occurred</u>.","options":["Fortunately,","they learnt how to do","in case of earthquakes","before it occurred"],"answer":1,"vi":"May mắn thay, họ đã học được cách xử lý trong trường hợp động đất trước khi nó xảy ra.","explanation":"Hành động xảy ra trước một mốc trong quá khứ (\"before it occurred\") → learnt phải sửa thành had learnt.","note":"S + had + P2 + before + S + V-ed","vis":["may mắn thay","họ đã học cách xử lý (dạng sai, cần \"had learnt\")","trong trường hợp động đất","trước khi nó xảy ra"]},{"q":"10. <u>All the visitors</u> <u>was prevented</u> <u>from continuing their exploration because of</u> <u>the uninformed landslide</u>.","options":["All the visitors","was prevented","from continuing their exploration because of","the uninformed landslide"],"answer":1,"vi":"Tất cả du khách đã bị ngăn cản không được tiếp tục khám phá vì trận lở đất không được báo trước.","explanation":"Chủ ngữ số nhiều \"All the visitors\" cần \"were\" không phải \"was\" → was prevented phải sửa thành were prevented.","note":"chủ ngữ số nhiều + were + P2 (bị động)","vis":["tất cả du khách","đã bị ngăn cản (dạng sai số, cần \"were\")","tiếp tục khám phá vì","trận lở đất không được báo trước"]},{"q":"11. <u>If I was</u> <u>an astronaut,</u> <u>I would be really famous</u> <u>in my country</u>.","options":["If I was","an astronaut,","I would be really famous","in my country"],"answer":0,"vi":"Nếu tôi là phi hành gia, tôi sẽ rất nổi tiếng ở đất nước mình.","explanation":"Câu điều kiện loại 2, dùng \"were\" cho mọi ngôi → If I was phải sửa thành If I were.","note":"If + S + were (câu điều kiện loại 2)","vis":["nếu tôi là (dạng sai, cần \"were\")","một phi hành gia","tôi sẽ rất nổi tiếng","ở đất nước tôi"]},{"q":"12. <u>Please don’t drink</u> <u>this water</u> <u>because it is</u> <u>contaminate</u>.","options":["Please don’t drink","this water","because it is","contaminate"],"answer":3,"vi":"Xin đừng uống nước này vì nó bị ô nhiễm.","explanation":"Sau \"is\" cần tính từ → contaminate phải sửa thành contaminated.","note":"be + contaminated (tính từ, quá khứ phân từ)","vis":["xin đừng uống","nước này","vì nó","bị ô nhiễm (dạng sai, cần \"contaminated\")"]},{"q":"13. <u>She would like</u> <u>to know how</u> <u>pronounce</u> <u>these Spanish words</u>.","options":["She would like","to know how","pronounce","these Spanish words"],"answer":2,"vi":"Cô ấy muốn biết cách phát âm những từ tiếng Tây Ban Nha này.","explanation":"Sau \"how\" cần \"to V\" → pronounce phải sửa thành to pronounce.","note":"how + to V","vis":["cô ấy muốn","biết cách","phát âm (dạng sai, cần \"to pronounce\")","những từ tiếng Tây Ban Nha này"]},{"q":"14. <u>Jack has never</u> <u>be there</u> <u>before, so</u> <u>he is so excited</u>.","options":["Jack has never","be there","before, so","he is so excited"],"answer":1,"vi":"Jack chưa bao giờ đến đó trước đây, vì vậy anh ấy rất phấn khích.","explanation":"Sau \"has never\" cần quá khứ phân từ → be phải sửa thành been.","note":"has never + P2 (hiện tại hoàn thành)","vis":["Jack chưa bao giờ","ở đó (dạng sai, cần \"been\")","trước đây, vì vậy","anh ấy rất phấn khích"]},{"q":"15. <u>Mr. Smith went</u> <u>to the church</u> <u>to feel relaxed</u> <u>every day</u>.","options":["Mr. Smith went","to the church","to feel relaxed","every day"],"answer":0,"vi":"Ông Smith đến nhà thờ để cảm thấy thư giãn mỗi ngày.","explanation":"\"every day\" là dấu hiệu hiện tại đơn (thói quen) → went phải sửa thành goes.","note":"S (số ít) + V-s/es (dấu hiệu: every day)","vis":["ông Smith đã đến (dạng sai thì, cần \"goes\")","nhà thờ","để cảm thấy thư giãn","mỗi ngày"]},{"q":"16. <u>The sea will rise</u> <u>level</u> <u>if the ice</u> <u>melted</u>.","options":["The sea will rise","level","if the ice","melted"],"answer":3,"vi":"Mực nước biển sẽ dâng lên nếu băng tan.","explanation":"Câu điều kiện loại 1, mệnh đề If cần hiện tại đơn → melted phải sửa thành melts.","note":"if + S + V(hiện tại) (câu điều kiện loại 1)","vis":["mực nước biển sẽ dâng","mực nước","nếu băng","tan (dạng sai thì, cần \"melts\")"]},{"q":"17. <u>The water is contaminated</u> <u>as a result in</u> <u>pouring lots of chemicals</u> <u>into the river</u>.","options":["The water is contaminated","as a result in","pouring lots of chemicals","into the river"],"answer":1,"vi":"Nước bị ô nhiễm do việc đổ nhiều hóa chất vào sông.","explanation":"\"as a result of\" = do kết quả của → as a result in phải sửa thành as a result of.","note":"as a result of + N/V-ing","vis":["nước bị ô nhiễm","do kết quả của (dạng sai giới từ, cần \"as a result of\")","đổ nhiều hóa chất","vào sông"]},{"q":"18. <u>Why has John been</u> <u>ability</u> <u>to learn a lot of</u> <u>languages?</u>","options":["Why has John been","ability","to learn a lot of","languages?"],"answer":1,"vi":"Vì sao John lại có khả năng học được nhiều ngôn ngữ như vậy?","explanation":"\"be able to\" = có khả năng → ability phải sửa thành able.","note":"be able to + V","vis":["tại sao John lại có (trợ động từ)","khả năng (sai từ loại, cần \"able\")","học được nhiều","ngôn ngữ?"]},{"q":"19. <u>Hundreds</u> <u>of houses</u> <u>was destroyed</u> <u>after the earthquake</u>.","options":["Hundreds","of houses","was destroyed","after the earthquake"],"answer":2,"vi":"Hàng trăm ngôi nhà đã bị phá hủy sau trận động đất.","explanation":"Chủ ngữ số nhiều \"Hundreds of houses\" cần \"were\" → was destroyed phải sửa thành were destroyed.","note":"chủ ngữ số nhiều + were + P2 (bị động)","vis":["hàng trăm","ngôi nhà","đã bị phá hủy (dạng sai số, cần \"were\")","sau trận động đất"]},{"q":"20. <u>Typhoons</u> <u>are happened</u> <u>in her hometown</u> <u>once a year</u>.","options":["Typhoons","are happened","in her hometown","once a year"],"answer":1,"vi":"Bão thường xảy ra ở quê cô ấy mỗi năm một lần.","explanation":"\"happen\" là nội động từ, không dùng dạng bị động → are happened phải sửa thành happen.","note":"S + happen (nội động từ, không bị động)","vis":["bão (nhiệt đới)","xảy ra (dạng sai — nội động từ không dùng bị động, cần \"happen\")","ở quê cô ấy","một năm một lần"]}],"roman":"VI"},{"navLabel":"Đọc hiểu 1","title":"Đọc hiểu – Bão Katrina &amp; Harvey (điền từ cho sẵn)","icon":"book-open","instructions":"Đọc đoạn văn và dùng các từ cho sẵn trong ô để điền vào chỗ trống. Gõ đúng từ rồi bấm Kiểm tra.","type":"fill","bank":["different","most","common","against","small","ago","region","storms","social","has"],"passage":{"title":"Hurricane Katrina &amp; Hurricane Harvey","html":"As South Texas continues to battle <b>(1)</b> ___ Harvey's record rainfall, the people of Louisiana are marking a tragic anniversary. Twelve years <b>(2)</b> ___, on August 29, 2005, Hurricane Katrina made landfall near New Orleans. It was one of the <b>(3)</b> ___ devastating natural disasters to ever hit the United States, and the <b>(4)</b> ___ still bears its scars.<br><br>Hurricane Harvey and Hurricane Katrina are <b>(5)</b> ___ beasts, to be sure. Harvey's lingering wrath is very different than Katrina's swift and destructive turn, and the <b>(6)</b> ___ and infrastructural collapses that followed. So far, Harvey <b>(7)</b> ___ claimed a number of lives, but it is a <b>(8)</b> ___ fraction of Katrina's 1,800+ victims.<br><br>From a meteorological perspective, though, how do these <b>(9)</b> ___ compare? Other than timing — an interesting but easily explained coincidence — do they have anything in <b>(10)</b> ___ other than adjacent chambers in the nation's memory?","vi":"Trong khi Nam Texas tiếp tục chống chọi <b>(1)</b> ___ với lượng mưa kỷ lục của bão Harvey, người dân Louisiana đang kỷ niệm một ngày đầy bi kịch. Mười hai năm <b>(2)</b> ___ trước, vào ngày 29/8/2005, bão Katrina đã đổ bộ gần New Orleans. Đó là một trong những thảm họa thiên nhiên <b>(3)</b> ___ tàn khốc nhất từng xảy ra ở Mỹ, và <b>(4)</b> ___ khu vực này vẫn còn mang những vết sẹo của nó.<br><br>Bão Harvey và Katrina chắc chắn là những \"con quái vật\" <b>(5)</b> ___ khác nhau. Cơn thịnh nộ dai dẳng của Harvey rất khác với cú rẽ nhanh và tàn phá của Katrina, cùng với sự sụp đổ về <b>(6)</b> ___ xã hội và hạ tầng theo sau đó. Cho đến nay, Harvey <b>(7)</b> ___ đã cướp đi một số sinh mạng, nhưng đó chỉ là một phần <b>(8)</b> ___ nhỏ so với hơn 1.800 nạn nhân của Katrina.<br><br>Nhưng xét từ góc độ khí tượng học, những <b>(9)</b> ___ cơn bão này so sánh với nhau như thế nào? Ngoài thời điểm xảy ra — một sự trùng hợp thú vị nhưng dễ giải thích — liệu chúng có điểm gì <b>(10)</b> ___ chung khác ngoài việc cùng nằm trong ký ức của cả nước không?"},"questions":[{"q":"1. As South Texas continues to battle ___ Harvey’s record rainfall, the people of Louisiana are marking a tragic anniversary.","answer":"against","vi":"Trong khi Nam Texas tiếp tục chống chọi với lượng mưa kỷ lục của bão Harvey, người dân Louisiana đang kỷ niệm một ngày đầy bi kịch.","explanation":"\"battle against\" = chống chọi với."},{"q":"2. Twelve years ___, on August 29, 2005, Hurricane Katrina made landfall near New Orleans.","answer":"ago","vi":"Mười hai năm trước, vào ngày 29/8/2005, bão Katrina đã đổ bộ gần New Orleans.","explanation":"\"twelve years ago\" = mười hai năm trước."},{"q":"3. It was one of the ___ devastating natural disasters to ever hit the United States, and the region still bears its scars.","answer":"most","vi":"Đó là một trong những thảm họa thiên nhiên tàn khốc nhất từng xảy ra ở Mỹ, và khu vực này vẫn còn mang những vết sẹo của nó.","explanation":"So sánh nhất → most devastating."},{"q":"4. It was one of the most devastating natural disasters to ever hit the United States, and the ___ still bears its scars.","answer":"region","vi":"…và khu vực này vẫn còn mang những vết sẹo của nó.","explanation":"Chủ ngữ cần danh từ chỉ khu vực → region."},{"q":"5. Hurricane Harvey and Hurricane Katrina are ___ beasts, to be sure.","answer":"different","vi":"Bão Harvey và Katrina chắc chắn là những \"con quái vật\" khác nhau.","explanation":"\"different beasts\" = những thứ khác nhau (ẩn dụ)."},{"q":"6. …and the ___ and infrastructural collapses that followed.","answer":"social","vi":"…và sự sụp đổ về mặt xã hội và cơ sở hạ tầng theo sau đó.","explanation":"Trước \"and infrastructural collapses\" cần tính từ song song → social."},{"q":"7. So far, Harvey ___ claimed a number of lives, but it is a small fraction of Katrina’s 1,800+ victims.","answer":"has","vi":"Cho đến nay, Harvey đã cướp đi một số sinh mạng, nhưng đó chỉ là một phần nhỏ so với hơn 1.800 nạn nhân của Katrina.","explanation":"\"so far\" là dấu hiệu hiện tại hoàn thành → has."},{"q":"8. …but it is a ___ fraction of Katrina’s 1,800+ victims.","answer":"small","vi":"…nhưng đó chỉ là một phần nhỏ so với hơn 1.800 nạn nhân của Katrina.","explanation":"Trước \"fraction\" cần tính từ → small."},{"q":"9. From a meteorological perspective, though, how do these ___ compare?","answer":"storms","vi":"Nhưng xét từ góc độ khí tượng học, những cơn bão này so sánh với nhau như thế nào?","explanation":"Chủ ngữ số nhiều, chỉ các cơn bão → storms."},{"q":"10. Other than timing, do they have anything in ___ other than adjacent chambers in the nation’s memory?","answer":"common","vi":"Ngoài thời điểm xảy ra, liệu chúng có điểm gì chung khác ngoài việc cùng nằm trong ký ức của cả nước không?","explanation":"\"have something in common\" = có điểm chung."}],"roman":"VII"},{"navLabel":"Đọc hiểu 2","title":"Đọc hiểu – Trận động đất Nepal 2015","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"The 2015 Nepal Earthquake","html":"On April 25, 2015, a 7.8-magnitude earthquake rocked Nepal, caused buildings to collapse, set off avalanches <b>(1)</b> ___ Mount Everest and catapulted the entire region <b>(2)</b> ___ chaos. The worst earthquake in 80 years <b>(3)</b> ___ nearly 9,000 people, injured thousands, destroyed or damaged at <b>(4)</b> ___ 880,000 homes and more <b>(5)</b> ___ 1,200 health facilities. Multiple aftershocks throughout the region hampered rescue operations, <b>(6)</b> ___ survivors and added to the death and injury toll. Then the monsoon <b>(7)</b> ___ compounded the misery as survivors sought shelter amidst ruined <b>(8)</b> ___. AmeriCares immediately launched a <b>(9)</b> ___ relief effort sending aid workers, <b>(10)</b> ___ teams, and emergency medicines and supplies to the disaster zone.","vi":"Ngày 25/4/2015, một trận động đất cường độ 7.8 làm rung chuyển Nepal, khiến các tòa nhà sụp đổ, gây ra lở tuyết <b>(1)</b> ___ trên đỉnh Everest và đẩy toàn bộ khu vực <b>(2)</b> ___ vào hỗn loạn. Trận động đất tồi tệ nhất trong 80 năm <b>(3)</b> ___ đã giết chết gần 9.000 người, làm hàng ngàn người bị thương, phá hủy hoặc làm hư hại <b>(4)</b> ___ ít nhất 880.000 ngôi nhà và <b>(5)</b> ___ hơn 1.200 cơ sở y tế. Nhiều dư chấn khắp khu vực đã cản trở hoạt động cứu hộ, <b>(6)</b> ___ khiến người sống sót kinh hoàng và làm tăng thêm số người chết và bị thương. Sau đó <b>(7)</b> ___ mùa mưa càng làm trầm trọng thêm nỗi khổ khi người sống sót tìm nơi trú ẩn giữa những <b>(8)</b> ___ tòa nhà đổ nát. AmeriCares đã ngay lập tức triển khai một nỗ lực cứu trợ <b>(9)</b> ___ quy mô lớn, cử nhân viên cứu trợ, <b>(10)</b> ___ đội y tế, cùng thuốc men và vật tư khẩn cấp đến vùng thảm họa."},"questions":[{"q":"1. …set off avalanches (1) ___ Mount Everest…","options":["in","before","on","after"],"answer":2,"vi":"…gây ra lở tuyết trên đỉnh Everest…","explanation":"\"avalanches on Mount Everest\" = lở tuyết trên núi Everest.","vis":["trong (sai giới từ)","trước (sai giới từ)","avalanches on Mount Everest = lở tuyết trên núi Everest (đúng)","sau (sai giới từ)"]},{"q":"2. …and catapulted the entire region (2) ___ chaos.","options":["into","onto","to","in"],"answer":0,"vi":"…và đẩy toàn bộ khu vực vào hỗn loạn.","explanation":"\"catapult...into chaos\" = đẩy vào hỗn loạn.","vis":["catapult...into chaos = đẩy vào hỗn loạn (đúng)","lên trên (sai giới từ)","đến (sai giới từ)","trong (sai giới từ)"]},{"q":"3. The worst earthquake in 80 years (3) ___ nearly 9,000 people…","options":["kill","kills","killing","killed"],"answer":3,"vi":"Trận động đất tồi tệ nhất trong 80 năm đã giết chết gần 9.000 người…","explanation":"Động từ chính chia quá khứ đơn → killed.","vis":["giết (nguyên mẫu, sai thì)","giết (chia động từ, sai)","đang giết (V-ing, sai)","đã giết chết (quá khứ đơn, đúng)"]},{"q":"4. …destroyed or damaged at (4) ___ 880,000 homes…","options":["less","least","more","most"],"answer":1,"vi":"…phá hủy hoặc làm hư hại ít nhất 880.000 ngôi nhà…","explanation":"\"at least\" = ít nhất.","vis":["ít hơn (sai cụm)","at least = ít nhất (đúng)","nhiều hơn (sai cụm)","nhiều nhất (sai cụm)"]},{"q":"5. …and more (5) ___ 1,200 health facilities.","options":["than","then","until","without"],"answer":0,"vi":"…và hơn 1.200 cơ sở y tế.","explanation":"\"more than\" = hơn.","vis":["more than = hơn (đúng)","sau đó, lúc đó (sai nghĩa)","cho đến khi (sai nghĩa)","không có (sai nghĩa)"]},{"q":"6. Multiple aftershocks…hampered rescue operations, (6) ___ survivors…","options":["terrify","terrifies","terrified","terrifying"],"answer":3,"vi":"Nhiều dư chấn…cản trở hoạt động cứu hộ, khiến người sống sót kinh hoàng…","explanation":"Phân từ hiện tại bổ nghĩa → terrifying.","vis":["làm sợ hãi (nguyên mẫu, sai từ loại)","làm sợ hãi (chia động từ, sai)","sợ hãi (dùng cho người bị làm sợ, sai chủ ngữ ở đây)","gây kinh hoàng (phân từ hiện tại bổ nghĩa, đúng)"]},{"q":"7. Then the monsoon (7) ___ compounded the misery…","options":["area","size","time","season"],"answer":3,"vi":"Sau đó mùa mưa càng làm trầm trọng thêm nỗi khổ…","explanation":"\"monsoon season\" = mùa mưa (danh từ ghép).","vis":["khu vực (sai cụm)","kích thước (sai cụm)","thời gian (sai cụm)","monsoon season = mùa mưa (đúng, danh từ ghép)"]},{"q":"8. …as survivors sought shelter amidst ruined (8) ___.","options":["hills","buildings","rivers","mountains"],"answer":1,"vi":"…khi người sống sót tìm nơi trú ẩn giữa những tòa nhà đổ nát.","explanation":"\"ruined buildings\" = tòa nhà đổ nát, phù hợp ngữ cảnh động đất.","vis":["đồi (sai nghĩa)","ruined buildings = tòa nhà đổ nát (đúng)","sông (sai nghĩa)","núi (sai nghĩa)"]},{"q":"9. AmeriCares immediately launched a (9) ___ relief effort…","options":["high-class","short-term","large-scale","long-range"],"answer":2,"vi":"AmeriCares đã ngay lập tức triển khai một nỗ lực cứu trợ quy mô lớn…","explanation":"\"large-scale relief effort\" = nỗ lực cứu trợ quy mô lớn.","vis":["đẳng cấp cao (sai nghĩa)","ngắn hạn (sai nghĩa)","large-scale relief effort = nỗ lực cứu trợ quy mô lớn (đúng)","tầm xa, dài hạn (sai nghĩa)"]},{"q":"10. …sending aid workers, (10) ___ teams, and emergency medicines and supplies to the disaster zone.","options":["medicine","medical","medically","medicate"],"answer":1,"vi":"…cử nhân viên cứu trợ, đội y tế, cùng thuốc men và vật tư khẩn cấp đến vùng thảm họa.","explanation":"Trước danh từ \"teams\" cần tính từ → medical.","vis":["y học, thuốc (danh từ, sai từ loại)","thuộc y tế (tính từ, đúng trước \"teams\")","về mặt y tế (trạng từ, sai từ loại)","cho uống thuốc (động từ, sai từ loại)"]}],"roman":"VIII"},{"navLabel":"Đọc hiểu 3a","title":"Đọc hiểu – Tornado (trả lời câu hỏi)","icon":"book-open","instructions":"Đọc đoạn văn và trả lời các câu hỏi bằng tiếng Anh.","type":"sentence","instant":true,"passage":{"title":"Tornado","html":"A tornado is a violently rotating column of air that extends from a thunderstorm to the ground and is often – although not always – visible as a funnel cloud. Lightening and hail are common in thunderstorms that produce tornadoes. Tornadoes cause extensive damage to structures and disrupt transportation, power, water, gas, communications, and other services in its direct path and in neighbouring areas. Related thunderstorms can cause heavy rains, flash flooding, and hail.<br><br>About 1,200 tornadoes hit the United States every year and every state is at risk. Most tornadoes in the United States occur east of the Rocky Mountains with concentrations in the central and southern plains, the Gulf Coast and Florida.<br><br>Tornadoes can strike in any season, but occur most often in the spring and summer months. They can occur at all hours of the day and night, but are most likely to occur between 3 p.m. and 9 p.m.","vi":"Lốc xoáy là một cột không khí xoáy dữ dội kéo dài từ một cơn bão xuống mặt đất và thường – dù không phải luôn luôn – có thể thấy được dưới dạng đám mây hình phễu. Sét và mưa đá thường xuất hiện trong các cơn bão gây ra lốc xoáy. Lốc xoáy gây thiệt hại lớn cho các công trình và làm gián đoạn giao thông, điện, nước, khí đốt, liên lạc và các dịch vụ khác trên đường đi trực tiếp và các khu vực lân cận. Các cơn bão liên quan có thể gây ra mưa lớn, lũ quét và mưa đá.<br><br>Khoảng 1.200 cơn lốc xoáy xảy ra ở Mỹ mỗi năm và mọi bang đều có nguy cơ. Hầu hết lốc xoáy ở Mỹ xảy ra ở phía đông dãy núi Rocky, tập trung ở vùng đồng bằng trung tâm và phía nam, vùng Vịnh và Florida.<br><br>Lốc xoáy có thể xảy ra vào bất kỳ mùa nào, nhưng thường xảy ra nhất vào mùa xuân và mùa hè. Chúng có thể xảy ra vào bất kỳ giờ nào trong ngày và đêm, nhưng dễ xảy ra nhất trong khoảng từ 3 giờ chiều đến 9 giờ tối."},"questions":[{"q":"1. What is a tornado?","answer":"It is a violently rotating column of air that is often visible as a funnel cloud.","accepted":["It is a violently rotating column of air that is often visible as a funnel cloud."],"vi":"Lốc xoáy là gì?","explanation":"Bài đọc định nghĩa lốc xoáy là \"a violently rotating column of air…visible as a funnel cloud\"."},{"q":"2. What is common in thunderstorms that produce tornadoes?","answer":"Lightning and hail are common in thunderstorms that produce tornadoes.","accepted":["Lightning and hail are common in thunderstorms that produce tornadoes."],"vi":"Điều gì phổ biến trong các cơn bão gây ra lốc xoáy?","explanation":"Bài đọc nói \"Lightening and hail are common in thunderstorms that produce tornadoes.\""},{"q":"3. What can related thunderstorms cause?","answer":"Related thunderstorms can cause heavy rains, flash flooding, and hail.","accepted":["Related thunderstorms can cause heavy rains, flash flooding, and hail."],"vi":"Các cơn bão liên quan có thể gây ra điều gì?","explanation":"Bài đọc nói các cơn bão liên quan \"can cause heavy rains, flash flooding, and hail\"."},{"q":"4. How many tornadoes hit the United States every year?","answer":"About 1,200 tornadoes hit the United States every year.","accepted":["About 1,200 tornadoes hit the United States every year."],"vi":"Có bao nhiêu cơn lốc xoáy xảy ra ở Mỹ mỗi năm?","explanation":"Bài đọc nói \"About 1,200 tornadoes hit the United States every year.\""},{"q":"5. Which seasons can tornadoes strike?","answer":"Tornadoes can strike in any season, but occur most often in the spring and summer months.","accepted":["Tornadoes can strike in any season, but occur most often in the spring and summer months."],"vi":"Lốc xoáy có thể xảy ra vào mùa nào?","explanation":"Bài đọc nói lốc xoáy \"can strike in any season, but occur most often in the spring and summer months\"."}],"roman":"IX"},{"navLabel":"Đọc hiểu 3b","title":"Đọc hiểu – Tornado (Đúng/Sai)","icon":"book-open","instructions":"Đọc đoạn văn và chọn Đúng (True) hoặc Sai (False) cho mỗi câu.","type":"mcq","instant":true,"passage":{"title":"Tornado","html":"A tornado is a violently rotating column of air that extends from a thunderstorm to the ground and is often – although not always – visible as a funnel cloud. Lightening and hail are common in thunderstorms that produce tornadoes. Tornadoes cause extensive damage to structures and disrupt transportation, power, water, gas, communications, and other services in its direct path and in neighbouring areas. Related thunderstorms can cause heavy rains, flash flooding, and hail.<br><br>About 1,200 tornadoes hit the United States every year and every state is at risk. Most tornadoes in the United States occur east of the Rocky Mountains with concentrations in the central and southern plains, the Gulf Coast and Florida.<br><br>Tornadoes can strike in any season, but occur most often in the spring and summer months. They can occur at all hours of the day and night, but are most likely to occur between 3 p.m. and 9 p.m.","vi":"Lốc xoáy là một cột không khí xoáy dữ dội kéo dài từ một cơn bão xuống mặt đất và thường – dù không phải luôn luôn – có thể thấy được dưới dạng đám mây hình phễu. Sét và mưa đá thường xuất hiện trong các cơn bão gây ra lốc xoáy. Lốc xoáy gây thiệt hại lớn cho các công trình và làm gián đoạn giao thông, điện, nước, khí đốt, liên lạc và các dịch vụ khác trên đường đi trực tiếp và các khu vực lân cận. Các cơn bão liên quan có thể gây ra mưa lớn, lũ quét và mưa đá.<br><br>Khoảng 1.200 cơn lốc xoáy xảy ra ở Mỹ mỗi năm và mọi bang đều có nguy cơ. Hầu hết lốc xoáy ở Mỹ xảy ra ở phía đông dãy núi Rocky, tập trung ở vùng đồng bằng trung tâm và phía nam, vùng Vịnh và Florida.<br><br>Lốc xoáy có thể xảy ra vào bất kỳ mùa nào, nhưng thường xảy ra nhất vào mùa xuân và mùa hè. Chúng có thể xảy ra vào bất kỳ giờ nào trong ngày và đêm, nhưng dễ xảy ra nhất trong khoảng từ 3 giờ chiều đến 9 giờ tối."},"questions":[{"q":"6. (Đúng/Sai) A tornado extends from thunderstorm to the ground.","options":["True","False"],"answer":0,"vis":["Đúng","Sai"],"vi":"Lốc xoáy kéo dài từ cơn bão xuống mặt đất.","explanation":"Bài đọc nói lốc xoáy \"extends from a thunderstorm to the ground\" → Đúng (True)."},{"q":"7. (Đúng/Sai) Tornadoes cause slight damage to structures.","options":["True","False"],"answer":1,"vis":["Đúng","Sai"],"vi":"Lốc xoáy gây thiệt hại nhẹ cho các công trình.","explanation":"Bài đọc nói lốc xoáy gây \"extensive damage\" (thiệt hại lớn), không phải nhẹ → Sai (False)."},{"q":"8. (Đúng/Sai) Every state in the US is at risk of being hit by tornadoes.","options":["True","False"],"answer":0,"vis":["Đúng","Sai"],"vi":"Mọi bang ở Mỹ đều có nguy cơ bị lốc xoáy tấn công.","explanation":"Bài đọc nói \"every state is at risk\" → Đúng (True)."},{"q":"9. (Đúng/Sai) No tornadoes in the United States occur east of the Rocky Mountains, the Gulf Coast and Florida.","options":["True","False"],"answer":1,"vis":["Đúng","Sai"],"vi":"Không có cơn lốc xoáy nào ở Mỹ xảy ra ở phía đông dãy Rocky, vùng Vịnh và Florida.","explanation":"Bài đọc nói phần lớn lốc xoáy xảy ra \"east of the Rocky Mountains\" → Sai (False)."},{"q":"10. (Đúng/Sai) Tornadoes occur between 3 p.m. and 9 p.m. only.","options":["True","False"],"answer":1,"vis":["Đúng","Sai"],"vi":"Lốc xoáy chỉ xảy ra từ 3 giờ chiều đến 9 giờ tối.","explanation":"Bài đọc nói lốc xoáy có thể xảy ra vào bất kỳ giờ nào, chỉ là \"most likely\" (dễ xảy ra nhất) trong khung giờ đó, không phải \"chỉ\" → Sai (False)."}],"roman":"X"},{"navLabel":"Đọc hiểu 4a","title":"Đọc hiểu – Hurricanes, Cyclones and Typhoons","icon":"book-open","instructions":"Đọc đoạn văn và trả lời các câu hỏi bằng tiếng Anh.","type":"sentence","instant":true,"passage":{"title":"Hurricanes, Cyclones and Typhoons","html":"Hurricanes, cyclones, and typhoons are all the same weather phenomenon; we just use different names for these storms in different places. In the Atlantic and Northeast Pacific, the term \"hurricane\" is used. The same type of disturbance in the Northwest Pacific is called a \"typhoon\" and \"cyclones\" occur in the South Pacific and Indian Ocean. The ingredients for these storms include a pre-existing weather disturbance, warm tropical oceans, moisture, and relatively light winds. If the right conditions persist long enough, they can combine to produce the violent winds, incredible waves, torrential rains, and floods we associate with this phenomenon. In the Atlantic, hurricane season officially runs June 1 to November 30. However, while 97 percent of tropical activity occurs during this time period, there is nothing magical in these dates, and hurricanes have occurred outside of these six months.","vi":"Bão hurricane, cyclone và typhoon đều là cùng một hiện tượng thời tiết; chúng ta chỉ dùng tên gọi khác nhau ở những nơi khác nhau. Ở Đại Tây Dương và Đông Bắc Thái Bình Dương, người ta dùng từ \"hurricane\". Cùng loại nhiễu động đó ở Tây Bắc Thái Bình Dương được gọi là \"typhoon\", còn \"cyclone\" xảy ra ở Nam Thái Bình Dương và Ấn Độ Dương. Thành phần tạo nên các cơn bão này gồm một nhiễu động thời tiết có sẵn, đại dương nhiệt đới ấm, độ ẩm và gió tương đối nhẹ. Nếu điều kiện thích hợp kéo dài đủ lâu, chúng có thể kết hợp tạo ra gió mạnh, sóng khổng lồ, mưa như trút và lũ lụt mà ta thường liên tưởng đến hiện tượng này. Ở Đại Tây Dương, mùa bão chính thức kéo dài từ 1/6 đến 30/11. Tuy nhiên, dù 97% hoạt động nhiệt đới xảy ra trong khoảng thời gian này, không có gì thần kỳ về những ngày này cả, và bão đã từng xảy ra ngoài sáu tháng đó."},"questions":[{"q":"1. Which name is used for very big storms in Northwest Pacific?","answer":"Typhoon","accepted":["Typhoon"],"vi":"Tên gọi nào được dùng cho những cơn bão lớn ở Tây Bắc Thái Bình Dương?","explanation":"Bài đọc nói \"the same type of disturbance in the Northwest Pacific is called a ‘typhoon’\"."},{"q":"2. Where is the name \"cyclones\" used?","answer":"South Pacific and Indian Ocean","accepted":["South Pacific and Indian Ocean"],"vi":"Tên gọi \"cyclones\" được dùng ở đâu?","explanation":"Bài đọc nói \"‘cyclones’ occur in the South Pacific and Indian Ocean\"."},{"q":"3. What are the features of the severe storms which occur within a long time?","answer":"They produce the violent winds, incredible waves, torrential rains, and floods.","accepted":["They produce the violent winds, incredible waves, torrential rains, and floods."],"vi":"Đặc điểm của những cơn bão dữ dội kéo dài là gì?","explanation":"Bài đọc nói chúng \"produce the violent winds, incredible waves, torrential rains, and floods\"."},{"q":"4. When do hurricanes often occur?","answer":"Between June 1 and November 30","accepted":["Between June 1 and November 30"],"vi":"Bão thường xảy ra khi nào?","explanation":"Bài đọc nói \"hurricane season officially runs June 1 to November 30\"."},{"q":"5. Is it possible that hurricanes can occur even when it is not hurricane season?","answer":"Yes, it is.","accepted":["Yes, it is."],"vi":"Có thể xảy ra bão ngay cả khi không phải mùa bão không?","explanation":"Bài đọc nói \"hurricanes have occurred outside of these six months\" → Có."}],"roman":"XI"},{"navLabel":"Đọc hiểu 4b","title":"Đọc hiểu – Japan Earthquake & Tsunami 2011 (trả lời câu hỏi)","icon":"book-open","instructions":"Đọc đoạn văn và trả lời các câu hỏi bằng tiếng Anh.","type":"sentence","instant":true,"passage":{"title":"Japan Earthquake &amp; Tsunami in 2011","html":"On March 11, 2011, there was a magnitude-9 earthquake in north-eastern Japan. This natural disaster was so terrible and lead to a lot of changes in Japanese’s life.<br><br>According to some newspaper, more than 120,000 buildings were destroyed, 278,000 were half-destroyed and 726,000 were partially destroyed. The Japanese government estimated that the direct financial damage from the disaster was about $199 billion dollars (about 16.9 trillion yen). The World Bank also estimated the total economic cost could be up to $235 billion. Therefore, it was considered to be one of the costliest natural disaster in world history. In Japan, residents have been still recovering from the disaster. Their effort to lead a new life is so amazing, although some people lost their property or even family members. They have continued to rebuild their houses, the road systems or factories. All the world looks up to those Japanese because of their considerable effort.","vi":"Ngày 11/3/2011, xảy ra trận động đất cường độ 9 độ ở đông bắc Nhật Bản. Thảm họa thiên nhiên này khủng khiếp đến mức gây ra rất nhiều thay đổi trong cuộc sống của người Nhật.<br><br>Theo một số tờ báo, hơn 120.000 tòa nhà bị phá hủy hoàn toàn, 278.000 bị phá hủy một nửa và 726.000 bị hư hại một phần. Chính phủ Nhật Bản ước tính thiệt hại tài chính trực tiếp từ thảm họa này khoảng 199 tỷ đô la (khoảng 16,9 nghìn tỷ yên). Ngân hàng Thế giới cũng ước tính tổng chi phí kinh tế có thể lên tới 235 tỷ đô la. Do đó, đây được coi là một trong những thảm họa thiên nhiên tốn kém nhất trong lịch sử thế giới. Ở Nhật Bản, người dân vẫn đang hồi phục sau thảm họa. Nỗ lực xây dựng lại cuộc sống mới của họ thật đáng kinh ngạc, dù một số người đã mất tài sản hoặc thậm chí người thân. Họ tiếp tục xây lại nhà cửa, hệ thống đường sá hay nhà máy. Cả thế giới ngưỡng mộ người Nhật vì nỗ lực đáng kể của họ."},"questions":[{"q":"6. When did the earthquake in Japan happen?","answer":"The earthquake in Japan happened on March 11, 2011.","accepted":["The earthquake in Japan happened on March 11, 2011."],"vi":"Trận động đất ở Nhật xảy ra khi nào?","explanation":"Bài đọc nói \"On March 11, 2011, there was a magnitude-9 earthquake\"."},{"q":"7. Were 278,000 buildings destroyed totally?","answer":"No, more than 120,000 buildings were totally destroyed.","accepted":["No, more than 120,000 buildings were totally destroyed."],"vi":"Có phải 278.000 tòa nhà bị phá hủy hoàn toàn không?","explanation":"Bài đọc nói 278.000 tòa nhà chỉ bị \"half-destroyed\" (phá hủy một nửa); số bị phá hủy hoàn toàn là hơn 120.000."},{"q":"8. Who did estimate the financial damage of this earthquake?","answer":"The Japanese government.","accepted":["The Japanese government."],"vi":"Ai đã ước tính thiệt hại tài chính của trận động đất này?","explanation":"Bài đọc nói \"The Japanese government estimated that the direct financial damage…\"."},{"q":"9. Was the cost of this natural disaster expensive?","answer":"Yes, it was.","accepted":["Yes, it was."],"vi":"Chi phí của thảm họa thiên nhiên này có đắt đỏ không?","explanation":"Bài đọc nói đây \"one of the costliest natural disaster in world history\" → Có, rất đắt đỏ."},{"q":"10. What did Japanese residents do after the disaster?","answer":"They tried to recover from the disaster and rebuild their houses, roads and factories.","accepted":["They tried to recover from the disaster and rebuild their houses, roads and factories."],"vi":"Người dân Nhật Bản đã làm gì sau thảm họa?","explanation":"Bài đọc nói họ \"have continued to rebuild their houses, the road systems or factories\"."}],"roman":"XII"},{"navLabel":"Đọc hiểu 4c","title":"Đọc hiểu – Japan Earthquake & Tsunami 2011 (Đúng/Sai)","icon":"book-open","instructions":"Đọc đoạn văn và chọn Đúng (True) hoặc Sai (False) cho mỗi câu.","type":"mcq","instant":true,"passage":{"title":"Japan Earthquake &amp; Tsunami in 2011","html":"On March 11, 2011, there was a magnitude-9 earthquake in north-eastern Japan. This natural disaster was so terrible and lead to a lot of changes in Japanese’s life.<br><br>According to some newspaper, more than 120,000 buildings were destroyed, 278,000 were half-destroyed and 726,000 were partially destroyed. The Japanese government estimated that the direct financial damage from the disaster was about $199 billion dollars (about 16.9 trillion yen). The World Bank also estimated the total economic cost could be up to $235 billion. Therefore, it was considered to be one of the costliest natural disaster in world history. In Japan, residents have been still recovering from the disaster. Their effort to lead a new life is so amazing, although some people lost their property or even family members. They have continued to rebuild their houses, the road systems or factories. All the world looks up to those Japanese because of their considerable effort.","vi":"Ngày 11/3/2011, xảy ra trận động đất cường độ 9 độ ở đông bắc Nhật Bản. Thảm họa thiên nhiên này khủng khiếp đến mức gây ra rất nhiều thay đổi trong cuộc sống của người Nhật.<br><br>Theo một số tờ báo, hơn 120.000 tòa nhà bị phá hủy hoàn toàn, 278.000 bị phá hủy một nửa và 726.000 bị hư hại một phần. Chính phủ Nhật Bản ước tính thiệt hại tài chính trực tiếp từ thảm họa này khoảng 199 tỷ đô la (khoảng 16,9 nghìn tỷ yên). Ngân hàng Thế giới cũng ước tính tổng chi phí kinh tế có thể lên tới 235 tỷ đô la. Do đó, đây được coi là một trong những thảm họa thiên nhiên tốn kém nhất trong lịch sử thế giới. Ở Nhật Bản, người dân vẫn đang hồi phục sau thảm họa. Nỗ lực xây dựng lại cuộc sống mới của họ thật đáng kinh ngạc, dù một số người đã mất tài sản hoặc thậm chí người thân. Họ tiếp tục xây lại nhà cửa, hệ thống đường sá hay nhà máy. Cả thế giới ngưỡng mộ người Nhật vì nỗ lực đáng kể của họ."},"questions":[{"q":"11. (Đúng/Sai) The World Bank also estimated the direct financial damage of the disaster was about $199 million.","options":["True","False"],"answer":1,"vis":["Đúng","Sai"],"vi":"Ngân hàng Thế giới cũng ước tính thiệt hại tài chính trực tiếp của thảm họa là khoảng 199 triệu đô la.","explanation":"Đây là ước tính của CHÍNH PHỦ NHẬT BẢN (không phải World Bank), và là 199 TỶ (không phải triệu) → Sai (False)."},{"q":"12. (Đúng/Sai) The cost of the natural disaster is cheapest in the world history.","options":["True","False"],"answer":1,"vis":["Đúng","Sai"],"vi":"Chi phí của thảm họa thiên nhiên này là rẻ nhất trong lịch sử thế giới.","explanation":"Bài đọc nói đây là một trong những thảm họa TỐN KÉM NHẤT (costliest), không phải rẻ nhất → Sai (False)."},{"q":"13. (Đúng/Sai) Japanese’s effort is so amazing.","options":["True","False"],"answer":0,"vis":["Đúng","Sai"],"vi":"Nỗ lực của người Nhật thật đáng kinh ngạc.","explanation":"Bài đọc nói \"Their effort to lead a new life is so amazing\" → Đúng (True)."},{"q":"14. (Đúng/Sai) They reconstruct their houses.","options":["True","False"],"answer":0,"vis":["Đúng","Sai"],"vi":"Họ xây dựng lại nhà cửa.","explanation":"Bài đọc nói họ \"have continued to rebuild their houses\" → Đúng (True)."},{"q":"15. (Đúng/Sai) People in the world look up to Japanese residents.","options":["True","False"],"answer":0,"vis":["Đúng","Sai"],"vi":"Người dân trên thế giới ngưỡng mộ người dân Nhật Bản.","explanation":"Bài đọc nói \"All the world looks up to those Japanese\" → Đúng (True)."}],"roman":"XIII"},{"navLabel":"Đọc hiểu 5","title":"Đọc hiểu – Earth Day (Ngày Trái Đất)","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"Earth Day Network","html":"Earth Day Network's mission is to diversify, educate and activate the environmental movement worldwide. More <b>(1)</b> ___ 1 billion people now participate in Earth Day activities <b>(2)</b> ___ year. This can make it the largest observance in the world. Members of this organization <b>(3)</b> ___ through a combination of education, public pol
