 + saw + O + V(-ing) (thấy ai làm/đang làm gì).","note":"As + S + was/were + V-ing, S + saw + O + V"}],"roman":"XIII"},{"navLabel":"Viết 2","title":"Complete the second sentence so that it has a similar meaning","icon":"pen-to-square","instructions":"Viết lại câu thứ hai sao cho nghĩa không đổi so với câu thứ nhất, bắt đầu bằng từ gợi ý.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"The fable is very exciting.","starter":"What","answer":"an exciting fable!","accepted":["an exciting fable"],"vi":"Truyện ngụ ngôn này rất thú vị.","explanation":"Câu cảm thán với danh từ số ít đếm được → What + a/an + adj + N!","note":"What + a/an + adjective + noun!"},{"q":"2.","original":"The book was so good that I couldn’t stop reading it.","starter":"It was","answer":"such a good book that I couldn’t stop reading it.","accepted":["such a good book that i couldn’t stop reading it","such a good book that i could not stop reading it"],"vi":"Cuốn sách hay đến mức tôi không thể ngừng đọc nó.","explanation":"\"so + adj + that\" chuyển thành \"such a + adj + N + that\".","note":"It was such a + adjective + noun + that + S + V"},{"q":"3.","original":"The children were doing their homework when I got home.","starter":"While","answer":"the children were doing their homework, I got home.","accepted":["the children were doing their homework, i got home"],"vi":"Bọn trẻ đang làm bài tập khi tôi về nhà.","explanation":"Đảo vị trí mệnh đề với \"While\" đứng đầu câu.","note":"While + S + was/were + V-ing, S + V-ed"},{"q":"4.","original":"She finds it difficult to remember all the story.","starter":"It’s","answer":"difficult for her to remember all the story.","accepted":["difficult for her to remember all the story"],"vi":"Cô ấy thấy khó để nhớ hết câu chuyện.","explanation":"\"find it + adj + to V\" chuyển thành \"It’s + adj + for + O + to V\".","note":"It’s + adjective + for + O + to V"},{"q":"5.","original":"Sleeping Beauty is not as interesting as Beauty and the Beast."," 697"],"vi":"Charles Perrault đã viết Lọ Lem bằng tiếng Pháp vào năm 1697.","explanation":"Chuyển từ chủ động sang bị động, chủ ngữ mới là tân ngữ cũ \"Cinderella\".","note":"S (bị động) + was/were + V3 + by + tác giả"},{"q":"10.","original":"I had a shower and the telephone rang.","starter":"When I","answer":"was having a shower, the telephone rang.","accepted":["was having a shower, the telephone rang"],"vi":"Tôi đang tắm thì điện thoại reo.","explanation":"Hành động đang diễn ra bị xen vào → quá khứ tiếp diễn.","note":"When I + was/were + V-ing, S + V-ed"}],"roman":"XIV"},{"navLabel":"Viết 3","title":"Complete the second sentence using the words given","icon":"pen-to-square","instructions":"Viết lại câu thứ hai sao cho nghĩa không đổi so với câu thứ nhất, dùng từ gợi ý cho sẵn.","type":"sentence","instant":true,"questions":[{"q":"1.","original":"It was not a good idea for you to refuse the offer of that job. (down)","starter":"You should","answer":"not turn down the offer of that job.","accepted":["not turn down the offer of that job"],"vi":"Bạn không nên từ chối lời mời công việc đó.","explanation":"\"turn down\" = từ chối.","note":"You should not turn down + N"},{"q":"2.","original":"My teacher suggested that I spent the summer in England. (advised)","starter":"My teacher","answer":"advised me to spend the summer in England.","accepted":["advised me to spend the summer in england"],"vi":"Giáo viên của tôi khuyên tôi nên dành mùa hè ở nước Anh.","explanation":"advise + O + to V.","note":"advised + O + to V"},{"q":"3.","original":"The film is not as interesting as the novel was. (much)","starter":"The novel","answer":"was much more interesting than the film.","accepted":["was much more interesting than the film"],"vi":"Cuốn tiểu thuyết thú vị hơn nhiều so với bộ phim.","explanation":"\"not as...as\" chuyển thành so sánh hơn, nhấn mạnh bằng \"much\".","note":"much + more + adjective + than"},{"q":"4.","original":"Could you speak English when you were younger? (able)","starter":"When you were younger,","answer":"were you able to speak English?","accepted":["were you able to speak english"],"vi":"Khi còn nhỏ, bạn có thể nói tiếng Anh không?","explanation":"\"could\" (khả năng ở quá khứ) chuyển thành \"was/were able to\".","note":"were + S + able to + V-inf?"},{"q":"5.","original":"Could I borrow some change for the telephone? (lend)","starter":"Could","answer":"you lend me some change for the telephone?","accepted":["you lend me some change for the telephone"],"vi":"Bạn có thể cho tôi mượn ít tiền lẻ để gọi điện thoại không?","explanation":"\"borrow from someone\" chuyển thành \"lend someone\" (đổi chủ thể).","note":"Could + S + lend + O + N?"},{"q":"6.","original":"It’s ages since my sister and I had an argument. (for)","starter":"My sister and I","answer":"haven’t had an argument for ages.","accepted":["haven’t had an argument for ages","have not had an argument for ages"],"vi":"Chị tôi và tôi đã không cãi nhau từ rất lâu rồi.","explanation":"\"It’s + time + since + S + last + V-ed\" chuyển thành \"S + haven’t + V3 + for + time\".","note":"S + haven’t + V3 + for + khoảng thời gian"},{"q":"7.","original":"While we were going home, we had an accident. (way)","starter":"We","answer":"had an accident while we were on our way home.","accepted":["had an accident while we were on our way home"],"vi":"Chúng tôi gặp tai nạn trên đường về nhà.","explanation":"\"while + S + were going home\" chuyển thành \"while + S + were on + sở hữu cách + way home\".","note":"while + S + were on + sở hữu cách + way home"},{"q":"8.","original":"I’ve been learning English for three years. (started)","starter":"I","answer":"started learning English three years ago.","accepted":["started learning english three years ago"],"vi":"Tôi bắt đầu học tiếng Anh cách đây ba năm.","explanation":"Hiện tại hoàn thành tiếp diễn \"have been V-ing for\" chuyển thành quá khứ đơn \"started V-ing...ago\".","note":"S + started + V-ing + khoảng thời gian + ago"}],"roman":"X function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[‘’]/g,"'")
    .replace(/["“”]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-32':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

  nav.innerHTML = theoryBtn + DATA.sections.map((s,i)=>

  ).join('') + writingBtn;
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-violet-200 text-violet-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-violet-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-violet-700 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}
function renderBank(bank){
  if(!bank || !bank.length) return '';
  return `<div class="mb-4"><p class="text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide"><i class="fa-solid fa-list-ul mr-1"></i>Từ gợi ý</p>

      ${bank.map(w=>`<div class="px-3 py-2 text-center border border-slate-300 bg-white">${w}</div>`).join('')}

}

    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;

             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-violet-100 text-violet-700 hover:bg-violet-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">

      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = s.bank ? 'w-40' : widthFor(q.answer);

      if(q.starter){
        inner += `${origBlock}

      }
    } else if(s.type==='reorder'){
      const promptBlock = q.prompt ? `<p class="text-slate-500 text-sm mb-2 italic">${q.prompt}</p>` : '';

  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-violet-700 to-fuchsia-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page space-y-4">${inner}</section>`;
}

function renderTheory(){
  return `<section id="tab-theory" class="section-page active space-y-4">
    <h2 class="text-xl md:text-2xl font-extrabold text-violet-700 flex items-center gap-2 mb-1"><i class="fa-solid fa-book-open text-amber-400"></i> Lý thuyết: Unit 6 - Folk Tales</h2>
    <p class="text-sm text-slate-500 mb-3 italic">Từ vựng, cấu tạo từ (word formation) và ngữ pháp trọng tâm của bài. Hãy ôn lại trước khi làm các phần luyện tập bên dưới.</p>
    ${THEORY_HTML}
  </section>`;
}

function renderWriting(){
  return `<section id="tab-writing" class="section-page space-y-4">
    <div class="task-card bg-white rounded-2xl shadow-md p-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="bg-pink-100 text-pink-700 font-black text-lg w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-pen-nib"></i></div>
        <div>
          <h2 class="text-xl font-extrabold text-pink-700">XVI. Viết đoạn văn (Writing)</h2>
          <p class="text-sm text-slate-500">Write a short paragraph about the folk tale that impresses you the most, telling the moral lesson you have learnt from it.</p>
        </div>
      </div>
      <div class="bg-pink-50 border border-pink-200 rounded-xl p-4 text-sm text-slate-700 mb-4">
        <b class="text-pink-700">Gợi ý cách tổ chức ý:</b>
        <ul class="mt-1 space-y-0.5">
          <li>• <b>Mở đầu:</b> tên câu chuyện và vì sao bạn ấn tượng với nó.</li>
          <li>• <b>Tóm tắt ngắn gọn:</b> nhân vật chính, sự việc chính (dùng quá khứ đơn/tiếp diễn).</li>
          <li>• <b>Bài học đạo đức:</b> câu chuyện dạy bạn điều gì.</li>
          <li>• <b>Kết luận:</b> ý nghĩa của câu chuyện với bản thân bạn.</li>
        </ul>
      </div>
      <textarea id="essay-input" rows="9" class="answer-input w-full px-3 py-2 rounded-lg text-sm" placeholder="Viết đoạn văn của bạn ở đây…"></textarea>
      <div class="mt-2 text-xs text-slate-400" id="essay-count">Số từ: 0</div>
      <div class="mt-3 flex gap-3 flex-wrap">
        <button onclick="toggleModelEssay()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold px-5 py-2.5 rounded-full transition hover:scale-105 shadow"><i class="fa-solid fa-eye mr-1"></i>Xem đoạn văn mẫu</button>
      </div>
      <div id="model-essay" class="vi-hidden mt-3 bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-slate-700 leading-relaxed">
        <b class="text-blue-700">Outline gợi ý:</b>
        <div class="mt-2 bg-white/70 border border-blue-100 rounded-lg p-3">
          <p><b>1. Introduction:</b> the name of the tale and why it impressed you.</p>
          <p><b>2. Summary:</b> main characters and events (past simple/continuous).</p>
          <p><b>3. Moral lesson:</b> what the story teaches.</p>
          <p><b>4. Conclusion:</b> why the lesson matters to you.</p>
        </div>
        <div class="mt-3">
          <b class="text-blue-700">Đoạn văn mẫu:</b><br>
          The folk tale that impresses me the most is "The Tortoise and the Hare". In the story, a hare boasted about how fast he could run, so he challenged a tortoise to a race. While the hare was running far ahead, he decided to take a nap because he was so confident that he would win. Meanwhile, the slow but determined tortoise kept walking steadily without stopping. When the hare woke up, he was shocked to see that the tortoise had already crossed the finish line. This simple story taught me an important moral lesson: being talented is not enough if you are careless, while steady effort and patience can lead to success. Since I read this tale, I have tried to work hard and stay consistent instead of relying only on my abilities.
        </div>
        <div class="mt-3 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
          <b class="text-emerald-700">Dịch nghĩa:</b><br>
          Câu chuyện dân gian khiến tôi ấn tượng nhất là "Rùa và Thỏ". Trong câu chuyện, một chú thỏ khoe khoang về việc mình chạy nhanh đến mức nào, vì vậy nó thách một chú rùa chạy đua. Trong khi thỏ đang chạy dẫn trước rất xa, nó quyết định ngủ một giấc vì quá tự tin rằng mình sẽ thắng. Trong khi đó, chú rùa chậm chạp nhưng kiên trì vẫn tiếp tục bước đi đều đặn không ngừng nghỉ. Khi thỏ tỉnh dậy, nó sốc khi thấy rùa đã về đích trước. Câu chuyện đơn giản này dạy tôi một bài học quan trọng: có tài năng thôi chưa đủ nếu bạn chủ quan, trong khi sự nỗ lực bền bỉ và kiên nhẫn có thể dẫn đến thành công. Kể từ khi đọc câu chuyện này, tôi đã cố gắng làm việc chăm chỉ và kiên trì thay vì chỉ dựa vào khả năng của mình.

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = renderTheory() + DATA.sections.map((s,i)=>renderSection(s,i)).join('') + renderWriting();
  DATA.sections.forEach((s,idx)=>{
    if(s.type==='reorder'){ s.questions.forEach((q,i)=>renderReorderLine(idx,i)); }
  });
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function addChip(idx,i,j){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) reorderState[key] = [];
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(!chip || chip.classList.contains('used')) return;
  chip.classList.add('used');
  reorderState[key].push(j);
  renderReorderLine(idx,i);
  if(DATA.sections[idx].instant){ gradeOneSentence(idx,i); }
}
function removeChip(idx,i,pos){
  const key = `${idx}_${i}`;
  if(!reorderState[key]) return;
  const j = reorderState[key][pos];
  reorderState[key].splice(pos,1);
  const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
  if(chip) chip.classList.remove('used');
  renderReorderLine(idx,i);
  if(DATA.sections[idx].instant){ gradeOneSentence(idx,i); }
}
function clearChips(idx,i){
  const key = `${idx}_${i}`;
  (reorderState[key]||[]).forEach(j=>{
    const chip = document.getElementById(`chip_${idx}_${i}_${j}`);
    if(chip) chip.classList.remove('used');
  });
  reorderState[key] = [];
  renderReorderLine(idx,i);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
}
function renderReorderLine(idx,i){
  const key = `${idx}_${i}`;
  const words = DATA.sections[idx].questions[i].words;
  const line = document.getElementById(`line_${idx}_${i}`);
  const inp = document.getElementById(`inp_${idx}_${i}`);
  const seq = reorderState[key]||[];
  if(!seq.length){
    line.innerHTML = `<span class="text-slate-400 text-sm italic">Nhấp vào các từ bên trên theo đúng thứ tự…</span>`;
  } else {
    line.innerHTML = seq.map((wi,pos)=>`<span class="word-chip bg-lime-500 text-white font-bold text-sm px-3 py-1.5 rounded-xl" onclick="removeChip(${idx},${i},${pos})">${words[wi]}</span>`).join('');
  }
  if(inp) inp.value = seq.map(wi=>words[wi]).join(' ');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else if(s.type==='reorder'){
      clearChips(idx,i);
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btnId = idx==='theory' ? 'navbtn_theory' : idx==='writing' ? 'navbtn_writing' : `navbtn_${idx}`;
  const btn=document.getElementById(btnId);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#4c1d95','#a21caf','#b45309','#c026d3','#a855f7','#f0abfc'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();

(function(){
  const essay = document.getElementById('essay-input');
  if(essay){
    essay.addEventListener('input', () => {
      const words = essay.value.trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('essay-count').textContent = `Số từ: ${words}`;
    });
  }
})();

</script>
