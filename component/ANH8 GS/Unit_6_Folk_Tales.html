tôi miễn là bạn trả lại vào ngày mai.","explanation":"\"as long as\" = miễn là.","note":"as long as + S + V (điều kiện)","vis":["miễn là (đúng)","mặc dù (sai nghĩa)","tuy nhiên (sai nghĩa/vị trí)","mặc dù (theo sau danh từ, sai cấu trúc)"]},{"q":"2. My brother always ___ at cards. No wonder he won every game.","options":["cheated","lied","tricked","deceived"],"answer":2,"vi":"Anh trai tôi luôn chơi bài không trung thực. Chẳng trách anh ấy thắng mọi ván.","explanation":"Theo đáp án của tài liệu ôn tập, \"tricked\" phù hợp trong ngữ cảnh này.","note":"từ vựng phù hợp ngữ cảnh","vis":["gian lận (đúng — cheat at cards)","nói dối (sai nghĩa)","lừa (sai cấu trúc)","lừa dối (sai cấu trúc)"]},{"q":"3. He was so tired that he wasn’t capable ___ driving himself home.","options":["to","for","of","from"],"answer":2,"vi":"Anh ấy mệt đến nỗi không thể tự lái xe về nhà.","explanation":"\"be capable of + V-ing\" = có khả năng làm gì.","note":"be capable of + V-ing","vis":["đến (sai giới từ)","cho (sai giới từ)","về (đúng — capable of)","từ (sai giới từ)"]},{"q":"4. Fill in the form as indicated and return it in the envelope ___.","options":["provided","offered","prepared","given"],"answer":0,"vi":"Điền vào mẫu đơn theo hướng dẫn và gửi lại trong phong bì đã cung cấp.","explanation":"Mệnh đề quan hệ rút gọn bị động: \"the envelope [that was] provided\" = provided.","note":"noun + V3 (rút gọn mệnh đề quan hệ bị động)","vis":["được cung cấp (đúng)","được đề nghị (sai nghĩa)","được chuẩn bị (sai nghĩa)","được đưa ra (sai nghĩa)"]},{"q":"5. I wish you ___ to her why we couldn’t go.","options":["would explain","to explain","explained","will explain"],"answer":0,"vi":"Tôi ước gì bạn giải thích cho cô ấy lý do chúng ta không thể đi. (Đã sửa lại đáp án — xem ghi chú OVERRIDE ở đầu file.)","explanation":"Cấu trúc \"I wish + S + would + V\" diễn tả mong muốn ai đó làm gì (thường kèm chút bực bội).","note":"I wish + S + would + V-inf","vis":["sẽ giải thích (đúng — wish + would)","để giải thích (sai cấu trúc)","đã giải thích (sai cấu trúc wish)","sẽ giải thích (sai — không dùng will sau wish)"]},{"q":"6. If we hurry, we might get there ___ to catch the early train.","options":["right","in time","on time","before time"],"answer":2,"vi":"Nếu chúng ta nhanh lên, có thể sẽ đến kịp để bắt chuyến tàu sớm.","explanation":"Theo đáp án của tài liệu ôn tập, \"on time\" phù hợp trong ngữ cảnh này.","note":"cụm từ chỉ thời gian","vis":["ngay (sai nghĩa)","kịp lúc (sai — cần cụm \"on time\")","đúng giờ (đúng)","trước giờ (sai cụm từ)"]},{"q":"7. Cut the cake into six ___ pieces.","options":["same","like","alike","equal"],"answer":3,"vi":"Cắt bánh thành sáu miếng bằng nhau.","explanation":"\"equal pieces\" = những miếng bằng nhau.","note":"adjective + noun","vis":["giống nhau (sai vị trí/nghĩa)","giống như (sai từ loại)","giống nhau (sai vị trí tính từ)","bằng nhau (đúng — equal pieces)"]},{"q":"8. Our neighbors are very ___ on camping holidays.","options":["eager","enthusiastic","interested","keen"],"answer":3,"vi":"Hàng xóm của chúng tôi rất thích đi cắm trại vào kỳ nghỉ.","explanation":"\"be keen on\" = rất thích, đam mê.","note":"be keen on + N","vis":["háo hức (sai giới từ đi kèm)","nhiệt tình (sai giới từ \"about\")","quan tâm (sai giới từ \"in\")","thích (đúng — keen on)"]},{"q":"9. The mosquito bit and made my eyelid ___ and I couldn’t open my eye properly.","options":["swell","grow","stretch","spread"],"answer":0,"vi":"Muỗi cắn làm mí mắt tôi sưng lên và tôi không thể mở mắt bình thường.","explanation":"\"swell\" = sưng lên, phù hợp ngữ cảnh vết muỗi cắn.","note":"từ vựng phù hợp ngữ cảnh","vis":["sưng lên (đúng)","lớn lên (sai nghĩa)","căng ra (sai nghĩa)","lan ra (sai nghĩa)"]},{"q":"10. I had to wear ___ uniform when I worked in the hotel.","options":["a","some","any","an"],"answer":0,"vi":"Tôi phải mặc đồng phục khi làm việc ở khách sạn.","explanation":"\"uniform\" là danh từ đếm được số ít, bắt đầu bằng phụ âm → a.","note":"a + danh từ số ít đếm được","vis":["một (đúng, trước âm /j/)","một ít (sai — danh từ đếm được số ít)","bất kỳ (sai ngữ cảnh)","một (sai — \"uniform\" bắt đầu bằng âm /j/)"]},{"q":"11. The doctor advised me not to take ___ so much work in future.","options":["after","on","over","to"],"answer":1,"vi":"Bác sĩ khuyên tôi không nên nhận thêm quá nhiều việc trong tương lai.","explanation":"\"take on work\" = nhận (thêm) việc.","note":"take on + N","vis":["sau (sai cụm từ)","lên (đúng — take on = đảm nhận)","qua (sai cụm từ)","đến (sai cụm từ)"]},{"q":"12. If he phones, ___ him to buy some potatoes on the way home.","options":["remember","recall","remind","recollect"],"answer":2,"vi":"Nếu anh ấy gọi điện, hãy nhắc anh ấy mua khoai tây trên đường về nhà.","explanation":"\"remind someone to do something\" = nhắc ai làm gì.","note":"remind + O + to V","vis":["nhớ (sai cấu trúc)","nhớ lại (sai cấu trúc)","nhắc nhở (đúng — remind sb to do)","nhớ lại (sai cấu trúc)"]},{"q":"13. Who was the first person ___ the South Pole?","options":["reaching","who reaches","to reach","reached"],"answer":0,"vi":"Ai là người đầu tiên đặt chân đến Nam Cực?","explanation":"Theo đáp án của tài liệu ôn tập, mệnh đề quan hệ rút gọn dùng \"reaching\".","note":"the first person + V-ing (rút gọn mệnh đề quan hệ)","vis":["đang đến (V-ing, sai)","người mà đến (sai cấu trúc rút gọn)","để đến (đúng — to-V sau \"the first person\")","đã đến (quá khứ, sai)"]},{"q":"14. The ___ of the murderer lasted six weeks.","options":["process","trial","charge","conviction"],"answer":1,"vi":"Phiên tòa xét xử kẻ giết người kéo dài sáu tuần.","explanation":"\"trial\" = phiên tòa xét xử.","note":"từ vựng phù hợp ngữ cảnh pháp lý","vis":["quá trình (sai nghĩa)","phiên tòa xét xử (đúng)","sự buộc tội (sai nghĩa)","sự kết án (sai nghĩa)"]},{"q":"15. A chicken can ___ up to three eggs a day.","options":["lie","lay","put","place"],"answer":1,"vi":"Một con gà có thể đẻ tới ba quả trứng một ngày.","explanation":"\"lay eggs\" = đẻ trứng.","note":"lay + eggs","vis":["nói dối/nằm (sai — nhầm với \"lay\")","đẻ trứng (đúng)","đặt (sai nghĩa)","đặt (sai nghĩa)"]},{"q":"16. The nurse was on ___ in the hospital all night.","options":["work","alarm","duty","service"],"answer":2,"vi":"Y tá trực ở bệnh viện suốt đêm.","explanation":"\"be on duty\" = đang trực.","note":"be on duty","vis":["làm việc (sai cụm từ)","báo động (sai nghĩa)","trực (đúng — on duty)","phục vụ (sai cụm từ)"]},{"q":"17. I suggest we ___ outside the cinema tomorrow at 8:30.","options":["meeting","meet","met","will meet"],"answer":1,"vi":"Tôi đề nghị chúng ta gặp nhau trước rạp chiếu phim lúc 8:30 ngày mai.","explanation":"\"suggest + S + V (nguyên mẫu, dạng giả định)\".","note":"suggest + S + V-inf (subjunctive)","vis":["đang gặp (V-ing, sai)","gặp (đúng — suggest + V nguyên mẫu)","đã gặp (quá khứ, sai)","sẽ gặp (sai cấu trúc)"]},{"q":"18. ___ playing professional basketball, she also enjoys tennis.","options":["Besides","Moreover","Apart","Together"],"answer":0,"vi":"Ngoài chơi bóng rổ chuyên nghiệp, cô ấy còn thích chơi tennis.","explanation":"\"Besides + V-ing\" = ngoài việc...","note":"Besides + V-ing, S + V","vis":["bên cạnh việc (đúng, theo sau V-ing)","hơn nữa (sai — trạng từ liên kết câu)","ngoài ra (sai — cần \"apart from\")","cùng nhau (sai nghĩa)"]},{"q":"19. She ___ him of lying to her.","options":["threatened","blamed","criticized","accused"],"answer":3,"vi":"Cô ấy buộc tội anh ta nói dối mình.","explanation":"\"accuse someone of doing something\" = buộc tội ai làm gì.","note":"accuse + O + of + V-ing","vis":["đe dọa (sai giới từ đi kèm)","đổ lỗi (sai giới từ \"for\")","chỉ trích (sai giới từ)","buộc tội (đúng — accuse sb of)"]},{"q":"20. Did Ms. Brown ___ the operator’s manual from the library?","options":["loan","borrow","lend","send"],"answer":1,"vi":"Cô Brown có mượn sách hướng dẫn sử dụng từ thư viện không?","explanation":"\"borrow something from somewhere\" = mượn cái gì từ đâu.","note":"borrow + N + from + N","vis":["cho vay (sai từ loại/nghĩa)","mượn (đúng)","cho mượn (sai nghĩa, ngược hướng)","gửi (sai nghĩa)"]},{"q":"21. Since I moved house, I haven’t had much ___ with those friends.","options":["connection","contact","business","meeting"],"answer":1,"vi":"Từ khi chuyển nhà, tôi không còn liên lạc nhiều với những người bạn đó nữa.","explanation":"\"have contact with\" = có liên lạc với.","note":"have contact with + N","vis":["sự kết nối (sai collocation)","liên lạc (đúng — have contact with)","công việc (sai nghĩa)","cuộc gặp (sai nghĩa)"]},{"q":"22. I will take these folk tale stories ___ to the library.","options":["on","with","back","off"],"answer":2,"vi":"Tôi sẽ trả lại những cuốn truyện dân gian này cho thư viện.","explanation":"\"take back\" = mang trả lại.","note":"take + N + back","vis":["tiếp tục (sai cụm từ)","với (sai cụm từ)","trả lại (đúng — take back)","rời đi (sai cụm từ)"]},{"q":"23. It’s snowing. Would you like to ___ on Saturday or Sunday?","options":["skiing","go to ski","go skiing","go ski"],"answer":2,"vi":"Trời đang có tuyết rơi. Bạn có muốn đi trượt tuyết vào thứ Bảy hay Chủ nhật không?","explanation":"\"go + V-ing\" cho các hoạt động thể thao/giải trí → go skiing.","note":"go + V-ing (hoạt động)","vis":["trượt tuyết (thiếu \"go\", sai)","sai cấu trúc","đi trượt tuyết (đúng — go + V-ing)","sai cấu trúc"]},{"q":"24. She told me a story ___ I found hard to believe.","options":["what","which","in which","at which"],"answer":1,"vi":"Cô ấy kể cho tôi một câu chuyện mà tôi thấy khó tin. (Đã sửa lại đáp án — xem ghi chú OVERRIDE ở đầu file.)","explanation":"Đại từ quan hệ thay thế cho danh từ chỉ vật (a story) làm tân ngữ → which.","note":"noun + which + S + V (mệnh đề quan hệ)","vis":["cái gì (sai — không dùng sau danh từ trong mệnh đề quan hệ)","mà (đúng — đại từ quan hệ chỉ vật)","trong đó mà (sai, thừa giới từ)","tại đó mà (sai, thừa giới từ)"]},{"q":"25. The Queen flew ___ a jealous rage and ordered her huntsman to take Snow White into the woods to be killed.","options":["of","into","out","in"],"answer":1,"vi":"Nữ hoàng nổi cơn ghen giận dữ và ra lệnh cho thợ săn đưa Bạch Tuyết vào rừng để giết.","explanation":"\"fly into a rage\" = nổi cơn thịnh nộ.","note":"fly into + a rage","vis":["của (sai giới từ)","vào (đúng — fly into a rage)","ra ngoài (sai giới từ)","trong (sai giới từ)"]},{"q":"26. Everyone was attracted by her graceful ___.","options":["performer","performing","performed","performance"],"answer":3,"vi":"Mọi người đều bị cuốn hút bởi màn trình diễn duyên dáng của cô ấy.","explanation":"Sau tính từ \"graceful\" cần danh từ → performance.","note":"adjective + noun","vis":["người biểu diễn (danh từ chỉ người, sai)","đang biểu diễn (V-ing, sai)","đã biểu diễn (quá khứ, sai)","sự biểu diễn (danh từ, đúng)"]},{"q":"27. When the dwarves came home that evening, they found Snow White ___ on the ground.","options":["laid","lied","to lie","lying"],"answer":3,"vi":"Khi các chú lùn về nhà tối hôm đó, họ thấy Bạch Tuyết đang nằm trên mặt đất.","explanation":"Mệnh đề quan hệ rút gọn: \"Snow White [who was] lying\" = lying.","note":"find + O + V-ing (thấy ai đang làm gì)","vis":["đã đặt (quá khứ của \"lay\", sai)","đã nói dối (sai nghĩa)","để nằm (sai cấu trúc)","đang nằm (V-ing, đúng — found sb V-ing)"]},{"q":"28. You need to support your ideas with facts and ___.","options":["numbers","figures","informations","material"],"answer":1,"vi":"Bạn cần hỗ trợ ý tưởng của mình bằng sự thật và số liệu.","explanation":"\"facts and figures\" = sự thật và số liệu (cụm từ cố định).","note":"facts and figures (collocation)","vis":["những con số (sai nghĩa)","số liệu (đúng)","thông tin (sai — \"information\" không đếm được)","tài liệu (sai nghĩa)"]},{"q":"29. What are the ___ between women in old times and women in modern times?","options":["differs","different","difference","differences"],"answer":3,"vi":"Sự khác biệt giữa phụ nữ thời xưa và phụ nữ thời hiện đại là gì?","explanation":"Chủ ngữ của câu cần danh từ số nhiều → differences.","note":"plural noun (chủ ngữ)","vis":["khác nhau (động từ, sai chia)","khác nhau (tính từ, sai từ loại)","sự khác biệt (danh từ số ít, sai)","những sự khác biệt (danh từ số nhiều, đúng)"]},{"q":"30. In the past, people believed that women’s ___ roles were as mothers and wives.","options":["nature","natural","naturism","naturalist"],"answer":1,"vi":"Trước đây, người ta tin rằng vai trò tự nhiên của phụ nữ là làm mẹ và làm vợ.","explanation":"Trước danh từ \"roles\" cần tính từ → natural.","note":"adjective + noun","vis":["bản chất (danh từ, sai từ loại)","tự nhiên, thiên bẩm (tính từ, đúng)","chủ nghĩa khỏa thân (sai nghĩa)","nhà tự nhiên học (sai nghĩa)"]},{"q":"31. Thach Sanh was very ___ when he let Ly Thong and his mother go back to their hometown.","options":["selfish","mean","generous","brave"],"answer":2,"vi":"Thạch Sanh rất độ lượng khi để mẹ con Lý Thông trở về quê hương.","explanation":"\"generous\" = độ lượng, rộng lượng.","note":"từ vựng miêu tả tính cách","vis":["ích kỷ (sai nghĩa)","keo kiệt (sai nghĩa)","rộng lượng (đúng)","dũng cảm (sai nghĩa ngữ cảnh)"]},{"q":"32. The ogre was so ___ that it could catch Thach Sanh with its sharp claws.","options":["fierce","mean","clever","ugly"],"answer":0,"vi":"Con yêu tinh rất hung dữ đến nỗi có thể bắt được Thạch Sanh bằng móng vuốt sắc nhọn của nó. <span class=\"text-amber-600\">[RECONSTRUCTED: câu gốc có 2 chỗ trống nhưng chỉ có 1 bộ đáp án, Claude đã gộp lại thành 1 câu hoàn chỉnh]</span>","explanation":"\"so...that\" = đến nỗi, \"fierce\" = hung dữ.","note":"so + adjective + that + S + could + V","vis":["hung dữ (đúng)","keo kiệt (sai nghĩa)","thông minh (sai nghĩa)","xấu xí (sai nghĩa ngữ cảnh)"]},{"q":"33. Thach Sanh was so ___ that he could push back the troops with his magical rice pot.","options":["kind","clever","hard-working","fast"],"answer":1,"vi":"Thạch Sanh thông minh đến mức có thể đẩy lùi quân địch bằng niêu cơm thần.","explanation":"\"clever\" = thông minh, khôn khéo.","note":"so + adjective + that + S + could + V","vis":["tốt bụng (sai nghĩa)","thông minh, tài giỏi (đúng)","chăm chỉ (sai nghĩa ngữ cảnh)","nhanh (sai nghĩa)"]},{"q":"34. An Tiem was very ___ to move to a deserted island.","options":["brave","honest","kind","generous"],"answer":0,"vi":"An Tiêm rất dũng cảm khi chuyển đến sống trên hòn đảo hoang.","explanation":"\"brave\" = dũng cảm.","note":"từ vựng miêu tả tính cách","vis":["dũng cảm (đúng)","trung thực (sai nghĩa ngữ cảnh)","tốt bụng (sai nghĩa ngữ cảnh)","rộng lượng (sai nghĩa ngữ cảnh)"]},{"q":"35. Khoai was very ___, but his landowner was ___.","options":["lazy - cunning","clever – brave","honest - wise","honest - cunning"],"answer":3,"vi":"Anh Khoai rất trung thực, nhưng chủ đất của anh lại xảo quyệt.","explanation":"\"honest\" = trung thực, \"cunning\" = xảo quyệt.","note":"từ vựng miêu tả tính cách (2 chỗ trống)","vis":["lười biếng - xảo quyệt (sai cả 2)","thông minh - dũng cảm (sai cả 2)","trung thực - khôn ngoan (sai cả 2)","trung thực - xảo quyệt (đúng)"]},{"q":"36. Tam was a very ___ girl who had to work all day.","options":["mean","generous","hard-working","lazy"],"answer":2,"vi":"Tấm là một cô gái rất chăm chỉ, phải làm việc suốt cả ngày.","explanation":"\"hard-working\" = chăm chỉ.","note":"từ vựng miêu tả tính cách","vis":["keo kiệt (sai nghĩa)","rộng lượng (sai nghĩa)","chăm chỉ (đúng)","lười biếng (sai nghĩa, trái nghĩa)"]},{"q":"37. Cam was very ___ when she killed the nightingale, cooked it and threw the feathers in the Imperial Garden.","options":["wicked","ugly","honest","mean"],"answer":0,"vi":"Cám rất độc ác khi giết chim họa mi, nấu nó và vứt lông chim trong vườn Thượng Uyển.","explanation":"\"wicked\" = độc ác, xấu xa.","note":"từ vựng miêu tả tính cách","vis":["độc ác (đúng)","xấu xí (sai nghĩa)","trung thực (sai nghĩa, trái nghĩa)","keo kiệt (sai nghĩa)"]},{"q":"38. Luu Binh was very ___ to invite Duong Le to come and live with him.","options":["selfish","kind","mean","brave"],"answer":1,"vi":"Lưu Bình rất tốt bụng khi mời Dương Lễ đến sống cùng mình.","explanation":"\"kind\" = tốt bụng.","note":"từ vựng miêu tả tính cách","vis":["ích kỷ (sai nghĩa)","tốt bụng (đúng)","keo kiệt (sai nghĩa)","dũng cảm (sai nghĩa ngữ cảnh)"]},{"q":"39. The toad was very ___ because he tried to find way to the heaven to sue God.","options":["brave","kind","generous","mean"],"answer":0,"vi":"Con cóc rất dũng cảm vì đã cố tìm đường lên thiên đình để kiện Trời.","explanation":"\"brave\" = dũng cảm.","note":"từ vựng miêu tả tính cách","vis":["dũng cảm (đúng)","tốt bụng (sai nghĩa ngữ cảnh)","rộng lượng (sai nghĩa ngữ cảnh)","keo kiệt (sai nghĩa)"]},{"q":"40. The King was very ___ to allow his daughter, Tien Dung, to travel to the many wonderful places of the kingdom.","options":["wise","mean","kind","wicked"],"answer":2,"vi":"Nhà vua rất tốt bụng khi cho phép con gái Tiên Dung đi thăm nhiều nơi tuyệt đẹp trong vương quốc.","explanation":"\"kind\" = tốt bụng.","note":"từ vựng miêu tả tính cách","vis":["khôn ngoan (sai nghĩa ngữ cảnh)","keo kiệt (sai nghĩa)","tốt bụng (đúng)","độc ác (sai nghĩa, trái nghĩa)"]},{"q":"41. The Peacock was well known to be a/an ___ animal, so he just applied black colour to the Crow’s feathers.","options":["hard-working","lazy","ugly","clever"],"answer":1,"vi":"Công được biết đến là loài vật lười biếng, vì vậy nó chỉ bôi màu đen lên lông của Quạ.","explanation":"\"lazy\" = lười biếng.","note":"từ vựng miêu tả tính cách","vis":["chăm chỉ (sai nghĩa ngữ cảnh)","lười biếng (đúng)","xấu xí (sai nghĩa)","thông minh (sai nghĩa ngữ cảnh)"]},{"q":"42. The wife of the fisherman was very ___ when she demanded for bigger and bigger things.","options":["kind","generous","greedy","fierce"],"answer":2,"vi":"Vợ người đánh cá rất tham lam khi liên tục đòi hỏi những thứ ngày càng lớn hơn.","explanation":"\"greedy\" = tham lam.","note":"từ vựng miêu tả tính cách","vis":["tốt bụng (sai nghĩa, trái nghĩa)","rộng lượng (sai nghĩa, trái nghĩa)","tham lam (đúng)","hung dữ (sai nghĩa ngữ cảnh)"]},{"q":"43. Ali Baba was very ___ when he also used the words \"Open Sesame!\" to enter cave of treasures.","options":["wise","cunning","kind","evil"],"answer":0,"vi":"Ali Baba rất khôn ngoan khi cũng dùng câu thần chú \"Vừng ơi, mở ra!\" để vào hang kho báu.","explanation":"\"wise\" = khôn ngoan.","note":"từ vựng miêu tả tính cách","vis":["khôn ngoan (sai — thực ra là xảo quyệt)","xảo quyệt (đúng)","tốt bụng (sai nghĩa)","độc ác (sai nghĩa ngữ cảnh)"]},{"q":"44. The servant was very ___ to mark other houses with white chalk so that the thieves couldn’t find Ali Baba’s house.","options":["mean","wicked","kind","clever"],"answer":3,"vi":"Người hầu rất thông minh khi đánh dấu các ngôi nhà khác bằng phấn trắng để bọn trộm không tìm được nhà Ali Baba.","explanation":"\"clever\" = thông minh, khôn khéo.","note":"từ vựng miêu tả tính cách","vis":["keo kiệt (sai nghĩa)","độc ác (sai nghĩa, trái nghĩa)","tốt bụng (sai nghĩa ngữ cảnh)","thông minh (đúng)"]},{"q":"45. The tale is about a prince who is turned ___ a frog by his wicked stepmother.","options":["to","into","out","over"],"answer":1,"vi":"Câu chuyện kể về một hoàng tử bị mẹ kế độc ác biến thành con ếch.","explanation":"\"turn into\" = biến thành.","note":"turn into + N","vis":["đến (sai giới từ)","thành (đúng — turn into)","ra ngoài (sai giới từ)","qua (sai giới từ)"]},{"q":"46. The hare always boasted ___ how fast he could run.","options":["at","for","on","about"],"answer":3,"vi":"Con thỏ luôn khoe khoang về việc nó có thể chạy nhanh thế nào.","explanation":"\"boast about\" = khoe khoang về.","note":"boast about + N/V-ing","vis":["tại (sai giới từ)","cho (sai giới từ)","về (sai giới từ)","về (đúng — boast about)"]},{"q":"47. A ___ is a story from ancient times about famous people and events that may or may not be true.","options":["legend","folktale","fable","fairytale"],"answer":0,"vi":"Truyền thuyết là câu chuyện từ thời xa xưa về những người và sự kiện nổi tiếng có thể đúng hoặc không đúng sự thật.","explanation":"Định nghĩa khớp với \"legend\" (truyền thuyết).","note":"từ vựng: các loại truyện","vis":["truyền thuyết (đúng)","truyện dân gian (sai — quá chung)","truyện ngụ ngôn (sai nghĩa)","truyện cổ tích (sai nghĩa)"]},{"q":"48. In many cultures, a fox is the symbol for a ___ person.","options":["brave","fierce","cunning","kind"],"answer":2,"vi":"Trong nhiều nền văn hóa, con cáo là biểu tượng cho người xảo quyệt.","explanation":"\"cunning\" = xảo quyệt, gian xảo.","note":"từ vựng miêu tả tính cách","vis":["dũng cảm (sai nghĩa)","hung dữ (sai nghĩa)","xảo quyệt (đúng)","tốt bụng (sai nghĩa)"]},{"q":"49. Vanessa is interested in reading Vietnamese folktales ___ she can’t read Vietnamese well.","options":["although","because","while","whereas"],"answer":0,"vi":"Vanessa thích đọc truyện dân gian Việt Nam mặc dù cô ấy không đọc tiếng Việt giỏi.","explanation":"Sự nhượng bộ → although.","note":"Although + S + V, S + V","vis":["mặc dù (đúng, ý tương phản)","bởi vì (sai nghĩa)","trong khi (sai nghĩa)","trong khi đó (sai nghĩa)"]},{"q":"50. What a ___ man he is! There’s nothing he wouldn’t do for us.","options":["mean","generous","gruel","greedy"],"answer":1,"vi":"Ông ấy thật là một người hào phóng! Không có gì ông ấy không làm vì chúng ta.","explanation":"\"generous\" = hào phóng, rộng lượng.","note":"What a + adjective + noun!","vis":["keo kiệt (sai nghĩa, trái nghĩa)","rộng lượng (đúng)","cháo loãng (sai từ loại/nghĩa)","tham lam (sai nghĩa)"]}],"roman":"III"},{"navLabel":"Word Forms","title":"Cho dạng đúng của từ trong ngoặc (Word Forms)","icon":"spell-check","instructions":"Dùng từ gợi ý trong ngoặc để điền dạng đúng vào chỗ trống.","type":"fill","questions":[{"q":"1. Snow White lived ___ with the dwarves in the wood.","answer":"happily","hint":"(HAPPY)","family":["happy (adj): hạnh phúc","happily (adv): một cách hạnh phúc","happiness (n): hạnh phúc"],"vi":"Bạch Tuyết sống hạnh phúc cùng các chú lùn trong rừng.","explanation":"Trạng từ bổ nghĩa cho động từ \"lived\" → happily.","note":"V + adverb"},{"q":"2. One beautiful evening a young princess put on her bonnet and clogs, and went out to take a walk by ___ in a wood.","answer":"herself","hint":"(HER)","family":["her (adj sở hữu): của cô ấy","herself (đại từ phản thân): chính cô ấy, một mình"],"vi":"Một buổi tối đẹp trời, nàng công chúa trẻ đội mũ, mang guốc và đi dạo một mình trong rừng.","explanation":"\"by herself\" = một mình.","note":"by + oneself (một mình)"},{"q":"3. When the prince set eyes on Cinderella, he was struck by her ___.","answer":"beauty","hint":"(BEAUTIFUL)","family":["beautiful (adj): đẹp","beauty (n): vẻ đẹp","beautifully (adv): một cách đẹp đẽ"],"vi":"Khi hoàng tử nhìn thấy Lọ Lem, chàng đã bị choáng ngợp bởi vẻ đẹp của nàng.","explanation":"Sau tính từ sở hữu \"her\" cần danh từ → beauty.","note":"sở hữu cách + noun"},{"q":"4. The countryside in the area is ___ and most of the buildings there are made from an ___ type of light stone. (CHARM-ATTRACT)","answer":"charming","family":["charm (n/v): sự quyến rũ / quyến rũ","charming (adj): quyến rũ","attract (v): thu hút","attractive (adj): hấp dẫn"],"vi":"Vùng nông thôn ở khu vực này rất quyến rũ và hầu hết các tòa nhà ở đó được làm từ một loại đá nhẹ hấp dẫn.","explanation":"Sau \"is\" cần tính từ → charming; trước danh từ \"type\" cần tính từ → attractive.","note":"be + adjective; an + adjective + noun"},{"q":"5. Banh Chung was square and ___ the earth. Banh Day was round and ___ the sky.","answer":"symbolized","hint":"(SYMBOL)","family":["symbol (n): biểu tượng","symbolize (v): tượng trưng cho"],"vi":"Bánh Chưng hình vuông tượng trưng cho đất. Bánh Dày hình tròn tượng trưng cho trời.","explanation":"Chủ ngữ số ít, thì quá khứ đơn → symbolized.","note":"S (số ít) + V-ed (quá khứ đơn)"},{"q":"6. Is *The False Grandmother* one of the ___ versions of *Little Red Riding Hood*?","answer":"original","hint":"(ORIGIN)","family":["origin (n): nguồn gốc","original (adj): gốc, ban đầu","originally (adv): ban đầu"],"vi":"Liệu \"Bà ngoại giả\" có phải là một trong những phiên bản gốc của \"Cô bé quàng khăn đỏ\" không?","explanation":"Trước danh từ \"versions\" cần tính từ → original.","note":"adjective + noun"},{"q":"7. The king wanted to repay his servant’s ___ in another way.","answer":"loyalty","hint":"(LOYAL)","family":["loyal (adj): trung thành","loyalty (n): lòng trung thành"],"vi":"Nhà vua muốn đền đáp lòng trung thành của người hầu bằng cách khác.","explanation":"Sau sở hữu cách \"servant’s\" cần danh từ → loyalty.","note":"sở hữu cách + noun"},{"q":"8. The fox ___ stole the egg by distracting the mother with a rock.","answer":"cunningly","hint":"(CUNNING)","family":["cunning (adj): xảo quyệt","cunningly (adv): một cách xảo quyệt"],"vi":"Con cáo xảo quyệt đánh cắp quả trứng bằng cách đánh lạc hướng mẹ gà bằng một hòn đá.","explanation":"Trạng từ bổ nghĩa cho động từ \"stole\" → cunningly.","note":"V + adverb"},{"q":"9. The first thing that saved Ali Baba was his lack of ___.","answer":"greediness","hint":"(GREEDY)","family":["greedy (adj): tham lam","greediness/greed (n): sự tham lam"],"vi":"Điều đầu tiên cứu Ali Baba chính là việc anh ta không tham lam.","explanation":"Sau \"lack of\" cần danh từ → greediness.","note":"lack of + noun"},{"q":"10. Saint George is one of the most ___ heroes in the western world.","answer":"legendary","hint":"(LEGEND)","family":["legend (n): truyền thuyết","legendary (adj): huyền thoại"],"vi":"Thánh George là một trong những anh hùng huyền thoại nhất ở phương Tây.","explanation":"Trước danh từ \"heroes\" cần tính từ → legendary.","note":"the most + adjective + noun"},{"q":"11. The stepfather was a wicked man and treated his stepson very ___.","answer":"cruelly","hint":"(CRUELTY)","family":["cruelty (n): sự tàn nhẫn","cruel (adj): tàn nhẫn","cruelly (adv): một cách tàn nhẫn"],"vi":"Người cha dượng là một người độc ác và đối xử rất tàn nhẫn với con riêng của vợ.","explanation":"Trạng từ bổ nghĩa cho động từ \"treated\" → cruelly.","note":"V + adverb"},{"q":"12. Giving gifts to servants is an example of King’s ___.","answer":"generosity","hint":"(GENEROUS)","family":["generous (adj): hào phóng","generosity (n): lòng hào phóng"],"vi":"Việc tặng quà cho người hầu là một ví dụ về lòng hào phóng của nhà vua.","explanation":"Sau sở hữu cách \"King’s\" cần danh từ → generosity.","note":"sở hữu cách + noun"},{"q":"13. Princess Elsa ___ magic that allows her to control and create ice and snow.","answer":"possesses","hint":"(POSSESSION)","family":["possession (n): sự sở hữu","possess (v): sở hữu"],"vi":"Công chúa Elsa sở hữu phép thuật cho phép cô điều khiển và tạo ra băng tuyết.","explanation":"Chủ ngữ số ít \"Princess Elsa\" cần động từ thêm -s → possesses.","note":"chủ ngữ số ít + V-es"},{"q":"14. ___, his parents passed away when he was 12 years old.","answer":"Unfortunately","hint":"(FORTUNE)","family":["fortune (n): vận may","fortunate (adj): may mắn","unfortunately (adv): không may"],"vi":"Không may, bố mẹ cậu ấy qua đời khi cậu mới 12 tuổi.","explanation":"Trạng từ đứng đầu câu bổ nghĩa cho cả câu → Unfortunately.","note":"Adverb + , + S + V (mở đầu câu)"},{"q":"15. The princess was so ___ that she lost her ability to speak.","answer":"frightened","hint":"(FRIGHT)","family":["fright (n): sự sợ hãi","frighten (v): làm sợ","frightened (adj): cảm thấy sợ"],"vi":"Công chúa sợ hãi đến mức mất khả năng nói.","explanation":"Sau \"be\" cần tính từ chỉ cảm xúc → frightened.","note":"be + frightened (cảm xúc bị tác động)"},{"q":"16. He calls people sir and madam and he is very ___.","answer":"respectful","hint":"(RESPECT)","family":["respect (n/v): sự tôn trọng / tôn trọng","respectful (adj): lễ phép, tôn kính"],"vi":"Anh ấy gọi mọi người là \"thưa ông\", \"thưa bà\" và rất lễ phép.","explanation":"Sau \"be\" cần tính từ → respectful.","note":"be + respectful"},{"q":"17. In Japan, up until recently, marriages were ___ arranged by a special matchmaker.","answer":"customarily","hint":"(CUSTOM)","family":["custom (n): phong tục","customary (adj): theo thông lệ","customarily (adv): theo thông lệ, theo phong tục"],"vi":"Ở Nhật Bản, cho đến gần đây, hôn nhân thường theo phong tục được sắp đặt bởi một người mai mối đặc biệt.","explanation":"Trạng từ bổ nghĩa cho động từ bị động \"were arranged\" → customarily.","note":"V (bị động) + adverb"},{"q":"18. There is the *Poh Bang* ___ by a magician in the temple.","answer":"performance","hint":"(PERFORM)","family":["perform (v): biểu diễn","performance (n): buổi biểu diễn"],"vi":"Có một màn trình diễn Poh Bang của một pháp sư trong đền.","explanation":"Sau \"the\" cần danh từ → performance.","note":"the + noun"},{"q":"19. A fairy tale usually involves ___ creatures and magic.","answer":"imaginary","hint":"(IMAGE)","family":["image (n): hình ảnh","imagine (v): tưởng tượng","imaginary (adj): tưởng tượng, không có thật"],"vi":"Truyện cổ tích thường có những sinh vật tưởng tượng và phép thuật.","explanation":"Trước danh từ \"creatures\" cần tính từ → imaginary.","note":"adjective + noun"},{"q":"20. In the story, a ___ rescues Red Riding Hood with his axe.","answer":"woodcutter","hint":"(WOODCUT)","family":["woodcut (n): bản khắc gỗ","woodcutter (n): tiều phu"],"vi":"Trong câu chuyện, một bác tiều phu đã cứu cô bé quàng khăn đỏ bằng chiếc rìu của mình.","explanation":"Sau mạo từ \"a\" cần danh từ chỉ người → woodcutter.","note":"a + noun (chỉ người)"}],"roman":"IV"},{"navLabel":"Verb Forms 1","title":"Chia một động từ ở dạng \"used to\", động từ còn lại ở quá khứ đơn","icon":"pen","instructions":"Viết lại câu, chia một động từ trong ngoặc ở dạng \"used to\" và động từ còn lại ở thì quá khứ đơn. Lưu ý: một số chỗ trống bị mất trong tài liệu gốc khi chuyển đổi, Claude đã suy luận và đặt lại vị trí hợp lý dựa theo ngữ pháp và đáp án cho sẵn (RECONSTRUCTED).","type":"fill","questions":[{"q":"1. He ___ (live) in London before he ___ (go) abroad.","answer":"used to live / went","accepted":["used to live / went","used to live went","used to live, went"],"vi":"Anh ấy từng sống ở London trước khi ra nước ngoài.","explanation":"Thói quen/tình trạng lặp lại trong quá khứ nhưng không còn ở hiện tại → used to + V; hành động cụ thể → quá khứ đơn."},{"q":"2. I ___ (earn) a lot of money, but then I ___ (lose) my job.","answer":"used to earn / lost","accepted":["used to earn / lost","used to earn lost","used to earn, lost"],"vi":"Tôi từng kiếm được rất nhiều tiền, nhưng sau đó tôi mất việc.","explanation":"\"used to earn\" (thói quen/tình trạng trước đây) và \"lost\" (sự việc xảy ra, quá khứ đơn)."},{"q":"3. I’m surprised that they ___ (join) the tennis club. They ___ (not / like) tennis.","answer":"joined / didn’t use to like","accepted":["joined / did not use to like","joined / didn’t use to like","joined did not use to like","joined didn’t use to like","joined, did not use to like","joined, didn’t use to like"],"vi":"Tôi ngạc nhiên khi họ tham gia câu lạc bộ tennis. Trước đây họ không thích tennis.","explanation":"\"joined\" (sự việc xảy ra, quá khứ đơn) và \"didn’t use to like\" (thói quen/tình trạng trước đây, dạng phủ định)."},{"q":"4. ___ you ___ (travel) a lot before you ___ (become) a teacher?","answer":"Did / use to travel / become","accepted":["Did / use to travel / become","Did use to travel become","Did, use to travel, become"],"vi":"Bạn có từng đi du lịch nhiều trước khi trở thành giáo viên không?","explanation":"Câu hỏi với \"used to\": Did + S + use to + V?; \"become\" (quá khứ đơn).","note":"Did + S + use to + V-inf?"},{"q":"5. That radio ___ (work) before I ___ (drop) it.","answer":"used to work / dropped","accepted":["used to work / dropped","used to work dropped","used to work, dropped"],"vi":"Chiếc radio đó từng hoạt động tốt trước khi tôi làm rơi nó.","explanation":"\"used to work\" (tình trạng trước đây) và \"dropped\" (hành động, quá khứ đơn)."},{"q":"6. We ___ (see) them every week, but then we ___ (have) an argument.","answer":"used to see / had","accepted":["used to see / had","used to see had","used to see, had"],"vi":"Chúng tôi từng gặp họ mỗi tuần, nhưng sau đó chúng tôi đã cãi nhau.","explanation":"\"used to see\" (thói quen trước đây) và \"had\" (sự việc xảy ra, quá khứ đơn)."},{"q":"7. She ___ (play) tennis a lot before she ___ (break) her leg.","answer":"used to play / broke","accepted":["used to play / broke","used to play broke","used to play, broke"],"vi":"Cô ấy từng chơi tennis rất nhiều trước khi bị gãy chân.","explanation":"\"used to play\" (thói quen trước đây) và \"broke\" (sự việc xảy ra, quá khứ đơn)."},{"q":"8. She ___ (drive) a lot before she ___ (have) an accident.","answer":"used to drive / had","accepted":["used to drive / had","used to drive had","used to drive, had"],"vi":"Cô ấy từng lái xe nhiều trước khi gặp tai nạn.","explanation":"\"used to drive\" (thói quen trước đây) và \"had\" (sự việc xảy ra, quá khứ đơn)."},{"q":"9. We ___ (have) a garden, but then we ___ (move) to a different house.","answer":"used to have / moved","accepted":["used to have / moved","used to have moved","used to have, moved"],"vi":"Chúng tôi từng có một khu vườn, nhưng sau đó chúng tôi chuyển đến nhà khác.","explanation":"\"used to have\" (tình trạng trước đây) và \"moved\" (sự việc xảy ra, quá khứ đơn)."}],"roman":"V"},{"navLabel":"Verb Forms 2","title":"Chia động từ trong ngoặc ở quá khứ đơn hoặc quá khứ tiếp diễn","icon":"pen","instructions":"Điền dạng đúng của động từ trong ngoặc, dùng thì quá khứ đơn hoặc quá khứ tiếp diễn.","type":"fill","questions":[{"q":"1. While Tom (read) ___, Mai Ly (watch) ___ a documentary on TV.","answer":"was reading / was watching","accepted":["was reading / was watching","was reading was watching","was reading, was watching"],"vi":"Trong khi Tom đang đọc sách, Mai Ly đang xem phim tài liệu trên TV.","explanation":"Hai hành động cùng diễn ra song song trong quá khứ → quá khứ tiếp diễn cả hai."},{"q":"2. Mark (come) ___ home, (switch) ___ on the computer and (check) ___ his emails.","answer":"came / switched / checked","accepted":["came / switched / checked","came switched checked","came, switched, checked"],"vi":"Mark về nhà, bật máy tính lên và kiểm tra email.","explanation":"Chuỗi hành động nối tiếp trong quá khứ → quá khứ đơn cho cả ba."},{"q":"3. The thief (sneak) ___ into the house, (steal) ___ the jewels and (leave) ___ without a trace.","answer":"sneaked / stole / left","accepted":["sneaked / stole / left","sneaked stole left","sneaked, stole, left"],"vi":"Tên trộm lẻn vào nhà, lấy trộm nữ trang rồi rời đi không để lại dấu vết.","explanation":"Chuỗi hành động nối tiếp trong quá khứ → quá khứ đơn cho cả ba."},{"q":"4. Nobody (listen) ___ while the teacher (explain) ___ the tenses.","answer":"was listening / was explaining","accepted":["was listening / was explaining","was listening was explaining","was listening, was explaining"],"vi":"Không ai lắng nghe trong khi giáo viên đang giải thích về các thì.","explanation":"Hai hành động cùng diễn ra song song trong quá khứ → quá khứ tiếp diễn cả hai."},{"q":"5. While we (do) ___ a sight-seeing tour, our friends (lie) ___ on the beach.","answer":"were doing / were lying","accepted":["were doing / were lying","were doing were lying","were doing, were lying"],"vi":"Trong khi chúng tôi đang tham quan, bạn bè chúng tôi đang nằm trên bãi biển.","explanation":"Hai hành động cùng diễn ra song song trong quá khứ → quá khứ tiếp diễn cả hai."},{"q":"6. He (wake) ___ up and (look) ___ at his watch.","answer":"woke / looked","accepted":["woke / looked","woke looked","woke, looked"],"vi":"Anh ấy thức dậy và nhìn đồng hồ.","explanation":"Hai hành động nối tiếp trong quá khứ → quá khứ đơn cho cả hai."},{"q":"7. The receptionist (welcome) ___ the guests and (ask) ___ them to fill in the form.","answer":"welcomed / asked","accepted":["welcomed / asked","welcomed asked","welcomed, asked"],"vi":"Lễ tân chào đón khách và yêu cầu họ điền vào mẫu đơn.","explanation":"Hai hành động nối tiếp trong quá khứ → quá khứ đơn cho cả hai."},{"q":"8. The car (break) ___ down and we (have) ___ to walk home.","answer":"broke / had","accepted":["broke / had","broke had","broke, had"],"vi":"Xe bị hỏng và chúng tôi phải đi bộ về nhà.","explanation":"Hai hành động nối tiếp trong quá khứ → quá khứ đơn cho cả hai."},{"q":"9. The boys (swim) ___ while the girls (sunbathe) ___.","answer":"were swimming / were sunbathing","accepted":["were swimming / were sunbathing","were swimming were sunbathing","were swimming, were sunbathing"],"vi":"Các cậu con trai đang bơi trong khi các cô gái đang tắm nắng.","explanation":"Hai hành động cùng diễn ra song song trong quá khứ → quá khứ tiếp diễn cả hai."},{"q":"10. My father (come) ___ in, (look) ___ around and (tell) ___ me to tidy up my room.","answer":"came / looked / told","accepted":["came / looked / told","came looked told","came, looked, told"],"vi":"Bố tôi bước vào, nhìn quanh và bảo tôi dọn phòng.","explanation":"Chuỗi hành động nối tiếp trong quá khứ → quá khứ đơn cho cả ba."}],"roman":"VI"},{"navLabel":"Verb Forms 3","title":"Chia động từ trong ngoặc ở quá khứ đơn hoặc quá khứ tiếp diễn (đoạn văn)","icon":"pen","instructions":"Đọc đoạn văn và chia đúng dạng của động từ trong ngoặc vào mỗi chỗ trống.","type":"fill","questions":[{"q":"1. When I (1) (go) ___ to the beach for the first time, something wonderful happened.","answer":"went","vi":"Khi tôi ra biển lần đầu tiên, một điều tuyệt vời đã xảy ra.","explanation":"Hành động chính tại mốc thời gian trong quá khứ → quá khứ đơn: went."},{"q":"2. I (2) (swim) ___ in the sea while my mother was sleeping in the sun.","answer":"was swimming","vi":"Tôi đang bơi trong biển trong khi mẹ tôi đang ngủ dưới nắng.","explanation":"Hành động đang diễn ra song song trong quá khứ → quá khứ tiếp diễn: was swimming."},{"q":"3. My brother was building a castle and my father (3) (drink) ___ some water.","answer":"was drinking","vi":"Anh trai tôi đang xây lâu đài cát và bố tôi đang uống nước.","explanation":"Hành động đang diễn ra song song trong quá khứ → quá khứ tiếp diễn: was drinking."},{"q":"4. Suddenly I (4) (see) ___ a boy on the beach.","answer":"saw","vi":"Bỗng nhiên tôi thấy một cậu bé trên bãi biển.","explanation":"Hành động chính, xảy ra đột ngột → quá khứ đơn: saw."},{"q":"5. His eyes were blue like the water in the sea and his hair (5) (be) ___ beautiful black.","answer":"was","vi":"Đôi mắt cậu ấy xanh như nước biển và mái tóc cậu ấy đen đẹp.","explanation":"Miêu tả trạng thái → quá khứ đơn: was."},{"q":"6. My heart (6) (beat) ___ fast.","answer":"was beating","vi":"Tim tôi đập nhanh.","explanation":"Hành động đang diễn ra (diễn tả cảm xúc) → quá khứ tiếp diễn: was beating."},{"q":"7. I (7) (ask) ___ him for his name with a shy voice.","answer":"asked","vi":"Tôi rụt rè hỏi tên cậu ấy.","explanation":"Chuỗi hành động nối tiếp nhau → quá khứ đơn: asked."},{"q":"8. He (8) (tell) ___ me that his name was John.","answer":"told","vi":"Cậu ấy nói với tôi rằng tên cậu ấy là John.","explanation":"Chuỗi hành động nối tiếp nhau → quá khứ đơn: told."},{"q":"9. He (9) (stay) ___ with me the whole afternoon.","answer":"stayed","vi":"Cậu ấy ở bên tôi suốt buổi chiều hôm đó.","explanation":"Hành động xảy ra và kết thúc trong một khoảng thời gian cụ thể → quá khứ đơn: stayed."},{"q":"10. The following days we (10) (have) ___ a lot of fun together.","answer":"had","vi":"Những ngày sau đó chúng tôi đã có rất nhiều niềm vui bên nhau.","explanation":"Hành động xảy ra và kết thúc trong một khoảng thời gian cụ thể → quá khứ đơn: had."}],"roman":"VII","passage":{"title":"Đoạn văn gốc","html":"In my last holiday, I went to Hawaii. When I <b>(1)</b> (go) ___ to the beach for the first time, something wonderful happened. I <b>(2)</b> (swim) ___ in the sea while my mother was sleeping in the sun. My brother was building a castle and my father <b>(3)</b> (drink) ___ some water. Suddenly I <b>(4)</b> (see) ___ a boy on the beach. His eyes were blue like the water in the sea and his hair <b>(5)</b> (be) ___ beautiful black. He was very tall and thin and his hair was brown. My heart <b>(6)</b> (beat) ___ fast. I <b>(7)</b> (ask) ___ him for his name with a shy voice. He <b>(8)</b> (tell) ___ me that his name was John. He <b>(9)</b> (stay) ___ with me the whole afternoon. In the evening, we met again. We ate pizza in a food stall. The following days we <b>(10)</b> (have) ___ a lot of fun together. At the end of my holidays when I left Hawaii I said good-bye to John. We had tears in our eyes. He wrote to me a letter very soon and I answered him.","vi":"Trong kỳ nghỉ vừa rồi, tôi đến Hawaii. Khi tôi <b>(1)</b> ___ ra biển lần đầu tiên, một điều tuyệt vời đã xảy ra. Tôi <b>(2)</b> ___ đang bơi trong biển trong khi mẹ tôi đang ngủ dưới nắng. Anh trai tôi đang xây lâu đài cát và bố tôi <b>(3)</b> ___ đang uống nước. Bỗng nhiên tôi <b>(4)</b> ___ thấy một cậu bé trên bãi biển. Đôi mắt cậu ấy xanh như nước biển và mái tóc cậu ấy <b>(5)</b> ___ đen đẹp. Cậu ấy rất cao và gầy, tóc màu nâu. Tim tôi <b>(6)</b> ___ đập nhanh. Tôi <b>(7)</b> ___ rụt rè hỏi tên cậu ấy. Cậu ấy <b>(8)</b> ___ nói với tôi rằng tên cậu ấy là John. Cậu ấy <b>(9)</b> ___ ở bên tôi suốt buổi chiều hôm đó. Buổi tối chúng tôi gặp lại nhau. Chúng tôi ăn pizza ở một quầy hàng. Những ngày sau đó chúng tôi <b>(10)</b> ___ đã có rất nhiều niềm vui bên nhau. Cuối kỳ nghỉ, khi rời Hawaii, tôi đã nói lời tạm biệt John. Chúng tôi đều rơi nước mắt. Cậu ấy đã viết thư cho tôi rất sớm sau đó và tôi đã hồi âm."}},{"navLabel":"Sửa lỗi 1","title":"Tìm lỗi sai (A, B, C hoặc D)","icon":"wrench","instructions":"Mỗi câu có 4 phần gạch chân A, B, C, D. Chọn phần chứa lỗi sai. Chọn xong sẽ hiện đúng/sai, đáp án và công thức ngay. Lưu ý: tài liệu gốc chỉ đánh dấu 4 vị trí A/B/C/D bằng nhãn dưới câu (không gạch chân trực tiếp); các cụm A/B/C/D được chia lại hợp lý dựa theo đáp án lỗi sai cho sẵn (RECONSTRUCTED).","type":"mcq","instant":true,"questions":[{"q":"1. <u>The beloved tale of Cinderella</u> <u>is one of the world’s best-known</u> <u>fairy tale,</u> <u>renowned as a ‘happily ever after’ story</u>.","options":["The beloved tale of Cinderella","is one of the world’s best-known","fairy tale,","renowned as a ‘happily ever after’ story"],"answer":2,"vi":"Câu chuyện Lọ Lem được yêu mến là một trong những truyện cổ tích nổi tiếng nhất thế giới, được biết đến như một câu chuyện \"sống hạnh phúc mãi mãi về sau\".","explanation":"\"one of the world’s best-known\" theo sau cần danh từ số nhiều → fairy tale phải sửa thành fairy tales.","note":"one of the + adjective-est/best-known + plural noun","vis":["câu chuyện được yêu thích về Lọ Lem","là một trong những câu chuyện nổi tiếng nhất thế giới","truyện cổ tích, (sai — cần số nhiều \"fairy tales\")","nổi tiếng là câu chuyện \"sống hạnh phúc mãi mãi\""]},{"q":"2. <u>Little Red Riding Hood’s mother sent her</u> <u>to Grandma’s house with a basket of goodies</u> <u>and told her</u> <u>to not talk to strangers</u>.","options":["Little Red Riding Hood’s mother sent her","to Grandma’s house with a basket of goodies","and told her","to not talk to strangers"],"answer":3,"vi":"Mẹ của Cô bé quàng khăn đỏ gửi cô đến nhà bà ngoại với một giỏ đồ ăn và dặn cô không được nói chuyện với người lạ.","explanation":"Phủ định động từ nguyên mẫu có \"to\" đặt \"not\" trước \"to\" → to not talk phải sửa thành not to talk.","note":"V + O + not to V (phủ định to-infinitive)","vis":["mẹ của Cô bé quàng khăn đỏ đã gửi cô ấy","đến nhà bà với một giỏ đồ ăn","và bảo cô ấy","đừng nói chuyện với người lạ (sai vị trí \"not\" — cần \"not to talk\")"]},{"q":"3. <u>Snow White’s evil stepmother</u> <u>wanted to be more beautiful in the land</u> <u>and was jealous of</u> <u>Snow White’s beauty</u>.","options":["Snow White’s evil stepmother","wanted to be more beautiful in the land","and was jealous of","Snow White’s beauty"],"answer":1,"vi":"Mẹ kế độc ác của Bạch Tuyết muốn trở thành người đẹp nhất vương quốc và ghen tị với vẻ đẹp của Bạch Tuyết.","explanation":"So sánh với TẤT CẢ mọi người trong vương quốc cần so sánh nhất → more beautiful phải sửa thành the most beautiful.","note":"the + adjective-est/most + adjective (so sánh nhất)","vis":["mẹ kế độc ác của Bạch Tuyết","muốn xinh đẹp nhất vùng đất (sai — cần so sánh nhất \"the most beautiful\")","và ghen tị với","vẻ đẹp của Bạch Tuyết"]},{"q":"4. <u>The frog turned into a handsome prince,</u> <u>married the princess</u> <u>and they lived happily</u> <u>after ever</u>.","options":["The frog turned into a handsome prince,","married the princess","and they lived happily","after ever"],"answer":3,"vi":"Con ếch biến thành hoàng tử điển trai, cưới công chúa và họ sống hạnh phúc mãi mãi về sau.","explanation":"Cụm cố định là \"ever after\" (mãi mãi về sau) → after ever phải sửa thành ever after.","note":"happily ever after (cụm cố định)","vis":["con ếch biến thành hoàng tử đẹp trai,","cưới công chúa","và họ sống hạnh phúc","mãi mãi về sau (sai thứ tự — cần \"ever after\")"]},{"q":"5. <u>The Hare ran across a field</u> <u>as fastly as he could,</u> <u>and all the animals agreed</u> <u>that the Hare was very fast</u>.","options":["The Hare ran across a field","as fastly as he could,","and all the animals agreed","that the Hare was very fast"],"answer":1,"vi":"Con Thỏ chạy băng qua cánh đồng nhanh nhất có thể, và tất cả các con vật đều đồng ý rằng Thỏ rất nhanh.","explanation":"\"fast\" vừa là tính từ vừa là trạng từ, không thêm \"-ly\" → as fastly as phải sửa thành as fast as.","note":"as fast as (fast là trạng từ, không có \"-ly\")","vis":["con Thỏ chạy băng qua cánh đồng","nhanh hết mức có thể, (sai — \"fast\" đã là trạng từ, không thêm \"-ly\")","và tất cả loài vật đều đồng ý","rằng con Thỏ rất nhanh"]},{"q":"6. <u>While Cinderella</u> <u>danced with the prince,</u> <u>she remembered her fairy godmother’s words</u> <u>and rushed to go home</u>.","options":["While Cinderella","danced with the prince,","she remembered her fairy godmother’s words","and rushed to go home"],"answer":1,"vi":"Trong khi Lọ Lem đang khiêu vũ với hoàng tử, nàng nhớ lại lời dặn của bà tiên đỡ đầu và vội vã chạy về nhà.","explanation":"Sau \"While\" diễn tả hành động đang diễn ra (bị xen vào) → danced phải sửa thành was dancing.","note":"While + S + was/were + V-ing","vis":["trong khi Lọ Lem","khiêu vũ với hoàng tử, (sai — sau \"while\" cần V-ing \"was dancing\")","cô nhớ lời bà tiên đỡ đầu","và vội vã về nhà"]},{"q":"7. What an amazing <u>fables</u> <u>they are!</u> <u>Most children enjoy</u> <u>hearing or reading them</u>.","options":["fables","they are!","Most children enjoy","hearing or reading them"],"answer":0,"vi":"Những truyện ngụ ngôn này thật thú vị làm sao! Hầu hết trẻ em thích nghe hoặc đọc chúng.","explanation":"Câu cảm thán với danh từ số nhiều không dùng mạo từ \"an\" → an amazing fables phải sửa thành amazing fables (bỏ \"an\").","note":"What + adjective + plural noun! (không mạo từ)","vis":["truyện ngụ ngôn (sai — cần số ít sau \"an amazing\")","chúng thật là!","hầu hết trẻ em thích","nghe hoặc đọc chúng"]},{"q":"8. <u>Read folktales</u> <u>is a great way to share valuable lessons with your children</u> <u>and entertain them</u> <u>with interesting stories</u>.","options":["Read folktales","is a great way to share valuable lessons with your children","and entertain them","with interesting stories"],"answer":0,"vi":"Đọc truyện dân gian là một cách tuyệt vời để chia sẻ những bài học quý giá với con bạn và giải trí cho chúng bằng những câu chuyện thú vị.","explanation":"Chủ ngữ là danh động từ (V-ing) → Read phải sửa thành Reading.","note":"V-ing (danh động từ làm chủ ngữ)","vis":["đọc truyện dân gian (sai — cần V-ing \"Reading\" làm chủ ngữ)","là cách tuyệt vời để chia sẻ bài học quý giá với con bạn","và giải trí cho chúng","bằng những câu chuyện thú vị"]},{"q":"9. <u>Snow White and Sleeping Beauty</u> <u>are both fascinating fairy tales,</u> <u>but Snow White is</u> <u>best</u>.","options":["Snow White and Sleeping Beauty","are both fascinating fairy tales,","but Snow White is","best"],"answer":3,"vi":"Bạch Tuyết và Người đẹp ngủ trong rừng đều là những truyện cổ tích hấp dẫn, nhưng Bạch Tuyết hay hơn.","explanation":"So sánh giữa CHỈ HAI đối tượng cần so sánh hơn, không dùng so sánh nhất → best phải sửa thành better.","note":"so sánh hơn (giữa 2 đối tượng): better, không dùng best","vis":["Bạch Tuyết và Người đẹp ngủ trong rừng","đều là những câu chuyện cổ tích hấp dẫn,","nhưng Bạch Tuyết thì","hay nhất (sai — so sánh 2 đối tượng cần \"better\")"]},{"q":"10. <u>Despite of her misfortune,</u> <u>she is always cheerful</u> <u>and ready to</u> <u>play a small joke</u>.","options":["Despite of her misfortune,","she is always cheerful","and ready to","play a small joke"],"answer":0,"vi":"Mặc dù gặp bất hạnh, cô ấy luôn vui vẻ và sẵn sàng đùa giỡn.","explanation":"\"despite\" không đi kèm \"of\" (khác với \"in spite of\") → Despite of phải sửa thành Despite.","note":"Despite + N (không có \"of\")","vis":["mặc dù bất hạnh của cô ấy, (sai — \"despite\" không đi với \"of\")","cô ấy luôn vui vẻ","và sẵn sàng","chơi một trò đùa nhỏ"]},{"q":"11. <u>The custom to carve jack-o’-lanterns</u> <u>can be traced back</u> <u>to an old</u> <u>Irish folk tale</u>.","options":["The custom to carve jack-o’-lanterns","can be traced back","to an old","Irish folk tale"],"answer":0,"vi":"Tập tục khắc đèn lồng bí ngô có thể bắt nguồn từ một câu chuyện dân gian cổ của Ireland.","explanation":"\"a custom of doing something\" → to carve phải sửa thành of carving.","note":"a custom of + V-ing","vis":["phong tục khắc đèn lồng bí ngô (sai — \"custom\" đi với \"of V-ing\")","có thể bắt nguồn","từ một","truyện dân gian Ireland cổ"]},{"q":"12. <u>One day a dragon flew over the tower</u> <u>when he heard</u> <u>the princess</u> <u>cry for help</u>.","options":["One day a dragon flew over the tower","when he heard","the princess","cry for help"],"answer":0,"vi":"Một ngày nọ, một con rồng đang bay qua tòa tháp thì nghe thấy công chúa kêu cứu.","explanation":"Hành động đang diễn ra bị hành động khác xen vào (\"when he heard\") → flew phải sửa thành was flying.","note":"S + was/were + V-ing + when + S + V-ed","vis":["một ngày nọ, một con rồng bay qua tòa tháp (sai thì — cần quá khứ tiếp diễn \"was flying\")","khi nó nghe thấy","nàng công chúa","kêu cứu"]},{"q":"13. <u>Legends relate to history</u> <u>because they are based on</u> <u>history events</u> <u>and heroes</u>.","options":["Legends relate to history","because they are based on","history events","and heroes"],"answer":2,"vi":"Truyền thuyết liên quan đến lịch sử vì chúng dựa trên các sự kiện và anh hùng lịch sử.","explanation":"Trước danh từ \"events\" cần tính từ → history phải sửa thành historical.","note":"adjective (historical) + noun","vis":["truyền thuyết liên quan đến lịch sử","bởi vì chúng dựa trên","sự kiện lịch sử (sai — cần tính từ \"historical\")","và những anh hùng"]},{"q":"14. <u>It is considered impolite</u> <u>to not take off your shoes</u> <u>before entering</u> <u>a house in Japan</u>.","options":["It is considered impolite","to not take off your shoes","before entering","a house in Japan"],"answer":1,"vi":"Việc không cởi giày trước khi vào nhà ở Nhật Bản bị coi là bất lịch sự.","explanation":"Phủ định \"to V\" đặt \"not\" trước \"to\" → to not take off phải sửa thành not to take off.","note":"not to V (phủ định to-infinitive)","vis":["bị coi là bất lịch sự","không cởi giày (sai vị trí \"not\" — cần \"not to take off\")","trước khi vào","một ngôi nhà ở Nhật Bản"]},{"q":"15. <u>Erin had a three-weeks vacation;</u> <u>therefore he went to Vietnam</u> <u>and took part in</u> <u>some Spring festivals</u>.","options":["Erin had a three-weeks vacation;","therefore he went to Vietnam","and took part in","some Spring festivals"],"answer":0,"vi":"Erin có một kỳ nghỉ ba tuần; vì vậy anh ấy đã đến Việt Nam và tham gia một số lễ hội mùa xuân.","explanation":"Tính từ ghép đứng trước danh từ luôn ở dạng số ít → three-weeks phải sửa thành three-week.","note":"number + noun (số ít) + noun (tính từ ghép)","vis":["Erin có một kỳ nghỉ ba tuần; (sai — tính từ ghép không có \"s\": \"three-week\")","vì vậy anh ấy đã đến Việt Nam","và tham gia vào","một số lễ hội mùa xuân"]}],"roman":"VIII"},{"navLabel":"Sửa lỗi 2","title":"Tìm và sửa 5 lỗi sai trong đoạn văn","icon":"magnifying-glass","instructions":"Đọc đoạn văn. Mỗi câu có một lỗi sai. Gõ từ/cụm từ ĐÚNG vào ô trống, rồi bấm Kiểm tra để xem đáp án và giải thích. Gợi ý: nhập phần sửa đúng, ví dụ nếu lỗi là “goes” thì nhập “went”.","type":"fill","passage":{"title":"Đoạn văn gốc – Heart Song","html":"There was a great man who married the woman of his dreams. With their love, they created a little lovely girl. When the little girl was grew up, the great man would hug her and tell her, “I love you, little girl.” The little girl would pout and say, “I'm not a little girl anymore.” Then the man would laugh and say, “But to me, you'll always be my little girl.”<br><br>The little girl decided to leave her home and went into the world. As she learned more about herself, she learned more about the man. One of his strengths was his ability to express his love to his family. It didn't matter where she goes in the world, the man would call her and say, “I love you, little girl.”<br><br>The day came when the little girl received an unexpected phone call. The great man was ill. He had a stroke. He couldn't talk, smile, laugh, walk, hug, dance or tell the little girl that he loved her.<br><br>And so she went to the side of the great man. When she walked into the room and saw him, he looked small and not strong at all. He looked at her and tried to speak, but he can’t. The little girl did the only thing she could do. She sat next to the great man, drew her arms around the useless shoulders of her father.<br><br>Her head on his chest, she thought of many things. She remembered she had always felt protected and cherished by the great man. She felt grief for the loss she was to endure, the words of love that had comforted her.<br><br>And then she heard from within the man, the beat of his heart. The heart beat on, steadily unconcerned about the damage to the rest of the body. And while she rested there, the magic happened. She heard what she needed to hear.<br><br>His heart beaten out the words that his mouth could no longer say.... I love you, little girl … I love you, little girl … and she was comfortable. <i>(Patty Hansen)</i>","vi":"Ngày xưa có một người đàn ông tuyệt vời đã cưới người phụ nữ trong mơ của mình. Từ tình yêu của họ, họ đã có một cô con gái nhỏ đáng yêu. Khi cô bé lớn lên, người đàn ông vĩ đại thường ôm cô bé và nói, \"Bố yêu con, con gái bé bỏng của bố.\" Cô bé sẽ phụng phịu và nói, \"Con không còn là trẻ con nữa đâu.\" Rồi người đàn ông sẽ cười và nói, \"Nhưng với bố, con sẽ luôn là con gái bé bỏng của bố.\"<br><br>Cô bé quyết định rời khỏi nhà để bước ra thế giới. Khi cô ngày càng hiểu rõ bản thân mình hơn, cô cũng hiểu rõ hơn về người đàn ông ấy. Một trong những điểm mạnh của ông là khả năng bày tỏ tình yêu thương với gia đình. Dù cô đi đến đâu trên thế giới, người đàn ông vẫn gọi điện cho cô và nói, \"Bố yêu con, con gái bé bỏng của bố.\"<br><br>Rồi một ngày, cô bé nhận được một cuộc điện thoại bất ngờ. Người đàn ông vĩ đại ấy đã ốm. Ông bị đột quỵ. Ông không thể nói, cười, đi lại, ôm, khiêu vũ hay nói với cô bé rằng ông yêu cô.<br><br>Vậy nên cô đến bên người đàn ông vĩ đại ấy. Khi bước vào phòng và nhìn thấy ông, cô thấy ông trông nhỏ bé và không còn khỏe mạnh chút nào. Ông nhìn cô và cố gắng nói, nhưng không thể. Cô bé chỉ có thể làm điều duy nhất mình có thể làm. Cô ngồi cạnh người đàn ông vĩ đại ấy, vòng tay quanh đôi vai bất lực của cha mình.<br><br>Đặt đầu lên ngực ông, cô nghĩ về rất nhiều điều. Cô nhớ lại rằng mình luôn cảm thấy được che chở và yêu thương bởi người đàn ông vĩ đại ấy. Cô đau buồn trước sự mất mát mà mình sắp phải chịu đựng, những lời yêu thương đã từng an ủi cô.<br><br>Rồi cô nghe thấy từ bên trong người đàn ông ấy, nhịp đập trái tim ông. Trái tim vẫn đập đều đặn, không màng đến những tổn thương của phần còn lại trên cơ thể. Và trong khi cô nằm nghỉ ở đó, điều kỳ diệu đã xảy ra. Cô nghe được điều mình cần nghe.<br><br>Trái tim ông đã gõ nhịp những lời mà miệng ông không còn nói được nữa.... Bố yêu con, con gái bé bỏng… Bố yêu con, con gái bé bỏng… và cô cảm thấy được an ủi. <i>(Patty Hansen)</i>"},"questions":[{"q":"1. When the little girl was grew up, the great man would hug her and tell her, \"I love you, little girl.\" → ___","answer":"was growing up","vi":"Khi cô bé đang lớn lên, người đàn ông vĩ đại thường ôm và nói với cô bé, \"Bố yêu con, con gái bé bỏng.\"","explanation":"Diễn tả quá trình đang diễn ra trong quá khứ đi kèm \"was\" → grew up phải sửa thành growing up (was growing up).","note":"was/were + V-ing (quá khứ tiếp diễn)"},{"q":"2. It didn’t matter where she goes in the world, the man would call her and say, \"I love you, little girl.\" → ___","answer":"went","vi":"Dù cô đi đến đâu trên thế giới, người đàn ông đó vẫn gọi điện và nói, \"Bố yêu con, con gái bé bỏng.\"","explanation":"Toàn đoạn văn kể chuyện ở thì quá khứ → goes phải sửa thành went.","note":"thì quá khứ đơn (nhất quán với mạch kể chuyện)"},{"q":"3. The great man was ill. He had a stroke. → ___","answer":"had had a stroke","vi":"Người đàn ông vĩ đại bị ốm. Ông đã bị đột quỵ (trước đó).","explanation":"Sự việc xảy ra trước một mốc quá khứ khác (trước khi được biết là ông bị ốm) → had phải sửa thành had had (quá khứ hoàn thành).","note":"had had + V3 (quá khứ hoàn thành)"},{"q":"4. He looked at her and tried to speak, but he can’t. → ___","answer":"couldn’t","accepted":["could not","couldn’t"],"vi":"Ông nhìn cô và cố gắng nói, nhưng ông không thể.","explanation":"Toàn đoạn văn kể chuyện ở thì quá khứ → can’t phải sửa thành couldn’t.","note":"thì quá khứ đơn (nhất quán với mạch kể chuyện)"},{"q":"5. His heart beaten out the words that his mouth could no longer say. → ___","answer":"beat out","vi":"Trái tim ông đã đập ra thành lời mà miệng ông không còn nói được nữa.","explanation":"Động từ chính của câu cần chia ở quá khứ đơn, không dùng dạng phân từ quá khứ đơn độc → beaten out phải sửa thành beat out.","note":"S + V-ed (quá khứ đơn, không phải V3 đứng một mình)"}],"roman":"IX"},{"navLabel":"Đọc hiểu 1","title":"Đọc hiểu – Nàng tiên cá","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi câu hỏi. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"The Little Mermaid","html":"Once upon a time, in an underwater kingdom, there was a mermaid princess. On her 18th birthday, the mermaid was allowed to come up to the surface. While she was enjoying the new view, she saw and rescued a handsome prince from drowning. The little mermaid returned to her kingdom but she still longed for the surface. Desperately, she sought out the Sea Witch who gave her a human form in exchange for her voice. She must also win the prince’s love, otherwise she would die. When the mermaid met the prince, he didn’t recognise her at all. Unfortunately, the prince didn’t know that she once saved him and was in love with someone else. The only way to stay alive now was to kill the prince. Not able to do such a cruel act, the mermaid returned to the sea and waited for her death. However, thanks to her selflessness, she was returned into an immortal spirit.","vi":"Ngày xửa ngày xưa, trong một vương quốc dưới đáy biển, có một nàng công chúa tiên cá. Vào sinh nhật thứ 18, nàng được phép lên mặt nước. Trong khi đang tận hưởng khung cảnh mới lạ, nàng đã nhìn thấy và cứu một hoàng tử điển trai khỏi chết đuối. Nàng tiên cá trở về vương quốc của mình nhưng vẫn khao khát được lên mặt nước. Trong tuyệt vọng, nàng đã tìm đến Mụ Phù Thủy Biển, người đã cho nàng hình dạng con người để đổi lấy giọng nói của nàng. Nàng cũng phải giành được tình yêu của hoàng tử, nếu không nàng sẽ chết. Khi nàng tiên cá gặp lại hoàng tử, chàng hoàn toàn không nhận ra nàng. Thật không may, hoàng tử không biết rằng nàng từng cứu chàng và chàng đã yêu người khác. Cách duy nhất để sống sót lúc này là giết hoàng tử. Không thể làm một việc tàn nhẫn như vậy, nàng tiên cá trở về biển và chờ đợi cái chết của mình. Tuy nhiên, nhờ sự vị tha của mình, nàng đã được biến thành một linh hồn bất tử."},"questions":[{"q":"1. What happened on the mermaid princess’s birthday?","options":["She first came up to the surface.","She first met the prince.","A and B are correct.","A and B are incorrect."],"answer":2,"vi":"Điều gì đã xảy ra vào ngày sinh nhật của công chúa tiên cá?","explanation":"Bài đọc nói cô lần đầu lên mặt nước VÀ cứu/gặp hoàng tử cùng ngày đó → cả A và B đều đúng.","vis":["Cô lần đầu lên mặt nước. (đúng một phần)","Cô lần đầu gặp hoàng tử. (đúng một phần)","Cả A và B đều đúng. (đúng — cả hai xảy ra cùng ngày sinh nhật)","Cả A và B đều sai. (sai)"]},{"q":"2. What can be inferred from the fact that the mermaid still longed for the surface?","options":["She missed the prince.","She wanted to enjoy the view of the surface again.","She preferred leaving her underwater kingdom.","She waited for her next birthday."],"answer":0,"vi":"Có thể suy ra điều gì từ việc nàng tiên cá vẫn khao khát mặt nước?","explanation":"Nàng đã gặp và cứu hoàng tử, nên việc khao khát mặt nước ngụ ý nàng nhớ chàng.","vis":["Cô nhớ hoàng tử. (đúng)","Cô muốn ngắm cảnh mặt nước lần nữa. (sai — không phải lý do chính)","Cô muốn rời vương quốc dưới nước mãi mãi. (sai — suy luận quá mức)","Cô chờ sinh nhật tiếp theo. (sai, không có căn cứ)"]},{"q":"3. What did the little mermaid do to meet the prince?","options":["She gave up her voice to receive a human form.","She accepted the risk of death.","A and B are correct.","A and B are incorrect."],"answer":2,"vi":"Nàng tiên cá đã làm gì để được gặp hoàng tử?","explanation":"Bài đọc nói nàng đổi giọng nói lấy hình dạng con người VÀ chấp nhận rủi ro cái chết nếu không có được tình yêu của hoàng tử → cả A và B đúng.","vis":["Cô từ bỏ giọng nói để có hình dạng con người. (đúng một phần)","Cô chấp nhận nguy cơ tử vong. (đúng một phần)","Cả A và B đều đúng. (đúng)","Cả A và B đều sai. (sai)"]},{"q":"4. Why does the writer say the mermaid princess was selfless?","options":["Because she exchanged her voice for the human body.","Because she loved the prince.","Because she finally returned to the sea.","Because she didn’t kill the prince."],"answer":3,"vi":"Vì sao tác giả nói công chúa tiên cá là người vị tha?","explanation":"Bài đọc nói nàng không thể làm điều tàn nhẫn là giết hoàng tử dù điều đó có thể cứu mạng nàng → vị tha vì không giết hoàng tử.","vis":["Vì cô đổi giọng nói lấy cơ thể người. (sai — không phải lý do vị tha)","Vì cô yêu hoàng tử. (sai — không phải lý do vị tha)","Vì cuối cùng cô trở về biển. (sai — không phải lý do vị tha)","Vì cô không giết hoàng tử. (đúng — hành động hy sinh bản thân)"]},{"q":"5. Which of the following is NOT mentioned in the passage?","options":["The mermaid first saw the surface on her 18th birthday.","The mermaid couldn’t live another life after her death.","The Sea Witch helped the princess become human.","The prince didn’t realise the mermaid when they met again."],"answer":1,"vi":"Điều nào KHÔNG được nhắc đến trong bài?","explanation":"Bài đọc thực ra nói nàng được biến thành linh hồn bất tử sau khi chết, nên việc \"không thể sống cuộc đời khác\" không được nhắc đến (và trái ngược với nội dung bài).","vis":["Nàng tiên cá lần đầu thấy mặt nước vào sinh nhật 18. (có được nhắc đến)","Nàng tiên cá không thể sống kiếp khác sau khi chết. (không được nhắc đến — đúng)","Mụ phù thủy biển giúp công chúa trở thành người. (có được nhắc đến)","Hoàng tử không nhận ra nàng tiên cá khi gặp lại. (có được nhắc đến)"]}],"roman":"X"},{"navLabel":"Đọc hiểu 2","title":"Đọc hiểu – Truyện ngụ ngôn \"Wisdom\"","icon":"book-open","instructions":"Đọc truyện ngụ ngôn và chọn đáp án đúng cho mỗi chỗ trống. Chọn xong sẽ hiện đúng/sai ngay.","type":"mcq","instant":true,"passage":{"title":"Wisdom","html":"A farmer was ploughing his field. Sometimes, he shouted at and beat the buffalo that was <b>(1)</b> ___ the plough. A tiger happened to stroll along the edge of the field.<br><br>\"Buffalo, you are so big. <b>(2)</b> ___ do you let this weak man beat you?\", he asked.<br><br>The buffalo answered, \"The man is small <b>(3)</b> ___ his wisdom is big.\"<br><br>The tiger did not understand what wisdom was <b>(4)</b> ___ he shouted at the man. \"Hey you, man, what is wisdom? Let me see it.\"<br><br>\"Wisdom? Oh, my wisdom <b>(5)</b> ___ at home\", replied the man, looking at the tiger’s teeth and claws.<br><br>\"Go home <b>(6)</b> ___ get it. Bring it here so that I can see it\", the tiger ordered.<br><br>\"Oh, no! I am afraid that you will eat my buffalo <b>(7)</b> ___ I am gone. <b>(8)</b> ___ you agree to be tied with rope. I will run home and fetch my wisdom.\"<br><br>The tiger agreed. <b>(9)</b> ___ fastening the tiger, the farmer beat its back.<br><br>\"<b>(10)</b> ___ is my wisdom. This is my wisdom\", he explained.","vi":"Một người nông dân đang cày ruộng. Thỉnh thoảng, ông quát mắng và đánh con trâu đang <b>(1)</b> ___ kéo cày. Một con hổ tình cờ đi dạo dọc theo bờ ruộng.<br><br>\"Này Trâu, mày to lớn thế. <b>(2)</b> ___ Sao mày lại để người đàn ông yếu ớt này đánh mày?\", nó hỏi.<br><br>Con trâu trả lời, \"Người đàn ông tuy nhỏ bé <b>(3)</b> ___ nhưng trí khôn của ông ấy lớn.\"<br><br>Con hổ không hiểu trí khôn là gì <b>(4)</b> ___ nên nó quát vào mặt người đàn ông. \"Này ông kia, trí khôn là gì? Cho ta xem nó.\"<br><br>\"Trí khôn ư? Ồ, trí khôn của tôi <b>(5)</b> ___ để ở nhà\", người đàn ông đáp, mắt nhìn vào răng và móng vuốt của con hổ.<br><br>\"Về nhà <b>(6)</b> ___ lấy nó đi. Mang nó đến đây để ta xem\", con hổ ra lệnh.<br><br>\"Ôi không! Tôi sợ rằng ông sẽ ăn thịt trâu của tôi <b>(7)</b> ___ trong khi tôi đi vắng. <b>(8)</b> ___ Nếu ông đồng ý bị trói bằng dây thừng, tôi sẽ chạy về nhà lấy trí khôn.\"<br><br>Con hổ đồng ý. <b>(9)</b> ___ Sau khi trói con hổ lại, người nông dân đánh vào lưng nó.<br><br>\"<b>(10)</b> ___ Đây là trí khôn của tôi. Đây chính là trí khôn của tôi\", ông giải thích."},"questions":[{"q":"1. …he shouted at and beat the buffalo that was (1) ___ the plough.","options":["pull","pulling","pulled","to pull"],"answer":1,"vi":"…ông ta hét vào mặt và đánh con trâu đang kéo cày.","explanation":"\"was + V-ing\" (quá khứ tiếp diễn) → pulling.","vis":["kéo (nguyên mẫu, sai)","đang kéo (V-ing, đúng — was + V-ing)","đã kéo (quá khứ, sai)","để kéo (to-V, sai)"]},{"q":"2. \"Buffalo, you are so big. (2) ___ do you let this weak man beat you?\", he asked.","options":["What","How","When","Why"],"answer":3,"vi":"\"Này Trâu, mày to lớn thế. Sao mày lại để người đàn ông yếu ớt này đánh mày?\", nó hỏi.","explanation":"Hỏi lý do → Why.","vis":["cái gì (sai từ để hỏi)","như thế nào (sai từ để hỏi)","khi nào (sai từ để hỏi)","tại sao (đúng)"]},{"q":"3. The buffalo answered, \"The man is small (3) ___ his wisdom is big.\"","options":["and","but","so","or"],"answer":1,"vi":"Con trâu trả lời, \"Người đàn ông tuy nhỏ bé nhưng trí khôn của ông ấy lớn.\"","explanation":"Sự tương phản → but.","vis":["và (sai liên từ)","nhưng (đúng, ý tương phản)","vì vậy (sai liên từ)","hoặc (sai liên từ)"]},{"q":"4. The tiger did not understand what wisdom was (4) ___ he shouted at the man.","options":["and","but","although","so"],"answer":3,"vi":"Con hổ không hiểu trí khôn là gì nên nó quát vào mặt người đàn ông.","explanation":"Nêu kết quả → so.","vis":["và (sai liên từ)","nhưng (sai liên từ)","mặc dù (sai — cần liên từ nối 2 mệnh đề độc lập)","vì vậy (đúng)"]},{"q":"5. \"Wisdom? Oh, my wisdom (5) ___ at home\", replied the man.","options":["is","are","was","were"],"answer":0,"vi":"\"Trí khôn ư? Ồ, trí khôn của tôi để ở nhà\", người đàn ông đáp.","explanation":"Câu nói trực tiếp, hiện tại đơn, chủ ngữ số ít \"my wisdom\" → is.","vis":["là (đúng, chủ ngữ số ít \"wisdom\")","là (sai, số nhiều)","đã là (sai thì)","đã là (sai thì/số)"]},{"q":"6. \"Go home (6) ___ get it. Bring it here so that I can see it\", the tiger ordered.","options":["but","and","so","yet"],"answer":1,"vi":"\"Về nhà lấy nó đi. Mang nó đến đây để ta xem\", con hổ ra lệnh.","explanation":"Hai hành động nối tiếp → and.","vis":["nhưng (sai liên từ)","và (đúng, nối 2 mệnh đề cầu khiến)","vì vậy (sai liên từ)","nhưng (sai liên từ)"]},{"q":"7. \"I am afraid that you will eat my buffalo (7) ___ I am gone.\"","options":["why","while","although","if"],"answer":1,"vi":"\"Tôi sợ rằng ông sẽ ăn thịt trâu của tôi trong khi tôi đi vắng.\"","explanation":"Diễn tả thời gian đồng thời → while.","vis":["tại sao (sai từ để hỏi)","trong khi (đúng)","mặc dù (sai nghĩa)","nếu (sai nghĩa)"]},{"q":"8. \"(8) ___ you agree to be tied with rope. I will run home and fetch my wisdom.\"","options":["While","Because","Although","If"],"answer":3,"vi":"\"Nếu ông đồng ý để bị trói bằng dây thừng, tôi sẽ chạy về nhà lấy trí khôn.\"","explanation":"Điều kiện → If.","vis":["trong khi (sai liên từ)","bởi vì (sai liên từ)","mặc dù (sai liên từ)","nếu (đúng, điều kiện)"]},{"q":"9. The tiger agreed. (9) ___ fastening the tiger, the farmer beat its back.","options":["Before","After","Because","But"],"answer":1,"vi":"Con hổ đồng ý. Sau khi trói con hổ lại, người nông dân đánh vào lưng nó.","explanation":"Hành động xảy ra sau khi trói xong → After.","vis":["trước khi (sai, trình tự ngược)","sau khi (đúng)","bởi vì (sai liên từ)","nhưng (sai liên từ)"]},{"q":"10. \"(10) ___ is my wisdom. This is my wisdom\", he explained.","options":["Here","There","She","That"],"answer":0,"vi":"\"Đây là trí khôn của tôi. Đây chính là trí khôn của tôi\", ông giải thích.","explanation":"Chỉ vào vật ngay trước mặt → Here.","vis":["đây (đúng)","đó (sai)","cô ấy (sai từ loại)","đó (sai)"]}],"roman":"XI"},{"navLabel":"Đọc hiểu 3","title":"Đọc hiểu – Truyền thuyết Táo Quân (Kitchen Gods)","icon":"book-open","instructions":"Đọc đoạn văn và trả lời các câu hỏi bằng tiếng Anh.","type":"sentence","instant":true,"passage":{"title":"Kitchen Gods","html":"Once upon a time, there was a childless couple. The wife was faithful and loved the husband passionately while the husband treated his wife badly. One day he beat the poor wife with a stick and dismissed her from home. The woman had come to another place. She then got married with a kind man, and they lived in harmony.<br><br>One afternoon when her husband had gone for hunting, a beggar came and asked for some food. The woman was kind; she filled the poor beggar’s bag and recognized that the beggar was her former husband. The man also recognized his wife then. She felt sorry for the man when hearing that from the day he dismissed her, he was deeply sad and regretful. So he decided to go away to find her until he spent all his money and became a beggar.<br><br>After being offered a big meal, the man was drunk so the woman had to drag him out and hid him in a stack of straw because it was time for her recent husband to come back from the forest.<br><br>After a while, there was a knock at the door, the hunter appeared with a deer on his back. He then happily asked the woman to go to the market to prepare for the dinner. When the woman came back, she found that the stack of straw, where her drunk former husband was sleeping, had been burned with a deer roasted in it. She cried painfully, and then jumped into the fire. The hunter didn’t know what had happened and what to do but jumped into the fire to die beside his wife.<br><br>At that moment, God was in heaven, he was moved by the story so he turned the three of them into three parts of the earthen tripod so that they could live side by side forever, and conferred them with the title of Kitchen God to oversee all the cooking of people. Every year, they all together came back to heaven on the 23rd of the 12th lunar month to report to God.","vi":"Ngày xửa ngày xưa, có một đôi vợ chồng không con. Người vợ chung thủy và yêu chồng tha thiết, trong khi người chồng lại đối xử tệ bạc với vợ. Một ngày nọ, ông ta đánh người vợ tội nghiệp bằng gậy và đuổi bà khỏi nhà. Người phụ nữ đến một nơi khác. Sau đó bà kết hôn với một người đàn ông tốt bụng, và họ sống hòa thuận với nhau.<br><br>Một buổi chiều khi chồng bà đi săn, có một người ăn xin đến xin thức ăn. Người phụ nữ tốt bụng; bà đổ đầy túi cho người ăn xin tội nghiệp và nhận ra người ăn xin đó chính là chồng cũ của mình. Người đàn ông cũng nhận ra vợ mình. Bà cảm thấy thương xót khi nghe rằng từ ngày đuổi bà đi, ông rất buồn bã và hối hận. Vì vậy ông quyết định đi tìm bà cho đến khi tiêu hết tiền và trở thành ăn mày.<br><br>Sau khi được mời một bữa ăn thịnh soạn, người đàn ông say rượu nên người phụ nữ phải kéo ông ra ngoài và giấu ông trong đống rơm vì đã đến giờ người chồng hiện tại của bà trở về từ rừng.<br><br>Một lúc sau, có tiếng gõ cửa, người thợ săn xuất hiện với một con hươu trên lưng. Ông vui vẻ nhờ vợ ra chợ chuẩn bị bữa tối. Khi người phụ nữ trở về, bà phát hiện đống rơm, nơi người chồng cũ say rượu đang ngủ, đã bị cháy cùng với con hươu đang nướng bên trong. Bà đau đớn khóc, rồi nhảy vào lửa. Người thợ săn không biết chuyện gì đã xảy ra và phải làm gì ngoài việc nhảy vào lửa để chết cùng vợ.<br><br>Vào khoảnh khắc đó, Trời đang ở trên thiên đình, cảm động trước câu chuyện nên đã biến cả ba người thành ba phần của chiếc kiềng đất để họ có thể sống bên nhau mãi mãi, và phong cho họ danh hiệu Táo Quân để trông coi việc bếp núc của con người. Hàng năm, cả ba người cùng nhau trở về trời vào ngày 23 tháng Chạp âm lịch để báo cáo với Ngọc Hoàng."},"questions":[{"q":"1. Why did the wife have to leave for another place?","answer":"Because one day her husband beat her with a stick and dismissed her from home.","accepted":["Because one day her husband beat her with a stick and dismissed her from home."],"vi":"Vì sao người vợ phải rời đi nơi khác?","explanation":"Bài đọc nói một ngày người chồng đánh bà bằng gậy và đuổi bà khỏi nhà."},{"q":"2. What did the former husband do after dismissing his wife from home?","answer":"He was deeply sad and regretful, so he decided to go away to find her until he spent all his money and became a beggar.","accepted":["He was deeply sad and regretful, so he decided to go away to find her until he spent all his money and became a beggar."],"vi":"Người chồng cũ đã làm gì sau khi đuổi vợ khỏi nhà?","explanation":"Bài đọc nói ông ta rất buồn và hối hận nên quyết định đi tìm bà cho đến khi tiêu hết tiền và trở thành ăn mày."},{"q":"3. Why did the wife jump into the fire?","answer":"Because she found that the stack of straw, where her drunk former husband was sleeping, had been burned with a deer roasted in it.","accepted":["Because she found that the stack of straw, where her drunk former husband was sleeping, had been burned with a deer roasted in it."],"vi":"Vì sao người vợ nhảy vào lửa?","explanation":"Bài đọc nói bà phát hiện đống rơm nơi người chồng cũ say rượu đang ngủ đã bị cháy cùng với con hươu đang nướng."},{"q":"4. What did the hunter do then?","answer":"He jumped into the fire to die beside his wife.","accepted":["He jumped into the fire to die beside his wife."],"vi":"Người thợ săn đã làm gì sau đó?","explanation":"Bài đọc nói ông cũng nhảy vào lửa để chết cùng vợ."},{"q":"5. Why did God turn them into three parts of the earthen tripod?","answer":"God was moved by the story, so he turned them into three parts of the earthen tripod so that they could live side by side forever.","accepted":["God was moved by the story, so he turned them into three parts of the earthen tripod so that they could live side by side forever."],"vi":"Vì sao Trời biến ba người thành ba chiếc kiềng bếp?","explanation":"Bài đọc nói Trời cảm động trước câu chuyện nên đã biến họ thành ba phần của chiếc kiềng đất để họ có thể sống bên nhau mãi mãi."}],"roman":"XII"},{"navLabel":"Viết 1","title":"Write full sentences using the words or phrases provided","icon":"pen-to-square","instructions":"Dùng các từ/cụm từ gợi ý để viết thành câu hoàn chỉnh (có thể thêm từ hoặc thay đổi cho phù hợp ngữ pháp).","type":"sentence","instant":true,"questions":[{"q":"1.","original":"Prince Tiet Lieu/ please/ the emperor/ by/ create/ Chung cakes/ Day cakes","answer":"Prince Tiet Lieu pleased the emperor by creating Chung cakes and Day cakes.","accepted":["prince tiet lieu pleased the emperor by creating chung cakes and day cakes"],"vi":"Hoàng tử Tiết Liêu đã làm hài lòng nhà vua bằng cách tạo ra bánh Chưng và bánh Dày.","explanation":"please + O + by + V-ing (làm hài lòng ai bằng cách nào).","note":"S + pleased + O + by + V-ing"},{"q":"2.","original":"While/ Little Red Riding Hood/ pick/ some flowers/ path/ she/ meet/ wicked wolf","answer":"While Little Red Riding Hood was picking some flowers on the path, she met a wicked wolf.","accepted":["while little red riding hood was picking some flowers on the path, she met a wicked wolf"],"vi":"Trong khi Cô bé quàng khăn đỏ đang hái hoa trên đường, cô gặp một con sói gian ác.","explanation":"While + S + was/were + V-ing, S + V-ed (hành động ngắn xen vào).","note":"While + S + was/were + V-ing, S + V-ed"},{"q":"3.","original":"When/ the crow/ drop/ cheese/ the fox/ eat/ it","answer":"When the crow dropped the cheese, the fox ate it.","accepted":["when the crow dropped the cheese, the fox ate it"],"vi":"Khi con quạ làm rơi miếng phô mai, con cáo đã ăn nó.","explanation":"When + S + V-ed, S + V-ed (hai hành động nối tiếp).","note":"When + S + V-ed, S + V-ed"},{"q":"4.","original":"The fox/ sleep/ under/ tree/ when/ she/ hear/ sound of humans.","answer":"The fox was sleeping under a tree when she heard the sound of humans.","accepted":["the fox was sleeping under a tree when she heard the sound of humans"],"vi":"Con cáo đang ngủ dưới gốc cây thì nghe thấy tiếng người.","explanation":"S + was/were + V-ing + when + S + V-ed (hành động đang diễn ra bị xen vào).","note":"S + was/were + V-ing + when + S + V-ed"},{"q":"5.","original":"The princess/ sleep/ one hundred years/ until/ prince/ arrive/ the castle/ give/ a kiss","answer":"The princess slept for one hundred years until a prince arrived at the castle and gave her a kiss.","accepted":["the princess slept for one hundred years until a prince arrived at the castle and gave her a kiss"],"vi":"Công chúa đã ngủ suốt một trăm năm cho đến khi một hoàng tử đến lâu đài và hôn nàng.","explanation":"S + V-ed + for + khoảng thời gian + until + S + V-ed.","note":"S + V-ed + until + S + V-ed"},{"q":"6.","original":"Once/ time/ there/ little girl/ live/ village/ near/ forest","answer":"Once upon a time, there was a little girl who lived in a village near a forest.","accepted":["once upon a time, there was a little girl who lived in a village near a forest","once upon a time, there was a little girl who lived in the village near the forest"],"vi":"Ngày xửa ngày xưa, có một cô bé sống trong một ngôi làng gần khu rừng.","explanation":"Once upon a time, there was + N + who + V-ed (mở đầu truyện cổ tích).","note":"Once upon a time, there was + N + who + V-ed"},{"q":"7.","original":"When/ the dwarfs/ return/ their cottage/ they/ find/ Snow White/ sleep/ their beds","answer":"When the dwarfs returned to their cottage, they found Snow White sleeping on their beds.","accepted":["when the dwarfs returned to their cottage, they found snow white sleeping on their beds"],"vi":"Khi các chú lùn trở về nhà, họ thấy Bạch Tuyết đang ngủ trên giường của họ.","explanation":"When + S + V-ed, S + found + O + V-ing (thấy ai đang làm gì).","note":"When + S + V-ed, S + found + O + V-ing"},{"q":"8.","original":"As/ we/ wander/ through/ the castle/ we/ see/ beautiful girl/ cry/ help","answer":"As we were wandering through the castle, we saw a beautiful girl cry for help.","accepted":["as we were wandering through the castle, we saw a beautiful girl cry for help","as we were wandering through the castle, we saw a beautiful girl crying for help"],"vi":"Khi chúng tôi đang đi dạo trong lâu đài, chúng tôi thấy một cô gái xinh đẹp đang kêu cứu.","explanation":"As + S + was/were + V-ing, S
