oves.","vis":["đang chuyển động (V-ing, không phải động từ chia)","chuyển động (nguyên mẫu, sai ngôi số ít)","chuyển động (đúng, chia cho chủ ngữ số ít)","đang chuyển động (hiện tại tiếp diễn, không hợp với sự thật khoa học)"]},{"q":"3. People who live in different regions can speak their languages with different ___.","options":["accent","accents","voice","voices"],"answer":1,"vi":"Người sống ở các vùng khác nhau có thể nói ngôn ngữ của họ với giọng khác nhau.","explanation":"\"accents\" (số nhiều) vì có \"different\" và nhiều người → accents.","vis":["giọng (số ít)","giọng (số nhiều, đúng vì có \"different\")","giọng nói/chất giọng (số ít, sai nghĩa)","giọng nói/chất giọng (số nhiều, sai nghĩa)"]},{"q":"4. She thought that if they ___ lots of money, they would go on holiday.","options":["have","are having","had","has"],"answer":2,"vi":"Cô ấy nghĩ rằng nếu họ có nhiều tiền, họ sẽ đi nghỉ.","explanation":"Câu điều kiện loại 2: if + S + V-ed (quá khứ đơn) → had.","vis":["có (sai thì)","đang có (hiện tại tiếp diễn, sai thì)","có (quá khứ đơn, đúng cho câu điều kiện loại 2)","có (chia ngôi ba, sai thì)"]},{"q":"5. How long ___ you studied English?","options":["have been","have","has","having"],"answer":1,"vi":"Bạn đã học tiếng Anh được bao lâu?","explanation":"Hiện tại hoàn thành: How long have + S + P2?","vis":["đã từng (thì hoàn thành, sai cấu trúc câu hỏi)","trợ động từ cho \"you\" (hiện tại hoàn thành, đúng)","trợ động từ ngôi ba số ít (sai vì chủ ngữ là \"you\")","đang có (V-ing, sai cấu trúc)"]},{"q":"6. The little cat should be ___ to be healthy.","options":["cured","cure","cures","curing"],"answer":0,"vi":"Con mèo nhỏ nên được chữa trị để khỏe mạnh.","explanation":"Bị động với động từ khiếm khuyết → should be cured.","vis":["được chữa trị (quá khứ phân từ, đúng sau \"should be\")","chữa trị (nguyên mẫu, sai vị trí)","chữa trị (chia động từ, sai)","đang chữa trị (V-ing, sai)"]},{"q":"7. Disneyland is ___ of the most interesting games.","options":["a house","houses","home","homes"],"answer":2,"vi":"Disneyland là nơi có những trò chơi thú vị nhất.","explanation":"\"home of\" = nơi có, quê hương của.","vis":["một ngôi nhà (nghĩa đen, sai cụm)","những ngôi nhà (số nhiều, sai)","nơi có, quê hương của (home of, đúng cụm)","những ngôi nhà/quê hương (số nhiều, sai)"]},{"q":"8. Did the storm cause ___ to the local in the middle part?","options":["damaged","damage","damaging","damages"],"answer":1,"vi":"Cơn bão có gây thiệt hại cho người dân ở khu vực giữa không?","explanation":"Sau \"cause\" cần danh từ → damage.","vis":["bị hư hại (tính từ, sai vị trí sau \"cause\")","thiệt hại (danh từ, đúng sau \"cause\")","gây hại (V-ing/tính từ, sai)","tiền bồi thường/gây hại (sai ở đây)"]},{"q":"9. When I came there, the highest building ___ been destroyed by the storm!","options":["have","has","had","is having"],"answer":2,"vi":"Khi tôi đến đó, tòa nhà cao nhất đã bị phá hủy bởi bão!","explanation":"Quá khứ hoàn thành: had + P2.","vis":["trợ động từ hiện tại hoàn thành (sai thì)","trợ động từ ngôi ba, hiện tại hoàn thành (sai thì)","trợ động từ quá khứ hoàn thành (đúng)","đang có (hiện tại tiếp diễn, sai)"]},{"q":"10. She wouldn't go out if she ___ the weather forecast.","options":["listens to","listened to","listening to","is listening to"],"answer":1,"vi":"Cô ấy sẽ không ra ngoài nếu cô ấy nghe dự báo thời tiết.","explanation":"Câu điều kiện loại 2: if + S + V-ed → listened to.","vis":["nghe (hiện tại đơn, sai thì cho câu điều kiện loại 2)","nghe (quá khứ đơn, đúng cho câu điều kiện loại 2)","đang nghe (V-ing, sai)","đang nghe (hiện tại tiếp diễn, sai)"]},{"q":"11. My cousin said that she and her boyfriend would get ___ in the following month.","options":["marry","marries","married","marrying"],"answer":2,"vi":"Chị họ tôi nói rằng cô ấy và bạn trai sẽ kết hôn vào tháng sau.","explanation":"\"get married\" = kết hôn.","vis":["kết hôn (nguyên mẫu, sai vị trí)","kết hôn (chia động từ, sai)","get married = kết hôn (đúng cụm)","đang kết hôn (V-ing, sai)"]},{"q":"12. Why have they been ___ to speak Spanish?","options":["ability","abilities","abled","able"],"answer":3,"vi":"Tại sao họ có thể nói tiếng Tây Ban Nha?","explanation":"\"be able to\" = có khả năng.","vis":["khả năng (danh từ số ít, sai từ loại)","những khả năng (danh từ số nhiều, sai)","(không phải từ đúng ngữ pháp)","be able to = có thể (đúng)"]},{"q":"13. How ___ do you know about the United Kingdom?","options":["many","long","much","often"],"answer":2,"vi":"Bạn biết bao nhiêu về Vương quốc Anh?","explanation":"\"How much\" + danh từ không đếm được (knowledge).","vis":["nhiều (dùng với danh từ đếm được số nhiều, sai)","dài, lâu (hỏi thời gian, sai nghĩa)","nhiều (dùng với danh từ không đếm được như \"kiến thức\", đúng)","thường xuyên (sai nghĩa)"]},{"q":"14. The first thing you see in her country is ___ restaurants.","options":["spacious","Space","spaces","spacing"],"answer":0,"vi":"Điều đầu tiên bạn thấy ở đất nước cô ấy là những nhà hàng rộng rãi.","explanation":"Trước danh từ \"restaurants\" cần tính từ → spacious.","vis":["rộng rãi (tính từ, đúng trước danh từ)","không gian (danh từ, sai từ loại)","những không gian (danh từ số nhiều, sai)","khoảng cách, sự dàn trải (danh từ, sai)"]},{"q":"15. The ___ pollution happens when the radiation goes into the land.","options":["radio","radios","radiated","radioactive"],"answer":3,"vi":"Ô nhiễm phóng xạ xảy ra khi bức xạ đi vào đất.","explanation":"\"radioactive pollution\" = ô nhiễm phóng xạ (tính từ + danh từ).","vis":["đài, radio (danh từ, sai từ loại)","những chiếc đài (danh từ số nhiều, sai)","đã tỏa ra, phát xạ (động từ quá khứ, sai từ loại)","phóng xạ (tính từ, đúng trước \"pollution\")"]},{"q":"16. What is the ___ with you?","options":["matters","matter","wrong","fault"],"answer":1,"vi":"Bạn bị làm sao vậy?","explanation":"\"What is the matter with you?\" = Bạn bị gì vậy?","vis":["những vấn đề (số nhiều, sai vì cần số ít có mạo từ \"the\")","vấn đề (What is the matter with you? = Bạn bị sao vậy?, đúng)","sai, có vấn đề (tính từ, không đi với \"the\" theo cách này)","lỗi (danh từ, sai nghĩa cụm)"]},{"q":"17. How ___ going to the cinema?","options":["at","in","on","about"],"answer":3,"vi":"Đi xem phim thì sao?","explanation":"\"How about + V-ing?\" = lời đề nghị.","vis":["tại, ở (sai giới từ)","trong (sai giới từ)","trên (sai giới từ)","How about + V-ing? = lời đề nghị (đúng)"]},{"q":"18. If I ___ hard, I will get good marks.","options":["will study","study","am studying","studied"],"answer":1,"vi":"Nếu tôi học chăm chỉ, tôi sẽ được điểm cao.","explanation":"Câu điều kiện loại 1: if + S + V (hiện tại đơn) → study.","vis":["sẽ học (tương lai đơn, sai vì mệnh đề if dùng hiện tại đơn)","học (hiện tại đơn, đúng cho câu điều kiện loại 1)","đang học (hiện tại tiếp diễn, sai)","đã học (quá khứ đơn, sai thì)"]},{"q":"19. How can ___ help the poor in this town?","options":["governments","a government","the government","government"],"answer":2,"vi":"Chính phủ có thể giúp đỡ người nghèo ở thị trấn này bằng cách nào?","explanation":"\"the government\" (có mạo từ xác định) chỉ chính phủ cụ thể.","vis":["những chính phủ (số nhiều, sai)","một chính phủ (không xác định, sai)","chính phủ cụ thể của thị trấn này (đúng, có \"the\")","chính phủ (không mạo từ, sai)"]},{"q":"20. She ___ it difficult to understand their culture.","options":["thinks","learn","finds","realizes"],"answer":2,"vi":"Cô ấy thấy khó hiểu văn hóa của họ.","explanation":"\"find + it + adj\" = thấy...như thế nào.","vis":["nghĩ (sai nghĩa/cấu trúc)","học (sai từ loại và sai nghĩa)","find + it + adj = thấy...như thế nào (đúng)","nhận ra (sai nghĩa cụm)"]},{"q":"21. A: Do you mind if I ___ a phone call? B: No, of course not.","options":["answer","send","take","make"],"answer":3,"vi":"Bạn có phiền nếu tôi gọi một cuộc điện thoại không?","explanation":"\"make a phone call\" = gọi điện thoại (cụm cố định).","vis":["trả lời (sai cụm từ)","gửi (sai cụm từ)","nhận, cầm (sai cụm từ)","make a phone call = gọi điện thoại (đúng, cụm cố định)"]},{"q":"22. After speaking on the phone, we knew we will have to see one another ___.","options":["hand-in-hand","face-to-face","head-to-toe","toe-to-toe"],"answer":1,"vi":"Sau khi nói chuyện điện thoại, chúng tôi biết chúng tôi sẽ phải gặp nhau trực tiếp.","explanation":"\"face-to-face\" = trực diện, gặp mặt trực tiếp.","vis":["tay trong tay, cùng nhau (sai nghĩa)","trực diện, mặt đối mặt (đúng)","từ đầu đến chân (sai nghĩa)","đối đầu trực tiếp (sai ngữ cảnh)"]},{"q":"23. We can use ___ for talking only, not for sending text messages.","options":["landline phone","mobile phone","smart phone","video"],"answer":0,"vi":"Chúng ta có thể dùng điện thoại bàn chỉ để gọi, không thể gửi tin nhắn.","explanation":"\"landline phone\" = điện thoại bàn, chỉ dùng để gọi.","vis":["điện thoại bàn (chỉ gọi được, đúng)","điện thoại di động (có thể nhắn tin, sai)","điện thoại thông minh (có thể nhắn tin, sai)","video (sai nghĩa)"]},{"q":"24. Using signs is one kind of ___ communication.","options":["verbal","non-verbal","multimedia","written"],"answer":1,"vi":"Sử dụng ký hiệu là một loại giao tiếp phi ngôn ngữ.","explanation":"\"non-verbal communication\" = giao tiếp phi ngôn ngữ.","vis":["bằng lời nói (sai nghĩa, ký hiệu không phải lời nói)","phi ngôn ngữ (đúng)","đa phương tiện (sai nghĩa)","bằng chữ viết (sai nghĩa)"]},{"q":"25. I read about the accident ___ the Internet.","options":["on","in","to","at"],"answer":0,"vi":"Tôi đọc về vụ tai nạn trên Internet.","explanation":"\"on the Internet\" = trên Internet.","vis":["trên (on the Internet, đúng)","trong (sai giới từ)","đến (sai giới từ)","tại (sai giới từ)"]},{"q":"26. This time next week we ___ around Africa.","options":["are travelling","travel","will travel","will be travelling"],"answer":3,"vi":"Giờ này tuần sau chúng tôi sẽ đang đi quanh châu Phi.","explanation":"Thì tương lai tiếp diễn: will be + V-ing.","vis":["đang đi (hiện tại tiếp diễn, sai thì)","đi (nguyên mẫu, sai thì)","sẽ đi (tương lai đơn, sai — cần tương lai tiếp diễn)","sẽ đang đi (tương lai tiếp diễn, đúng)"]},{"q":"27. At three o'clock tomorrow, we ___ a video conference in our office.","options":["have","will be having","had","are having"],"answer":1,"vi":"Ngày mai lúc 3 giờ, chúng tôi sẽ đang họp video trong văn phòng.","explanation":"Thì tương lai tiếp diễn: will be + V-ing.","vis":["có (nguyên mẫu, sai thì)","sẽ đang có/họp (tương lai tiếp diễn, đúng)","đã có (quá khứ đơn, sai thì)","đang có (hiện tại tiếp diễn, sai thì cho \"tomorrow\")"]},{"q":"28. Lena enjoys ___ on the phone with her friends.","options":["chat","chats","chatting","chatted"],"answer":2,"vi":"Lena thích nói chuyện điện thoại với bạn bè.","explanation":"\"enjoy + V-ing\" = thích làm gì.","vis":["trò chuyện (nguyên mẫu, sai vị trí)","trò chuyện (chia động từ, sai)","trò chuyện (V-ing, đúng sau \"enjoy\")","đã trò chuyện (quá khứ, sai)"]},{"q":"29. How did you learn ___ Japanese so well?","options":["speaking","to speak","speak","spoke"],"answer":1,"vi":"Bạn học nói tiếng Nhật giỏi như vậy bằng cách nào?","explanation":"\"learn + to V\" = học làm gì.","vis":["nói (V-ing, sai cấu trúc \"learn\")","nói (to-V, đúng sau \"learn\")","nói (nguyên mẫu, sai vị trí)","đã nói (quá khứ, sai)"]},{"q":"30. My sister suggested ___ fishing, but I didn't think that was a good idea.","options":["to go","go","going","goes"],"answer":2,"vi":"Chị tôi đề nghị đi câu cá, nhưng tôi không nghĩ đó là ý hay.","explanation":"\"suggest + V-ing\" = đề nghị làm gì.","vis":["đi (to-V, sai cấu trúc \"suggest\")","đi (nguyên mẫu, sai)","đi (V-ing, đúng sau \"suggest\")","đi (chia động từ, sai)"]},{"q":"31. I feel like ___ out tonight. What about you?","options":["to go","go","going","be going"],"answer":2,"vi":"Tôi cảm thấy muốn đi ra ngoài tối nay. Còn bạn?","explanation":"\"feel like + V-ing\" = cảm thấy muốn làm gì.","vis":["đi (to-V, sai cấu trúc \"feel like\")","đi (nguyên mẫu, sai)","đi (V-ing, đúng sau \"feel like\")","(sai ngữ pháp)"]},{"q":"32. I chose ___ by plane because it's more convenient.","options":["to travel","travel","travelling","to travelling"],"answer":0,"vi":"Tôi chọn đi máy bay vì nó tiện hơn.","explanation":"\"choose + to V\" = chọn làm gì.","vis":["đi du lịch (to-V, đúng sau \"choose\")","đi du lịch (nguyên mẫu, sai vị trí)","đi du lịch (V-ing, sai cấu trúc \"choose\")","(sai ngữ pháp, không tồn tại cấu trúc này)"]},{"q":"33. Nowadays people prefer ___ smart phones rather than landline phones.","options":["use","using","to use","to be using"],"answer":2,"vi":"Ngày nay mọi người thích dùng điện thoại thông minh hơn điện thoại bàn.","explanation":"\"prefer + to V\" = thích làm gì hơn.","vis":["dùng (nguyên mẫu, sai vị trí)","dùng (V-ing, sai theo đáp án đề bài)","dùng (to-V, đúng theo đáp án)","(sai ngữ pháp phức tạp không cần thiết)"]},{"q":"34. We hope ___ next week.","options":["meet","meeting","to meet","to meeting"],"answer":2,"vi":"Chúng tôi hy vọng gặp nhau tuần sau.","explanation":"\"hope + to V\" = hy vọng làm gì.","vis":["gặp (nguyên mẫu, sai vị trí)","gặp gỡ/cuộc họp (V-ing/danh từ, sai cấu trúc \"hope\")","gặp (to-V, đúng sau \"hope\")","(sai ngữ pháp)"]},{"q":"35. Do you mind ___ me email about the party?","options":["send","sending","to send","to sending"],"answer":1,"vi":"Bạn có phiền gửi email cho tôi về bữa tiệc không?","explanation":"\"Do you mind + V-ing?\" = Bạn có phiền làm gì không?","vis":["gửi (nguyên mẫu, sai vị trí)","gửi (V-ing, đúng sau \"mind\")","gửi (to-V, sai cấu trúc \"mind\")","(sai ngữ pháp)"]},{"q":"36. On the web, you can go into a ___ and talk to other people all over the world.","options":["chat room","online","sites","web page"],"answer":0,"vi":"Trên web, bạn có thể vào phòng chat và nói chuyện với mọi người trên toàn thế giới.","explanation":"\"chat room\" = phòng chat.","vis":["phòng chat (đúng)","trực tuyến (tính từ/trạng từ, sai từ loại)","những trang web (sai nghĩa cụm)","trang web (sai nghĩa, không phải nơi trò chuyện)"]},{"q":"37. ___ connects people in real time through audio and video communication over Internet.","options":["Landline phone","Snail mail","Body language","Video conferencing"],"answer":3,"vi":"Hội nghị video kết nối mọi người theo thời gian thực qua âm thanh và hình ảnh.","explanation":"\"Video conferencing\" = hội nghị video.","vis":["điện thoại bàn (sai nghĩa — không có audio/video)","thư bưu điện truyền thống (sai nghĩa)","ngôn ngữ cơ thể (sai nghĩa)","hội nghị truyền hình (đúng)"]},{"q":"38. In Britain, men do not look at women on the streets. However, the French do. This is called ___ difference.","options":["manner","gender","cultures","cultural"],"answer":3,"vi":"Ở Anh, đàn ông không nhìn phụ nữ trên đường. Tuy nhiên, người Pháp thì có. Đây gọi là khác biệt văn hóa.","explanation":"\"cultural difference\" = khác biệt văn hóa.","vis":["cách cư xử, thái độ (danh từ, sai từ loại)","giới tính (danh từ, sai nghĩa)","những nền văn hóa (danh từ số nhiều, sai từ loại)","thuộc về văn hóa (tính từ, đúng trước \"difference\")"]},{"q":"39. He seemed to be in a hurry. He glanced nervously ___ his watch.","options":["in","on","at","to"],"answer":2,"vi":"Anh ấy có vẻ đang vội. Anh ấy liếc nhìn đồng hồ một cách lo lắng.","explanation":"\"glance at\" = liếc nhìn.","vis":["trong (sai giới từ)","trên (sai giới từ)","glance at = liếc nhìn (đúng)","đến (sai giới từ)"]},{"q":"40. A: Hello. Is Hung there, please? B: I'm afraid he's out. Can I take a message? A: No, don't worry. I'll call ___ later.","options":["back","on","to","in"],"answer":0,"vi":"A: Xin chào. Hung có ở đó không? B: Tôi e là anh ấy đi rồi. Tôi có thể nhắn tin không? A: Không, đừng lo. Tôi sẽ gọi lại sau.","explanation":"\"call back\" = gọi lại.","vis":["call back = gọi lại (đúng)","trên (sai giới từ)","đến (sai giới từ)","trong (sai giới từ)"]},{"q":"41. A: Could I speak to Mai, please? B: I think you must have the ___ number.","options":["right","left","wrong","exact"],"answer":2,"vi":"A: Tôi có thể nói chuyện với Mai không? B: Tôi nghĩ bạn chắc chắn nhầm số rồi.","explanation":"\"the wrong number\" = nhầm số.","vis":["đúng (sai nghĩa, trái nghĩa với đáp án)","trái, còn lại (sai nghĩa)","the wrong number = nhầm số (đúng)","chính xác (sai nghĩa cụm)"]},{"q":"42. By the end of this century, everyone ___ with telepathy devices.","options":["communicate","communicates","is communicating","will be communicating"],"answer":3,"vi":"Vào cuối thế kỷ này, mọi người sẽ đang giao tiếp bằng thiết bị thần giao cách cảm.","explanation":"Thì tương lai tiếp diễn: will be + V-ing.","vis":["giao tiếp (nguyên mẫu, sai thì)","giao tiếp (hiện tại đơn, sai thì)","đang giao tiếp (hiện tại tiếp diễn, sai thì)","sẽ đang giao tiếp (tương lai tiếp diễn, đúng)"]},{"q":"43. At half past ten tomorrow morning I ___ along the motorway.","options":["will drive","am driving","will be driving","drive"],"answer":2,"vi":"Ngày mai lúc 10 giờ rưỡi sáng, tôi sẽ đang lái xe trên xa lộ.","explanation":"Thì tương lai tiếp diễn: will be + V-ing.","vis":["sẽ lái xe (tương lai đơn, sai — cần tương lai tiếp diễn)","đang lái xe (hiện tại tiếp diễn, sai thì)","sẽ đang lái xe (tương lai tiếp diễn, đúng)","lái xe (nguyên mẫu, sai thì)"]},{"q":"44. I really enjoyed ___ to the songs you sent me. Thanks!","options":["listen","to listen","listening","to be listening"],"answer":2,"vi":"Tôi thực sự thích nghe những bài hát bạn gửi cho tôi. Cảm ơn!","explanation":"\"enjoy + V-ing\" = thích làm gì.","vis":["nghe (nguyên mẫu, sai vị trí)","nghe (to-V, sai cấu trúc \"enjoy\")","nghe (V-ing, đúng sau \"enjoy\")","(sai ngữ pháp phức tạp không cần thiết)"]},{"q":"45. My mother has decided ___ a Facebook account.","options":["open","to open","opening","to opening"],"answer":1,"vi":"Mẹ tôi đã quyết định mở một tài khoản Facebook.","explanation":"\"decide + to V\" = quyết định làm gì.","vis":["mở (nguyên mẫu, sai vị trí)","mở (to-V, đúng sau \"decide\")","mở (V-ing, sai cấu trúc \"decide\")","(sai ngữ pháp)"]},{"q":"46. I don't want ___ snail mail because it's a slower and more expensive way than email.","options":["using","use","uses","to use"],"answer":3,"vi":"Tôi không muốn dùng thư bưu điện vì nó chậm và đắt hơn email.","explanation":"\"want + to V\" = muốn làm gì.","vis":["dùng (V-ing, sai cấu trúc \"want\")","dùng (nguyên mẫu, sai vị trí)","dùng (chia động từ, sai)","dùng (to-V, đúng sau \"want\")"]},{"q":"47. She promise ___ the chat room to discuss with me about the film.","options":["to join","join","joining","joins"],"answer":0,"vi":"Cô ấy hứa tham gia phòng chat để thảo luận với tôi về bộ phim.","explanation":"\"promise + to V\" = hứa làm gì.","vis":["tham gia (to-V, đúng sau \"promise\")","tham gia (nguyên mẫu, sai vị trí)","tham gia (V-ing, sai cấu trúc \"promise\")","tham gia (chia động từ, sai)"]},{"q":"48. E-mail allows people ___ in touch, regardless of distance.","options":["staying","stay","to have stayed","to stay"],"answer":3,"vi":"Email cho phép mọi người giữ liên lạc, bất kể khoảng cách.","explanation":"\"allow + O + to V\" = cho phép ai làm gì.","vis":["giữ (V-ing, sai cấu trúc \"allow + O\")","giữ (nguyên mẫu, sai vị trí)","(dạng hoàn thành không cần thiết, sai)","giữ (to-V, đúng sau \"allow + O + to V\")"]},{"q":"49. I'm really looking forward ___ you next week.","options":["to see","to seeing","seeing","see"],"answer":1,"vi":"Tôi rất mong được gặp bạn tuần sau.","explanation":"\"look forward to + V-ing\" = mong chờ làm gì.","vis":["gặp (to-V, sai cấu trúc \"look forward to\")","gặp (look forward to + V-ing, đúng)","gặp (V-ing, thiếu giới từ \"to\", sai)","gặp (nguyên mẫu, sai)"]},{"q":"50. Tim pretended ___ me when I waved to him.","options":["not seeing","not to see","not see","to not see"],"answer":1,"vi":"Tim giả vờ không nhìn thấy tôi khi tôi vẫy tay với anh ấy.","explanation":"\"pretend + not + to V\" = giả vờ không làm gì.","vis":["không nhìn thấy (phủ định V-ing, sai cấu trúc \"pretend\")","pretend + not + to V = giả vờ không làm gì (đúng)","(sai ngữ pháp, thiếu \"to\")","(sai vị trí phủ định)"]}],"roman":"III"},{"navLabel":"Word Forms","title":"Cho dạng đúng của từ trong ngoặc (Word Forms)","icon":"spell-check","instructions":"Dùng từ gợi ý trong ngoặc để điền dạng đúng vào chỗ trống.","type":"fill","questions":[{"q":"1. Speech is the fastest method of ___ between people.","answer":"communication","hint":"(COMMUNICATE)","family":["communicate (v) giao tiếp","communication (n) sự giao tiếp","communicative (adj) có tính giao tiếp","communicatively (adv) một cách giao tiếp"],"vi":"Nói là phương pháp giao tiếp nhanh nhất giữa con người.","explanation":"Sau \"of\" cần danh từ → communication."},{"q":"2. A communication breakdown between two people from different countries may happen due to ___ differences.","answer":"cultural","hint":"(CULTURE)","family":["culture (n) văn hóa","cultural (adj) thuộc văn hóa","culturally (adv) về mặt văn hóa"],"vi":"Sự ngưng trệ giao tiếp giữa hai người từ các quốc gia khác nhau có thể xảy ra do khác biệt văn hóa.","explanation":"Trước danh từ \"differences\" cần tính từ → cultural."},{"q":"3. When a policeman directs traffic, he often uses his arms to tell drivers where to go and when to stop. This is ___ communication.","answer":"non-verbal","hint":"(VERBAL)","family":["verbal (adj) bằng lời nói","verbally (adv) bằng lời nói","non-verbal (adj) phi ngôn ngữ"],"vi":"Khi cảnh sát điều khiển giao thông, anh ấy thường dùng tay để chỉ cho tài xế đi đâu và khi nào dừng. Đây là giao tiếp phi ngôn ngữ.","explanation":"Dùng tay là phi ngôn ngữ → non-verbal."},{"q":"4. Using telepathy is a way to communicate instantly by thoughts and feelings, without the need to use speech or ___.","answer":"writing","hint":"(WRITE)","family":["write (v) viết","writing (n) sự viết/văn bản","written (adj) bằng văn bản","writer (n) người viết"],"vi":"Sử dụng thần giao cách cảm là cách giao tiếp tức thì bằng suy nghĩ và cảm xúc, không cần dùng lời nói hoặc viết.","explanation":"Sau \"or\" cần danh từ song song với \"speech\" → writing."},{"q":"5. Students need the ___ to communicate with people within their team.","answer":"ability","hint":"(ABLE)","family":["able (adj) có khả năng","ability (n) khả năng","disable (v) làm mất khả năng","disability (n) sự khuyết tật"],"vi":"Học sinh cần khả năng giao tiếp với mọi người trong nhóm.","explanation":"Sau \"the\" cần danh từ → ability."},{"q":"6. Could you tell that person was angry just by looking at his or her ___ expression?","answer":"facial","hint":"(FACE)","family":["face (n) khuôn mặt","facial (adj) thuộc khuôn mặt","facially (adv) về mặt khuôn mặt"],"vi":"Bạn có thể biết người đó giận chỉ bằng cách nhìn biểu cảm khuôn mặt không?","explanation":"Trước danh từ \"expression\" cần tính từ → facial."},{"q":"7. This lesson will focus on ___ communication skills.","answer":"effective","hint":"(EFFECT)","family":["effect (n) hiệu quả/tác động","effective (adj) hiệu quả","effectively (adv) một cách hiệu quả","effectiveness (n) tính hiệu quả"],"vi":"Bài học này sẽ tập trung vào kỹ năng giao tiếp hiệu quả.","explanation":"Trước danh từ \"skills\" cần tính từ → effective."},{"q":"8. The technology can be used to produce ___ educational programs.","answer":"interactive","hint":"(INTERACT)","family":["interact (v) tương tác","interaction (n) sự tương tác","interactive (adj) có tính tương tác"],"vi":"Công nghệ có thể được sử dụng để tạo ra các chương trình giáo dục tương tác.","explanation":"Trước danh từ \"programs\" cần tính từ → interactive."},{"q":"9. In free time, Nga often communicates ___ with her cats. (NON-VERBAL)","answer":"non-verbally","family":["non-verbal (adj) phi ngôn ngữ","non-verbally (adv) một cách phi ngôn ngữ","verbal (adj) bằng lời nói"],"vi":"Thời gian rảnh, Nga thường giao tiếp phi ngôn ngữ với mèo.","explanation":"Sau \"communicates\" cần trạng từ → non-verbally."},{"q":"10. Nowadays, many young people are using ___ media such as Facebook, Twitter, Zalo.","answer":"social","hint":"(SOCIETY)","family":["society (n) xã hội","social (adj) thuộc xã hội","socially (adv) về mặt xã hội","sociable (adj) hòa đồng"],"vi":"Ngày nay, nhiều bạn trẻ sử dụng mạng xã hội như Facebook, Twitter, Zalo.","explanation":"Trước danh từ \"media\" cần tính từ → social."},{"q":"11. The ___ are very concerned about the increasing number of wildfire in this year.","answer":"environmentalists","hint":"(ENVIRONMENT)","family":["environment (n) môi trường","environmental (adj) thuộc môi trường","environmentalist (n) nhà môi trường học","environmentally (adv) về mặt môi trường"],"vi":"Các nhà môi trường rất lo ngại về số lượng cháy rừng tăng trong năm nay.","explanation":"Sau \"The\" cần danh từ chỉ người (số nhiều) → environmentalists."},{"q":"12. Examples of primary ___ are exhaust fumes from cars, soot from smoke and ash from volcanic eruption.","answer":"pollutants","hint":"(POLLUTE)","family":["pollute (v) gây ô nhiễm","pollution (n) sự ô nhiễm","pollutant (n) chất gây ô nhiễm","polluted (adj) bị ô nhiễm"],"vi":"Các chất ô nhiễm chính là khí thải từ xe hơi, bồ hóng từ khói và tro từ núi lửa.","explanation":"Sau \"primary\" cần danh từ số nhiều → pollutants."},{"q":"13. Although the earthquake last only some seconds, but its ___ really terrified all the local people.","answer":"occurrence","hint":"(OCCUR)","family":["occur (v) xảy ra","occurrence (n) sự xảy ra/việc xảy ra"],"vi":"Mặc dù trận động đất chỉ kéo dài vài giây, nhưng sự xảy ra của nó thực sự làm tất cả người dân sợ hãi.","explanation":"Sau \"its\" cần danh từ → occurrence."},{"q":"14. Niagara Falls, on the border of the USA and Canada, is one of the most ___ sceneries in the world.","answer":"spectacular","hint":"(SPECTACLE)","family":["spectacle (n) cảnh tượng","spectacular (adj) ngoạn mục","spectacularly (adv) một cách ngoạn mục"],"vi":"Thác Niagara, ở biên giới Mỹ và Canada, là một trong những cảnh quan ngoạn mục nhất thế giới.","explanation":"So sánh nhất \"most\" cần tính từ → spectacular."},{"q":"15. Different kinds of environmental pollution in recent years have destroyed many ___ habitats.","answer":"natural","hint":"(NATURE)","family":["nature (n) thiên nhiên/bản chất","natural (adj) tự nhiên","naturally (adv) một cách tự nhiên"],"vi":"Các loại ô nhiễm môi trường khác nhau trong những năm gần đây đã phá hủy nhiều môi trường sống tự nhiên.","explanation":"Trước danh từ \"habitats\" cần tính từ → natural."},{"q":"16. The birth of emails has made the ___ among people much easier than before.","answer":"correspondence","hint":"(CORRESPOND)","family":["correspond (v) trao đổi thư từ/tương ứng","correspondence (n) sự liên lạc/thư từ","correspondent (n) phóng viên/người liên lạc"],"vi":"Sự ra đời của email đã làm cho sự liên lạc giữa mọi người dễ dàng hơn trước rất nhiều.","explanation":"Sau \"the\" cần danh từ → correspondence."},{"q":"17. The Internet is ___ again. It is so annoying!","answer":"disconnected","hint":"(CONNECT)","family":["connect (v) kết nối","connection (n) sự kết nối","connected (adj) được kết nối","disconnected (adj) bị ngắt kết nối"],"vi":"Internet lại bị ngắt kết nối rồi. Thật khó chịu!","explanation":"Sau \"is\" cần tính từ; ngữ cảnh cho thấy cần dạng phủ định → disconnected."},{"q":"18. Snail mails seem less ___ than emails.","answer":"advantageous","hint":"(ADVANTAGE)","family":["advantage (n) lợi thế","advantageous (adj) có lợi","disadvantage (n) bất lợi"],"vi":"Thư bưu điện có vẻ kém tiện lợi hơn email.","explanation":"Sau \"less\" cần tính từ → advantageous."},{"q":"19. Being ___ to watching TV or videos may lead to many health problems among teenagers.","answer":"addicted","hint":"(ADDICT)","family":["addict (n) người nghiện","addicted (adj) bị nghiện","addiction (n) sự nghiện","addictive (adj) gây nghiện"],"vi":"Nghiện xem TV hoặc video có thể dẫn đến nhiều vấn đề sức khỏe ở thanh thiếu niên.","explanation":"\"be addicted to\" = nghiện."},{"q":"20. The Telegraph was one of the most well-known ___ in the 20th.","answer":"inventions","hint":"(INVENT)","family":["invent (v) phát minh ra","invention (n) phát minh","inventor (n) nhà phát minh","inventive (adj) sáng tạo"],"vi":"Máy điện báo là một trong những phát minh nổi tiếng nhất thế kỷ 20.","explanation":"Sau \"well-known\" cần danh từ số nhiều → inventions."}],"roman":"IV"},{"navLabel":"Verb Forms","title":"Chia đúng dạng của động từ trong ngoặc","icon":"pen","instructions":"Đọc kỹ từng câu và chia đúng dạng của động từ trong ngoặc.","type":"fill","questions":[{"q":"1. Would you mind (close) ___ the window?","answer":"closing","vi":"Bạn có phiền đóng cửa sổ không?","explanation":"\"Do you mind + V-ing?\" → closing."},{"q":"2. I'd really love (see) ___ you again.","answer":"to see","vi":"Tôi thực sự muốn gặp lại bạn.","explanation":"\"love + to V\" = muốn làm gì → to see."},{"q":"3. It was a nice day, so we decided (go) ___ for a walk.","answer":"to go","vi":"Trời đẹp, nên chúng tôi quyết định đi dạo.","explanation":"\"decide + to V\" = quyết định làm gì → to go."},{"q":"4. I've got a new smart phone. I haven't learnt (use) ___ it yet.","answer":"to use","vi":"Tôi có điện thoại mới. Tôi vẫn chưa học cách dùng nó.","explanation":"\"learn + to V\" = học làm gì → to use."},{"q":"5. I hate (have) ___ to get up early on Sunday!","answer":"having","vi":"Tôi ghét phải dậy sớm vào Chủ nhật!","explanation":"\"hate + V-ing\" = ghét làm gì → having."},{"q":"6. Don't forget (post) ___ the letter I gave you.","answer":"to post","vi":"Đừng quên gửi lá thư tôi đưa cho bạn.","explanation":"\"forget + to V\" = quên (chưa làm) → to post."},{"q":"7. I wonder where Linda is. She promised not (be) ___ late.","answer":"to be","vi":"Tôi tự hỏi Linda ở đâu. Cô ấy hứa sẽ không đến muộn.","explanation":"\"promise + not + to V\" = hứa không làm gì → to be."},{"q":"8. What do you want (do) ___ later?","answer":"to do","vi":"Bạn muốn làm gì sau này?","explanation":"\"want + to V\" = muốn làm gì → to do."},{"q":"9. Minh suggested (have) ___ a video conference this week.","answer":"having","vi":"Minh đề nghị họp video tuần này.","explanation":"\"suggest + V-ing\" = đề nghị làm gì → having."},{"q":"10. I'm still looking for a job, but I hope (find) ___ something soon.","answer":"to find","vi":"Tôi vẫn đang tìm việc, nhưng tôi hy vọng tìm được gì đó sớm.","explanation":"\"hope + to V\" = hy vọng làm gì → to find."},{"q":"11. Quang Ngai was (hit) ___ by a severe storm last year.","answer":"hit","vi":"Quảng Ngãi bị một cơn bão nặng tấn công năm ngoái.","explanation":"Bị động quá khứ đơn: was + P2. \"hit\" là động từ bất quy tắc (hit-hit-hit) → hit."},{"q":"12. If the air (not pollute) ___, people's physical condition will be better.","answer":"is not polluted","vi":"Nếu không khí không bị ô nhiễm, tình trạng sức khỏe của mọi người sẽ tốt hơn.","explanation":"Câu điều kiện loại 1, bị động: if + S + is not + P2."},{"q":"13. Where (be) ___ they from? Spain and England.","answer":"are","vi":"Họ đến từ đâu? Tây Ban Nha và Anh.","explanation":"Chủ ngữ số nhiều \"they\" → are."},{"q":"14. If you had magic, what ___ you (do) ___ to stop pollution?","answer":"would / do","accepted":["would / do","would do","would, do"],"vi":"Nếu bạn có phép thuật, bạn sẽ làm gì để ngăn ô nhiễm?","explanation":"Câu điều kiện loại 2: What would + S + V?"},{"q":"15. Minh (finish) ___ his housework before I went home.","answer":"had finished","vi":"Minh đã làm xong việc nhà trước khi tôi về.","explanation":"Quá khứ hoàn thành: had + P2."},{"q":"16. ___ she (visit) ___ her close friends before the day she left the city?","answer":"Had / visited","accepted":["Had / visited","Had visited","Had, visited"],"vi":"Cô ấy đã thăm bạn bè thân trước ngày rời thành phố chưa?","explanation":"Câu hỏi quá khứ hoàn thành: Had + S + P2?"},{"q":"17. How would you become if you (stop) ___ drinking water?","answer":"stopped","vi":"Bạn sẽ ra sao nếu bạn ngừng uống nước?","explanation":"Câu điều kiện loại 2: if + S + V-ed → stopped."},{"q":"18. ___ you (have) ___ problems with your French lessons?","answer":"Do / have","accepted":["Do / have","Do have","Do, have"],"vi":"Bạn có gặp vấn đề với bài tiếng Pháp không?","explanation":"Câu hỏi hiện tại đơn: Do + S + V?"},{"q":"19. She could manage (overcome) ___ her serious illness last week.","answer":"to overcome","vi":"Cô ấy có thể vượt qua bệnh nặng tuần trước.","explanation":"\"manage + to V\" = xoay xở làm gì → to overcome."},{"q":"20. Nick often (record) ___ his voice when he practices speaking English.","answer":"records","vi":"Nick thường ghi âm giọng nói khi luyện nói tiếng Anh.","explanation":"\"often\" là dấu hiệu hiện tại đơn, chủ ngữ số ít → records."}],"roman":"V"},{"navLabel":"Sửa lỗi","title":"Tìm lỗi sai và sửa lại","icon":"wrench","instructions":"Mỗi câu có một lỗi sai. Chọn phần chứa lỗi sai và sửa lại cho đúng.","type":"mcq","instant":true,"questions":[{"q":"1. You aren't allowed <u>smoking</u> <u>because</u> you are <u>too</u> young to <u>do it</u>.","options":["smoking","because","too","do it"],"answer":0,"vi":"Bạn không được phép hút thuốc vì bạn quá trẻ.","explanation":"\"aren't allowed to smoke\" (không được phép hút) → smoking phải sửa thành to smoke.","note":"be allowed + to V","vis":["hút thuốc (V-ing)","bởi vì","quá (mức độ)","làm việc đó"]},{"q":"2. <u>Because of</u> language barrier, they decided <u>using</u> body <u>language</u> <u>to communicate</u>.","options":["Because of","using","language","to communicate"],"answer":1,"vi":"Vì rào cản ngôn ngữ, họ quyết định dùng ngôn ngữ cơ thể để giao tiếp.","explanation":"\"decide + to V\" → using phải sửa thành to use.","note":"decide + to V","vis":["bởi vì (do)","đang dùng, việc dùng","ngôn ngữ","để giao tiếp"]},{"q":"3. The children forgot <u>picking</u> up the <u>note</u> from the office and <u>now</u> they <u>are</u> worried.","options":["picking","note","now","are"],"answer":0,"vi":"Bọn trẻ quên nhặt ghi chú từ văn phòng và bây giờ chúng lo lắng.","explanation":"\"forget + to V\" = quên (chưa làm) → picking phải sửa thành to pick.","note":"forget + to V (quên chưa làm)","vis":["đang nhặt, việc nhặt","mẩu ghi chú","bây giờ","thì (to be, số nhiều)"]},{"q":"4. <u>Would</u> you prefer <u>came</u> <u>in</u> the morning <u>or</u> the afternoon?","options":["Would","came","in","or"],"answer":1,"vi":"Bạn thích đến vào buổi sáng hay buổi chiều?","explanation":"\"prefer + to V\" → came phải sửa thành to come.","note":"prefer + to V","vis":["(trợ động từ lịch sự: \"bạn muốn...\")","đã đến (quá khứ)","vào (buổi)","hay, hoặc"]},{"q":"5. I'll be here <u>in a moment</u> <u>if</u> you don't mind <u>to wait</u> for <u>a couple of</u> minutes.","options":["in a moment","if","to wait","a couple of"],"answer":2,"vi":"Tôi sẽ ở đây ngay nếu bạn không phiền chờ vài phút.","explanation":"\"Do you mind + V-ing?\" → to wait phải sửa thành waiting.","note":"mind + V-ing","vis":["trong chốc lát, ngay bây giờ","nếu","để chờ","một vài, một cặp"]},{"q":"6. The earthquake <u>happened</u> at <u>midday</u> when <u>many</u> people <u>had had</u> lunch.","options":["happened","midday","many","had had"],"answer":3,"vi":"Trận động đất xảy ra vào giữa trưa khi nhiều người đang ăn trưa.","explanation":"Hành động đang xảy ra thì bị ngắt bởi trận động đất → quá khứ tiếp diễn: were having.","note":"was/were + V-ing (quá khứ tiếp diễn bị ngắt quãng)","vis":["đã xảy ra","giữa trưa","nhiều","đã có/đã ăn (quá khứ hoàn thành)"]},{"q":"7. <u>Water</u> <u>pollute</u> in the lake <u>has made</u> the <u>fish die</u>.","options":["Water","pollute","has made","fish die"],"answer":1,"vi":"Ô nhiễm nước trong hồ đã khiến cá chết.","explanation":"Cần danh từ \"pollution\" không phải động từ \"pollute\" → pollute phải sửa thành pollution.","note":"noun + noun (danh từ ghép)","vis":["nước","gây ô nhiễm (động từ)","đã khiến, đã làm cho","cá chết"]},{"q":"8. If I <u>am</u> you, I <u>would</u> <u>choose</u> another country <u>to visit</u> in this summer holiday.","options":["am","would","choose","to visit"],"answer":0,"vi":"Nếu tôi là bạn, tôi sẽ chọn quốc gia khác để thăm vào kỳ nghỉ hè.","explanation":"Câu điều kiện loại 2: If I were you → am phải sửa thành were.","note":"If I were you (câu điều kiện loại 2)","vis":["là (thì hiện tại của to be)","sẽ (giả định)","chọn","để thăm"]},{"q":"9. If the factory <u>doesn't stop</u> <u>pollute</u> the lake, <u>no fish</u> <u>will be able</u> to survive.","options":["doesn't stop","pollute","no fish","will be able"],"answer":1,"vi":"Nếu nhà máy không ngừng gây ô nhiễm hồ, sẽ không có cá nào sống được.","explanation":"\"stop + V-ing\" → pollute phải sửa thành polluting.","note":"stop + V-ing","vis":["không ngừng","gây ô nhiễm (động từ)","không con cá nào","sẽ có thể"]},{"q":"10. Landslide <u>has</u> never <u>occur</u> in my <u>region</u> <u>since</u> 1995.","options":["has","occur","region","since"],"answer":1,"vi":"Lở đất chưa bao giờ xảy ra ở khu vực tôi từ năm 1995.","explanation":"Hiện tại hoàn thành: has never + P2 → occur phải sửa thành occurred.","note":"has never + P2","vis":["đã (trợ động từ hiện tại hoàn thành)","xảy ra (nguyên mẫu)","khu vực","kể từ"]},{"q":"11. <u>By the time</u> I <u>had went</u> to India, I <u>had known</u> about its Holi festival of Colors <u>through</u> my English book.","options":["By the time","had went","had known","through"],"answer":1,"vi":"Trước khi tôi đi Ấn Độ, tôi đã biết về lễ hội Holi qua sách tiếng Anh.","explanation":"\"By the time\" + quá khứ đơn (không phải quá khứ hoàn thành) → had went phải sửa thành went.","note":"By the time + S + V-ed (quá khứ đơn)","vis":["vào lúc, trước khi","đã đi (dạng sai ngữ pháp của \"went\")","đã biết (quá khứ hoàn thành)","thông qua"]},{"q":"12. If I <u>save</u> enough money for my Europe tour <u>at the end</u> of this year, I <u>won't waited</u> until the next year to <u>make</u> it.","options":["save","at the end","won't waited","make"],"answer":2,"vi":"Nếu tôi tiết kiệm đủ tiền cho chuyến đi châu Âu cuối năm nay, tôi sẽ không đợi đến năm sau.","explanation":"\"won't\" + V nguyên mẫu → waited phải sửa thành wait.","note":"won't + V (nguyên mẫu)","vis":["tiết kiệm","vào cuối","sẽ không đợi (dạng sai ngữ pháp)","thực hiện, làm"]},{"q":"13. The <u>destruction</u> of the storm was so <u>serious</u> that it <u>had taken</u> local people two weeks to <u>turn back</u> to a normal life.","options":["destruction","serious","had taken","turn back"],"answer":2,"vi":"Sự tàn phá của cơn bão nghiêm trọng đến mức người dân mất hai tuần để trở lại cuộc sống bình thường.","explanation":"Mệnh đề kết quả \"so...that\" dùng cùng thì quá khứ đơn với mệnh đề chính → had taken phải sửa thành took.","note":"so + adj + that + S + V-ed (quá khứ đơn)","vis":["sự tàn phá","nghiêm trọng","đã mất (thời gian, quá khứ hoàn thành)","quay trở lại"]},{"q":"14. This water <u>contains</u> quite a lot of <u>contaminants</u>, <u>but</u> it should be <u>refined</u> before drinking.","options":["contains","contaminants","but","refined"],"answer":3,"vi":"Nước này chứa khá nhiều chất ô nhiễm, nhưng nó nên được lọc sạch trước khi uống.","explanation":"\"refine\" dùng cho dầu/đường, không dùng cho nước; nước cần \"purify/filter\" (làm sạch) → refined phải sửa thành purified/filtered.","note":"purify/filter water (không dùng \"refine\" cho nước)","vis":["chứa","chất gây ô nhiễm","nhưng","đã được tinh chế/lọc (sai ngữ cảnh cho nước)"]},{"q":"15. My niece <u>memorized</u> the names of <u>most</u> English speaking countries <u>before</u> she <u>was</u> six.","options":["memorized","most","before","was"],"answer":0,"vi":"Cháu gái tôi đã nhớ tên hầu hết các nước nói tiếng Anh trước khi sáu tuổi.","explanation":"Hành động xảy ra trước một mốc quá khứ khác (\"before she was six\") → quá khứ hoàn thành: had memorized.","note":"had + P2 (quá khứ hoàn thành)","vis":["đã ghi nhớ","hầu hết","trước khi","đã là/đã (thì quá khứ của to be)"]},{"q":"16. He <u>will</u> be <u>hasing</u> a test <u>on Maths</u> <u>at</u> the end of this month.","options":["will","hasing","on Maths","at"],"answer":1,"vi":"Anh ấy sẽ có một bài thi Toán vào cuối tháng này.","explanation":"\"having\" (không phải hasing) → tương lai tiếp diễn: will be having.","note":"will be + V-ing","vis":["sẽ","(dạng sai chính tả của \"having\")","về môn Toán","vào (thời điểm)"]},{"q":"17. Both Mai and Linh <u>detest</u> <u>to wait</u> <u>for</u> their friends <u>under</u> the rain.","options":["detest","to wait","for","under"],"answer":1,"vi":"Cả Mai và Linh đều ghét phải chờ bạn dưới mưa.","explanation":"\"detest + V-ing\" → to wait phải sửa thành waiting.","note":"detest + V-ing","vis":["ghét, chán ghét","để chờ","cho, vì","dưới"]},{"q":"18. They allow us <u>visiting</u> the laboratory <u>under</u> their supervision <u>in</u> 30 minutes <u>next</u> Friday morning.","options":["visiting","under","in","next"],"answer":0,"vi":"Họ cho phép chúng tôi thăm phòng thí nghiệm dưới sự giám sát của họ trong 30 phút sáng thứ Sáu tới.","explanation":"\"allow + O + to V\" → visiting phải sửa thành to visit.","note":"allow + O + to V","vis":["đang thăm, việc thăm","dưới (sự giám sát)","trong (vòng)","kế tiếp, tới"]},{"q":"19. I think that people <u>will be</u> <u>continue</u> <u>using</u> emails <u>at least</u> in the next century.","options":["will be","continue","using","at least"],"answer":0,"vi":"Tôi nghĩ mọi người sẽ tiếp tục sử dụng email ít nhất trong thế kỷ tới.","explanation":"\"will continue\" (tương lai đơn, không có \"be\") → will be phải sửa thành will.","note":"S + will + V (tương lai đơn)","vis":["sẽ (trợ động từ, dùng sai ở đây)","tiếp tục","đang dùng, việc dùng","ít nhất"]},{"q":"20. It is <u>possibly</u> that there <u>will be</u> no on-road telephone booths for <u>public use any</u> <u>more</u> in the near future.","options":["possibly","will be","public use any","more"],"answer":0,"vi":"Có thể sẽ không còn cabin điện thoại trên đường cho công chúng sử dụng trong tương lai gần.","explanation":"\"It is possible that...\" (tính từ sau \"It is\", không phải trạng từ) → possibly phải sửa thành possible.","note":"It is possible that... (tính từ)","vis":["có thể (trạng từ)","sẽ (là/có)","công chúng sử dụng bất kỳ","nữa, hơn"]}],"roman":"VI"},{"navLabel":"Đọc hiểu 1","title":"Đọc hiểu – Chọn đáp án đúng cho chỗ trống","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng (A, B, C hoặc D) cho mỗi chỗ trống.","type":"mcq","instant":true,"questions":[{"q":"1. I'm Linh and now I (1) ___ at a high school in the United States.","options":["am studying","study","studies","will be studying"],"answer":0,"vi":"Tôi là Linh và bây giờ tôi (1) ___ ở một trường trung học ở Mỹ.","explanation":"Hành động đang diễn ra ở hiện tại → hiện tại tiếp diễn: am studying.","vis":["đang học (hiện tại tiếp diễn, đúng)","học (hiện tại đơn, sai thì)","học (ngôi ba số ít, sai)","sẽ đang học (tương lai tiếp diễn, sai thì)"]},{"q":"2. My biggest challenge in the United States is the language (2) ___.","options":["difficulties","world","barrier","communication"],"answer":2,"vi":"Thách thức lớn nhất của tôi ở Mỹ là (2) ___ ngôn ngữ.","explanation":"\"language barrier\" = rào cản ngôn ngữ (cụm từ cố định).","vis":["những khó khăn (sai cụm)","thế giới (sai nghĩa)","rào cản (language barrier = rào cản ngôn ngữ, đúng)","giao tiếp (sai từ loại ở đây)"]},{"q":"3. I (3) ___ English for five years but I still face difficulties in communication.","options":["study","studies","have studied","studied"],"answer":2,"vi":"Tôi (3) ___ tiếng Anh được năm năm nhưng vẫn gặp khó khăn trong giao tiếp.","explanation":"\"for five years\" (khoảng thời gian kéo dài đến hiện tại) → hiện tại hoàn thành: have studied.","vis":["học (hiện tại đơn, sai thì)","học (ngôi ba số ít, sai)","đã học (hiện tại hoàn thành, đúng với \"for five years\")","đã học (quá khứ đơn, sai thì)"]},{"q":"4. (4) ___ I go to see an American movie, I still can't understand the actors.","options":["When","Which","Who","Why"],"answer":0,"vi":"(4) ___ tôi đi xem phim Mỹ, tôi vẫn không thể hiểu các diễn viên.","explanation":"\"When\" = khi (chỉ thời điểm), mở đầu mệnh đề trạng ngữ chỉ thời gian.","vis":["khi (đúng, chỉ thời gian)","cái nào (sai nghĩa)","ai (sai nghĩa)","tại sao (sai nghĩa)"]},{"q":"5. Maybe because spoken English has a lot of idioms and communication (5) ___ may happen due to cultural differences.","options":["barrier","breakdown","interaction","distance"],"answer":1,"vi":"Có thể vì tiếng Anh nói có nhiều thành ngữ và (5) ___ giao tiếp có thể xảy ra do khác biệt văn hóa.","explanation":"\"communication breakdown\" = sự ngưng trệ/đổ vỡ trong giao tiếp (cụm từ cố định).","vis":["rào cản (sai cụm ở đây)","sự đổ vỡ, ngưng trệ (communication breakdown, đúng)","sự tương tác (sai nghĩa)","khoảng cách (sai nghĩa)"]},{"q":"6. Leaving home and (6) ___ to study in a new country can be a stressful experience.","options":["travelling","travel","to travel","travels"],"answer":0,"vi":"Rời nhà và (6) ___ để du học ở một đất nước mới có thể là trải nghiệm căng thẳng.","explanation":"Song song với \"Leaving\" (V-ing) làm chủ ngữ → travelling.","vis":["đang đi/việc đi (V-ing, song song với \"Leaving\", đúng)","đi (nguyên mẫu, sai)","để đi (to-V, sai cấu trúc song song)","đi (chia động từ, sai)"]},{"q":"7. Second, I listen (7) ___.","options":["careful","carefully","careless","carelessly"],"answer":1,"vi":"Thứ hai, tôi lắng nghe (7) ___.","explanation":"Sau động từ \"listen\" cần trạng từ bổ nghĩa → carefully.","vis":["cẩn thận (tính từ, sai từ loại)","một cách cẩn thận (trạng từ, đúng bổ nghĩa cho \"listen\")","bất cẩn (tính từ, sai nghĩa)","một cách bất cẩn (trạng từ, sai nghĩa)"]},{"q":"8. I'm not afraid (8) ___ questions as many times as it is necessary.","options":["to raise","raises","raise","raising"],"answer":0,"vi":"Tôi không ngại (8) ___ câu hỏi nhiều lần nếu cần.","explanation":"\"be afraid + to V\" = ngại làm gì → to raise.","vis":["đặt ra, nêu lên (to-V, đúng sau \"afraid\")","đặt ra (chia động từ, sai)","đặt ra (nguyên mẫu, sai vị trí)","đặt ra (V-ing, sai cấu trúc \"afraid\")"]},{"q":"9. I decided (9) ___ down what I want to speak.","options":["write","to write","writing","writes"],"answer":1,"vi":"Tôi quyết định (9) ___ ra những gì tôi muốn nói.","explanation":"\"decide + to V\" = quyết định làm gì → to write.","vis":["viết (nguyên mẫu, sai vị trí)","viết (to-V, đúng sau \"decide\")","viết (V-ing, sai cấu trúc \"decide\")","viết (chia động từ, sai)"]},{"q":"10. This is good because I already have some words and sentences in my mind, instead of (10) ___ during the presentation.","options":["think","to think","thinks","thinking"],"answer":3,"vi":"Điều này tốt vì tôi đã có sẵn từ và câu trong đầu, thay vì (10) ___ trong khi thuyết trình.","explanation":"\"instead of + V-ing\" = thay vì làm gì → thinking.","vis":["nghĩ (nguyên mẫu, sai vị trí)","nghĩ (to-V, sai cấu trúc \"instead of\")","nghĩ (chia động từ, sai)","nghĩ (V-ing, đúng sau \"instead of\")"]}],"roman":"VII","passage":{"title":"Learning English in the United States","html":"I'm Linh and now I <b>(1)</b> ___ at a high school in the United States. My biggest challenge in the United States is the language <b>(2)</b> ___. I <b>(3)</b> ___ English for five years but I still face difficulties in communication. For all the time, I feel nervous to understand what other people were saying and why they were laughing. <b>(4)</b> ___ I go to see an American movie, I still can't understand the actors. Maybe because spoken English has a lot of idioms and communication <b>(5)</b> ___ may happen due to cultural differences.<br><br>Leaving home and <b>(6)</b> ___ to study in a new country can be a stressful experience. However, I have learned some ways to overcome my problem. First, I usually tell people that I am learning English in case they don't understand me. Second, I listen <b>(7)</b> ___. If I don't understand something for the first time, I'm not afraid <b>(8)</b> ___ questions as many times as it is necessary. Watching people speak also help me to add new words to my vocabulary. Finally, my big fear is public speaking, so I decided <b>(9)</b> ___ down what I want to speak. This is good because I already have some words and sentences in my mind, instead of <b>(10)</b> ___ during the presentation.","vi":"Tôi là Linh và bây giờ tôi đang học tại một trường trung học ở Hoa Kỳ. Thách thức lớn nhất của tôi ở Hoa Kỳ là rào cản ngôn ngữ. Tôi đã học tiếng Anh được năm năm nhưng vẫn gặp khó khăn trong giao tiếp. Suốt thời gian đó, tôi cảm thấy lo lắng khi cố hiểu người khác đang nói gì và tại sao họ lại cười. Khi tôi đi xem một bộ phim Mỹ, tôi vẫn không thể hiểu được các diễn viên. Có lẽ vì tiếng Anh nói có rất nhiều thành ngữ và sự ngưng trệ trong giao tiếp có thể xảy ra do khác biệt văn hóa.<br><br>Rời nhà và đi du học ở một đất nước mới có thể là một trải nghiệm căng thẳng. Tuy nhiên, tôi đã học được một số cách để vượt qua vấn đề của mình. Đầu tiên, tôi thường nói với mọi người rằng tôi đang học tiếng Anh để phòng khi họ không hiểu tôi. Thứ hai, tôi lắng nghe một cách cẩn thận. Nếu tôi không hiểu điều gì đó ngay lần đầu, tôi không ngại hỏi lại nhiều lần nếu cần thiết. Việc quan sát người khác nói cũng giúp tôi bổ sung từ mới vào vốn từ vựng của mình. Cuối cùng, nỗi sợ lớn nhất của tôi là nói trước đám đông, vì vậy tôi quyết định viết ra những gì tôi muốn nói. Điều này rất tốt vì tôi đã có sẵn một số từ và câu trong đầu, thay vì phải suy nghĩ trong lúc thuyết trình."}},{"navLabel":"Đọc hiểu 2","title":"Đọc hiểu – Benefits of Video Conferencing","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi câu hỏi.","type":"mcq","instant":true,"questions":[{"q":"1. Video conferencing helps people ___.","options":["send message","send snail mail","send email","hold meetings"],"answer":3,"vi":"Hội nghị video giúp mọi người tổ chức họp.","explanation":"Bài đọc nói video conferencing \"allows you to hold meetings\".","vis":["gửi tin nhắn (sai theo bài đọc)","gửi thư bưu điện truyền thống (sai)","gửi email (sai)","tổ chức họp (đúng theo bài đọc)"]},{"q":"2. How does video conferencing help people?","options":["It helps connect people in different places in real time.","It helps connect people in different places in future time.","It helps connect people in same places in real time.","It helps connect people in same places in future time."],"answer":0,"vi":"Hội nghị video giúp mọi người như thế nào?","explanation":"Bài đọc nói nó \"allows you to hold meetings with people who are in different places while seeing them and talking to them in real time\".","vis":["Nó giúp kết nối mọi người ở những nơi khác nhau theo thời gian thực. (đúng)","Nó giúp kết nối mọi người ở những nơi khác nhau trong tương lai. (sai)","Nó giúp kết nối mọi người ở cùng một nơi theo thời gian thực. (sai)","Nó giúp kết nối mọi người ở cùng một nơi trong tương lai. (sai)"]},{"q":"3. What can people do with video conferencing?","options":["People can see and touch each other.","People can see and use telepathy.","People can see and talk to each other.","People can talk and touch each other."],"answer":2,"vi":"Mọi người có thể làm gì với hội nghị video?","explanation":"Bài đọc nói \"seeing them and talking to them in real time\".","vis":["Mọi người có thể nhìn thấy và chạm vào nhau. (sai)","Mọi người có thể nhìn thấy và dùng thần giao cách cảm. (sai)","Mọi người có thể nhìn thấy và nói chuyện với nhau. (đúng)","Mọi người có thể nói chuyện và chạm vào nhau. (sai)"]},{"q":"4. Which statement below is NOT TRUE?","options":["Video calling is often one-to-one communication","Video conferencing can happen between many people.","In the past, video conferencing needed simple equipment.","Today, video conferencing only needs smartphone with Internet connectivity."],"answer":2,"vi":"Câu nào sau đây KHÔNG ĐÚNG?","explanation":"Bài đọc nói \"In the past, video conferencing needed complex and expensive equipment\" (phức tạp và đắt), không phải đơn giản.","vis":["Gọi video thường là giao tiếp một-một. (đúng với bài đọc)","Hội nghị video có thể diễn ra giữa nhiều người. (đúng với bài đọc)","Trước đây, hội nghị video cần thiết bị đơn giản. (SAI — bài đọc nói thiết bị phức tạp, đắt tiền)","Ngày nay, hội nghị video chỉ cần điện thoại thông minh có kết nối Internet. (đúng với bài đọc)"]},{"q":"5. How can video conferencing help people who work away from the office?","options":["It saves time.","It saves money.","It saves time and money.","None of them."],"answer":2,"vi":"Hội nghị video giúp người làm việc xa văn phòng như thế nào?","explanation":"Bài đọc nói \"it helps to save time and money for them\".","vis":["Nó tiết kiệm thời gian. (đúng một phần)","Nó tiết kiệm tiền bạc. (đúng một phần)","Nó tiết kiệm cả thời gian và tiền bạc. (đúng, đầy đủ nhất)","Không cái nào đúng. (sai)"]},{"q":"6. Who will get benefits from video conferencing?","options":["farmer","teacher","engineer","housewife"],"answer":1,"vi":"Ai sẽ được hưởng lợi từ hội nghị video?","explanation":"Bài đọc nói \"Video conferencing can help teachers in teaching, too.\"","vis":["nông dân (sai)","giáo viên (đúng theo bài đọc)","kỹ sư (sai)","nội trợ (sai)"]},{"q":"7. What is the advantage of studying through video conferencing?","options":["Teacher can start class late.","Teacher doesn't know his/her students.","Teacher and students can be in same places.","Teacher and students can be in different places."],"answer":3,"vi":"Lợi thế của việc học qua hội nghị video là gì?","explanation":"Bài đọc nói \"Courses can take place with the teacher and each different student living in a different location.\"","vis":["Giáo viên có thể bắt đầu lớp học muộn. (sai)","Giáo viên không biết học sinh của mình. (sai)","Giáo viên và học sinh có thể ở cùng một nơi. (sai)","Giáo viên và học sinh có thể ở những nơi khác nhau. (đúng)"]},{"q":"8. What does the word \"mountainous\" mean?","options":["a place has rivers","a poor place","a place has mountains","a far place"],"answer":2,"vi":"Từ \"mountainous\" có nghĩa là gì?","explanation":"\"mountainous\" = có nhiều núi, thuộc vùng núi.","vis":["một nơi có sông (sai)","một nơi nghèo (sai)","một nơi có núi (đúng)","một nơi xa (sai)"]}],"roman":"VIII","passage":{"title":"Benefits of Video Conferencing","html":"Video conferencing is the technology that allows you to hold meetings with people who are in different places while seeing them and talking to them in real time. It is different from simple video calling, which is often one-to-one video communication. In the past, video conferencing needed complex and expensive equipment. Today, it's easy to join in a video conference on your computer or smart phone with Internet connectivity. Moreover, video conferencing is also an important tool for people who work away from the office, often at home because it helps to save time and money for them.<br><br>Video conferencing can help teachers in teaching, too. Video conferencing is a great way of learning and sharing knowledge beyond distance. Courses can take place with the teacher and each different student living in a different location. This will help education spread even to remote mountainous areas.","vi":"Hội nghị truyền hình (video conferencing) là công nghệ cho phép bạn tổ chức các cuộc họp với những người ở những nơi khác nhau trong khi vẫn có thể nhìn thấy và nói chuyện với họ theo thời gian thực. Nó khác với cuộc gọi video đơn giản, vốn thường chỉ là giao tiếp video một-một. Trước đây, hội nghị truyền hình cần thiết bị phức tạp và đắt tiền. Ngày nay, việc tham gia một cuộc hội nghị video trên máy tính hoặc điện thoại thông minh có kết nối Internet trở nên dễ dàng. Hơn nữa, hội nghị truyền hình còn là công cụ quan trọng cho những người làm việc xa văn phòng, thường là ở nhà, vì nó giúp họ tiết kiệm thời gian và tiền bạc.<br><br>Hội nghị truyền hình cũng có thể giúp ích cho giáo viên trong việc giảng dạy. Đây là một cách tuyệt vời để học tập và chia sẻ kiến thức vượt qua khoảng cách. Các khóa học có thể diễn ra với giáo viên và mỗi học sinh sống ở một địa điểm khác nhau. Điều này sẽ giúp giáo dục lan tỏa đến cả những vùng núi xa xôi."}},{"navLabel":"Đọc hiểu 3","title":"Đọc hiểu – Facebook (điền từ)","icon":"book-open","instructions":"Đọc đoạn văn và chọn đápán đúng cho mỗi chỗ trống.","type":"mcq","instant":true,"questions":[{"q":"1. Nowadays, Facebook is the most popular ___ media.","options":["social","society","sociable","socialize"],"answer":0,"vi":"Ngày nay, Facebook là mạng (1) ___ phổ biến nhất.","explanation":"\"social media\" = mạng xã hội.","vis":["xã hội (tính từ, đúng — \"social media\" = mạng xã hội)","xã hội (danh từ, sai từ loại)","hòa đồng, thân thiện (tính từ, sai nghĩa)","giao lưu, kết bạn (động từ, sai từ loại)"]},{"q":"2. Not only adults but also teenagers ___ using Facebook.","options":["will","is","are","were"],"answer":2,"vi":"Không chỉ người lớn mà cả thanh thiếu niên (2) ___ sử dụng Facebook.","explanation":"Chủ ngữ số nhiều \"teenagers\" → are.","vis":["sẽ (trợ động từ tương lai, sai)","thì (số ít, sai vì \"teenagers\" số nhiều)","thì (số nhiều, đúng)","đã thì (quá khứ, sai)"]},{"q":"3. …you can send a direct message to a friend and start ___.","options":["chatted","chatting","chat","chats"],"answer":1,"vi":"…bạn có thể gửi tin nhắn trực tiếp cho bạn bè và bắt đầu (3) ___.","explanation":"\"start + V-ing\" = bắt đầu làm gì → chatting.","vis":["đã trò chuyện (quá khứ, sai)","trò chuyện (V-ing, đúng sau \"start\")","trò chuyện (nguyên mẫu, sai vị trí)","trò chuyện (chia động từ, sai)"]},{"q":"4. Facebook can help you keep ___.","options":["from touch","in touch","to touch","touching"],"answer":1,"vi":"Facebook có thể giúp bạn giữ (4) ___.","explanation":"\"keep in touch\" = giữ liên lạc.","vis":["(không phải cụm đúng)","giữ liên lạc (keep in touch, đúng)","để chạm vào (sai nghĩa cụm)","đang chạm vào (V-ing, sai)"]},{"q":"5. …making them seem closer ___ the distance.","options":["in spite","despite","although","however"],"answer":1,"vi":"…khiến họ dường như gần hơn (5) ___ khoảng cách.","explanation":"\"despite\" + N/V-ing = mặc dù.","vis":["mặc dù (thiếu \"of\", sai — phải là \"in spite of\")","mặc dù (đi thẳng với danh từ, đúng)","mặc dù (đi với mệnh đề S+V, sai vì sau là danh từ)","tuy nhiên (trạng từ nối câu, sai vị trí)"]},{"q":"6. Facebook can also help reduce or eliminate the ___ to meet new people.","options":["barriers","connection","breakdown","communication"],"answer":0,"vi":"Facebook cũng có thể giúp giảm hoặc loại bỏ (6) ___ khi gặp người mới.","explanation":"\"barriers\" = rào cản.","vis":["những rào cản (đúng)","sự kết nối (sai nghĩa)","sự đổ vỡ (sai nghĩa)","giao tiếp (sai từ loại/nghĩa)"]},{"q":"7. …if you feel ___ about asking someone in class about a homework assignment…","options":["nervously","nervous","happy","happily"],"answer":1,"vi":"…nếu bạn cảm thấy (7) ___ về việc hỏi ai đó trong lớp về bài tập…","explanation":"Sau \"feel\" cần tính từ → nervous.","vis":["một cách lo lắng (trạng từ, sai — sau \"feel\" cần tính từ)","lo lắng (tính từ, đúng sau \"feel\")","vui vẻ (tính từ, sai nghĩa)","một cách vui vẻ (trạng từ, sai)"]},{"q":"8. …you may feel more comfortable sending ___ to that person on Facebook.","options":["snail mail","meeting","telepathy","messages"],"answer":3,"vi":"…bạn có thể cảm thấy thoải mái hơn khi gửi (8) ___ cho người đó trên Facebook.","explanation":"\"sending messages\" = gửi tin nhắn.","vis":["thư bưu điện truyền thống (sai nghĩa)","cuộc họp (sai nghĩa)","thần giao cách cảm (sai nghĩa)","tin nhắn (đúng)"]},{"q":"9. …you can avoid any embarrassment in ___ meeting.","options":["cyber world","face-to-face","head-to-toe","internet"],"answer":1,"vi":"…bạn có thể tránh sự ngượng ngùng trong cuộc gặp (9) ___.","explanation":"\"face-to-face meeting\" = cuộc gặp trực tiếp.","vis":["thế giới mạng (sai nghĩa)","gặp mặt trực tiếp (đúng)","từ đầu đến chân (sai nghĩa)","mạng internet (sai nghĩa)"]},{"q":"10. …shy people spend ___ time on Facebook than sociable people.","options":["less","fewer","few","more"],"answer":3,"vi":"…người nhút nhát dành (10) ___ thời gian trên Facebook hơn người hòa đồng.","explanation":"So sánh hơn với \"more\".","vis":["ít hơn (dùng cho danh từ không đếm được, sai nghĩa ở đây)","ít hơn (dùng cho danh từ đếm được, sai vì \"time\" không đếm được và sai nghĩa)","một vài, ít (tính từ, sai)","nhiều hơn (đúng)"]}],"roman":"IX","passage":{"title":"Facebook","html":"Nowadays, Facebook is the most popular <b>(1)</b> ___ media which helps to connect people. Not only adults but also teenagers <b>(2)</b> ___ using Facebook. There are many ways to communicate on Facebook. You can post messages to the public or to your friends. If you want a private conversation, you can send a direct message to a friend and start <b>(3)</b> ___. If you want to meet new people with same interests, you can join in Facebook groups or Facebook pages.<br><br>When friends and family members move to a different place or even different country, Facebook can help you keep <b>(4)</b> ___. In addition to communicating directly through posting and messaging, you can play games with them, making them seem closer <b>(5)</b> ___ the distance.<br><br>Facebook can also help reduce or eliminate the <b>(6)</b> ___ to meet new people. For example, if you feel <b>(7)</b> ___ about asking someone in class about a homework assignment, you may feel more comfortable sending <b>(8)</b> ___ to that person on Facebook. That way, you can think over what you write and can avoid any embarrassment in <b>(9)</b> ___ meeting. That's the reason why shy people spend <b>(10)</b> ___ time on Facebook than sociable people.","vi":"Ngày nay, Facebook là mạng xã hội phổ biến nhất giúp kết nối mọi người. Không chỉ người lớn mà cả thanh thiếu niên cũng đang sử dụng Facebook. Có nhiều cách để giao tiếp trên Facebook. Bạn có thể đăng tin nhắn công khai hoặc gửi cho bạn bè. Nếu muốn trò chuyện riêng tư, bạn có thể gửi tin nhắn trực tiếp cho một người bạn và bắt đầu trò chuyện. Nếu muốn gặp gỡ những người mới có cùng sở thích, bạn có thể tham gia các nhóm hoặc trang Facebook.<br><br>Khi bạn bè và người thân chuyển đến nơi khác hoặc thậm chí quốc gia khác, Facebook có thể giúp bạn giữ liên lạc. Ngoài việc giao tiếp trực tiếp qua đăng bài và nhắn tin, bạn có thể chơi trò chơi cùng họ, khiến họ dường như gần gũi hơn dù có khoảng cách.<br><br>Facebook cũng có thể giúp giảm bớt hoặc loại bỏ rào cản khi gặp gỡ người mới. Ví dụ, nếu bạn cảm thấy lo lắng khi hỏi ai đó trong lớp về bài tập về nhà, bạn có thể cảm thấy thoải mái hơn khi gửi tin nhắn cho người đó trên Facebook. Nhờ vậy, bạn có thể suy nghĩ kỹ về những gì mình viết và tránh được sự ngượng ngùng trong cuộc gặp trực tiếp. Đó là lý do vì sao người nhút nhát dành nhiều thời gian trên Facebook hơn người hòa đồng."}},{"navLabel":"Đọc hiểu 4","title":"Đọc hiểu – Forms of Non-verbal Communication","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi câu hỏi.","type":"mcq","instant":true,"questions":[{"q":"1. How many forms of non-verbal communication mentioned in the text?","options":["3","4","5","2"],"answer":1,"vi":"Có bao nhiêu hình thức giao tiếp phi ngôn ngữ được đề cập trong bài?","explanation":"Bài đọc đề cập 4 hình thức: Eye contact, Touch, Facial Expressions, Posture.","vis":["ba (sai — bài có 4 hình thức)","bốn (đúng)","năm (sai)","hai (sai)"]},{"q":"2. People from which country think avoiding eye contact is a sign of respect?","options":["Asian countries","Ghana","North America","European countries"],"answer":0,"vi":"Người nước nào cho rằng tránh giao tiếp bằng mắt là dấu hiệu tôn trọng?","explanation":"Bài đọc nói \"In many Asian cultures, avoiding eye contact is seen as a sign of respect.\"","vis":["các nước châu Á (đúng)","Ghana (sai — Ghana coi trẻ nhìn thẳng là bướng bỉnh)","Bắc Mỹ (sai — coi giao tiếp mắt là quan trọng, thể hiện bình đẳng)","các nước châu Âu (sai, không được nhắc)"]},{"q":"3. Why do Latin and North America people think eye contact is important?","options":["Because they think it shows respect.","Because they think it shows equality.","Because they think it shows importance.","Because they think it shows difference."],"answer":1,"vi":"Tại sao người Latin và Bắc Mỹ cho rằng giao tiếp bằng mắt quan trọng?","explanation":"Bài đọc nói \"consider eye contact important for showing equality among individuals.\"","vis":["Vì họ nghĩ nó thể hiện sự tôn trọng. (sai — đó là ý ở châu Á)","Vì họ nghĩ nó thể hiện sự bình đẳng. (đúng)","Vì họ nghĩ nó thể hiện sự quan trọng. (sai)","Vì họ nghĩ nó thể hiện sự khác biệt. (sai)"]},{"q":"4. What does \"a stubborn child\" mean?","options":["A child who listens to the adults","A child who doesn't listen to the adults","A child who respects the adults","A lovely child"],"answer":1,"vi":"\"A stubborn child\" có nghĩa là gì?","explanation":"\"stubborn\" = cứng đầu, không nghe lời.","vis":["Một đứa trẻ biết nghe lời người lớn. (sai)","Một đứa trẻ không nghe lời người lớn. (đúng)","Một đứa trẻ tôn trọng người lớn. (sai)","Một đứa trẻ đáng yêu. (sai)"]},{"q":"5. Is shaking hands to greet a stranger OK in America?","options":["Yes, it is.","No, it isn't.","Not mentioned","Not sure"],"answer":0,"vi":"Bắt tay để chào người lạ ở Mỹ có được không?","explanation":"Bài đọc nói \"using a firm handshake is considered appropriate to greet a stranger\" → Có.","vis":["Có, đúng vậy. (đúng — bắt tay chặt là phù hợp ở Mỹ)","Không, không phải vậy. (sai)","Không được đề cập. (sai)","Không chắc chắn. (sai)"]},{"q":"6. What do you do to greet other people in France?","options":["Shrug your shoulder.","Shake hands.","Kiss on their cheeks.","Raise your fists."],"answer":2,"vi":"Ở Pháp, bạn chào người khác bằng cách nào?","explanation":"Bài đọc nói \"in France, it is common to kiss someone you greet on both cheeks.\"","vis":["Nhún vai. (sai)","Bắt tay. (sai — đó là cách chào ở Mỹ)","Hôn lên má họ. (đúng — cách chào ở Pháp)","Giơ nắm đấm lên. (sai)"]},{"q":"7. People from which country feel fine to touch children's heads?","options":["France","Vietnam","China","North America"],"answer":3,"vi":"Người nước nào cảm thấy thoải mái khi chạm đầu trẻ em?","explanation":"Bài đọc nói \"Touching children on the head is fine in North America.\"","vis":["Pháp (sai — Pháp hôn má để chào)","Việt Nam (sai — thuộc châu Á)","Trung Quốc (sai — thuộc châu Á)","Bắc Mỹ (đúng)"]},{"q":"8. Why people in Middle East don't receive gifts with left hands?","options":["Because the left hand is often used to clean the body.","Because the left hand is often used to touch children's heads.","Because the left hand is often used to shake hands.","Because the left hand is often used to wear watch."],"answer":0,"vi":"Tại sao người Trung Đông không nhận quà bằng tay trái?","explanation":"Bài đọc nói \"the left hand is often used to clean the body so using that hand to receive a gift…is considered very rude.\"","vis":["Vì tay trái thường dùng để vệ sinh cơ thể. (đúng)","Vì tay trái thường dùng để chạm đầu trẻ em. (sai)","Vì tay trái thường dùng để bắt tay. (sai)","Vì tay trái thường dùng để đeo đồng hồ. (sai)"]},{"q":"9. People in Nigeria wink at their children when ___.","options":["they want them to do house work","they want to show their love","they want them to leave the room","they want them to leave the classroom"],"answer":2,"vi":"Người Nigeria nháy mắt với con khi nào?","explanation":"Bài đọc nói \"people in Nigeria wink at their children if they want them to leave the room.\"","vis":["họ muốn con làm việc nhà (sai)","họ muốn thể hiện tình yêu (sai)","họ muốn con rời khỏi phòng (đúng)","họ muốn con rời khỏi lớp học (sai)"]},{"q":"10. What is the meaning of standing with hands on the hips in America?","options":["Power","Pride","Anger","Both A & B"],"answer":3,"vi":"Đứng chống nạnh ở Mỹ có ý nghĩa gì?","explanation":"Bài đọc nói \"standing with hands on the hips may suggest power or pride\" → Cả A & B.","vis":["Quyền lực (đúng một phần)","Sự tự hào (đúng một phần)","Sự tức giận (sai — đó là nghĩa ở Argentina)","Cả A và B (đúng, đầy đủ nhất)"]}],"roman":"X","passage":{"title":"Forms of Non-verbal Communication","html":"Non-verbal communication can take many forms. Effectiveness in communication depends on understanding what these forms might be and how their meanings may differ between countries.<br><br><b>Eye contact</b><br>In many Asian cultures, avoiding eye contact is seen as a sign of respect. However, those in Latin and North America consider eye contact important for showing equality among individuals. In Ghana, if a young child looks an adult in the eye, it is considered an act of a stubborn child.<br><br><b>Touch</b><br>A great number of cultural expressions are shown through touch. In America, for example, using a firm handshake is considered appropriate to greet a stranger or business partner. However, in France, it is common to kiss someone you greet on both cheeks. Touching children on the head is fine in North America. However, in Asia, this is considered inappropriate because the head is an important part of the body. In the Middle East, the left hand is often used to clean the body so using that hand to receive a gift or shake hands is considered very rude.<br><br><b>Facial Expressions</b><br>Winking is a facial expression which has different meanings. In Latin America, it is considered a romantic gesture while people in Nigeria wink at their children if they want them to leave the room.<br><br><b>Posture</b><br>In America, standing with hands on the hips may suggest power or pride, but in Argentina, it may suggest anger.","vi":"Giao tiếp phi ngôn ngữ có thể có nhiều hình thức. Hiệu quả giao tiếp phụ thuộc vào việc hiểu những hình thức này có thể là gì và ý nghĩa của chúng có thể khác nhau như thế nào giữa các quốc gia.<br><br><b>Giao tiếp bằng mắt</b><br>Ở nhiều nền văn hóa châu Á, tránh giao tiếp bằng mắt được xem là dấu hiệu của sự tôn trọng. Tuy nhiên, người ở Mỹ Latinh và Bắc Mỹ coi giao tiếp bằng mắt là quan trọng để thể hiện sự bình đẳng giữa các cá nhân. Ở Ghana, nếu một đứa trẻ nhìn thẳng vào mắt người lớn, điều đó bị coi là hành động của một đứa trẻ bướng bỉnh.<br><br><b>Sự đụng chạm</b><br>Rất nhiều biểu hiện văn hóa được thể hiện qua sự đụng chạm. Ở Mỹ chẳng hạn, bắt tay chặt được xem là phù hợp để chào một người lạ hoặc đối tác kinh doanh. Tuy nhiên, ở Pháp, việc hôn má cả hai bên khi chào ai đó là chuyện bình thường. Chạm vào đầu trẻ em là bình thường ở Bắc Mỹ. Tuy nhiên, ở châu Á, điều này bị coi là không phù hợp vì đầu là bộ phận quan trọng của cơ thể. Ở Trung Đông, tay trái thường được dùng để vệ sinh cơ thể nên việc dùng tay đó để nhận quà hoặc bắt tay bị coi là rất bất lịch sự.<br><br><b>Biểu cảm khuôn mặt</b><br>Nháy mắt là một biểu cảm khuôn mặt có nhiều ý nghĩa khác nhau. Ở Mỹ Latinh, đó được xem là một cử chỉ lãng mạn, trong khi người Nigeria nháy mắt với con cái họ khi muốn chúng rời khỏi phòng.<br><br><b>Tư thế</b><br>Ở Mỹ, đứng với hai tay chống hông có thể ngụ ý quyền lực hoặc sự tự hào, nhưng ở Argentina, nó có thể ngụ ý sự tức giận."}},{"navLabel":"Đọc hiểu 5","title":"Đọc hiểu – The San Francisco Earthquake of 1906","icon":"book-open","instructions":"Đọc đoạn văn và điền từ thích hợp vào mỗi chỗ trống.","type":"fill","passage":{"title":"The San Francisco Earthquake of 1906","html":"The San Francisco earthquake of 1906 struck very <b>(1)</b> ___ in the morning. The first rumble, called a foreshock, occurred about 5:11 a.m. right along the San Andreas Fault. The San Andreas Fault is a crack in the earth that <b>(2)</b> ___ about 800 miles through California. The weakness caused by this crack is a main <b>(3)</b> ___ why earthquakes occur in the California region. The main quake was <b>(4)</b> ___ 5:12 a.m. and <b>(5)</b> ___ for almost a minute. The center of the quake was just outside of San Francisco proper. Buildings began to crumble immediately. The streets weren't <b>(6)</b> ___ crowded as they would have been later in the day. Those who were <b>(7)</b> ___ their way to work were crushed <b>(8)</b> ___ the rain of falling brick.","vi":"Trận động đất San Francisco năm 1906 xảy ra rất (1) ___ vào buổi sáng. Cơn rung chấn đầu tiên, gọi là dư chấn báo trước, xảy ra vào khoảng 5:11 sáng dọc theo đứt gãy San Andreas. Đứt gãy San Andreas là một vết nứt trong lòng đất (2) ___ khoảng 800 dặm qua California. Điểm yếu do vết nứt này gây ra là một (3) ___ chính khiến động đất xảy ra ở khu vực California. Trận động đất chính xảy ra (4) ___ 5:12 sáng và (5) ___ gần một phút. Tâm chấn nằm ngay ngoài rìa thành phố San Francisco. Các tòa nhà bắt đầu sụp đổ ngay lập tức. Đường phố không đông đúc (6) ___ so với lúc muộn hơn trong ngày. Những người đang (7) ___ đường đi làm bị đè bẹp (8) ___ trận mưa gạch vỡ rơi xuống."},"questions":[{"q":"1. The San Francisco earthquake struck very (1) ___ in the morning.","answer":"early","vi":"Trận động đất San Francisco xảy ra rất (1) ___ vào buổi sáng.","explanation":"Bài đọc nói \"struck very early in the morning\"."},{"q":"2. The San Andreas Fault is a crack in the earth that (2) ___ about 800 miles through California.","answer":"runs","vi":"Đứt gãy San Andreas là một vết nứt trong lòng đất (2) ___ khoảng 800 dặm qua California.","explanation":"Bài đọc nói \"a crack in the earth that runs about 800 miles\"."},{"q":"3. The weakness caused by this crack is a main (3) ___ why earthquakes occur.","answer":"reason","vi":"Điểm yếu do vết nứt này gây ra là một (3) ___ chính khiến động đất xảy ra.","explanation":"\"a main reason why\" = lý do chính tại sao."},{"q":"4. The main quake was (4) ___ 5:12 a.m.","answer":"at","vi":"Trận động đất chính xảy ra (4) ___ 5:12 sáng.","explanation":"\"at 5:12 a.m.\" = lúc 5:12 sáng."},{"q":"5. The main quake (5) ___ for almost a minute.","answer":"lasted","vi":"Trận động đất chính (5) ___ gần một phút.","explanation":"\"lasted for almost a minute\" = kéo dài gần một phút."},{"q":"6. The streets weren't (6) ___ crowded as they would have been later in the day.","answer":"as","vi":"Đường phố không đông đúc (6) ___ so với lúc muộn hơn trong ngày.","explanation":"\"not as...as\" = không...bằng → weren't as crowded as."},{"q":"7. Those who were (7) ___ their way to work were crushed by the falling brick.","answer":"on","vi":"Những người đang (7) ___ đường đi làm bị đè bẹp bởi gạch vỡ rơi xuống.","explanation":"\"on your way to work\" = trên đường đi làm."},{"q":"8. Those on their way to work were crushed (8) ___ the rain of falling brick.","answer":"by","vi":"Những người trên đường đi làm bị đè bẹp (8) ___ trận mưa gạch vỡ rơi xuống.","explanation":"Bị động: \"crushed by\" = bị đè bẹp bởi."}],"roman":"XI"},{"navLabel":"Đọc hiểu 6","title":"Đọc hiểu – Canadian Culture: Canada Day","icon":"book-open","instructions":"Đọc đoạn văn và chọn đáp án đúng cho mỗi câu.","type":"mcq","instant":true,"passage":{"title":"Canadian Culture - Canada Day","html":"July 1st is Canada Day. Canada Day is the <b>(1)</b> ___ of the formation of the provinces into Canada, which was created in 1867. Canada became an <b>(2)</b> ___ territory of England back on July 1st, 1867. Canada Day is also a Statutory Holiday. Canadians across the country celebrate in many <b>(3)</b> ___. The Government of Canada sponsors fireworks displays and celebrations at city halls across the country. In Ottawa, at the Parliament Buildings there is a noon show with the Prime Minister and the Governor General in attendance to <b>(4)</b> ___ performances of Canadian musicians and singers. Events continue throughout the day.<br><br>Many families go to parks and beaches and enjoy picnics and local events such as musical concerts, parades and fireworks. Many Canadians proudly <b>(5)</b> ___ the Canadian flag at parades to celebrate the birthday of the country. At many events, the National Anthem ‘O Canada’ is played and sung by everyone in attendance. For all Canadians, Canada Day marks the beginning of summer.","vi":"Ngày 1 tháng 7 là Ngày Canada. Canada Day là (1) ___ của sự hình thành các tỉnh thành Canada, được thành lập vào năm 1867. Canada trở thành lãnh thổ (2) ___ khỏi Anh vào ngày 1/7/1867. Canada Day cũng là một Ngày lễ theo luật định. Người Canada trên khắp cả nước kỷ niệm theo nhiều (3) ___. Chính phủ Canada tài trợ các buổi bắn pháo hoa và lễ kỷ niệm tại tòa thị chính trên khắp cả nước. Ở Ottawa, tại Tòa nhà Quốc hội có một buổi biểu diễn buổi trưa với sự tham dự của Thủ tướng và Toàn quyền để (4) ___ các buổi biểu diễn của nhạc sĩ và ca sĩ Canada. Các sự kiện tiếp tục diễn ra suốt cả ngày.<br><br>Nhiều gia đình đến công viên và bãi biển để tận hưởng các buổi dã ngoại và sự kiện địa phương như hòa nhạc, diễu hành và pháo hoa. Nhiều người Canada tự hào (5) ___ quốc kỳ Canada tại các cuộc diễu hành để kỷ niệm sinh nhật đất nước. Tại nhiều sự kiện, quốc ca 'O Canada' được chơi và hát bởi mọi người tham dự. Đối với tất cả người Canada, Canada Day đánh dấu sự khởi đầu của mùa hè."},"questions":[{"q":"1. Canada Day is the (1) ___ of the formation of the provinces into Canada.","options":["ceremony","party","celebration","occasion"],"answer":2,"vi":"Canada Day là (1) ___ của sự hình thành các tỉnh thành Canada.","explanation":"\"celebration\" = lễ kỷ niệm — đúng ngữ cảnh nhất cho một ngày lễ quốc gia.","note":"ceremony (nghi lễ, mang tính trang trọng hơn) · party (bữa tiệc) · occasion (dịp, sự kiện nói chung)","vis":["buổi lễ, nghi lễ (sai — trang trọng hơn cần thiết)","bữa tiệc (sai nghĩa)","lễ kỷ niệm (đúng)","dịp, sự kiện (sai — không đủ cụ thể)"]},{"q":"2. Canada became an (2) ___ territory of England back on July 1st, 1867.","options":["dependent","independent","dependable","undependable"],"answer":1,"vi":"Canada trở thành lãnh thổ (2) ___ khỏi Anh vào ngày 1/7/1867.","explanation":"\"independent\" = độc lập, đúng với sự kiện Canada tách khỏi Anh.","note":"dependent (phụ thuộc)<br>independent (độc lập) ✓<br>dependable (đáng tin cậy)<br>undependable (không đáng tin cậy)","vis":["phụ thuộc (sai — trái nghĩa)","độc lập (đúng)","đáng tin cậy (sai nghĩa)","không đáng tin cậy (sai nghĩa)"]},{"q":"3. Canadians across the country celebrate in many (3) ___.","options":["methods","roads","paths","ways"],"answer":3,"vi":"Người Canada trên khắp cả nước kỷ niệm theo nhiều (3) ___.","explanation":"\"in many ways\" = theo nhiều cách (cụm cố định).","note":"methods (phương pháp)<br>roads (con đường - nghĩa đen)<br>paths (lối đi - nghĩa đen)<br>ways (cách thức) ✓","vis":["phương pháp (sai — không phải cụm cố định)","con đường (sai nghĩa)","lối đi (sai nghĩa)","cách thức (đúng — in many ways)"]},{"q":"4. The Prime Minister and the Governor General attend to (4) ___ performances of Canadian musicians.","options":["see","watch","look at","witness"],"answer":1,"vi":"Thủ tướng và Toàn quyền tham dự để (4) ___ biểu diễn của các nhạc sĩ Canada.","explanation":"\"watch a performance\" = xem một buổi biểu diễn (cụm cố định cho biểu diễn/sự kiện).","note":"see (nhìn thấy nói chung)<br>watch (xem, quan sát) ✓<br>look at (nhìn vào - vật tĩnh)<br>witness (chứng kiến - trang trọng hơn)","vis":["nhìn thấy (sai — không phải cụm cố định với \"performance\")","xem (đúng — watch a performance)","nhìn vào (sai nghĩa cụm)","chứng kiến (sai — trang trọng hơn cần thiết)"]},{"q":"5. Many Canadians proudly (5) ___ the Canadian flag at parades.","options":["wave","plug","hold","keep"],"answer":0,"vi":"Nhiều người Canada tự hào (5) ___ quốc kỳ Canada tại các cuộc diễu hành.","explanation":"\"wave the flag\" = vẫy cờ (cụm cố định cho hành động vẫy cờ ăn mừng).","note":"wave (vẫy) ✓<br>plug (cắm điện)<br>hold (cầm, giữ)<br>keep (giữ lại)","vis":["vẫy (đúng — wave the flag)","cắm điện (sai nghĩa)","cầm, giữ (sai — không phải cụm cố định)","giữ (sai nghĩa)"]},{"q":"The celebration falls on the very beginning of June.","options":["True","False"],"answer":1,"vi":"Lễ kỷ niệm rơi vào đầu tháng Sáu.","explanation":"Sai. Bài đọc nói \"July 1st is Canada Day\" — Canada Day là ngày 1 tháng 7, không phải tháng 6.","vis":["Đúng","Sai"]},{"q":"England used to be the colony of Canada.","options":["True","False"],"answer":1,"vi":"Nước Anh từng là thuộc địa của Canada.","explanation":"Sai. Ngược lại mới đúng: Canada từng là lãnh thổ của Anh (\"Canada became an independen
