<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap');
  :root{ --accent:#1d4ed8; --accent2:#0891b2; }
  * { box-sizing: border-box; }
  body { font-family:'Nunito',sans-serif; background:#f5f3ff; }

  .option-label.selected{ border-color:#1e1b4b; background:#eef2ff; }

  .show-mcq-detail .mcq-detail-hidden{ display:block; }
  .speak-btn{ cursor:pointer; }

  @keyframes pulseSpeak{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
  .vi-hidden{ display:none; }
  .explanation-box{ display:none; animation: fadeSlide .3s ease forwards; }
  .explanation-box.show{ display:block; }
  @keyframes fadeSlide{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }
  input.answer-input{ border:2px solid #cbd5e1; transition:border .18s; outline:none; background:#fff; }
  input.answer-input:focus{ border-color:var(--accent); }
  input.correct-input{ border-color:#22c55e !important; background:#f0fdf4; }
  input.wrong-input{ border-color:#ef4444 !important; background:#fef2f2; }
  .score-badge{ animation: popIn .35s cubic-bezier(.36,1.6,.6,1) forwards; }

  .confetti-wrap{ position:fixed; inset:0; pointer-events:none; z-index:9999; }
  .confetti-piece{ position:absolute; width:10px; height:10px; border-radius:2px; animation: confettiFall linear forwards; }

  .progress-bar-fill{ transition: width .6s ease; }
  .section-page{ display:none; }
  .section-page.active{ display:block; }
  #completionBanner{ display:none; }
  #completionBanner.show{ display:flex; }
  .passage-box{ background:#fff; border:1px solid #e2e8f0; border-radius:1rem; padding:1rem 1.25rem; line-height:1.9; font-size:.95rem; color:#334155; }
  .dict-box{ background:#fef9c3; border:1px solid #fde68a; border-radius:1rem; padding:1rem 1.25rem; font-size:.9rem; color:#334155; }
  .blank-tag{ background:#ffedd5; color:#9a3412; font-weight:800; border-radius:.4rem; padding:0 .35rem; }
  .wordfam-box{ background:#fff7ed; border:1px solid #fed7aa; border-radius:.6rem; padding:.5rem .75rem; font-size:.75rem; color:#9a3412; line-height:1.6; width:100%; }

<script>
const DATA = {"unit": 1, "test": "inclass", "sections": [{"roman": "I", "navLabel": "Phát âm", "title": "Phát âm", "icon": "ear-listen", "instructions": "Chọn từ có phần gạch chân được phát âm khác với các từ còn lại.", "type": "mcq", "instant": true, "questions": [{"q": "1. Which word has the underlined part pronounced differently from that of the others?", "options": ["c<u>oo</u>k", "sch<u>oo</u>l", "d<u>oo</u>r", "p<u>oo</u>l"], "answer": 2, "explanation": "\"door\" phát âm /ɔː/, ba từ còn lại có \"oo\" phát âm /uː/ (riêng \"cook\" là /ʊ/ nhưng theo đáp án gốc tài liệu, \"door\" là từ khác biệt do có \"r\" làm biến âm).", "ipas": ["/kʊk/", "/skuːl/", "/dɔːr/", "/puːl/"], "vis": ["nấu ăn", "trường học", "cửa", "hồ bơi"]}, {"q": "2. Which word has the underlined part pronounced differently from that of the others?", "options": ["ch<u>oo</u>se", "c<u>oo</u>l", "g<u>oo</u>d", "t<u>oo</u>l"], "answer": 2, "explanation": "\"good\" có \"oo\" phát âm /ʊ/, ba từ còn lại phát âm /uː/.", "ipas": ["/tʃuːz/", "/kuːl/", "/ɡʊd/", "/tuːl/"], "vis": ["chọn", "mát mẻ", "tốt", "dụng cụ"]}, {"q": "3. Which word has the underlined part pronounced differently from that of the others?", "options": ["j<u>u</u>ne", "b<u>u</u>ll", "tr<u>u</u>th", "fl<u>u</u>"], "answer": 1, "explanation": "\"bull\" có \"u\" phát âm /ʊ/, ba từ còn lại phát âm /uː/.", "ipas": ["/dʒuːn/", "/bʊl/", "/truːθ/", "/fluː/"], "vis": ["tháng Sáu", "con bò đực", "sự thật", "cúm"]}, {"q": "4. Which word has the underlined part pronounced differently from that of the others?", "options": ["pictur<u>es</u>", "watch<u>es</u>", "bus<u>es</u>", "brush<u>es</u>"], "answer": 0, "explanation": "\"pictures\" có đuôi \"-s\" phát âm /z/, ba từ còn lại có đuôi \"-es\" phát âm /ɪz/.", "ipas": ["/ˈpɪktʃərz/", "/ˈwɒtʃɪz/", "/ˈbʌsɪz/", "/ˈbrʌʃɪz/"], "vis": ["những bức tranh", "đồng hồ (số nhiều)", "xe buýt (số nhiều)", "bàn chải (số nhiều)"]}, {"q": "5. Which word has the underlined part pronounced differently from that of the others?", "options": ["w<u>o</u>man", "wh<u>o</u>", "m<u>o</u>ve", "l<u>o</u>se"], "answer": 0, "explanation": "\"woman\" có \"o\" phát âm /ʊ/, ba từ còn lại phát âm /uː/.", "ipas": ["/ˈwʊmən/", "/huː/", "/muːv/", "/luːz/"], "vis": ["người phụ nữ", "ai", "di chuyển", "mất, thua"]}, {"q": "6. Which word has the underlined part pronounced differently from that of the others?", "options": ["work<u>ed</u>", "watch<u>ed</u>", "need<u>ed</u>", "walk<u>ed</u>"], "answer": 2, "explanation": "\"needed\" có đuôi \"-ed\" phát âm /ɪd/, ba từ còn lại phát âm /t/.", "ipas": ["/wɜːkt/", "/wɒtʃt/", "/ˈniːdɪd/", "/wɔːkt/"], "vis": ["đã làm việc", "đã xem", "đã cần", "đã đi bộ"]}, {"q": "7. Which word has the underlined part pronounced differently from that of the others?", "options": ["p<u>u</u>dding", "p<u>u</u>sh", "c<u>u</u>shion", "incl<u>u</u>de"], "answer": 3, "explanation": "\"include\" có \"u\" phát âm /uː/, ba từ còn lại phát âm /ʊ/.", "ipas": ["/ˈpʊdɪŋ/", "/pʊʃ/", "/ˈkʊʃn/", "/ɪnˈkluːd/"], "vis": ["bánh pudding", "đẩy", "đệm, gối tựa", "bao gồm"]}, {"q": "8. Which word has the underlined part pronounced differently from that of the others?", "options": ["fin<u>i</u>sh", "f<u>i</u>nd", "t<u>i</u>red", "disl<u>i</u>ke"], "answer": 0, "explanation": "\"finish\" có \"i\" phát âm /ɪ/, ba từ còn lại có \"i\" phát âm /aɪ/.", "ipas": ["/ˈfɪnɪʃ/", "/faɪnd/", "/ˈtaɪərd/", "/dɪsˈlaɪk/"], "vis": ["hoàn thành", "tìm thấy", "mệt mỏi", "không thích"]}, {"q": "9. Which word has the underlined part pronounced differently from that of the others?", "options": ["w<u>oo</u>d", "m<u>oo</u>n", "s<u>oo</u>n", "l<u>oo</u>se"], "answer": 0, "explanation": "\"wood\" có \"oo\" phát âm /ʊ/, ba từ còn lại phát âm /uː/.", "ipas": ["/wʊd/", "/muːn/", "/suːn/", "/luːs/"], "vis": ["gỗ", "mặt trăng", "sớm", "lỏng lẻo"]}, {"q": "10. Which word has the underlined part pronounced differently from that of the others?", "options": ["ch<u>oo</u>se", "l<u>oo</u>k", "sp<u>oo</u>n", "f<u>oo</u>d"], "answer": 1, "explanation": "\"look\" có \"oo\" phát âm /ʊ/, ba từ còn lại phát âm /uː/.", "ipas": ["/tʃuːz/", "/lʊk/", "/spuːn/", "/fuːd/"], "vis": ["chọn", "nhìn", "cái thìa", "thức ăn"]}]}, {"roman": "II", "navLabel": "Trọng âm", "title": "Trọng âm", "icon": "ear-listen", "instructions": "Chọn từ có trọng âm khác với các từ còn lại.", "type": "mcq", "instant": true, "questions": [{"q": "1. Which word has a different stress pattern from that of the others?", "options": ["leisure", "puzzle", "enjoy", "message"], "answer": 2, "explanation": "\"enjoy\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/ˈliːʒər/", "/ˈpʌzl/", "/ɪnˈdʒɔɪ/", "/ˈmesɪdʒ/"], "vis": ["thời gian rảnh", "trò chơi xếp hình", "thích thú", "tin nhắn"]}, {"q": "2. Which word has a different stress pattern from that of the others?", "options": ["enjoy", "dislike", "relax", "muscle"], "answer": 3, "explanation": "\"muscle\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.", "ipas": ["/ɪnˈdʒɔɪ/", "/dɪsˈlaɪk/", "/rɪˈlæks/", "/ˈmʌsl/"], "vis": ["thích thú", "không thích", "thư giãn", "cơ bắp"]}, {"q": "3. Which word has a different stress pattern from that of the others?", "options": ["balance", "muscle", "improve", "fancy"], "answer": 2, "explanation": "\"improve\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/ˈbæləns/", "/ˈmʌsl/", "/ɪmˈpruːv/", "/ˈfænsi/"], "vis": ["sự cân bằng", "cơ bắp", "cải thiện", "thích, muốn"]}, {"q": "4. Which word has a different stress pattern from that of the others?", "options": ["home-made", "snowboarding", "puzzle", "balance"], "answer": 0, "explanation": "\"home-made\" trọng âm rơi vào âm tiết \"made\", ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/ˌhoʊmˈmeɪd/", "/ˈsnoʊbɔːrdɪŋ/", "/ˈpʌzl/", "/ˈbæləns/"], "vis": ["tự làm tại nhà", "trượt ván tuyết", "trò chơi xếp hình", "sự cân bằng"]}, {"q": "5. Which word has a different stress pattern from that of the others?", "options": ["do puzzle", "detest", "leisure", "improve"], "answer": 0, "explanation": "\"do puzzle\" là cụm động từ gồm hai từ nên có kiểu nhấn âm khác so với các từ đơn còn lại.", "ipas": ["/duː ˈpʌzl/", "/dɪˈtest/", "/ˈliːʒər/", "/ɪmˈpruːv/"], "vis": ["chơi xếp hình", "ghét cay ghét đắng", "thời gian rảnh", "cải thiện"]}, {"q": "6. Which word has a different stress pattern from that of the others?", "options": ["resort", "do puzzle", "adore", "leisure"], "answer": 1, "explanation": "\"do puzzle\" là cụm động từ gồm hai từ nên có kiểu nhấn âm khác so với ba từ đơn còn lại.", "ipas": ["/rɪˈzɔːrt/", "/duː ˈpʌzl/", "/əˈdɔːr/", "/ˈliːʒər/"], "vis": ["khu nghỉ dưỡng", "chơi xếp hình", "rất thích, mê", "thời gian rảnh"]}, {"q": "7. Which word has a different stress pattern from that of the others?", "options": ["connect", "activate", "create", "surprise"], "answer": 1, "explanation": "\"activate\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.", "ipas": ["/kəˈnekt/", "/ˈæktɪveɪt/", "/kriˈeɪt/", "/səˈpraɪz/"], "vis": ["kết nối", "kích hoạt", "tạo ra", "làm ngạc nhiên"]}, {"q": "8. Which word has a different stress pattern from that of the others?", "options": ["entertain", "popularize", "activate", "leisure"], "answer": 0, "explanation": "\"entertain\" trọng âm rơi vào âm tiết cuối, ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/ˌentərˈteɪn/", "/ˈpɒpjələraɪz/", "/ˈæktɪveɪt/", "/ˈliːʒər/"], "vis": ["giải trí", "phổ biến hóa", "kích hoạt", "thời gian rảnh"]}, {"q": "9. Which word has a different stress pattern from that of the others?", "options": ["adore", "enjoy", "prefer", "listen"], "answer": 3, "explanation": "\"listen\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.", "ipas": ["/əˈdɔːr/", "/ɪnˈdʒɔɪ/", "/prɪˈfɜːr/", "/ˈlɪsn/"], "vis": ["rất thích, mê", "thích thú", "thích hơn", "lắng nghe"]}, {"q": "10. Which word has a different stress pattern from that of the others?", "options": ["detest", "message friends", "folding", "fancy"], "answer": 0, "explanation": "\"detest\" trọng âm rơi vào âm tiết 2, ba từ/cụm từ còn lại trọng âm chính rơi vào âm tiết 1.", "ipas": ["/dɪˈtest/", "/ˈmesɪdʒ frendz/", "/ˈfoʊldɪŋ/", "/ˈfænsi/"], "vis": ["ghét cay ghét đắng", "nhắn tin cho bạn bè", "gấp", "thích, muốn"]}]}, {"navLabel": "Ngữ pháp", "title": "Grammar Exercise: Verbs of liking/disliking + Gerund/Infinitive", "icon": "chalkboard", "instructions": "Chọn dạng đúng của động từ trong ngoặc.", "type": "mcq", "instant": true, "questions": [{"q": "1. Most adults don't like (watch / to watch) cartoons.", "options": ["watch", "to watch"], "answer": 1, "explanation": "\"like\" có thể theo sau bởi V-ing hoặc to-V; đáp án chọn là to watch.", "vi": "Hầu hết người lớn không thích xem phim hoạt hình."}, {"q": "2. Her little kid (detests / likes) all vegetables. He doesn't eat any kinds of vegetables.", "options": ["detests", "likes"], "answer": 0, "explanation": "Không ăn bất kỳ loại rau nào → detests (ghét cay ghét đắng), không phải likes.", "vi": "Đứa con nhỏ của cô ấy ghét tất cả các loại rau. Cậu bé không ăn bất kỳ loại rau nào cả."}, {"q": "3. Does she fancy (messaging / to message) her friends?", "options": ["messaging", "to message"], "answer": 0, "explanation": "\"fancy\" chỉ theo sau bởi danh động từ (V-ing): messaging.", "vi": "Cô ấy có thích nhắn tin cho bạn bè không?"}, {"q": "4. My sister loves origami. She often (folds / folding) paper into attractive shapes.", "options": ["folds", "folding"], "answer": 0, "explanation": "Đây là động từ chính của câu (thì hiện tại đơn), không phải động từ theo sau \"love\" → folds.", "vi": "Chị tôi rất thích origami. Chị ấy thường gấp giấy thành những hình dạng hấp dẫn."}, {"q": "5. They (fancy / don't like) drinking coffee because it is too bitter.", "options": ["fancy", "don't like"], "answer": 1, "explanation": "Cà phê quá đắng → không thích uống: don't like drinking coffee.", "vi": "Họ không thích uống cà phê vì nó quá đắng."}, {"q": "6. He always (stays / staying) at home on holidays.", "options": ["stays", "staying"], "answer": 0, "explanation": "Động từ chính của câu, thì hiện tại đơn, chủ ngữ số ít → stays.", "vi": "Anh ấy luôn ở nhà vào những ngày nghỉ lễ."}, {"q": "7. I'm into playing sport, especially table tennis. I (play / to play) table tennis almost every afternoon.", "options": ["play", "to play"], "answer": 0, "explanation": "Động từ chính của câu, thì hiện tại đơn → play.", "vi": "Tôi rất thích chơi thể thao, đặc biệt là bóng bàn. Tôi chơi bóng bàn hầu như mỗi buổi chiều."}, {"q": "8. My sister adores (to make / making) paper flowers.", "options": ["to make", "making"], "answer": 1, "explanation": "\"adore\" chỉ theo sau bởi danh động từ (V-ing): making.", "vi": "Chị tôi rất thích làm hoa giấy."}], "roman": "III"}, {"roman": "IV", "navLabel": "Từ vựng & Ngữ pháp", "title": "Choose the best answer or phrase", "icon": "list-check", "instructions": "Chọn đáp án (A, B, C hoặc D) đúng nhất.", "type": "mcq", "instant": true, "questions": [{"q": "1. About 16% of them love ________ swimming.", "options": ["to go", "go", "going", "went"], "answer": 2, "explanation": "“love + V-ing/to-V” đều đúng ngữ pháp, nhưng đáp án chọn là going.", "vis": ["đi (to-V, sai vì “love swimming” không cần “go”)", "đi (nguyên mẫu, sai cấu trúc)", "bơi lội (V-ing, đúng - love + V-ing)", "đã đi (quá khứ, sai)"], "vi": "Khoảng 16% trong số họ rất thích bơi lội."}, {"q": "2. My father likes _________ books and _________ in the pool.", "options": ["reading - swim", "to read - swimming", "read - swim", "reading - swimming"], "answer": 3, "explanation": "Hai động từ song song sau “likes” phải cùng dạng V-ing: reading - swimming.", "vis": ["đọc (V-ing) - bơi (nguyên mẫu, không đồng nhất dạng)", "đọc (to-V) - bơi (V-ing, không đồng nhất dạng)", "đọc (nguyên mẫu) - bơi (nguyên mẫu, sai vì thiếu V-ing)", "đọc (V-ing) - bơi (V-ing, đúng vì đồng nhất dạng)"], "vi": "Bố tôi thích đọc sách và bơi trong hồ bơi."}, {"q": "3. A lot of young families in Viet Nam prefer _______ time doing outdoor activities together.", "options": ["spending", "spend", "spent", "to spend"], "answer": 0, "explanation": "Cấu trúc “prefer + V-ing”; đồng thời đây là cấu trúc “spend time V-ing”.", "vis": ["dành (V-ing, đúng)", "dành (nguyên mẫu, sai)", "đã dành (quá khứ, sai)", "dành (to-V, sai)"], "vi": "Nhiều gia đình trẻ ở Việt Nam thích dành thời gian cùng nhau làm các hoạt động ngoài trời."}, {"q": "4. My sister hates ______ up early to do exercise.", "options": ["getting", "get", "gets", "to get"], "answer": 0, "explanation": "“hate” có thể theo sau bởi V-ing hoặc to-V; đáp án chọn là getting.", "vis": ["dậy (V-ing, đúng)", "dậy (nguyên mẫu, sai)", "dậy (số ít, sai chủ ngữ)", "dậy (to-V, cũng đúng ngữ pháp nhưng không phải đáp án chọn)"], "vi": "Chị tôi ghét việc dậy sớm để tập thể dục."}, {"q": "5. Nam usually _________ football with his friends after school.", "options": ["plays", "playing", "play", "to play"], "answer": 0, "explanation": "Chủ ngữ số ít “Nam” ở thì hiện tại đơn, dùng plays.", "vis": ["chơi (thì hiện tại đơn, số ít, đúng)", "đang chơi (V-ing, sai vì cần động từ chính)", "chơi (nguyên mẫu, sai chia động từ)", "để chơi (to-V, sai cấu trúc)"], "vi": "Nam thường chơi bóng đá với bạn bè sau giờ học."}, {"q": "6. ________ helps to improve physical health and sometimes gives us a chance to make friends.", "options": ["Messaging", "Playing computer games", "Surfing the net", "Playing sports"], "answer": 3, "explanation": "Chơi thể thao giúp cải thiện sức khỏe thể chất và có cơ hội kết bạn.", "vis": ["nhắn tin (không giúp cải thiện sức khỏe thể chất)", "chơi trò chơi điện tử (không giúp cải thiện sức khỏe thể chất)", "lướt mạng (không giúp cải thiện sức khỏe thể chất)", "chơi thể thao (đúng, cải thiện sức khỏe và kết bạn)"], "vi": "Chơi thể thao giúp cải thiện sức khỏe thể chất và đôi khi cho chúng ta cơ hội kết bạn."}, {"q": "7. Mark spends a lot of time ________ the internet. He visits one website after another just to watch short videos.", "options": ["doing", "taking", "surfing", "knitting"], "answer": 2, "explanation": "“surf the internet” nghĩa là lướt mạng.", "vis": ["làm (không phải collocation với internet)", "lấy (không phải collocation với internet)", "lướt (đúng, surf the internet)", "đan len (không liên quan đến internet)"], "vi": "Mark dành nhiều thời gian lướt mạng. Cậu ấy vào hết trang web này đến trang web khác chỉ để xem các video ngắn."}, {"q": "8. Our cousins detest ________ books and _________ .", "options": ["reading / draw", "reading / drawing", "to read / to draw", "read/ draw"], "answer": 1, "explanation": "Hai động từ song song sau “detest” phải cùng dạng V-ing: reading / drawing.", "vis": ["đọc (V-ing) - vẽ (nguyên mẫu, không đồng nhất)", "đọc (V-ing) - vẽ (V-ing, đúng vì detest chỉ theo sau V-ing)", "đọc (to-V) - vẽ (to-V, sai vì detest không theo sau to-V)", "đọc (nguyên mẫu) - vẽ (nguyên mẫu, sai)"], "vi": "Anh chị em họ của chúng tôi rất ghét đọc sách và vẽ."}, {"q": "9. Alice spends a lot of time _______ her own; she always exercises regularly and does what she enjoys.", "options": ["on", "in", "about", "for"], "answer": 0, "explanation": "“spend time on your own” nghĩa là dành thời gian một mình.", "vis": ["(thuộc cụm “on your own” = một mình, đúng)", "trong (sai giới từ)", "về, khoảng (sai giới từ)", "cho, vì (sai giới từ)"], "vi": "Alice dành nhiều thời gian ở một mình; cô ấy luôn tập thể dục đều đặn và làm những gì mình thích."}, {"q": "10. _______ is a design that you use to make something.", "options": ["Pattern", "Pastime", "Needles", "A and B are correct"], "answer": 0, "explanation": "“pattern” nghĩa là mẫu, khuôn thiết kế dùng để tạo ra vật gì đó.", "vis": ["mẫu, khuôn thiết kế (đúng)", "thú vui, việc bạn thích làm khi rảnh (sai nghĩa)", "que đan (sai nghĩa)", "cả Pattern và Pastime đều đúng (sai, vì chỉ Pattern đúng)"], "vi": "Mẫu (pattern) là một thiết kế mà bạn dùng để làm ra thứ gì đó."}, {"q": "11. _________ do you do with your friends in your free time?", "options": ["What", "How", "Who", "When"], "answer": 0, "explanation": "Câu hỏi về hoạt động, dùng What.", "vis": ["cái gì (hỏi về hoạt động, đúng)", "như thế nào (hỏi cách thức, sai)", "ai (hỏi về người, sai)", "khi nào (hỏi thời gian, sai)"], "vi": "Bạn làm gì với bạn bè trong thời gian rảnh?"}, {"q": "12. _______ is small circles of wool made around knitting needles.", "options": ["Stitches", "Magical", "Pastime", "Pattern"], "answer": 0, "explanation": "“stitches” nghĩa là các mũi đan (vòng len nhỏ quanh que đan).", "vis": ["các mũi đan (đúng, vòng len nhỏ quanh que đan)", "kỳ diệu, huyền bí (sai nghĩa)", "thú vui (sai nghĩa)", "mẫu thiết kế (sai nghĩa)"], "vi": "Các mũi đan là những vòng len nhỏ được tạo quanh que đan."}, {"q": "13. Origami is the art of paper _________.", "options": ["fold", "folding", "to fold", "folds"], "answer": 1, "explanation": "“paper folding” nghĩa là nghệ thuật gấp giấy (danh từ ghép).", "vis": ["gấp (nguyên mẫu, sai vì cần danh từ ghép)", "gấp (V-ing, đúng - paper folding)", "để gấp (to-V, sai cấu trúc)", "gấp (số nhiều động từ, sai)"], "vi": "Origami là nghệ thuật gấp giấy."}, {"q": "14. About favorite leisure activities, she and I share many things in _______.", "options": ["similarity", "general", "common", "the same"], "answer": 2, "explanation": "“have things in common” nghĩa là có nhiều điểm chung.", "vis": ["sự giống nhau (danh từ, không đi với “in” theo cách này)", "nói chung (sai cụm từ)", "chung, điểm chung (đúng, “in common”)", "giống nhau (tính từ, sai cấu trúc)"], "vi": "Về các hoạt động giải trí yêu thích, cô ấy và tôi có nhiều điểm chung."}, {"q": "15. It rained hard. ______, my father went to work.", "options": ["Therefore", "However", "Because", "A and B are correct"], "answer": 1, "explanation": "Ý tương phản, trời mưa to nhưng bố vẫn đi làm, dùng However.", "vis": ["vì vậy (sai, không phải quan hệ kết quả)", "tuy nhiên (đúng, thể hiện sự tương phản)", "bởi vì (sai, không phải quan hệ nguyên nhân)", "cả Therefore và However đều đúng (sai)"], "vi": "Trời mưa to. Tuy nhiên, bố tôi vẫn đi làm."}, {"q": "16. It was cold and wet, ______ Bob still went to the beach.", "options": ["therefore", "so", "but", "because"], "answer": 2, "explanation": "Ý tương phản, trời lạnh và ướt nhưng Bob vẫn đi biển, dùng but.", "vis": ["vì vậy (sai, không phải quan hệ kết quả)", "vì vậy, nên (sai, không phải quan hệ kết quả)", "nhưng (đúng, thể hiện sự tương phản)", "bởi vì (sai, không phải quan hệ nguyên nhân)"], "vi": "Trời lạnh và ẩm ướt, nhưng Bob vẫn đi biển."}, {"q": "17. _______ is something that you enjoy doing when you are not working", "options": ["Pastime", "Pattern", "Magical", "Stitches"], "answer": 0, "explanation": "“pastime” nghĩa là thú vui, việc bạn thích làm khi không phải làm việc.", "vis": ["thú vui (đúng)", "mẫu thiết kế (sai nghĩa)", "kỳ diệu, huyền bí (sai nghĩa)", "các mũi đan (sai nghĩa)"], "vi": "Thú vui (pastime) là điều bạn thích làm khi không phải làm việc."}, {"q": "18. Visiting _______ increases my knowledge about cultures in the past.", "options": ["museums", "cinemas", "hometown", "city"], "answer": 0, "explanation": "Thăm bảo tàng giúp tăng hiểu biết về văn hóa trong quá khứ.", "vis": ["bảo tàng (đúng, nơi lưu giữ văn hóa lịch sử)", "rạp chiếu phim (không liên quan văn hóa quá khứ)", "quê hương (không hợp nghĩa cụ thể)", "thành phố (không hợp nghĩa cụ thể)"], "vi": "Việc thăm các bảo tàng giúp tôi tăng thêm hiểu biết về các nền văn hóa trong quá khứ."}, {"q": "19. ________ is having a special quality that makes something seem different from ordinary things.", "options": ["Stitches", "Similarity", "Magical", "similarity"], "answer": 2, "explanation": "“magical” nghĩa là có phẩm chất đặc biệt khiến thứ gì đó khác biệt so với những điều bình thường.", "vis": ["các mũi đan (sai nghĩa)", "sự giống nhau (danh từ, viết hoa sai đầu câu nhưng cũng sai nghĩa)", "kỳ diệu, huyền bí (đúng)", "sự giống nhau (không viết hoa, sai vị trí đầu câu và sai nghĩa)"], "vi": "Từ “magical” chỉ việc có một phẩm chất đặc biệt khiến điều gì đó có vẻ khác so với những thứ bình thường."}, {"q": "20. Last school year, my students were very keen on ________. They decorated and repaired the classroom by themselves.", "options": ["cooking", "doing origami", "doing DIY", "playing sports"], "answer": 2, "explanation": "Trang trí và sửa chữa lớp học tự tay, dùng doing DIY.", "vis": ["nấu ăn (không liên quan trang trí/sửa chữa)", "gấp giấy origami (không liên quan trang trí/sửa chữa)", "làm đồ tự chế (đúng, tự trang trí và sửa chữa)", "chơi thể thao (không liên quan trang trí/sửa chữa)"], "vi": "Năm học trước, học sinh của tôi rất say mê làm đồ tự chế (DIY). Các em đã tự trang trí và sửa chữa lớp học."}, {"q": "21. ________ is an increasingly popular method of communicating over the internet. People often send short messages using a mobile phone or computer.", "options": ["Messaging", "Volunteering", "Snowboarding", "Knitting"], "answer": 0, "explanation": "Gửi tin nhắn ngắn qua điện thoại hoặc máy tính, dùng Messaging.", "vis": ["nhắn tin (đúng, gửi tin nhắn ngắn qua điện thoại/máy tính)", "làm tình nguyện (không liên quan nhắn tin)", "trượt ván tuyết (không liên quan nhắn tin)", "đan len (không liên quan nhắn tin)"], "vi": "Nhắn tin là một phương thức giao tiếp qua internet ngày càng phổ biến. Mọi người thường gửi tin nhắn ngắn bằng điện thoại di động hoặc máy tính."}, {"q": "22. Minh ______ to play football, and so does his brother.", "options": ["likes", "enjoys", "fancies", "detest"], "answer": 0, "explanation": "“like to V” đúng ngữ pháp và hợp nghĩa, đáp án chọn là likes.", "vis": ["thích (like to V, đúng cấu trúc và chia động từ số ít)", "thích thú (enjoy không theo sau to-V, sai cấu trúc)", "mến, thích (fancy không theo sau to-V, sai cấu trúc)", "ghét (detest không theo sau to-V, và sai chia động từ)"], "vi": "Minh thích chơi bóng đá, và anh trai cậu ấy cũng vậy."}, {"q": "23. She loves going out _______ her friends.", "options": ["for", "with", "between", "in"], "answer": 1, "explanation": "“go out with sb” nghĩa là đi chơi cùng ai.", "vis": ["cho, vì (sai giới từ)", "với, cùng (đúng, go out with)", "giữa (sai giới từ)", "trong (sai giới từ)"], "vi": "Cô ấy rất thích đi chơi cùng bạn bè."}, {"q": "24. Ms. Janny loves _________ very much. There are a lot of beautiful flowers and fresh vegetables in her garden.", "options": ["doing gardening", "to doing garden", "to do garden", "do gardening"], "answer": 0, "explanation": "“do gardening” ở dạng V-ing sau “loves”: doing gardening.", "vis": ["làm vườn (V-ing, đúng - love + V-ing)", "làm vườn (sai cấu trúc, “to doing” không tồn tại)", "làm vườn (to-V, sai vì thiếu “ing” trong cụm cố định)", "làm vườn (nguyên mẫu, sai vì cần V-ing sau love)"], "vi": "Cô Janny rất thích làm vườn. Trong vườn của cô có rất nhiều hoa đẹp và rau tươi."}, {"q": "25. I'm so thirsty after a long run. I would like _________ a full glass of orange juice.", "options": ["drink", "to drink", "drank", "drinking"], "answer": 1, "explanation": "“would like to V” nghĩa là muốn làm gì.", "vis": ["uống (nguyên mẫu, sai vì thiếu “to”)", "uống (to-V, đúng - would like to V)", "đã uống (quá khứ, sai)", "uống (V-ing, sai cấu trúc với would like)"], "vi": "Tôi khát nước quá sau khi chạy một quãng dài. Tôi muốn uống một ly nước cam đầy."}, {"q": "26. My grandparents love ______ very much. There are a lot of beautiful flowers and fresh vegetables in their garden.", "options": ["doing garden", "doing gardening", "do gardening", "to do garden"], "answer": 1, "explanation": "“do gardening” ở dạng V-ing sau “love”: doing gardening.", "vis": ["làm vườn (sai cụm từ, không phải “do garden”)", "làm vườn (V-ing, đúng - love + V-ing)", "làm vườn (nguyên mẫu, sai vì cần V-ing sau love)", "làm vườn (to-V, sai cấu trúc)"], "vi": "Ông bà tôi rất thích làm vườn. Trong vườn của ông bà có rất nhiều hoa đẹp và rau tươi."}, {"q": "27. You should avoid ______ too much TV. It's not good for your eyes.", "options": ["seeing", "looking", "watching", "glancing"], "answer": 2, "explanation": "“avoid + V-ing”; “watch TV” là collocation đúng.", "vis": ["nhìn thấy (sai collocation với TV)", "nhìn (sai collocation với TV)", "xem (đúng, watch TV)", "liếc nhìn (sai collocation với TV)"], "vi": "Bạn nên tránh xem TV quá nhiều. Điều đó không tốt cho mắt của bạn."}, {"q": "28. Most people now enjoy shorter working hours and more _______.", "options": ["message friends", "paper folding", "leisure time", "muscle strength"], "answer": 2, "explanation": "“leisure time” nghĩa là thời gian rảnh rỗi, hợp nghĩa với giờ làm việc ngắn hơn.", "vis": ["nhắn tin cho bạn bè (không hợp nghĩa với giờ làm việc ngắn)", "gấp giấy (không hợp nghĩa với giờ làm việc ngắn)", "thời gian rảnh rỗi (đúng, đi kèm giờ làm việc ngắn hơn)", "sức mạnh cơ bắp (không hợp nghĩa với giờ làm việc ngắn)"], "vi": "Hầu hết mọi người hiện nay có giờ làm việc ngắn hơn và nhiều thời gian rảnh hơn."}, {"q": "29. A: How do you feel when you spend time with your mum?", "options": ["Yes, I'd love to.", "I feel very happy.", "I like it too", "I love cooking with her."], "answer": 1, "explanation": "Câu hỏi “How do you feel...?” hỏi về cảm xúc, cần trả lời bằng cảm giác cụ thể.", "vis": ["Có, tôi rất muốn. (sai, không trả lời câu hỏi cảm xúc)", "Tôi cảm thấy rất vui. (đúng, trả lời trực tiếp về cảm xúc)", "Tôi cũng thích điều đó. (sai, không trả lời câu hỏi cảm xúc)", "Tôi thích nấu ăn cùng mẹ. (sai, lạc đề, không trả lời cảm xúc)"], "vi": "A: Bạn cảm thấy thế nào khi dành thời gian với mẹ của mình?"}, {"q": "30. A: Would you like to go to the cinema with me?", "options": ["Yes, I watch films every day.", "Yes, I don't like it.", "I'd love to.", "We can go there together."], "answer": 2, "explanation": "Đáp lại lời mời “Would you like...?” bằng cách đồng ý: I'd love to.", "vis": ["Có, tôi xem phim mỗi ngày. (sai, không trả lời trực tiếp lời mời)", "Có, tôi không thích nó. (mâu thuẫn logic, sai)", "Tôi rất muốn. (đúng, chấp nhận lời mời)", "Chúng ta có thể đi cùng nhau. (sai, không phải cách đáp chuẩn cho lời mời)"], "vi": "A: Bạn có muốn đi xem phim cùng tôi không?"}]}, {"roman": "V", "navLabel": "Word Form", "title": "Cho dạng đúng của từ trong ngoặc", "icon": "spell-check", "instructions": "Điền dạng đúng của từ trong ngoặc vào chỗ trống.", "type": "fill", "questions": [{"q": "1. The most popular leisure _____________ in Britain is going for a walk.", "answer": "activity", "explanation": "Danh từ: act → activity (hoạt động).", "hint": "(act)", "vi": "Hoạt động giải trí phổ biến nhất ở Anh là đi bộ.", "family": ["act (v): hành động, đóng vai", "activity (n): hoạt động", "active (adj): năng động, hoạt bát", "actively (adv): một cách năng động"]}, {"q": "2. To play video games, these computers must be used over a Wi-Fi internet ____________.", "answer": "connection", "explanation": "Danh từ: connect → connection (sự kết nối).", "hint": "(connect)", "vi": "Để chơi trò chơi điện tử, những chiếc máy tính này phải được kết nối qua Wi-Fi.", "family": ["connect (v): kết nối", "connection (n): sự kết nối", "connected (adj): được kết nối, có liên quan", "connecting (adj): đang kết nối"]}, {"q": "3. I think badminton is an easy sport which helps to improve my muscle ______________.", "answer": "strength", "explanation": "Danh từ: strong → strength (sức mạnh).", "hint": "(strong)", "vi": "Tôi nghĩ cầu lông là một môn thể thao dễ giúp cải thiện sức mạnh cơ bắp của tôi.", "family": ["strengthen (v): củng cố, làm cho mạnh hơn", "strength (n): sức mạnh, điểm mạnh", "strong (adj): mạnh mẽ", "strongly (adv): một cách mạnh mẽ"]}, {"q": "4. It is very _______________ to watch these movies. I think you should watch them.", "answer": "entertaining", "explanation": "Tính từ: entertain + ing → entertaining (mang tính giải trí, thú vị).", "hint": "(entertain)", "vi": "Xem những bộ phim này rất thú vị. Tôi nghĩ bạn nên xem chúng.", "family": ["entertain (v): giải trí, chiêu đãi", "entertainment (n): sự giải trí, ngành giải trí", "entertaining (adj): mang tính giải trí, thú vị", "entertainer (n): người làm giải trí"]}, {"q": "5. I like doing DIY because it helps me to save money and increase my ____________ as well.", "answer": "creativity", "explanation": "Danh từ: create → creativity (sự sáng tạo, khả năng sáng tạo).", "hint": "(create)", "vi": "Tôi thích làm đồ tự chế vì nó giúp tôi tiết kiệm tiền và tăng khả năng sáng tạo của mình nữa.", "family": ["create (v): tạo ra, sáng tạo", "creation (n): sự sáng tạo, tác phẩm", "creativity (n): sự sáng tạo (khả năng)", "creative (adj): sáng tạo"]}, {"q": "6. Little John is keen on acting at school shows, and he wants to be a __________ in the future.", "answer": "comedian", "explanation": "Danh từ chỉ người: comedy → comedian (diễn viên hài).", "hint": "(comedy)", "vi": "Cậu bé John rất say mê diễn kịch ở các buổi biểu diễn của trường, và cậu ấy muốn trở thành một diễn viên hài trong tương lai.", "family": ["comedy (n): hài kịch, sự hài hước", "comedian (n): diễn viên hài, người kể chuyện cười", "comic (adj): hài hước (cũng là danh từ: truyện tranh)", "comical (adj): khôi hài, buồn cười"]}, {"q": "7. _____________ improves my overall health and balance, so I practice the sport every weekend.", "answer": "Snowboarding", "explanation": "Danh từ: snowboard → snowboarding (môn trượt ván tuyết).", "hint": "(Snowboard)", "vi": "Trượt ván tuyết giúp cải thiện sức khỏe tổng thể và sự cân bằng của tôi, vì vậy tôi tập môn thể thao này mỗi cuối tuần.", "family": ["snowboard (v): trượt ván tuyết", "snowboarding (n): môn trượt ván tuyết", "snowboarder (n): người trượt ván tuyết"]}, {"q": "8. Messaging has won ______________ among students nowadays.", "answer": "popularity", "explanation": "Danh từ: popular → popularity (sự phổ biến).", "hint": "(popular)", "vi": "Nhắn tin đã trở nên phổ biến trong giới học sinh ngày nay.", "family": ["popularize (v): phổ biến hóa", "popularity (n): sự phổ biến", "popular (adj): phổ biến", "popularly (adv): một cách phổ biến"]}, {"q": "9. Having leisure activities is one of the best ways to make you feel _________.", "answer": "comfortable", "explanation": "Tính từ: comfort → comfortable (thoải mái, dễ chịu).", "hint": "(comfort)", "vi": "Có các hoạt động giải trí là một trong những cách tốt nhất để khiến bạn cảm thấy thoải mái.", "family": ["comfort (v/n): an ủi, làm cho thoải mái; sự thoải mái", "comfortable (adj): thoải mái, dễ chịu", "comfortably (adv): một cách thoải mái", "uncomfortable (adj): không thoải mái"]}, {"q": "10. My dad was _______________ when I could repair my own bike.", "answer": "surprised", "explanation": "Tính từ đuôi -ed: surprise → surprised (ngạc nhiên, chỉ người).", "hint": "(surprise)", "vi": "Bố tôi đã rất ngạc nhiên khi tôi có thể tự sửa xe đạp của mình.", "family": ["surprise (v/n): làm ngạc nhiên; sự ngạc nhiên", "surprised (adj): ngạc nhiên (khi một người cảm thấy)", "surprising (adj): đáng ngạc nhiên (khi một điều gì đó gây ra)", "surprisingly (adv): một cách đáng ngạc nhiên"]}]}, {"roman": "VI", "navLabel": "Đọc điền từ", "title": "Reading: Choose the best answer (Cloze passages)", "icon": "file-lines", "instructions": "Đọc đoạn văn và chọn đáp án đúng để hoàn thành chỗ trống.", "type": "mcq", "instant": true, "passage": {"title": "A) Mountain climbing", "html": "There are a lot of pastimes that young people like, and one of ___(1)___ is mountain climbing. It is an activity that people can do either indoors or outdoors. If you go climbing outdoors, it is a great way to ___(2)___ your strength and enjoy nature at the same time. You can even set up your own climbing wall in your backyard or ___(3)___ your home. This way you don't have to go out and still can ___(4)___ fit and enjoy the activity. So how can you start mountain climbing? Many people take a class to learn how to climb and use their equipment ___(5)___. Others join climbing clubs to make new friends with the same interest and go climb together. If you are an active person and like outdoor activities, ___(6)___ don't you try this activity?", "vi": "Có rất nhiều thú vui mà giới trẻ yêu thích, và một trong số đó là leo núi. Đây là một hoạt động mà mọi người có thể thực hiện trong nhà hoặc ngoài trời. Nếu bạn leo núi ngoài trời, đó là một cách tuyệt vời để (2) ___ sức mạnh của bạn và tận hưởng thiên nhiên cùng lúc. Bạn thậm chí có thể tự dựng một bức tường leo núi trong sân sau hoặc (3) ___ nhà mình. Bằng cách này, bạn không cần phải ra ngoài mà vẫn có thể (4) ___ khỏe mạnh và tận hưởng hoạt động này. Vậy làm thế nào để bắt đầu leo núi? Nhiều người tham gia một lớp học để học cách leo núi và sử dụng thiết bị (5) ___. Những người khác tham gia câu lạc bộ leo núi để kết bạn mới có cùng sở thích và cùng nhau đi leo núi. Nếu bạn là người năng động và thích các hoạt động ngoài trời, (6) ___ không thử hoạt động này nhỉ?"}, "questions": [{"q": "1.", "options": ["them", "they", "theirs", "their"], "answer": 0, "explanation": "\"one of them\" = một trong số chúng, đại từ tân ngữ sau \"of\".", "vis": ["họ, chúng (tân ngữ)", "họ, chúng (chủ ngữ)", "của họ (đại từ sở hữu)", "của họ (tính từ sở hữu)"], "vi": "một trong (1) ___ là leo núi."}, {"q": "2.", "options": ["decrease", "reduce", "increase", "raise"], "answer": 2, "explanation": "\"increase your strength\" = tăng cường sức mạnh của bạn.", "vis": ["giảm bớt, giảm dần", "giảm bớt, thu nhỏ", "tăng cường, gia tăng", "nâng lên, tăng (tiền lương...)"], "vi": "leo núi là một cách tuyệt vời để (2) ___ sức mạnh của bạn."}, {"q": "3.", "options": ["indoor", "inside", "within", "among"], "answer": 1, "explanation": "\"inside your home\" = bên trong nhà bạn.", "vis": ["trong nhà (tính từ)", "bên trong (giới từ)", "trong vòng, trong phạm vi", "giữa, trong số"], "vi": "bạn có thể tự dựng bức tường leo núi trong sân sau hoặc (3) ___ nhà mình."}, {"q": "4.", "options": ["keep", "stay", "go", "give"], "answer": 1, "explanation": "\"stay fit\" = giữ dáng, giữ sức khỏe tốt.", "vis": ["giữ (nghĩa chung)", "giữ (ở trạng thái nào, stay fit)", "đi", "cho, đưa"], "vi": "bạn vẫn có thể (4) ___ khỏe mạnh và tận hưởng hoạt động này."}, {"q": "5.", "options": ["effective", "effect", "effectively", "effectivenes"], "answer": 2, "explanation": "Trạng từ bổ nghĩa cho động từ \"use\": effectively (một cách hiệu quả).", "vis": ["hiệu quả (tính từ)", "hiệu quả, tác động (danh từ)", "một cách hiệu quả (trạng từ)", "tính hiệu quả (danh từ, sai chính tả)"], "vi": "học cách leo núi và sử dụng thiết bị (5) ___."}, {"q": "6.", "options": ["what", "when", "how", "why"], "answer": 3, "explanation": "\"why don't you...?\" = sao bạn không...? (lời đề nghị).", "vis": ["cái gì", "khi nào", "như thế nào", "tại sao, sao (why don't you...?)"], "vi": "sao bạn (6) ___ không thử hoạt động này nhỉ?"}]}, {"roman": "VII", "navLabel": "Đọc điền từ 2", "title": "Reading: Choose the best answer (Cloze passage B)", "icon": "file-lines", "instructions": "Đọc đoạn văn và chọn đáp án đúng để hoàn thành chỗ trống.", "type": "mcq", "instant": true, "passage": {"title": "B) Leisure time with family", "html": "Some teenagers enjoy ___(1)___ free time with their friends. Others prefer doing leisure activities with their family members. I love spending time with my family because it is a great way to connect ___(2)___ them. At the weekend, we usually go for a bike ride. We cycle to some nearby villages to enjoy the ___(3)___. We take photos and look at them later. My big brother and I are also into cooking. My brother looks for easy recipes. After that, we prepare the ingredients and cook. Sometimes the food is good, but sometimes it is not; nevertheless, we love whatever we cook. The leisure activity I like the most is doing DIY projects with my mum. She teaches me to make my own dresses and doll clothes. On special occasions, we make special dresses together. Once I won the first prize in a costume contest at my school.", "vi": "Một số thanh thiếu niên thích dành (1) ___ thời gian rảnh với bạn bè. Những người khác lại thích làm các hoạt động giải trí cùng gia đình. Tôi thích dành thời gian với gia đình mình vì đó là cách tuyệt vời để gắn kết (2) ___ họ. Vào cuối tuần, chúng tôi thường đi đạp xe. Chúng tôi đạp xe đến vài ngôi làng gần đó để tận hưởng (3) ___. Chúng tôi chụp ảnh và xem lại sau đó. Anh trai tôi và tôi cũng rất thích nấu ăn. Anh tôi tìm những công thức đơn giản. Sau đó, chúng tôi chuẩn bị nguyên liệu và nấu ăn. Đôi khi món ăn ngon, nhưng đôi khi lại không; tuy nhiên, chúng tôi vẫn thích bất cứ món gì mình nấu. Hoạt động giải trí tôi thích nhất là làm các dự án tự chế (DIY) cùng mẹ. Mẹ dạy tôi cách tự may váy và quần áo búp bê của mình. Vào những dịp đặc biệt, chúng tôi cùng nhau may những chiếc váy đặc biệt. Có một lần tôi đã giành giải nhất trong cuộc thi trang phục ở trường mình."}, "questions": [{"q": "7.", "options": ["spending", "to spend", "spend", "spends"], "answer": 0, "explanation": "\"enjoy + V-ing\" = thích thú làm gì.", "vis": ["dành (V-ing, sau enjoy)", "dành (to-V, sai cấu trúc)", "dành (nguyên thể, sai cấu trúc)", "dành (số ít, sai chủ ngữ)"], "vi": "Một số thanh thiếu niên thích (7) ___ thời gian rảnh với bạn bè."}, {"q": "8.", "options": ["to", "with", "from", "on"], "answer": 1, "explanation": "\"connect with sb\" = kết nối, gắn kết với ai.", "vis": ["đến (giới từ, sai)", "với, cùng (connect with)", "từ (giới từ, sai)", "trên, vào (giới từ, sai)"], "vi": "Đó là cách tuyệt vời để gắn kết (8) ___ họ."}, {"q": "9.", "options": ["air pollution", "water pollution", "environmental pollution", "fresh air"], "answer": 3, "explanation": "Đạp xe đến làng quê để tận hưởng không khí trong lành → fresh air.", "vis": ["ô nhiễm không khí", "ô nhiễm nước", "ô nhiễm môi trường", "không khí trong lành"], "vi": "Chúng tôi đạp xe đến vài ngôi làng gần đó để tận hưởng (9) ___."}]}, {"roman": "VIII", "navLabel": "Đúng/Sai A", "title": "Reading: Choose True or False (A)", "icon": "book-open", "instructions": "Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.", "type": "mcq", "instant": true, "passage": {"title": "Teenagers' leisure activities", "html": "Nowadays, teenagers often have various leisure activities. Some prefer indoor activities like playing video games, surfing the internet, or doing DIYs. Others enjoy outdoor activities such as sports, cycling, or hanging out with friends. Teenagers can be called a “technology generation” because they spend much of their free time on devices like smartphones and computers. However, joining clubs or doing craft kits are also popular choices. These activities help them relax and develop new skills.", "vi": "Ngày nay, thanh thiếu niên thường có nhiều hoạt động giải trí khác nhau. Một số thích các hoạt động trong nhà như chơi trò chơi điện tử, lướt mạng, hoặc làm đồ tự chế (DIY). Những người khác lại thích các hoạt động ngoài trời như thể thao, đạp xe, hoặc đi chơi cùng bạn bè. Thanh thiếu niên có thể được gọi là “thế hệ công nghệ” vì họ dành phần lớn thời gian rảnh cho các thiết bị như điện thoại thông minh và máy tính. Tuy nhiên, việc tham gia câu lạc bộ hoặc làm bộ dụng cụ thủ công cũng là những lựa chọn phổ biến. Những hoạt động này giúp các em thư giãn và phát triển những kỹ năng mới."}, "questions": [{"q": "1. Teenagers nowadays only prefer indoor activities in their free time.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc nêu cả hoạt động trong nhà lẫn ngoài trời, không chỉ trong nhà → Sai.", "vis": ["Đúng", "Sai"], "vi": "Thanh thiếu niên ngày nay chỉ thích các hoạt động trong nhà vào thời gian rảnh."}, {"q": "2. Teenagers are called a “technology generation” because they spend a lot of time on devices.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"Teenagers can be called a 'technology generation' because they spend much of their free time on devices\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Thanh thiếu niên được gọi là 'thế hệ công nghệ' vì họ dành nhiều thời gian cho các thiết bị."}, {"q": "3. Joining clubs and doing craft kits are unpopular choices for teenagers.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"joining clubs or doing craft kits are also popular choices\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Tham gia câu lạc bộ và làm bộ dụng cụ thủ công là những lựa chọn không phổ biến đối với thanh thiếu niên."}, {"q": "4. Leisure activities only help teenagers relax but do not help them develop skills.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"These activities help them relax and develop new skills\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Các hoạt động giải trí chỉ giúp thanh thiếu niên thư giãn chứ không giúp phát triển kỹ năng."}, {"q": "5. _______ with friends are considered outdoor activities.", "options": ["Cycling and hanging out", "Joining clubs and doing craft kits", "Leisure activities", "Surfing and doing DIYs"], "answer": 0, "explanation": "Bài đọc: \"outdoor activities such as sports, cycling, or hanging out with friends\".", "vis": ["Đạp xe và đi chơi", "Tham gia câu lạc bộ và làm bộ dụng cụ thủ công", "Các hoạt động giải trí", "Lướt mạng và làm đồ tự chế"], "vi": "_______ cùng bạn bè được coi là các hoạt động ngoài trời."}, {"q": "6. Other teenagers like outdoor activities such as _________ with friends.", "options": ["sports", "cycling", "hanging out", "A, B and C are correct"], "answer": 3, "explanation": "Bài đọc liệt kê cả ba: sports, cycling, hanging out with friends.", "vis": ["thể thao", "đạp xe", "đi chơi", "Cả A, B và C đều đúng"], "vi": "Những thanh thiếu niên khác thích các hoạt động ngoài trời như _________ cùng bạn bè."}]}, {"roman": "IX", "navLabel": "Đúng/Sai B", "title": "Reading: Choose True or False (B)", "icon": "book-open", "instructions": "Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.", "type": "mcq", "instant": true, "passage": {"title": "Nam's DIY hobby", "html": "My name is Nam. In my free time, I enjoy doing DIYs with my old friends. Last week, my sister and I made a small paper house, which took us 3 hours. It doesn't cost much, but it requires a lot of patience. My mother also taught me how to knit. Now, I can knit a small scarf for myself. Besides, I love surfing the Internet to find new recipes for baking. Sometimes I bake cakes for my family on Sunday afternoons. Doing these things helps me relax and stay away from screen time.", "vi": "Tôi tên là Nam. Trong thời gian rảnh, tôi thích làm đồ tự chế (DIY) cùng những người bạn cũ. Tuần trước, chị gái tôi và tôi đã làm một ngôi nhà giấy nhỏ, mất 3 tiếng đồng hồ. Việc này không tốn nhiều tiền, nhưng đòi hỏi rất nhiều kiên nhẫn. Mẹ tôi cũng dạy tôi cách đan len. Bây giờ, tôi có thể tự đan một chiếc khăn quàng nhỏ cho mình. Bên cạnh đó, tôi thích lướt mạng Internet để tìm những công thức nướng bánh mới. Thỉnh thoảng tôi nướng bánh cho gia đình vào chiều Chủ nhật. Làm những việc này giúp tôi thư giãn và tránh xa thời gian nhìn màn hình."}, "questions": [{"q": "1. Nam and his sister made a paper house in three hours.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"my sister and I made a small paper house, which took us 3 hours\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Nam và chị gái đã làm một ngôi nhà giấy trong ba tiếng đồng hồ."}, {"q": "2. Making a paper house is very expensive.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"It doesn't cost much\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Việc làm một ngôi nhà giấy rất tốn kém."}, {"q": "3. Nam's mother showed him how to knit.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"My mother also taught me how to knit\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Mẹ của Nam đã chỉ cho cậu ấy cách đan len."}, {"q": "4. Nam can knit a large blanket.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"I can knit a small scarf\" (khăn quàng nhỏ), không phải chăn lớn → Sai.", "vis": ["Đúng", "Sai"], "vi": "Nam có thể đan một chiếc chăn lớn."}, {"q": "5. Nam enjoys _____ the Internet for new baking recipes.", "options": ["searching", "knitting", "banking", "surfing"], "answer": 3, "explanation": "Bài đọc: \"I love surfing the Internet to find new recipes for baking\".", "vis": ["tìm kiếm", "đan len", "(không phải từ đúng ngữ cảnh)", "lướt (mạng)"], "vi": "Nam thích _____ mạng Internet để tìm công thức nướng bánh mới."}, {"q": "6. Doing DIYs and baking makes Nam feel ____________.", "options": ["enjoyable", "pleased", "tired", "happy"], "answer": 0, "explanation": "Theo đáp án gốc của tài liệu: enjoyable (thú vị, đáng tận hưởng).", "vis": ["thú vị, đáng tận hưởng", "hài lòng", "mệt mỏi", "hạnh phúc"], "vi": "Làm đồ tự chế và nướng bánh khiến Nam cảm thấy ____________."}]}, {"roman": "X", "navLabel": "Viết lại câu", "title": "Sentence Transformation", "icon": "pen-to-square", "instructions": "Viết lại câu, giữ nguyên nghĩa với câu gốc.", "type": "sentence", "instant": true, "questions": [{"q": "1.", "original": "It took us 30 minutes to rehearse the song. It took Tom one hour to travel to his hometown last week.", "starter": "Tom spent", "answer": "one hour travelling to his hometown last week", "explanation": "It took sb + time + to V = S + spent + time + V-ing.", "vi": "Việc đi về quê của Tom mất một tiếng đồng hồ vào tuần trước.", "note": "It took Tom + time + to travel... → Tom spent + time + travelling...<br>Nghĩa đáp án: Tom đã dành một tiếng đồng hồ để đi về quê vào tuần trước."}, {"q": "2.", "original": "It is really interesting for him to talk with his music teacher about jazz.", "starter": "He fancies", "answer": "talking with his music teacher about jazz", "explanation": "It is interesting for sb to V = sb fancies + V-ing.", "vi": "Việc trò chuyện với giáo viên âm nhạc về nhạc jazz thực sự rất thú vị đối với cậu ấy.", "note": "It is interesting for sb to V → sb + fancies + V-ing<br>Nghĩa đáp án: Cậu ấy rất thích trò chuyện với giáo viên âm nhạc của mình về nhạc jazz."}, {"q": "3.", "original": "Watching historical films is very interesting to my younger brother.", "starter": "My younger brother enjoys", "answer": "watching historical films", "explanation": "be interesting to sb = sb + enjoys + V-ing.", "vi": "Xem phim lịch sử rất thú vị đối với em trai tôi.", "note": "V-ing... + be interesting to sb → sb + enjoys + V-ing<br>Nghĩa đáp án: Em trai tôi rất thích xem phim lịch sử."}, {"q": "4.", "original": "We usually visit museums when we have leisure time.", "starter": "We enjoy", "answer": "visiting museums when we have leisure time", "explanation": "usually V = enjoy + V-ing.", "vi": "Chúng tôi thường đi thăm bảo tàng khi có thời gian rảnh.", "note": "S + usually + V → S + enjoy + V-ing<br>Nghĩa đáp án: Chúng tôi thích thăm bảo tàng khi có thời gian rảnh."}, {"q": "5.", "original": "He likes swimming and sunbathing.", "starter": "He is interested", "answer": "in swimming and sunbathing", "explanation": "like + V-ing = be interested in + V-ing.", "vi": "Anh ấy thích bơi lội và tắm nắng.", "note": "S + like + V-ing → S + be interested in + V-ing<br>Nghĩa đáp án: Anh ấy rất thích thú với việc bơi lội và tắm nắng."}, {"q": "6.", "original": "It is not a problem to me whether I have to pick her up to the cinema or not.", "starter": "I don't mind", "answer": "picking her up to the cinema or not", "explanation": "It is not a problem to sb whether... = sb don't mind + V-ing.", "vi": "Việc tôi có phải đón cô ấy đi xem phim hay không cũng không phải vấn đề gì với tôi.", "note": "It is not a problem to sb whether S + V or not → S + don't mind + V-ing<br>Nghĩa đáp án: Tôi không phiền việc đón cô ấy đi xem phim hay không."}, {"q": "7.", "original": "Ngoc dislikes doing any sports or exercises, so her health is not good enough to study.", "starter": "Ngoc doesn't like", "answer": "doing any sports or exercises, so her health is not good enough to study", "explanation": "dislike + V-ing = don't like + V-ing (đồng nghĩa).", "vi": "Ngọc không thích chơi thể thao hay tập thể dục gì cả, vì vậy sức khỏe của bạn ấy không đủ tốt để học tập.", "note": "S + dislike(s) + V-ing → S + don't/doesn't like + V-ing<br>Nghĩa đáp án: Ngọc không thích chơi thể thao hay tập thể dục gì cả, vì vậy sức khỏe của bạn ấy không đủ tốt để học tập."}, {"q": "8.", "original": "She cannot bear talking with him about what he likes.", "starter": "She hates", "answer": "talking with him about what he likes", "explanation": "cannot bear + V-ing = hate + V-ing (đồng nghĩa).", "vi": "Cô ấy không thể chịu đựng được việc nói chuyện với anh ta về những gì anh ta thích.", "note": "S + can't bear + V-ing → S + hate(s) + V-ing<br>Nghĩa đáp án: Cô ấy rất ghét việc nói chuyện với anh ta về những gì anh ta thích."}, {"q": "9.", "original": "Jane likes skateboarding although this has hurt her leg and arm some times.", "starter": "Jane fancies", "answer": "skateboarding although this has hurt her leg and arm some times", "explanation": "like + V-ing = fancy + V-ing (đồng nghĩa).", "vi": "Jane thích trượt ván mặc dù việc này đã làm cô ấy bị đau chân và tay vài lần.", "note": "S + like(s) + V-ing → S + fancies + V-ing<br>Nghĩa đáp án: Jane thích trượt ván mặc dù việc này đã làm cô ấy bị đau chân và tay vài lần."}, {"q": "10.", "original": "The thing that I hate most is motor racing, and I will never do it in my life.", "starter": "I detest", "answer": "motor racing, and I will never do it in my life", "explanation": "hate most = detest (đồng nghĩa, ghét cay ghét đắng).", "vi": "Điều tôi ghét nhất là đua xe, và tôi sẽ không bao giờ làm việc đó trong đời.", "note": "The thing that I hate most is + N → I + detest + N<br>Nghĩa đáp án: Tôi ghét cay ghét đắng việc đua xe, và tôi sẽ không bao giờ làm việc đó trong đời."}, {"q": "11.", "original": "He uses all his free time to look after his garden.", "starter": "He spends", "answer": "all his free time looking after his garden", "explanation": "use time to V = spend time V-ing.", "vi": "Anh ấy dùng hết thời gian rảnh của mình để chăm sóc khu vườn.", "note": "S + use(s) + time + to V → S + spend(s) + 00 hover:bg-orange-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button></td><td class="p-2 text-slate-500 italic">(n)</td><td class="p-2 text-slate-500">/ˈmʌsl/</td><td class="p-2 text-slate-700">cơ bắp</td></tr><tr class="border-b border-slate-100 hover:bg-orange-50/50"><td class="p-2 text-slate-400 font-bold">38</td><td class="p-2 font-bold text-slate-800">muscle strength <button type="button" data-w="muscle strength" onclick="speak(this.dataset.w,this)" class="speak-btn inline-flex w-5 h-5 rounded-full bg-orange-100 text-orange-700 hover:bg-orange-200 hover:scale-110 transition items-center justify-center align-middle ml-1" title="Nghe phát âm"><i class="fa-solid fa-volume-high text-[9px]"></i></button></td><td class="p-2 text-slate-500 italic">(n)</td><td class="p-2 text-slate-500">/ˈmʌsl streŋθ/</td><td class="p-2 text-slate-700">sức mạnh cơ bắp</td></tr></tbody></table></div></div><div class="task-card bg-white rounded-2xl shadow-md p-4 md:p-6 mt-4"><h3 class="text-lg font-extrabold text-orange-800 mb-3 flex items-center gap-2"><i class="fa-solid fa-diagram-project text-amber-500"></i>II) WORD FORMATION</h3><div class="grid sm:grid-cols-2 gap-3"><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">activate (v): kích hoạt</div><div>- activation (n): sự kích hoạt</div><div>- active (adj): năng động, hoạt bát</div><div>- actively (adv): một cách năng động</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">connect (v): kết nối</div><div>- connection (n): sự kết nối</div><div>- connected (adj): được kết nối, có liên quan</div><div>- connecting (adj): đang kết nối (VD: chuyến bay nối chuyến)</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">strengthen (v): củng cố, làm cho mạnh hơn</div><div>- strength (n): sức mạnh, điểm mạnh</div><div>- strong (adj): mạnh mẽ</div><div>- strongly (adv): một cách mạnh mẽ</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">entertain (v): giải trí, chiêu đãi</div><div>- entertainment (n): sự giải trí, ngành giải trí</div><div>- entertaining (adj): mang tính giải trí, thú vị</div><div>- entertainer (n): người làm giải trí</div><div>- entertainingly (adv): một cách giải trí, thú vị</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">create (v): tạo ra, sáng tạo</div><div>- creation (n): sự sáng tạo, tác phẩm</div><div>- creativity (n): sự sáng tạo (khả năng)</div><div>- creative (adj): sáng tạo</div><div>- creatively (adv): một cách sáng tạo</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">comedy (n): hài kịch, sự hài hước</div><div>- comedian (n): diễn viên hài, người kể chuyện cười</div><div>- comic (adj): hài hước (cũng là danh từ: truyện tranh)</div><div>- comical (adj): khôi hài, buồn cười</div><div>- comically (adv): một cách khôi hài</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">snowboard (v): trượt ván tuyết</div><div>- snowboarding (n): môn trượt ván tuyết</div><div>- snowboarder (n): người trượt ván tuyết</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">popularize (v): phổ biến hóa</div><div>- popularity (n): sự phổ biến</div><div>- popular (adj): phổ biến</div><div>- popularly (adv): một cách phổ biến</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">comfort (v): an ủi, làm cho thoải mái</div><div>- comfort (n): sự thoải mái</div><div>- comfortable (adj): thoải mái, dễ chịu</div><div>- comfortably (adv): một cách thoải mái</div><div>- uncomfortable (adj): không thoải mái</div><div>- uncomfortably (adv): một cách không thoải mái</div></div><div class="wordfam-box !text-sm"><div class="font-black text-orange-900 mb-1">surprise (v): làm ngạc nhiên</div><div>- surprise (n): sự ngạc nhiên</div><div>- surprised (adj): ngạc nhiên (khi một người cảm thấy)</div><div>- surprising (adj): đáng ngạc nhiên (khi một điều gì đó gây ra)</div><div>- surprisingly (adv): một cách đáng ngạc nhiên</div></div></div></div><div class="task-card bg-white rounded-2xl shadow-md p-4 md:p-6 mt-4"><h3 class="text-lg font-extrabold text-orange-800 mb-3 flex items-center gap-2"><i class="fa-solid fa-graduation-cap text-amber-500"></i>III) GRAMMAR</h3><h4 class="font-bold text-slate-800 mb-2">1. Verbs of liking/disliking</h4><p class="text-sm text-slate-600 mb-2">Các động từ chỉ sự yêu ghét trong tiếng Anh thường bao gồm:</p><div class="grid grid-cols-3 sm:grid-cols-5 gap-2 mb-3"><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">adore</span><br><span class="text-xs text-slate-500">rất thích, mê</span></div><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">fancy</span><br><span class="text-xs text-slate-500">mến, thích</span></div><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">enjoy</span><br><span class="text-xs text-slate-500">thưởng thức</span></div><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">prefer</span><br><span class="text-xs text-slate-500">thích hơn</span></div><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">love</span><br><span class="text-xs text-slate-500">yêu</span></div><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">dislike</span><br><span class="text-xs text-slate-500">không thích</span></div><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">like</span><br><span class="text-xs text-slate-500">thích</span></div><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">hate</span><br><span class="text-xs text-slate-500">ghét</span></div><div class="bg-orange-50 rounded-lg px-2 py-1.5 text-center"><span class="font-bold text-orange-900 text-sm">detest</span><br><span class="text-xs text-slate-500">căm ghét</span></div></div><p class="text-sm text-slate-700 mb-2">Khi có một động từ khác theo sau động từ chỉ sự yêu ghét, động từ đó phải ở dạng <b>danh động từ (V-ing)</b> hoặc <b>động từ nguyên mẫu có to (to-V)</b>.</p><ul class="text-sm text-slate-700 space-y-1.5 list-disc pl-5 mb-2"><li>Chỉ theo sau bởi <b>danh động từ</b>: <b>adore, enjoy, fancy, dislike, detest</b>.<br><i class="text-slate-500">Thomas adores snowboarding. / Linda detests doing puzzles.</i></li><li>Theo sau bởi cả <b>danh động từ</b> và <b>to-V</b>: <b>like, love, hate, prefer</b>.<br><i class="text-slate-500">We love going/to go to the cinema. / He hates getting up/to get up early.</i></li></ul><h4 class="font-bold text-slate-800 mb-2 mt-4">2. Gerunds and infinitives (Further details)</h4><div class="overflow-x-auto"><table class="w-full text-sm border-collapse mb-3"><thead><tr class="bg-amber-50 text-amber-900 text-left"><th class="p-2 rounded-l-lg w-1/2">Danh động từ (V-ing)</th><th class="p-2 rounded-r-lg w-1/2">Động từ nguyên mẫu có to (to-V)</th></tr></thead><tbody><tr class="border-b border-slate-100 align-top"><td class="p-2 text-slate-700">Đứng sau một số động từ để làm tân ngữ:<br><span class="text-slate-500">admit, appreciate, avoid, consider, delay, deny, finish, imagine, keep, mind, mention, miss, postpone, practice, risk, suggest,...</span></td><td class="p-2 text-slate-700">Đứng sau một số động từ để làm tân ngữ:<br><span class="text-slate-500">afford, agree, appear, ask, decide, demand, encourage, expect, fail, force, hesitate, intend, invite, hope, learn, manage, order, persuade, plan, refuse, pretend, promise, remind, seem, tell, tend, threaten, urge, want, wish,...</span></td></tr><tr class="border-b border-slate-100 align-top"><td class="p-2 text-slate-700">Đứng đầu câu làm chủ ngữ.</td><td class="p-2 text-slate-700">Đứng đầu câu làm chủ ngữ.</td></tr><tr class="border-b border-slate-100 align-top"><td class="p-2 text-slate-700">Đứng sau động từ <b>be</b> để làm bổ ngữ.</td><td class="p-2 text-slate-700">Đứng sau động từ <b>be</b> để làm bổ ngữ.</td></tr><tr class="border-b border-slate-100 align-top"><td class="p-2 text-slate-700">Đứng sau một số cụm động từ đặc biệt:<br><span class="text-slate-500">be busy, be used to, can't help, can't bear/can't stand, get used to, look forward to, what/how about...?, go V-ing</span></td><td class="p-2 text-slate-700">Đứng sau tân ngữ của động từ khác để làm bổ ngữ.</td></tr><tr class="border-b border-slate-100 align-top"><td class="p-2 text-slate-700">Đứng sau tính từ làm tân ngữ.</td><td class="p-2 text-slate-700"></td></tr><tr class="border-b border-slate-100 align-top"><td class="p-2 text-slate-700">Đứng sau các giới từ hoặc liên từ:<br><span class="text-slate-500">at, about, in, on, from, to, after, before, when,...</span></td><td class="p-2 text-slate-700"></td></tr><tr class="border-b border-slate-100 align-top"><td class="p-2 text-slate-700">Đứng sau các từ để hỏi:<br><span class="text-slate-500">what, where, when, which, who, how,...</span></td><td class="p-2 text-slate-700"></td></tr><tr class="border-b border-slate-100 align-top"><td class="p-2 text-slate-700">Một số cấu trúc đặc biệt dùng danh động từ:<br><b>S + spend/waste + time/money + V-ing</b><br><b>It's no use/no good/no point in/worth + V-ing</b></td><td class="p-2 text-slate-700"></td></tr></tbody></table></div><h4 class="font-bold text-slate-800 mb-2 mt-3">Các động từ theo sau bởi cả V-ing và to-V nhưng khác nghĩa</h4><ul class="text-sm text-slate-700 space-y-2 list-disc pl-5"><li><b>remember (nhớ), forget (quên), regret (nuối tiếc)</b>: dùng <b>V-ing</b> khi việc đã xảy ra rồi; dùng <b>to-V</b> khi việc chưa xảy ra.<br><i class="text-slate-500">I remember meeting you some times before.</i> <span class="text-slate-400">(Tôi nhớ đã gặp bạn vài lần trước đây rồi.)</span><br><i class="text-slate-500">Remember to do your homework!</i> <span class="text-slate-400">(Nhớ làm bài tập về nhà nhé!)</span></li><li><b>stop</b>: dùng <b>V-ing</b> nghĩa là dừng làm việc gì đó; dùng <b>to-V</b> nghĩa là dừng lại để làm việc khác.<br><i class="text-slate-500">We stopped talking when the teacher came in.</i> <span class="text-slate-400">(Chúng tôi ngừng nói chuyện khi giáo viên bước vào.)</span><br><i class="text-slate-500">I stopped to talk with him.</i> <span class="text-slate-400">(Tôi dừng lại để nói chuyện với anh ấy.)</span></li><li><b>try</b>: dùng <b>V-ing</b> nghĩa là thử làm gì đó; dùng <b>to-V</b> nghĩa là cố gắng.<br><i class="text-slate-500">He tried pressing Esc key, but the computer didn't respond.</i> <span class="text-slate-400">(Anh ấy thử nhấn phím Esc, nhưng máy tính không phản hồi.)</span><br><i class="text-slate-500">He tried to finish the test on time, but he failed.</i> <span class="text-slate-400">(Anh ấy cố gắng hoàn thành bài kiểm tra đúng giờ, nhưng đã không thành công.)</span></li></ul></div>`;

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[‘’]/g,"'")
    .replace(/["“”]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page space-y-4">${inner}</section>`;
}

function renderTheory(){
  return `<section id="tab-theory" class="section-page active space-y-4">
    <h2 class="text-xl md:text-2xl font-extrabold text-orange-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-book-open text-amber-400"></i> Lý thuyết: Unit 1 - Leisure Time</h2>
    <p class="text-sm text-slate-500 mb-3 italic">Từ vựng, cấu tạo từ (word formation) và ngữ pháp trọng tâm của bài. Hãy ôn lại trước khi làm các phần luyện tập bên dưới.</p>
    ${THEORY_HTML}
  </section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = renderTheory() + DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(idx==='theory' ? 'navbtn_theory' : `navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#7c2d12','#ea580c','#f59e0b','#fbbf24','#0891b2','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
