<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questions &amp; Articles – Tiếng Anh 8 · Unit 3</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap');

  :root {
    --mint: #34d399;
    --sky: #38bdf8;
    --violet: #a78bfa;
    --rose: #fb7185;
    --amber: #fbbf24;
    --bg: #faf5ff;
  }

  * { box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); }

  .hero-gradient {
    background: linear-gradient(135deg, #6366f1 0%, #d946ef 50%, #f59e0b 100%);
  }
  .tab-btn { transition: all .2s ease; }
  .tab-btn.active {
    background: linear-gradient(135deg, #7c3aed, #d946ef);
    color: white;
    box-shadow: 0 4px 14px rgba(168,85,247,.35);
    transform: translateY(-1px);
  }
  .task-card { transition: box-shadow .2s, transform .2s; }
  .task-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.10); }

  .option-label { cursor: pointer; transition: all .18s; border: 2px solid #e2e8f0; }
  .option-label:hover { border-color: #d946ef; background: #fdf4ff; }
  .option-label.selected { border-color: #7c3aed; background: #f5f3ff; }
  .option-label.correct-opt { border-color: #22c55e !important; background: #f0fdf4 !important; }
  .option-label.wrong-opt { border-color: #ef4444 !important; background: #fef2f2 !important; }

  .explanation-box { display: none; animation: fadeSlide .3s ease forwards; }
  .explanation-box.show { display: block; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  input.answer-input, select.answer-input { border: 2px solid #cbd5e1; transition: border .18s; outline: none; background:#fff; }
  input.answer-input:focus, select.answer-input:focus { border-color: #d946ef; }
  input.correct-input, select.correct-input { border-color: #22c55e !important; background: #f0fdf4; }
  input.wrong-input, select.wrong-input { border-color: #ef4444 !important; background: #fef2f2; }

  .score-badge { animation: popIn .35s cubic-bezier(.36,1.6,.6,1) forwards; }
  @keyframes popIn {
    from { transform: scale(.4); opacity: 0; }
    to   { transform: scale(1);  opacity: 1; }
  }

  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .theory-card { border-left: 4px solid transparent; transition: all .2s; }
  .theory-card:hover { transform: translateX(4px); }

  .progress-bar-fill { transition: width .6s ease; }

  /* two-option / pick pills */
  .pick-pill { cursor: pointer; transition: all .15s; border: 2px solid #cbd5e1; }
  .pick-pill:hover { border-color: #d946ef; background: #fdf4ff; }
  .pick-pill.picked { border-color: #7c3aed; background: #f5f3ff; color: #6d28d9; }
  .pick-pill.correct-opt { border-color: #22c55e !important; background: #dcfce7 !important; color: #15803d; }
  .pick-pill.wrong-opt { border-color: #ef4444 !important; background: #fee2e2 !important; color: #b91c1c; }

  /* True/False */
  .tf-btn { transition: all .18s; }
  .tf-btn:hover { transform: scale(1.04); }
  .tf-btn.tf-selected-T { background: #16a34a; color: white; }
  .tf-btn.tf-selected-F { background: #f43f5e; color: white; }
  .tf-btn.tf-correct { background: #22c55e !important; color: white !important; }
  .tf-btn.tf-wrong   { background: #ef4444 !important; color: white !important; }

  /* vocab flip cards */
  .vcard .vexample { display:none; }
  .vcard.open .vexample { display:block; animation: fadeSlide .25s ease forwards; }
  .speak-btn.speaking { animation: pulseSpeak .7s ease-in-out infinite; }
  @keyframes pulseSpeak { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }

  .section-page { display: none; }
  .section-page.active { display: block; }

  #completionBanner { display: none; }
  #completionBanner.show { display: flex; }

  .gloss { border-bottom: 2px dotted #7c3aed; cursor: help; color: #6d28d9; font-weight: 700; position: relative; }
  .gloss:hover::after {
    content: attr(data-vi);
    position: absolute; left: 0; top: 130%;
    background: #1e293b; color: #fff; font-size: 12px; font-weight: 600;
    padding: 4px 8px; border-radius: 8px; white-space: nowrap; z-index: 30;
  }
  .vi-hidden { display: none; }
</style>
</head>
<body class="min-h-screen">

<!-- ===== CONFETTI ===== -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ===== HERO ===== -->
<header class="hero-gradient text-white py-8 px-4 text-center shadow-xl relative overflow-hidden">
  <div class="absolute inset-0 opacity-10 pointer-events-none">
    <div class="absolute top-4 left-8 text-6xl">🏔️</div>
    <div class="absolute top-2 right-12 text-5xl">👘</div>
    <div class="absolute bottom-2 left-1/3 text-4xl">🥁</div>
    <div class="absolute bottom-4 right-1/4 text-5xl">✨</div>
  </div>
  <p class="text-sm font-bold uppercase tracking-widest opacity-80 mb-1">Tiếng Anh 8 · Unit 3</p>
  <h1 class="font-['Baloo_2'] text-3xl md:text-5xl font-extrabold drop-shadow-lg">
    🌟 Peoples of Vietnam 🌟
  </h1>
  <p class="mt-2 text-base md:text-lg opacity-90 font-semibold">Câu hỏi (Questions) &amp; Mạo từ (Articles) · Luyện tập tương tác</p>

  <!-- Progress overview -->
  <div class="mt-5 max-w-2xl mx-auto">
    <div class="flex justify-between text-xs font-bold opacity-80 mb-1">
      <span>Tiến độ hoàn thành</span>
      <span id="progressText">0 / 14 bài</span>
    </div>
    <div class="bg-white/20 rounded-full h-3 overflow-hidden">
      <div id="progressBar" class="bg-white rounded-full h-3 progress-bar-fill" style="width:0%"></div>
    </div>
  </div>
</header>


</body>
</html>
