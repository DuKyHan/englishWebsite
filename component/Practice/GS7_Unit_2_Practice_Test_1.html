<script>
const DATA = {"unit":2,"test":1,"sections":[{"roman":"I","navLabel":"Ngữ âm & Từ vựng","title":"Phát âm – Trọng âm – Từ vựng – Ngữ pháp","icon":"ear-listen","instructions":"Chọn đáp án (A, B, C hoặc D) đúng nhất.","type":"mcq","questions":[{"q":"1. Which word has the underlined part pronounced differently from that of the others?","options":["r<u>ou</u>gh","alth<u>ou</u>gh","c<u>ou</u>gh","en<u>ou</u>gh"],"answer":1,"explanation":"\"although\" có \"ough\" phát âm là /əʊ/ (\"gh\" câm), ba từ còn lại có \"ough\" kết thúc bằng âm /f/.","ipas":["/rʌf/","/ɔːlˈðəʊ/","/kɒf/","/ɪˈnʌf/"],"vis":["thô ráp, xù xì","mặc dù","ho","đủ"]},{"q":"2. Which word has the underlined part pronounced differently from that of the others?","options":["sp<u>o</u>t","c<u>o</u>ld","p<u>o</u>st","<u>o</u>pen"],"answer":0,"explanation":"\"spot\" có \"o\" phát âm là /ɒ/, ba từ còn lại phát âm là /əʊ/.","ipas":["/spɒt/","/kəʊld/","/pəʊst/","/ˈəʊpən/"],"vis":["đốm, chỗ","lạnh","gửi (thư/bài); bưu điện","mở"]},{"q":"3. Which word has a different stress pattern from that of the others?","options":["harmful","tidy","healthy","alive"],"answer":3,"explanation":"\"alive\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˈhɑːmfl/","/ˈtaɪdi/","/ˈhelθi/","/əˈlaɪv/"],"vis":["có hại","gọn gàng","khỏe mạnh","còn sống"]},{"q":"4. Which word has a different stress pattern from that of the others?","options":["computer","companion","exercise","collection"],"answer":2,"explanation":"\"exercise\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.","ipas":["/kəmˈpjuːtə(r)/","/kəmˈpænjən/","/ˈeksəsaɪz/","/kəˈlekʃn/"],"vis":["máy tính","người bạn đồng hành","bài tập; tập thể dục","bộ sưu tập; sự thu gom"]},{"q":"5. Tom: \"We should try to keep everything around us clean.\"\nMary: \"Yes, and then flu will find it ___ to spread.\"","options":["difficulties","difficultly","difficult","difficulty"],"answer":2,"explanation":"Cấu trúc \"find it + tính từ + to V\" → difficult.","vi":"Tom: 'Chúng ta nên cố gắng giữ mọi thứ xung quanh sạch sẽ.' – Mary: 'Đúng vậy, và như thế cúm sẽ khó lây lan hơn.'"},{"q":"6. Nam: \"Why do you often play football after school?\"\nLong: \"Because doing outdoor activities regularly helps us keep ___.\"","options":["fitting","fitted","to fit","fit"],"answer":3,"explanation":"Cấu trúc \"keep + tính từ\" (giữ ở trạng thái nào) → keep fit (giữ dáng, khỏe mạnh).","vi":"Nam: 'Sao bạn hay chơi bóng đá sau giờ học vậy?' – Long: 'Vì thường xuyên tham gia hoạt động ngoài trời giúp chúng ta giữ được sức khỏe tốt.'"},{"q":"7. Lucy: \"Look at your red arms! You got a bad sunburn.\"\nJane: \"Oh, I forgot to wear a hat and put on suncream to avoid ___.\"","options":["activity","fitness","skin","sunburn"],"answer":3,"explanation":"\"avoid sunburn\" = tránh bị cháy nắng, phù hợp với \"bad sunburn\" ở câu trước.","vis":["hoạt động","thể lực, sự khỏe mạnh","da","cháy nắng"],"vi":"Lucy: 'Nhìn cánh tay đỏ của bạn kìa! Bạn bị cháy nắng nặng rồi.' – Jane: 'Ôi, mình quên đội mũ và bôi kem chống nắng để tránh bị cháy nắng.'"},{"q":"8. Doctor: \"Activities like running and cycling are very good ___ your health.\"\nPatient: \"Thank you, doctor. I will try to do them every day.\"","options":["with","to","for","in"],"answer":2,"explanation":"Cấu trúc \"good for sth\" = tốt cho cái gì.","vis":["với","đến","cho (good for: tốt cho)","trong"],"vi":"Bác sĩ: 'Các hoạt động như chạy bộ và đạp xe rất tốt cho sức khỏe của bạn.' – Bệnh nhân: 'Cảm ơn bác sĩ. Tôi sẽ cố gắng thực hiện chúng mỗi ngày.'"},{"q":"9. Anna: \"Do you have ___ eyes? Why don't you use eyedrops?\"\nBill: \"Yes, they are red and painful after long hours on the computer.\"","options":["hurt","ache","pain","sore"],"answer":3,"explanation":"\"sore eyes\" = mắt đau rát, đỏ (tính từ đứng trước danh từ), phù hợp với \"red and painful\".","vis":["đau, bị thương (thường không đứng trước danh từ)","đau nhức (danh từ/động từ)","cơn đau (danh từ)","đau, rát (tính từ, đứng trước danh từ)"],"vi":"Anna: 'Mắt bạn có bị đau không? Sao bạn không dùng thuốc nhỏ mắt?' – Bill: 'Ừ, mắt mình đỏ và đau sau nhiều giờ ngồi máy tính.'"},{"q":"10. Mom: \"It's necessary for you ___ the amount of sugar you have in tea and coffee.\"\nSon: \"Okay, Mom. I'll put less sugar from now on.\"","options":["reduce","to reduce","reducing","to reducing"],"answer":1,"explanation":"Cấu trúc \"It's necessary for sb to V\" → to reduce.","vi":"Mẹ: 'Con cần phải giảm lượng đường trong trà và cà phê con uống.' – Con: 'Vâng ạ, mẹ. Từ giờ con sẽ cho ít đường hơn.'"},{"q":"11. Phong: \"Rob eats a lot of fast food and he ___ on a lot of weight.\"\nMinh: \"Really? He needs to go on a diet right away.\"","options":["puts","takes","brings","spends"],"answer":0,"explanation":"Cụm động từ \"put on weight\" = tăng cân.","vis":["đặt, để lên (put on weight: tăng cân)","lấy, cầm","mang đến, mang lại","tiêu, dùng (thời gian/tiền)"],"vi":"Phong: 'Rob ăn rất nhiều đồ ăn nhanh và cậu ấy đang tăng cân nhiều.' – Minh: 'Thật á? Cậu ấy cần ăn kiêng ngay đi.'"},{"q":"12. Lauren: \"What was Irene's health workshop and party like?\"\nAnton: \"___\"","options":["That's nice. I like the food best.","I didn't go to it.","She was very lovely.","She likes big party."],"answer":1,"explanation":"Anton không đến đó nên không thể miêu tả → \"I didn't go to it.\".","vis":["Tuyệt lắm. Mình thích đồ ăn nhất.","Mình đã không đến đó.","Cô ấy rất dễ thương.","Cô ấy thích tiệc lớn."],"vi":"Lauren: 'Buổi hội thảo sức khỏe và bữa tiệc của Irene thế nào?' – Anton: 'Tuyệt lắm. Mình thích đồ ăn nhất.'"},{"q":"13. Emma: \"I have started drinking more water instead of soda to stay in shape!\"\nMai: \"___ Keep up the good work!\"","options":["Wow, that's great!","I don't think so.","No problem.","What a pity!"],"answer":0,"explanation":"\"Keep up the good work!\" là lời khen ngợi tiếp nối → cần một câu khen ngợi tích cực trước đó.","vis":["Ồ, tuyệt quá!","Mình không nghĩ vậy.","Không có gì.","Thật đáng tiếc!"],"vi":"Emma: 'Mình đã bắt đầu uống nhiều nước hơn thay vì nước ngọt để giữ dáng!' – Mai: 'Ồ, tuyệt quá! Cố gắng phát huy nhé!'"},{"q":"14. David: \"Do you know why Nick is so tired today?\"\nAlex: \"___ He should sleep more.\"","options":["He wants to have a healthy lifestyle.","He usually eats fresh fruits and vegetables.","Because he watches TV too much and stays up late.","He always does exercise in the morning."],"answer":2,"explanation":"Câu trả lời cần giải thích lý do mệt mỏi, phù hợp với lời khuyên \"nên ngủ nhiều hơn\" → thức khuya xem TV nhiều.","vis":["Cậu ấy muốn có một lối sống lành mạnh.","Cậu ấy thường ăn trái cây và rau củ tươi.","Vì cậu ấy xem TV quá nhiều và thức khuya.","Cậu ấy luôn tập thể dục vào buổi sáng."],"vi":"David: 'Bạn có biết tại sao hôm nay Nick mệt mỏi vậy không?' – Alex: 'Vì cậu ấy xem TV quá nhiều và thức khuya. Cậu ấy nên ngủ nhiều hơn.'"}],"instant":true},{"roman":"II","navLabel":"Biển báo","title":"Biển báo / Thông báo","icon":"traffic-light","instructions":"Đọc biển báo/thông báo và chọn ý đúng nhất.","type":"mcq","questions":[{"q":"15. What does this notice from a mother mean?","options":["You should take good care of your health.","You do not need to rest when you are tired.","You only need to drink water when you do exercise.","You can skip meals if you are too busy."],"answer":0,"explanation":"A. You should take good care of your health. — Con nên chăm sóc sức khỏe thật tốt ✓<br>B. You do not need to rest when you are tired. — Con không cần nghỉ ngơi khi mệt (sai, ngược lại với lời khuyên nên nghỉ ngơi khi mệt)<br>C. You only need to drink water when you do exercise. — Con chỉ cần uống nước khi tập thể dục (sai, thông báo không giới hạn việc uống nước chỉ khi tập thể dục)<br>D. You can skip meals if you are too busy. — Con có thể bỏ bữa nếu quá bận (sai, ngược với lời khuyên không nên bỏ bữa)","vis":["Con nên chăm sóc sức khỏe thật tốt.","Con không cần nghỉ ngơi khi mệt.","Con chỉ cần uống nước khi tập thể dục.","Con có thể bỏ bữa nếu quá bận."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-rose-50 border-2 border-rose-200 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <rect x=\"15\" y=\"10\" width=\"70\" height=\"80\" rx=\"6\" fill=\"#fff\" stroke=\"#fb7185\" stroke-width=\"4\"/>\n    <path d=\"M50 66 C32 52,26 32,42 27 C48 25,50 31,50 31 C50 31,52 25,58 27 C74 32,68 52,50 66 Z\" fill=\"#fb7185\"/>\n    <line x1=\"28\" y1=\"78\" x2=\"72\" y2=\"78\" stroke=\"#fda4af\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-rose-700 leading-tight mt-1\">TAKE CARE OF YOUR HEALTH!</p>\n</div>"},{"q":"16. What does this sign in the school cafeteria say?","options":["You must wear a face mask in this area.","You can take off your face mask during lunchtime.","Only teachers need to wear face masks.","Face masks are optional if you feel healthy."],"answer":0,"explanation":"A. You must wear a face mask in this area. — Bạn phải đeo khẩu trang trong khu vực này ✓<br>B. You can take off your face mask during lunchtime. — Bạn có thể bỏ khẩu trang trong giờ ăn trưa (sai, ngược với yêu cầu bắt buộc đeo khẩu trang)<br>C. Only teachers need to wear face masks. — Chỉ giáo viên mới cần đeo khẩu trang (sai, biển áp dụng cho tất cả mọi người, không riêng giáo viên)<br>D. Face masks are optional if you feel healthy. — Khẩu trang là tùy chọn nếu bạn cảm thấy khỏe mạnh (sai, đeo khẩu trang là bắt buộc chứ không phải tùy chọn)","vis":["Bạn phải đeo khẩu trang trong khu vực này.","Bạn có thể bỏ khẩu trang trong giờ ăn trưa.","Chỉ giáo viên mới cần đeo khẩu trang.","Khẩu trang là tùy chọn nếu bạn cảm thấy khỏe mạnh."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-white border-2 border-slate-200 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"#0284c7\"/>\n    <circle cx=\"50\" cy=\"38\" r=\"16\" fill=\"#fbcfa0\"/>\n    <path d=\"M28 48 Q50 66 72 48 L72 64 Q50 80 28 64 Z\" fill=\"#f1f5f9\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <path d=\"M28 56 Q50 68 72 56\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\"/>\n    <line x1=\"28\" y1=\"52\" x2=\"14\" y2=\"44\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <line x1=\"72\" y1=\"52\" x2=\"86\" y2=\"44\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-slate-900 leading-tight mt-1\">FACE MASK REQUIRED</p>\n</div>"}],"instant":true},{"roman":"III","navLabel":"Điền đoạn văn","title":"Chọn từ thích hợp điền vào đoạn văn","icon":"file-lines","instructions":"Chọn đáp án đúng để hoàn thành đoạn văn.","type":"mcq","passage":{"title":"Lối sống lành mạnh","html":"Many people are trying to live a healthier lifestyle these days. One important way to improve your health is to avoid eating too much junk food. Junk food contains a lot of calories (17)___ very few nutrients. It can decrease your energy levels and increase your risk (18)___ becoming overweight or even obese.\n\nExperts advise people to eat more (19)___ fruits and vegetables, drink water, and exercise regularly. A balanced diet and enough sleep will (20)___ you recover from illness more quickly and stay in good shape. You (21)___ also try to break bad habits like skipping meals or staying up too late. If you're not sure how to start, ask a doctor or a nutrition expert for (22)___.","vi":"Nhiều người đang cố gắng có một lối sống lành mạnh hơn trong thời gian gần đây. Một cách quan trọng để cải thiện sức khỏe là tránh ăn quá nhiều đồ ăn vặt. Đồ ăn vặt chứa rất nhiều calo nhưng lại có rất ít chất dinh dưỡng. Nó có thể làm giảm mức năng lượng của bạn và làm tăng nguy cơ bị thừa cân hoặc thậm chí béo phì.\n\nCác chuyên gia khuyên mọi người nên ăn nhiều trái cây và rau củ tươi hơn, uống nước và tập thể dục thường xuyên. Một chế độ ăn cân bằng và ngủ đủ giấc sẽ giúp bạn hồi phục sau bệnh tật nhanh hơn và giữ được vóc dáng cân đối. Bạn cũng nên cố gắng từ bỏ những thói quen xấu như bỏ bữa hoặc thức khuya. Nếu bạn không chắc nên bắt đầu như thế nào, hãy hỏi bác sĩ hoặc chuyên gia dinh dưỡng để được tư vấn."},"questions":[{"q":"17.","options":["because","but","so","or"],"answer":1,"explanation":"Ý tương phản: nhiều calo NHƯNG rất ít dinh dưỡng → but.<br>A. because: bởi vì (không thể hiện tương phản)<br>B. but: nhưng (thể hiện tương phản) ✓<br>C. so: vì vậy (không hợp, không phải quan hệ kết quả)<br>D. or: hoặc (không hợp nghĩa)","vis":["bởi vì","nhưng (thể hiện sự tương phản)","vì vậy","hoặc"],"vi":"Đồ ăn vặt chứa rất nhiều calo (17) ___ lại có rất ít chất dinh dưỡng."},{"q":"18.","options":["for","at","with","of"],"answer":3,"explanation":"\"risk of doing sth\" = nguy cơ làm điều gì.<br>A. for: cho (không hợp cụm từ)<br>B. at: tại (không hợp cụm từ)<br>C. with: với (không hợp cụm từ)<br>D. of: risk of + V-ing ✓","vis":["cho","tại","với","của (risk of: nguy cơ)"],"vi":"Nó có thể làm giảm mức năng lượng của bạn và làm tăng nguy cơ (18) ___ bị thừa cân hoặc thậm chí béo phì."},{"q":"19.","options":["sweet","clean","raw","fresh"],"answer":3,"explanation":"\"fresh fruits and vegetables\" = trái cây và rau tươi.<br>A. sweet: ngọt (không hợp nghĩa cho rau củ nói chung)<br>B. clean: sạch (không phải collocation chuẩn với fruits/vegetables)<br>C. raw: sống, chưa nấu (không hợp nghĩa 'ăn nhiều hơn')<br>D. fresh: tươi (fresh fruits and vegetables) ✓","vis":["ngọt","sạch","sống, chưa nấu","tươi"],"vi":"Các chuyên gia khuyên mọi người nên ăn nhiều trái cây và rau củ (19) ___ hơn, uống nước và tập thể dục thường xuyên."},{"q":"20.","options":["help","give","make","let"],"answer":0,"explanation":"\"help you recover\" = giúp bạn hồi phục.<br>A. help sb (to) V ✓<br>B. give: cho (không tạo thành cụm động từ phù hợp)<br>C. make sb V (nguyên thể, mang nghĩa ép buộc, không hợp ngữ cảnh)<br>D. let sb V (nguyên thể, mang nghĩa cho phép, không hợp nghĩa)","vis":["giúp (help sb do sth)","cho, đưa","bắt buộc (make sb do sth)","cho phép (let sb do sth)"],"vi":"Một chế độ ăn cân bằng và ngủ đủ giấc sẽ (20) ___ bạn hồi phục sau bệnh tật nhanh hơn và giữ được vóc dáng cân đối."},{"q":"21.","options":["must","have","need","should"],"answer":3,"explanation":"Lời khuyên nhẹ nhàng → should.<br>A. must: phải (mang tính bắt buộc, mạnh hơn ngữ cảnh lời khuyên)<br>B. have (to): phải (cần 'to', không hợp cấu trúc)<br>C. need (to): cần (cũng cần 'to', không hợp cấu trúc)<br>D. should: nên (lời khuyên) ✓","vis":["phải (bắt buộc, mạnh)","có (have to: phải)","cần (need to: cần)","nên (lời khuyên nhẹ nhàng)"],"vi":"Bạn (21) ___ cũng nên cố gắng từ bỏ những thói quen xấu như bỏ bữa hoặc thức khuya."},{"q":"22.","options":["information","idea","tip","advice"],"answer":3,"explanation":"\"ask sb for advice\" = xin lời khuyên.<br>A. information: thông tin (không phải cụm cố định 'ask for')<br>B. idea: ý tưởng (không hợp nghĩa)<br>C. tip: mẹo nhỏ (gần nghĩa nhưng không phải cụm cố định với bác sĩ/chuyên gia)<br>D. advice: lời khuyên (ask sb for advice) ✓","vis":["thông tin","ý tưởng","mẹo nhỏ","lời khuyên"],"vi":"Nếu bạn không chắc nên bắt đầu như thế nào, hãy hỏi bác sĩ hoặc chuyên gia dinh dưỡng để được (22) ___."}],"instant":true},{"roman":"IV","navLabel":"Đọc hiểu","title":"Đọc hiểu","icon":"book-open","instructions":"Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.","type":"mcq","passage":{"title":"Meliha's Story","html":"Meliha and her children live in St. Paul. She is from Somalia and came to the US five years ago. Many things are different in America. You can buy junk food with lots of salt, sugar, and oil here. Americans don't walk as much as people in Somalia. Instead, you can drive a car or take the bus. Meliha notices that many people in America are overweight. Her children like junk food such as hamburgers and French fries, and she does too. She has noticed that she has gained weight since moving to America. Her children prefer watching TV rather than playing outside. Meliha doesn't walk very much because she has a car. Her doctor advises her to eat more fruits and vegetables. He also says that eating too much junk food like chips, fries, and sugary snacks is bad for her health and that she needs to get more exercise.","vi":"Meliha và các con của cô sống ở St. Paul. Cô đến từ Somalia và đã đến Mỹ được năm năm. Có rất nhiều điều khác biệt ở Mỹ. Ở đây bạn có thể mua đồ ăn vặt chứa nhiều muối, đường và dầu mỡ. Người Mỹ không đi bộ nhiều như người Somalia. Thay vào đó, bạn có thể lái xe hơi hoặc đi xe buýt. Meliha nhận thấy rằng nhiều người ở Mỹ bị thừa cân. Các con của cô thích đồ ăn vặt như hamburger và khoai tây chiên, và cô cũng vậy. Cô nhận ra rằng mình đã tăng cân kể từ khi chuyển đến Mỹ. Các con của cô thích xem TV hơn là chơi ở ngoài. Meliha không đi bộ nhiều vì cô có xe hơi. Bác sĩ khuyên cô nên ăn nhiều trái cây và rau củ hơn. Ông cũng nói rằng ăn quá nhiều đồ ăn vặt như khoai tây chiên lát mỏng, khoai tây chiên que và đồ ăn nhẹ nhiều đường có hại cho sức khỏe của cô và cô cần tập thể dục nhiều hơn."},"questions":[{"q":"23. Meliha moved to the US from Somalia five years ago.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"came to the US five years ago\" → Đúng.","vis":["Đúng","Sai"],"vi":"Meliha đã chuyển đến Mỹ từ Somalia cách đây năm năm."},{"q":"24. Meliha's children love playing outside more than watching TV.","options":["True","False"],"answer":1,"explanation":"Bài đọc: \"prefer watching TV rather than playing outside\" → Sai.","vis":["Đúng","Sai"],"vi":"Các con của Meliha thích chơi ở ngoài hơn là xem TV."},{"q":"25. Meliha walks a lot every day to stay healthy.","options":["True","False"],"answer":1,"explanation":"Bài đọc: \"Meliha doesn't walk very much because she has a car\" → Sai.","vis":["Đúng","Sai"],"vi":"Meliha đi bộ rất nhiều mỗi ngày để giữ gìn sức khỏe."},{"q":"26. The doctor tells Meliha that she should eat more fruits and vegetables.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"Her doctor advises her to eat more fruits and vegetables\" → Đúng.","vis":["Đúng","Sai"],"vi":"Bác sĩ nói với Meliha rằng cô nên ăn nhiều trái cây và rau củ hơn."},{"q":"27. What kind of food do Meliha and her children like?","options":["Junk food like hamburgers and French fries","Fresh fruits and vegetables","Healthy food from Somalia","Fish and chips"],"answer":0,"explanation":"Bài đọc: \"Her children like junk food such as hamburgers and French fries, and she does too\".","vis":["Đồ ăn vặt như hamburger và khoai tây chiên","Trái cây và rau củ tươi","Đồ ăn lành mạnh từ Somalia","Cá và khoai tây chiên (fish and chips)"],"vi":"Meliha và các con của cô thích loại thức ăn nào?"},{"q":"28. Why has Meliha gained weight since moving to America?","options":["Because she eats a lot of junk food and does not walk much.","Because she only eats traditional food from Somalia.","Because she plays sports outside with her children every day.","Because she follows her doctor's advice perfectly."],"answer":0,"explanation":"Bài đọc: ăn nhiều đồ ăn vặt và ít đi bộ (có xe hơi).","vis":["Vì cô ăn nhiều đồ ăn vặt và không đi bộ nhiều.","Vì cô chỉ ăn đồ ăn truyền thống của Somalia.","Vì cô chơi thể thao ngoài trời với các con mỗi ngày.","Vì cô tuân theo lời khuyên của bác sĩ một cách hoàn hảo."],"vi":"Tại sao Meliha đã tăng cân kể từ khi chuyển đến Mỹ?"}],"instant":true},{"roman":"V","navLabel":"Từ loại","title":"Cho dạng đúng của từ trong ngoặc","icon":"spell-check","instructions":"Điền dạng đúng của từ trong ngoặc vào chỗ trống.","type":"fill","questions":[{"q":"29. Fast food is very convenient, but eating it too often is ___ for our bodies.","answer":"unhealthy","explanation":"Tính từ phủ định: un + health + y → unhealthy.","hint":"(health)","family":["health (n): sức khỏe","healthy (adj): khỏe mạnh, có lợi cho sức khỏe","unhealthy (adj): không tốt cho sức khỏe, có hại","healthily (adv): một cách khỏe mạnh"]},{"q":"30. Doing regular exercise helps to ___ your muscles and keep you fit.","answer":"strengthen","explanation":"Động từ: strength + en → strengthen (làm cho khỏe/chắc hơn).","hint":"(strong)","family":["strong (adj): khỏe, mạnh","strength (n): sức mạnh, sức khỏe","strengthen (v): làm cho khỏe/mạnh hơn","strongly (adv): một cách mạnh mẽ"]},{"q":"31. The doctor told him to reduce his ___ of fast food and soda.","answer":"consumption","explanation":"Danh từ: consume + tion → consumption (sự tiêu thụ).","hint":"(consume)","family":["consume (v): tiêu thụ, sử dụng","consumption (n): sự tiêu thụ","consumer (n): người tiêu dùng"]},{"q":"32. Lan was ___ absent from school yesterday because she caught the flu.","answer":"sickly","explanation":"Theo đáp án gốc của tài liệu: sickly (ốm yếu).","hint":"(sick)","family":["sick (adj): ốm, bị bệnh","sickness (n): bệnh tật, sự ốm đau","sickly (adj): hay ốm yếu, có vẻ yếu ớt"]},{"q":"33. My father always keeps his room ___ and clean every weekend.","answer":"tidy","explanation":"Tính từ giữ nguyên: tidy (gọn gàng).","hint":"(tidy)","family":["tidy (adj): gọn gàng, ngăn nắp","tidy (v): dọn dẹp","tidiness (n): sự gọn gàng","untidy (adj): bừa bộn, lộn xộn"]},{"q":"34. The spread of the virus caused a lot of ___ for the local community.","answer":"difficulties","explanation":"Danh từ số nhiều: difficult + y → difficulties (khó khăn).","hint":"(difficult)","family":["difficult (adj): khó khăn","difficulty (n): sự khó khăn","difficulties (n, số nhiều): những khó khăn, trở ngại"]}]},{"roman":"VI","navLabel":"Từ điển","title":"Tra từ điển \"nutrition\"","icon":"book-bookmark","instructions":"Dựa vào mục từ điển, hoàn thành câu (không quá 3 từ).","type":"fill","dict":{"word":"nutrition","ipa":"/njuːˈtrɪʃn/","pos":"noun","senses":[{"def":"the process of providing or obtaining the food necessary for health and growth.","examples":["good nutrition: A balanced diet is essential for good nutrition.","poor nutrition: Many illnesses are caused by poor nutrition and a lack of exercise.","nutrition advice: The clinic offers free nutrition advice to help you eat healthier."]}],"vi":"<b>nutrition</b> /njuːˈtrɪʃn/ (danh từ)<br>1. [U] quá trình cung cấp hoặc nhận được thức ăn cần thiết cho sức khỏe và sự phát triển.<br>• good nutrition: Một chế độ ăn cân bằng là cần thiết để có dinh dưỡng tốt.<br>• poor nutrition: Nhiều bệnh tật là do dinh dưỡng kém và thiếu tập thể dục.<br>• nutrition advice: Phòng khám cung cấp tư vấn dinh dưỡng miễn phí để giúp bạn ăn uống lành mạnh hơn."},"questions":[{"q":"35. Eating a variety of fruits, vegetables, and whole grains is important for ___.","answer":"good nutrition","explanation":"Dựa vào ví dụ: good nutrition.","vi":"Ăn đa dạng trái cây, rau củ và ngũ cốc nguyên hạt rất quan trọng để có dinh dưỡng tốt."},{"q":"36. You should speak to a doctor or a fitness trainer if you need expert ___.","answer":"nutrition advice","explanation":"Dựa vào ví dụ: nutrition advice.","vi":"Bạn nên trao đổi với bác sĩ hoặc huấn luyện viên thể hình nếu cần lời khuyên dinh dưỡng từ chuyên gia."}]},{"roman":"VII","navLabel":"Viết lại câu","title":"Viết lại câu sao cho nghĩa không đổi","icon":"pen-to-square","instructions":"Viết lại câu, giữ nguyên nghĩa với câu gốc.","type":"sentence","questions":[{"q":"37.","answer":"watches TV too much, he has a headache","explanation":"so = because, đảo vị trí mệnh đề nguyên nhân - kết quả.","vi":"Ben xem TV quá nhiều, vì vậy cậu ấy bị đau đầu.","note":"S1, so S2 → Because S1, S2<br>Nghĩa đáp án: Vì Ben xem TV quá nhiều nên cậu ấy bị đau đầu.","original":"Ben watches TV too much, so he has a headache.","starter":"Because Ben"},{"q":"38.","answer":"to finish the exercise layout now","explanation":"It is not necessary for sb to V = sb don't need to V.","vi":"Bạn không cần phải hoàn thành bố cục bài tập ngay bây giờ.","note":"It is not necessary for sb to V → sb don't need to V<br>Nghĩa đáp án: Bạn không cần phải hoàn thành bố cục bài tập ngay bây giờ.","original":"It is not necessary for you to finish the exercise layout now.","starter":"You don't need"},{"q":"39.","answer":"to sleep more and try to relax more","explanation":"should + V = ought to + V (cùng nghĩa khuyên bảo).","vi":"Elena nên ngủ nhiều hơn và cố gắng thư giãn nhiều hơn.","note":"should + V → ought to + V<br>Nghĩa đáp án: Elena nên ngủ nhiều hơn và cố gắng thư giãn nhiều hơn.","original":"Elena should sleep more and try to relax more.","starter":"Elena ought"},{"q":"40.","answer":"getting cavities by brushing your teeth twice a day","explanation":"V-ing... is a good way to V = You can V by V-ing.","vi":"Đánh răng hai lần một ngày là một cách tốt để tránh bị sâu răng.","note":"V-ing... is a good way to V → You can V by V-ing<br>Nghĩa đáp án: Bạn có thể tránh bị sâu răng bằng cách đánh răng hai lần một ngày.","original":"Brushing your teeth twice a day is a good way to avoid getting cavities.","starter":"You can avoid"}],"instant":true}]};

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

  ).join('');
}

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
