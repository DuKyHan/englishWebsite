<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap');
  :root{ --accent:#7c3aed; --accent2:#db2777; }
  * { box-sizing: border-box; }
  body { font-family:'Nunito',sans-serif; background:#f5f3ff; }
  .hero-gradient{ background: linear-gradient(135deg, #1e1b4b 0%, #7c3aed 55%, #db2777 100%); }
  .tab-btn{ transition: all .2s ease; }
  .tab-btn.active{ background: linear-gradient(135deg, #1e1b4b, #db2777); color:#fff; box-shadow:0 4px 14px rgba(30,27,75,.35); transform:translateY(-1px); }
  .task-card{ transition: box-shadow .2s, transform .2s; }
  .task-card:hover{ transform: translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,.10); }
  .option-label{ cursor:pointer; transition: all .18s; border:2px solid #e2e8f0; }
  .option-label:hover{ border-color:var(--accent); background:#f5f3ff; }
  .option-label.selected{ border-color:#1e1b4b; background:#eef2ff; }
  .option-label.correct-opt{ border-color:#22c55e !important; background:#f0fdf4 !important; }
  .option-label.wrong-opt{ border-color:#ef4444 !important; background:#fef2f2 !important; }
  .mcq-detail-hidden{ display:none; }
  .show-mcq-detail .mcq-detail-hidden{ display:block; }
  .speak-btn{ cursor:pointer; }
  .speak-btn.speaking{ animation: pulseSpeak .7s ease-in-out infinite; }
  @keyframes pulseSpeak{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
  .vi-hidden{ display:none; }
  .explanation-box{ display:none; animation: fadeSlide .3s ease forwards; }
  .explanation-box.show{ display:block; }
  @keyframes fadeSlide{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }
  input.answer-input{ border:2px solid #cbd5e1; transition:border .18s; outline:none; background:#fff; }
  input.answer-input:focus{ border-color:var(--accent); }
  input.correct-input{ border-color:#22c55e !important; background:#f0fdf4; }
  input.wrong-input{ border-color:#ef4444 !important; background:#fef2f2; }
  .score-badge{ animation: popIn .35s cubic-bezier(.36,1.6,.6,1) forwards; }
  @keyframes popIn{ from{transform:scale(.4); opacity:0;} to{transform:scale(1); opacity:1;} }
  .confetti-wrap{ position:fixed; inset:0; pointer-events:none; z-index:9999; }
  .confetti-piece{ position:absolute; width:10px; height:10px; border-radius:2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall{ 0%{transform:translateY(-20px) rotate(0deg); opacity:1;} 100%{transform:translateY(100vh) rotate(720deg); opacity:0;} }
  .progress-bar-fill{ transition: width .6s ease; }
  .section-page{ display:none; }
  .section-page.active{ display:block; }
  #completionBanner{ display:none; }
  #completionBanner.show{ display:flex; }
  .passage-box{ background:#fff; border:1px solid #e2e8f0; border-radius:1rem; padding:1rem 1.25rem; line-height:1.9; font-size:.95rem; color:#334155; }
  .dict-box{ background:#fef9c3; border:1px solid #fde68a; border-radius:1rem; padding:1rem 1.25rem; font-size:.9rem; color:#334155; }
  .blank-tag{ background:#ede9fe; color:#5b21b6; font-weight:800; border-radius:.4rem; padding:0 .35rem; }
  .wordfam-box{ background:#f5f3ff; border:1px solid #ddd6fe; border-radius:.6rem; padding:.5rem .75rem; font-size:.75rem; color:#5b21b6; line-height:1.6; width:100%; }
</style>
</head>

<script>
const DATA = {"unit":1,"test":1,"sections":[{"roman":"I","navLabel":"Ngữ âm & Từ vựng","title":"Phát âm – Trọng âm – Từ vựng – Ngữ pháp","icon":"ear-listen","instructions":"Chọn đáp án (A, B, C hoặc D) đúng nhất.","type":"mcq","questions":[{"q":"1. Which word has the underlined part pronounced differently from that of the others?","options":["b<u>a</u>g","g<u>a</u>rden","M<u>a</u>ths","tr<u>a</u>vel"],"answer":1,"explanation":"\"garden\" có \"a\" phát âm là /ɑː/, ba từ còn lại phát âm là /æ/.","ipas":["/bæg/","/ˈɡɑːdn/","/mæθs/","/ˈtrævl/"],"vis":["cái túi","khu vườn","môn Toán","du lịch, đi lại"]},{"q":"2. Which word has the underlined part pronounced differently from that of the others?","options":["<u>c</u>ompass","pen<u>c</u>il","<u>c</u>lass","<u>c</u>omputer"],"answer":1,"explanation":"\"pencil\" có \"c\" phát âm là /s/, ba từ còn lại phát âm là /k/.","ipas":["/ˈkʌmpəs/","/ˈpensl/","/klɑːs/","/kəmˈpjuːtə(r)/"],"vis":["la bàn","bút chì","lớp học","máy tính"]},{"q":"3. Which word has a different stress pattern from that of the others?","options":["arrive","rubber","lesson","classmate"],"answer":0,"explanation":"\"arrive\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/əˈraɪv/","/ˈrʌbə(r)/","/ˈlesn/","/ˈklɑːsmeɪt/"],"vis":["đến nơi","cục tẩy; cao su","bài học","bạn cùng lớp"]},{"q":"4. Which word has a different stress pattern from that of the others?","options":["bicycle","sharpener","remember","exercise"],"answer":2,"explanation":"\"remember\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˈbaɪsɪkl/","/ˈʃɑːpnə(r)/","/rɪˈmembə(r)/","/ˈeksəsaɪz/"],"vis":["xe đạp","đồ gọt bút chì","nhớ","bài tập; tập thể dục"]},{"q":"5. - Student A: \"How do you feel about the school festival?\"\n- Student B: \"We are very ___ about it. It's so fun!\"","options":["excited","exciting","excitement","excite"],"answer":0,"explanation":"Sau \"very\" + tính từ đuôi -ed diễn tả cảm xúc của người → excited.","vi":"Bạn A: 'Bạn cảm thấy thế nào về lễ hội trường học?' – Bạn B: 'Chúng tôi rất phấn khích về nó. Vui lắm!'"},{"q":"6. - Teacher: \"Who is the ___ of this history book?\"\n- Student: \"It's a famous professor from France, sir.\"","options":["actress","classmate","author","people"],"answer":2,"explanation":"\"author\" = tác giả, người viết sách.","vis":["nữ diễn viên","bạn cùng lớp","tác giả","mọi người"],"vi":"Giáo viên: 'Ai là tác giả của cuốn sách lịch sử này?' – Học sinh: 'Đó là một giáo sư nổi tiếng đến từ Pháp, thưa thầy.'"},{"q":"7. - A: \"What do your brothers usually do after school?\"\n- B: \"They usually ___ football in the park.\"","options":["make","do","study","play"],"answer":3,"explanation":"Collocation: play football.","vis":["làm ra, chế tạo","làm, thực hiện","học","chơi"],"vi":"A: 'Các anh trai của bạn thường làm gì sau giờ học?' – B: 'Họ thường chơi bóng đá trong công viên.'"},{"q":"8. - A: \"Do many people ___ English in Jamaica?\"\n- B: \"Yes, it is the official language there.\"","options":["speaks","speaking","speak","to speak"],"answer":2,"explanation":"Câu hỏi Do + S + V(nguyên thể) → speak.","vi":"A: 'Có nhiều người nói tiếng Anh ở Jamaica không?' – B: 'Có, đó là ngôn ngữ chính thức ở đó.'"},{"q":"9. - Son: \"Does Dad ___ a big car to work every day?\"\n- Mom: \"No, he usually goes by bus.\"","options":["doesn't","do","don't","drive"],"answer":3,"explanation":"Does + S + V(nguyên thể) → drive.","vi":"Con: 'Bố có lái một chiếc xe to đi làm mỗi ngày không ạ?' – Mẹ: 'Không, bố thường đi xe buýt.'"},{"q":"10. - Librarian: \"What is your favorite ___ at school?\"\n- Student: \"I love History because I like learning about the past.\"","options":["device","subject","friends","vocabulary"],"answer":1,"explanation":"\"subject\" = môn học.","vis":["thiết bị","môn học","bạn bè","từ vựng"],"vi":"Thủ thư: 'Môn học yêu thích của bạn ở trường là gì?' – Học sinh: 'Mình thích môn Lịch sử vì mình thích tìm hiểu về quá khứ.'"},{"q":"11. - A: \"How often do you study English?\"\n- B: \"___.\"","options":["In the morning","With my friends","Twice a week","I study at home"],"answer":2,"explanation":"Câu hỏi \"How often\" hỏi về tần suất → Twice a week.","vis":["Vào buổi sáng","Cùng với bạn của tôi","Hai lần một tuần","Tôi học ở nhà"],"vi":"A: 'Bạn học tiếng Anh bao lâu một lần?' – B: 'Hai lần một tuần.'"},{"q":"12. - A: \"We only have time for a snack at ___.\"\n- B: \"Let's go to the canteen quickly then.\"","options":["class","break time","meals","gym"],"answer":1,"explanation":"\"break time\" = giờ ra chơi, hợp ngữ cảnh ăn snack.","vis":["giờ học","giờ ra chơi","bữa ăn","phòng tập thể dục"],"vi":"A: 'Chúng ta chỉ có thời gian ăn nhẹ vào giờ ra chơi thôi.' – B: 'Vậy thì mình đi nhanh đến căng-tin nhé.'"},{"q":"13. - A: \"Have a great start at your new school!\"\n- B: \"___\"","options":["Thanks! The same to you!","You're welcome","I've no idea","Not at all"],"answer":0,"explanation":"Đáp lại lời chúc bằng lời chúc tương tự.","vis":["Cảm ơn! Bạn cũng vậy nhé!","Không có gì","Tôi không biết","Không có chi"],"vi":"A: 'Chúc bạn có một khởi đầu tuyệt vời ở trường mới nhé!' – B: 'Cảm ơn! Bạn cũng vậy nhé!'"},{"q":"14. - A: \"Why are you late for the lesson?\"\n- B: \"___\"","options":["My bike is new","The lesson is long","Sorry, I missed the bus","I love English"],"answer":2,"explanation":"Trả lời cho lý do đi muộn → xin lỗi + nêu lý do.","vis":["Xe đạp của tôi mới","Bài học dài","Xin lỗi, tôi lỡ chuyến xe buýt","Tôi yêu thích tiếng Anh"],"vi":"A: 'Sao bạn đến muộn giờ học vậy?' – B: 'Xin lỗi, mình lỡ chuyến xe buýt.'"}],"instant":true},{"roman":"II","navLabel":"Biển báo","title":"Biển báo / Thông báo","icon":"traffic-light","instructions":"Đọc biển báo/thông báo và chọn ý đúng nhất.","type":"mcq","questions":[{"q":"15. What does this sign mean?","options":["No mobile phones allowed.","Always answer your phone in class.","You can use your phone here.","Phones must be charged before use."],"answer":0,"explanation":"A. No mobile phones allowed. — đúng, khớp với ý nghĩa biển cấm điện thoại ✓<br>B. Always answer your phone in class. — sai, biển không nói phải luôn nghe điện thoại trong lớp<br>C. You can use your phone here. — sai, ngược với ý nghĩa của biển cấm<br>D. Phones must be charged before use. — sai, biển không đề cập đến việc sạc điện thoại","vis":["Không được phép sử dụng điện thoại di động.","Luôn luôn nghe điện thoại trong giờ học.","Bạn có thể sử dụng điện thoại ở đây.","Điện thoại phải được sạc trước khi sử dụng."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-white border-2 border-slate-200 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#dc2626\" stroke-width=\"8\"/>\n    <line x1=\"14\" y1=\"86\" x2=\"86\" y2=\"14\" stroke=\"#dc2626\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n    <rect x=\"36\" y=\"28\" width=\"28\" height=\"46\" rx=\"4\" fill=\"#1e293b\"/>\n    <rect x=\"40\" y=\"34\" width=\"20\" height=\"26\" fill=\"#fff\"/>\n    <line x1=\"43\" y1=\"40\" x2=\"43\" y2=\"50\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <line x1=\"47\" y1=\"37\" x2=\"47\" y2=\"50\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <line x1=\"51\" y1=\"43\" x2=\"51\" y2=\"50\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <line x1=\"55\" y1=\"40\" x2=\"55\" y2=\"50\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <circle cx=\"50\" cy=\"69\" r=\"2.4\" fill=\"#1e293b\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-slate-900 leading-tight mt-1\">NO MOBILE PHONES ALLOWED</p>\n</div>"},{"q":"16. What does this notice tell you?","options":["Keep quiet in the library.","No eating or drinking allowed.","Return books on time.","Computers are for research only."],"answer":0,"explanation":"A. Keep quiet in the library. — đúng, \"Silence please\" nghĩa là giữ yên lặng ✓<br>B. No eating or drinking allowed. — sai, biển không đề cập đến ăn uống<br>C. Return books on time. — sai, biển không nói về việc trả sách<br>D. Computers are for research only. — sai, biển không đề cập đến máy tính","vis":["Giữ yên lặng trong thư viện.","Không được ăn uống.","Trả sách đúng hạn.","Máy tính chỉ dùng để tra cứu."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-sky-700 border-2 border-slate-300 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <circle cx=\"50\" cy=\"30\" r=\"14\" fill=\"#fff\"/>\n    <path d=\"M28 78c0-16 10-28 22-28s22 12 22 28\" fill=\"#fff\"/>\n    <path d=\"M55 46c6 2 10 8 9 14\" fill=\"none\" stroke=\"#0c4a6e\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n    <circle cx=\"63\" cy=\"58\" r=\"3\" fill=\"#0c4a6e\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-white leading-tight mt-1\">SILENCE PLEASE</p>\n</div>"}],"instant":true},{"roman":"III","navLabel":"Điền đoạn văn","title":"Chọn từ thích hợp điền vào đoạn văn","icon":"file-lines","instructions":"Chọn đáp án đúng để hoàn thành đoạn văn.","type":"mcq","passage":{"title":"Đoạn văn về trường học","html":"School is the place where we learn to read and write. It is the most important place for a student, and it <b>(17)</b> ___ us to learn new things. The teachers are always helpful and teach us important things <b>(18)</b> ___ life. We must always be regular to school as missing classes can <b>(19)</b> ___ to problems during our exams. Schools teach us <b>(20)</b> ___ to be consistent, punctual, and obedient. It <b>(21)</b> ___ makes us better human beings so that we can treat <b>(22)</b> ___ elders with respect. Most of what we learn is a result of the learning imparted by our teachers.","vi":"Trường học là nơi chúng ta học đọc và viết. Đó là nơi quan trọng nhất đối với một học sinh, và nó (17) ___ chúng ta học những điều mới. Các thầy cô luôn nhiệt tình giúp đỡ và dạy chúng ta những điều quan trọng (18) ___ cuộc sống. Chúng ta phải luôn đi học đều đặn vì nghỉ học có thể (19) ___ đến những rắc rối trong các kỳ thi. Trường học dạy chúng ta (20) ___ để trở nên kiên định, đúng giờ và ngoan ngoãn. Nó (21) ___ giúp chúng ta trở thành những con người tốt hơn để chúng ta có thể đối xử tôn trọng với (22) ___ người lớn tuổi hơn. Phần lớn những gì chúng ta học được là kết quả của quá trình giảng dạy từ thầy cô."},"questions":[{"q":"17.","options":["helps","lets","makes","allows"],"answer":0,"explanation":"\"help sb (to) do sth\" = giúp ai làm gì.<br>A. helps: giúp đỡ ✓<br>B. lets: để cho, cho phép (let sb do sth)<br>C. makes: khiến, bắt buộc (make sb do sth)<br>D. allows: cho phép (allow sb to do sth, không hợp cấu trúc ở đây)","vis":["giúp đỡ (help sb do sth)","để cho, cho phép (let sb do sth)","khiến, bắt buộc (make sb do sth)","cho phép (allow sb to do sth)"],"vi":"...và nó (17) ___ chúng ta học những điều mới."},{"q":"18.","options":["of","on","in","at"],"answer":0,"explanation":"\"things of life\" = những điều trong cuộc sống.<br>A. of: của ✓<br>B. on: về (chủ đề)<br>C. in: trong<br>D. at: tại","vis":["của","về (chủ đề)","trong","tại"],"vi":"...dạy chúng ta những điều quan trọng (18) ___ cuộc sống."},{"q":"19.","options":["cause","lead","result","bring"],"answer":1,"explanation":"\"lead to\" = dẫn đến.<br>A. cause: gây ra (không đi với \"to\")<br>B. lead: dẫn đến (lead to) ✓<br>C. result: kết quả (result in, không phải result to)<br>D. bring: mang đến","vis":["gây ra","dẫn đến (lead to)","dẫn đến, là kết quả (result in)","mang đến, mang lại"],"vi":"...nghỉ học có thể (19) ___ đến những rắc rối trong các kỳ thi."},{"q":"20.","options":["what","also","how","who"],"answer":2,"explanation":"\"teach us how to...\" = dạy chúng ta cách...<br>A. what: cái gì<br>B. also: cũng<br>C. how: cách (teach sb how to do sth) ✓<br>D. who: ai","vis":["cái gì","cũng","cách, làm thế nào (how to)","ai"],"vi":"Trường học dạy chúng ta (20) ___ để trở nên kiên định, đúng giờ và ngoan ngoãn."},{"q":"21.","options":["too","also","either","already"],"answer":1,"explanation":"\"also\" = cũng, đứng giữa câu trước động từ chính.<br>A. too: cũng (thường đứng cuối câu)<br>B. also: cũng, đứng giữa câu ✓<br>C. either: cũng không (câu phủ định)<br>D. already: đã, rồi","vis":["cũng (thường đứng cuối câu)","cũng (đứng giữa câu)","cũng không (câu phủ định)","đã, rồi"],"vi":"Nó (21) ___ giúp chúng ta trở thành những con người tốt hơn."},{"q":"22.","options":["our","us","ours","we"],"answer":0,"explanation":"\"our elders\" = những người lớn tuổi hơn chúng ta (tính từ sở hữu + danh từ).<br>A. our: của chúng ta (tính từ sở hữu + danh từ) ✓<br>B. us: chúng ta (đại từ tân ngữ)<br>C. ours: của chúng ta (đại từ sở hữu, đứng độc lập)<br>D. we: chúng ta (đại từ chủ ngữ)","vis":["của chúng ta (tính từ sở hữu)","chúng ta (đại từ tân ngữ)","của chúng ta (đại từ sở hữu độc lập)","chúng ta (đại từ chủ ngữ)"],"vi":"...để chúng ta có thể đối xử tôn trọng với (22) ___ người lớn tuổi hơn."}],"instant":true},{"roman":"IV","navLabel":"Đọc hiểu","title":"Đọc hiểu","icon":"book-open","instructions":"Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.","type":"mcq","passage":{"title":"Mai's School","html":"Hello, my name is Mai. I am 11 years old. I go to a public school called Nguyen Du Secondary School. I am in grade 6. In our class there are 27 students, 15 girls and 12 boys.<br><br>My classroom is big and nice. Our teacher is Miss Thuy. She likes decorating the walls of the class with posters and maps. In our class there is a computer and a blackboard.<br><br>My desk and my chair are brown. My pencil case is on my desk. It's colorful. I have lots of things in my pencil case: a pencil sharpener, two pencils, a rubber, three paper clips and a purple pen.<br><br>I go to school by bicycle with my friends. We like our school because there are playgrounds, a big gym and a fantastic music room with many instruments.","vi":"Xin chào, mình tên là Mai. Mình 11 tuổi. Mình học tại một trường công lập tên là Trường THCS Nguyễn Du. Mình đang học lớp 6. Lớp mình có 27 học sinh, gồm 15 bạn nữ và 12 bạn nam.<br><br>Lớp học của mình rộng rãi và đẹp. Cô giáo của mình là cô Thúy. Cô thích trang trí tường lớp bằng áp phích và bản đồ. Trong lớp mình có một máy tính và một bảng đen.<br><br>Bàn và ghế của mình màu nâu. Hộp bút của mình đặt trên bàn. Nó có nhiều màu sắc. Mình có rất nhiều thứ trong hộp bút: một cái gọt bút chì, hai cây bút chì, một cục tẩy, ba cái kẹp giấy và một cây bút màu tím.<br><br>Mình đi học bằng xe đạp cùng các bạn. Chúng mình thích trường của mình vì có sân chơi, một phòng thể dục lớn và một phòng âm nhạc tuyệt vời với nhiều loại nhạc cụ."},"questions":[{"q":"23. Mai is a student at Nguyen Du Secondary School.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"a public school called Nguyen Du Secondary School\".","vis":["Đúng","Sai"],"vi":"Mai là học sinh của Trường THCS Nguyễn Du."},{"q":"24. There are more boys than girls in Mai's class.","options":["True","False"],"answer":1,"explanation":"15 nữ, 12 nam → nữ nhiều hơn nam, câu này Sai.","vis":["Đúng","Sai"],"vi":"Trong lớp của Mai, số bạn nam nhiều hơn số bạn nữ."},{"q":"25. Miss Thuy puts maps and posters on the classroom walls.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"decorating the walls of the class with posters and maps\".","vis":["Đúng","Sai"],"vi":"Cô Thúy dán bản đồ và áp phích lên tường lớp học."},{"q":"26. Mai travels to school by bus every day.","options":["True","False"],"answer":1,"explanation":"Bài đọc: \"I go to school by bicycle\".","vis":["Đúng","Sai"],"vi":"Mai đi học bằng xe buýt mỗi ngày."},{"q":"27. What color is the pen in Mai's pencil case?","options":["Brown","Purple","Pink","Colorful"],"answer":1,"explanation":"\"a purple pen\".","vis":["Màu nâu","Màu tím","Màu hồng","Nhiều màu sắc"],"vi":"Cây bút trong hộp bút của Mai màu gì?"},{"q":"28. Why do Mai and her friends like their school?","options":["Because the classroom has a computer.","Because their teacher is very nice.","Because it has playgrounds, a gym, and a music room.","Because the school is near their houses."],"answer":2,"explanation":"Bài đọc nêu lý do: playgrounds, gym, music room.","vis":["Vì lớp học có máy tính.","Vì cô giáo của họ rất tốt bụng.","Vì trường có sân chơi, phòng tập thể dục và phòng âm nhạc.","Vì trường gần nhà của họ."],"vi":"Tại sao Mai và các bạn thích trường của mình?"}],"instant":true},{"roman":"V","navLabel":"Từ loại","title":"Cho dạng đúng của từ trong ngoặc","icon":"spell-check","instructions":"Điền dạng đúng của từ trong ngoặc vào chỗ trống.","type":"fill","questions":[{"q":"29. The children look very ___ during the school trip.","answer":"excited","explanation":"Sau look + tính từ đuôi -ed diễn tả cảm xúc → excited.","hint":"(EXCITE)","family":["excite (v): kích thích, làm hào hứng","excited (adj): hào hứng, phấn khích (chỉ người)","exciting (adj): thú vị, hào hứng (chỉ sự việc)","excitement (n): sự hào hứng, phấn khích"]},{"q":"30. My pencil case is very ___ with many patterns.","answer":"colorful","explanation":"Tính từ: color + ful → colorful (nhiều màu sắc).","hint":"(COLOR)","family":["color (n): màu sắc","color (v): tô màu","colorful (adj): nhiều màu sắc, sặc sỡ","colorless (adj): không màu"]},{"q":"31. The teacher is ___ the walls with beautiful posters.","answer":"decorating","explanation":"Sau am/is/are (thì tiếp diễn) → V-ing: decorating.","hint":"(DECORATE)","family":["decorate (v): trang trí","decoration (n): sự trang trí, đồ trang trí","decorative (adj): mang tính trang trí","decorator (n): người trang trí"]},{"q":"32. Mathematics is my favorite ___ at school.","answer":"subject","explanation":"Danh từ đứng sau tính từ sở hữu 'favorite' → subject.","hint":"(SUBJECT)","family":["subject (n): môn học, chủ đề","subjective (adj): mang tính chủ quan","subjectively (adv): một cách chủ quan"]},{"q":"33. There are many modern ___ in our new classroom.","answer":"devices","explanation":"Danh từ số nhiều sau many → devices.","hint":"(DEVICE)","family":["device (n): thiết bị, dụng cụ","devise (v): nghĩ ra, sáng chế"]},{"q":"34. We need a ___ to do these difficult math exercises.","answer":"calculator","explanation":"Danh từ chỉ dụng cụ: calculate + or → calculator (máy tính).","hint":"(CALCULATE)","family":["calculate (v): tính toán","calculation (n): phép tính, sự tính toán","calculator (n): máy tính (cầm tay)","calculable (adj): có thể tính được"]}]},{"roman":"VI","navLabel":"Từ điển","title":"Tra từ điển \"author\"","icon":"book-bookmark","instructions":"Dựa vào mục từ điển, hoàn thành câu (không quá 3 từ).","type":"fill","dict":{"word":"author","ipa":"/ˈɔːθə(r)/","pos":"noun","senses":[{"def":"a person who writes books or the person who wrote a particular book.","examples":["He is the best-selling author of several thrillers.","The author of the book will be at the bookstore today.","Who is your favourite author?"]}],"vi":"<b>author</b> /ˈɔːθə(r)/ (danh từ)<br>1. người viết sách, hoặc người đã viết một cuốn sách cụ thể.<br>• Ông ấy là tác giả bán chạy nhất với vài cuốn tiểu thuyết trinh thám.<br>• Tác giả của cuốn sách sẽ có mặt tại hiệu sách hôm nay.<br>• Tác giả yêu thích của bạn là ai?"},"questions":[{"q":"35. J.K. Rowling is a very famous and ___; she has sold millions of copies of Harry Potter.","answer":"best-selling author","explanation":"Dựa vào ví dụ 1 trong từ điển: best-selling author.","accepted":["best selling author","best-selling author"],"vi":"J.K. Rowling là một tác giả bán chạy rất nổi tiếng; bà đã bán được hàng triệu bản sách Harry Potter."},{"q":"36. If you want to know more about the story, you can talk to the ___ at the event tonight.","answer":"author of the book","explanation":"Dựa vào ví dụ 2 trong từ điển: author of the book.","vi":"Nếu bạn muốn biết thêm về câu chuyện, bạn có thể nói chuyện với tác giả của cuốn sách tại sự kiện tối nay."}]},{"roman":"VII","navLabel":"Viết lại câu","title":"Viết lại câu sao cho nghĩa không đổi","icon":"pen-to-square","instructions":"Viết lại câu, giữ nguyên nghĩa với câu gốc.","type":"sentence","questions":[{"q":"37.","answer":"150 students and 10 teachers","explanation":"Chuyển từ There are sang have: My school has 150 students and 10 teachers.","original":"There are 150 students and 10 teachers in my school.","starter":"My school has","vi":"Trường tôi có 150 học sinh và 10 giáo viên.","note":"There is/are + N + in + N2 → N2 + has/have + N<br>Nghĩa đáp án: Trường tôi có 150 học sinh và 10 giáo viên."},{"q":"38.","answer":"at playing the piano","explanation":"be good at + V-ing = giỏi về việc gì.","original":"Mary plays the piano very well.","starter":"Mary is good","vi":"Mary chơi piano rất giỏi.","note":"S + V + well → S + be + good at + V-ing<br>Nghĩa đáp án: Mary giỏi chơi piano."},{"q":"39.","answer":"Vietnamese and Maths","explanation":"like...best = thích nhất.","original":"My favorite subjects are Vietnamese and Maths.","starter":"I like","vi":"Môn học yêu thích của tôi là tiếng Việt và Toán.","note":"S + favorite subjects + be + N → S + like + N + best<br>Nghĩa đáp án: Tôi thích tiếng Việt và Toán nhất."},{"q":"40.","answer":"to bring your raincoat today","explanation":"Remember to V = nhớ làm gì (chưa làm).","original":"Don't forget to bring your raincoat today.","starter":"Remember","vi":"Đừng quên mang áo mưa hôm nay nhé.","note":"Don't forget to V → Remember to V<br>Nghĩa đáp án: Hãy nhớ mang áo mưa của bạn hôm nay."}],"instant":true}]};

const completedTasks = new Set();
const scores = {};
const TOTAL_TASKS = DATA.sections.length;

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function buildNav(){
  const nav=document.getElementById('navWrap');
  nav.innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab-btn text-sm font-bold px-3 py-2 rounded-full text-slate-600${i===0?' active':''}" id="navbtn_${i}" onclick="showTab(${i})">${s.roman}. ${s.navLabel}</button>`
  ).join('');
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
