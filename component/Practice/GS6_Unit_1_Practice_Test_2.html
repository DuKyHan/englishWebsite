<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap');
  :root{ --accent:#7c3aed; --accent2:#db2777; }
  * { box-sizing: border-box; }
  body { font-family:'Nunito',sans-serif; background:#f5f3ff; }
  .hero-gradient{ background: linear-gradient(135deg, #1e1b4b 0%, #7c3aed 55%, #db2777 100%); }
  .tab-btn{ transition: all .2s ease; }
  .tab-btn.active{ background: linear-gradient(135deg, #1e1b4b, #db2777); color:#fff; box-shadow:0 4px 14px rgba(30,27,75,.35); transform:translateY(-1px); }
  .task-card{ transition: box-shadow .2s, transform .2s; }
  .task-card:hover{ transform: translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,.10); }
  .option-label{ cursor:pointer; transition: all .18s; border:2px solid #e2e8f0; }
  .option-label:hover{ border-color:var(--accent); background:#f5f3ff; }
  .option-label.selected{ border-color:#1e1b4b; background:#eef2ff; }
  .option-label.correct-opt{ border-color:#22c55e !important; background:#f0fdf4 !important; }
  .option-label.wrong-opt{ border-color:#ef4444 !important; background:#fef2f2 !important; }
  .mcq-detail-hidden{ display:none; }
  .show-mcq-detail .mcq-detail-hidden{ display:block; }
  .speak-btn{ cursor:pointer; }
  .speak-btn.speaking{ animation: pulseSpeak .7s ease-in-out infinite; }
  @keyframes pulseSpeak{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
  .vi-hidden{ display:none; }
  .explanation-box{ display:none; animation: fadeSlide .3s ease forwards; }
  .explanation-box.show{ display:block; }
  @keyframes fadeSlide{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }
  input.answer-input{ border:2px solid #cbd5e1; transition:border .18s; outline:none; background:#fff; }
  input.answer-input:focus{ border-color:var(--accent); }
  input.correct-input{ border-color:#22c55e !important; background:#f0fdf4; }
  input.wrong-input{ border-color:#ef4444 !important; background:#fef2f2; }
  .score-badge{ animation: popIn .35s cubic-bezier(.36,1.6,.6,1) forwards; }
  @keyframes popIn{ from{transform:scale(.4); opacity:0;} to{transform:scale(1); opacity:1;} }
  .confetti-wrap{ position:fixed; inset:0; pointer-events:none; z-index:9999; }
  .confetti-piece{ position:absolute; width:10px; height:10px; border-radius:2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall{ 0%{transform:translateY(-20px) rotate(0deg); opacity:1;} 100%{transform:translateY(100vh) rotate(720deg); opacity:0;} }
  .progress-bar-fill{ transition: width .6s ease; }
  .section-page{ display:none; }
  .section-page.active{ display:block; }
  #completionBanner{ display:none; }
  #completionBanner.show{ display:flex; }
  .passage-box{ background:#fff; border:1px solid #e2e8f0; border-radius:1rem; padding:1rem 1.25rem; line-height:1.9; font-size:.95rem; color:#334155; }
  .dict-box{ background:#fef9c3; border:1px solid #fde68a; border-radius:1rem; padding:1rem 1.25rem; font-size:.9rem; color:#334155; }
  .blank-tag{ background:#ede9fe; color:#5b21b6; font-weight:800; border-radius:.4rem; padding:0 .35rem; }
  .wordfam-box{ background:#f5f3ff; border:1px solid #ddd6fe; border-radius:.6rem; padding:.5rem .75rem; font-size:.75rem; color:#5b21b6; line-height:1.6; width:100%; }
</style>

<script>
const DATA = {"unit":1,"test":2,"sections":[{"roman":"I","navLabel":"Ngữ âm & Từ vựng","title":"Phát âm – Trọng âm – Từ vựng – Ngữ pháp","icon":"ear-listen","instructions":"Chọn đáp án (A, B, C hoặc D) đúng nhất.","type":"mcq","questions":[{"q":"1. Which word has the underlined part pronounced differently from that of the others?","options":["l<u>u</u>nch","m<u>u</u>sic","s<u>u</u>bject","cl<u>u</u>b"],"answer":1,"explanation":"\"music\" có \"u\" phát âm là /juː/, ba từ còn lại phát âm là /ʌ/.","ipas":["/lʌntʃ/","/ˈmjuːzɪk/","/ˈsʌbdʒɪkt/","/klʌb/"],"vis":["bữa trưa","âm nhạc","môn học","câu lạc bộ"]},{"q":"2. Which word has the underlined part pronounced differently from that of the others?","options":["<u>c</u>ycle","exer<u>c</u>ise","<u>c</u>entre","<u>c</u>ase"],"answer":3,"explanation":"\"case\" có \"c\" phát âm là /k/, ba từ còn lại (cycle, exercise, centre) có \"c\" phát âm là /s/.","ipas":["/ˈsaɪkl/","/ˈeksəsaɪz/","/ˈsentə(r)/","/keɪs/"],"vis":["chu kỳ; đi xe đạp","bài tập; tập thể dục","trung tâm","trường hợp; hộp đựng"]},{"q":"3. Which word has a different stress pattern from that of the others?","options":["ready","subject","weekend","homework"],"answer":2,"explanation":"\"weekend\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˈredi/","/ˈsʌbdʒɪkt/","/ˌwiːkˈend/","/ˈhəʊmwɜːk/"],"vis":["sẵn sàng","môn học","cuối tuần","bài tập về nhà"]},{"q":"4. Which word has a different stress pattern from that of the others?","options":["afternoon","uniform","exercise","classroom"],"answer":0,"explanation":"\"afternoon\" trọng âm rơi vào âm tiết 3, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˌɑːftəˈnuːn/","/ˈjuːnɪfɔːm/","/ˈeksəsaɪz/","/ˈklɑːsruːm/"],"vis":["buổi chiều","đồng phục","bài tập; tập thể dục","phòng học"]},{"q":"5. - A: What is your sister like?\n- B: She always has a lot of new ideas. She's a ___ person.","options":["create","creation","creative","creator"],"answer":2,"explanation":"Cần tính từ đứng trước danh từ \"person\" → creative.","vi":"A: 'Chị gái bạn là người thế nào?' – B: 'Chị ấy luôn có nhiều ý tưởng mới. Chị ấy là người rất sáng tạo.'"},{"q":"6. - A: What time do Jack and John usually get up?\n- B: They ___ at 8.00 every morning.","options":["get up","are get up","gets up","getting up"],"answer":0,"explanation":"Thì hiện tại đơn với chủ ngữ số nhiều \"they\" → get up.","vi":"A: 'Jack và John thường thức dậy lúc mấy giờ?' – B: 'Họ thức dậy lúc 8 giờ mỗi sáng.'"},{"q":"7. - A: ___ class are you in, Nam?\n- B: I'm in Class 6D.","options":["Whose","Which","When","Where"],"answer":1,"explanation":"Hỏi về sự lựa chọn trong số các lớp → Which.","vis":["của ai","cái nào, lớp nào","khi nào","ở đâu"],"vi":"A: 'Bạn học lớp nào vậy, Nam?' – B: 'Mình học lớp 6D.'"},{"q":"8. - A: May I come in, teacher?\n- B: Yes, but please ___ before entering next time.","options":["book","question","friend","knock"],"answer":3,"explanation":"\"knock\" = gõ cửa trước khi vào.","vis":["đặt trước, đặt chỗ","hỏi, câu hỏi","kết bạn với, người bạn","gõ (cửa)"],"vi":"A: 'Thưa thầy/cô, em vào được không ạ?' – B: 'Được, nhưng lần sau nhớ gõ cửa trước khi vào nhé.'"},{"q":"9. - A: Does Linh have lunch alone?\n- B: No, she ___ lunch with her best friend.","options":["always has","has always","have always","always have"],"answer":0,"explanation":"Trạng từ tần suất đứng trước động từ thường ở thì hiện tại đơn → always has.","vi":"A: 'Linh có ăn trưa một mình không?' – B: 'Không, bạn ấy luôn ăn trưa cùng bạn thân của mình.'"},{"q":"10. - A: Why is she so busy lately?\n- B: She's ___ for evening classes at the community college.","options":["rubbed","written","signed up","parked"],"answer":2,"explanation":"\"sign up for\" = đăng ký tham gia.","vis":["đã chà, xát","đã viết","đã đăng ký (tham gia)","đã đỗ xe"],"vi":"A: 'Sao dạo này bạn ấy bận vậy?' – B: 'Bạn ấy đã đăng ký học các lớp buổi tối ở trường cao đẳng cộng đồng.'"},{"q":"11. - A: What happens if students don't follow the rules?\n- B: They will be punished if they don't wear ___ at school.","options":["kindergartens","uniforms","pocket money","compasses"],"answer":1,"explanation":"\"uniforms\" = đồng phục, hợp ngữ cảnh quy định trường học.","vis":["các trường mẫu giáo","đồng phục","tiền tiêu vặt","các chiếc la bàn"],"vi":"A: 'Điều gì sẽ xảy ra nếu học sinh không tuân theo nội quy?' – B: 'Họ sẽ bị phạt nếu không mặc đồng phục ở trường.'"},{"q":"12. - A: \"When do you have English?\"\n- B: \"___\"","options":["I have English at school.","I always learn English in the library.","I have it on Monday and Friday.","I don't like English."],"answer":2,"explanation":"Câu hỏi \"When\" hỏi thời gian → trả lời bằng thứ trong tuần.","vis":["Mình học tiếng Anh ở trường.","Mình luôn học tiếng Anh trong thư viện.","Mình học môn đó vào thứ Hai và thứ Sáu.","Mình không thích tiếng Anh."],"vi":"A: 'Khi nào bạn học tiếng Anh?' – B: 'Mình học vào thứ Hai và thứ Sáu.'"},{"q":"13. - A: \"Your new school looks amazing!\"\n- B: \"___\"","options":["What's happening?","Yes, it's great!","Thanks! The same to you!","I've no idea."],"answer":1,"explanation":"Đáp lại lời khen về trường học.","vis":["Chuyện gì đang xảy ra vậy?","Ừ, nó rất tuyệt!","Cảm ơn! Bạn cũng vậy!","Mình chẳng biết gì cả."],"vi":"A: 'Trường mới của bạn trông thật tuyệt!' – B: 'Ừ, nó rất tuyệt!'"},{"q":"14. - A: \"___\"\n- B: \"Sorry, I'm late. My school bus broke down on the way here.\"","options":["Can you see the bus?","How do you go to school?","Where have you been?","Why do you go by bus?"],"answer":2,"explanation":"Câu hỏi phù hợp với câu trả lời giải thích lý do đến muộn.","vis":["Bạn có thấy xe buýt không?","Bạn đến trường bằng cách nào?","Bạn đã ở đâu vậy?","Tại sao bạn đi bằng xe buýt?"],"vi":"A: 'Bạn đã ở đâu vậy?' – B: 'Xin lỗi, mình đến muộn. Xe buýt trường bị hỏng trên đường tới đây.'"}],"instant":true},{"roman":"II","navLabel":"Biển báo","title":"Biển báo / Thông báo","icon":"traffic-light","instructions":"Đọc biển báo/thông báo và chọn ý đúng nhất.","type":"mcq","questions":[{"q":"15. What does this sign mean?","options":["This sign means this area is reserved for buses only.","This sign means all vehicles are not allowed to enter this street.","This sign means pedestrians must cross here.","This sign means all vehicles must stop here."],"answer":1,"explanation":"A. This sign means this area is reserved for buses only. — sai, biển không nói riêng cho xe buýt<br>B. This sign means all vehicles are not allowed to enter this street. — đúng, biển \"No Entry\" hình tròn đỏ có vạch ngang = cấm mọi phương tiện đi vào ✓<br>C. This sign means pedestrians must cross here. — sai, biển không dành cho người đi bộ qua đường<br>D. This sign means all vehicles must stop here. — sai, đây không phải biển dừng lại (Stop)","vis":["Biển này có nghĩa là khu vực này chỉ dành riêng cho xe buýt.","Biển này có nghĩa là tất cả các phương tiện không được phép đi vào con đường này.","Biển này có nghĩa là người đi bộ phải qua đường ở đây.","Biển này có nghĩa là tất cả các phương tiện phải dừng lại ở đây."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-white border-2 border-slate-200 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"#dc2626\"/>\n    <rect x=\"18\" y=\"42\" width=\"64\" height=\"16\" rx=\"3\" fill=\"#fff\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-slate-900 leading-tight mt-1\">NO ENTRY</p>\n</div>"},{"q":"16. What does this sign tell you?","options":["This sign means vehicles are not allowed to enter.","This sign means there is a hospital nearby.","This sign means children may be crossing; drivers should be careful.","This sign means only bicycles are allowed here."],"answer":2,"explanation":"A. This sign means vehicles are not allowed to enter. — sai, đây không phải biển cấm xe<br>B. This sign means there is a hospital nearby. — sai, không liên quan đến bệnh viện<br>C. This sign means children may be crossing; drivers should be careful. — đúng, biển tam giác cảnh báo trẻ em qua đường ✓<br>D. This sign means only bicycles are allowed here. — sai, không liên quan đến xe đạp","vis":["Biển này có nghĩa là các phương tiện không được phép đi vào.","Biển này có nghĩa là gần đây có bệnh viện.","Biển này có nghĩa là có thể có trẻ em qua đường; người lái xe nên cẩn thận.","Biển này có nghĩa là chỉ có xe đạp được phép đi ở đây."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-white border-2 border-slate-200 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <polygon points=\"50,8 94,88 6,88\" fill=\"#facc15\" stroke=\"#1e293b\" stroke-width=\"5\" stroke-linejoin=\"round\"/>\n    <circle cx=\"38\" cy=\"58\" r=\"6\" fill=\"#1e293b\"/>\n    <rect x=\"32\" y=\"66\" width=\"12\" height=\"18\" rx=\"3\" fill=\"#1e293b\"/>\n    <circle cx=\"60\" cy=\"66\" r=\"5\" fill=\"#1e293b\"/>\n    <rect x=\"55\" y=\"72\" width=\"10\" height=\"14\" rx=\"3\" fill=\"#1e293b\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-slate-900 leading-tight mt-1\">CHILDREN CROSSING</p>\n</div>"}],"instant":true},{"roman":"III","navLabel":"Điền đoạn văn","title":"Chọn từ thích hợp điền vào đoạn văn","icon":"file-lines","instructions":"Chọn đáp án đúng để hoàn thành đoạn văn.","type":"mcq","passage":{"title":"Đoạn văn về trường học của Lilly","html":"Hi! My name's Lilly Browns. I'm eleven years old. I'm now in grade 6 at Dream School. I like it here because I like to study <b>(17)</b> ___ an international school. The teachers in my school are nice and very <b>(18)</b> ___, and my favourite teacher is Mr Oily. He teaches us physics. I <b>(19)</b> ___ three hours to study Vietnamese in the afternoon. Usually I read books <b>(20)</b> ___ the library and do my homework at break time. We wear our uniforms every day, but today we <b>(21)</b> ___, as we're going to have an <b>(22)</b> ___ to the National Park.","vi":"Xin chào! Mình tên là Lilly Browns. Mình 11 tuổi. Hiện mình đang học lớp 6 tại trường Dream School. Mình thích ở đây vì mình thích học (17) ___ một ngôi trường quốc tế. Các thầy cô ở trường mình rất tốt bụng và (18) ___, và giáo viên mình yêu thích nhất là thầy Oily. Thầy dạy môn Vật lý. Mình (19) ___ ba tiếng để học tiếng Việt vào buổi chiều. Mình thường đọc sách (20) ___ thư viện và làm bài tập về nhà vào giờ ra chơi. Chúng mình mặc đồng phục mỗi ngày, nhưng hôm nay chúng mình (21) ___, vì chúng mình sắp có một chuyến (22) ___ đến Vườn Quốc gia."},"questions":[{"q":"17.","options":["at","on","for","to"],"answer":0,"explanation":"\"study at a school\" = học tại một trường.<br>A. at: tại ✓<br>B. on: về<br>C. for: cho<br>D. to: đến","vis":["tại (trong cụm \"study at\")","về, trên (chỉ ngày/chủ đề)","cho, để","đến, tới"],"vi":"...mình thích học (17) ___ một ngôi trường quốc tế."},{"q":"18.","options":["boring","helpful","quiet","difficult"],"answer":1,"explanation":"Tính từ miêu tả giáo viên tích cực → helpful.<br>A. boring: nhàm chán<br>B. helpful: nhiệt tình, hay giúp đỡ ✓<br>C. quiet: trầm tính<br>D. difficult: khó tính","vis":["nhàm chán","nhiệt tình, hay giúp đỡ","trầm tính, yên lặng","khó tính, khó khăn"],"vi":"Các thầy cô ở trường mình rất tốt bụng và (18) ___."},{"q":"19.","options":["take","give","spend","pass"],"answer":2,"explanation":"\"spend + time + V-ing\" = dành thời gian làm gì.<br>A. take: lấy, mất (thời gian, chủ ngữ khác)<br>B. give: cho<br>C. spend: dành (thời gian) ✓<br>D. pass: trôi qua, vượt qua","vis":["lấy, mất (thời gian)","cho, đưa","dành (thời gian)","trôi qua, vượt qua"],"vi":"Mình (19) ___ ba tiếng để học tiếng Việt vào buổi chiều."},{"q":"20.","options":["context","classroom","subjects","library"],"answer":3,"explanation":"\"read books in the library\" = đọc sách trong thư viện.<br>A. context: ngữ cảnh<br>B. classroom: phòng học<br>C. subjects: môn học<br>D. library: thư viện ✓","vis":["ngữ cảnh","phòng học","các môn học","thư viện"],"vi":"Mình thường đọc sách (20) ___ thư viện..."},{"q":"21.","options":["don't","aren't","didn't","haven't"],"answer":1,"explanation":"\"We aren't\" = chúng tôi không (phủ định của \"to be\" trong ngữ cảnh hôm nay).<br>A. don't: hiện tại đơn phủ định<br>B. aren't: phủ định của \"to be\" ✓<br>C. didn't: quá khứ đơn phủ định<br>D. haven't: hiện tại hoàn thành phủ định","vis":["trợ động từ phủ định thì hiện tại đơn","phủ định của động từ \"to be\"","trợ động từ phủ định thì quá khứ đơn","trợ động từ phủ định thì hiện tại hoàn thành"],"vi":"...nhưng hôm nay chúng mình (21) ___."},{"q":"22.","options":["outing","exercise","activity","energy"],"answer":0,"explanation":"\"an outing to the National Park\" = một chuyến đi chơi đến công viên quốc gia.<br>A. outing: chuyến đi chơi ✓<br>B. exercise: bài tập, sự luyện tập<br>C. activity: hoạt động<br>D. energy: năng lượng","vis":["chuyến đi chơi, chuyến dã ngoại","bài tập, sự luyện tập","hoạt động","năng lượng"],"vi":"...vì chúng mình sắp có một chuyến (22) ___ đến Vườn Quốc gia."}],"instant":true},{"roman":"IV","navLabel":"Đọc hiểu","title":"Đọc hiểu","icon":"book-open","instructions":"Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.","type":"mcq","passage":{"title":"After-school Activities","html":"The Vietnamese students take part in different after-school activities. Some students play sports. They often play soccer, table tennis or badminton. Sometimes they go swimming in the swimming pools. Some students like music, drama and movies. They often practice playing musical instruments in the school music room. They join the school theatre group and usually rehearse plays. Some are members of the stamp collectors club. They often get together and talk about their stamps. A few students stay at home and play video games or computer games. Most of them enjoy their activities after school hours because they can take a rest and follow their interests.","vi":"Học sinh Việt Nam tham gia nhiều hoạt động ngoại khóa khác nhau sau giờ học. Một số học sinh chơi thể thao. Các bạn ấy thường chơi bóng đá, bóng bàn hoặc cầu lông. Thỉnh thoảng các bạn đi bơi ở hồ bơi. Một số học sinh thích âm nhạc, kịch và phim ảnh. Các bạn ấy thường luyện tập chơi nhạc cụ trong phòng âm nhạc của trường. Các bạn tham gia câu lạc bộ kịch của trường và thường xuyên tập diễn kịch. Một số là thành viên câu lạc bộ sưu tầm tem. Các bạn ấy thường tụ họp và nói chuyện về những con tem của mình. Một vài học sinh ở nhà và chơi trò chơi điện tử hoặc trò chơi máy tính. Hầu hết các bạn đều thích các hoạt động sau giờ học vì có thể nghỉ ngơi và theo đuổi sở thích của mình."},"questions":[{"q":"23. Vietnamese students only play sports after school.","options":["True","False"],"answer":1,"explanation":"Bài đọc nêu nhiều hoạt động khác nhau, không chỉ thể thao.","vis":["Đúng","Sai"],"vi":"Học sinh Việt Nam chỉ chơi thể thao sau giờ học."},{"q":"24. Students can practice musical instruments in the school music room.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"practice playing musical instruments in the school music room\".","vis":["Đúng","Sai"],"vi":"Học sinh có thể luyện tập nhạc cụ trong phòng âm nhạc của trường."},{"q":"25. Members of the stamp collectors club usually talk about their stamps when they meet.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"get together and talk about their stamps\".","vis":["Đúng","Sai"],"vi":"Các thành viên câu lạc bộ sưu tầm tem thường nói chuyện về tem khi gặp nhau."},{"q":"26. All Vietnamese students stay at home and play video games after school.","options":["True","False"],"answer":1,"explanation":"Chỉ \"a few students\", không phải tất cả.","vis":["Đúng","Sai"],"vi":"Tất cả học sinh Việt Nam đều ở nhà chơi trò chơi điện tử sau giờ học."},{"q":"27. What do students in the school theatre group usually do?","options":["Play soccer","Rehearse plays","Collect stamps","Play computer games"],"answer":1,"explanation":"Bài đọc: \"usually rehearse plays\".","vis":["Chơi bóng đá","Tập diễn kịch","Sưu tầm tem","Chơi trò chơi điện tử"],"vi":"Các bạn trong câu lạc bộ kịch của trường thường làm gì?"},{"q":"28. Why do most students like their after-school activities?","options":["Because they can relax and do what they like.","Because they want to get good marks.","Because they don't have any homework.","Because they can eat their favorite food."],"answer":0,"explanation":"Bài đọc: \"they can take a rest and follow their interests\".","vis":["Vì các bạn ấy có thể thư giãn và làm điều mình thích.","Vì các bạn ấy muốn đạt điểm cao.","Vì các bạn ấy không có bài tập về nhà.","Vì các bạn ấy có thể ăn món ăn yêu thích."],"vi":"Tại sao hầu hết học sinh thích các hoạt động sau giờ học của mình?"}],"instant":true},{"roman":"V","navLabel":"Từ loại","title":"Cho dạng đúng của từ trong ngoặc","icon":"spell-check","instructions":"Điền dạng đúng của từ trong ngoặc vào chỗ trống.","type":"fill","questions":[{"q":"29. My sister is very ___. She has many new ideas.","answer":"creative","explanation":"Tính từ đứng sau 'very' → creative.","hint":"(CREATE)","vi":"Chị gái tôi rất sáng tạo. Chị ấy có nhiều ý tưởng mới.","family":["create (v): tạo ra, sáng tạo","creative (adj): sáng tạo, có óc sáng tạo","creation (n): sự sáng tạo, tác phẩm sáng tạo","creativity (n): tính sáng tạo"]},{"q":"30. The teachers in my new school are nice and ___.","answer":"helpful","explanation":"Tính từ: help + ful → helpful.","hint":"(HELP)","vi":"Các thầy cô ở trường mới của tôi rất tốt bụng và hay giúp đỡ.","family":["help (v/n): giúp đỡ; sự giúp đỡ","helpful (adj): hay giúp đỡ, có ích","helpless (adj): bất lực, không thể tự lo cho mình","helper (n): người giúp đỡ"]},{"q":"31. We are ___ to study in an international school.","answer":"excited","explanation":"be + tính từ đuôi -ed diễn tả cảm xúc → excited.","hint":"(EXCITE)","vi":"Chúng tôi rất phấn khích khi được học ở một trường quốc tế.","family":["excite (v): kích thích, làm hào hứng","excited (adj): hào hứng, phấn khích (chỉ người)","exciting (adj): thú vị, hào hứng (chỉ sự việc)","excitement (n): sự hào hứng, phấn khích"]},{"q":"32. The school is located in a ___ area.","answer":"peaceful","explanation":"Tính từ: peace + ful → peaceful.","hint":"(PEACE)","vi":"Trường nằm ở một khu vực yên bình.","family":["peace (n): sự yên bình, hòa bình","peaceful (adj): yên bình, thanh bình","peacefully (adv): một cách yên bình"]},{"q":"33. There are three ___ and a swimming pool in my school.","answer":"buildings","explanation":"Danh từ số nhiều: build + ing(s) → buildings.","hint":"(BUILD)","vi":"Trường tôi có ba tòa nhà và một hồ bơi.","family":["build (v): xây dựng","building (n): tòa nhà","builder (n): thợ xây, người xây dựng"]},{"q":"34. We wear our ___ every day at school.","answer":"uniforms","explanation":"Danh từ số nhiều: uniform → uniforms.","hint":"(UNIFORM)","vi":"Chúng tôi mặc đồng phục mỗi ngày ở trường.","family":["uniform (n): đồng phục","uniformed (adj): mặc đồng phục","uniformly (adv): một cách đồng đều, giống nhau"]}]},{"roman":"VI","navLabel":"Từ điển","title":"Tra từ điển \"boarding school\"","icon":"book-bookmark","instructions":"Dựa vào mục từ điển, hoàn thành câu (không quá 3 từ).","type":"fill","dict":{"word":"boarding school","ipa":"/ˈbɔːdɪŋ skuːl/","pos":"noun","senses":[{"def":"a school where students can live during the school term.","examples":["Life at boarding school can be difficult for students who miss their families.","He is currently attending a boarding school in the countryside.","My cousin stays at a boarding school during the week and comes home on weekends."]}],"vi":"<b>boarding school</b> /ˈbɔːdɪŋ skuːl/ (danh từ)<br>1. [C] một ngôi trường nơi học sinh có thể ở lại trong suốt học kỳ.<br>• Cuộc sống ở trường nội trú có thể khó khăn đối với những học sinh nhớ gia đình.<br>• Cậu ấy hiện đang học tại một trường nội trú ở vùng quê.<br>• Anh họ của tôi ở lại trường nội trú trong tuần và về nhà vào cuối tuần."},"questions":[{"q":"35. Many students feel homesick when they first start living ___.","answer":"at boarding school","explanation":"Dựa vào ví dụ 1: at boarding school.","vi":"Nhiều học sinh cảm thấy nhớ nhà khi lần đầu bắt đầu sống ở trường nội trú."},{"q":"36. Some children start to ___ at a very young age to learn how to be independent.","answer":"attend boarding school","explanation":"Dựa vào ví dụ 2: attend a boarding school → attend boarding school.","vi":"Một số trẻ em bắt đầu học nội trú từ khi còn rất nhỏ để học cách tự lập."}]},{"roman":"VII","navLabel":"Viết lại câu","title":"Viết lại câu sao cho nghĩa không đổi","icon":"pen-to-square","instructions":"Viết lại câu, giữ nguyên nghĩa với câu gốc.","type":"sentence","questions":[{"q":"37.","answer":"to work by car","explanation":"drive to work = go to work by car.","original":"My father usually drives to work.","starter":"My father usually goes","vi":"Bố tôi thường lái xe đi làm.","note":"drive to work → go to work by car<br>Nghĩa đáp án: Bố tôi thường đi làm bằng ô tô."},{"q":"38.","answer":"goes fishing in the winter","explanation":"doesn't + V = never + V(s/es), giữ nguyên nghĩa phủ định.","original":"Peter doesn't go fishing in the winter.","starter":"Peter never","vi":"Peter không đi câu cá vào mùa đông.","note":"doesn't + V → never + V(s/es)<br>Nghĩa đáp án: Peter không bao giờ đi câu cá vào mùa đông."},{"q":"39.","answer":"has thirty-two students","explanation":"There are... in + N chuyển thành N + has...","original":"There are thirty-two students in Linh's class.","starter":"Linh's class","vi":"Có ba mươi hai học sinh trong lớp của Linh.","note":"There are... in + N → N + has...<br>Nghĩa đáp án: Lớp của Linh có ba mươi hai học sinh."},{"q":"40.","answer":"drinking coffee in the morning","explanation":"habit is + V-ing = thói quen là làm gì.","original":"My dad usually drinks coffee in the morning.","starter":"My dad's habit is","vi":"Bố tôi thường uống cà phê vào buổi sáng.","note":"S + usually + V → S's habit is + V-ing<br>Nghĩa đáp án: Thó const completedTasks = new Set();
const scores = {};
const TOTAL_TASKS = DATA.sections.length;

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function buildNav(){
  const nav=document.getElementById('navWrap');
  nav.innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab-btn text-sm font-bold px-3 py-2 rounded-full text-slate-600${i===0?' active':''}" id="navbtn_${i}" onclick="showTab(${i})">${s.roman}. ${s.navLabel}</button>`
  ).join('');
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
