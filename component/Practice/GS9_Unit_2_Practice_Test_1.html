<style>

  :root{ --accent:#0369a1; --accent2:#06b6d4; }
  * { box-sizing: border-box; }

  .option-label:hover{ border-color:var(--accent); background:#f5f3ff; }
  .option-label.selected{ border-color:#1e1b4b; background:#eef2ff; }

  .option-label.wrong-opt{ border-color:#ef4444 !important; background:#fef2f2 !important; }

  .show-mcq-detail .mcq-detail-hidden{ display:block; }
  .speak-btn{ cursor:pointer; }
  .speak-btn.speaking{ animation: pulseSpeak .7s ease-in-out infinite; }
  @keyframes pulseSpeak{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
  .vi-hidden{ display:none; }
  .explanation-box{ display:none; animation: fadeSlide .3s ease forwards; }
  .explanation-box.show{ display:block; }
  @keyframes fadeSlide{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }
  input.answer-input{ border:2px solid #cbd5e1; transition:border .18s; outline:none; background:#fff; }
  input.answer-input:focus{ border-color:var(--accent); }
  input.correct-input{ border-color:#22c55e !important; background:#f0fdf4; }
  input.wrong-input{ border-color:#ef4444 !important; background:#fef2f2; }
  .score-badge{ animation: popIn .35s cubic-bezier(.36,1.6,.6,1) forwards; }
  @keyframes popIn{ from{transform:scale(.4); opacity:0;} to{transform:scale(1); opacity:1;} }
  .confetti-wrap{ position:fixed; inset:0; pointer-events:none; z-index:9999; }
  .confetti-piece{ position:absolute; width:10px; height:10px; border-radius:2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall{ 0%{transform:translateY(-20px) rotate(0deg); opacity:1;} 100%{transform:translateY(100vh) rotate(720deg); opacity:0;} }
  .progress-bar-fill{ transition: width .6s ease; }
  .section-page{ display:none; }
  .section-page.active{ display:block; }
  #completionBanner{ display:none; }
  #completionBanner.show{ display:flex; }
  .passage-box{ background:#fff; border:1px solid #e2e8f0; border-radius:1rem; padding:1rem 1.25rem; line-height:1.9; font-size:.95rem; color:#334155; }
  .dict-box{ background:#fef9c3; border:1px solid #fde68a; border-radius:1rem; padding:1rem 1.25rem; font-size:.9rem; color:#334155; }
  .blank-tag{ background:#ede9fe; color:#5b21b6; font-weight:800; border-radius:.4rem; padding:0 .35rem; }
  .wordfam-box{ background:#f5f3ff; border:1px solid #ddd6fe; border-radius:.6rem; padding:.5rem .75rem; font-size:.75rem; color:#5b21b6; line-height:1.6; width:100%; }

<script>
const DATA = {"unit":2,"test":1,"sections":[{"roman":"I","navLabel":"Ngữ âm & Từ vựng","title":"Phát âm – Trọng âm – Từ vựng – Ngữ pháp","icon":"ear-listen","instructions":"Chọn đáp án (A, B, C hoặc D) đúng nhất.","type":"mcq","questions":[{"q":"1. Which word has the underlined part pronounced differently from that of the others?","options":["d<u>ow</u>ntown","sl<u>ow</u>ly","cr<u>ow</u>ded","p<u>ow</u>er"],"answer":1,"explanation":"\"slowly\" phát âm /əʊ/, ba từ còn lại phát âm /aʊ/.","ipas":["/ˌdaʊnˈtaʊn/","/ˈsləʊli/","/ˈkraʊdɪd/","/ˈpaʊə(r)/"],"vis":["trung tâm thành phố","một cách chậm rãi","đông đúc","quyền lực; năng lượng"]},{"q":"2. Which word has the underlined part pronounced differently from that of the others?","options":["pr<u>o</u>duce","m<u>o</u>dern","p<u>o</u>llute","c<u>o</u>ngested"],"answer":0,"explanation":"\"produce\" phát âm /ə/ nhẹ ở âm đầu, ba từ còn lại phát âm /ɒ/.","ipas":["/prəˈdjuːs/","/ˈmɒdn/","/pəˈluːt/","/kənˈdʒestɪd/"],"vis":["sản xuất, gây ra","hiện đại","làm ô nhiễm","tắc nghẽn, đông nghẹt"]},{"q":"3. Which word has a different stress pattern from that of the others?","options":["forbidden","reliable","variety","fabulous"],"answer":3,"explanation":"\"fabulous\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.","ipas":["/fəˈbɪdn/","/rɪˈlaɪəbl/","/vəˈraɪəti/","/ˈfæbjələs/"],"vis":["bị cấm","đáng tin cậy","sự đa dạng","tuyệt vời"]},{"q":"4. Which word has a different stress pattern from that of the others?","options":["metro","process","pricey","advance"],"answer":3,"explanation":"\"advance\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˈmetrəʊ/","/ˈprəʊses/","/ˈpraɪsi/","/ədˈvɑːns/"],"vis":["tàu điện ngầm","quá trình","đắt đỏ","tiến bộ; sự tiến lên"]},{"q":"5. A: Do you like taking the sky train during the day?\nB: Not really. It is usually ___ with commuters at rush hour.","options":["packed","interesting","full","busy"],"answer":0,"explanation":"\"packed with\" = chật kín người.","vis":["chật kín người","thú vị","đầy","bận rộn, đông đúc"],"vi":"A: 'Bạn có thích đi tàu trên cao vào ban ngày không?' – B: 'Không hẳn. Nó thường chật kín người đi làm vào giờ cao điểm.'"},{"q":"6. A: Why do you want to move out of the suburbs?\nB: Because it is often more ___ to live in the downtown area.","options":["silent","peaceful","quiet","convenient"],"answer":3,"explanation":"Sống ở trung tâm thường tiện lợi hơn → convenient.","vis":["yên lặng","yên bình","yên tĩnh","tiện lợi"],"vi":"A: 'Tại sao bạn muốn chuyển ra khỏi ngoại ô?' – B: 'Vì sống ở khu trung tâm thường tiện lợi hơn.'"},{"q":"7. A: I think the new bus system is great.\nB: I agree. The ___ the public transport is, the easier it is for residents to get around.","options":["more reliably","less reliable","reliably","more reliable"],"answer":3,"explanation":"Cấu trúc so sánh kép: The more reliable... the easier...","vi":"A: 'Mình nghĩ hệ thống xe buýt mới rất tuyệt.' – B: 'Mình đồng ý. Giao thông công cộng càng đáng tin cậy thì người dân càng dễ dàng đi lại.'"},{"q":"8. A: Do you often go to the city museum on weekends?\nB: Not really. I can't ___ the noise and the crowds in that area.","options":["keep up with","put up with","face up to","get on with"],"answer":1,"explanation":"\"put up with\" = chịu đựng.","vis":["theo kịp","chịu đựng","đối mặt với","hòa hợp với"],"vi":"A: 'Bạn có thường đến bảo tàng thành phố vào cuối tuần không?' – B: 'Không hẳn. Mình không chịu nổi tiếng ồn và đám đông ở khu vực đó.'"},{"q":"9. A: Did you buy some milk for breakfast?\nB: Oh no! I forgot. We've ___ all the milk in the fridge.","options":["set up","run out of","got along","put up with"],"answer":1,"explanation":"\"run out of\" = hết sạch.","vis":["thiết lập","hết sạch, cạn kiệt","hòa hợp (quá khứ của get along)","chịu đựng"],"vi":"A: 'Bạn có mua sữa cho bữa sáng không?' – B: 'Ôi không! Mình quên mất. Nhà mình đã hết sạch sữa trong tủ lạnh rồi.'"},{"q":"10. A: Why were you late for the English class this morning?\nB: Sorry. During ___, the traffic is always heavy and slow-moving.","options":["concrete jungle","rush hour","public transport","high crime rate"],"answer":1,"explanation":"\"rush hour\" = giờ cao điểm.","vis":["khu rừng bê tông (đô thị đông đúc)","giờ cao điểm","giao thông công cộng","tỷ lệ tội phạm cao"],"vi":"A: 'Sao sáng nay bạn đến lớp tiếng Anh muộn vậy?' – B: 'Xin lỗi. Vào giờ cao điểm, giao thông lúc nào cũng đông đúc và di chuyển chậm.'"},{"q":"11. A: How do you feel about the new traffic plan?\nB: ___ smoother the traffic flow is, the better the commute for workers.","options":["A","X (no article)","The","An"],"answer":2,"explanation":"Cấu trúc so sánh kép luôn có \"The\" ở đầu mỗi vế: The smoother..., the better...","vi":"A: 'Bạn thấy kế hoạch giao thông mới thế nào?' – B: 'Giao thông càng thông thoáng thì việc đi lại của người lao động càng tốt hơn.'"},{"q":"12. A: Would you mind opening the window for some fresh air?\nB: \"___\"","options":["Yes, you can","Yes, I'd love to","Not at all","I agree with you"],"answer":2,"explanation":"Trả lời cho \"Would you mind...?\" bằng cách đồng ý: Not at all.","vis":["Được, bạn có thể.","Vâng, tôi rất thích.","Không phiền chút nào.","Tôi đồng ý với bạn."],"vi":"A: 'Bạn có phiền mở cửa sổ để lấy chút không khí trong lành không?' – B: 'Không phiền chút nào.'"},{"q":"13. A: Have a wonderful trip to the City Life Festival!\nB: \"___\"","options":["What's happening?","I've no idea.","OK, we do, too.","Thanks! The same to you!"],"answer":3,"explanation":"Đáp lại lời chúc bằng lời chúc tương tự.","vis":["Có chuyện gì vậy?","Tôi không biết.","Được, chúng tôi cũng vậy.","Cảm ơn! Bạn cũng vậy nhé!"],"vi":"A: 'Chúc bạn có một chuyến đi tuyệt vời đến Lễ hội City Life nhé!' – B: 'Cảm ơn! Bạn cũng vậy nhé!'"},{"q":"14. A: I heard the city has a high crime rate. Is it safe?\nB: \"___\"","options":["Let's go to the park now.","I don't like public transport.","Actually, some areas are not safe because of that.","Yes, the city next two days.","Put this soup in the fridge as soon as you buy it."],"answer":1,"vis":["Nếu bạn mở hộp súp này, bạn không nên để trong tủ lạnh.","Nếu bạn mở hộp súp này, chỉ bảo quản trong tủ lạnh trong hai ngày.","Bạn phải mở và ăn hết hộp súp này trong hai ngày tới.","Hãy cho hộp súp này vào tủ lạnh ngay khi mua về."],"explanation":"Nhãn hướng dẫn: sau khi mở, bảo quản lạnh và dùng trong vòng 2 ngày.","image":"<div class=\"inline-flex flex-col items-center w-40 bg-white border-2 border-slate-200 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <rect x=\"30\" y=\"18\" width=\"40\" height=\"64\" rx=\"4\" fill=\"#dc2626\"/>\n    <rect x=\"30\" y=\"18\" width=\"40\" height=\"18\" rx=\"4\" fill=\"#7f1d1d\"/>\n    <ellipse cx=\"50\" cy=\"18\" rx=\"20\" ry=\"5\" fill=\"#fca5a5\"/>\n    <ellipse cx=\"50\" cy=\"82\" rx=\"20\" ry=\"5\" fill=\"#991b1b\"/>\n    <circle cx=\"50\" cy=\"56\" r=\"13\" fill=\"#fff\"/>\n    <path d=\"M50 46v20M42 56h16M45 49l10 14M55 49l-10 14\" stroke=\"#0369a1\" stroke-width=\"2\" stroke-linecap=\"round\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-slate-900 leading-tight mt-1\">KEEP REFRIGERATED&nbsp;/ USE WITHIN 2 DAYS</p>\n</div>"}],"instant":true},{"roman":"III","navLabel":"Điền đoạn văn","title":"Chọn từ thích hợp điền vào đoạn văn","icon":"file-lines","instructions":"Chọn đáp án đúng để hoàn thành đoạn văn.","type":"mcq","passage":{"title":"The city is known for its lively atmosphere","html":"The city is known (17)___ its lively atmosphere and diverse population. (18)___ the high cost of living, many people find the urban environment stimulating. The city's landscape is filled with (19)___ landmarks and modern architecture. Despite the hustle and bustle of daily life, residents often find solace in the city's green spaces. The vibrant energy of the city (20)___ it an appealing place for those (21)___ enjoy an active lifestyle. Whether you're looking for excitement (22)___ relaxation, the city provides plenty of options.","vi":"Thành phố được biết đến (17)___ bầu không khí sôi động và dân cư đa dạng. (18)___ chi phí sinh hoạt cao, nhiều người vẫn thấy môi trường đô thị này thú vị. Cảnh quan thành phố tràn ngập những công trình (19)___ mang tính lịch sử và kiến trúc hiện đại. Dù cuộc sống hằng ngày bận rộn và ồn ào, cư dân thường tìm thấy sự bình yên trong các không gian xanh của thành phố. Năng lượng sôi động của thành phố (20)___ nó trở thành một nơi hấp dẫn đối với những người (21)___ thích lối sống năng động. Dù bạn đang tìm kiếm sự phấn khích (22)___ sự thư giãn, thành phố đều mang đến nhiều lựa chọn."},"questions":[{"q":"17.","options":["as","for","with","to"],"answer":1,"explanation":"\"be known for\" = được biết đến vì.","vis":["là, với vai trò là","vì (thuộc cụm \"known for\")","với, cùng với","đến, cho"],"vi":"Thành phố được biết đến (17)___ bầu không khí sôi động và dân cư đa dạng."},{"q":"18.","options":["Although","Because","Despite","In spite"],"answer":2,"explanation":"\"Despite + N\" = mặc dù có (chi phí sinh hoạt cao).","vis":["mặc dù (theo sau là mệnh đề)","bởi vì (theo sau là mệnh đề)","mặc dù (theo sau là danh từ/cụm danh từ)","mặc dù (cần thêm \"of\" mới đúng cấu trúc)"],"vi":"(18)___ chi phí sinh hoạt cao, nhiều người vẫn thấy môi trường đô thị này thú vị."},{"q":"19.","options":["historic","history","historical","historian"],"answer":0,"explanation":"Tính từ đứng trước danh từ \"landmarks\" → historic.","vis":["mang tính lịch sử, cổ kính (tính từ)","lịch sử (danh từ)","thuộc về lịch sử (tính từ)","nhà sử học (danh từ)"],"vi":"Cảnh quan thành phố tràn ngập những công trình (19)___ mang tính lịch sử và kiến trúc hiện đại."},{"q":"20.","options":["makes","puts","takes","make"],"answer":0,"explanation":"Chủ ngữ số ít \"energy\" → makes.","vis":["khiến, làm cho (đúng chia theo chủ ngữ số ít)","đặt","lấy, cần","khiến, làm cho (sai - thiếu \"s\")"],"vi":"Năng lượng sôi động của thành phố (20)___ nó trở thành một nơi hấp dẫn."},{"q":"21.","options":["which","who","whom","whose"],"answer":1,"explanation":"Mệnh đề quan hệ chỉ người: \"those who enjoy...\" → who.","vis":["cái mà (chỉ vật)","người mà (chỉ người, làm chủ ngữ)","người mà (chỉ người, làm tân ngữ)","của ai (chỉ sở hữu)"],"vi":"...đối với những người (21)___ thích lối sống năng động."},{"q":"22.","options":["and","or","but","nor"],"answer":1,"explanation":"\"excitement or relaxation\" = sự phấn khích hoặc thư giãn.","vis":["và","hoặc","nhưng","cũng không"],"vi":"Dù bạn đang tìm kiếm sự phấn khích (22)___ sự thư giãn, thành phố đều mang đến nhiều lựa chọn."}],"instant":true},{"roman":"IV","navLabel":"Đọc hiểu","title":"Đọc hiểu","icon":"book-open","instructions":"Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.","type":"mcq","passage":{"title":"Public Transportation in City Life","html":"One of the most important aspects of city life is public transportation. Efficient public transport systems can greatly enhance the quality of life for city dwellers by reducing traffic congestion and pollution. Many large cities have developed extensive networks of buses, trains, and subways to help people get around quickly and affordably.\n\nIn cities like Tokyo and New York, public transportation is an essential part of daily life. The Tokyo subway system is known for its punctuality and cleanliness, transporting millions of passengers every day. Similarly, New York's subway system, though older and less reliable, is crucial for the mobility of its residents. Public transportation not only benefits individuals but also has a positive impact on the environment. By reducing the number of private vehicles on the road, public transport systems help to lower emissions and decrease the city's carbon footprint. Additionally, using public transportation can be more economical for residents, saving money on fuel and parking fees.\n\nHowever, public transportation systems also face challenges. In many cities, aging infrastructure and lack of funding can lead to delays and overcrowding. Safety and cleanliness are other concerns that need to be addressed to make public transport more appealing to users.\n\nDespite these issues, the advantages of public transportation in city life are clear. Investments in modernizing and expanding public transport can lead to significant improvements in urban living conditions. Encouraging the use of public transportation is essential for the sustainable development of cities.\n(Adapted from: https://www.gotokyo.org)","vi":"Một trong những khía cạnh quan trọng nhất của đời sống đô thị là giao thông công cộng. Các hệ thống giao thông công cộng hiệu quả có thể nâng cao đáng kể chất lượng cuộc sống của cư dân thành phố bằng cách giảm tắc nghẽn giao thông và ô nhiễm. Nhiều thành phố lớn đã phát triển mạng lưới xe buýt, tàu hỏa và tàu điện ngầm rộng khắp để giúp người dân di chuyển nhanh chóng và tiết kiệm chi phí.\n\nỞ những thành phố như Tokyo và New York, giao thông công cộng là một phần thiết yếu của cuộc sống hằng ngày. Hệ thống tàu điện ngầm Tokyo nổi tiếng vì sự đúng giờ và sạch sẽ, vận chuyển hàng triệu lượt hành khách mỗi ngày. Tương tự, hệ thống tàu điện ngầm của New York, tuy cũ hơn và kém tin cậy hơn, vẫn đóng vai trò thiết yếu đối với việc di chuyển của cư dân. Giao thông công cộng không chỉ mang lại lợi ích cho cá nhân mà còn có tác động tích cực đến môi trường. Bằng cách giảm số lượng phương tiện cá nhân trên đường, hệ thống giao thông công cộng giúp giảm lượng khí thải và giảm dấu chân carbon của thành phố. Ngoài ra, việc sử dụng giao thông công cộng còn giúp cư dân tiết kiệm hơn về mặt kinh tế, tiết kiệm tiền xăng và phí đỗ xe.\n\nTuy nhiên, các hệ thống giao thông công cộng cũng phải đối mặt với nhiều thách thức. Ở nhiều thành phố, cơ sở hạ tầng xuống cấp và thiếu kinh phí có thể dẫn đến chậm trễ và quá tải. An toàn và vệ sinh cũng là những vấn đề cần được giải quyết để giao thông công cộng trở nên hấp dẫn hơn với người sử dụng.\n\nBất chấp những vấn đề này, lợi ích của giao thông công cộng đối với đời sống đô thị là rõ ràng. Đầu tư vào việc hiện đại hóa và mở rộng giao thông công cộng có thể mang lại những cải thiện đáng kể cho điều kiện sống đô thị. Khuyến khích sử dụng giao thông công cộng là điều cần thiết cho sự phát triển bền vững của các thành phố.\n(Phỏng theo: https://www.gotokyo.org)"},"questions":[{"q":"23. Efficient public transport systems help reduce pollution and traffic jams in cities.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"can greatly enhance the quality of life... by reducing traffic congestion and pollution\" → Đúng.","vis":["Đúng","Sai"],"vi":"Các hệ thống giao thông công cộng hiệu quả giúp giảm ô nhiễm và tắc nghẽn giao thông trong thành phố."},{"q":"24. The New York subway system is famous for being cleaner and more punctual than the Tokyo subway system.","options":["True","False"],"answer":1,"explanation":"Bài đọc: ngược lại, Tokyo nổi tiếng sạch sẽ, đúng giờ; New York cũ hơn và kém tin cậy hơn → Sai.","vis":["Đúng","Sai"],"vi":"Hệ thống tàu điện ngầm New York nổi tiếng sạch sẽ và đúng giờ hơn hệ thống tàu điện ngầm Tokyo."},{"q":"25. People can save money on fuel and parking fees by using public transport.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"saving money on fuel and parking fees\" → Đúng.","vis":["Đúng","Sai"],"vi":"Người dân có thể tiết kiệm tiền xăng và phí đỗ xe khi sử dụng giao thông công cộng."},{"q":"26. Public transportation systems in large cities currently do not face any problems or difficulties.","options":["True","False"],"answer":1,"explanation":"Bài đọc: \"aging infrastructure and lack of funding can lead to delays and overcrowding\" → Sai.","vis":["Đúng","Sai"],"vi":"Các hệ thống giao thông công cộng ở các thành phố lớn hiện nay không gặp bất kỳ vấn đề hay khó khăn nào."},{"q":"27. What is the main idea of the passage?","options":["The histories and developments of the subways in Tokyo and New York.","The importance, benefits, and challenges of public transportation in cities.","The negative effects of private vehicles on the environment of large cities.","The solutions to solve the problem of aging infrastructure in modern areas."],"answer":1,"explanation":"Bài đọc bàn tổng quát về tầm quan trọng, lợi ích và thách thức của giao thông công cộng.","vis":["Lịch sử và sự phát triển của hệ thống tàu điện ngầm ở Tokyo và New York.","Tầm quan trọng, lợi ích và thách thức của giao thông công cộng ở các thành phố.","Tác động tiêu cực của phương tiện cá nhân đến môi trường ở các thành phố lớn.","Các giải pháp để giải quyết vấn đề cơ sở hạ tầng xuống cấp ở khu vực hiện đại."],"vi":"Ý chính của đoạn văn là gì?"},{"q":"28. Which of the following is NOT true according to the passage?","options":["Tokyo's subway system transports millions of people every single day.","Public transportation helps to lower the carbon footprint of a city.","New York's subway system is brand new and completely reliable.","Lack of funding can cause overcrowding and delays in public transit."],"answer":2,"explanation":"Bài đọc: hệ thống tàu điện ngầm New York \"older and less reliable\" chứ không phải mới và đáng tin cậy hoàn toàn → mâu thuẫn với bài đọc.","vis":["Hệ thống tàu điện ngầm Tokyo vận chuyển hàng triệu người mỗi ngày.","Giao thông công cộng giúp giảm dấu chân carbon của thành phố.","Hệ thống tàu điện ngầm New York hoàn toàn mới và đáng tin cậy tuyệt đối.","Thiếu kinh phí có thể gây quá tải và chậm trễ trong giao thông công cộng."],"vi":"Ý nào sau đây KHÔNG đúng theo đoạn văn?"}],"instant":true},{"roman":"V","navLabel":"Từ loại","title":"Cho dạng đúng của từ trong ngoặc","icon":"spell-check","instructions":"Điền dạng đúng của từ trong ngoặc vào chỗ trống.","type":"fill","questions":[{"q":"29. The city is ___ for its lively atmosphere and diverse population.","answer":"famous","explanation":"Tính từ: fame → famous (nổi tiếng).","hint":"(fame)","vi":"Thành phố này nổi tiếng vì bầu không khí sôi động và dân cư đa dạng.","family":["fame (n): danh tiếng","famous (adj): nổi tiếng","famously (adv): một cách nổi tiếng"]},{"q":"30. The ___ of good and reliable health services is important in city life.","answer":"availability","explanation":"Danh từ: available → availability (tính sẵn có).","hint":"(available)","vi":"Tính sẵn có của các dịch vụ y tế tốt và đáng tin cậy rất quan trọng trong đời sống đô thị.","family":["available (adj): có sẵn, sẵn có","availability (n): tính sẵn có","avail (v): có ích, giúp ích"]},{"q":"31. Public amenities make the town a ___ place for residents.","answer":"liveable","explanation":"Tính từ: live → liveable (đáng sống).","hint":"(live)","vi":"Các tiện ích công cộng khiến thị trấn trở thành nơi đáng sống cho cư dân.","family":["live (v): sống","liveable/livable (adj): đáng sống, có thể sống được","living (n/adj): cuộc sống; đang sống"]},{"q":"32. Many people find the city ___ because of its vibrant energy.","answer":"appealing","explanation":"Tính từ: appeal + ing → appealing (hấp dẫn).","hint":"(appeal)","vi":"Nhiều người thấy thành phố này hấp dẫn vì năng lượng sôi động của nó.","family":["appeal (v/n): hấp dẫn, thu hút; sự hấp dẫn","appealing (adj): hấp dẫn, lôi cuốn"]},{"q":"33. We have discovered a ___ of parks and entertainment options.","answer":"variety","explanation":"Danh từ: various → variety (sự đa dạng).","hint":"(various)","vi":"Chúng tôi đã khám phá ra sự đa dạng của các công viên và lựa chọn giải trí.","family":["various (adj): đa dạng, nhiều loại","variety (n): sự đa dạng","vary (v): thay đổi, khác nhau","variously (adv): một cách đa dạng"]},{"q":"34. The public transport system needs to be ___ and expanded.","answer":"modernized","explanation":"Động từ đuôi -ed: modern → modernized (được hiện đại hóa).","hint":"(modern)","vi":"Hệ thống giao thông công cộng cần được hiện đại hóa và mở rộng.","family":["modern (adj): hiện đại","modernize (v): hiện đại hóa","modernization (n): sự hiện đại hóa","modernized (adj): đã được hiện đại hóa"]}]},{"roman":"VI","navLabel":"Từ điển","title":"Tra từ điển \"amenity\"","icon":"book-bookmark","instructions":"Dựa vào mục từ điển, hoàn thành câu (không quá 3 từ).","type":"fill","dict":{"word":"amenity","ipa":"/əˈmiːnəti/","pos":"noun","senses":[{"def":"a feature or service that makes a place pleasant, comfortable, or easy to live in.","examples":["The hotel has every modern amenity, including a gym and a pool.","The town's public amenities make it a great place for families.","The local park is a basic amenity that helps residents relax.","We are lucky to have excellent amenities like libraries and sports centers in our city."]}],"vi":"<b>amenity</b> /əˈmiːnəti/ (danh từ)<br>Một đặc điểm hoặc dịch vụ khiến một nơi trở nên dễ chịu, thoải mái hoặc dễ sinh sống.<br>• Khách sạn có đầy đủ mọi tiện nghi hiện đại, bao gồm phòng gym và hồ bơi.<br>• Các tiện ích công cộng của thị trấn khiến nơi đây trở thành chốn tuyệt vời cho các gia đình.<br>• Công viên địa phương là một tiện ích cơ bản giúp cư dân thư giãn.<br>• Chúng tôi may mắn có những tiện ích tuyệt vời như thư viện và trung tâm thể thao trong thành phố."},"questions":[{"q":"35. The government is spending more money to improve ___ like parks and bus stations.","answer":"public amenities","explanation":"Dựa vào ví dụ: public amenities.","vi":"Chính phủ đang chi thêm tiền để cải thiện các tiện ích công cộng như công viên và trạm xe buýt."},{"q":"36. This new apartment is great because it has ___, such as a dishwasher and air conditioning.","answer":"every modern amenity","explanation":"Dựa vào ví dụ: every modern amenity.","vi":"Căn hộ mới này rất tuyệt vì có đầy đủ mọi tiện nghi hiện đại, chẳng hạn như máy rửa bát và điều hòa."}]},{"roman":"VII","navLabel":"Viết lại câu","title":"Viết lại câu sao cho nghĩa không đổi","icon":"pen-to-square","instructions":"Viết lại câu, giữ nguyên nghĩa với câu gốc.","type":"sentence","questions":[{"q":"37.","answer":"to study better than she does now","explanation":"doesn't...as well as she used to = used to study better than she does now.","original":"Mary doesn't study as well as she used to.","starter":"Mary used","vi":"Mary học không giỏi bằng trước đây nữa.","note":"S + don't/doesn't + V + as well as + S + used to → S + used to + V + better than + S + do/does now<br>Nghĩa đáp án: Mary từng học giỏi hơn bây giờ."},{"q":"38.","answer":"not as spacious as my current one","explanation":"So sánh hơn khẳng định = so sánh bằng phủ định (not as...as).","original":"My current house is more spacious than the old one.","starter":"My old house is","vi":"Ngôi nhà hiện tại của tôi rộng rãi hơn ngôi nhà cũ.","note":"S1 + be + more + adj + than + S2 → S2 + be + not as + adj + as + S1<br>Nghĩa đáp án: Ngôi nhà cũ của tôi không rộng bằng ngôi nhà hiện tại."},{"q":"39.","answer":"are not safe because of high crime rates","explanation":"Because + clause = because of + N.","original":"Because the crime rates are high, some cities are not safe.","starter":"Some cities","vi":"Vì tỷ lệ tội phạm cao, một số thành phố không an toàn.","note":"Because + S + V → because of + N/V-ing<br>Nghĩa đáp án: Một số thành phố không an toàn vì tỷ lệ tội phạm cao."},{"q":"40.","answer":"smoother the traffic flow is, the better the commute for workers","explanation":"Chuyển sang cấu trúc so sánh kép: The + so sánh hơn..., the + so sánh hơn...","original":"The traffic flow is smooth, so the commute is good for workers.","starter":"The","vi":"Giao thông thông thoáng nên việc đi lại tốt cho người lao động.","note":"S1 + be + adj1, so + S2 + be + adj2 → The + so sánh hơn của adj1, the + so sánh hơn của adj2<br>Nghĩa đáp án: Giao thông càng thông thoáng thì việc đi lại của người lao động càng tốt hơn."}],"instant":true}]};

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

  const nav=document.getElementById('navWrap');
  nav.innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab-btn text-sm font-bold px-3 py-2 rounded-full text-slate-600${i===0?' active':''}" id="navbtn_${i}" onclick="showTab(${i})">${s.roman}. ${s.navLabel}</button>`
  ).join('');
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e293b','#0369a1','#06b6d4','#0ea5e9','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
