const DATA = {"unit": 1, "test": 2, "sections": [{"roman":"I","navLabel":"Ngữ âm & Từ vựng","title":"Phát âm – Trọng âm – Từ vựng – Ngữ pháp","icon":"ear-listen","instructions":"Chọn đáp án (A, B, C hoặc D) đúng nhất.","type":"mcq","questions":[{"q":"1. Which word has the underlined part pronounced differently from that of the others?","options":["<u>ea</u>rly","<u>ea</u>sy","t<u>ea</u>ch","r<u>ea</u>ding"],"answer":0,"explanation":"\"early\" có \"ea\" phát âm là /ɜː/, ba từ còn lại phát âm là /iː/.","ipas":["/ˈɜːli/","/ˈiːzi/","/tiːtʃ/","/ˈriːdɪŋ/"],"vis":["sớm","dễ dàng","dạy học","việc đọc"]},{"q":"2. Which word has the underlined part pronounced differently from that of the others?","options":["<u>u</u>pstairs","tr<u>u</u>th","cl<u>u</u>b","b<u>u</u>g"],"answer":1,"explanation":"\"truth\" có \"u\" phát âm là /uː/, ba từ còn lại phát âm là /ʌ/.","ipas":["/ʌpˈsteəz/","/truːθ/","/klʌb/","/bʌg/"],"vis":["ở tầng trên","sự thật","câu lạc bộ","con bọ"]},{"q":"3. Which word has a different stress pattern from that of the others?","options":["divide","hobby","belong","begin"],"answer":1,"explanation":"\"hobby\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.","ipas":["/dɪˈvaɪd/","/ˈhɒbi/","/bɪˈlɒŋ/","/bɪˈɡɪn/"],"vis":["chia ra","sở thích","thuộc về","bắt đầu"]},{"q":"4. Which word has a different stress pattern from that of the others?","options":["regular","furniture","violin","timetable"],"answer":2,"explanation":"\"violin\" trọng âm rơi vào âm tiết cuối, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˈreɡjələ(r)/","/ˈfɜːnɪtʃə(r)/","/ˌvaɪəˈlɪn/","/ˈtaɪmteɪbl/"],"vis":["thường xuyên","đồ nội thất","đàn vi-ô-lông","thời khóa biểu"]},{"q":"5. - Jack: \"Why don't you try ice-skating with us this afternoon?\"\n- Tom: \"No, thanks. I think it is too ___ for me.\"","options":["endangered","danger","dangerous","in danger"],"answer":2,"explanation":"Sau \"too\" cần dùng một tính từ: dangerous (nguy hiểm).","vis":["có nguy cơ tuyệt chủng, bị đe dọa","sự nguy hiểm (danh từ)","nguy hiểm (tính từ - đúng)","đang gặp nguy hiểm"],"vi":"Jack: 'Sao bạn không thử trượt băng cùng bọn mình chiều nay?' – Tom: 'Không, cảm ơn. Mình nghĩ nó quá nguy hiểm đối với mình.'"},{"q":"6. - Lucy: \"If you choose sewing as your hobby, what can you do?\"\n- Mary: \"I can ___ my own clothes and wear them to school.\"","options":["take","do","make","get"],"answer":2,"explanation":"\"make clothes\" = tự may/làm quần áo, là collocation đúng trong ngữ cảnh này.","vis":["mang theo, lấy","làm (việc chung)","may, làm ra (đúng: make clothes)","lấy được, có được"],"vi":"Lucy: 'Nếu bạn chọn may vá làm sở thích, bạn có thể làm gì?' – Mary: 'Mình có thể tự may quần áo của mình và mặc chúng đến trường.'"},{"q":"7. - Minh: \"What does your sister love doing in her leisure time?\"\n- An: \"She adores watching ___ on TV. She laughs all day.\"","options":["painting","comedies","horse riding","gardening"],"answer":1,"explanation":"\"watching comedies\" = xem phim/chương trình hài kịch, phù hợp với việc \"laughs all day\".","vis":["hội họa, vẽ tranh","phim/chương trình hài kịch (đúng)","cưỡi ngựa","làm vườn"],"vi":"Minh: 'Chị gái bạn thích làm gì trong thời gian rảnh?' – An: 'Chị ấy rất thích xem phim hài trên TV. Chị ấy cười cả ngày.'"},{"q":"8. - Peter: \"Is your little brother interested ___ collecting old coins?\"\n- Jane: \"Yes, he has a big collection of coins from Europe.\"","options":["at","in","on","of"],"answer":1,"explanation":"\"be interested in doing sth\" = thích thú với việc gì đó.","vis":["tại, ở","trong, về (đúng: interested in)","trên, vào","của, thuộc về"],"vi":"Peter: 'Em trai bạn có thích sưu tầm tiền xu cổ không?' – Jane: 'Có, cậu ấy có một bộ sưu tập lớn tiền xu từ châu Âu.'"},{"q":"9. - Anna: \"Can I join the cooking lesson tomorrow morning?\"\n- Chef: \"Sure! The lesson ___ at 9 a.m. everyday, so don't be late.\"","options":["start","will start","started","starts"],"answer":3,"explanation":"Trạng từ \"everyday\" + chủ ngữ số ít \"the lesson\" → động từ thêm \"-s\" ở thì hiện tại đơn: starts.","vi":"Anna: 'Em có thể tham gia lớp học nấu ăn vào sáng mai không ạ?' – Đầu bếp: 'Được chứ! Buổi học bắt đầu lúc 9 giờ sáng mỗi ngày, vì vậy đừng đến muộn.'"},{"q":"10. - Doctor: \"I think you should take up swimming this summer.\"\n- John: \"I will, ___ it is very suitable for my health condition.\"","options":["because","so","although","but"],"answer":0,"explanation":"Mệnh đề nêu lý do cần liên từ \"because\" (bởi vì).","vis":["bởi vì (nêu lý do - đúng)","vì vậy (nêu kết quả)","mặc dù (nhượng bộ)","nhưng (đối lập)"],"vi":"Bác sĩ: 'Tôi nghĩ anh nên bắt đầu tập bơi vào mùa hè này.' – John: 'Tôi sẽ làm vậy, vì nó rất phù hợp với tình trạng sức khỏe của tôi.'"},{"q":"11. - Nam: \"Does Kathy like ___ models of airplanes and ships?\"\n- Ba: \"Yes, she spends hours in her room doing that.\"","options":["making","makes","to making","make"],"answer":0,"explanation":"\"like + V-ing\" diễn tả sở thích chung → making; \"to making\" sai vì to-infinitive đúng phải là \"to make\", không có trong đáp án.","vi":"Nam: 'Kathy có thích làm mô hình máy bay và tàu thuyền không?' – Ba: 'Có, cô ấy dành hàng giờ trong phòng để làm việc đó.'"},{"q":"12. - Nam: \"Who shares the hobby of collecting key rings with you?\"\n- Long: \"___\"","options":["My brother sharing it with me.","My brother is share it with me.","A small group of friends in my class does.","We shares key rings with one another."],"answer":2,"explanation":"Chủ ngữ \"a small group of friends\" (danh từ tập hợp) là số ít → dùng trợ động từ \"does\" thay cho động từ chính, trả lời đúng câu hỏi \"Who...?\".","vis":["Anh trai tôi (đang) chia sẻ nó với tôi. (sai ngữ pháp)","Anh trai tôi chia sẻ nó với tôi. (sai ngữ pháp)","Một nhóm nhỏ bạn bè trong lớp tôi (có sở thích đó). (đúng)","Chúng tôi chia sẻ móc khóa với nhau. (sai ngữ pháp)"],"vi":"Nam: 'Ai cùng chia sẻ sở thích sưu tầm móc khóa với bạn?' – Long: 'Một nhóm nhỏ bạn bè trong lớp mình cùng sở thích đó.'"},{"q":" anation":"A. You are allowed to use cell phones everywhere in this area. — Bạn được phép sử dụng điện thoại di động ở mọi nơi trong khu vực này (sai, ngược nghĩa với biển cấm)<br>B. You may use cell phones here only for emergencies. — Bạn chỉ được sử dụng điện thoại ở đây trong trường hợp khẩn cấp (sai, biển không đề cập đến trường hợp khẩn cấp)<br>C. Using cell phones is not permitted in this area. — Việc sử dụng điện thoại di động không được phép trong khu vực này ✓<br>D. Using cell phones is encouraged and allowed here. — Việc sử dụng điện thoại được khuyến khích và cho phép ở đây (sai, ngược nghĩa với biển cấm)","vis":["Bạn được phép sử dụng điện thoại di động ở mọi nơi trong khu vực này.","Bạn chỉ được sử dụng điện thoại ở đây trong trường hợp khẩn cấp.","Việc sử dụng điện thoại di động không được phép trong khu vực này.","Việc sử dụng điện thoại được khuyến khích và cho phép ở đây."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-white border-2 border-slate-200 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#dc2626\" stroke-width=\"8\"/>\n    <line x1=\"14\" y1=\"86\" x2=\"86\" y2=\"14\" stroke=\"#dc2626\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n    <rect x=\"36\" y=\"28\" width=\"28\" height=\"46\" rx=\"4\" fill=\"#1e293b\"/>\n    <rect x=\"40\" y=\"34\" width=\"20\" height=\"26\" fill=\"#fff\"/>\n    <line x1=\"43\" y1=\"40\" x2=\"43\" y2=\"50\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <line x1=\"47\" y1=\"37\" x2=\"47\" y2=\"50\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <line x1=\"51\" y1=\"43\" x2=\"51\" y2=\"50\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <line x1=\"55\" y1=\"40\" x2=\"55\" y2=\"50\" stroke=\"#1e293b\" stroke-width=\"2\"/>\n    <circle cx=\"50\" cy=\"69\" r=\"2.4\" fill=\"#1e293b\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-slate-900 leading-tight mt-1\">NO MOBILE PHONES ALLOWED</p>\n</div>"},{"q":"16. What does this notice mean?","options":["Adults can take children to the museum only in the morning.","Children can visit this place if they are with an adult.","Adults with children over 12 will enjoy the place more.","Children can visit this place alone if they are over 12."],"answer":1,"explanation":"A. Adults can take children to the museum only in the morning. — Người lớn chỉ có thể đưa trẻ em đến bảo tàng vào buổi sáng (sai, biển không đề cập đến khung giờ buổi sáng)<br>B. Children can visit this place if they are with an adult. — Trẻ em có thể đến thăm nơi này nếu đi cùng người lớn ✓<br>C. Adults with children over 12 will enjoy the place more. — Người lớn đi cùng trẻ trên 12 tuổi sẽ thích nơi này hơn (sai, biển không nói về mức độ thích thú)<br>D. Children can visit this place alone if they are over 12. — Trẻ em có thể đến thăm nơi này một mình nếu trên 12 tuổi (sai, biển yêu cầu phải có người lớn đi cùng, không phân biệt độ tuổi)","vis":["Người lớn chỉ có thể đưa trẻ em đến bảo tàng vào buổi sáng.","Trẻ em có thể đến thăm nơi này nếu đi cùng người lớn.","Người lớn đi cùng trẻ trên 12 tuổi sẽ thích nơi này hơn.","Trẻ em có thể đến thăm nơi này một mình nếu trên 12 tuổi."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-amber-700 border-2 border-slate-300 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <circle cx=\"34\" cy=\"26\" r=\"9\" fill=\"#fff\"/>\n    <path d=\"M18 74c0-18 7-30 16-30s16 12 16 30\" fill=\"#fff\"/>\n    <circle cx=\"66\" cy=\"42\" r=\"7\" fill=\"#fff\"/>\n    <path d=\"M54 76c0-13 5-22 12-22s12 9 12 22\" fill=\"#fff\"/>\n    <line x1=\"44\" y1=\"58\" x2=\"58\" y2=\"64\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-white leading-tight mt-1\">CHILDREN MUST BE WITH AN ADULT</p>\n</div>"}],"instant":true}, {"roman": "III", "navLabel": "Điền đoạn văn", "title": "Chọn từ thích hợp điền vào đoạn văn", "icon": "file-lines", "instructions": "Chọn đáp án đúng để hoàn thành đoạn văn.", "type": "mcq", "passage": {"title": "Lợi ích của việc làm vườn", "html": "Gardening gives us an opportunity to refresh our mind after working or studying time. It brings us the green plants and flowers and fills our lungs (17)___ pure oxygen. The outdoor environment and fresh air are good (18)___ our health. We can get great pleasure from gardening, growing flowers and some vegetables of the season. Gardening not only offers us the beauty of flowers and plants (19)___ also brings us benefits. A family with a vegetable garden can save (20)___ lot of money when they grow vegetables rather than buy them from outside. Vegetable gardening is very (21)___ because it makes us feel better, less stressed, and (22)___ delicious vegetables for us to eat.", "vi": "Làm vườn mang đến cho chúng ta cơ hội thư giãn đầu óc sau thời gian làm việc hoặc học tập. Nó mang đến cho chúng ta cây xanh và hoa, đồng thời làm đầy phổi chúng ta bằng (17) ___ ô-xy trong lành. Môi trường ngoài trời và không khí trong lành rất tốt (18) ___ sức khỏe của chúng ta. Chúng ta có thể có được niềm vui lớn từ việc làm vườn, trồng hoa và một số loại rau theo mùa. Làm vườn không những mang lại vẻ đẹp của hoa và cây cối (19) ___ còn mang lại lợi ích cho chúng ta. Một gia đình có vườn rau có thể tiết kiệm (20) ___ số tiền lớn khi họ tự trồng rau thay vì mua từ bên ngoài. Việc trồng rau rất (21) ___ vì nó khiến chúng ta cảm thấy khỏe hơn, bớt căng thẳng, và (22) ___ ra những loại rau ngon để chúng ta ăn."}, "questions": [{"q": "17.", "options": ["by", "for", "of", "with"], "answer": 3, "explanation": "\"fill sth with sth\" = làm đầy cái gì bằng cái gì.<br>A. by: bởi (không hợp cụm từ)<br>B. for: cho, vì (không hợp cụm từ)<br>C. of: của (không hợp cụm từ)<br>D. with: bằng, với (fill our lungs with pure oxygen) ✓", "vis": ["bởi (giới từ chỉ tác nhân)", "cho, vì", "của", "bằng, với (đúng)"], "vi": "Nó mang đến cho chúng ta cây xanh và hoa, đồng thời làm đầy phổi chúng ta bằng (17) ___ ô-xy trong lành."}, {"q": "18.", "options": ["for", "healthy", "harmful", "delicious"], "answer": 0, "explanation": "\"good for our health\" = tốt cho sức khỏe.<br>A. for: cho (good for sth) ✓<br>B. healthy: khỏe mạnh (tính từ, không hợp vị trí sau 'good')<br>C. harmful: có hại (trái nghĩa với ý câu)<br>D. delicious: ngon miệng (không hợp nghĩa)", "vis": ["cho (đúng: good for)", "khỏe mạnh (tính từ, sai vị trí)", "có hại", "ngon miệng"], "vi": "Môi trường ngoài trời và không khí trong lành rất tốt (18) ___ sức khỏe của chúng ta."}, {"q": "19.", "options": ["so", "or", "and", "but"], "answer": 3, "explanation": "\"not only... but also...\" = không những... mà còn...<br>A. so: vì vậy (không hợp cấu trúc)<br>B. or: hoặc (không hợp cấu trúc)<br>C. and: và (không tạo thành cấu trúc cố định với 'not only')<br>D. but: not only... but also... ✓", "vis": ["vì vậy", "hoặc", "và", "nhưng (đúng)"], "vi": "Làm vườn không những mang lại vẻ đẹp của hoa và cây cối (19) ___ còn mang lại lợi ích cho chúng ta."}, {"q": "20.", "options": ["the", "a", "any", "an"], "answer": 1, "explanation": "\"a lot of money\" = nhiều tiền (cụm từ cố định).<br>A. the: mạo từ xác định (không hợp cụm 'a lot of')<br>B. a: a lot of money ✓<br>C. any: bất kỳ (không hợp cụm cố định)<br>D. an: dùng trước âm nguyên âm, 'lot' bắt đầu bằng phụ âm", "vis": ["mạo từ xác định 'the'", "a lot of (đúng)", "bất kỳ", "mạo từ 'an' (trước nguyên âm)"], "vi": "Một gia đình có vườn rau có thể tiết kiệm (20) ___ số tiền lớn khi họ tự trồng rau thay vì mua từ bên ngoài."}, {"q": "21.", "options": ["difficult", "boring", "exciting", "rewarding"], "answer": 3, "explanation": "Làm vườn mang lại cảm giác tốt đẹp → rewarding (xứng đáng, bổ ích).<br>A. difficult: khó khăn (trái nghĩa với ý tích cực)<br>B. boring: nhàm chán (trái nghĩa)<br>C. exciting: thú vị (không sai nhưng không khớp lý do 'feel better, less stressed' bằng rewarding)<br>D. rewarding: bổ ích, xứng đáng ✓", "vis": ["khó khăn", "nhàm chán", "thú vị", "bổ ích, xứng đáng (đúng)"], "vi": "Việc trồng rau rất (21) ___ vì nó khiến chúng ta cảm thấy khỏe hơn, bớt căng thẳng."}, {"q": "22.", "options": ["creates", "buys", "cooks", "produces"], "answer": 3, "explanation": "\"produces delicious vegetables\" = tạo ra rau củ ngon.<br>A. creates: sáng tạo ra (thường dùng cho ý tưởng, tác phẩm)<br>B. buys: mua (trái nghĩa với việc tự trồng)<br>C. cooks: nấu (không hợp vì rau chưa qua chế biến ở bước này)<br>D. produces: sản xuất, tạo ra (khu vườn tạo ra rau) ✓", "vis": ["sáng tạo ra", "mua", "nấu", "sản xuất, tạo ra (đúng)"], "vi": "...và (22) ___ ra những loại rau ngon để chúng ta ăn."}], "instant": true}, {"roman": "IV", "navLabel": "Đọc hiểu", "title": "Đọc hiểu", "icon": "book-open", "instructions": "Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.", "type": "mcq", "passage": {"title": "Reading as a Hobby", "html": "Reading enables me to learn about so many things that I do not know. I can learn about how people lived in past days, the wonders of the world, space travel, human achievements, huge whales, tiny viruses and other fascinating things of our world. Reading helps me discover new things and widen my knowledge. Books provide me with so much information and many facts. They have certainly helped me in my daily life. I am better aware of coping with living. Libraries are the source from which I get the books I need. My relatives and my friends also give me books on special occasions. I will certainly continue my reading hobby. Beside being more informed about the world, I also spend my time profitably. It is indeed a good hobby.", "vi": "Việc đọc sách giúp tôi tìm hiểu về rất nhiều điều mà tôi chưa biết. Tôi có thể tìm hiểu về cách con người sống trong quá khứ, những kỳ quan của thế giới, du hành vũ trụ, những thành tựu của con người, những chú cá voi khổng lồ, những con vi-rút nhỏ bé và những điều kỳ thú khác của thế giới chúng ta. Đọc sách giúp tôi khám phá những điều mới mẻ và mở rộng kiến thức của mình. Sách cung cấp cho tôi rất nhiều thông tin và sự kiện. Chúng chắc chắn đã giúp ích cho tôi trong cuộc sống hằng ngày. Tôi hiểu rõ hơn cách ứng phó với cuộc sống. Thư viện là nguồn mà tôi lấy những cuốn sách mình cần. Người thân và bạn bè cũng tặng tôi sách vào những dịp đặc biệt. Tôi chắc chắn sẽ tiếp tục duy trì sở thích đọc sách của mình. Bên cạnh việc hiểu biết nhiều hơn về thế giới, tôi cũng sử dụng thời gian của mình một cách hữu ích. Đó thực sự là một sở thích tốt."}, "questions": [{"q": "23. Reading only helps the author learn about the history of the past.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc kể nhiều chủ đề khác, không chỉ lịch sử → Sai.", "vis": ["Đúng", "Sai"], "vi": "Đọc sách chỉ giúp tác giả tìm hiểu về lịch sử trong quá khứ."}, {"q": "24. The author gets books from the library, friends, and family.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"Libraries are the source... My relatives and my friends also give me books\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Tác giả lấy sách từ thư viện, bạn bè và gia đình."}, {"q": "25. Books give useful information for the author's daily life.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"They have certainly helped me in my daily life\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Sách cung cấp thông tin hữu ích cho cuộc sống hằng ngày của tác giả."}, {"q": "26. The author plans to keep reading as a hobby in the future.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"I will certainly continue my reading hobby\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Tác giả dự định sẽ tiếp tục duy trì việc đọc sách như một sở thích trong tương lai."}, {"q": "27. According to the passage, reading helps the author to ___.", "options": ["broaden their knowledge", "buy many expensive things", "find a high-paying job", "travel to space easily"], "answer": 0, "explanation": "Bài đọc: \"widen my knowledge\" = broaden their knowledge.", "vis": ["mở rộng kiến thức của họ", "mua nhiều thứ đắt tiền", "tìm một công việc lương cao", "du hành vũ trụ dễ dàng"], "vi": "Theo đoạn văn, việc đọc sách giúp tác giả ___."}, {"q": "28. What does the author think about the time spent on reading?", "options": ["It is spent usefully.", "It is a waste of time.", "It is very boring.", "It makes them tired."], "answer": 0, "explanation": "Bài đọc: \"I also spend my time profitably\" = spent usefully.", "vis": ["Nó được sử dụng một cách hữu ích.", "Đó là lãng phí thời gian.", "Nó rất nhàm chán.", "Nó khiến họ mệt mỏi."], "vi": "Tác giả nghĩ gì về thời gian dành cho việc đọc sách?"}], "instant": true}, {"roman": "V", "navLabel": "Từ loại", "title": "Cho dạng đúng của từ trong ngoặc", "icon": "spell-check", "instructions": "Điền dạng đúng của từ trong ngoặc vào chỗ trống.", "type": "fill", "questions": [{"q": "29. My younger sister has a very nice ___ of old key rings.", "answer": "collection", "explanation": "Danh từ: collect + ion → collection.", "hint": "(collect)", "family": ["collect (v): sưu tầm, thu thập", "collection (n): bộ sưu tập", "collector (n): người sưu tầm"]}, {"q": "30. The internet helps people ___ many new ways to relax.", "answer": "develop", "explanation": "Động từ nguyên thể sau \"helps people\" → develop.", "hint": "(develop)", "family": ["develop (v): phát triển", "development (n): sự phát triển", "developed (adj): đã phát triển", "developing (adj): đang phát triển"]}, {"q": "31. Playing sports brings a lot of health ___ to teenagers.", "answer": "benefits", "explanation": "Danh từ số nhiều: benefit(s) (lợi ích).", "hint": "(benefit)", "family": ["benefit (n/v): lợi ích / mang lại lợi ích", "beneficial (adj): có lợi", "beneficiary (n): người được hưởng lợi"]}, {"q": "32. Doing outdoor activities together can make family relationships ___.", "answer": "stronger", "explanation": "Tính từ so sánh hơn: strong → stronger.", "hint": "(strength)", "family": ["strength (n): sức mạnh", "strong (adj): mạnh, khỏe", "strengthen (v): làm cho mạnh hơn, củng cố"]}, {"q": "33. Regular exercise is ___ helpful for people who work all day.", "answer": "surprisingly", "explanation": "Trạng từ: surprise → surprisingly.", "hint": "(surprise)", "family": ["surprise (n/v): sự ngạc nhiên / làm ngạc nhiên", "surprised (adj): ngạc nhiên (chỉ người)", "surprising (adj): đáng ngạc nhiên (chỉ sự việc)", "surprisingly (adv): một cách đáng ngạc nhiên"]}, {"q": "34. The child looked ___ when his parents gave him a camera.", "answer": "excited", "explanation": "Tính từ đuôi -ed diễn tả cảm xúc: excite → excited.", "hint": "(excite)", "family": ["excite (v): kích thích, làm hào hứng", "excited (adj): hào hứng, phấn khích (chỉ người)", "exciting (adj): thú vị, hào hứng (chỉ sự việc)", "excitement (n): sự hào hứng, phấn khích"]}]}, {"roman": "VI", "navLabel": "Từ điển", "title": "Tra từ điển \"pleasure\"", "icon": "book-bookmark", "instructions": "Dựa vào mục từ điển, hoàn thành câu (không quá 3 từ).", "type": "fill", "dict": {"word": "pleasure", "ipa": "/ˈpleʒər/", "pos": "noun", "senses": [{"def": "a feeling of happy satisfaction and enjoyment.", "examples": ["It gives me great pleasure to welcome our guest speaker tonight.", "He takes pleasure in reading comic books before going to bed.", "\"Thank you very much for your help!\" - \"My pleasure!\" / \"It's a pleasure!\"", "Are you travelling to Paris for business or for pleasure?"]}], "vi": "<b>pleasure</b> /ˈpleʒər/ (danh từ)<br>1. cảm giác hài lòng, vui vẻ và hạnh phúc.<br>• Tôi rất vui được chào đón diễn giả khách mời của chúng ta tối nay.<br>• Cậu ấy thích thú đọc truyện tranh trước khi đi ngủ.<br>• \"Cảm ơn bạn rất nhiều vì đã giúp đỡ!\" - \"Không có gì!\" / \"Đó là niềm vui của tôi!\"<br>• Bạn đi Paris vì công việc hay để giải trí?"}, "questions": [{"q": "35. I always feel relaxed when I listen to pop music. In fact, I take ___ to old songs.", "answer": "pleasure in listening", "explanation": "Dựa vào ví dụ: take pleasure in listening.", "vi": "Tôi luôn cảm thấy thư giãn khi nghe nhạc pop. Thực ra, tôi rất thích nghe những bài hát cũ."}, {"q": "36. Good evening, everyone! It gives me ___ our new English teacher today.", "answer": "pleasure to welcome", "explanation": "Dựa vào ví dụ: pleasure to welcome.", "vi": "Chào buổi tối mọi người! Tôi rất vui mừng được chào đón giáo viên tiếng Anh mới của chúng ta hôm nay."}]}, {"roman": "VII", "navLabel": "Viết lại câu", "title": "Viết lại câu sao cho nghĩa không đổi", "icon": "pen-to-square", "instructions": "Viết lại câu, giữ nguyên nghĩa với câu gốc.", "type": "sentence", "questions": [{"q": "37. He feels excited whenever he watches a football match.\n→ He thinks watching ___.", "answer": "a football match is exciting", "explanation": "feel excited whenever + V = think + V-ing + is exciting.", "vi": "Anh ấy cảm thấy phấn khích mỗi khi xem một trận bóng đá.", "note": "S + feel excited whenever + S + V(s/es) → S + think + V-ing + is exciting<br>Nghĩa đáp án: Anh ấy nghĩ rằng xem một trận bóng đá thật thú vị."}, {"q": "38. It's not good to stay up so late to listen to music.\n→ You shouldn't ___.", "answer": "stay up so late to listen to music", "explanation": "It's not good to V = You shouldn't V.", "vi": "Thức khuya để nghe nhạc là không tốt.", "note": "It's not good to V → S + shouldn't + V<br>Nghĩa đáp án: Bạn không nên thức khuya để nghe nhạc."}, {"q": "39. I like keeping the bottles after drinking the water.\n→ I am fond ___.", "answer": "of keeping the bottles after drinking the water", "explanation": "like + V-ing = be fond of + V-ing.", "vi": "Tôi thích giữ lại những cái chai sau khi uống nước.", "note": "S + like + V-ing → S + be + fond of + V-ing<br>Nghĩa đáp án: Tôi thích (mê) việc giữ lại những cái chai sau khi uống nước."}, {"q": "40. Her collections are exciting and they really attract me.\n→ I am interested ___.", "answer": "in her collections", "explanation": "sth attracts sb = sb is interested in sth.", "vi": "Những bộ sưu tập của cô ấy rất thú vị và chúng thực sự thu hút tôi.", "note": "Sth + attract(s) + sb → S + be + interested in + sth<br>Nghĩa đáp án: Tôi rất hứng thú với những bộ sưu tập của cô ấy."}], "instant": true}]};

const completedTasks = new Set();
const scores = {};
const TOTAL_TASKS = DATA.sections.length;

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function buildNav(){
  const nav=document.getElementById('navWrap');
  nav.innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab-btn text-sm font-bold px-3 py-2 rounded-full text-slate-600${i===0?' active':''}" id="navbtn_${i}" onclick="showTab(${i})">${s.roman}. ${s.navLabel}</button>`
  ).join('');
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
