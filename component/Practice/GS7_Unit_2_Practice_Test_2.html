<script>
const DATA = {"unit": 2, "test": 2, "sections": [{"roman":"I","navLabel":"Ngữ âm & Từ vựng","title":"Phát âm – Trọng âm – Từ vựng – Ngữ pháp","icon":"ear-listen","instructions":"Chọn đáp án (A, B, C hoặc D) đúng nhất.","type":"mcq","questions":[{"q":"1. Which word has the underlined part pronounced differently from that of the others?","options":["bus<u>es</u>","sleep<u>s</u>","mask<u>s</u>","spot<u>s</u>"],"answer":0,"explanation":"\"buses\" có đuôi \"-es\" phát âm là /ɪz/ (vì \"bus\" kết thúc bằng âm /s/), ba từ còn lại có đuôi \"-s\" phát âm là /s/.","ipas":["/ˈbʌsɪz/","/sliːps/","/mɑːsks/","/spɒts/"],"vis":["những chiếc xe buýt","ngủ","những chiếc khẩu trang","những nốt/đốm"]},{"q":"2. Which word has the underlined part pronounced differently from that of the others?","options":["<u>a</u>ffect","<u>a</u>cne","tr<u>a</u>p","<u>a</u>ctive"],"answer":0,"explanation":"\"affect\" có \"a\" ở âm tiết không nhấn phát âm là /ə/, ba từ còn lại có \"a\" phát âm là /æ/.","ipas":["/əˈfekt/","/ˈækni/","/træp/","/ˈæktɪv/"],"vis":["ảnh hưởng","mụn trứng cá","cái bẫy; mắc kẹt","năng động, tích cực"]},{"q":"3. Which word has a different stress pattern from that of the others?","options":["horizon","boundary","tomato","condition"],"answer":1,"explanation":"\"boundary\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.","ipas":["/həˈraɪzn/","/ˈbaʊndri/","/təˈmɑːtəʊ/","/kənˈdɪʃn/"],"vis":["đường chân trời","ranh giới","cà chua","tình trạng, điều kiện"]},{"q":"4. Which word has a different stress pattern from that of the others?","options":["pimple","planet","balloon","cheesecake"],"answer":2,"explanation":"\"balloon\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˈpɪmpl/","/ˈplænɪt/","/bəˈluːn/","/ˈtʃiːzkeɪk/"],"vis":["mụn nhọt","hành tinh","bóng bay","bánh phô mai"]},{"q":"5. Tom: \"We need to spend less time _________ computer games.\"\nBen: \"You're right. Let's go out for a walk instead.\"","options":["to playing","playing","play","to play"],"answer":1,"explanation":"Cấu trúc \"spend + time + V-ing\" = dành thời gian làm gì → playing.","vi":"Tom: 'Chúng ta cần dành ít thời gian hơn để chơi trò chơi điện tử.' – Ben: 'Bạn nói đúng. Hãy đi dạo thay vì chơi game.'"},{"q":"6. Anna: \"Be careful with _________ you eat and drink.\"\nLucy: \"Thanks. I am trying to follow a balanced diet now.\"","options":["this","who","what","which"],"answer":2,"explanation":"\"what\" mang nghĩa \"những gì\", dùng để chỉ những thứ chung chung (đồ ăn, thức uống) mà không xác định cụ thể.","vi":"Anna: 'Hãy cẩn thận với những gì bạn ăn và uống.' – Lucy: 'Cảm ơn. Mình đang cố gắng theo một chế độ ăn cân bằng.'"},{"q":"7. Nick: \"The Japanese eat a lot of fish instead of meat.\"\nMary: \"Yes, _________ they can stay healthy and live longer.\"","options":["although","but","so","because"],"answer":2,"explanation":"\"so\" (vì vậy) nối hai vế chỉ nguyên nhân - kết quả: ăn nhiều cá → vì vậy khỏe mạnh và sống lâu hơn.","vis":["mặc dù","nhưng","vì vậy","bởi vì"],"vi":"Nick: 'Người Nhật ăn rất nhiều cá thay vì thịt.' – Mary: 'Đúng vậy, vì thế họ có thể giữ gìn sức khỏe và sống lâu hơn.'"},{"q":"8. Jane: \"We should play sports or do exercise regularly.\"\nMark: \"I agree. It is the best way to stay in _________.\"","options":["shape","health","fit","look"],"answer":0,"explanation":"\"stay in shape\" là cụm cố định nghĩa là giữ dáng, giữ sức khỏe tốt.","vis":["dáng vóc (stay in shape = giữ dáng)","sức khỏe","khỏe mạnh, vừa vặn (tính từ)","vẻ ngoài, dáng vẻ"],"vi":"Jane: 'Chúng ta nên chơi thể thao hoặc tập thể dục thường xuyên.' – Mark: 'Mình đồng ý. Đó là cách tốt nhất để giữ dáng.'"},{"q":"9. Doctor: \"Sunscreen, hats, and gloves can protect your skin from sunburn.\"\nKatie: \"Should I also use _________ for my dry lips, doctor?\"","options":["headache","lip balm","red spots","dry hair"],"answer":1,"explanation":"\"lip balm\" (son dưỡng môi) là sản phẩm phù hợp dùng cho môi khô.","vis":["đau đầu","son dưỡng môi","đốm đỏ, phát ban","tóc khô"],"vi":"Bác sĩ: 'Kem chống nắng, mũ và găng tay có thể bảo vệ da bạn khỏi cháy nắng.' – Katie: 'Vậy cháu có nên dùng son dưỡng cho đôi môi khô của mình không, thưa bác sĩ?'"},{"q":"10. Chris: \"Why is Laura going to see the doctor this afternoon?\"\nJack: \"Because she has a bad _________ after working on the computer for hours.\"","options":["diet","headache","vitamin","exercise"],"answer":1,"explanation":"\"a bad headache\" (cơn đau đầu dữ dội) phù hợp với việc làm việc với máy tính nhiều giờ liền.","vis":["chế độ ăn","đau đầu","vitamin","tập thể dục"],"vi":"Chris: 'Tại sao chiều nay Laura lại đi khám bác sĩ vậy?' – Jack: 'Vì cô ấy bị đau đầu dữ dội sau khi làm việc trên máy tính hàng giờ liền.'"},{"q":"11. Sam: \"Does your father usually _______ jogging before breakfast?\"\nLily: \"Yes, he does it for half an hour every day.\"","options":["go","cycle","ride","take"],"answer":0,"explanation":"\"go jogging\" là cụm động từ cố định nghĩa là đi chạy bộ.","vis":["đi (go jogging = đi chạy bộ)","đạp xe","cưỡi, đi (xe/ngựa)","lấy, dùng"],"vi":"Sam: 'Bố bạn có thường đi chạy bộ trước bữa sáng không?' – Lily: 'Có chứ, bố mình chạy bộ nửa tiếng mỗi ngày.'"},{"q":"12. Justin: \"Send me a text message tomorrow to remind me about the football match.\"\nKatie: \"_________\"","options":["What's your number?","How dare you?","Thank you, Justin.","It's my pleasure."],"answer":3,"explanation":"\"It's my pleasure.\" dùng để vui vẻ đồng ý giúp đỡ khi được nhờ vả (= Rất sẵn lòng).","vis":["Số điện thoại của bạn là gì?","Sao bạn dám thế?","Cảm ơn, Justin.","Rất sẵn lòng."],"vi":"Justin: 'Ngày mai hãy nhắn tin nhắc mình về trận đấu bóng đá nhé.' – Katie: 'Rất sẵn lòng.'"},{"q":"13. Brother: \"I used to eat a lot of fast food and never exercised, so I became overweight.\"\nSister: \"_________\"","options":["He also caught a cold last winter.","He says he feels stronger now.","I don't like his current lifestyle.","That's a bad habit. You should change it."],"answer":3,"explanation":"Câu trả lời phải là lời khuyên trực tiếp với người anh về thói quen xấu vừa nêu.","vis":["Anh ấy cũng bị cảm lạnh vào mùa đông trước.","Anh ấy nói rằng bây giờ anh ấy cảm thấy khỏe hơn.","Tôi không thích lối sống hiện tại của anh ấy.","Đó là một thói quen xấu. Anh nên thay đổi nó đi."],"vi":"Anh trai: 'Anh từng ăn rất nhiều đồ ăn nhanh và không bao giờ tập thể dục, vì vậy anh đã bị thừa cân.' – Em gái: 'Đó là một thói quen xấu. Anh nên thay đổi nó đi.'"},{"q":"14. Peter: \"I eat a lot of junk food, so I put on weight easily.\"\nDoctor: \"_________\"","options":["Some herbs can cause side effects.","He forgot to take his medicine yesterday.","Taking care of your body is a smart habit.","You should avoid junk food and follow a balanced diet."],"answer":3,"explanation":"Lời khuyên của bác sĩ cần liên quan trực tiếp đến vấn đề \"ăn nhiều đồ ăn vặt\" mà Peter vừa nêu.","vis":["Một số loại thảo dược có thể gây ra tác dụng phụ.","Anh ấy đã quên uống thuốc hôm qua.","Chăm sóc cơ thể là một thói quen thông minh.","Cháu nên tránh đồ ăn vặt và tuân theo một chế độ ăn cân bằng."],"vi":"Peter: 'Cháu ăn rất nhiều đồ ăn vặt, vì vậy cháu dễ bị tăng cân.' – Bác sĩ: 'Cháu nên tránh đồ ăn vặt và tuân theo một chế độ ăn cân bằng.'"}],"instant":true}, {"roman":"II","navLabel":"Biển báo","title":"Biển báo / Thông báo","icon":"traffic-light","instructions":"Đọc biển báo/thông báo và chọn ý đúng nhất.","type":"mcq","questions":[{"q":"15. What does the sign tell you to do?","options":["You don't have to keep anything clean here.","Someone comes to clean this place every day.","You cannot enter this area if it is dirty.","If you use this area, you must clean it."],"answer":3,"explanation":"A. You don't have to keep anything clean here. — Bạn không cần giữ bất cứ thứ gì sạch sẽ ở đây (sai, ngược nghĩa với biển báo)<br>B. Someone comes to clean this place every day. — Có người đến dọn dẹp nơi này mỗi ngày (sai, biển không nói có người dọn dẹp hằng ngày)<br>C. You cannot enter this area if it is dirty. — Bạn không thể vào khu vực này nếu nó bẩn (sai, biển không cấm vào vì khu vực bẩn)<br>D. If you use this area, you must clean it. — Nếu bạn sử dụng khu vực này, bạn phải dọn dẹp nó ✓","vis":["Bạn không cần giữ bất cứ thứ gì sạch sẽ ở đây.","Có người đến dọn dẹp nơi này mỗi ngày.","Bạn không thể vào khu vực này nếu nó bẩn.","Nếu bạn sử dụng khu vực này, bạn phải dọn dẹp nó."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-emerald-600 border-2 border-slate-300 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <rect x=\"32\" y=\"38\" width=\"36\" height=\"42\" rx=\"4\" fill=\"#fff\"/>\n    <rect x=\"27\" y=\"30\" width=\"46\" height=\"8\" rx=\"2\" fill=\"#fff\"/>\n    <rect x=\"43\" y=\"20\" width=\"14\" height=\"10\" rx=\"2\" fill=\"#fff\"/>\n    <line x1=\"42\" y1=\"48\" x2=\"42\" y2=\"72\" stroke=\"#059669\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n    <line x1=\"50\" y1=\"48\" x2=\"50\" y2=\"72\" stroke=\"#059669\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n    <line x1=\"58\" y1=\"48\" x2=\"58\" y2=\"72\" stroke=\"#059669\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-white leading-tight mt-1\">PLEASE CLEAN UP AFTER YOURSELF</p>\n</div>"},{"q":"16. What does the sign say?","options":["All cakes are free on Friday.","Get a free cake with one you buy on Friday.","The sale lasts all day from Monday to Friday.","You can still get the discount at 5 p.m. on Saturday."],"answer":1,"explanation":"A. All cakes are free on Friday. — Tất cả bánh đều miễn phí vào thứ Sáu (sai, không phải tất cả bánh đều miễn phí)<br>B. Get a free cake with one you buy on Friday. — Nhận một chiếc bánh miễn phí khi mua một chiếc vào thứ Sáu ✓<br>C. The sale lasts all day from Monday to Friday. — Chương trình giảm giá kéo dài cả ngày từ thứ Hai đến thứ Sáu (sai, biển chỉ đề cập đến thứ Sáu)<br>D. You can still get the discount at 5 p.m. on Saturday. — Bạn vẫn có thể được giảm giá lúc 5 giờ chiều thứ Bảy (sai, chương trình chỉ áp dụng vào thứ Sáu, không phải thứ Bảy)","vis":["Tất cả bánh đều miễn phí vào thứ Sáu.","Nhận một chiếc bánh miễn phí khi mua một chiếc vào thứ Sáu.","Chương trình giảm giá kéo dài cả ngày từ thứ Hai đến thứ Sáu.","Bạn vẫn có thể được giảm giá lúc 5 giờ chiều thứ Bảy."],"image":"<div class=\"inline-flex flex-col items-center w-40 bg-amber-50 border-2 border-amber-300 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <rect x=\"25\" y=\"55\" width=\"50\" height=\"28\" rx=\"4\" fill=\"#f59e0b\"/>\n    <rect x=\"30\" y=\"45\" width=\"40\" height=\"14\" rx=\"3\" fill=\"#fbbf24\"/>\n    <circle cx=\"50\" cy=\"34\" r=\"6\" fill=\"#dc2626\"/>\n    <rect x=\"48\" y=\"20\" width=\"4\" height=\"16\" fill=\"#78350f\"/>\n    <path d=\"M48 20c-2-4 2-6 2-10c0 4 4 6 2 10\" fill=\"#f97316\"/>\n    <text x=\"50\" y=\"74\" font-size=\"14\" font-weight=\"900\" fill=\"#7c2d12\" text-anchor=\"middle\">1+1</text>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-amber-800 leading-tight mt-1\">FRIDAY SPECIAL – BUY 1 GET 1 FREE</p>\n</div>"}],"instant":true}, {"roman": "III", "navLabel": "Điền đoạn văn", "title": "Chọn từ thích hợp điền vào đoạn văn", "icon": "file-lines", "instructions": "Chọn đáp án đúng để hoàn thành đoạn văn.", "type": "mcq", "passage": {"title": "Calo và sức khỏe", "html": "We need calories or energy to do things every day. For example, when we walk to school or ride a bike to school, we spend a (1)___ amount of calories, and even when we sleep, we also use them. But how many calories should we have a day to (2)___ in shape? It's difficult for us to calculate. If people want to keep fit, they should remember (3)___ everyone should have between 1,600 and 2,500 calories a day.\n\nWe get calories from the food we eat. If we eat too (4)___ food and don't take part (5)___ any activities, we can get fat quickly. So besides studying, we should do some exercise, play sports, or do housework, such as (6)___ the floor, cooking, etc. Otherwise, if we don't eat enough, we will be tired and weak.", "vi": "Chúng ta cần calo hay năng lượng để làm mọi việc mỗi ngày. Ví dụ, khi đi bộ đến trường hay đạp xe đến trường, chúng ta tiêu tốn một (1)___ lượng calo nhất định, và ngay cả khi ngủ, chúng ta cũng sử dụng chúng. Nhưng chúng ta nên nạp bao nhiêu calo một ngày để (2)___ dáng? Thật khó để tính toán. Nếu muốn giữ gìn vóc dáng, mọi người nên nhớ rằng (3)___ mỗi người nên có từ 1.600 đến 2.500 calo một ngày.\n\nChúng ta lấy calo từ thức ăn mà mình ăn. Nếu ăn quá (4)___ thức ăn và không tham gia (5)___ bất kỳ hoạt động nào, chúng ta có thể béo lên nhanh chóng. Vì vậy, ngoài việc học, chúng ta nên tập thể dục, chơi thể thao, hoặc làm việc nhà, chẳng hạn như (6)___ sàn nhà, nấu ăn, v.v. Ngược lại, nếu không ăn đủ, chúng ta sẽ mệt mỏi và yếu ớt."}, "questions": [{"q": "17.", "options": ["common", "certain", "central", "correct"], "answer": 1, "explanation": "\"a certain amount\" = một lượng nhất định.<br>A. common: phổ biến (không hợp nghĩa)<br>B. certain: nhất định (a certain amount) ✓<br>C. central: trung tâm (không hợp nghĩa)<br>D. correct: đúng (không hợp nghĩa)", "vis": ["phổ biến", "nhất định (a certain amount)", "trung tâm", "đúng"], "vi": "chúng ta tiêu tốn một (1)___ lượng calo nhất định."}, {"q": "18.", "options": ["stay", "make", "put", "hold"], "answer": 0, "explanation": "\"stay in shape\" = giữ dáng, khỏe mạnh.<br>A. stay in shape ✓<br>B. make: làm (không tạo thành cụm cố định 'in shape')<br>C. put: đặt (không hợp cụm từ)<br>D. hold: giữ, cầm (không phải cụm cố định với 'in shape')", "vis": ["giữ (stay in shape = giữ dáng)", "làm, tạo ra", "đặt, để", "giữ, cầm"], "vi": "chúng ta nên nạp bao nhiêu calo một ngày để (2)___ dáng?"}, {"q": "19.", "options": ["who", "because", "which", "that"], "answer": 3, "explanation": "\"remember that + mệnh đề\" = nhớ rằng...<br>A. who: đại từ quan hệ chỉ người (không hợp, không có danh từ đứng trước để thay thế)<br>B. because: bởi vì (không hợp, không giải thích nguyên nhân)<br>C. which: đại từ quan hệ chỉ vật (không hợp, không có danh từ đứng trước để thay thế)<br>D. that: dùng để dẫn mệnh đề tân ngữ cho 'remember' ✓", "vis": ["ai (đại từ quan hệ chỉ người)", "bởi vì", "cái mà (đại từ quan hệ chỉ vật)", "rằng (dẫn mệnh đề tân ngữ)"], "vi": "họ nên nhớ (3)___ mỗi người nên có từ 1.600 đến 2.500 calo một ngày."}, {"q": "20.", "options": ["few", "much", "many", "little"], "answer": 1, "explanation": "\"too much food\" = quá nhiều thức ăn (không đếm được).<br>A. few: ít (dùng cho danh từ đếm được số nhiều)<br>B. much: nhiều (dùng cho danh từ không đếm được như 'food') ✓<br>C. many: nhiều (dùng cho danh từ đếm được số nhiều)<br>D. little: ít (dùng cho danh từ không đếm được, nhưng sai nghĩa ở đây)", "vis": ["ít (dùng với danh từ đếm được số nhiều)", "nhiều (dùng với danh từ không đếm được)", "nhiều (dùng với danh từ đếm được số nhiều)", "ít (dùng với danh từ không đếm được)"], "vi": "Nếu chúng ta ăn quá (4)___ thức ăn."}, {"q": "21.", "options": ["at", "on", "in", "for"], "answer": 2, "explanation": "\"take part in\" = tham gia vào.<br>A. at: tại (không hợp cụm từ)<br>B. on: về (không hợp cụm từ)<br>C. in: take part in ✓<br>D. for: cho (không hợp cụm từ)", "vis": ["tại", "về, trên", "trong (take part in = tham gia vào)", "cho"], "vi": "và không tham gia (5)___ bất kỳ hoạt động nào."}, {"q": "22.", "options": ["cleaning", "wiping", "washing", "sweeping"], "answer": 3, "explanation": "\"sweeping the floor\" = quét nhà.<br>A. cleaning: dọn dẹp (nghĩa chung chung, không phải collocation chuẩn với 'the floor')<br>B. wiping: lau (thường dùng cho bề mặt như bàn, không phải sàn nhà)<br>C. washing: giặt, rửa (thường dùng cho quần áo, bát đĩa)<br>D. sweeping: quét (sweep the floor) ✓", "vis": ["dọn dẹp (nghĩa chung)", "lau (bề mặt)", "giặt, rửa", "quét (sweep the floor = quét sàn nhà)"], "vi": "chẳng hạn như (6)___ sàn nhà, nấu ăn, v.v."}], "instant": true}, {"roman": "IV", "navLabel": "Đọc hiểu", "title": "Đọc hiểu", "icon": "book-open", "instructions": "Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.", "type": "mcq", "passage": {"title": "Herbal Medicine", "html": "Everyone wants to be healthy. People see doctors. They take pills to stay healthy. However, plants have been used to heal for thousands of years. Plants used to heal are called \"herbal medicine\". There are many plants used in herbal medicine. Each plant is used in a certain way. Herbal medicine works more slowly than most pills. Many people think plants are gentle on the body. There are a lot of examples of helpful plants. Ginger can help your body. Eating ginger often may help you stay healthy. Another helpful plant is parsley. It can stop bad breath. Herbs may be gentler than some pills. However, this does not mean that anyone can take them in any way. You should always be careful. Some herbs can be harmful, too. Too much rosemary can be very bad for your stomach. It can make you sick. Foxglove is a very pretty flower. It also has poison in it. Nevertheless, if you are afraid of using herbs, you may be surprised.\n\nYou have probably already used some kind of herbal medicine. Coffee, garlic, ginseng, and peppermint are all used in herbal medicine. Herbal medicine is becoming popular again, as people become more interested in their health.", "vi": "Ai cũng muốn khỏe mạnh. Người ta đi khám bác sĩ. Họ uống thuốc để giữ gìn sức khỏe. Tuy nhiên, cây cối đã được dùng để chữa bệnh từ hàng nghìn năm nay. Những loại cây dùng để chữa bệnh được gọi là \"thảo dược\". Có rất nhiều loại cây được dùng trong y học thảo dược. Mỗi loại cây được sử dụng theo một cách nhất định. Thảo dược có tác dụng chậm hơn so với hầu hết các loại thuốc viên. Nhiều người cho rằng cây cỏ dịu nhẹ hơn đối với cơ thể. Có rất nhiều ví dụ về các loại cây có ích. Gừng có thể giúp ích cho cơ thể bạn. Ăn gừng thường xuyên có thể giúp bạn khỏe mạnh. Một loại cây có ích khác là rau mùi tây. Nó có thể khử mùi hôi miệng. Thảo dược có thể dịu nhẹ hơn một số loại thuốc viên. Tuy nhiên, điều này không có nghĩa là ai cũng có thể dùng chúng theo bất kỳ cách nào. Bạn nên luôn cẩn thận. Một số loại thảo dược cũng có thể gây hại. Quá nhiều hương thảo có thể rất có hại cho dạ dày của bạn. Nó có thể khiến bạn bị ốm. Cây mao địa hoàng là một loài hoa rất đẹp. Nó cũng chứa chất độc. Tuy nhiên, nếu bạn e ngại việc dùng thảo dược, có thể bạn sẽ ngạc nhiên.\n\nCó lẽ bạn đã từng dùng một loại thảo dược nào đó rồi. Cà phê, tỏi, nhân sâm và bạc hà đều được dùng trong y học thảo dược. Y học thảo dược đang trở nên phổ biến trở lại, khi con người ngày càng quan tâm hơn đến sức khỏe của mình."}, "questions": [{"q": "23. Herbal medicine works faster than most modern pills.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"Herbal medicine works more slowly than most pills\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Thảo dược có tác dụng nhanh hơn hầu hết các loại thuốc viên hiện đại."}, {"q": "24. Eating ginger on a regular basis can help people stay healthy.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"Eating ginger often may help you stay healthy\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Ăn gừng thường xuyên có thể giúp con người khỏe mạnh."}, {"q": "25. It is safe to use any amount of rosemary because it is a plant.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"Too much rosemary can be very bad for your stomach\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Dùng hương thảo với bất kỳ lượng nào cũng an toàn vì đó là một loại cây."}, {"q": "26. Common items like coffee and garlic are considered types of herbal medicine.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"Coffee, garlic, ginseng, and peppermint are all used in herbal medicine\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Những thứ quen thuộc như cà phê và tỏi được coi là các loạ function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
