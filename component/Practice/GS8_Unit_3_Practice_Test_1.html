<script>
const DATA = {"unit":3,"test":1,"sections":[{"roman":"I","navLabel":"Ngữ âm & Từ vựng","title":"Phát âm – Trọng âm – Từ vựng – Ngữ pháp","icon":"ear-listen","instructions":"Chọn đáp án (A, B, C hoặc D) đúng nhất.","type":"mcq","questions":[{"q":"1. Which word has the underlined part pronounced differently from that of the others?","options":["c<u>a</u>mel","c<u>a</u>ttle","p<u>a</u>ddy","teen<u>a</u>ger"],"answer":3,"explanation":"\"teenager\" phát âm /iː/, ba từ còn lại phát âm /æ/.","ipas":["/ˈkæml/","/ˈkætl/","/ˈpædi/","/ˈtiːneɪdʒə(r)/"],"vis":["con lạc đà","gia súc","ruộng lúa; thóc","thiếu niên"]},{"q":"2. Which word has the underlined part pronounced differently from that of the others?","options":["<u>s</u>port","<u>s</u>ession","u<u>s</u>er","<u>s</u>chool"],"answer":2,"explanation":"\"user\" phát âm /z/, ba từ còn lại phát âm /s/.","ipas":["/spɔːt/","/ˈseʃn/","/ˈjuːzə(r)/","/skuːl/"],"vis":["thể thao","buổi, phiên","người dùng","trường học"]},{"q":"3. Which word has a different stress pattern from that of the others?","options":["standard","success","leader","pressure"],"answer":1,"explanation":"\"success\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˈstændəd/","/səkˈses/","/ˈliːdə(r)/","/ˈpreʃə(r)/"],"vis":["tiêu chuẩn","thành công","người lãnh đạo","áp lực"]},{"q":"4. Which word has a different stress pattern from that of the others?","options":["teenager","character","countryside","enjoyment"],"answer":3,"explanation":"\"enjoyment\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.","ipas":["/ˈtiːneɪdʒə(r)/","/ˈkærəktə(r)/","/ˈkʌntrisaɪd/","/ɪnˈdʒɔɪmənt/"],"vis":["thiếu niên","tính cách; nhân vật","vùng nông thôn","niềm vui thích"]},{"q":"5. Tom: I heard that your school just organized a really big event.\nNam: Yes! This event is held to commemorate national heroes, ___ it teaches children to respect them.","options":["so","but","or","and"],"answer":3,"explanation":"Hai vế nối bằng \"and\".","vi":"Tom: 'Mình nghe nói trường bạn vừa tổ chức một sự kiện rất lớn.' – Nam: 'Đúng vậy! Sự kiện này được tổ chức để tưởng nhớ các anh hùng dân tộc, vì vậy nó dạy trẻ em biết tôn trọng họ.'"},{"q":"6. Guide: Here is the community hall. You can take a seat here, ___ you can go around and take a look. It's up to you.\nVisitor: Thank you, I think I'll walk around first.","options":["and","or","but","so"],"answer":1,"explanation":"Lựa chọn giữa hai hành động → or.","vi":"Hướng dẫn viên: 'Đây là hội trường cộng đồng. Bạn có thể ngồi đây, hoặc bạn có thể đi xung quanh và xem qua. Tùy bạn quyết định.' – Khách tham quan: 'Cảm ơn, tôi nghĩ tôi sẽ đi dạo xung quanh trước.'"},{"q":"7. Lan: Why does Ally spend so many hours studying every day?\nHoa: She tries to overcome the ___ from her family by getting the best exam results.","options":["teamwork","media","website","pressure"],"answer":3,"explanation":"\"pressure from family\" = áp lực từ gia đình.","vis":["làm việc nhóm","truyền thông","trang web","áp lực"],"vi":"Lan: 'Tại sao Ally dành nhiều giờ học mỗi ngày vậy?' – Hoa: 'Cậu ấy cố gắng vượt qua áp lực từ gia đình bằng cách đạt kết quả thi tốt nhất.'"},{"q":"8. Teacher: Are you active in your free time, Minh?\nMinh: Yes, sir. Most of the students in my class are associated with ___ or sports teams.","options":["stress","account","school clubs","pressure"],"answer":2,"explanation":"\"associated with school clubs\" = tham gia câu lạc bộ trường.","vis":["căng thẳng","tài khoản","câu lạc bộ trường","áp lực"],"vi":"Giáo viên: 'Em có năng động trong thời gian rảnh không, Minh?' – Minh: 'Dạ có, thưa thầy. Hầu hết các bạn trong lớp em đều tham gia câu lạc bộ trường hoặc đội thể thao.'"},{"q":"9. Anna: Do you think teenagers should spend less time on Facebook?\nBen: Well, social media help teens connect with others; ___, they also cause them to feel lonely.","options":["otherwise","although","however","therefore"],"answer":2,"explanation":"Ý tương phản → however.","vi":"Anna: 'Bạn có nghĩ thanh thiếu niên nên dành ít thời gian hơn cho Facebook không?' – Ben: 'À, mạng xã hội giúp thanh thiếu niên kết nối với người khác; tuy nhiên, nó cũng khiến họ cảm thấy cô đơn.'"},{"q":"10. Mary: To meet her parents' ___, Lucy spends five hours practicing the piano every day.\nJohn: Wow, she must be exhausted.","options":["hopeless","wishes","expectations","meeting"],"answer":2,"explanation":"\"meet expectations\" = đáp ứng kỳ vọng.","vis":["vô vọng","những mong muốn","những kỳ vọng","cuộc gặp gỡ (danh từ, sai ngữ cảnh)"],"vi":"Mary: 'Để đáp ứng kỳ vọng của bố mẹ, Lucy dành năm giờ mỗi ngày để luyện đàn piano.' – John: 'Ôi, chắc bạn ấy mệt lắm.'"},{"q":"11. Jane: Why do you spend so much time reviewing your vocabulary?\nMark: I am learning English ___ I want to get a good job after graduation.","options":["therefore","so","because","but"],"answer":2,"explanation":"Nêu lý do → because.","vi":"Jane: 'Tại sao bạn dành nhiều thời gian ôn từ vựng vậy?' – Mark: 'Mình học tiếng Anh vì mình muốn có một công việc tốt sau khi tốt nghiệp.'"},{"q":"12. Nam: Dad, I've got the first rank in class in English this semester!\nMr. Thanh: ___! I'm really proud of you.","options":["Well done","You're welcome","Never mind","Thank you"],"answer":0,"explanation":"Lời khen ngợi thành tích → Well done.","vis":["Làm tốt lắm","Không có gì","Không sao đâu","Cảm ơn"],"vi":"Nam: 'Bố ơi, con đã đạt hạng nhất lớp môn tiếng Anh học kỳ này!' – Bố Thanh: 'Làm tốt lắm! Bố thực sự tự hào về con.'"},{"q":"13. Peter: I hear that our school is organizing a special free event this Friday.\nMary: That's right! It's a ___ Well-being Workshop focused on dealing with academic stress.","options":["Adult","Children","Infant","Teenage"],"answer":3,"explanation":"Hội thảo dành cho học sinh, thanh thiếu niên → Teenage.","vis":["Người lớn","Trẻ em","Trẻ sơ sinh","Thanh thiếu niên"],"vi":"Peter: 'Mình nghe nói trường mình đang tổ chức một sự kiện miễn phí đặc biệt vào thứ Sáu này.' – Mary: 'Đúng vậy! Đó là một buổi hội thảo về sức khỏe tinh thần dành cho thanh thiếu niên, tập trung vào việc đối phó với áp lực học tập.'"},{"q":"14. Lisa: Hey, did you hear about the online group for students to share their problems?\nDavid: \"___\"","options":["Sorry, the school uniform is compulsory in my school.","No, social media is always bad for our health.","Of course, I need to spend more time studying for the GCSE exam.","Yes, teenagers join the forum because they enjoy chatting with other teens."],"answer":3,"explanation":"Trả lời trực tiếp cho câu hỏi về diễn đàn trực tuyến.","vis":["Xin lỗi, đồng phục học sinh là bắt buộc ở trường mình.","Không, mạng xã hội luôn có hại cho sức khỏe của chúng ta.","Tất nhiên rồi, mình cần dành nhiều thời gian hơn để ôn thi GCSE.","Có chứ, thanh thiếu niên tham gia diễn đàn vì họ thích trò chuyện với những bạn teen khác."],"vi":"Lisa: 'Này, bạn có nghe về nhóm trực tuyến dành cho học sinh chia sẻ vấn đề của mình chưa?' – David: 'Có, thanh thiếu niên tham gia diễn đàn vì họ thích trò chuyện với những bạn teen khác.'"}],"instant":true},{"roman":"II","navLabel":"Biển báo","title":"Biển báo / Thông báo","icon":"traffic-light","instructions":"Đọc biển báo/thông báo và chọn ý đúng nhất.","type":"mcq","questions":[{"q":"15. What does this sign tell you?","options":["Teenagers should use nice words and avoid bullying on the forum.","You must share your personal account with other people.","You are allowed to fight online.","Only school pupils can see this notice."],"answer":0,"explanation":"A. Teenagers should use nice words and avoid bullying on the forum. — đúng, khớp với \"BE KIND & RESPECT. NO BULLYING\" ✓ (Nghĩa: Thanh thiếu niên nên dùng lời lẽ tử tế và tránh bắt nạt trên diễn đàn.)<br>B. You must share your personal account with other people. — sai, biển không đề cập đến việc chia sẻ tài khoản (Nghĩa: Bạn phải chia sẻ tài khoản cá nhân với người khác.)<br>C. You are allowed to fight online. — sai, biển cấm đánh nhau (NO FIGHTING) (Nghĩa: Bạn được phép cãi/đánh nhau trên mạng.)<br>D. Only school pupils can see this notice. — sai, biển không giới hạn đối tượng xem (Nghĩa: Chỉ học sinh trong trường mới xem được thông báo này.)","vis":["Thanh thiếu niên nên dùng lời lẽ tử tế và tránh bắt nạt trên diễn đàn.","Bạn phải chia sẻ tài khoản cá nhân với người khác.","Bạn được phép cãi/đánh nhau trên mạng.","Chỉ học sinh trong trường mới xem được thông báo này."],"image":"<div class=\"inline-flex flex-col items-center w-48 bg-white border-2 border-red-300 rounded-xl p-3 shadow-sm\"><div class=\"text-4xl mb-1\">💬🚫</div><p class=\"text-[11px] font-black text-center text-slate-900 leading-tight\">TEEN LINE FORUM<br>BE KIND & RESPECT<br>NO BULLYING OR FIGHTING</p></div>"},{"q":"16. What does this notice mean?","options":["The library will permanently shut down from June.","Students cannot enter the library on June 7 due to repair work.","The library will be open normally on June 7.","You can return books late without paying any fee."],"answer":1,"explanation":"A. The library will permanently shut down from June. — sai, thư viện chỉ đóng cửa tạm thời để bảo trì (Nghĩa: Thư viện sẽ đóng cửa vĩnh viễn từ tháng 6.)<br>B. Students cannot enter the library on June 7 due to repair work. — đúng, khớp với \"CLOSED ON JUNE 7 FOR MAINTENANCE\" ✓ (Nghĩa: Học sinh không được vào thư viện ngày 7 tháng 6 vì đang sửa chữa.)<br>C. The library will be open normally on June 7. — sai, ngược với thông báo đóng cửa (Nghĩa: Thư viện sẽ mở cửa bình thường vào ngày 7 tháng 6.)<br>D. You can return books late without paying any fee. — sai, biển không đề cập đến việc trả sách trễ (Nghĩa: Bạn có thể trả sách trễ mà không phải trả phí.)","vis":["Thư viện sẽ đóng cửa vĩnh viễn từ tháng 6.","Học sinh không được vào thư viện ngày 7 tháng 6 vì đang sửa chữa.","Thư viện sẽ mở cửa bình thường vào ngày 7 tháng 6.","Bạn có thể trả sách trễ mà không phải trả phí."],"image":"<div class=\"inline-flex flex-col items-center w-48 bg-white border-2 border-slate-200 rounded-xl p-3 shadow-sm\"><div class=\"text-4xl mb-1\">📚⚠️</div><p class=\"text-[11px] font-black text-center text-slate-900 leading-tight\">ANNOUNCEMENT<br>SCHOOL LIBRARY WILL BE CLOSED ON JUNE 7 FOR MAINTENANCE</p></div>"}],"instant":true},{"roman":"III","navLabel":"Điền đoạn văn","title":"Chọn từ thích hợp điền vào đoạn văn","icon":"file-lines","instructions":"Chọn đáp án đúng để hoàn thành đoạn văn.","type":"mcq","passage":{"title":"Cách đối phó với căng thẳng ở tuổi teen","html":"Every teenager feels stressed at times. There are different kinds of troubles, such as academic pressures, family issues, and difficulties with peers. We must say that (17)___ are the main things that teens have to cope (18)___ on a daily basis. None of us can avoid stress completely, but psychologists give us some (19)___ about things we can do to reduce our stress levels.\n\nFirstly, it's important to exercise regularly and avoid eating (20)___ food. It is also important to take time out every day to do something (21)___ makes you happy. It may be listening to your favorite music, talking to a friend, or spending time with a pet. It is always (22)___ to talk about your problems with others, whether that's a friend, your parents, or a teacher. As the saying goes, \"A problem shared is a problem halved!\"","vi":"Mọi thanh thiếu niên đôi khi đều cảm thấy căng thẳng. Có nhiều loại rắc rối khác nhau, chẳng hạn như áp lực học tập, các vấn đề gia đình và khó khăn với bạn bè. Chúng ta phải nói rằng (17) ___ là những điều chính mà thanh thiếu niên phải đối phó (18) ___ hằng ngày. Không ai trong chúng ta có thể tránh hoàn toàn căng thẳng, nhưng các nhà tâm lý học cho chúng ta một số (19) ___ về những việc chúng ta có thể làm để giảm mức độ căng thẳng.\n\nTrước hết, điều quan trọng là phải tập thể dục thường xuyên và tránh ăn thức ăn (20) ___. Cũng quan trọng không kém là dành thời gian mỗi ngày để làm điều gì đó (21) ___ khiến bạn vui vẻ. Đó có thể là nghe bản nhạc yêu thích, nói chuyện với một người bạn, hoặc dành thời gian bên thú cưng. Luôn luôn (22) ___ khi nói về các vấn đề của bạn với người khác, dù đó là bạn bè, bố mẹ hay thầy cô. Như câu ngạn ngữ có câu, 'Một vấn đề được chia sẻ là một vấn đề được giảm đi một nửa!'"},"questions":[{"q":"17.","options":["which","these","who","they"],"answer":1,"explanation":"\"these are the main things\" = đây là những điều chính.","vis":["mà, cái mà (đại từ quan hệ, không dùng làm chủ ngữ độc lập)","đây, những điều này (đúng, thay cho academic pressures, family issues, difficulties with peers)","ai (đại từ chỉ người)","họ, chúng nó (đại từ nhân xưng)"],"vi":"Chúng ta phải nói rằng (17) ___ là những điều chính mà thanh thiếu niên phải đối phó hằng ngày."},{"q":"18.","options":["at","up","with","for"],"answer":2,"explanation":"\"cope with sth\" = đối phó với điều gì.","vis":["tại, vào lúc","lên (không đi với \"cope\")","với (đúng, \"cope with\")","cho, vì"],"vi":"Đó là những điều chính mà thanh thiếu niên phải đối phó (18) ___ hằng ngày."},{"q":"19.","options":["tips","information","advice","ideas"],"answer":0,"explanation":"\"give tips\" = đưa ra mẹo/lời khuyên hữu ích.","vis":["mẹo, bí quyết (đúng, \"give tips\")","thông tin","lời khuyên","ý tưởng"],"vi":"Các nhà tâm lý học cho chúng ta một số (19) ___ về những việc có thể làm để giảm căng thẳng."},{"q":"20.","options":["painful","safe","unhealthy","dangerous"],"answer":2,"explanation":"Tránh ăn đồ ăn không lành mạnh → unhealthy.","vis":["đau đớn","an toàn","không lành mạnh (đúng)","nguy hiểm"],"vi":"Điều quan trọng là tập thể dục thường xuyên và tránh ăn thức ăn (20) ___."},{"q":"21.","options":["who","that","what","where"],"answer":1,"explanation":"Mệnh đề quan hệ chỉ vật: \"something that makes you happy\" → that.","vis":["ai (dùng cho người)","mà (đúng, đại từ quan hệ chỉ vật)","cái gì, những gì (đại từ nghi vấn)","nơi mà (chỉ nơi chốn)"],"vi":"Hãy dành thời gian mỗi ngày để làm điều gì đó (21) ___ khiến bạn vui vẻ."},{"q":"22.","options":["boring","serious","difficult","helpful"],"answer":3,"explanation":"Việc chia sẻ vấn đề luôn có ích → helpful.","vis":["nhàm chán","nghiêm trọng","khó khăn","hữu ích (đúng)"],"vi":"Luôn luôn (22) ___ khi nói về các vấn đề của bạn với người khác."}],"instant":true},{"roman":"IV","navLabel":"Đọc hiểu","title":"Đọc hiểu","icon":"book-open","instructions":"Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.","type":"mcq","passage":{"title":"What Is It Like Being a Teenager in Britain?","html":"British teenagers spend most of their time at school. Students in Britain can leave school at sixteen (grade 11). This is also the age when most students take their first important exams, the GCSE (General Certificate of Secondary Education). Most teens take between 5-10 subjects, which means a lot of studying. They are spending more time on homework than teenagers ever before. Forget watching TV, teenagers in Britain now spend 2-3 hours on homework after school.\n\nVisit almost any school in Britain and the first thing you'll notice is the school uniform. Although school uniform has its advantages, when they are 15 or 16, most teenagers are tired of wearing it. When there is more than one school in a town, school uniforms can highlight differences between schools. In London, there are many cases of bullying and fighting between pupils from different schools.\n\nIn Britain, some teens judge you by the shirt or trainers you are wearing, as 40% of British teenagers believe it's important to wear designer labels. If you want to follow the crowd, you need to wear trendy labels. Teenagers in Britain wear fashionable trainers, and the more expensive, the better.","vi":"Thanh thiếu niên Anh dành phần lớn thời gian ở trường. Học sinh ở Anh có thể nghỉ học từ năm 16 tuổi (lớp 11). Đây cũng là độ tuổi mà hầu hết học sinh tham gia kỳ thi quan trọng đầu tiên của mình, kỳ thi GCSE (Chứng chỉ Giáo dục Trung học phổ thông). Hầu hết thanh thiếu niên học từ 5 đến 10 môn, điều đó đồng nghĩa với việc học rất nhiều. Họ đang dành nhiều thời gian cho bài tập về nhà hơn bao giờ hết. Quên việc xem TV đi, thanh thiếu niên ở Anh hiện nay dành 2-3 giờ làm bài tập về nhà sau giờ học.\n\nHãy ghé thăm bất kỳ ngôi trường nào ở Anh và điều đầu tiên bạn sẽ nhận thấy là đồng phục học sinh. Mặc dù đồng phục có những lợi ích riêng, nhưng khi 15 hay 16 tuổi, hầu hết thanh thiếu niên đều cảm thấy chán khi phải mặc nó. Khi có nhiều hơn một trường học trong một thị trấn, đồng phục có thể làm nổi bật sự khác biệt giữa các trường. Ở London, có nhiều trường hợp bắt nạt và đánh nhau giữa học sinh của các trường khác nhau.\n\nỞ Anh, một số thanh thiếu niên đánh giá người khác qua chiếc áo hay đôi giày thể thao mà họ mặc, vì 40% thanh thiếu niên Anh tin rằng việc mặc đồ hiệu là quan trọng. Nếu bạn muốn theo kịp xu hướng, bạn cần mặc những nhãn hiệu thời trang. Thanh thiếu niên ở Anh thích mang giày thể thao thời trang, và càng đắt tiền thì càng tốt."},"questions":[{"q":"23. British teenagers currently spend less time doing homework than they did in the past.","options":["True","False"],"answer":1,"explanation":"Bài đọc: \"spending more time on homework than teenagers ever before\" → Sai.","vis":["Đúng","Sai"],"vi":"Thanh thiếu niên Anh hiện nay dành ít thời gian làm bài tập về nhà hơn so với trước đây."},{"q":"24. The GCSE is the first significant examination that most British students take.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"the age when most students take their first important exams, the GCSE\" → Đúng.","vis":["Đúng","Sai"],"vi":"Kỳ thi GCSE là kỳ thi quan trọng đầu tiên mà hầu hết học sinh Anh tham gia."},{"q":"25. Most 15 or 16-year-old students in Britain enjoy wearing their school uniforms.","options":["True","False"],"answer":1,"explanation":"Bài đọc: \"most teenagers are tired of wearing it\" → Sai.","vis":["Đúng","Sai"],"vi":"Hầu hết học sinh 15 hoặc 16 tuổi ở Anh thích mặc đồng phục học sinh của mình."},{"q":"26. In London, school uniforms can sometimes lead to conflicts between students from different schools.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"there are many cases of bullying and fighting between pupils from different schools\" → Đúng.","vis":["Đúng","Sai"],"vi":"Ở London, đồng phục học sinh đôi khi có thể dẫn đến xung đột giữa học sinh của các trường khác nhau."},{"q":"27. What is the main idea of the passage?","options":["Different aspects of a British teenager's life, including school, uniforms, and fashion.","The academic pressure and exam system that British teenagers have to face.","The negative effects of school uniforms and bullying in London schools.","The reason why British teenagers prefer expensive designer clothing."],"answer":0,"explanation":"Bài đọc bàn về nhiều khía cạnh khác nhau trong cuộc sống của thanh thiếu niên Anh.","vis":["Những khía cạnh khác nhau trong cuộc sống của một thanh thiếu niên Anh, bao gồm trường học, đồng phục và thời trang.","Áp lực học tập và hệ thống thi cử mà thanh thiếu niên Anh phải đối mặt.","Những tác động tiêu cực của đồng phục học sinh và nạn bắt nạt trong các trường học ở London.","Lý do tại sao thanh thiếu niên Anh thích quần áo hàng hiệu đắt tiền."],"vi":"Ý chính của đoạn văn là gì?"},{"q":"28. Which of the following is NOT true according to the passage?","options":["British teenagers often spend 2 to 3 hours watching TV after school.","Students in Britain are allowed to finish their schooling at the age of sixteen.","Less than half of British teenagers think that wearing designer labels is important.","Wearing costly and fashionable trainers is popular among British teenagers."],"answer":0,"explanation":"Bài đọc: 2-3 giờ đó là thời gian làm bài tập, không phải xem TV (\"Forget watching TV\") → mâu thuẫn với bài đọc.","vis":["Thanh thiếu niên Anh thường dành 2 đến 3 giờ xem TV sau giờ học.","Học sinh ở Anh được phép nghỉ học ở tuổi 16.","Chưa đến một nửa số thanh thiếu niên Anh cho rằng việc mặc đồ hiệu là quan trọng.","Việc mang giày thể thao thời trang và đắt tiền rất phổ biến ở thanh thiếu niên Anh."],"vi":"Điều nào sau đây KHÔNG đúng theo đoạn văn?"}],"instant":true},{"roman":"V","navLabel":"Từ loại","title":"Cho dạng đúng của từ trong ngoặc","icon":"spell-check","instructions":"Điền dạng đúng của từ trong ngoặc vào chỗ trống.","type":"fill","questions":[{"q":"29. Parents should provide more ___ to help their children overcome exam stress.","answer":"encouragement","explanation":"Danh từ: encourage → encouragement (sự khích lệ).","hint":"(ENCOURAGE)","family":["encourage (v): khích lệ, động viên","encouraged (adj): được khích lệ, được động viên","encouraging (adj): mang tính khích lệ, đầy động viên","encouragement (n): sự khích lệ, sự động viên"]},{"q":"30. Spending too much time on social media can be ___ to a teenager's mental health.","answer":"harmful","explanation":"Tính từ: harm + ful → harmful.","hint":"(HARM)","family":["harm (n/v): sự tổn hại; gây hại","harmful (adj): có hại","harmless (adj): vô hại"]},{"q":"31. The psychologist gave a highly ___ talk about teenage well-being yesterday.","answer":"informative","explanation":"Tính từ: inform + ative → informative (giàu thông tin, bổ ích).","hint":"(INFORM)","family":["inform (v): thông báo, cho biết","information (n): thông tin","informative (adj): giàu thông tin, bổ ích","informed (adj): được thông báo, am hiểu"]},{"q":"32. Doing exercise regularly helps students improve their concentration and ___.","answer":"enjoyment","explanation":"Danh từ: enjoy → enjoyment (niềm vui thích).","hint":"(ENJOY)","family":["enjoy (v): thích, tận hưởng","enjoyable (adj): thú vị, đáng tận hưởng","enjoyment (n): niềm vui thích, sự tận hưởng"]},{"q":"33. Many teenagers find it difficult to ___ on their lessons when they are worried.","answer":"concentrate","explanation":"Động từ: concentrate (tập trung), theo đáp án gốc của tài liệu.","hint":"(CONCENTRATION)","family":["concentrate (v): tập trung","concentration (n): sự tập trung","concentrated (adj): đậm đặc, tập trung cao độ"]},{"q":"34. ___, more and more teenagers are using the Teen Line forum to share problems.","answer":"Increasingly","explanation":"Trạng từ: increase → increasingly (ngày càng).","hint":"(INCREASE)","family":["increase (v/n): tăng lên; sự gia tăng","increasing (adj): ngày càng tăng","increasingly (adv): ngày càng"]}]},{"roman":"VI","navLabel":"Từ điển","title":"Tra từ điển \"pressure\"","icon":"book-bookmark","instructions":"Dựa vào mục từ điển, hoàn thành câu (không quá 3 từ).","type":"fill","dict":{"word":"pressure","ipa":"/ˈpreʃə(r)/","pos":"noun","senses":[{"def":"[uncountable] the act of trying to persuade or force somebody to do something","examples":["He back down under pressure from his colleagues.","The company is under pressure to increase its profits.","Teachers are under constant pressure to improve exam results.","She put pressure on him to sign the contract.","There is growing pressure for changes in the law."]}],"vi":"<b>pressure</b> /ˈpreʃə(r)/ (danh từ)<br>1. [U] hành động cố gắng thuyết phục hoặc ép buộc ai đó làm điều gì đó.<br>• Anh ấy đã lùi bước trước áp lực từ các đồng nghiệp.<br>• Công ty đang chịu áp lực phải tăng lợi nhuận.<br>• Giáo viên luôn chịu áp lực thường xuyên phải cải thiện kết quả thi cử.<br>• Cô ấy đã gây áp lực buộc anh ta ký hợp đồng.<br>• Có một áp lực ngày càng tăng đòi hỏi phải thay đổi luật pháp."},"questions":[{"q":"35. There is ___ from the public for the government to lower taxes this year.","answer":"growing pressure","explanation":"Dựa vào ví dụ: growing pressure."},{"q":"36. The manager had to change his mind because he was ___ from the team.","answer":"under pressure","explanation":"Dựa vào ví dụ: under pressure."}]},{"roman":"VII","navLabel":"Viết lại câu","title":"Viết lại câu sao cho nghĩa không đổi","icon":"pen-to-square","instructions":"Viết lại câu, giữ nguyên nghĩa với câu gốc.","type":"sentence","questions":[{"q":"37.","answer":"to spend less time using their phones","explanation":"should + V = ought to + V.","original":"Teenagers should spend less time using their phones.","starter":"Teenagers ought","vi":"Thanh thiếu niên nên dành ít thời gian sử dụng điện thoại hơn.","note":"should + V → ought to + V<br>Nghĩa đáp án: Thanh thiếu niên nên dành ít thời gian sử dụng điện thoại hơn."},{"q":"38.","answer":"of facing a lot of academic pressure","explanation":"Although + clause = In spite of + N/V-ing.","accepted":["of facing a lot of academic pressure","of her academic pressure"],"original":"Although Ally faces a lot of academic pressure, she tries her best to study well.","starter":"In spite","vi":"Mặc dù Ally phải đối mặt với nhiều áp lực học tập, cô ấy vẫn cố gắng hết sức để học tốt.","note":"Although + S + V → In spite of + N/V-ing, S + V<br>Nghĩa đáp án: Mặc dù phải đối mặt với nhiều áp lực học tập, Ally vẫn cố gắng hết sức để học tốt."},{"q":"39.","answer":"among teenagers nowadays is as popular as social networking","explanation":"So sánh nhất = phủ định + so sánh bằng/hơn.","accepted":["among teenagers nowadays is as popular as social networking","among teenagers nowadays is more popular than social networking"],"original":"Social networking is more popular than any other technology among teenagers nowadays.","starter":"No other technology","vi":"Mạng xã hội phổ biến hơn bất kỳ công nghệ nào khác đối với thanh thiếu niên hiện nay.","note":"S + be + more + adj + than any other N → No other N + be + as + adj + as + S<br>Nghĩa đáp án: Không có công nghệ nào khác đối với thanh thiếu niên hiện nay phổ biến bằng mạng xã hội."},{"q":"40.","answer":"up with a good solution to help students deal with stress","explanation":"produce a solution = come up with a solution.","original":"The school finally produced a good solution to help students deal with stress.","starter":"The school finally came","vi":"Cuối cùng nhà trường đã đưa ra một giải pháp tốt để giúp học sinh đối phó với căng thẳng.","note":"produce a solution → come up with a solution<br>Nghĩa đáp án: Cuối cùng nhà trường đã đưa ra một giải pháp tốt để giúp học sinh đối phó với căng thẳng."}],"instant":true}]};

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function buildNav(){
  const nav=document.getElementById('navWrap');
  nav.innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab-btn text-sm font-bold px-3 py-2 rounded-full text-slate-600${i===0?' active':''}" id="navbtn_${i}" onclick="showTab(${i})">${s.roman}. ${s.navLabel}</button>`
  ).join('');
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
