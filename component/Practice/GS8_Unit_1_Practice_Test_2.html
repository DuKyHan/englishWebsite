const DATA = {"unit": 1, "test": 2, "sections": [{"roman": "I", "navLabel": "Ngữ âm & Từ vựng", "title": "Phát âm – Trọng âm – Từ vựng – Ngữ pháp", "icon": "ear-listen", "instructions": "Chọn đáp án (A, B, C hoặc D) đúng nhất.", "type": "mcq", "questions": [{"q": "1. Which word has the underlined part pronounced differently from that of the others?", "options": ["cool", "wool", "spoon", "tool"], "answer": 1, "explanation": "\"wool\" phát âm /ʊ/, ba từ còn lại phát âm /uː/.", "ipas": ["/kuːl/", "/wʊl/", "/spuːn/", "/tuːl/"], "vis": ["mát mẻ", "len", "cái thìa", "dụng cụ"]}, {"q": "2. Which word has the underlined part pronounced differently from that of the others?", "options": ["include", "pudding", "push", "cushion"], "answer": 0, "explanation": "\"include\" phát âm /uː/, ba từ còn lại phát âm /ʊ/.", "ipas": ["/ɪnˈkluːd/", "/ˈpʊdɪŋ/", "/pʊʃ/", "/ˈkʊʃn/"], "vis": ["bao gồm", "bánh pudding", "đẩy", "cái đệm, gối"]}, {"q": "3. Which word has a different stress pattern from that of the others?", "options": ["detest", "prefer", "fancy", "dislike"], "answer": 2, "explanation": "\"fancy\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.", "ipas": ["/dɪˈtest/", "/prɪˈfɜː(r)/", "/ˈfænsi/", "/dɪsˈlaɪk/"], "vis": ["ghét, căm ghét", "thích hơn", "thích, ưa thích", "không thích"]}, {"q": "4. Which word has a different stress pattern from that of the others?", "options": ["museum", "library", "favourite", "melody"], "answer": 0, "explanation": "\"museum\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/mjuˈziːəm/", "/ˈlaɪbrəri/", "/ˈfeɪvərɪt/", "/ˈmelədi/"], "vis": ["viện bảo tàng", "thư viện", "yêu thích nhất", "giai điệu"]}, {"q": "5. Tom: Do you think ___ differences can cause misunderstandings between people?\nLan: Yes, definitely. The way people from different countries communicate is so unique.", "options": ["culturing", "culturally", "cultural", "culture"], "answer": 2, "explanation": "Tính từ đứng trước danh từ \"differences\" → cultural.", "vi": "Tom: 'Bạn có nghĩ rằng sự khác biệt văn hóa có thể gây ra hiểu lầm giữa mọi người không?' – Lan: 'Có chứ. Cách mà người dân từ các quốc gia khác nhau giao tiếp thật sự rất độc đáo.'"}, {"q": "6. Hoa: You looked so focused this afternoon. What were you doing?\nNam: I spent hours on a DIY project, but I'm still not ___ with the final result.", "options": ["satisfaction", "satisfied", "satisfy", "satisfactory"], "answer": 1, "explanation": "be satisfied with = hài lòng với.", "vi": "Hoa: 'Chiều nay trông bạn tập trung quá. Bạn đang làm gì vậy?' – Nam: 'Mình đã dành hàng giờ cho một dự án tự làm (DIY), nhưng mình vẫn chưa hài lòng với kết quả cuối cùng.'"}, {"q": "7. Mai: How does Phong gather information for his group presentation so fast?\nBa: He usually ___ the Internet to find useful articles and study tips.", "options": ["looks up", "types", "checks", "surfs"], "answer": 3, "explanation": "\"surf the Internet\" = lướt web.", "vis": ["tra cứu, tìm kiếm", "gõ, đánh máy", "kiểm tra", "lướt (mạng)"], "vi": "Mai: 'Làm sao mà Phong thu thập thông tin cho bài thuyết trình nhóm nhanh vậy?' – Ba: 'Cậu ấy thường lướt mạng Internet để tìm các bài viết hữu ích và mẹo học tập.'"}, {"q": "8. Jane: I love using social media apps nowadays.\nMark: Me too. They allow us to communicate ___ friends from different parts of the world easily.", "options": ["for", "with", "to", "of"], "answer": 1, "explanation": "\"communicate with sb\" = giao tiếp với ai.", "vis": ["cho, vì", "với, cùng", "đến, tới", "của, thuộc về"], "vi": "Jane: 'Mình rất thích dùng các ứng dụng mạng xã hội thời nay.' – Mark: 'Mình cũng vậy. Chúng cho phép chúng ta giao tiếp với bạn bè ở khắp nơi trên thế giới một cách dễ dàng.'"}, {"q": "9. Doctor: You should start ___ aerobics 30 minutes a day to stay healthy.\nPatient: Thank you. I want to improve my full-body flexibility.", "options": ["doing", "taking", "using", "making"], "answer": 0, "explanation": "\"do aerobics\" = tập thể dục  "III", "navLabel": "Điền đoạn văn", "title": "Chọn từ thích hợp điền vào đoạn văn", "icon": "file-lines", "instructions": "Chọn đáp án đúng để hoàn thành đoạn văn.", "type": "mcq", "passage": {"title": "Cách người dân các nước thư giãn", "html": "How do people relax in other countries? People in the U.S. do a lot of activities to relax, ranging from television viewing, reading, doing any one of (17)___ handicrafts, and getting into sports and exercise. Americans love their free time. Sharing some relaxing activities with other cultures, people living in Germany love (18)___ out at the beach. Another famous German pastime is frequenting saunas and hot tubs. The British prefer gardening, swimming, watching TV, going to the theatre. In Russia, people like to get away to dachas in the countryside. Dachas, known as cottages, are typically found (19)___ the outskirts of cities and towns in Russia. They are often visited by people (20)___ want to visit beautiful (21)___ near lakes or forests. Russian people (22)___ love to go to the swimming pools, concerts and football matches.", "vi": "Người dân ở các nước khác thư giãn như thế nào? Người Mỹ thực hiện rất nhiều hoạt động để thư giãn, từ xem tivi, đọc sách, làm (17) ___ đồ thủ công, cho đến chơi thể thao và tập luyện. Người Mỹ rất yêu thích thời gian rảnh của mình. Có chung một số hoạt động thư giãn với các nền văn hóa khác, người dân sống ở Đức thích ra biển (18) ___ chơi. Một thú vui nổi tiếng khác của người Đức là thường xuyên đến các phòng xông hơi và bồn tắm nước nóng. Người Anh thích làm vườn, bơi lội, xem tivi, đi xem kịch. Ở Nga, người dân thích về các nhà nghỉ dacha ở vùng nông thôn. Dacha, được biết đến như những ngôi nhà nghỉ dưỡng, thường nằm (19) ___ ngoại ô các thành phố và thị trấn ở Nga. Chúng thường được những người (20) ___ muốn đến thăm những (21) ___ đẹp gần hồ hoặc rừng ghé thăm. Người Nga (22) ___ rất thích đến các bể bơi, buổi hòa nhạc và các trận bóng đá."}, "questions": [{"q": "17.", "options": ["much", "an", "every", "some"], "answer": 3, "explanation": "\"some handicrafts\" = một vài loại đồ thủ công.", "vis": ["nhiều (không đếm được)", "một (mạo từ, trước nguyên âm)", "mỗi, tất cả", "một vài, một số"], "vi": "Người Mỹ thực hiện nhiều hoạt động thư giãn như làm (17) ___ đồ thủ công."}, {"q": "18.", "options": ["staying", "sitting", "walking", "hanging"], "answer": 3, "explanation": "\"hang out at the beach\" = ra biển chơi, thư giãn.", "vis": ["ở lại, lưu lại", "ngồi", "đi bộ", "(hang out) đi chơi, tụ tập"], "vi": "Người dân ở Đức thích ra biển (18) ___ chơi."}, {"q": "19.", "options": ["to", "in", "on", "at"], "answer": 2, "explanation": "\"found on the outskirts\" = nằm ở ngoại ô.", "vis": ["đến, tới", "trong, ở trong", "trên, ở (on the outskirts = ở ngoại ô)", "tại, ở"], "vi": "Các nhà nghỉ dacha thường nằm (19) ___ ngoại ô các thành phố và thị trấn."}, {"q": "20.", "options": ["knowing", "which", "who", "known"], "answer": 2, "explanation": "Mệnh đề quan hệ chỉ người: \"people who want to visit...\" → who.", "vis": ["biết (phân từ)", "cái mà (đại từ quan hệ chỉ vật)", "người mà (đại từ quan hệ chỉ người)", "được biết đến (phân từ)"], "vi": "Chúng thường được những người (20) ___ muốn đến thăm những khu vực đẹp ghé thăm."}, {"q": "21.", "options": ["borders", "spaces", "areas", "outskirts"], "answer": 2, "explanation": "\"beautiful areas near lakes or forests\" = những khu vực đẹp gần hồ hoặc rừng.", "vis": ["biên giới", "không gian, khoảng trống", "khu vực", "vùng ngoại ô"], "vi": "...muốn đến thăm những (21) ___ đẹp gần hồ hoặc rừng."}, {"q": "22.", "options": ["either", "as well", "too", "also"], "answer": 3, "explanation": "\"Russian people also love...\" = người Nga cũng thích...", "vis": ["cũng (không) — dùng trong câu phủ định", "cũng, cũng vậy (đứng cuối câu)", "cũng (đứng cuối câu, câu khẳng định)", "cũng (đứng trước động từ chính)"], "vi": "Người Nga (22) ___ rất thích đến các bể bơi, buổi hòa nhạc và các trận bóng đá."}], "instant": true}, {"roman": "IV", "navLabel": "Đọc hiểu", "title": "Đọc hiểu", "icon": "book-open", "instructions": "Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.", "type": "mcq", "passage": {"title": "Take a Bath!", "html": "Traveling is fun because you can see how people in other parts of the world live. One thing travelers don't often think about before traveling is how other cultures bathe. And bathrooms in many countries may be different from the kind you are used to.<br><br>In the United States, most people take a shower once a day in the morning. The showerhead is usually mounted on the wall and cannot be moved. The bather simply stands under the water, gets wet, scrubs with soap and often a washcloth, and then rinses off.<br><br>Children often take a bath each night and enjoy playing with small toys such as boats and rubber ducks. Many adults, especially women, enjoy a soothing bath to get rid of stress at the end of the day.<br><br>It is important to remember that when you take a shower or bath in the United States, you should be careful to keep the water inside the bathtub or shower. Unlike bathrooms in many countries, there is no drain in the floor. If water gets on the floor it cannot go anywhere and must be cleaned up with a towel or mop. It can also cause problems for the floor. So be careful.", "vi": "Du lịch thật thú vị vì bạn có thể thấy được cách người dân ở những nơi khác trên thế giới sinh sống. Một điều mà khách du lịch thường không nghĩ tới trước khi đi là cách các nền văn hóa khác tắm rửa. Và phòng tắm ở nhiều nước có thể khác với loại mà bạn đã quen.<br><br>Ở Hoa Kỳ, hầu hết mọi người tắm vòi sen một lần mỗi ngày vào buổi sáng. Vòi sen thường được gắn cố định trên tường và không thể di chuyển được. Người tắm chỉ cần đứng dưới vòi nước, làm ướt người, kỳ cọ bằng xà phòng và thường là khăn tắm, rồi xả sạch.<br><br>Trẻ em thường tắm bồn mỗi tối và thích chơi với những món đồ chơi nhỏ như thuyền và vịt cao su. Nhiều người lớn, đặc biệt là phụ nữ, thích tắm bồn thư giãn để giải tỏa căng thẳng vào cuối ngày.<br><br>Điều quan trọng cần nhớ là khi bạn tắm vòi sen hoặc tắm bồn ở Hoa Kỳ, bạn nên cẩn thận giữ nước ở trong bồn tắm hoặc khu vực tắm vòi sen. Không giống như phòng tắm ở nhiều nước khác, sàn nhà ở đây không có lỗ thoát nước. Nếu nước tràn ra sàn, nó sẽ không thể thoát đi đâu được và phải lau dọn bằng khăn hoặc cây lau nhà. Nó cũng có thể gây hư hại cho sàn nhà. Vì vậy hãy cẩn thận."}, "questions": [{"q": "23. Most people in the United States usually prefer to take a shower in the evening.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"most people take a shower once a day in the morning\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Hầu hết người Mỹ thường thích tắm vòi sen vào buổi tối."}, {"q": "24. In American bathrooms, you can easily move the showerhead around with your hand.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"The showerhead is usually mounted on the wall and cannot be moved\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Trong phòng tắm ở Mỹ, bạn có thể dễ dàng di chuyển vòi sen bằng tay."}, {"q": "25. American children frequently play with toys like rubber ducks while taking a bath.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"enjoy playing with small toys such as boats and rubber ducks\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Trẻ em Mỹ thường chơi với đồ chơi như vịt cao su khi tắm bồn."}, {"q": "26. Bathrooms in the United States do not have a drain on the floor to let water out.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"there is no drain in the floor\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Phòng tắm ở Hoa Kỳ không có lỗ thoát nước trên sàn để thoát nước ra ngoài."}, {"q": "27. What is the main idea of the passage?", "options": ["A guide to how people bathe in America and important rules for travelers.", "The history of bathroom designs and sanitation in the United States.", "The psychological b function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}

function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }

    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function buildNav(){
  const nav=document.getElementById('navWrap');
  nav.innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab-btn text-sm font-bold px-3 py-2 rounded-full text-slate-600${i===0?' active':''}" id="navbtn_${i}" onclick="showTab(${i})">${s.roman}. ${s.navLabel}</button>`
  ).join('');
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
