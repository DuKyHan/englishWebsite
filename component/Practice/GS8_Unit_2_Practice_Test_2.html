<script>
const DATA = {"unit": 2, "test": 2, "sections": [{"roman": "I", "navLabel": "Ngữ âm & Từ vựng", "title": "Phát âm – Trọng âm – Từ vựng – Ngữ pháp", "icon": "ear-listen", "instructions": "Chọn đáp án (A, B, C hoặc D) đúng nhất.", "type": "mcq", "questions": [{"q": "1. Which word has the underlined part pronounced differently from that of the others?", "options": ["j<u>a</u>m", "tr<u>a</u>gedy", "rel<u>a</u>tive", "tr<u>a</u>ffic"], "answer": 2, "explanation": "\"relative\" phát âm khác so với ba từ còn lại.", "ipas": ["/dʒæm/", "/ˈtrædʒədi/", "/ˈrelətɪv/", "/ˈtræfɪk/"], "vis": ["mứt; kẹt xe", "bi kịch", "người thân; tương đối", "giao thông"]}, {"q": "2. Which word has the underlined part pronounced differently from that of the others?", "options": ["pref<u>e</u>r", "apartm<u>e</u>nt", "off<u>e</u>r", "anoth<u>e</u>r"], "answer": 1, "explanation": "\"apartment\" phát âm /ɑː/, ba từ còn lại phát âm /ə/.", "ipas": ["/prɪˈfɜː(r)/", "/əˈpɑːtmənt/", "/ˈɒfə(r)/", "/əˈnʌðə(r)/"], "vis": ["thích hơn", "căn hộ", "đề nghị, cung cấp", "cái khác, một cái nữa"]}, {"q": "3. Which word has a different stress pattern from that of the others?", "options": ["beauty", "machine", "brother", "mother"], "answer": 1, "explanation": "\"machine\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/ˈbjuːti/", "/məˈʃiːn/", "/ˈbrʌðə(r)/", "/ˈmʌðə(r)/"], "vis": ["vẻ đẹp", "máy móc", "anh/em trai", "mẹ"]}, {"q": "4. Which word has a different stress pattern from that of the others?", "options": ["festival", "holiday", "collection", "family"], "answer": 2, "explanation": "\"collection\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/ˈfestɪvl/", "/ˈhɒlədeɪ/", "/kəˈlekʃn/", "/ˈfæməli/"], "vis": ["lễ hội", "kỳ nghỉ, ngày lễ", "bộ sưu tập", "gia đình"]}, {"q": "5. Tom: Look at those bees! Collecting honey from the ___ requires a lot of skill.\nJerry: Yes, the farmers have to be very careful or they will get stung.", "options": ["beehive", "beenest", "beehouse", "beehome"], "answer": 0, "explanation": "\"beehive\" = tổ ong.", "vis": ["tổ ong", "(từ không tồn tại)", "(từ không tồn tại)", "(từ không tồn tại)"], "vi": "Tom: 'Nhìn đàn ong kìa! Lấy mật từ tổ ong đòi hỏi rất nhiều kỹ năng.' – Jerry: 'Đúng vậy, người nông dân phải rất cẩn thận nếu không sẽ bị đốt.'"}, {"q": "6. Customer: I am very sorry for any ___ caused by our late payment.\nShopkeeper: That's fine, sir. We received it this morning.", "options": ["convenient", "inconvenience", "inconvenient", "convenience"], "answer": 1, "explanation": "Danh từ sau \"any\" → inconvenience (sự bất tiện).", "vi": "Khách hàng: 'Tôi rất xin lỗi vì bất kỳ sự bất tiện nào do việc thanh toán trễ của chúng tôi gây ra.' – Chủ cửa hàng: 'Không sao đâu, thưa ông. Chúng tôi đã nhận được thanh toán sáng nay rồi.'"}, {"q": "7. Anna: Look! The children in the countryside are so hard-working.\nBen: Yes, they are used to ___ cattle in the field at a very young age.", "options": ["raising", "herding", "walking", "following"], "answer": 1, "explanation": "\"herd cattle\" = chăn gia súc.", "vis": ["nuôi (nói chung)", "chăn (gia súc)", "đi bộ", "đi theo, làm theo"], "vi": "Anna: 'Nhìn kìa! Trẻ em ở nông thôn rất chăm chỉ.' – Ben: 'Đúng vậy, chúng đã quen với việc chăn gia súc ngoài đồng từ khi còn rất nhỏ.'"}, {"q": "8. Reporter: How bad was the forest fire last night?\nFirefighter: A ___ area of that forest - more than 1000 hectares - was completely destroyed.", "options": ["vast", "small", "tiny", "inconsiderable"], "answer": 0, "explanation": "\"a vast area\" = một khu vực rộng lớn.", "vis": ["rộng lớn, bao la", "nhỏ", "rất nhỏ, tí hon", "không đáng kể"], "vi": "Phóng viên: 'Vụ cháy rừng tối qua nghiêm trọng như thế nào?' – Lính cứu hỏa: 'Một khu vực rộng lớn của khu rừng đó - hơn 1000 héc-ta - đã bị phá hủy hoàn toàn.'"}, {"q": "9. Jessie: Sunny is a fantastic performer, isn't she?\nKatie: Absolutely! Sunny sings the song ___ than anyone else in our class.", "options": ["more good", "better", "more well", "best"], "answer": 1, "explanation": "So sánh hơn của \"well\": better.", "vi": "Jessie: 'Sunny là một người biểu diễn tuyệt vời, phải không?' – Katie: 'Chắc chắn rồi! Sunny hát bài đó hay hơn bất kỳ ai khác trong lớp chúng ta.'"}, {"q": "10. Teacher: Ly, why did you arrive so early today?\nLy: I wanted to review my lesson, so I came to class ___ than I did yesterday, teacher.", "options": ["more early", "more easily", "too early", "earlier"], "answer": 3, "explanation": "So sánh hơn của \"early\": earlier.", "vi": "Giáo viên: 'Ly, sao hôm nay em đến sớm vậy?' – Ly: 'Em muốn ôn lại bài nên em đến lớp sớm hơn so với hôm qua ạ, thưa cô.'"}, {"q": "11. Minh: Do you prefer living in the city or in the countryside?\nLong: The city, definitely. Things in the city are much more ___ than in the country.", "options": ["more modernder", "moderner", "modern", "much modern"], "answer": 2, "explanation": "So sánh hơn với \"more\" đã có sẵn: much more modern.", "vi": "Minh: 'Bạn thích sống ở thành phố hay ở nông thôn hơn?' – Long: 'Thành phố, chắc chắn rồi. Mọi thứ ở thành phố hiện đại hơn nhiều so với ở nông thôn.'"}, {"q": "12. Nick: I heard you went on a volunteer trip to a remote village. You've made new friends?\nAly: ___! Everyone there was incredibly welcoming.", "options": ["You're welcome", "Yes, I did", "Yes, please", "Yeah, right on the first day"], "answer": 3, "explanation": "Trả lời khẳng định kèm chi tiết cụ thể.", "vis": ["Không có gì đâu", "Vâng, đúng vậy", "Vâng, xin mời", "Đúng vậy, ngay từ ngày đầu tiên"], "vi": "Nick: 'Mình nghe nói bạn đã đi tình nguyện ở một ngôi làng xa xôi. Bạn đã kết bạn mới chưa?' – Aly: 'Đúng vậy, ngay từ ngày đầu tiên! Mọi người ở đó đón tiếp nồng hậu vô cùng.'"}, {"q": "13. Foreigner: Life in this mountainous village is so quiet and peaceful.\nLocal guide: That's true. However, people here have a lower standard of living ___ in big cities.", "options": ["different from", "more than", "as much as", "than those"], "answer": 3, "explanation": "So sánh với danh từ số nhiều \"standards\" thay thế: than those.", "vi": "Người nước ngoài: 'Cuộc sống ở ngôi làng miền núi này thật yên tĩnh và thanh bình.' – Hướng dẫn viên địa phương: 'Đúng vậy. Tuy nhiên, người dân ở đây có mức sống thấp hơn so với ở các thành phố lớn.'"}, {"q": "14. Peter: I think online working will allow more people to move to rural areas.\nMary: \"___\"", "options": ["Yes, please. I love city life.", "You can say that again, cities are crowded.", "Exactly! It makes living there much more possible.", "I don't think so, rural areas are too noisy."], "answer": 2, "explanation": "Đồng tình với ý kiến của Peter.", "vis": ["Vâng, làm ơn. Tôi thích cuộc sống thành phố.", "Bạn nói đúng đấy, thành phố thì đông đúc.", "Chính xác! Điều đó khiến việc sống ở đó khả thi hơn nhiều.", "Tôi không nghĩ vậy, vùng nông thôn thì quá ồn ào."], "vi": "Peter: 'Mình nghĩ làm việc trực tuyến sẽ cho phép nhiều người chuyển đến sống ở vùng nông thôn hơn.' – Mary: 'Chính xác! Điều đó khiến việc sống ở đó khả thi hơn nhiều.'"}], "instant": true}, {"roman": "II", "navLabel": "Biển báo", "title": "Biển báo / Thông báo", "icon": "traffic-light", "instructions": "Đọc biển báo/thông báo và chọn ý đúng nhất.", "type": "mcq", "questions": [{"q": "15. What does this notice tell you?", "options": ["There are 24 dumpsters in this local area.", "You need to check the quality of the dumpster every 24 hours.", "Someone is allowed to use the dumpster all day and all night.", "The waste dumpster is under constant watch by cameras."], "answer": 3, "explanation": "A. There are 24 dumpsters in this local area. — sai, biển không nói về số lượng thùng rác (Nghĩa: Có 24 thùng rác trong khu vực này.)<br>B. You need to check the quality of the dumpster every 24 hours. — sai, biển không yêu cầu kiểm tra chất lượng (Nghĩa: Bạn cần kiểm tra chất lượng thùng rác mỗi 24 giờ.)<br>C. Someone is allowed to use the dumpster all day and all night. — sai, biển không cho phép sử dụng thoải mái cả ngày lẫn đêm (Nghĩa: Ai đó được phép sử dụng thùng rác cả ngày lẫn đêm.)<br>D. The waste dumpster is under constant watch by cameras. — đúng, khớp với ý nghĩa camera giám sát 24/24 ✓ (Nghĩa: Thùng rác được camera giám sát liên tục.)", "vis": ["Có 24 thùng rác trong khu vực này.", "Bạn cần kiểm tra chất lượng thùng rác mỗi 24 giờ.", "Ai đó được phép sử dụng thùng rác cả ngày lẫn đêm.", "Thùng rác được camera giám sát liên tục."], "image": "<div class=\"inline-flex flex-col items-center w-52 bg-white border-2 border-red-300 rounded-xl p-3 shadow-sm\"><div class=\"text-4xl mb-1\">📹</div><p class=\"text-[11px] font-black text-center text-red-700 leading-tight\">WARNING: DUMPSTER UNDER 24-HOUR VIDEO SURVEILLANCE</p></div>"}, {"q": "16. What does this notice say?", "options": ["\"Pasta Delight\" is a new permanent menu item for students.", "\"Pizza Day\" will be available as usual on June 16th.", "Pizza will not be served on June 16th because of a menu change.", "Pizza will return to the school cafeteria before June 23rd."], "answer": 2, "explanation": "A. \"Pasta Delight\" is a new permanent menu item for students. — sai, thông báo không nói đây là món ăn thường trực mới (Nghĩa: \"Pasta Delight\" là món ăn mới, cố định trong thực đơn của học sinh.)<br>B. \"Pizza Day\" will be available as usual on June 16th. — sai, ngược với thông báo (pizza bị thay thế) (Nghĩa: \"Ngày Pizza\" sẽ diễn ra như thường lệ vào ngày 16 tháng 6.)<br>C. Pizza will not be served on June 16th because of a menu change. — đúng, khớp với thông báo pizza được thay bằng pasta ✓ (Nghĩa: Pizza sẽ không được phục vụ vào ngày 16 tháng 6 do thay đổi thực đơn.)<br>D. Pizza will return to the school cafeteria before June 23rd. — sai, thông báo không đề cập ngày trở lại (Nghĩa: Pizza sẽ quay lại căng-tin trường trước ngày 23 tháng 6.)", "vis": ["\"Pasta Delight\" là món ăn mới, cố định trong thực đơn của học sinh.", "\"Ngày Pizza\" sẽ diễn ra như thường lệ vào ngày 16 tháng 6.", "Pizza sẽ không được phục vụ vào ngày 16 tháng 6 do thay đổi thực đơn.", "Pizza sẽ quay lại căng-tin trường trước ngày 23 tháng 6."], "image": "<div class=\"inline-flex flex-col items-center w-52 bg-white border-2 border-amber-300 rounded-xl p-3 shadow-sm\"><div class=\"text-4xl mb-1\">🍝</div><p class=\"text-[11px] font-black text-center text-amber-800 leading-tight\">SPECIAL NOTICE: \"PIZZA DAY\" ON JUNE 16 WILL BE REPLACED BY PASTA</p></div>"}], "instant": true}, {"roman": "III", "navLabel": "Điền đoạn văn", "title": "Chọn từ thích hợp điền vào đoạn văn", "icon": "file-lines", "instructions": "Chọn đáp án đúng để hoàn thành đoạn văn.", "type": "mcq", "passage": {"title": "Kỳ nghỉ ở đảo Cát Bà", "html": "Last summer, Thanh went (17)___ a holiday for two weeks to the island of Cat Ba. He rented a hotel (18)___ had a wonderful swimming pool and beautiful views of the sea. It was in a village where the local people went fishing in the winter, and foreign (19)___ came in the summer. Thanh spent his first day on the beach, but on the second day he felt very ill. First, he was too hot, then he was too cold. He couldn't understand (20)___ he felt like that. So he went to see the local doctor, who was a very nice man, and whose voice was so sweet. \"Summer is a time when people often feel ill,\" the doctor said. \"It's too hot for (21)___ of us! Take this medicine, and stay out of the sun.\" Thanh took the doctor's (22)___ and stayed in his room for the rest of his holiday. He soon felt better. \"What a cheap holiday!\" he thought happily.", "vi": "Mùa hè năm ngoái, Thanh đã đi (17) ___ nghỉ mát hai tuần tại đảo Cát Bà. Anh ấy thuê một khách sạn (18) ___ có một hồ bơi tuyệt vời và tầm nhìn đẹp ra biển. Đó là một ngôi làng nơi người dân địa phương đi đánh cá vào mùa đông, còn (19) ___ nước ngoài thì đến vào mùa hè. Thanh dành ngày đầu tiên trên bãi biển, nhưng đến ngày thứ hai thì anh cảm thấy rất khó chịu trong người. Lúc đầu anh thấy quá nóng, sau đó lại thấy quá lạnh. Anh không thể hiểu (20) ___ mình lại cảm thấy như vậy. Vì thế anh đến gặp bác sĩ địa phương, một người đàn ông rất tốt bụng và có giọng nói rất dễ chịu. 'Mùa hè là thời điểm mọi người thường hay bị ốm,' bác sĩ nói. 'Trời quá nóng đối với hầu hết (21) ___ chúng ta! Hãy uống thuốc này và tránh xa ánh nắng.' Thanh nghe theo (22) ___ của bác sĩ và ở trong phòng suốt phần còn lại của kỳ nghỉ. Anh sớm cảm thấy khỏe hơn. 'Một kỳ nghỉ thật rẻ!' anh nghĩ một cách vui vẻ."}, "questions": [{"q": "17.", "options": ["for", "at", "in", "on"], "answer": 3, "explanation": "\"go on a holiday\" = đi nghỉ mát.", "vis": ["đi ... (thuộc cụm \"go for a holiday\" = đi nghỉ mát)", "tại (giới từ chỉ vị trí, sai ngữ cảnh)", "trong (giới từ chỉ vị trí, sai ngữ cảnh)", "trên/vào (giới từ chỉ bề mặt hoặc ngày, sai ngữ cảnh)"], "vi": "Thanh đã đi (17) ___ nghỉ mát hai tuần tại đảo Cát Bà."}, {"q": "18.", "options": ["who", "where", "which", "whose"], "answer": 2, "explanation": "Mệnh đề quan hệ chỉ vật (a hotel) → which.", "vis": ["dùng cho người (đại từ quan hệ chỉ người)", "dùng cho nơi chốn (đại từ quan hệ chỉ nơi chốn)", "dùng cho vật (đại từ quan hệ chỉ vật - đúng vì \"a hotel\" là vật)", "dùng chỉ sở hữu (đại từ quan hệ sở hữu)"], "vi": "Anh ấy thuê một khách sạn (18) ___ có hồ bơi tuyệt vời và tầm nhìn đẹp ra biển."}, {"q": "19.", "options": ["guides", "visitors", "passengers", "actors"], "answer": 1, "explanation": "Khách du lịch nước ngoài đến vào mùa hè → visitors.", "vis": ["hướng dẫn viên", "khách du lịch, du khách", "hành khách", "diễn viên"], "vi": "Người dân địa phương đi đánh cá vào mùa đông, còn (19) ___ nước ngoài thì đến vào mùa hè."}, {"q": "20.", "options": ["what", "how", "why", "when"], "answer": 2, "explanation": "\"couldn't understand why he felt like that\" = không hiểu tại sao.", "vis": ["cái gì (hỏi về vật/sự việc)", "như thế nào (hỏi về cách thức)", "tại sao (hỏi về lý do - đúng ngữ cảnh)", "khi nào (hỏi về thời gian)"], "vi": "Anh không thể hiểu (20) ___ mình lại cảm thấy như vậy."}, {"q": "21.", "options": ["each", "every", "most", "much"], "answer": 2, "explanation": "\"too hot for most of us\" = quá nóng đối với hầu hết chúng ta.", "vis": ["mỗi (dùng riêng lẻ với danh từ số ít, không dùng với \"of us\")", "mỗi, mọi (dùng với danh từ số ít, không dùng với \"of us\")", "hầu hết (đúng ngữ cảnh, dùng với \"of us\")", "nhiều (dùng với danh từ không đếm được, không dùng với \"of us\")"], "vi": "Trời quá nóng đối với hầu hết (21) ___ chúng ta!"}, {"q": "22.", "options": ["notice", "choice", "idea", "advice"], "answer": 3, "explanation": "\"take the doctor's advice\" = nghe theo lời khuyên của bác sĩ.", "vis": ["thông báo", "sự lựa chọn", "ý tưởng", "lời khuyên (đúng, \"take advice\" = nghe theo lời khuyên)"], "vi": "Thanh nghe theo (22) ___ của bác sĩ."}], "instant": true}, {"roman": "IV", "navLabel": "Đọc hiểu", "title": "Đọc hiểu", "icon": "book-open", "instructions": "Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.", "type": "mcq", "passage": {"title": "Ways of Making a Living in Vietnam", "html": "With the habit of working in teams and being helpful to one another, villagers usually earn their living from farming, raising livestock and making handicrafts. They live in a small community with a temple or a communal cultural house where great events, such as festivals worshipping the village god and traditional games are organized. Villagers in the Southern usually live in houses lined up along central road and built on stilts to keep above flood waters. Along the coastal lines, fishermen depend on the sea as a means of livelihood. In the Central of Vietnam, a place suffering lots of natural disasters all the year round, citizens tend to be more studious and hard-working than those in regions with favourable conditions. People in the central highlands and the northern mountains live by growing rice, rubber trees, coffee and tea as well as hunting.", "vi": "Với thói quen làm việc theo nhóm và giúp đỡ lẫn nhau, người dân làng thường kiếm sống bằng nghề nông, chăn nuôi gia súc và làm đồ thủ công. Họ sống trong một cộng đồng nhỏ có đình hoặc nhà văn hóa cộng đồng, nơi tổ chức các sự kiện lớn như lễ hội thờ thành hoàng làng và các trò chơi dân gian. Người dân ở miền Nam thường sống trong những ngôi nhà xếp dọc theo con đường trung tâm và được xây trên cột (nhà sàn) để tránh nước lũ. Dọc theo vùng ven biển, ngư dân sống dựa vào biển như một nguồn sinh kế. Ở miền Trung Việt Nam, nơi hứng chịu nhiều thiên tai quanh năm, người dân có xu hướng chăm chỉ và cần cù hơn so với những người ở các vùng có điều kiện thuận lợi. Người dân ở Tây Nguyên và miền núi phía Bắc sống bằng nghề trồng lúa, cao su, cà phê và chè cũng như săn bắt."}, "questions": [{"q": "23. Villagers generally prefer to work alone rather than in groups.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"the habit of working in teams and being helpful to one another\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Người dân làng thường thích làm việc một mình hơn là làm việc theo nhóm."}, {"q": "24. Festivals and traditional games are held in temples or communal cultural houses.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"a temple or a communal cultural house where great events... are organized\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Các lễ hội và trò chơi dân gian được tổ chức tại đình hoặc nhà văn hóa cộng đồng."}, {"q": "25. People in the Southern region build houses on stilts to protect themselves from floods.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"built on stilts to keep above flood waters\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Người dân ở miền Nam xây nhà sàn để tránh lũ lụt."}, {"q": "26. The Central region of Vietnam has very good weather conditions throughout the year.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"a place suffering lots of natural disasters all the year round\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Miền Trung Việt Nam có điều kiện thời tiết rất tốt quanh năm."}, {"q": "27. What is the main idea of the passage?", "options": ["The different ways of making a living in coastal areas of Vietnam.", "The diverse lifestyles and occupations of people in different regions of Vietnam.", "The historical importance of communal cultural houses in Vietnamese villages.", "The difficulties faced by people living in the central highlands and northern mountains."], "answer": 1, "explanation": "Bài đọc bàn về cách sinh sống đa dạng của người dân ở các vùng miền khác nhau của Việt Nam.", "vis": ["Những cách kiếm sống khác nhau ở vùng ven biển Việt Nam.", "Lối sống và nghề nghiệp đa dạng của người dân ở các vùng miền khác nhau của Việt Nam.", "Tầm quan trọng lịch sử của nhà văn hóa cộng đồng ở các làng quê Việt Nam.", "Những khó khăn mà người dân ở Tây Nguyên và miền núi phía Bắc phải đối mặt."], "vi": "Ý chính của đoạn văn là gì?"}, {"q": "28. Which of the following is NOT true according to the passage?", "options": ["Southern villagers often build their houses along a central road.", "Central Vietnamese people are often very studious because they face many natural disasters.", "Highland and northern mountain residents only get their food and income from hunting.", "Coastal fishermen rely entirely on farming to earn their living."], "answer": 3, "explanation": "Bài đọc: ngư dân ven biển sống nhờ vào biển (đánh bắt cá), không phải làm nông → mâu thuẫn với bài đọc.", "vis": ["Người dân miền Nam thường xây nhà dọc theo con đường trung tâm.", "Người dân miền Trung Việt Nam thường rất chăm chỉ vì họ phải đối mặt với nhiều thiên tai.", "Người dân ở Tây Nguyên và miền núi phía Bắc chỉ có thức ăn và thu nhập từ việc săn bắt.", "Ngư dân ven biển hoàn toàn sống dựa vào nghề nông để kiếm sống."], "vi": "Ý nào sau đây KHÔNG đúng theo đoạn văn?"}], "instant": true}, {"roman": "V", "navLabel": "Từ loại", "title": "Cho dạng đúng của từ trong ngoặc", "icon": "spell-check", "instructions": "Điền dạng đúng của từ trong ngoặc vào chỗ trống.", "type": "fill", "questions": [{"q": "29. Our class recently went on a field trip to a rural area, and it was a very ___ experience.", "answer": "wonderful", "explanation": "Tính từ: wonder + ful → wonderful.", "hint": "(WONDER)", "vi": "Lớp chúng tôi vừa có một chuyến đi thực tế đến vùng nông thôn, và đó là một trải nghiệm tuyệt vời.", "family": ["wonder (v): ngạc nhiên, tự hỏi", "wonder (n): điều kỳ diệu, sự ngạc nhiên", "wonderful (adj): tuyệt vời, kỳ diệu", "wonderfully (adv): một cách tuyệt vời"]}, {"q": "30. We helped local farmers harvest vegetables and enjoyed the ___ of the countryside.", "answer": "peacefulness", "explanation": "Danh từ: peaceful → peacefulness (sự yên bình).", "hint": "(PEACEFUL)", "vi": "Chúng tôi đã giúp nông dân địa phương thu hoạch rau và tận hưởng sự yên bình của vùng nông thôn.", "family": ["peace (n): hòa bình, sự yên bình", "peaceful (adj): yên bình, thanh bình", "peacefulness (n): sự yên bình", "peacefully (adv): một cách yên bình"]}, {"q": "31. The local people are very friendly and ___; they shared many stories with us.", "answer": "hospitable", "explanation": "Tính từ giữ nguyên: hospitable (hiếu khách).", "hint": "(HOSPITABLE)", "vi": "Người dân địa phương rất thân thiện và hiếu khách; họ đã chia sẻ nhiều câu chuyện với chúng tôi.", "family": ["hospitable (adj): hiếu khách", "hospitality (n): lòng hiếu khách", "hospitably (adv): một cách hiếu khách"]}, {"q": "32. This exciting trip gave us a deeper ___ for the simple life of the villagers.", "answer": "appreciation", "explanation": "Danh từ: appreciate → appreciation (sự trân trọng).", "hint": "(APPRECIATE)", "vi": "Chuyến đi thú vị này giúp chúng tôi trân trọng sâu sắc hơn cuộc sống giản dị của người dân làng.", "family": ["appreciate (v): trân trọng, đánh giá cao", "appreciation (n): sự trân trọng, sự đánh giá cao", "appreciative (adj): biết trân trọng, biết ơn"]}, {"q": "33. Living in the countryside is less ___ than living i const completedTasks = new Set();
const scores = {};
const TOTAL_TASKS = DATA.sections.length;

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function buildNav(){
  const nav=document.getElementById('navWrap');
  nav.innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab-btn text-sm font-bold px-3 py-2 rounded-full text-slate-600${i===0?' active':''}" id="navbtn_${i}" onclick="showTab(${i})">${s.roman}. ${s.navLabel}</button>`
  ).join('');
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
