<style>

  :root{ --accent:#ea580c; --accent2:#eab308; }

<script>
const DATA = {"unit": 1, "test": 1, "sections": [{"roman": "I", "navLabel": "Ngữ âm & Từ vựng", "title": "Phát âm – Trọng âm – Từ vựng – Ngữ pháp", "icon": "ear-listen", "instructions": "Chọn đáp án (A, B, C hoặc D) đúng nhất.", "type": "mcq", "questions": [{"q": "1. Which word has the underlined part pronounced differently from that of the others?", "options": ["<u>a</u>mount", "f<u>a</u>vourite", "pl<u>a</u>ne", "p<u>a</u>tient"], "answer": 0, "explanation": "\"amount\" phát âm /aʊ/, ba từ còn lại phát âm /eɪ/.", "ipas": ["/əˈmaʊnt/", "/ˈfeɪvərɪt/", "/pleɪn/", "/ˈpeɪʃnt/"], "vis": ["số lượng", "yêu thích nhất", "máy bay", "kiên nhẫn; bệnh nhân"]}, {"q": "2. Which word has the underlined part pronounced differently from that of the others?", "options": ["<u>t</u>each", "sui<u>t</u>able", "ac<u>t</u>ion", "pain<u>t</u>ing"], "answer": 2, "explanation": "\"action\" phát âm /k/, ba từ còn lại có \"t\" phát âm /t/ hoặc /tʃ/ khác biệt.", "ipas": ["/tiːtʃ/", "/ˈsuːtəbl/", "/ˈækʃn/", "/ˈpeɪntɪŋ/"], "vis": ["dạy học", "phù hợp", "hành động", "tranh vẽ; hội họa"]}, {"q": "3. Which word has a different stress pattern from that of the others?", "options": ["early", "judo", "begin", "insect"], "answer": 2, "explanation": "\"begin\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/ˈɜːli/", "/ˈdʒuːdəʊ/", "/bɪˈɡɪn/", "/ˈɪnsekt/"], "vis": ["sớm", "môn judo", "bắt đầu", "côn trùng"]}, {"q": "4. Which word has a different stress pattern from that of the others?", "options": ["basketball", "valuable", "unusual", "popular"], "answer": 2, "explanation": "\"unusual\" trọng âm rơi vào âm tiết 2, ba từ còn lại trọng âm rơi vào âm tiết 1.", "ipas": ["/ˈbɑːskɪtbɔːl/", "/ˈvæljuəbl/", "/ʌnˈjuːʒuəl/", "/ˈpɒpjələ(r)/"], "vis": ["bóng rổ", "có giá trị", "khác thường", "phổ biến"]}, {"q": "5. Tom: Do you like ___ models, Linda?\nLinda: Yes, I love building small cars and planes in my free time.", "options": ["playing", "riding", "going", "making"], "answer": 3, "explanation": "\"make models\" = lắp ráp mô hình.", "vis": ["chơi", "cưỡi, đi bằng (xe...)", "đi", "làm, chế tạo (make models = lắp ráp mô hình)"], "vi": "A: 'Bạn có thích làm mô hình không, Linda?' – B: 'Có, mình rất thích lắp ráp những chiếc ô tô và máy bay nhỏ trong thời gian rảnh.'"}, {"q": "6. Nam: Your cousin has a wonderful stamp collection!\nLan: Yes, he is a famous ___ in our city.", "options": ["collection", "collector", "collect", "collecting"], "answer": 1, "explanation": "Danh từ chỉ người: collect + or → collector (người sưu tầm).", "vis": ["bộ sưu tập (danh từ chỉ vật)", "người sưu tầm (danh từ chỉ người)", "sưu tầm (động từ)", "đang sưu tầm (V-ing)"], "vi": "A: 'Anh họ của bạn có một bộ sưu tập tem tuyệt vời đấy!' – B: 'Đúng vậy, anh ấy là một nhà sưu tầm nổi tiếng ở thành phố của chúng tôi.'"}, {"q": "7. Peter: How ___ does Jack go to the judo club?\nMary: Three times a week. He really loves martial arts.", "options": ["many", "far", "long", "often"], "answer": 3, "explanation": "Hỏi tần suất → How often.", "vis": ["bao nhiêu (số lượng đếm được)", "bao xa (khoảng cách)", "bao lâu (khoảng thời gian kéo dài)", "bao lâu một lần (tần suất)"], "vi": "A: 'Jack đi câu lạc bộ judo bao lâu một lần?' – B: 'Ba lần một tuần. Cậu ấy thực sự rất thích võ thuật.'"}, {"q": "8. An: Please be careful! All of the things in this box are very ___.\nBinh: Okay, I will move the box slowly.", "options": ["fragile", "gallery", "carved", "collage"], "answer": 0, "explanation": "\"fragile\" = dễ vỡ, cần cẩn thận.", "vis": ["dễ vỡ", "phòng trưng bày (tranh)", "được chạm khắc", "tranh cắt dán, tranh ghép"], "vi": "A: 'Cẩn thận nhé! Tất cả mọi thứ trong hộp này đều rất dễ vỡ.' – B: 'Được rồi, mình sẽ di chuyển hộp thật chậm.'"}, {"q": "9. Elena: Will you ___ making models in the future?\nDavid: Yes, I want to try this new hobby next year.", "options": ["take up", "pick up", "look for", "find"], "answer": 0, "explanation": "\"take up\" = bắt đầu (một sở thích mới).", "vis": ["bắt đầu (một sở thích mới)", "nhặt lên; học được một cách tình cờ", "tìm kiếm", "tìm thấy"], "vi": "A: 'Sau này bạn có định bắt đầu làm mô hình không?' – B: 'Có, mình muốn thử sở thích mới này vào năm sau.'"}, {"q": "10. Lucy: Where can I share my stamps with other collectors?\nMark: You can do that ___ a stamp club on weekends.", "options": ["to", "with", "in", "at"], "answer": 3, "explanation": "\"at a club\" = tại một câu lạc bộ.", "vis": ["đến, tới", "với, cùng", "trong, ở trong", "tại, ở"], "vi": "A: 'Mình có thể chia sẻ tem của mình với những người sưu tầm khác ở đâu?' – B: 'Bạn có thể làm điều đó tại một câu lạc bộ tem vào cuối tuần.'"}, {"q": "11. John: Nowadays, many teenagers ___ hours sitting in front of computers.\nNick: That's true. They should go outside and play sports more.", "options": ["spend", "take", "last", "set"], "answer": 0, "explanation": "\"spend + time + V-ing\" = dành thời gian làm gì.", "vis": ["dành (thời gian)", "mất, lấy", "kéo dài", "đặt, thiết lập"], "vi": "A: 'Ngày nay, nhiều thanh thiếu niên dành hàng giờ ngồi trước máy tính.' – B: 'Đúng vậy. Họ nên ra ngoài và chơi thể thao nhiều hơn.'"}, {"q": "12. Teacher: Is your hobby useful, Minh?\nMinh: ___", "options": ["Hobbies are only useful for children.", "Yes, hobbies can help develop skills and reduce stress.", "No, hobbies are just for wasting time.", "Only expensive hobbies are useful."], "answer": 1, "explanation": "Trả lời hợp lý và tích cực về lợi ích của sở thích.", "vis": ["Sở thích chỉ hữu ích đối với trẻ em.", "Có, sở thích có thể giúp phát triển kỹ năng và giảm căng thẳng.", "Không, sở thích chỉ là lãng phí thời gian.", "Chỉ những sở thích đắt tiền mới hữu ích."], "vi": "A: 'Sở thích của em có hữu ích không, Minh?' – B: 'Có ạ, sở thích có thể giúp phát triển kỹ năng và giảm căng thẳng.'"}, {"q": "13. Alex: I enjoy painting and cycling in my free time. What's your hobby?\nMary: ___", "options": ["That's cool!", "I love making pottery and doing bird-watching on weekends.", "I don't know anything.", "It helps me relax and learn new things."], "answer": 1, "explanation": "Trả lời trực tiếp cho câu hỏi \"What's your hobby?\" bằng cách nêu sở thích cụ thể.", "vis": ["Thật tuyệt!", "Mình thích làm gốm và ngắm chim vào cuối tuần.", "Mình chẳng biết gì cả.", "Nó giúp mình thư giãn và học những điều mới."], "vi": "A: 'Mình thích vẽ tranh và đạp xe trong thời gian rảnh. Sở thích của bạn là gì?' – B: 'Mình thích làm gốm và ngắm chim vào cuối tuần.'"}, {"q": "14. Peter: Your new book collection looks amazing!\nJane: ___", "options": ["Thanks! I would like to open a library of my own in the future.", "You can buy it near my house.", "I don't have money.", "Books are boring."], "answer": 0, "explanation": "Đáp lại lời khen về bộ sưu tập sách bằng lời cảm ơn và chia sẻ thêm.", "vis": ["Cảm ơn! Mình muốn mở một thư viện riêng của mình trong tương lai.", "Bạn có thể mua nó gần nhà mình.", "Mình không có tiền.", "Sách thật nhàm chán."], "vi": "A: 'Bộ sưu tập sách mới của bạn trông thật tuyệt!' – B: 'Cảm ơn! Mình muốn mở một thư viện riêng của mình trong tương lai.'"}], "instant": true}, {"roman": "II", "navLabel": "Biển báo", "title": "Biển báo / Thông báo", "icon": "traffic-light", "instructions": "Đọc biển báo/thông báo và chọn ý đúng nhất.", "type": "mcq", "questions": [{"q": "15. What does this sign mean? 📷🚫 [NO PHOTOS]", "options": ["You mustn't take photos here.", "You should take photos here.", "You needn't take photos here.", "You can take photos here."], "answer": 0, "explanation": "A. You mustn't take photos here. — Bạn không được phép chụp ảnh ở đây ✓<br>B. You should take photos here. — Bạn nên chụp ảnh ở đây (sai, ngược nghĩa với biển cấm)<br>C. You needn't take photos here. — Bạn không cần phải chụp ảnh ở đây (sai, đây là biển cấm 'mustn't', không phải không cần thiết 'needn't')<br>D. You can take photos here. — Bạn có thể chụp ảnh ở đây (sai, ngược nghĩa với biển cấm)", "vis": ["Bạn không được phép chụp ảnh ở đây.", "Bạn nên chụp ảnh ở đây.", "Bạn không cần phải chụp ảnh ở đây.", "Bạn có thể chụp ảnh ở đây."], "image": "<div class=\"inline-flex flex-col items-center w-40 bg-white border-2 border-slate-200 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <rect x=\"34\" y=\"30\" width=\"24\" height=\"10\" rx=\"3\" fill=\"#1e293b\"/>\n    <rect x=\"18\" y=\"38\" width=\"64\" height=\"42\" rx=\"6\" fill=\"#1e293b\"/>\n    <circle cx=\"50\" cy=\"60\" r=\"15\" fill=\"#fff\"/>\n    <circle cx=\"50\" cy=\"60\" r=\"9\" fill=\"#1e293b\"/>\n    <circle cx=\"70\" cy=\"48\" r=\"3\" fill=\"#fff\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#dc2626\" stroke-width=\"8\"/>\n    <line x1=\"14\" y1=\"86\" x2=\"86\" y2=\"14\" stroke=\"#dc2626\" stroke-width=\"8\" stroke-linecap=\"round\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-slate-900 leading-tight mt-1\">NO PHOTOS ALLOWED</p>\n</div>"}, {"q": "16. What does this notice tell you? 🎨 [WET PAINT - DON'T TOUCH]", "options": ["The paint is still wet, so please do not touch it.", "You are encouraged to touch the paint.", "The paint is not for public use.", "The paint is dry and safe to touch."], "answer": 0, "explanation": "A. The paint is still wet, so please do not touch it. — Sơn vẫn còn ướt, vì vậy xin đừng chạm vào ✓<br>B. You are encouraged to touch the paint. — Bạn được khuyến khích chạm vào sơn (sai, ngược nghĩa với 'Don't Touch')<br>C. The paint is not for public use. — Sơn không dành cho công chúng sử dụng (sai, thông báo không đề cập đến việc sử dụng công cộng)<br>D. The paint is dry and safe to touch. — Sơn đã khô và an toàn để chạm vào (sai, thông báo nói sơn còn ướt 'wet', không phải khô)", "vis": ["Sơn vẫn còn ướt, vì vậy xin đừng chạm vào.", "Bạn được khuyến khích chạm vào sơn.", "Sơn không dành cho công chúng sử dụng.", "Sơn đã khô và an toàn để chạm vào."], "image": "<div class=\"inline-flex flex-col items-center w-40 bg-amber-400 border-2 border-amber-500 rounded-xl p-3 shadow-sm\">\n  <svg viewBox=\"0 0 100 100\" class=\"w-16 h-16\" aria-hidden=\"true\">\n    <rect x=\"30\" y=\"20\" width=\"10\" height=\"26\" rx=\"2\" fill=\"#1e293b\"/>\n    <rect x=\"24\" y=\"14\" width=\"22\" height=\"8\" rx=\"2\" fill=\"#1e293b\"/>\n    <rect x=\"30\" y=\"42\" width=\"40\" height=\"34\" rx=\"4\" fill=\"#fff\" stroke=\"#1e293b\" stroke-width=\"3\"/>\n    <rect x=\"26\" y=\"34\" width=\"48\" height=\"10\" rx=\"3\" fill=\"#1e293b\"/>\n    <path d=\"M38 76c0 6 4 10 12 10s12-4 12-10\" fill=\"none\" stroke=\"#dc2626\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n    <circle cx=\"50\" cy=\"90\" r=\"3\" fill=\"#dc2626\"/>\n  </svg>\n  <p class=\"text-[11px] font-black text-center text-slate-900 leading-tight mt-1\">WET PAINT – DON'T TOUCH</p>\n</div>"}], "instant": true}, {"roman": "III", "navLabel": "Điền đoạn văn", "title": "Chọn từ thích hợp điền vào đoạn văn", "icon": "file-lines", "instructions": "Chọn đáp án đúng để hoàn thành đoạn văn.", "type": "mcq", "passage": {"title": "Sở thích và lợi ích", "html": "Nowadays, teenagers seem to be too busy with their studies to (17)___ up a hobby. However, if you have a little (18)___ time, it is advisable to have a hobby because of the emotional, mental and physical benefits it brings. Focusing on an activity (19)___ you like will help you reduce stress and pressure from your schoolwork. Additionally, spending time with people of similar interests will (20)___ you to make friends more easily. This helps improve your communication skills and promote teamwork. Taking up a hobby can be a real challenge, but it is not the type of stressful challenge coming (21)___ school. Instead, challenging yourself to do a skill that you like will bring (22)___ and pride.", "vi": "Ngày nay, các thanh thiếu niên dường như quá bận rộn với việc học đến mức không có thời gian để (17) ___ một sở thích. Tuy nhiên, nếu bạn có một chút thời gian (18) ___, thì nên có một sở thích vì những lợi ích về cảm xúc, tinh thần và thể chất mà nó mang lại. Tập trung vào một hoạt động (19) ___ bạn thích sẽ giúp bạn giảm căng thẳng và áp lực từ việc học ở trường. Ngoài ra, dành thời gian với những người có cùng sở thích sẽ (20) ___ bạn kết bạn dễ dàng hơn. Điều này giúp cải thiện kỹ năng giao tiếp và thúc đẩy tinh thần làm việc nhóm. Việc bắt đầu một sở thích có thể là một thử thách thực sự, nhưng đó không phải là loại thử thách căng thẳng đến (21) ___ trường học. Thay vào đó, thử thách bản thân để thực hiện một kỹ năng mà bạn yêu thích sẽ mang lại sự (22) ___ và niềm tự hào."}, "questions": [{"q": "17.", "options": ["take", "look", "get", "make"], "answer": 0, "explanation": "\"take up a hobby\" = bắt đầu một sở thích mới.<br>A. take: bắt đầu (take up sth) ✓<br>B. look: nhìn (không đi với 'up' theo nghĩa này)<br>C. get: được, lấy (không tạo thành cụm cố định)<br>D. make: làm, chế tạo (không đi với 'up' theo nghĩa này)", "vis": ["bắt đầu (trong cụm \"take up\" = bắt đầu một sở thích)", "nhìn, xem", "được, lấy", "làm, chế tạo"], "vi": "Ngày nay, các thanh thiếu niên dường như quá bận rộn với việc học đến mức không có thời gian để (17) ___ một sở thích."}, {"q": "18.", "options": ["free", "waste", "empty", "full"], "answer": 0, "explanation": "\"free time\" = thời gian rảnh.<br>A. free: rảnh rỗi (free time) ✓<br>B. waste: lãng phí (không hợp nghĩa)<br>C. empty: trống rỗng (không dùng cho thời gian)<br>D. full: đầy (trái nghĩa với 'a little time')", "vis": ["rảnh (trong cụm \"free time\" = thời gian rảnh)", "lãng phí", "trống rỗng", "đầy"], "vi": "Tuy nhiên, nếu bạn có một chút thời gian (18) ___, thì nên có một sở thích vì những lợi ích về cảm xúc, tinh thần và thể chất mà nó mang lại."}, {"q": "19.", "options": ["whose", "where", "who", "that"], "answer": 3, "explanation": "Mệnh đề quan hệ với vật \"an activity that...\" → that.<br>A. whose: đại từ quan hệ chỉ sở hữu (không hợp)<br>B. where: chỉ nơi chốn (không hợp, 'activity' không phải nơi chốn)<br>C. who: chỉ người (không hợp, 'activity' là vật)<br>D. that: đại từ quan hệ thay cho vật ✓", "vis": ["của ai (đại từ quan hệ chỉ sở hữu)", "ở đâu (chỉ nơi chốn)", "ai (chỉ người)", "đó, mà (đại từ quan hệ thay cho vật)"], "vi": "Tập trung vào một hoạt động (19) ___ bạn thích sẽ giúp bạn giảm căng thẳng và áp lực từ việc học ở trường."}, {"q": "20.", "options": ["enable", "let", "make", "help"], "answer": 0, "explanation": "\"enable sb to do sth\" = giúp/tạo điều kiện cho ai làm gì.<br>A. enable + to V: tạo điều kiện cho ai làm gì ✓<br>B. let + V nguyên thể (không 'to') → sai cấu trúc ở đây<br>C. make + V nguyên thể (không 'to') → sai cấu trúc ở đây<br>D. help (to) V: cũng có thể đúng ngữ pháp nhưng không phải đáp án được chọn về nghĩa 'tạo điều kiện'", "vis": ["tạo điều kiện cho (ai làm gì)", "để cho, cho phép", "khiến, bắt buộc", "giúp đỡ"], "vi": "Ngoài ra, dành thời gian với những người có cùng sở thích sẽ (20) ___ bạn kết bạn dễ dàng hơn."}, {"q": "21.", "options": ["at", "with", "to", "from"], "answer": 3, "explanation": "\"coming from school\" = đến từ trường học.<br>A. at: tại, ở<br>B. with: với<br>C. to: đến<br>D. from: từ (coming from school = đến từ trường) ✓", "vis": ["tại, ở", "với, cùng", "đến", "từ"], "vi": "Việc bắt đầu một sở thích có thể là một thử thách thực sự, nhưng đó không phải là loại thử thách căng thẳng đến (21) ___ trường học."}, {"q": "22.", "options": ["pressure", "satisfaction", "difficulty", "boredom"], "answer": 1, "explanation": "Làm điều mình thích mang lại → sự thỏa mãn (satisfaction).<br>A. pressure: áp lực (trái nghĩa với ý tích cực)<br>B. satisfaction: sự thỏa mãn ✓<br>C. difficulty: khó khăn (không hợp nghĩa tích cực)<br>D. boredom: sự nhàm chán (trái nghĩa)", "vis": ["áp lực", "sự thỏa mãn, hài lòng", "khó khăn", "sự nhàm chán"], "vi": "Thay vào đó, thử thách bản thân để thực hiện một kỹ năng mà bạn yêu thích sẽ mang lại sự (22) ___ và niềm tự hào."}], "instant": true}, {"roman": "IV", "navLabel": "Đọc hiểu", "title": "Đọc hiểu", "icon": "book-open", "instructions": "Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.", "type": "mcq", "passage": {"title": "What is a Hobby?", "html": "Our life would be hard without rest and recreation. And people have many different ideas of how to spend their free time. If you enjoy doing a thing or activity in your free time, then you have a hobby. A hobby is an activity, interest, enthusiasm, or pastime that is undertaken for pleasure or relaxation, done during one's own time. A person's hobbies depend on his age, character and personal interests. An interesting thing to one person can be boring to another. That's why some people prefer reading, cooking, knitting, collecting, playing a musical instrument, photography or playing computer games while others prefer dancing, travelling, camping or sports.", "vi": "Cuộc sống của chúng ta sẽ rất khó khăn nếu thiếu sự nghỉ ngơi và giải trí. Và mọi người có rất nhiều cách khác nhau để sử dụng thời gian rảnh của mình. Nếu bạn thích làm một việc gì đó hoặc một hoạt động nào đó trong thời gian rảnh, thì đó chính là sở thích của bạn. Sở thích là một hoạt động, mối quan tâm, niềm đam mê hoặc thú vui được thực hiện vì niềm vui hoặc sự thư giãn, diễn ra trong thời gian riêng của mỗi người. Sở thích của một người phụ thuộc vào độ tuổi, tính cách và sở thích cá nhân của người đó. Một điều thú vị đối với người này có thể lại nhàm chán đối với người khác. Đó là lý do tại sao một số người thích đọc sách, nấu ăn, đan len, sưu tầm, chơi nhạc cụ, chụp ảnh hoặc chơi trò chơi điện tử, trong khi những người khác lại thích khiêu vũ, du lịch, cắm trại hoặc chơi thể thao."}, "questions": [{"q": "23. A hobby is something you do when you are busy with your work.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: hobby là hoạt động làm trong thời gian rảnh, không phải khi bận việc → Sai.", "vis": ["Đúng", "Sai"], "vi": "Sở thích là điều bạn làm khi bạn đang bận với công việc của mình."}, {"q": "24. Different people have different ways to spend their free time.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"people have many different ideas of how to spend their free time\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Những người khác nhau có những cách khác nhau để sử dụng thời gian rảnh của họ."}, {"q": "25. Everyone thinks that the same activity is interesting.", "options": ["True", "False"], "answer": 1, "explanation": "Bài đọc: \"An interesting thing to one person can be boring to another\" → Sai.", "vis": ["Đúng", "Sai"], "vi": "Ai cũng nghĩ rằng cùng một hoạt động là thú vị."}, {"q": "26. Age and personal interests can change the hobbies a person chooses.", "options": ["True", "False"], "answer": 0, "explanation": "Bài đọc: \"A person's hobbies depend on his age, character and personal interests\" → Đúng.", "vis": ["Đúng", "Sai"], "vi": "Độ tuổi và sở thích cá nhân có thể thay đổi những sở thích mà một người lựa chọn."}, {"q": "27. According to the text, why do people have a hobby?", "options": ["For pleasure or relaxation.", "To make more money.", "To study for school.", "To change their character."], "answer": 0, "explanation": "Bài đọc: \"undertaken for pleasure or relaxation\".", "vis": ["Để giải trí hoặc thư giãn.", "Để kiếm thêm tiền.", "Để học ở trường.", "Để thay đổi tính cách."], "vi": "Theo bài đọc, tại sao mọi người có sở thích?"}, {"q": "28. Which of the following activities is NOT mentioned as a hobby in the text?", "options": ["Gardening", "Cooking", "Travelling", "Camping"], "answer": 0, "explanation": "Bài đọc liệt kê: reading, cooking, knitting, collecting, chơi nhạc cụ, photography, chơi game, dancing, travelling, camping, sports — không nhắc đến gardening.", "vis": ["Làm vườn", "Nấu ăn", "Du lịch", "Cắm trại"], "vi": "Hoạt động nào sau đây KHÔNG được nhắc đến như một sở thích trong bài đọc?"}], "instant": true}, {"roman": "V", "navLabel": "Từ loại", "title": "Cho dạng đúng của từ trong ngoặc", "icon": "spell-check", "instructions": "Điền dạng đúng của từ trong ngoặc vào chỗ trống.", "type": "fill", "questions": [{"q": "29. My sister loves arranging flowers because she thinks they are ___.", "answer": "colorful", "explanation": "Tính từ: color + ful → colorful/colourful.", "hint": "(color)", "family": ["color/colour (n): màu sắc", "colorful/colourful (adj): nhiều màu sắc, sặc sỡ", "coloring/colouring (n): sự tô màu; màu nhuộm"], "accepted": ["colorful", "colourful"]}, {"q": "30. The new school music club has many talented ___.", "answer": "musicians", "explanation": "Danh từ chỉ người: music + ian(s) → musicians.", "hint": "(music)", "family": ["music (n): âm nhạc", "musician (n): nhạc sĩ, nhạc công", "musical (adj): thuộc về âm nhạc"]}, {"q": "31. ___, quite a few students do not have any hobbies due to busy school schedules.", "answer": "Surprisingly", "explanation": "Trạng từ: surprise → surprisingly (một cách ngạc nhiên).", "hint": "(surprise)", "family": ["surprise (n/v): sự ngạc nhiên; làm ai ngạc nhiên", "surprised (adj): ngạc nhiên (dùng cho người)", "surprising (adj): gây ngạc nhiên (dùng cho sự việc)", "surprisingly (adv): một cách ngạc nhiên"]}, {"q": "32. Doing gardening is an ___ way to reduce stress after a hard exam.", "answer": "interesting", "explanation": "Tính từ: interest + ing → interesting.", "hint": "(interest)", "family": ["interest (n/v): sự thích thú, mối quan tâm; làm ai quan tâm", "interested (adj): cảm thấy thích thú (dùng cho người)", "interesting (adj): thú vị, hấp dẫn (dùng cho sự việc)"]}, {"q": "33. Playing board games helps children develop their social ___.", "answer": "skills", "explanation": "Danh từ số nhiều: skill(s) (kỹ năng), theo đáp án gốc của tài liệu.", "hint": "(skilful)", "family": ["skill (n): kỹ năng", "skilful/skillful (adj): khéo léo, thành thạo", "skilfully/skillfully (adv): một cách khéo léo"]}, {"q": "34. The teacher gave the students ___ to go to the school library to find books.", "answer": "permission", "explanation": "Danh từ: permit → permission (sự cho phép).", "hint": "(permit)", "family": ["permit (v): cho phép", "permission (n): sự cho phép", "permissible (adj): được phép, có thể chấp nhận"]}]}, {"roman": "VI", "navLabel": "Từ điển", "title": "Tra từ điển \"hobby\"", "icon": "book-bookmark", "instructions": "Dựa vào mục từ điển, hoàn thành câu (không quá 3 từ).", "type": "fill", "dict": {"word": "hobby", "ipa": "/ˈhɒbi/", "pos": "noun", "senses": [{"def": "an activity that you do for pleasure when you are not working", "examples": ["I only take photos for fun—it's just a hobby of mine.", "What are your favorite hobbies?", "My grandmother takes up knitting as a new hobby.", "He needs to find a healthy hobby to reduce stress after school."]}], "vi": "<b>hobby</b> /ˈhɒbi/ (danh từ)<br>1. một hoạt động mà bạn làm vì niềm vui khi bạn không phải làm việc.<br>• Tôi chỉ chụp ảnh cho vui thôi - đó chỉ là một sở thích của tôi.<br>• Những sở thích yêu thích của bạn là gì?<br>• Bà của tôi bắt đầu học đan len như một sở thích mới.<br>• Cậu ấy cần tìm một sở thích lành mạnh để giảm căng thẳng sau giờ học."}, "questions": [{"q": "35. Reading books and playing chess are my two ___.", "answer": "favorite hobbies", "explanation": "Dựa vào ví dụ: favorite hobbies.", "vi": "Đọc sách và chơi cờ là hai sở thích yêu thích của tôi."}, {"q": "36. Cycling is a ___ because it keeps you active and helps you relax.", "answer": "healthy hobby", "explanation": "Dựa vào ví dụ: healthy hobby.", "vi": "Đạp xe là một sở thích lành mạnh vì nó giúp bạn năng động và thư giãn."}]}, {"roman": "VII", "navLabel": "Viết lại câu", "title": "Viết lại câu sao cho nghĩa không đổi", "icon": "pen-to-square", "instructions": "Viết lại câu, giữ nguyên nghĩa với câu gốc.", "type": "sentence", "questions": [{"q": "37. My best friend doesn't like mountain climbing because he is afraid of heights.\n→ My best friend finds ___.", "answer": "mountain climbing boring / dangerous / difficult because he is afraid of heights", "explanation": "doesn't like = finds ... boring/dangerous/difficult (cấu trúc find + O + adj).", "accepted": ["mountain climbing boring because he is afraid of heights", "mountain climbing dangerous because he is afraid of heights", "mountain climbing difficult because he is afraid of heights", "mountain climbing uninteresting because he is afraid of heights"], "vi": "Bạn thân của tôi không thích leo núi vì cậu ấy sợ độ cao.", "note": "S + doesn't like + N/V-ing → S + finds + N/V-ing + adj (boring/dangerous/difficult...)<br>Nghĩa đáp án: Bạn thân của tôi thấy việc leo núi thật nhàm chán/nguy hiểm/khó khăn vì cậu ấy sợ độ cao."}, {"q": "38. Why don't we go swimming this afternoon?\n→ How about ___?", "answer": "going swimming this afternoon", "explanation": "Why don't we + V = How about + V-ing?", "vi": "Sao chúng ta không đi bơi vào chiều nay nhỉ?", "note": "Why don't we + V(nguyên thể)...? → How about + V-ing...?<br>Nghĩa đáp án: Đi bơi vào chiều nay thì thế nào nhỉ?"}, {"q": "39. Alex is keen on taking photos. He takes photos every day.\n→ Alex enjoys ___.", "answer": "taking photos every day", "explanation": "be keen on + V-ing = enjoy + V-ing.", "vi": "Alex rất thích chụp ảnh. Cậu ấy chụp ảnh mỗi ngày.", "note": "S + be keen on + V-ing → S + enjoy + V-ing<br>Nghĩa đáp án: Alex thích chụp ảnh mỗi ngày."}, {"q": "40. I find doing gardening interesting.\n→ My hobby ___.", "answer": "is doing gardening", "explanation": "find + O + interesting = My hobby is + V-ing.", "vi": "Tôi thấy việc làm vườn thú vị.", "note": "S + find + V-ing + adj → My hobby + is + V-ing<br>Nghĩa đáp án: Sở thích của tôi là làm vườn."}], "instant": true}]};

function normalize(str){

    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')

}

function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function buildNav(){
  const nav=document.getElementById('navWrap');
  nav.innerHTML = DATA.sections.map((s,i)=>
    `<button class="tab-btn text-sm font-bold px-3 py-2 rounded-full text-slate-600${i===0?' active':''}" id="navbtn_${i}" onclick="showTab(${i})">${s.roman}. ${s.navLabel}</button>`
  ).join('');
}

function optionLetter(i){ return ['A','B','C','D'][i]; }

function renderPassage(p, idx){
  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
