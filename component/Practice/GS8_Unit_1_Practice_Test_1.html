<script>
const DATA = {"unit":1,"test":1,"sections":[{"roman":"I","navLabel":"Ngữ âm & Từ vựng","title":"Phát âm – Trọng âm – Từ vựng – Ngữ pháp","icon":"ear-listen","instructions":"Chọn đáp án (A, B, C hoặc D) đúng nhất.","type":"mcq","questions":[{"q":"1. Which word has the underlined part pronounced differently from that of the others?","options":["bracelets","outdoors","friends","puzzles"],"answer":0,"explanation":"\"bracelets\" phát âm đuôi -s là /s/, ba từ còn lại phát âm /z/.","ipas":["/ˈbreɪslɪts/","/aʊtˈdɔːz/","/frendz/","/ˈpʌzlz/"],"vis":["vòng tay","ngoài trời","bạn bè","trò chơi ghép hình"]},{"q":"2. Which word has the underlined part pronounced differently from that of the others?","options":["resort","interested","detest","message"],"answer":0,"explanation":"\"resort\" phát âm /z/, ba từ còn lại phát âm /s/.","ipas":["/rɪˈzɔːt/","/ˈɪntrəstɪd/","/dɪˈtest/","/ˈmesɪdʒ/"],"vis":["khu nghỉ dưỡng","quan tâm, thích thú","ghét, chán ghét","tin nhắn"]},{"q":"3. Which word has a different stress pattern from that of the others?","options":["listen","prefer","adore","enjoy"],"answer":0,"explanation":"\"listen\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.","ipas":["/ˈlɪsn/","/prɪˈfɜː(r)/","/əˈdɔː(r)/","/ɪnˈdʒɔɪ/"],"vis":["lắng nghe","thích hơn","yêu thích, tôn sùng","thích thú, tận hưởng"]},{"q":"4. Which word has a different stress pattern from that of the others?","options":["photography","environment","biography","television"],"answer":3,"explanation":"\"television\" trọng âm rơi vào âm tiết 1, ba từ còn lại trọng âm rơi vào âm tiết 2.","ipas":["/fəˈtɒɡrəfi/","/ɪnˈvaɪrənmənt/","/baɪˈɒɡrəfi/","/ˈtelɪvɪʒn/"],"vis":["nhiếp ảnh","môi trường","tiểu sử","truyền hình"]},{"q":"5. Minh: What is Mai doing in her bedroom right now?\nNam: She ___ to music. Pop music is her absolute favorite in her free time.","options":["talks","hears","is listening","plays"],"answer":2,"explanation":"\"right now\" → thì hiện tại tiếp diễn: is listening.","vi":"Minh: 'Mai đang làm gì trong phòng ngủ của cô ấy vậy?' – Nam: 'Cô ấy đang nghe nhạc. Nhạc pop là thể loại yêu thích nhất của cô ấy trong thời gian rảnh.'"},{"q":"6. Tom: Why are you holding your phone all the time?\nJerry: I like to ___ TikTok to watch short clips whenever I have some leisure time.","options":["message","surf","knit","relax"],"answer":1,"explanation":"\"surf TikTok\" = lướt xem TikTok.","vis":["nhắn tin","lướt (mạng)","đan len","thư giãn"],"vi":"Tom: 'Sao cậu cứ cầm điện thoại suốt vậy?' – Jerry: 'Tớ thích lướt TikTok để xem các đoạn clip ngắn bất cứ khi nào có thời gian rảnh.'"},{"q":"7. Lan: Minh looks quite tired tonight. He has so much to study.\nHoa: Yes, but he is a hard-working boy. He doesn't mind ___ a lot of homework.","options":["doing","making","reading","seeing"],"answer":0,"explanation":"\"do homework\" = làm bài tập.","vis":["làm","làm ra, chế tạo","đọc","nhìn thấy"],"vi":"Lan: 'Tối nay Minh trông khá mệt. Cậu ấy có nhiều bài phải học quá.' – Hoa: 'Ừ, nhưng cậu ấy là một cậu bé chăm chỉ. Cậu ấy không ngại làm nhiều bài tập về nhà.'"},{"q":"8. Quan: Do you fancy ___ around the West Lake with me this Sunday morning?\nLong: That sounds amazing! I'll get my bicycle ready.","options":["staying","moving","going","having"],"answer":2,"explanation":"\"go around\" = đi vòng quanh, hợp với việc chuẩn bị xe đạp.","vis":["ở lại","di chuyển","đi vòng quanh","có"],"vi":"Quan: 'Cậu có muốn đi vòng quanh Hồ Tây với tớ vào sáng Chủ nhật này không?' – Long: 'Nghe tuyệt đấy! Tớ sẽ chuẩn bị xe đạp.'"},{"q":"9. An: Look at that girl over there! Her dress looks so ___! I want to buy it.\nBinh: Wow, it really is beautiful and elegant.","options":["noisy","crazy","funny","fancy"],"answer":3,"explanation":"\"fancy\" = sang trọng, cầu kỳ, hợp ngữ cảnh khen chiếc váy đẹp.","vis":["ồn ào","điên rồ, kỳ quặc","buồn cười","sang trọng, cầu kỳ"],"vi":"An: 'Nhìn cô gái đằng kia kìa! Chiếc váy của cô ấy trông thật sang trọng! Tớ muốn mua nó.' – Bình: 'Ồ, đúng là đẹp và thanh lịch thật.'"},{"q":"10. Vy: Why are you and Jane such close friends?\nChi: About favorite leisure activities, she and I share many things in ___.","options":["common","base","general","similarity"],"answer":0,"explanation":"\"have things in common\" = có nhiều điểm chung.","vis":["chung (trong cụm \"in common\")","cơ sở, nền tảng","chung chung, tổng quát","sự giống nhau"],"vi":"Vy: 'Sao cậu và Jane lại thân nhau đến vậy?' – Chi: 'Về các hoạt động giải trí yêu thích, tớ và cậu ấy có rất nhiều điểm chung.'"},{"q":"11. Nam: Who is that woman speaking on television?\nBa: She's a famous ___ known for her endless efforts to help poor people.","options":["activist","activity","active","activism"],"answer":0,"explanation":"Danh từ chỉ người: activist (nhà hoạt động xã hội).","vis":["nhà hoạt động xã hội","hoạt động (danh từ)","năng động, tích cực (tính từ)","chủ nghĩa hoạt động (danh từ trừu tượng)"],"vi":"Nam: 'Người phụ nữ đang phát biểu trên truyền hình kia là ai vậy?' – Ba: 'Cô ấy là một nhà hoạt động xã hội nổi tiếng, được biết đến với những nỗ lực không ngừng để giúp đỡ người nghèo.'"},{"q":"12. Nga: Would you like to hang out with me this afternoon?\nHoa: ___! Let's go to our favorite coffee shop.","options":["Yes, I'd like","No, I don't like","Never mind","Yes, I'd love to"],"answer":3,"explanation":"Đáp lại lời mời bằng cách đồng ý: Yes, I'd love to.","vis":["Có, tôi thích (ngữ pháp chưa trọn vẹn)","Không, tôi không thích","Không sao đâu, đừng bận tâm","Có chứ, tôi rất muốn!"],"vi":"Nga: 'Cậu có muốn đi chơi với tớ chiều nay không?' – Hoa: 'Có chứ, tớ rất muốn! Mình đi đến quán cà phê yêu thích của chúng ta nhé.'"},{"q":"13. Lucas: You should not spend too much time surfing the Internet, Tony.\nTony: \"___\"","options":["Great! Let's do it together.","Thanks for your advice. I'll reduce my screen time.","Yes, I do it very often.","It's none of your business."],"answer":1,"explanation":"Phản hồi tiếp nhận lời khuyên một cách tích cực.","vis":["Tuyệt! Cùng làm việc đó với nhau nhé.","Cảm ơn lời khuyên của cậu. Tớ sẽ giảm bớt thời gian dùng màn hình.","Ừ, tớ làm việc đó rất thường xuyên.","Không phải việc của cậu."],"vi":"Lucas: 'Cậu không nên dành quá nhiều thời gian lướt Internet đâu, Tony.' – Tony: 'Cảm ơn lời khuyên của cậu. Tớ sẽ giảm bớt thời gian dùng màn hình.'"},{"q":"14. Father: Your sister spends all her free time playing computer games.\nMother: \"___\"","options":["She is studying hard for her exams.","She doesn't like computers at all.","I know. We should encourage her to do more outdoor activities.","Computer games are cheap to buy nowadays."],"answer":2,"explanation":"Phản hồi phù hợp với lời phàn nàn của người cha, đề xuất giải pháp.","vis":["Con bé đang học hành chăm chỉ cho kỳ thi.","Con bé không thích máy tính chút nào.","Em biết. Chúng ta nên khuyến khích con làm nhiều hoạt động ngoài trời hơn.","Trò chơi điện tử bây giờ rẻ lắm."],"vi":"Bố: 'Con gái mình dành hết thời gian rảnh để chơi trò chơi điện tử.' – Mẹ: 'Em biết. Chúng ta nên khuyến khích con làm nhiều hoạt động ngoài trời hơn.'"}],"instant":true},{"roman":"II","navLabel":"Biển báo","title":"Biển báo / Thông báo","icon":"traffic-light","instructions":"Đọc biển báo/thông báo và chọn ý đúng nhất.","type":"mcq","questions":[{"q":"15. What does this notice tell you?","options":["Children in groups of 5 must have an adult with them.","Adults are not allowed to join this ride with children.","There are no more than 5 adults on this ride.","Children less than 5 years old cannot go on this ride by themselves."],"answer":3,"explanation":"A. Children in groups of 5 must have an adult with them. — sai, biển không nói về nhóm 5 trẻ (Nghĩa: Trẻ em đi theo nhóm 5 người phải có người lớn đi cùng.)<br>B. Adults are not allowed to join this ride with children. — sai, ngược nghĩa, biển không cấm người lớn (Nghĩa: Người lớn không được đi cùng trẻ em trên trò chơi này.)<br>C. There are no more than 5 adults on this ride. — sai, biển không đề cập đến số lượng người lớn (Nghĩa: Không có quá 5 người lớn trên trò chơi này.)<br>D. Children less than 5 years old cannot go on this ride by themselves. — đúng, khớp với nội dung biển báo ✓ (Nghĩa: Trẻ em dưới 5 tuổi không được đi trò chơi này một mình.)","vis":["Trẻ em đi theo nhóm 5 người phải có người lớn đi cùng.","Người lớn không được đi cùng trẻ em trên trò chơi này.","Không có quá 5 người lớn trên trò chơi này.","Trẻ em dưới 5 tuổi không được đi trò chơi này một mình."],"image":"<div class=\"inline-flex flex-col items-center w-48 bg-white border-2 border-red-300 rounded-xl p-3 shadow-sm\"><div class=\"text-4xl mb-1\">🎢🚫</div><p class=\"text-[11px] font-black text-center text-slate-900 leading-tight\">NOTICE: CHILDREN UNDER 5 YEARS OLD ARE NOT ALLOWED ON THIS RIDE ALONE</p></div>"},{"q":"16. What does this traffic sign mean?","options":["Children are safely playing in the playground nearby.","Children are not allowed to cross the road without their parents.","There is a school ahead and drivers must completely stop their vehicles here.","Drivers should reduce their speed because children might be crossing the road."],"answer":3,"explanation":"A. Children are safely playing in the playground nearby. — sai, biển không nói về sân chơi (Nghĩa: Trẻ em đang chơi an toàn ở sân chơi gần đó.)<br>B. Children are not allowed to cross the road without their parents. — sai, biển không cấm trẻ em qua đường (Nghĩa: Trẻ em không được qua đường nếu không có bố mẹ đi cùng.)<br>C. There is a school ahead and drivers must completely stop their vehicles here. — sai, biển không yêu cầu dừng hẳn xe (Nghĩa: Phía trước có trường học và tài xế phải dừng hẳn xe tại đây.)<br>D. Drivers should reduce their speed because children might be crossing the road. — đúng, khớp với ý nghĩa biển báo ✓ (Nghĩa: Tài xế nên giảm tốc độ vì có thể có trẻ em đang qua đường.)","vis":["Trẻ em đang chơi an toàn ở sân chơi gần đó.","Trẻ em không được qua đường nếu không có bố mẹ đi cùng.","Phía trước có trường học và tài xế phải dừng hẳn xe tại đây.","Tài xế nên giảm tốc độ vì có thể có trẻ em đang qua đường."],"image":"<div class=\"inline-flex flex-col items-center w-48 bg-white border-2 border-amber-300 rounded-xl p-3 shadow-sm\"><div class=\"text-4xl mb-1\">🚸⚠️</div><p class=\"text-[11px] font-black text-center text-slate-900 leading-tight\">SLOW – CHILDREN CROSSING</p></div>"}],"instant":true},{"roman":"III","navLabel":"Điền đoạn văn","title":"Chọn từ thích hợp điền vào đoạn văn","icon":"file-lines","instructions":"Chọn đáp án đúng để hoàn thành đoạn văn.","type":"mcq","passage":{"title":"Lợi ích của việc có một sở thích","html":"There are many reasons why it is important to have a hobby. A hobby is a regular activity that is done for enjoyment, typically during one's (17)___ time. It will give you pleasure and help you relax after long hours of hard work. For example, many old people enjoy gardening. They grow a lot of trees and vegetables, so they can even sell them for some money.<br><br>In addition, a hobby can help you (18)___ with other people. If you like (19)___ stamps, you can join a stamp club to share your albums with other collectors. If your hobby is carving eggshells, you can give your beautiful products to your friends (20)___ unique gifts. In this busy daily schedule, we all get so caught up in our routines that we sometimes forget to give out time for ourselves. Indulging in a hobby is actually good for a sound health. It provides us with a time of leisure where we can do something that brings us immense (21)___. Therefore, everyone (22)___ have at least one hobby to balance their life.","vi":"Có nhiều lý do khiến việc có một sở thích trở nên quan trọng. Sở thích là một hoạt động thường xuyên được thực hiện để giải trí, thường diễn ra trong (17) ___ thời gian rảnh của mỗi người. Nó sẽ mang lại cho bạn niềm vui và giúp bạn thư giãn sau những giờ làm việc vất vả. Ví dụ, nhiều người lớn tuổi thích làm vườn. Họ trồng rất nhiều cây và rau, thậm chí có thể bán chúng để kiếm thêm tiền.<br><br>Ngoài ra, một sở thích có thể giúp bạn (18) ___ với những người khác. Nếu bạn thích (19) ___ tem, bạn có thể tham gia một câu lạc bộ sưu tầm tem để chia sẻ album của mình với những người sưu tầm khác. Nếu sở thích của bạn là chạm khắc vỏ trứng, bạn có thể tặng những sản phẩm đẹp mắt của mình cho bạn bè (20) ___ những món quà độc đáo. Trong lịch trình bận rộn hằng ngày này, tất cả chúng ta đều bị cuốn vào guồng quay công việc đến mức đôi khi quên dành thời gian cho chính mình. Đắm mình trong một sở thích thực sự tốt cho sức khỏe. Nó mang đến cho chúng ta khoảng thời gian rảnh rỗi để làm điều gì đó mang lại cho chúng ta (21) ___ vô cùng. Vì vậy, mỗi người (22) ___ nên có ít nhất một sở thích để cân bằng cuộc sống."},"questions":[{"q":"17.","options":["busy","free","work","study"],"answer":1,"explanation":"\"free time\" = thời gian rảnh.","vis":["bận rộn","rảnh rỗi (đúng, trong cụm \"free time\")","công việc","học tập"],"vi":"...thường diễn ra trong (17) ___ thời gian rảnh của mỗi người."},{"q":"18.","options":["connect","compete","argue","separate"],"answer":0,"explanation":"\"connect with other people\" = kết nối với người khác.","vis":["kết nối (đúng, \"connect with\")","cạnh tranh","tranh cãi","chia tách, tách biệt"],"vi":"Một sở thích có thể giúp bạn (18) ___ với những người khác."},{"q":"19.","options":["playing","selling","doing","collecting"],"answer":3,"explanation":"\"collect stamps\" = sưu tầm tem.","vis":["chơi","bán","làm","sưu tầm (đúng, \"collect stamps\")"],"vi":"Nếu bạn thích (19) ___ tem, bạn có thể tham gia một câu lạc bộ sưu tầm tem."},{"q":"20.","options":["for","with","as","in"],"answer":2,"explanation":"\"give gifts as unique gifts\" = tặng như những món quà độc đáo.","vis":["cho, để (giới từ chỉ mục đích, sai ở đây)","với, cùng với","như, coi như (đúng, \"as unique gifts\")","trong, ở trong"],"vi":"Bạn có thể tặng những sản phẩm đẹp mắt của mình cho bạn bè (20) ___ những món quà độc đáo."},{"q":"21.","options":["sadness","happiness","stress","anger"],"answer":1,"explanation":"Sở thích mang lại cảm giác tích cực → happiness.","vis":["nỗi buồn","niềm hạnh phúc (đúng)","sự căng thẳng","sự tức giận"],"vi":"Nó mang đến cho chúng ta điều gì đó mang lại (21) ___ vô cùng."},{"q":"22.","options":["should","can't","needn't","shouldn't"],"answer":0,"explanation":"Lời khuyên nên có một sở thích → should.","vis":["nên (đúng, lời khuyên)","không thể","không cần thiết","không nên"],"vi":"Vì vậy, mỗi người (22) ___ nên có ít nhất một sở thích để cân bằng cuộc sống."}],"instant":true},{"roman":"IV","navLabel":"Đọc hiểu","title":"Đọc hiểu","icon":"book-open","instructions":"Đọc đoạn văn, xác định Đúng/Sai và chọn đáp án đúng.","type":"mcq","passage":{"title":"The Negative Side of Social Networking","html":"One of the most obvious negative aspects of social networking is losing face-to-face contact with other people. Teens are sitting around with their phones in their hands all day long, tapping messages onto screens instead of communicating with real people. Many teenagers feel more comfortable with virtual friends than with real ones. The majority think that it is easier to chat on the Internet because they lack communication skills.<br><br>It is also true that parents often have no knowledge about what their kids do with their phones or computers. Experts say that while kids are plugged in to social media, only about 40% of parents are involved themselves. And because parents don't know the full picture, they don't know how to deal with a teenager's potential overuse of social media and might not even be aware that a problem exists. Therefore, social networking can be much more immediately engaging with the teenager's life than parents are, and this fact makes virtual communication feel more \"real\" than face-to-face communication.","vi":"Một trong những khía cạnh tiêu cực rõ ràng nhất của mạng xã hội là việc mất đi sự tiếp xúc trực tiếp với người khác. Các thanh thiếu niên ngồi cả ngày với chiếc điện thoại trong tay, gõ tin nhắn lên màn hình thay vì giao tiếp với người thật. Nhiều thanh thiếu niên cảm thấy thoải mái hơn với bạn bè ảo hơn là bạn bè thật. Phần lớn cho rằng trò chuyện trên Internet dễ dàng hơn vì họ thiếu kỹ năng giao tiếp.<br><br>Cũng đúng là các bậc phụ huynh thường không biết con cái mình làm gì với điện thoại hay máy tính. Các chuyên gia cho biết trong khi trẻ em kết nối với mạng xã hội, chỉ khoảng 40% phụ huynh thực sự tham gia cùng con. Và vì phụ huynh không nắm được toàn bộ tình hình, họ không biết cách xử lý việc con mình có thể lạm dụng mạng xã hội quá mức và thậm chí có thể không nhận ra rằng vấn đề đang tồn tại. Vì vậy, mạng xã hội có thể gắn kết với cuộc sống của thanh thiếu niên một cách tức thời hơn nhiều so với cha mẹ, và điều này khiến việc giao tiếp ảo trở nên 'thật' hơn cả giao tiếp trực tiếp."},"questions":[{"q":"23. Many teenagers prefer interacting with virtual friends because they find online communication easier.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"it is easier to chat on the Internet because they lack communication skills\" → Đúng.","vis":["Đúng","Sai"],"vi":"Nhiều thanh thiếu niên thích tương tác với bạn bè ảo vì họ thấy giao tiếp trực tuyến dễ dàng hơn."},{"q":"24. According to the passage, teens lose face-to-face contact because they don't have mobile phones.","options":["True","False"],"answer":1,"explanation":"Bài đọc: ngược lại, chính vì luôn cầm điện thoại nên mất kết nối trực tiếp → Sai.","vis":["Đúng","Sai"],"vi":"Theo bài đọc, thanh thiếu niên mất đi sự tiếp xúc trực tiếp vì họ không có điện thoại di động."},{"q":"25. More than half of all parents are actively involved in supervising their children's social media use.","options":["True","False"],"answer":1,"explanation":"Bài đọc: chỉ khoảng 40% phụ huynh tham gia → Sai (chưa đến một nửa).","vis":["Đúng","Sai"],"vi":"Hơn một nửa số phụ huynh tích cực giám sát việc con cái sử dụng mạng xã hội."},{"q":"26. Virtual communication can feel more real to teenagers than talking to people in person.","options":["True","False"],"answer":0,"explanation":"Bài đọc: \"this fact makes virtual communication feel more 'real' than face-to-face communication\" → Đúng.","vis":["Đúng","Sai"],"vi":"Giao tiếp ảo có thể khiến thanh thiếu niên cảm thấy thật hơn là nói chuyện trực tiếp."},{"q":"27. What is the main idea of the passage?","options":["The negative impacts of social networks on teenagers' real-life contact and the lack of parental awareness.","The benefits of using social media to improve teenagers' communication skills.","The reasons why modern parents prefer virtual communication to face-to-face contact.","The statistical evidence showing how technology helps teenagers connect with their families."],"answer":0,"explanation":"Bài đọc bàn về tác động tiêu cực của mạng xã hội và việc phụ huynh thiếu nhận thức.","vis":["Những tác động tiêu cực của mạng xã hội đến sự tiếp xúc trực tiếp của thanh thiếu niên và việc phụ huynh thiếu nhận thức.","Những lợi ích của việc sử dụng mạng xã hội để cải thiện kỹ năng giao tiếp của thanh thiếu niên.","Những lý do khiến các bậc phụ huynh hiện đại thích giao tiếp ảo hơn là tiếp xúc trực tiếp.","Bằng chứng thống kê cho thấy công nghệ giúp thanh thiếu niên kết nối với gia đình như thế nào."],"vi":"Ý chính của đoạn văn là gì?"},{"q":"28. Which of the following is NOT true according to the passage?","options":["Parents always know how to handle their children's excessive use of social media.","Many teenagers feel more comfortable with online friends than real-life friends.","A large number of teenagers lack interpersonal communication skills.","Only about 40% of parents are involved while their children use social media."],"answer":0,"explanation":"Bài đọc: phụ huynh thường KHÔNG biết cách xử lý việc con dùng mạng xã hội quá mức → câu A sai với bài đọc.","vis":["Phụ huynh luôn biết cách xử lý việc con cái lạm dụng mạng xã hội quá mức.","Nhiều thanh thiếu niên cảm thấy thoải mái hơn với bạn bè trực tuyến hơn là bạn bè ngoài đời.","Rất nhiều thanh thiếu niên thiếu kỹ năng giao tiếp giữa các cá nhân.","Chỉ khoảng 40% phụ huynh tham gia cùng con khi con sử dụng mạng xã hội."],"vi":"Điều nào sau đây KHÔNG đúng theo đoạn văn?"}],"instant":true},{"roman":"V","navLabel":"Từ loại","title":"Cho dạng đúng của từ trong ngoặc","icon":"spell-check","instructions":"Điền dạng đúng của từ trong ngoặc vào chỗ trống.","type":"fill","questions":[{"q":"29. Playing board games with family members is very ___.","answer":"interesting","explanation":"Tính từ: interest + ing → interesting.","hint":"(INTEREST)","family":["interest (n/v): sự thú vị, mối quan tâm; làm quan tâm","interested (adj): cảm thấy hứng thú (chỉ người)","interesting (adj): thú vị, hấp dẫn (chỉ sự việc)","interestingly (adv): một cách thú vị"]},{"q":"30. My sister likes doing DIY because she wants to make her bedroom more ___.","answer":"colorful","explanation":"Tính từ: color + ful → colorful.","hint":"(COLOR)","family":["color (n): màu sắc","colorful (adj): nhiều màu sắc, sặc sỡ","colorless (adj): không màu, nhạt nhẽo","colored (adj): có màu"]},{"q":"31. The fair was successfully organized, and it brought a lot of ___ to the students.","answer":"pleasure","explanation":"Danh từ: please → pleasure (niềm vui, sự hài lòng).","hint":"(PLEASE)","family":["please (v): làm hài lòng, làm vui lòng","pleasant (adj): dễ chịu, thú vị","pleasure (n): niềm vui, sự hài lòng","pleased (adj): hài lòng, vui mừng"]},{"q":"32. Virtual communication can be harmful because it reduces ___ contact.","answer":"face-to-face","explanation":"Tính từ ghép: face-to-face (trực tiếp, mặt đối mặt).","hint":"(FACE)","family":["face (n/v): khuôn mặt; đối mặt với","face-to-face (adj/adv): trực tiếp, mặt đối mặt","facial (adj): thuộc về khuôn mặt"]},{"q":"33. Parents should be ___ in guiding their children to use social media safely.","answer":"involved","explanation":"Tính từ đuôi -ed: involve → involved (tham gia vào).","hint":"(INVOLVE)","family":["involve (v): liên quan đến, kéo theo","involved (adj): tham gia vào, có liên quan","involvement (n): sự tham gia, sự dính líu"]},{"q":"34. The lack of social skills makes many teenagers feel ___ when talking to strangers.","answer":"uncomfortable","explanation":"Tính từ phủ định: un + comfort + able → uncomfortable.","hint":"(COMFORT)","family":["comfort (n/v): sự thoải mái; an ủi","comfortable (adj): thoải mái","uncomfortable (adj): không thoải mái","comfortably (adv): một cách thoải mái"]}]},{"roman":"VI","navLabel":"Từ điển","title":"Tra từ điển \"leisure\"","icon":"book-bookmark","instructions":"Dựa vào mục từ điển, hoàn thành câu (không quá 3 từ).","type":"fill","dict":{"word":"leisure","ipa":"/ˈleʒər/","pos":"noun","senses":[{"def":"the time when you are not working or studying and can relax and do things that you enjoy.","examples":["Leisure activities such as cycling or gardening help reduce daily stress.","Most people only have a little leisure time during the busy workweek.","The new community center offers excellent leisure facilities for sports and hobbies."]}],"vi":"<b>leisure</b> /ˈleʒər/ (danh từ)<br>1. [U] khoảng thời gian khi bạn không phải làm việc hay học tập và có thể thư giãn, làm những điều mình thích.<br>• Các hoạt động giải trí như đạp xe hay làm vườn giúp giảm bớt căng thẳng hằng ngày.<br>• Hầu hết mọi người chỉ có một chút thời gian rảnh trong tuần làm việc bận rộn.<br>• Trung tâm cộng đồng mới cung cấp các cơ sở giải trí tuyệt vời cho thể thao và sở thích."},"questions":[{"q":"35. The local government is building new ___ like swimming pools and parks for the residents.","answer":"leisure facilities","explanation":"Dựa vào ví dụ: leisure facilities."},{"q":"36. Playing sports and collecting stamps are healthy ___ that help teenagers relax after school.","answer":"leisure activities","explanation":"Dựa vào ví dụ: leisure activities."}]},{"roman":"VII","navLabel":"Viết lại câu","title":"Viết lại câu sao cho nghĩa không đổi","icon":"pen-to-square","instructions":"Viết lại câu, giữ nguyên nghĩa với câu gốc.","type":"sentence","questions":[{"q":"37.","answer":"interesting to play board games","explanation":"V-ing... is interesting = It is interesting to V.","original":"Playing board games is very interesting.","starter":"It is very","vi":"Chơi cờ bàn rất thú vị.","note":"V-ing + is + adj → It is + adj + to V<br>Nghĩa đáp án: Chơi cờ bàn rất thú vị."},{"q":"38.","answer":"me to learn another language","explanation":"insist on my V-ing = want sb to V.","original":"My parents insist on my learning another language.","starter":"My parents want","vi":"Bố mẹ tôi khăng khăng đòi tôi học thêm một ngôn ngữ khác.","note":"insist on sb's V-ing → want sb to V<br>Nghĩa đáp án: Bố mẹ tôi muốn tôi học thêm một ngôn ngữ khác."},{"q":"39.","answer":"up his free time playing computer games","explanation":"spend time V-ing = take up free time V-ing / take time to V.","accepted":["up his free time playing computer games","time to play computer games"],"original":"My brother usually spends his free time playing computer games.","starter":"My brother usually takes","vi":"Anh trai tôi thường dành thời gian rảnh để chơi trò chơi điện tử.","note":"spend time V-ing → take up time V-ing / take time to V<br>Nghĩa đáp án: Anh trai tôi thường dùng thời gian rảnh để chơi trò chơi điện tử."},{"q":"40.","answer":"not spend too much time surfing the Internet","explanation":"should not + V = had better not + V.","original":"You should not spend too much time surfing the Internet.","starter":"You had better","vi":"Bạn không nên dành quá nhiều thời gian lướt Internet.","note":"should not + V → had better not + V<br>Nghĩa đáp án: Bạn không nên dành quá nhiều thời gian lướt Internet."}],"instant":true}]};

function normalize(str){
  return (str||'').trim().toLowerCase()
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/["\u201C\u201D]/g,'')
    .replace(/[.,!?;:]/g,'')
    .replace(/\s+/g,' ');
}
function widthFor(ref){ const l=(ref||'').length; return l<7?'w-24':l<16?'w-40':'w-full'; }

if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }
function speak(text, btn){
  try{
    if(!('speechSynthesis' in window)){ alert('Trình duyệt của bạn không hỗ trợ phát âm tự động. Hãy thử Chrome, Edge hoặc Safari.'); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9; u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const en=voices.find(v=>/en[-_]?(us|gb)/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(en) u.voice=en;
    if(btn){ btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); u.onerror=()=>btn.classList.remove('speaking'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}

  ).join('');
}

  if(!p) return '';
  const viBlock = p.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-indigo-200 italic text-slate-500">${p.vi}</p>` : '';
  return `<div class="passage-box mb-4"><p class="font-extrabold text-indigo-900 mb-2"><i class="fa-solid fa-book mr-1"></i>${p.title||''}</p><p id="passage_en_${idx}">${p.html}</p>${viBlock}</div>`;
}
function renderDict(d, idx){
  if(!d) return '';
  const viBlock = d.vi ? `<button onclick="togglePassageVI(${idx})" class="text-xs font-bold bg-white border border-amber-300 text-amber-700 px-3 py-1 rounded-full hover:scale-105 transition mt-2"><i class="fa-solid fa-language mr-1"></i>Dịch tiếng Việt</button>
    <p id="passage_vi_${idx}" class="vi-hidden mt-2 pt-2 border-t border-amber-300 text-slate-600">${d.vi}</p>` : '';
  return `<div class="dict-box mb-4"><p class="font-extrabold text-amber-800 mb-1"><i class="fa-solid fa-book-bookmark mr-1"></i>${d.word} <span class="font-normal italic">${d.ipa||''}</span> <span class="font-normal">(${d.pos||''})</span></p>${d.senses.map(x=>`<p class="mb-1">✱ ${x.def}</p>${(x.examples||[]).map(e=>`<p class="ml-4 italic text-slate-600">• ${e}</p>`).join('')}`).join('')}${viBlock}</div>`;
}

function renderSection(s, idx){
  let inner = `<h2 class="text-xl md:text-2xl font-extrabold text-indigo-900 flex items-center gap-2 mb-1"><i class="fa-solid fa-${s.icon||'circle-check'} text-amber-400"></i> ${s.roman}. ${s.title}</h2>`;
  if(s.instructions) inner += `<p class="text-sm text-slate-500 mb-3 italic">${s.instructions}</p>`;
  inner += renderPassage(s.passage, idx);
  inner += renderDict(s.dict, idx);

  inner += `<div class="space-y-4">`;
  s.questions.forEach((q,i)=>{
    inner += `<div class="task-card bg-white rounded-2xl shadow-md p-4" id="qblock_${idx}_${i}">`;
    if(q.image) inner += `<div class="mb-3">${q.image}</div>`;
    inner += `<p class="font-bold text-slate-800 mb-2"><span class="bg-slate-100 text-slate-600 text-xs font-black px-2 py-1 rounded-lg mr-2">${i+1}</span>${q.q}</p>`;
    if(s.type==='mcq'){
      inner += `<div class="grid sm:grid-cols-2 gap-2">`;
      q.options.forEach((opt,j)=>{
        const ipa = q.ipas ? q.ipas[j] : null;
        const optVi = q.vis ? q.vis[j] : null;
        const cleanWord = opt.replace(/<[^>]+>/g,'');
        const wordBlock = (ipa || optVi)
          ? `<span class="flex flex-col leading-tight"><span>${opt}</span>${ipa?`<span class="text-[10px] text-slate-400 font-normal mcq-detail-hidden">${ipa}</span>`:''}${optVi?`<span class="text-[10px] text-emerald-500 font-normal italic mcq-detail-hidden">${optVi}</span>`:''}</span>
             <button type="button" data-w="${cleanWord}" onclick="event.stopPropagation();event.preventDefault();speak(this.dataset.w,this)" class="speak-btn w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 hover:scale-110 transition flex items-center justify-center ml-auto shrink-0 mcq-detail-hidden" title="Nghe phát âm" aria-label="Nghe phát âm ${cleanWord}"><i class="fa-solid fa-volume-high text-[10px]"></i></button>`
          : `<span>${opt}</span>`;
        inner += `<label class="option-label rounded-xl px-3 py-2 text-sm font-semibold flex items-center gap-2" id="opt_${idx}_${i}_${j}" onclick="selectMcq(${idx},${i},${j})">
          <input type="radio" name="mcq_${idx}_${i}" class="accent-indigo-700" style="display:none">
          <span class="font-black text-indigo-700">${optionLetter(j)}.</span> ${wordBlock}
        </label>`;
      });
      inner += `</div>`;
    } else if(s.type==='fill'){
      const w = widthFor(q.answer);
      const famBlock = q.family ? `<div class="wordfam-box mt-2">${q.family.map(f=>`<div>• ${f}</div>`).join('')}</div>` : '';
      inner += `<div class="flex items-center gap-2 flex-wrap">`;
      if(q.hint) inner += `<span class="blank-tag text-xs">${q.hint}</span>`;
      inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input ${w} px-3 py-1.5 rounded-lg text-sm font-semibold" placeholder="Nhập đáp án..." autocomplete="off" spellcheck="false"></div>${famBlock}`;
    } else if(s.type==='sentence'){
      const instantAttr = s.instant ? ` oninput="gradeOneSentence(${idx},${i})"` : '';
      if(q.starter){
        inner += `<p class="text-slate-700 text-sm mb-2">${q.original}</p>
        <div class="flex items-center gap-3 w-full flex-wrap">
          <span class="text-slate-800 font-extrabold text-base whitespace-nowrap">${q.starter}</span>
          <input type="text" id="inp_${idx}_${i}" class="answer-input flex-1 min-w-[180px] px-3 py-2 rounded-lg text-sm font-semibold" placeholder="..." autocomplete="off" spellcheck="false"${instantAttr}>
        </div>`;
      } else {
        inner += `<input type="text" id="inp_${idx}_${i}" class="answer-input w-full px-3 py-2 rounded-lg text-sm font-semibold" placeholder="Viết câu trả lời..." autocomplete="off" spellcheck="false"${instantAttr}>`;
      }
    }
    inner += `<div class="explanation-box mt-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-sm text-blue-800" id="fb_${idx}_${i}"></div>`;
    inner += `</div>`;
  });
  inner += `</div>`;

  inner += `<div class="flex flex-wrap gap-2 mt-5">
    <button onclick="checkSection(${idx})" class="bg-gradient-to-r from-indigo-900 to-pink-600 text-white font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-check mr-1"></i>Kiểm tra</button>
    <button onclick="revealSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-eye mr-1"></i>Xem đáp án</button>
    <button onclick="resetSection(${idx})" class="bg-white border-2 border-slate-200 text-slate-600 font-bold px-5 py-2.5 rounded-full text-sm"><i class="fa-solid fa-rotate-left mr-1"></i>Làm lại</button>
    <span id="score_${idx}" class="hidden ml-auto self-center font-extrabold text-emerald-600 text-sm score-badge"></span>
  </div>`;

  return `<section id="tab-${idx}" class="section-page${idx===0?' active':''} space-y-4">${inner}</section>`;
}

function buildMain(){
  const main=document.getElementById('mainWrap');
  main.innerHTML = DATA.sections.map((s,i)=>renderSection(s,i)).join('');
}

function togglePassageVI(idx){ const el=document.getElementById(`passage_vi_${idx}`); if(el) el.classList.toggle('vi-hidden'); }
function selectMcq(idx,i,j){
  const q=DATA.sections[idx].questions[i];
  document.querySelectorAll(`[id^="opt_${idx}_${i}_"]`).forEach(el=>el.classList.remove('selected'));
  document.getElementById(`opt_${idx}_${i}_${j}`).classList.add('selected');
  document.getElementById(`opt_${idx}_${i}_${j}`).dataset.chosen = j;
  if(DATA.sections[idx].instant){ gradeOneMcq(idx,i); }
}

function gradeOneMcq(idx,i){
  const s=DATA.sections[idx], q=s.questions[i];
  const qblock=document.getElementById(`qblock_${idx}_${i}`);
  if(qblock) qblock.classList.add('show-mcq-detail');
  const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
  const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
  const ok = chosen === q.answer;
  const answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
  q.options.forEach((o,j)=>{
    const el=document.getElementById(`opt_${idx}_${i}_${j}`);
    el.classList.remove('correct-opt','wrong-opt');
    if(j===q.answer) el.classList.add('correct-opt');
    else if(j===chosen) el.classList.add('wrong-opt');
  });
  const fb=document.getElementById(`fb_${idx}_${i}`);
  fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function gradeOneSentence(idx,i){
  const q=DATA.sections[idx].questions[i];
  const inp=document.getElementById(`inp_${idx}_${i}`);
  const fb=document.getElementById(`fb_${idx}_${i}`);
  if(!inp || !fb) return;
  const raw=inp.value.trim();
  if(raw===''){
    inp.classList.remove('correct-input','wrong-input');
    fb.classList.remove('show'); fb.innerHTML='';
    return;
  }
  const val=normalize(inp.value);
  const acc=(q.accepted||[q.answer]).map(normalize);
  const ok = acc.includes(val);
  inp.classList.remove('correct-input','wrong-input');
  inp.classList.add(ok?'correct-input':'wrong-input');
  fb.innerHTML = feedbackHTML(ok, q.answer, q.explanation, q.vi, q.note);
  fb.classList.add('show');
}

function feedbackHTML(ok, answerLabel, explanation, vi, note){
  const okLine = ok? `<span class="text-emerald-700 font-bold">✅ Chính xác!</span>` : `<span class="text-rose-600 font-bold">❌ Chưa đúng.</span> Đáp án đúng: <b>${answerLabel}</b>`;
  const expLine = explanation? `<br><span class="text-blue-700">💡 ${explanation}</span>` : '';
  const viLine = vi? `<span class="text-slate-500">📖 Nghĩa: <i>${vi}</i></span>` : '';
  const noteLine = note? `<br><span class="text-violet-600">📐 Công thức: <b>${note}</b></span>` : '';
  if(note){
    return (viLine?viLine+'<br>':'') + okLine + expLine + noteLine;
  }
  return okLine + expLine + (viLine?'<br>'+viLine:'') + noteLine;
}

function checkSection(idx){
  const s=DATA.sections[idx];
  let correct=0;
  s.questions.forEach((q,i)=>{
    let ok=false, answerLabel='';
    const fb=document.getElementById(`fb_${idx}_${i}`);
    if(s.type==='mcq'){
      const chosenEl=document.querySelector(`#tab-${idx} [id^="opt_${idx}_${i}_"].selected`);
      const chosen = chosenEl ? parseInt(chosenEl.dataset.chosen) : -1;
      ok = chosen === q.answer;
      answerLabel = `${optionLetter(q.answer)}. ${q.options[q.answer]}`;
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
        else if(j===chosen) el.classList.add('wrong-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      const val=normalize(inp.value);
      const acc=(q.accepted||[q.answer]).map(normalize);
      ok = val!=='' && acc.includes(val);
      inp.classList.remove('correct-input','wrong-input');
      inp.classList.add(ok?'correct-input':'wrong-input');
      answerLabel = q.answer;
    }
    if(ok) correct++;
    fb.innerHTML = feedbackHTML(ok, answerLabel, q.explanation, q.vi, q.note);
    fb.classList.add('show');
  });
  const total=s.questions.length;
  scores[idx]={correct,total};
  const scoreEl=document.getElementById(`score_${idx}`);
  scoreEl.textContent = `🏆 Điểm: ${correct}/${total}`;
  scoreEl.classList.remove('hidden');
  completedTasks.add(idx);
  updateProgress();
  if(completedTasks.size===TOTAL_TASKS) setTimeout(showCompletion,500);
}

function revealSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    const fb=document.getElementById(`fb_${idx}_${i}`);
    let answerLabel = s.type==='mcq' ? `${optionLetter(q.answer)}. ${q.options[q.answer]}` : q.answer;
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt');
        if(j===q.answer) el.classList.add('correct-opt');
      });
      const qblock=document.getElementById(`qblock_${idx}_${i}`);
      if(qblock) qblock.classList.add('show-mcq-detail');
    }
    fb.innerHTML = `👁️ Đáp án: <b>${answerLabel}</b>` + (q.explanation?`<br><span class="text-blue-700">💡 ${q.explanation}</span>`:'') + (q.vi?`<br><span class="text-slate-500">📖 Nghĩa: <i>${q.vi}</i></span>`:'') + (q.note?`<br><span class="text-violet-600">📐 Công thức: <b>${q.note}</b></span>`:'');
    fb.classList.add('show');
  });
}

function resetSection(idx){
  const s=DATA.sections[idx];
  s.questions.forEach((q,i)=>{
    if(s.type==='mcq'){
      q.options.forEach((o,j)=>{
        const el=document.getElementById(`opt_${idx}_${i}_${j}`);
        el.classList.remove('correct-opt','wrong-opt','selected');
        delete el.dataset.chosen;
      });
    } else {
      const inp=document.getElementById(`inp_${idx}_${i}`);
      if(inp){ inp.value=''; inp.classList.remove('correct-input','wrong-input'); }
    }
    const qblock=document.getElementById(`qblock_${idx}_${i}`);
    if(qblock) qblock.classList.remove('show-mcq-detail');
    const fb=document.getElementById(`fb_${idx}_${i}`);
    fb.classList.remove('show'); fb.innerHTML='';
  });
  const scoreEl=document.getElementById(`score_${idx}`); scoreEl.classList.add('hidden');
  completedTasks.delete(idx); delete scores[idx]; updateProgress();
}

function showTab(idx){
  document.querySelectorAll('.section-page').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active'); b.classList.add('text-slate-600');});
  document.getElementById(`tab-${idx}`).classList.add('active');
  const btn=document.getElementById(`navbtn_${idx}`);
  btn.classList.add('active'); btn.classList.remove('text-slate-600');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const done=completedTasks.size;
  document.getElementById('progressText').textContent = `${done} / ${TOTAL_TASKS} phần`;
  document.getElementById('progressBar').style.width = `${(done/TOTAL_TASKS)*100}%`;
}

function showCompletion(){
  fireConfetti();
  const banner=document.getElementById('completionBanner');
  banner.classList.remove('hidden'); banner.classList.add('show');
  let c=0,t=0; Object.values(scores).forEach(s=>{c+=s.correct; t+=s.total;});
  document.getElementById('finalScoreDisplay').textContent = `🎯 ${c} / ${t} câu đúng`;
}
function closeBanner(){ const b=document.getElementById('completionBanner'); b.classList.remove('show'); b.classList.add('hidden'); }
function fireConfetti(){
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#1e1b4b','#7c3aed','#db2777','#a21caf','#f59e0b','#6366f1'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';},4000);
}

buildNav();
buildMain();
updateProgress();
</script>
</body>
</html>
