<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 10: Communication in the Future — Vocab Hub 📡</title>
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg:#f4f6ff; --bg2:#ffffff; --card:#ffffff; --ink:#26283d; --ink-soft:#6b6e8a;
  --line:#e4e7f4; --shadow:0 4px 14px rgba(80,90,200,.10);
  --p:#6c4df6; --p-dark:#5438d6; --p-soft:#efeaff;
  --accent:#ff7ab8; --accent-soft:#ffe9f4;
  --good:#21c07a; --good-soft:#dcf9ec; --bad:#ff5a6a; --bad-soft:#ffe4e7;
  --gold:#ffb300; --gold-soft:#fff4d6;
  --teal:#19b8c9; --teal-soft:#e0f9fc;
  --r:18px;
}
[data-theme="dark"]{
  --bg:#141623; --bg2:#1c1f33; --card:#222640; --ink:#eceef8; --ink-soft:#a5a9c8;
  --line:#33375a; --shadow:0 4px 18px rgba(0,0,0,.35);
  --p:#8d72ff; --p-dark:#a18cff; --p-soft:#2c2a52;
  --accent:#ff8ec3; --accent-soft:#3a2438;
  --good:#2bd98c; --good-soft:#163b2c; --bad:#ff6b7a; --bad-soft:#3e1f26;
  --gold:#ffc233; --gold-soft:#3c3115;
  --teal:#2fd2e3; --teal-soft:#123a40;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Quicksand','Baloo 2','Nunito',ui-rounded,'Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--ink); min-height:100vh; transition:background .3s,color .3s;
}
button{font-family:inherit}
.wrap{max-width:880px;margin:0 auto;padding:0 14px 90px}

/* ============ HEADER ============ */
header{position:sticky;top:0;z-index:60;background:var(--bg);padding:12px 0 8px;transition:background .3s}
.hd{display:flex;align-items:center;gap:10px;max-width:880px;margin:0 auto;padding:0 14px}
.logo{font-weight:800;font-size:19px;display:flex;align-items:center;gap:8px}
.logo .badge-unit{background:linear-gradient(135deg,var(--p),var(--accent));color:#fff;border-radius:10px;padding:3px 10px;font-size:12px;letter-spacing:.05em}
.xp-pill{margin-left:auto;background:var(--gold-soft);border:2px solid var(--gold);color:var(--gold);border-radius:99px;padding:4px 12px;font-weight:800;font-size:14px}
.streak-pill{background:var(--accent-soft);border:2px solid var(--accent);color:var(--accent);border-radius:99px;padding:4px 12px;font-weight:800;font-size:14px}
.theme-btn{background:var(--card);border:2px solid var(--line);border-radius:12px;width:40px;height:40px;font-size:18px;cursor:pointer;box-shadow:var(--shadow)}

/* ============ NAV ============ */
nav{overflow-x:auto;scrollbar-width:none;margin-top:8px}
nav::-webkit-scrollbar{display:none}
.nav-in{display:flex;gap:8px;max-width:880px;margin:0 auto;padding:4px 14px 10px;width:max-content;min-width:100%}
.tab{flex:none;background:var(--card);border:2px solid var(--line);border-radius:99px;padding:8px 16px;font-weight:700;font-size:14px;color:var(--ink-soft);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.active{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 4px 12px rgba(108,77,246,.35)}
.tab:hover:not(.active){border-color:var(--p);color:var(--p)}

/* ============ SECTIONS ============ */
section{display:none;animation:fadeUp .35s cubic-bezier(.22,1,.36,1)}
section.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
h2.sec-title{font-size:24px;margin:18px 0 4px;display:flex;align-items:center;gap:10px}
p.sec-sub{color:var(--ink-soft);font-weight:600;font-size:14px;margin:0 0 18px}
.pos-tag{display:inline-block;background:var(--teal-soft);color:var(--teal);border-radius:99px;padding:1px 10px;font-size:12px;font-weight:800}

/* ============ S1: FLIP CARDS ============ */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.flip{perspective:1000px;height:260px;cursor:pointer}
.flip-in{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.1,.2,1.2);transform-style:preserve-3d}
.flip.flipped .flip-in{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:14px;text-align:center;box-shadow:var(--shadow);border:2px solid var(--line)}
.face.front{background:linear-gradient(160deg,var(--card) 60%,var(--p-soft))}
.face.front .emo{font-size:50px}
.face.front .w{font-size:20px;font-weight:800}
.face.front .tap{font-size:11px;color:var(--ink-soft);font-weight:700;letter-spacing:.05em}
.face.back{background:var(--card);transform:rotateY(180deg);justify-content:flex-start;padding-top:16px;overflow:auto}
.face.back .w{font-weight:800;font-size:17px;color:var(--p)}
.ipa{color:var(--teal);font-weight:700;font-size:14px}
.vi-mean{font-weight:800;font-size:15px;background:var(--accent-soft);color:var(--accent);border-radius:99px;padding:2px 12px}
.ex{font-size:13px;font-weight:600;margin-top:4px}
.ex-vi{font-size:12.5px;color:var(--ink-soft);font-weight:600;font-style:italic}
.mini-speak{background:var(--teal);border:none;color:#fff;border-radius:10px;width:34px;height:30px;cursor:pointer;font-size:14px}

/* ============ S2: LISTEN & REPEAT ============ */
.lr-row{background:var(--card);border:2px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.lr-emo{font-size:28px}
.lr-word{font-weight:800;font-size:16px}
.lr-ipa{font-size:13px;color:var(--teal);font-weight:700}
.lr-btns{margin-left:auto;display:flex;gap:8px}
.rbtn{border:none;border-radius:12px;padding:8px 12px;font-weight:800;font-size:13px;cursor:pointer;transition:transform .1s}
.rbtn:active{transform:scale(.94)}
.rbtn.listen{background:var(--teal-soft);color:var(--teal)}
.rbtn.rec{background:var(--bad-soft);color:var(--bad)}
.rbtn.rec.on{background:var(--bad);color:#fff;animation:blink 1s infinite}
.rbtn.play{background:var(--good-soft);color:var(--good)}
.rbtn:disabled{opacity:.4;cursor:not-allowed}
@keyframes blink{50%{opacity:.6}}
.mic-note{font-size:12.5px;color:var(--ink-soft);font-weight:600;background:var(--card);border:2px dashed var(--line);border-radius:12px;padding:10px 14px;margin-bottom:14px}

/* ============ SHARED GAME UI ============ */
.panel{background:var(--card);border:2px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}
.gstat{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.gpill{background:var(--p-soft);color:var(--p);font-weight:800;border-radius:99px;padding:5px 14px;font-size:14px}
.gpill.gold{background:var(--gold-soft);color:var(--gold)}
.gpill.teal{background:var(--teal-soft);color:var(--teal)}
.btn{border:none;border-radius:14px;padding:12px 24px;font-weight:800;font-size:15px;cursor:pointer;transition:transform .1s,filter .2s;color:#fff;background:var(--p);box-shadow:0 4px 0 var(--p-dark)}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--p-dark)}
.btn.ghost{background:var(--card);color:var(--p);border:2px solid var(--p);box-shadow:none}
.btn.small{padding:8px 16px;font-size:13px;border-radius:11px}
.btn.good{background:var(--good);box-shadow:0 4px 0 #169a60}
.btn:disabled{filter:grayscale(.8);opacity:.5;cursor:not-allowed}

/* matching */
.mt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mt-col{display:grid;gap:10px;align-content:start}
.mt-btn{background:var(--bg2);border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:12px 10px;font-weight:700;font-size:14.5px;cursor:pointer;color:var(--ink);transition:all .15s;text-align:center}
.mt-btn.sel{border-color:var(--p);background:var(--p-soft);color:var(--p)}
.mt-btn.ok{border-color:var(--good);background:var(--good-soft);color:var(--good);pointer-events:none;transform:scale(.97)}
.mt-btn.no{border-color:var(--bad);background:var(--bad-soft);animation:shake .4s}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* flashcards */
.fc-stage{display:flex;flex-direction:column;align-items:center;gap:16px}
.fc{perspective:1100px;width:min(420px,92vw);height:270px;cursor:pointer}
.fc-in{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,.1,.2,1.15);transform-style:preserve-3d}
.fc.flipped .fc-in{transform:rotateY(180deg)}
.fc .face{font-size:15px}
.fc .face.front .emo{font-size:60px}
.fc .face.front .w{font-size:27px}
.fc-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.fc-count{font-weight:800;color:var(--ink-soft)}
.mastered-btn{border:2px solid var(--good);background:var(--card);color:var(--good);border-radius:12px;padding:8px 16px;font-weight:800;cursor:pointer;font-size:13px}
.mastered-btn.on{background:var(--good);color:#fff}

/* quiz */
.q-opt{display:block;width:100%;text-align:left;background:var(--bg2);border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:13px 16px;font-weight:700;font-size:15px;color:var(--ink);cursor:pointer;margin-bottom:10px;transition:all .15s}
.q-opt:hover{border-color:var(--p)}
.q-opt.ok{border-color:var(--good);background:var(--good-soft);color:var(--good)}
.q-opt.no{border-color:var(--bad);background:var(--bad-soft);color:var(--bad);animation:shake .4s}
.q-word{font-size:24px;font-weight:800;margin:6px 0 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.q-sent{font-size:17px;font-weight:700;margin:6px 0 14px;line-height:1.6}
.q-progress{height:10px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:16px}
.q-progress>div{height:100%;background:linear-gradient(90deg,var(--p),var(--accent));transition:width .4s;border-radius:99px}

/* fill blank + spelling input */
.fb-row{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.fb-sent{font-weight:700;font-size:15px;margin-bottom:4px}
.fb-hint{font-size:13px;color:var(--ink-soft);font-weight:600;margin-bottom:10px}
.fb-line{display:flex;gap:8px;flex-wrap:wrap}
.fb-input{flex:1;min-width:140px;border:2px solid var(--line);border-radius:12px;padding:10px 14px;font-family:inherit;font-weight:700;font-size:15px;background:var(--bg2);color:var(--ink);outline:none}
.fb-input:focus{border-color:var(--p)}
.fb-input.ok{border-color:var(--good);background:var(--good-soft)}
.fb-input.no{border-color:var(--bad);background:var(--bad-soft);animation:shake .4s}
.fb-reveal{font-size:13px;font-weight:800;color:var(--good);margin-top:6px}
.scramble{letter-spacing:5px;text-transform:lowercase;font-weight:800;color:var(--p)}

/* memory */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:520px){.mem-grid{grid-template-columns:repeat(4,1fr);gap:7px}}
.mem-card{perspective:800px;aspect-ratio:3/3.4;cursor:pointer}
.mem-in{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
.mem-card.open .mem-in{transform:rotateY(180deg)}
.mem-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;text-align:center;padding:6px;font-weight:800}
.mem-face.f{background:linear-gradient(135deg,var(--p),var(--accent));color:#fff;font-size:24px}
.mem-face.b{background:var(--card);transform:rotateY(180deg);font-size:12.5px;color:var(--ink)}
.mem-card.done .mem-face.b{background:var(--good-soft);border-color:var(--good);color:var(--good)}

/* categories */
.cat-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;min-height:46px}
.cat-chip{background:var(--bg2);border:2px solid var(--line);border-bottom-width:4px;border-radius:99px;padding:8px 16px;font-weight:800;font-size:14px;cursor:pointer;color:var(--ink);transition:all .15s}
.cat-chip.sel{border-color:var(--p);background:var(--p-soft);color:var(--p);transform:scale(1.05)}
.cat-boxes{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.cat-box{background:var(--card);border:2px dashed var(--line);border-radius:var(--r);padding:12px;min-height:96px;cursor:pointer;transition:border-color .2s}
.cat-box:hover{border-color:var(--p)}
.cat-box h4{margin:0 0 8px;font-size:14.5px;display:flex;gap:6px;align-items:center}
.cat-box .placed{display:flex;flex-wrap:wrap;gap:6px}
.placed .tag{background:var(--good-soft);color:var(--good);border-radius:99px;padding:3px 10px;font-size:12.5px;font-weight:800;animation:fadeUp .3s}
.cat-box.shake{animation:shake .4s;border-color:var(--bad)}

/* search & filter */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.filter-sel{border:2px solid var(--line);border-radius:12px;padding:10px 12px;font-family:inherit;font-weight:700;background:var(--bg2);color:var(--ink);font-size:14px;cursor:pointer}

/* dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.dash-card{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--shadow)}
.dash-card .v{font-size:28px;font-weight:800;color:var(--p)}
.dash-card .l{font-size:12px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
.bar{height:18px;background:var(--line);border-radius:99px;overflow:hidden}
.bar>div{height:100%;background:linear-gradient(90deg,var(--good),var(--teal));border-radius:99px;transition:width .6s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:800}
.badges{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:14px}
.bdg{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:14px 8px;text-align:center;opacity:.35;filter:grayscale(1);transition:all .4s}
.bdg.earned{opacity:1;filter:none;border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
.bdg .be{font-size:34px}
.bdg .bn{font-weight:800;font-size:13px;margin-top:4px}
.bdg .br{font-size:11px;color:var(--ink-soft);font-weight:700}
.score-list{list-style:none;padding:0;margin:8px 0 0}
.score-list li{background:var(--bg2);border:2px solid var(--line);border-radius:12px;padding:8px 14px;margin-bottom:6px;font-weight:700;font-size:14px;display:flex;justify-content:space-between}

/* study notes */
.notes-wrap{overflow-x:auto}
.notes-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card)}
.notes-table th,.notes-table td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
.notes-table th{background:var(--p-soft);color:var(--p);font-weight:800;position:sticky;top:0}
.notes-table td .ipa{color:var(--teal)}

/* toast */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);z-index:99;background:var(--ink);color:var(--bg);font-weight:800;border-radius:99px;padding:12px 24px;box-shadow:0 8px 30px rgba(0,0,0,.3);transition:transform .35s cubic-bezier(.22,1,.36,1);font-size:15px}
#toast.show{transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;top:-12px;z-index:99;border-radius:3px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
.center{text-align:center}
.result-emoji{font-size:64px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* print: only study notes */
@media print{
  header, nav, #toast, .no-print, .wrap > section:not(#sec-notes){display:none !important}
  #sec-notes{display:block !important}
  body{background:#fff;color:#000}
  .notes-table th{background:#eee;color:#000}
  .notes-table th,.notes-table td{border:1px solid #999}
}
</style>
</head>
<body>

<header>
  <div class="hd">
    <div class="logo">📡 Vocab Hub <span class="badge-unit">UNIT 10 · COMMUNICATION</span></div>
    <span class="streak-pill" title="Chuỗi ngày học">🔥 <span id="streakVal">0</span></span>
    <div class="xp-pill">⚡ <span id="xpVal">0</span> XP</div>
    <button class="theme-btn" id="themeBtn" title="Đổi giao diện sáng/tối">🌙</button>
  </div>
  <nav><div class="nav-in" id="navBar"></div></nav>
</header>

<div class="wrap">
  <section id="sec-cards"></section>
  <section id="sec-listen"></section>
  <section id="sec-match"></section>
  <section id="sec-flash"></section>
  <section id="sec-quiz"></section>
  <section id="sec-fill"></section>
  <section id="sec-spell"></section>
  <section id="sec-memory"></section>
  <section id="sec-cat"></section>
  <section id="sec-search"></section>
  <section id="sec-dash"></section>
  <section id="sec-review"></section>
  <section id="sec-notes"></section>
</div>

<div id="toast"></div>

<script>
/* ====================================================
   DATA — Unit 10: Communication in the Future (22 words)
==================================================== */
const VOCAB = [
 {en:"account", pos:"Danh từ (noun)", posKey:"noun", ipa:"/əˈkaʊnt/", vi:"tài khoản (mạng xã hội, ngân hàng...)", ex:"I created a new account on the social network.", exvi:"Tôi đã tạo một tài khoản mới trên mạng xã hội.", emo:"👤", cat:"online"},
 {en:"advanced", pos:"Tính từ (adjective)", posKey:"adjective", ipa:"/ədˈvɑːnst/", vi:"tiên tiến", ex:"Future phones will use very advanced technology.", exvi:"Điện thoại tương lai sẽ dùng công nghệ rất tiên tiến.", emo:"🚀", cat:"concept"},
 {en:"carrier pigeon", pos:"Danh từ (noun)", posKey:"noun", ipa:"/ˈkærɪə pɪdʒɪn/", vi:"bồ câu đưa thư", ex:"In the past, people sent letters by carrier pigeon.", exvi:"Ngày xưa, người ta gửi thư bằng bồ câu đưa thư.", emo:"🐦", cat:"future"},
 {en:"charge", pos:"Động từ (verb)", posKey:"verb", ipa:"/tʃɑːdʒ/", vi:"nạp, sạc (pin)", ex:"I need to charge my phone before the trip.", exvi:"Tôi cần sạc điện thoại trước chuyến đi.", emo:"🔋", cat:"actions"},
 {en:"emoji", pos:"Danh từ (noun)", posKey:"noun", ipa:"/ɪˈməʊdʒi/", vi:"biểu tượng cảm xúc", ex:"She added a smiling emoji to her message.", exvi:"Cô ấy thêm một biểu tượng cảm xúc cười vào tin nhắn.", emo:"😊", cat:"online"},
 {en:"holography", pos:"Danh từ (noun)", posKey:"noun", ipa:"/hɒˈlɒɡrəfi/", vi:"giao tiếp bằng ảnh ba chiều", ex:"In the future, holography may replace video calls.", exvi:"Trong tương lai, giao tiếp bằng ảnh ba chiều có thể thay thế cuộc gọi video.", emo:"🪩", cat:"future"},
 {en:"instantly", pos:"Trạng từ (adverb)", posKey:"adverb", ipa:"/ˈɪnstəntli/", vi:"ngay lập tức", ex:"Messages are sent instantly around the world.", exvi:"Tin nhắn được gửi đi ngay lập tức khắp thế giới.", emo:"⚡", cat:"concept"},
 {en:"Internet connection", pos:"Danh từ (noun)", posKey:"noun", ipa:"/ˈɪntənet kəˈnekʃn/", vi:"kết nối mạng", ex:"You need a good Internet connection for video calls.", exvi:"Bạn cần một kết nối mạng tốt để gọi video.", emo:"📶", cat:"online"},
 {en:"language barrier", pos:"Danh từ (noun)", posKey:"noun", ipa:"/ˈlæŋɡwɪdʒ ˈbærɪə/", vi:"rào cản ngôn ngữ", ex:"A translation machine can break the language barrier.", exvi:"Máy dịch thuật có thể phá vỡ rào cản ngôn ngữ.", emo:"🗣️", cat:"concept"},

/* ====================================================
   SAFE STORAGE (localStorage with in-memory fallback)
==================================================== */
const memStore = {};
const store = {
  get(k, d){ try{ const v = localStorage.getItem(k); return v===null? d : JSON.parse(v);}catch(e){ return k in memStore ? memStore[k] : d; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ memStore[k]=v; } }
};
let S = store.get('vocabhub_u10', {xp:0, mastered:[], quizScores:[], theme:'light', streak:0, lastDate:null, memBest:null});
function save(){ store.set('vocabhub_u10', S); }

==================================================== */
const $ = s => document.querySelector(s);
const shuffle = a => a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(p=>p[1]);
function speak(t){ try{ const u=new SpeechSynthesisUtterance(t); u.lang='en-GB'; u.rate=.85; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),2200); }
function addXP(n){
  S.xp += n; $('#xpVal').textContent = S.xp;
  BADGES.forEach(b=>{
    if(S.xp >= b.xp && !S['bdg_'+b.id]){ S['bdg_'+b.id]=true; toast(`🏅 Huy hiệu mới: ${b.emo} ${b.name}!`); confetti(30); }
  });
  save(); renderDash();
}
function confetti(n=60){
  const colors=['#6c4df6','#ff7ab8','#21c07a','#ffb300','#19b8c9'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div'); c.className='confetti';
    const s=6+Math.random()*8;
    c.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s*1.4}px;background:${colors[i%5]};animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*.6}s`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),5200);
  }
}
function maskWord(sentence, word){
  const re = new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
  return sentence.replace(re,'______');
}

let mediaRec=null, recChunks=[], recBtnActive=null;
const recordings = {};
document.querySelectorAll('#sec-listen .rec').forEach(btn=>{
  btn.onclick = async ()=>{
    if(recBtnActive === btn){ mediaRec.stop(); return; }
    if(recBtnActive) return;
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      recChunks=[]; mediaRec = new MediaRecorder(stream);
      mediaRec.ondataavailable = e=>recChunks.push(e.data);
      mediaRec.onstop = ()=>{
        stream.getTracks().forEach(t=>t.stop());
        recordings[btn.dataset.i] = URL.createObjectURL(new Blob(recChunks,{type:'audio/webm'}));
        document.querySelector(`#sec-listen .play[data-i="${btn.dataset.i}"]`).disabled=false;
        btn.classList.remove('on'); btn.textContent='🎙️ Ghi âm'; recBtnActive=null;

      };
      mediaRec.start(); recBtnActive=btn;
      btn.classList.add('on'); btn.textContent='⏹ Dừng';
      setTimeout(()=>{ if(recBtnActive===btn) mediaRec.stop(); }, 5000);
    }catch(e){ toast('❌ Không truy cập được micro.'); }
  };
});

let mtScore=0, mtRound=0, mtSelL=null, mtSelR=null, mtLeftCount=0, mtTimer=null, mtSec=0;
const MT_ROUNDS = [VOCAB.slice(0,8), VOCAB.slice(8,15), VOCAB.slice(15,22)];
function renderMatch(){
  const sec = $('#sec-match');
  if(mtRound >= MT_ROUNDS.length){
    clearInterval(mtTimer);
    sec.innerHTML = `
      <h2 class="sec-title">🔗 Matching Game</h2>
      <div class="panel center">
        <div class="result-emoji">🎉</div>
        <h3>Hoàn thành cả ${MT_ROUNDS.length} vòng!</h3>
        <p style="color:var(--ink-soft);font-weight:600">Điểm: <b>${mtScore}</b> · Thời gian: <b>${mtSec}s</b></p>
        <button class="btn" id="mtAgain">🔄 Chơi lại</button>
      </div>`;
    $('#mtAgain').onclick=()=>{ mtScore=0; mtRound=0; mtSec=0; renderMatch(); };
    return;
  }
  if(mtRound===0 && !mtTimer){ mtSec=0; mtTimer=setInterval(()=>{ mtSec++; const e=$('#mtTime'); if(e)e.textContent=mtSec+'s'; },1000); }
  const set = MT_ROUNDS[mtRound];
  mtLeftCount = set.length; mtSelL=mtSelR=null;
  sec.innerHTML = `
    <h2 class="sec-title">🔗 Matching Game <small style="font-size:13px;color:var(--ink-soft)">— Nối từ với nghĩa</small></h2>
    <p class="sec-sub">Chạm 1 từ tiếng Anh rồi chạm nghĩa tiếng Việt tương ứng.</p>
    <div class="gstat">
      <span class="gpill">Vòng ${mtRound+1}/${MT_ROUNDS.length}</span>
      <span class="gpill gold">⭐ <span id="mtScoreV">${mtScore}</span></span>
      <span class="gpill teal">⏱ <span id="mtTime">${mtSec}s</span></span>
    </div>
    <div class="panel mt-grid">
      <div class="mt-col">${shuffle(set.map(w=>w.en)).map(en=>`<button class="mt-btn" data-en="${en}">${en}</button>`).join('')}</div>
      <div class="mt-col">${shuffle(set.map(w=>w.vi)).map(vi=>`<button class="mt-btn" data-vi="${vi}">${vi}</button>`).join('')}</div>
    </div>`;
  const lookup = Object.fromEntries(set.map(w=>[w.en,w.vi]));
  sec.querySelectorAll('.mt-btn').forEach(b=>b.onclick=()=>{
    const isL = !!b.dataset.en;
    sec.querySelectorAll(isL?'[data-en]':'[data-vi]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    if(isL) mtSelL=b; else mtSelR=b;
    if(mtSelL && mtSelR){
      const ok = lookup[mtSelL.dataset.en] === mtSelR.dataset.vi;
      const L=mtSelL, R=mtSelR; mtSelL=mtSelR=null;
      if(ok){
        L.classList.add('ok'); R.classList.add('ok'); L.classList.remove('sel'); R.classList.remove('sel');
        mtScore+=10; $('#mtScoreV').textContent=mtScore; addXP(5); speak(L.dataset.en);
        if(--mtLeftCount===0){ toast('✅ Xong vòng '+(mtRound+1)+'!'); mtRound++; setTimeout(renderMatch,900); }
      } else {
        L.classList.add('no'); R.classList.add('no');
        setTimeout(()=>{ [L,R].forEach(x=>x.classList.remove('no','sel')); },450);
      }
    }
  });
}

==================================================== */
let quizQs=[], quizI=0, quizScore=0, quizLock=false;
function buildQuiz(){
  const pool = [
    ...VOCAB.map(w=>({mode:'en2vi', w})),
    ...VOCAB.map(w=>({mode:'vi2en', w})),
    ...VOCAB.map(w=>({mode:'ex2en', w})),
    ...VOCAB.map(w=>({mode:'pos', w})),
    ...VOCAB.map(w=>({mode:'ipa', w})),
  ];
  quizQs = shuffle(pool).slice(0,60); quizI=0; quizScore=0;
  quizRender();
}
function quizRender(){
  const sec=$('#sec-quiz');
  if(quizI >= quizQs.length){
    const pct = Math.round(quizScore/quizQs.length*100);
    S.quizScores.push({pct, date:new Date().toLocaleDateString('vi-VN')});
    if(S.quizScores.length>8) S.quizScores.shift();
    save(); renderDash();
    if(pct>=80) confetti();
    sec.innerHTML = `
      <h2 class="sec-title">✅ Multiple Choice Quiz</h2>
      <div class="panel center">
        <div class="result-emoji">${pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📖'}</div>
        <h3>Kết quả: ${quizScore}/${quizQs.length} câu đúng</h3>
        <div class="bar" style="max-width:340px;margin:14px auto"><div style="width:${pct}%">${pct}%</div></div>

        <button class="btn" id="quizAgain">🔄 Làm lại quiz</button>
      </div>`;
    $('#quizAgain').onclick=buildQuiz;
    return;
  }
  const {mode,w} = quizQs[quizI];
  quizLock=false;
  let label, promptHTML, answer, opts;
  if(mode==='en2vi'){
    label='Chọn nghĩa tiếng Việt đúng:';
    answer=w.vi; opts=shuffle([w.vi, ...shuffle(VOCAB.filter(v=>v.vi!==w.vi)).slice(0,3).map(v=>v.vi)]);
    promptHTML=`<div class="q-word">${w.emo} ${w.en} <button class="mini-speak" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button></div>`;
  } else if(mode==='vi2en'){
    label='Chọn từ tiếng Anh đúng:';
    answer=w.en; opts=shuffle([w.en, ...shuffle(VOCAB.filter(v=>v.en!==w.en)).slice(0,3).map(v=>v.en)]);
    promptHTML=`<div class="q-word">“${w.vi}”</div>`;
  } else if(mode==='ex2en'){
    label='Chọn từ phù hợp để điền vào câu:';
    answer=w.en; opts=shuffle([w.en, ...shuffle(VOCAB.filter(v=>v.en!==w.en)).slice(0,3).map(v=>v.en)]);
    promptHTML=`<div class="q-sent">${w.emo} ${maskWord(w.ex, w.en)}<br><small style="color:var(--ink-soft);font-weight:600">💡 ${w.exvi}</small></div>`;
  } else if(mode==='pos'){
    label='Từ này thuộc loại từ nào?';
    answer=POS_OPTIONS.find(p=>p.key===w.posKey).label;
    opts=shuffle(POS_OPTIONS.map(p=>p.label));
    promptHTML=`<div class="q-word">${w.emo} ${w.en} <button class="mini-speak" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button></div>`;
  } else { /* ipa */
    label='Chọn phiên âm (IPA) đúng:';
    answer=w.ipa; opts=shuffle([w.ipa, ...shuffle(VOCAB.filter(v=>v.ipa!==w.ipa)).slice(0,3).map(v=>v.ipa)]);
    promptHTML=`<div class="q-word">${w.emo} ${w.en} <button class="mini-speak" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button></div>`;
  }
  sec.innerHTML = `
    <h2 class="sec-title">✅ Multiple Choice Quiz</h2>
    <div class="gstat">
      <span class="gpill">Câu ${quizI+1}/${quizQs.length}</span>
      <span class="gpill gold">⭐ ${quizScore} đúng</span>
    </div>
    <div class="q-progress"><div style="width:${quizI/quizQs.length*100}%"></div></div>
    <div class="panel">
      <p class="sec-sub" style="margin-bottom:2px">${label}</p>
      ${promptHTML}
      ${opts.map(o=>`<button class="q-opt" data-v="${o}">${o}</button>`).join('')}
    </div>`;
  sec.querySelectorAll('.q-opt').forEach(b=>b.onclick=()=>{
    if(quizLock) return; quizLock=true;
    const ok = b.dataset.v===answer;
    sec.querySelectorAll('.q-opt').forEach(x=>{ if(x.dataset.v===answer) x.classList.add('ok'); });
    if(ok){ quizScore++; addXP(4); } else b.classList.add('no');
    setTimeout(()=>{ quizI++; quizRender(); }, ok?700:1400);
  });
}

==================================================== */
let spOrder=[], spIdx=0, spScore=0, spLock=false;
function spStart(){ spOrder=shuffle(VOCAB.map((_,i)=>i)); spIdx=0; spScore=0; spRender(); }
function spRender(){
  const sec=$('#sec-spell');
  if(spIdx>=spOrder.length){
    const pct=Math.round(spScore/spOrder.length*100);
    if(pct>=80) confetti();
    sec.innerHTML=`
      <h2 class="sec-title">🔤 Spelling Challenge</h2>
      <div class="panel center">
        <div class="result-emoji">${pct>=80?'🏆':pct>=50?'🎉':'💪'}</div>
        <h3>Kết quả: ${spScore}/${spOrder.length} (${pct}%)</h3>
        <button class="btn" id="spAgain">🔄 Chơi lại</button>
      </div>`;
    $('#spAgain').onclick=spStart;
    return;
  }
  const w=VOCAB[spOrder[spIdx]]; spLock=false;
  const hasSpace=/\s/.test(w.en);
  const modes = hasSpace ? ['missing','listen'] : ['missing','scramble','listen'];
  const mode = modes[Math.floor(Math.random()*modes.length)];
  let label='', body='', autoSay=false;
  if(mode==='missing'){
    const letters=w.en.split('');
    const idxs=[...letters.keys()].filter(i=>/[a-zA-Z]/.test(letters[i]));
    const hide=idxs[Math.floor(Math.random()*idxs.length)];
    const shown=letters.map((c,i)=>i===hide?'_':c).join('');
    label='Điền chữ cái còn thiếu rồi gõ lại cả từ:';
    body=`<div class="q-word">${w.emo} <span class="scramble">${shown}</span></div>`;
  } else if(mode==='scramble'){
    let sc=w.en; let tries=0;
    do{ sc=shuffle(w.en.split('')).join(''); tries++; }while(sc===w.en && tries<8);
    label='Sắp xếp lại các chữ cái thành từ đúng:';
    body=`<div class="q-word">${w.emo} <span class="scramble">${sc.split('').join(' ')}</span></div>`;
  } else {
    label='Nghe và gõ lại từ:';
    body=`<div class="q-word">${w.emo} <button class="mini-speak" id="spSay">🔊 Nghe lại</button></div>`;
    autoSay=true;
  }
  sec.innerHTML=`
    <h2 class="sec-title">🔤 Spelling Challenge <small style="font-size:13px;color:var(--ink-soft)">— Luyện đánh vần</small></h2>
    <p class="sec-sub">Nghe & gõ · Sắp xếp chữ cái · Điền chữ còn thiếu — mỗi câu một dạng ngẫu nhiên.</p>
    <div class="gstat"><span class="gpill">Câu ${spIdx+1}/${spOrder.length}</span><span class="gpill gold">⭐ ${spScore}</span></div>
    <div class="q-progress"><div style="width:${spIdx/spOrder.length*100}%"></div></div>
    <div class="panel">
      <p class="sec-sub" style="margin-bottom:2px">${label}</p>
      ${body}
      <div class="fb-hint">💡 Gợi ý nghĩa: ${w.vi}</div>
      <div class="fb-line">
        <input class="fb-input" id="spInp" placeholder="Gõ từ tiếng Anh..." autocomplete="off" autocapitalize="off">
        <button class="btn" id="spCheck">Kiểm tra</button>
      </div>
      <div class="fb-reveal" id="spR"></div>
    </div>`;
  if(autoSay) speak(w.en);
  const sayBtn=$('#spSay'); if(sayBtn) sayBtn.onclick=()=>speak(w.en);
  const inp=$('#spInp'); inp.focus();
  const go=()=>{
    if(spLock) return;
    const guess=inp.value.trim().toLowerCase();
    if(!guess) return;
    const ok = guess===w.en.toLowerCase();
    spLock=true; inp.disabled=true; inp.classList.add(ok?'ok':'no');
    $('#spR').textContent = ok? '✅ Chính xác! +5 XP' : '❌ Đáp án: '+w.en;
    $('#spR').style.color = ok? 'var(--good)':'var(--bad)';
    if(ok){ spScore++; addXP(5); speak(w.en); }
    setTimeout(()=>{ spIdx++; spRender(); }, ok?800:1600);
  };
  $('#spCheck').onclick=go;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
}
spStart();

let memTimer=null, memSec=0, memMoves=0, memOpen=[], memFound=0, memLock=false;
function memStart(){
  clearInterval(memTimer); memSec=0; memMoves=0; memOpen=[]; memFound=0; memLock=false;
  const picks = shuffle([...VOCAB]).slice(0,8);
  const cards = shuffle(picks.flatMap(w=>[{k:w.en, t:w.en, en:w.en},{k:w.en, t:w.vi, en:w.en}]));
  const best = S.memBest ? (S.memBest.moves+' lượt · '+S.memBest.sec+'s') : '—';
  $('#sec-memory').innerHTML = `
    <h2 class="sec-title">🧠 Memory Game <small style="font-size:13px;color:var(--ink-soft)">— Lật hình tìm cặp</small></h2>
    <p class="sec-sub">Tìm các cặp: từ tiếng Anh ↔ nghĩa tiếng Việt. Kỷ lục tốt nhất: <b>${best}</b></p>
    <div class="gstat">
      <span class="gpill teal">⏱ <span id="memTime">0:00</span></span>
      <span class="gpill">🔁 Lượt: <span id="memMoves">0</span></span>
      <span class="gpill gold">Cặp: <span id="memFound">0</span>/8</span>
      <button class="btn small ghost" id="memRestart" style="margin-left:auto">🔄 Chơi lại</button>
    </div>
    <div class="panel"><div class="mem-grid">
      ${cards.map((c,i)=>`
        <div class="mem-card" data-k="${c.k}">
          <div class="mem-in">
            <div class="mem-face f">❓</div>
            <div class="mem-face b">${c.t}</div>
          </div>
        </div>`).join('')}
    </div></div>`;
  $('#memRestart').onclick = memStart;
  memTimer = setInterval(()=>{
    memSec++; $('#memTime').textContent = Math.floor(memSec/60)+':'+String(memSec%60).padStart(2,'0');
  },1000);
  document.querySelectorAll('.mem-card').forEach(card=>card.onclick=()=>{
    if(memLock || card.classList.contains('open') || card.classList.contains('done')) return;
    card.classList.add('open'); memOpen.push(card);
    if(memOpen.length===2){
      memMoves++; $('#memMoves').textContent=memMoves; memLock=true;
      const [a,b]=memOpen;
      const same = a.dataset.k===b.dataset.k && a!==b;
      setTimeout(()=>{
        if(same){
          a.classList.add('done'); b.classList.add('done');
          memFound++; $('#memFound').textContent=memFound;
          speak(a.dataset.k); addXP(3);
          if(memFound===8){
            clearInterval(memTimer);
            const bonus = Math.max(40 - memMoves, 10);
            addXP(bonus); confetti();
            if(!S.memBest || memMoves < S.memBest.moves){ S.memBest={moves:memMoves, sec:memSec}; save(); toast(`🏆 Kỷ lục mới! ${memMoves} lượt · +${bonus} XP`); }
            else toast(`🎉 Hoàn thành ${memMoves} lượt · +${bonus} XP thưởng!`);
          }
        } else { a.classList.remove('open'); b.classList.remove('open'); }
        memOpen=[]; memLock=false;
      }, same?350:750);
    }
  });
}
memStart();

function renderSearch(){
  const sec=$('#sec-search');
  const posKeys=[...new Set(VOCAB.map(w=>w.posKey))];
  sec.innerHTML=`
    <h2 class="sec-title">🔎 Search & Filter <small style="font-size:13px;color:var(--ink-soft)">— Tìm kiếm & lọc</small></h2>
    <p class="sec-sub">Tìm từ, lọc theo loại từ / nhóm chủ đề, sắp xếp A→Z.</p>
    <div class="filter-bar">
      <input class="fb-input" id="searchInp" placeholder="🔍 Gõ từ tiếng Anh hoặc nghĩa..." autocomplete="off">
      <select class="filter-sel" id="posFilter">
        <option value="">Tất cả loại từ</option>
        ${posKeys.map(k=>`<option value="${k}">${POS_OPTIONS.find(p=>p.key===k)?POS_OPTIONS.find(p=>p.key===k).label:k}</option>`).join('')}
      </select>
      <select class="filter-sel" id="catFilter">
        <option value="">Tất cả chủ đề</option>
        ${Object.entries(CATS).map(([k,c])=>`<option value="${k}">${c.emo} ${c.name}</option>`).join('')}
      </select>
      <select class="filter-sel" id="sortSel">
        <option value="default">Thứ tự gốc</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
      </select>
    </div>
    <div id="searchResults"></div>`;
  function apply(){
    const q=$('#searchInp').value.trim().toLowerCase();
    const pf=$('#posFilter').value, cf=$('#catFilter').value, sortv=$('#sortSel').value;
    let list=VOCAB.filter(w=>{
      const matchQ = !q || w.en.toLowerCase().includes(q) || w.vi.toLowerCase().includes(q);
      const matchP = !pf || w.posKey===pf;
      const matchC = !cf || w.cat===cf;
      return matchQ && matchP && matchC;
    });
    if(sortv==='az') list=[...list].sort((a,b)=>a.en.localeCompare(b.en));
    if(sortv==='za') list=[...list].sort((a,b)=>b.en.localeCompare(a.en));
    const res=$('#searchResults');
    res.innerHTML = list.length ? list.map(w=>`
      <div class="lr-row">
        <span class="lr-emo">${w.emo}</span>
        <div>
          <div class="lr-word">${w.en} <span class="pos-tag">${w.pos}</span></div>
          <div class="lr-ipa">${w.ipa} · ${w.vi}</div>
        </div>
        <div class="lr-btns"><button class="rbtn listen" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊 Nghe</button></div>
      </div>`).join('') : '<p class="sec-sub">Không tìm thấy từ nào khớp 😅</p>';
  }
  $('#searchInp').addEventListener('input',apply);
  $('#posFilter').addEventListener('change',apply);
  $('#catFilter').addEventListener('change',apply);
  $('#sortSel').addEventListener('change',apply);
  apply();
}
renderSearch();

      <div class="result-emoji">⚔️</div>
      <h3>10 câu hỏi ngẫu nhiên — trộn đủ mọi dạng!</h3>
      <p style="color:var(--ink-soft);font-weight:600">Trắc nghiệm xuôi/ngược, loại từ và gõ từ. Mỗi câu đúng +8 XP.<br>Tích lũy XP để mở khoá 5 huy hiệu: 🌱 Beginner → 🧭 Explorer → 📘 Learner → 🎖️ Expert → 👑 Vocabulary Master!</p>
      <button class="btn" id="rvStart">🚀 Bắt đầu thử thách</button>
    </div>`;
  $('#rvStart').onclick = ()=>{
    rvQs = shuffle(VOCAB.flatMap(w=>[{t:'mc-en2vi',w},{t:'mc-vi2en',w},{t:'pos',w},{t:'type',w}])).slice(0,10);
    rvI=0; rvScore=0; rvRender();
  };
}
function rvRender(){
  const sec=$('#sec-review');
  if(rvI>=rvQs.length){
    const pct=Math.round(rvScore/rvQs.length*100);
    if(pct>=80) confetti();
    sec.innerHTML = `
      <h2 class="sec-title">🏆 Review Challenge</h2>
      <div class="panel center">
        <div class="result-emoji">${pct>=80?'👑':pct>=50?'🎉':'💪'}</div>
        <h3>Kết quả thử thách: ${rvScore}/${rvQs.length} (${pct}%)</h3>
        <div class="bar" style="max-width:340px;margin:12px auto"><div style="width:${pct}%">${pct}%</div></div>
        <p style="color:var(--ink-soft);font-weight:700">${pct>=80?'Đẳng cấp! Kiểm tra mục Tiến độ xem bạn mở khoá huy hiệu nào nhé!':'Chơi lại để kiếm thêm XP và mở khoá huy hiệu mới!'}</p>
        <button class="btn" id="rvAgain">🔄 Thử thách mới</button>
      </div>`;
    $('#rvAgain').onclick=rvIntro;
    return;
  }
  const q=rvQs[rvI]; rvLock=false;
  let body='';
  if(q.t==='type'){
    body = `
      <p class="sec-sub" style="margin-bottom:2px">Gõ từ tiếng Anh có nghĩa là:</p>
      <div class="q-word">${q.w.emo} “${q.w.vi}”</div>
      <div class="fb-line">
        <input class="fb-input" id="rvInp" placeholder="Type the English word..." autocomplete="off" autocapitalize="off">
        <button class="btn" id="rvCheck">Check</button>
      </div><div class="fb-reveal" id="rvR"></div>`;
  } else if(q.t==='pos'){
    const answer=POS_OPTIONS.find(p=>p.key===q.w.posKey).label;
    const opts=shuffle(POS_OPTIONS.map(p=>p.label));
    body = `
      <p class="sec-sub" style="margin-bottom:2px">Từ này thuộc loại từ nào?</p>
      <div class="q-word">${q.w.emo} ${q.w.en}</div>
      ${opts.map(o=>`<button class="q-opt" data-v="${o}" data-ans="${answer}">${o}</button>`).join('')}`;
  } else {
    const en2vi = q.t==='mc-en2vi';
    const answer = en2vi? q.w.vi : q.w.en;
    const pool = shuffle(VOCAB.filter(v=>v.en!==q.w.en)).slice(0,3).map(v=>en2vi?v.vi:v.en);
    const opts = shuffle([answer,...pool]);
    body = `
      <p class="sec-sub" style="margin-bottom:2px">${en2vi?'Chọn nghĩa đúng:':'Chọn từ tiếng Anh đúng:'}</p>
      <div class="q-word">${en2vi? q.w.emo+' '+q.w.en : '“'+q.w.vi+'”'}</div>
      ${opts.map(o=>`<button class="q-opt" data-v="${o}" data-ans="${answer}">${o}</button>`).join('')}`;
  }
  sec.innerHTML = `
    <h2 class="sec-title">🏆 Review Challenge</h2>
    <div class="gstat"><span class="gpill">Câu ${rvI+1}/10</span><span class="gpill gold">⭐ ${rvScore}</span></div>
    <div class="q-progress"><div style="width:${rvI*10}%"></div></div>
    <div class="panel">${body}</div>`;
  if(q.t==='type'){
    const inp=$('#rvInp'); inp.focus();
    const go=()=>{
      if(rvLock) return;
      const ok = inp.value.trim().toLowerCase()===q.w.en.toLowerCase();
      rvLock=true; inp.disabled=true; inp.classList.add(ok?'ok':'no');
      $('#rvR').textContent = ok? '✅ Chính xác!' : '❌ Đáp án: '+q.w.en;
      if(ok){ rvScore++; addXP(8); }
      setTimeout(()=>{rvI++;rvRender();}, ok?700:1500);
    };
    $('#rvCheck').onclick=go;
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  } else {
    sec.querySelectorAll('.q-opt').forEach(b=>b.onclick=()=>{
      if(rvLock) return; rvLock=true;
      const ok=b.dataset.v===b.dataset.ans;
      sec.querySelectorAll('.q-opt').forEach(x=>{if(x.dataset.v===x.dataset.ans)x.classList.add('ok');});
      if(ok){ rvScore++; addXP(8);} else b.classList.add('no');
      setTimeout(()=>{rvI++;rvRender();}, ok?700:1400);
    });
  }
}
rvIntro();

</script>
