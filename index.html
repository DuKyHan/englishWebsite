<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Lớp học cô Chi nè!</title>
  <link rel="icon" href="icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f6;
      --bg-hover: #f0f0ee;
      --text: #111110;
      --text-secondary: #6b6b68;
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,0,0,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'SFMono-Regular', Consolas, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg-secondary);
      color: var(--text);
      min-height: 100vh;
      direction: ltr;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1rem;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-brand svg { opacity: 0.7; width: 13px; height: 13px; }
    .topbar-path {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: var(--mono);
    }

    /* ── MAIN ── */
    #app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: calc(100vh - 28px);
    }

    /* ── HOME VIEW ── */
    .home-header { margin-bottom: 1.5rem; }
    .home-header h1 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }
    .home-header p { font-size: 13px; color: var(--text-secondary); }

    .search-row { margin-bottom: 1rem; }
    .search-row input {
      width: 100%;
      padding: 9px 14px;
      font-size: 14px;
      font-family: var(--font);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      text-align: left;
      direction: ltr;
    }
    .search-row input:focus { border-color: var(--border-hover); }
    .search-row input::placeholder { color: var(--text-secondary); }

    .count-row {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-family: var(--mono);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1rem;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .card:hover { border-color: var(--border-hover); background: var(--bg-hover); }

    .card-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg { opacity: 0.55; }
    .card.folder-card { cursor: pointer; }
    .card.folder-card .card-icon { background: #fef3c7; border-color: #f59e0b; }
    .card.folder-card .card-icon svg { opacity: 0.8; color: #d97706; }
    .folder-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;
    }
    .folder-back-btn {
      font-size: 12px; font-family: var(--font); color: var(--text-secondary);
      background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md);
      padding: 5px 12px; cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: background 0.12s, color 0.12s;
    }
    .folder-back-btn:hover { background: var(--bg-secondary); color: var(--text); }
    .folder-title {
      font-size: 15px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .folder-title svg { color: #d97706; }

    .card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      font-family: var(--mono);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ── DETAIL VIEW ── */
    .breadcrumb {
      display: none;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }
    .breadcrumb .active { color: var(--text); }
    .breadcrumb .sep { opacity: 0.35; }

    .viewer {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .viewer-header {
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .viewer-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--mono);
    }
    .tag {
      font-size: 10px;
      padding: 2px 7px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      color: var(--text-secondary);
      font-family: var(--font);
    }
    .back-btn {
      font-size: 12px;
      font-family: var(--font);
      color: var(--text-secondary);
      background: none;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 5px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.12s, color 0.12s;
    }
    .back-btn:hover { background: var(--bg-secondary); color: var(--text); }

    .viewer-body { padding: 1.5rem; }
    .viewer-desc {
      display: none;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    .viewer-preview {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
      overflow: visible;
    }
    .viewer-preview-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: var(--mono);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: var(--radius-md);
      padding: 1.1rem 1.25rem;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .kw  { color: #569cd6; }
    .at  { color: #9cdcfe; }
    .str { color: #ce9178; }
    .cm  { color: #6a9955; }
    .tg  { color: #4ec9b0; }

    .loader {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 2rem;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
      <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
      <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
      <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
    </svg>
    Lớp học Tiếng Anh
  </div>
  <span class="topbar-path"></span>
</header>

<main id="app"></main>

<script>
  // ── DATA ─────────────────────────────────────────────────────────────────
  let components = [];

  // ── LOAD EXTERNAL COMPONENTS ─────────────────────────────────────────────
  async function loadExternalComponents() {
    try {
      const res = await fetch('./component/manifest.json');
      if (!res.ok) throw new Error('Không tìm thấy manifest.json');
      const external = await res.json();
      
      external.forEach(item => {
        if (item.type === 'folder') {
          components.push({
            name: item.name,
            desc: item.desc || '',
            type: 'folder',
            children: (item.children || []).map(ch => ({
              name: ch.name,
              file: ch.file,
              desc: ch.desc || '',
              icon: ch.icon || `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>`,
              external: `./component/${ch.file}`
            }))
          });
        } else {
          components.push({
            name: item.name,
            file: item.file,
            desc: item.desc,
            icon: item.icon || `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>`,
            external: `./component/${item.file}`
          });
        }
      });
    } catch (err) {
      console.log('Không thể tải external components:', err.message);
    }
    navigateFromHash();
  }

  // ── STATE ────────────────────────────────────────────────────────────────
  let view = 'home';
  let selected = null;
  let query = '';
  let currentFolder = null; // folder entry đang mở, null = root

  // ── UTILS ────────────────────────────────────────────────────────────────
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── RENDER ───────────────────────────────────────────────────────────────
  function render() {
    const app = document.getElementById('app');
    if (view === 'home') {
      document.querySelector('.topbar').style.display = '';
      app.style.cssText = '';
      document.body.style.overflow = '';
      // Cập nhật breadcrumb
      const pathEl = document.querySelector('.topbar-path');
      if (currentFolder) {
        pathEl.textContent = `component / ${currentFolder.name}`;
      } else {
        pathEl.textContent = 'component';
      }
      renderHome(app);
    } else {
      renderFullscreen();
    }
  }

  function renderFullscreen() {
    document.querySelector('.topbar').style.display = 'none';
    document.body.style.overflow = 'hidden';

    const app = document.getElementById('app');
    app.style.cssText = 'margin:0;padding:0;max-width:100%;min-height:100vh;position:relative;';
    app.innerHTML = `
      <iframe id="fulliframe" style="width:100%;height:100vh;border:none;display:block;" scrolling="yes"></iframe>
    `;

    const iframe = document.getElementById('fulliframe');
    fetch(selected.external)
      .then(r => r.text())
      .then(html => {
        iframe.contentDocument.open();
        iframe.contentDocument.write(html);
        iframe.contentDocument.close();
      });

    document.getElementById('backBtn').addEventListener('click', () => {
      view = 'home';
      query = '';
      // Giữ currentFolder nếu đang xem file từ folder
      history.pushState(null, '', location.pathname);
      render();
    });
  }

  function renderHome(app) {
    // Xác định danh sách hiển thị: root hoặc trong folder
    const items = currentFolder ? currentFolder.children : components;

    const filtered = items.filter(c =>
      c.name.toLowerCase().includes(query.toLowerCase()) ||
      (c.desc && c.desc.toLowerCase().includes(query.toLowerCase())) ||
      (c.file && c.file.toLowerCase().includes(query.toLowerCase()))
    );

    const folderIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 6a2 2 0 012-2h5l2 2h9a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>`;
    const fileIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>`;

    const backBtn = currentFolder
      ? `<div class="folder-header">
           <button class="folder-back-btn" id="folderBackBtn">← Quay lại</button>
           <span class="folder-title">${folderIcon} ${esc(currentFolder.name)}</span>
         </div>`
      : '';

    const headerTitle = currentFolder ? currentFolder.name : 'Lớp học cô Chi nè!';
    const headerCount = currentFolder ? currentFolder.children.length : components.length;

    app.innerHTML = `
      <div class="home-header">
        <h1>${esc(headerTitle)}</h1>
        <p>${headerCount} mục</p>
      </div>
      ${backBtn}
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Tìm component..." autocomplete="off" dir="ltr" lang="en-US" style="direction: ltr; text-align: left; unicode-bidi: plaintext;" />
      </div>
      <div class="count-row">${filtered.length} kết quả</div>
      <div class="grid" id="grid">
        ${filtered.length === 0
          ? `<div class="empty">Không tìm thấy component nào.</div>`
          : filtered.map(c => {
              if (c.type === 'folder') {
                return `<div class="card folder-card" data-folder="${c.name}">
                  <div class="card-icon">${folderIcon}</div>
                  <span class="card-name">${esc(c.name)}</span>
                  <span class="card-desc">${esc(c.desc || (c.children ? c.children.length + ' mục' : ''))}</span>
                </div>`;
              }
              return `<div class="card" data-name="${c.name}">
                <div class="card-icon">${c.icon || fileIcon}</div>
                <span class="card-name">${esc((c.file || c.name).replace(/\.html$/, ''))}</span>
                <span class="card-desc">${esc(c.desc || '')}</span>
              </div>`;
            }).join('')}
      </div>
    `;

    // Back button
    if (currentFolder) {
      document.getElementById('folderBackBtn').addEventListener('click', () => {
        currentFolder = null;
        query = '';
        render();
      });
    }

    const searchInput = document.getElementById('searchInput');
    searchInput.value = query;

    searchInput.addEventListener('input', e => {
      let val = e.target.value;

      // Detect nếu text bị đảo ngược (chỉ số hoặc English)
      if (/^[\d\w\-_]+$/.test(val)) {
        const reversed = val.split('').reverse().join('');
        const searchList = currentFolder ? currentFolder.children : components;
        const original_count = searchList.filter(c => c.name.includes(val) || (c.file && c.file.includes(val)) || (c.desc && c.desc.includes(val))).length;
        const reversed_count = searchList.filter(c => c.name.includes(reversed) || (c.file && c.file.includes(reversed)) || (c.desc && c.desc.includes(reversed))).length;

        if (reversed_count > original_count && original_count === 0) {
          val = reversed;
          searchInput.value = val;
        }
      }

      query = val;
      render();
    });
    setTimeout(() => searchInput.focus(), 0);

    // Click vào folder → mở folder
    document.querySelectorAll('.card.folder-card').forEach(el => {
      el.addEventListener('click', () => {
        currentFolder = components.find(c => c.type === 'folder' && c.name === el.dataset.folder);
        query = '';
        render();
        window.scrollTo(0, 0);
      });
    });

    // Click vào file → mở detail
    document.querySelectorAll('.card[data-name]').forEach(el => {
      el.addEventListener('click', () => {
        const list = currentFolder ? currentFolder.children : components;
        selected = list.find(c => c.name === el.dataset.name);
        view = 'detail';
        history.pushState({ file: selected.file }, '', '#' + (selected.file || selected.name).replace(/\.html$/, ''));
        render();
        window.scrollTo(0, 0);
      });
    });
  }


  // ── ROUTING ──────────────────────────────────────────────────────────────
  function navigateFromHash() {
    const hash = location.hash.slice(1); // bỏ dấu #
    if (hash) {
      // Tìm trong root trước
      let found = components.find(c => c.file && c.file.replace(/\.html$/, '') === hash);
      // Nếu không thấy, tìm trong folder children
      if (!found) {
        for (const comp of components) {
          if (comp.type === 'folder' && comp.children) {
            const child = comp.children.find(c => c.file && c.file.replace(/\.html$/, '') === hash);
            if (child) {
              found = child;
              currentFolder = comp; // Mở folder chứa file này
              break;
            }
          }
        }
      }
      if (found) {
        selected = found;
        view = 'detail';
        render();
        window.scrollTo(0, 0);
        return;
      }
    }
    view = 'home';
    render();
  }

  window.addEventListener('popstate', navigateFromHash);

  // ── INIT ─────────────────────────────────────────────────────────────────
  loadExternalComponents();
</script>
</body>
</html>
